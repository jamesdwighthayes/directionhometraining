'll determine the approved number of hours","startTime":8.369,"finishTime":10.449},{"text":"for Choice's home care attendance service.","startTime":10.449,"finishTime":12.55},{"text":"Then you'll determine the provider's hourly pay rate.","startTime":13.659,"finishTime":16.239},{"text":"Based on the hourly pay rate,","startTime":17.27,"finishTime":18.809},{"text":"you'll determine the provider's bill will rate.","startTime":19.069,"finishTime":21.229},{"text":"These steps typically occur together.","startTime":22.19,"finishTime":24.44},{"text":"You'll then complete and submit the employer-employee agreement to PPL.","startTime":25.29,"finishTime":29.309},{"text":"Next,","startTime":30.18,"finishTime":30.649},{"text":"you'll enter the service authorization in the service plan.","startTime":30.819,"finishTime":33.74},{"text":"Lastly,","startTime":34.659,"finishTime":35.36},{"text":"is the ongoing monitoring and managing of the individual's budget.","startTime":35.419,"finishTime":39.02}]}},"6QH3atwJXwbEx4iP9":{"_id":"6QH3atwJXwbEx4iP9","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":110592,"uploadedFileName":"Nancy-en-EntertheServiceAuth-4202026.mp3","uploadedFileNameExtension":".mp3","duration":4.5625},"dates":{"dateCreated":"2026-04-20T15:24:42.479Z","dateModified":"2026-04-20T15:24:43.708Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Step 5 is to Enter the service authorization in the service plan.","voiceCode":"en-US-NancyNeural","language":"en","originalResourceId":"E7RnpKsYQgSMY7Y6M","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            versio mitations.","startTime":25.95,"finishTime":28.19},{"text":"In consumer directed personal care service,","startTime":28.95,"finishTime":31.379},{"text":"the individual has employer authority only,","startTime":31.549,"finishTime":33.939},{"text":"which means the individual does not determine their staff wages,","startTime":34.11,"finishTime":37.15},{"text":"and it is a wage set by the state.","startTime":37.349,"finishTime":39.11},{"text":"Because","startTime":39.88,"finishTime":39.889},{"text":"of this distinct difference,","startTime":40.279,"finishTime":41.669},{"text":"this training applies to choices,","startTime":41.84,"finishTime":43.479},{"text":"home care,","startTime":43.68,"finishTime":44.24},{"text":"attendance service only.","startTime":44.349,"finishTime":45.799}]}},"9Tkn3huF8WNxe6PLj":{"_id":"9Tkn3huF8WNxe6PLj","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":294912,"uploadedFileName":"Nancy-en-Disclaimer-4202026.mp3","uploadedFileNameExtension":".mp3","duration":12.2625},"dates":{"dateCreated":"2026-04-20T13:33:29.670Z","dateModified":"2026-04-20T13:33:31.126Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"A quick disclaimer before getting started the term individual is used in this training to refer to the passport consumer. This can mean the passport consumer and/or their designated representative if they have one.","voiceCode":"en-US-NancyNeural","language":"en","originalResourceId":"SQaMiAjc2WDmFYXMD","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003c :"OK,","startTime":0.289,"finishTime":0.649},{"text":"we're in the individual service plan,","startTime":0.759,"finishTime":2.609},{"text":"and we're in the 2nd tab labeled services.","startTime":2.849,"finishTime":5.53},{"text":"And now we want to add the Choices homecare attendant service to the service plan.","startTime":5.9,"finishTime":10.25},{"text":"So we're gonna start with adding the line.","startTime":11.59,"finishTime":13.13},{"text":"Choosing your service like you typically would when adding a new service.","startTime":14.18,"finishTime":17.719},{"text":"We're gonna choose,","startTime":19.25,"finishTime":20.03},{"text":"obviously here choices home care attendant service.","startTime":20.17,"finishTime":22.67},{"text":"Funding source passport.","startTime":23.829,"finishTime":25.37},{"text":"And then we're gonna double click in here so we can add more details.","startTime":26.76,"finishTime":30.04},{"text":"So I'm gonna start here at the top,","startTime":31.159,"finishTime":32.5},{"text":"under comments,","startTime":32.68,"finishTime":33.7},{"text":"um,","startTime":33.759,"finishTime":33.99},{"text":"always the best practice to add the provider's hourly pay rate here,","startTime":34.08,"finishTime":37.88},{"text":"since the rate that we add here is gonna be the billable","startTime":38.52,"finishTime":41.259},{"text":"rate unit.","startTime":41.84,"finishTime":42.86},{"text":"Um,","startTime":43.4,"finishTime":43.599},{"text":"it's nice to have the hourly pay rate here,","startTime":43.639,"finishTime":45.84},{"text":"so it's easily accessible to yourself or anyone else that's in the chart that","startTime":45.919,"finishTime":49.9},{"text":"may be needing that information,","startTime":50.479,"finishTime":51.84},{"text":"so I'm gonna stick with the $19.","startTime":51.919,"finishTime":54.139},{"text":"Hourly pay rate.","startTime":56.58,"finishTime":57.7},{"text":"And then sometimes it's helpful to add in the number of hours.","startTime":59.209,"finishTime":63.04},{"text":"That are authorized,","startTime":65.059,"finishTime":66.18},{"text":"so let's just say.","startTime":66.3,"finishTime":67.4},{"text":"If they're using the max allowable of the 40 hours a month,","startTime":70.629,"finishTime":73.559},{"text":"um,","startTime":73.66,"finishTime":73.9},{"text":"that would be a good place to have it here as well.","startTime":73.98,"finishTime":76.199},{"text":"And that any other comments that you think would","startTime":77.97,"finishTime":79.94},{"text":"be helpful or necessary for that specific individual.","startTime":79.94,"finishTime":83.239},{"text":"And I jump to the unit rate.","startTime":85.22,"finishTime":86.54},{"text":"So again,","startTime":87.589,"finishTime":87.949},{"text":"this is going to be the billable rate,","startTime":87.989,"finishTime":89.949},{"text":"so kind of","startTime":90.47,"finishTime":91.209},{"text":"going back to that calculator tool that we used a little bit earlier.","startTime":91.43,"finishTime":94.669},{"text":"Uh,","startTime":95.529,"finishTime":95.73},{"text":"the $19 an hour","startTime":95.769,"finishTime":97.58},{"text":"pay rate would calculate to $21.35","startTime":97.849,"finishTime":100.889},{"text":"billable hourly rate,","startTime":101.529,"finishTime":103.29},{"text":"which then equals","startTime":103.889,"finishTime":105.11},{"text":"$5.34","startTime":105.61,"finishTime":107.209},{"text":"per unit.","startTime":107.73,"finishTime":108.669},{"text":"So that's what we're gonna enter there.","startTime":110.73,"finishTime":111.94},{"text":"Again,","startTime":112.04,"finishTime":112.22},{"text":"this is the billable unit rate,","startTime":112.3,"finishTime":114},{"text":"this is the provider hourly pay rate.","startTime":114.3,"finishTime":116.26},{"text":"We use the calculator tool to get this $5.34","startTime":117.959,"finishTime":120.959},{"text":"based on the $19.","startTime":121.36,"finishTime":122.779},{"text":"Now,","startTime":125,"finishTime":125.12},{"text":"we're gonna jump down to frequency.","startTime":125.18,"finishTime":127.12},{"text":"I'm gonna choose monthly since it's","startTime":127.199,"finishTime":128.8},{"text":"always encouraged to do a monthly authorization","startTime":128.8,"finishTime":131.3},{"text":"whenever possible,","startTime":132.229,"finishTime":133.32},{"text":"um,","startTime":133.44,"finishTime":133.71},{"text":"just because that gives the individual more flexibility","startTime":133.72,"finishTime":136.479},{"text":"over how they're using that service authorization.","startTime":136.479,"finishTime":139.24},{"text":"So you'll enter the units,","startTime":141.19,"finishTime":142.789},{"text":"um,","startTime":142.97,"finishTime":143.27},{"text":"which goes back to your,","startTime":143.33,"finishTime":144.99},{"text":"uh,","startTime":145.059,"finishTime":145.46},{"text":"kind of original assessment of what the individual's needs are,","startTime":145.47,"finishTime":148.589},{"text":"and what that equals out to,","startTime":148.99,"finishTime":151.009},{"text":"um,","startTime":151.029,"finishTime":151.449},{"text":"on a monthly basis","startTime":151.46,"finishTime":152.809},{"text":"in this situation.","startTime":153.229,"finishTime":154.36},{"text":"So I'm just kind of entering a random number.","startTime":156.25,"finishTime":158.429},{"text":"And then the period,","startTime":160.169,"finishTime":161.11},{"text":"start date,","startTime":161.22,"finishTime":161.899},{"text":"end date.","startTime":162.3,"finishTime":162.86},{"text":"Um,","startTime":163.1,"finishTime":163.25},{"text":"so the start date is gonna be whatever,","startTime":163.3,"finishTime":165.08},{"text":"uh,","startTime":165.419,"finishTime":166.029},{"text":"start date you determined with the individual.","startTime":166.139,"finishTime":168.47},{"text":"So again,","startTime":170.74,"finishTime":171.179},{"text":"just kind of putting in a random day here.","startTime":171.3,"finishTime":173.039},{"text":"Um,","startTime":173.419,"finishTime":173.699},{"text":"but again,","startTime":173.779,"finishTime":174.139},{"text":"that would be the,","startTime":174.199,"finishTime":174.82},{"text":"the date you decide with the individual.","startTime":174.929,"finishTime":176.839},{"text":"Through the service plan,","startTime":179.1,"finishTime":180.41},{"text":"we will use.","startTime":180.75,"finishTime":181.649},{"text":"And then you'll go ahead and add your provider.","startTime":183.21,"finishTime":185.19},{"text":"I'm in a test site right now,","startTime":185.33,"finishTime":187.589},{"text":"so unfortunately,","startTime":187.889,"finishTime":188.449},{"text":"there's no providers to choose from,","startTime":188.5,"finishTime":190.089},{"text":"but you would choose your provider,","startTime":190.16,"finishTime":191.669},{"text":"um,","startTime":192.089,"finishTime":192.479},{"text":"the begin and end date,","startTime":192.589,"finishTime":193.85},{"text":"and then you've got all of the information,","startTime":194.24,"finishTime":196.169},{"text":"as you can see,","startTime":196.25,"finishTime":196.839},{"text":"a lot of this information was gathered from,","startTime":196.85,"finishTime":199.11},{"text":"from this process we've been going over,","startTime":199.449,"finishTime":201.55},{"text":"um,","startTime":201.97,"finishTime":202.61},{"text":"you know,","startTime":202.77,"finishTime":202.97},{"text":"the hourly pay rate,","startTime":203.05,"finishTime":204.289},{"text":"the,","startTime":204.41,"finishTime":204.789},{"text":"what the billable rate is,","startTime":204.88,"finishTime":206.49},{"text":"how many hours we're approving,","startTime":206.61,"finishTime":208.49},{"text":"what the start date is.","startTime":208.559,"finishTime":209.75},{"text":"So all of that information is now in here and we've got our service authorization.","startTime":211.49,"finishTime":215.229},{"text":"It's now in there,","startTime":218.32,"finishTi 4,"finishTime":94.199},{"text":"And as we can see,","startTime":96.239,"finishTime":97.389},{"text":"$19 an hour,","startTime":97.669,"finishTime":98.919},{"text":"it's done all the math by adding in all of the employer taxes.","startTime":99.12,"finishTime":102.48},{"text":"As you can see here,","startTime":104.54,"finishTime":105.43},{"text":"state unemployment is where the SI rate","startTime":105.589,"finishTime":107.569},{"text":"was entered in 2.7%.","startTime":107.949,"finishTime":110.209},{"text":"We come down here and it comes to $21.27","startTime":111.8,"finishTime":114.559},{"text":"an hour,","startTime":114.879,"finishTime":115.3},{"text":"which is $5.32","startTime":115.839,"finishTime":117.279},{"text":"per unit.","startTime":117.959,"finishTime":118.68},{"text":"So very easily,","startTime":119.04,"finishTime":119.889},{"text":"we can see that the $5.32","startTime":119.9,"finishTime":122.239},{"text":"based on our 2.7 SUI rate,","startTime":123.04,"finishTime":125.019},{"text":"will be the,","startTime":125.44,"finishTime":126.839},{"text":"the billable unit rate that will be entered into the service plan.","startTime":126.949,"finishTime":130.279}]}},"Xxss3ogAEFoShY8Z2":{"_id":"Xxss3ogAEFoShY8Z2","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":679808,"uploadedFileName":"image.png","height":704,"uploadedFileNameExtension":".png","width":1261},"dates":{"dateCreated":"2026-04-17T16:03:23.619Z","dateModified":"2026-04-17T16:03:23.619Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"nghf55W6hBXWKMMbY","thumbnail":"b73hycg9e6NQsXp57"},"ZYoaMzCvcKWXdM4ee":{"_id":"ZYoaMzCvcKWXdM4ee","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":605635,"uploadedFileName":"image.png","height":708,"uploadedFileNameExtension":".png","width":1258},"dates":{"dateCreated":"2026-04-17T16:00:03.929Z","dateModified":"2026-04-17T16:00:03.929Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"wNGrZn6ov8TfafE2j","thumbnail":"ecboR6WLerjDAPfoz"},"ZZ7Z89EYfdHkq2RME":{"_id":"ZZ7Z89EYfdHkq2RME","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":797184,"uploadedFileName":"Nancy-en-PassportPayRateCalculator-4202026.mp3","uploadedFileNameExtension":".mp3","duration":33.175},"dates":{"dateCreated":"2026-04-20T14:44:36.979Z","dateModified":"2026-04-20T14:44:39.119Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"As mentioned before, step 2, determine the provider's hourly pay rate. In step 3, determining the provider's billable rate occurred together. To determine the billable rate based on the hourly pay rate, you will use the OH Passport Pay Rate Calculator tool. This is an Excel spreadsheet that will calculate the hourly pay rate plus the taxes for you. First, you'll use the Pay Rate Calculator tool to determine the hourly pay rate with the individual. The next slide presents a short tutorial on how to do this.  ","voiceCode":"en-US-NancyNeural","language":"en","originalResourceId":"XSjubddyuCRXPKb7i","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-NancyNeural\">As mentioned before, step 2, determine the provider's hourly pay rate. In step 3, determining the provider's billable rate occurred together. To determine the billable rate based on the hourly pay rate, you will use the OH Passport Pay Rate Calculator tool. This is an Excel spreadsheet that will calculate the hourly pay rate plus the taxes for you. First, you'll use the Pay Rate Calculator tool to determine the hourly pay rate with the individual. The next slide presents a short tutorial on how to do this.  \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"As mentioned before,","startTime":0.079,"finishTime":1.11},{"text":"step 2,","startTime":1.5,"finishTime":2.049},{"text":"determine the provider's hourly pay rate.","startTime":2.21,"finishTime":4.309},{"text":"In step 3,","startTime":5.25,"finishTime":6.19},{"text":"determining the provider's billable rate occurred together.","startTime":6.409,"finishTime":9.149},{"text":"To determine the billable rate based on the hourly pay rate,","startTime":10.159,"finishTime":13.09},{"text":"you will use the OH passport pay rate calculator tool.","startTime":13.27,"finishTime":16.389},{"text":"This is an Excel spreadsheet that will calculate the","startTime":17.34,"finishTime":19.739},{"text":"hourly pay rate plus the taxes for you.","startTime":19.739,"finishTime":22.319},{"text":"First,","startTime":22.979,"finishTime":23.28},{"text":"you'll use the pay rate calculator tool to","startTime":23.54,"finishTime":25.69},{"text":"determine the hourly pay rate with the individual.","startTime":25.69,"finishTime":28.079},{"text":"The next slide presents a short tutorial on how to do this.","startTime":29.12,"finishTime":32.47}]}},"ZogCqqCubGfMhnroP":{"_id":"ZogCqqCubGfMhnroP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1189440,"uploadedFileName":"Nancy-en-EmployerTaxFluctuations-4202026.mp3","uploadedFileNameExtension":".mp3","duration":49.5125},"dates":{"dateCreated":"2026-04-20T14:37:33.355Z","dateModified":"2026-04-20T14:37:35.819Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"To piggyback off the billable rate conversation, it's also important to understand employer tax rate fluctuations. The billable rate includes the provider's hourly pay rate, plus the employer taxes. Employer taxes can fluctuate periodically throughout each year. One that fluctuates regularly each March is the Sui rate. Every individual has a unique, unique Sui rate which is tied to state unemployment insurance claims. In March some individuals employer Sui rates may fluctuate. They can increase, decrease or remain the same. Other tax rates such as workers' confidenceurance can also fluctuate each year. Tax rate fluctuations will directly impact the billable rate, and when this happens, the OAC maximum billable rate cannot be exceeded.  ","voiceCode":"en-US-NancyNeural","language":"en","originalResourceId":"bpnDf7Drd5tTZFdda","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-NancyNeural\">To piggyback off the billable rate conversation, it's also important to understand employer tax rate fluctuations. The billable rate includes the provider's hourly pay rate, plus the employer taxes. Employer taxes can fluctuate periodically throughout each year. One that fluctuates regularly each March is the Sui rate. Every individual has a unique, unique Sui rate which is tied to state unemployment insurance claims. In March some individuals employer Sui rates may fluctuate. They can increase, decrease or remain the same. Other tax rates such as workers' confidenceurance can also fluctuate each year. Tax rate fluctuations will directly impact the billable rate, and when this happens, the OAC maximum billable rate cannot be exceeded.  \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"To piggyback off the billable rate conversation,","startTime":0.039,"finishTime":2.15},{"text":"it's also important to understand employer tax rate fluctuations.","startTime":2.569,"finishTime":6.389},{"text":"The billable rate includes the provider's hourly pay rate plus the employer taxes.","startTime":7.179,"finishTime":12.029},{"text":"Employer taxes can fluctuate periodically throughout each year.","startTime":12.779,"finishTime":16.44},{"text":"One that fluctuates regularly each March is the sway rate.","startTime":17.329,"finishTime":20.579},{"text":"Every individual has a unique,","startTime":21.459,"finishTime":23.059},{"text":"unique sway rate which is tied to state unemployment insurance claims.","startTime":23.25,"finishTime":27.159},{"text":"In March,","startTime":27.909,"finishTime":28.43},{"text":"some individuals' employer sway rates may fluctuate.","startTime":28.54,"finishTime":31.489},{"text":"They can increase,","startTime":32.36,"finishTime":33.22},{"text":"decrease,","startTime":33.52,"finishTime":33.97},{"text":"or remain the same.","startTime":34.04,"finishTime":35.119},{"text":"Other tax rates such as workers' confidencesur can also fluctuate each year.","startTime":35.93,"finishTime":40.459},{"text":"Tax rate fluctuations will directly impact the billable rate,","startTime":41.2,"finishTime":44.38},{"text":"and when this happens,","startTime":44.52,"finishTime":45.47},{"text":"the OAC maximum billable rate cannot be exceeded.","startTime":45.599,"finishTime":48.759}]}},"atbkeEekn59Z9FTQm":{"_id":"atbkeEekn59Z9FTQm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fi  the discussion about the hourly pay rate. First, and most importantly, the hourly pay rate is ultimately the individual's decision and therefore the conversation should occur with the individual directly. This conversation should occur with the individual directly. This conversation should occur on the clinical operation side at the PAA and not the provider oversight side. And therefore, it's a collaborative discussion between the individual and their case manager. The provider can be present for this discussion if the individual chooses but should not be between the case manager and provider only.  ","voiceCode":"en-US-NancyNeural","language":"en","originalResourceId":"Kci7JgYKrZtjeEov6","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-NancyNeural\">We'll start with some best practices and FYI's for having the discussion about the hourly pay rate. First, and most importantly, the hourly pay rate is ultimately the individual's decision and therefore the conversation should occur with the individual directly. This conversation should occur with the individual directly. This conversation should occur on the clinical operation side at the PAA and not the provider oversight side. And therefore, it's a collaborative discussion between the individual and their case manager. The provider can be present for this discussion if the individual chooses but should not be between the case manager and provider only.  \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"We'll start with some best practices and FYI's for","startTime":0.09,"finishTime":2.73},{"text":"having the discussion about the hourly pay rate.","startTime":2.73,"finishTime":4.989},{"text":"First and most importantly,","startTime":5.929,"finishTime":7.519},{"text":"the hourly pay rate is ultimately the individual's decision and","startTime":7.6899999999999995,"finishTime":11.09},{"text":"therefore the conversation should occur with the individual directly.","startTime":11.09,"finishTime":14.43},{"text":"This conversation should occur with the individual directly.","startTime":15.3,"finishTime":18.559},{"text":"This conversation should occur on the clinical operations side","startTime":19.379,"finishTime":22.129},{"text":"at the PA and not the provider oversight side.","startTime":22.129,"finishTime":24.7},{"text":"And therefore,","startTime":25.459,"finishTime":26.219},{"text":"it's a collaborative discussion between the individual and their case manager.","startTime":26.379,"finishTime":30.42},{"text":"The provider can be present for this discussion if the individual chooses,","startTime":31.17,"finishTime":34.65},{"text":"but should not be between the case manager and provider only.","startTime":34.729,"finishTime":37.83}]}},"bFthJekFTcWqbDmAP":{"_id":"bFthJekFTcWqbDmAP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":691347,"uploadedFileName":"image.png","height":707,"uploadedFileNameExtension":".png","width":1255},"dates":{"dateCreated":"2026-04-17T16:01:07.274Z","dateModified":"2026-04-17T16:01:07.274Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"muBhG3yrGTvAgv5tB","thumbnail":"67uShKxeBLjkTEKm8"},"bNa9XfMZdTM9TcsaP":{"_id":"bNa9XfMZdTM9TcsaP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":279362,"uploadedFileName":"image.png","height":705,"uploadedFileNameExtension":".png","width":1261},"dates":{"dateCreated":"2026-04-17T16:00:43.787Z","dateModified":"2026-04-17T16:00:43.78 nd includes the providers hourly pay rate and employer taxes. Approximately 18% of the bill will rate goes towards employer taxes, which includes these tax fluctuations, which will ensure the individual status within the OAC max rate over time. \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The case manager must educate the individual on the","startTime":0.009,"finishTime":2.65},{"text":"current average wages of agency home health aides,","startTime":2.65,"finishTime":5.079},{"text":"the state's minimum wage,","startTime":5.26,"finishTime":6.53},{"text":"and the OAC maximum.","startTime":6.679,"finishTime":8.17},{"text":"The hourly rate chosen must fall within this range","startTime":8.989,"finishTime":11.51},{"text":"and should be competitive with agency aid wages.","startTime":11.51,"finishTime":14.02},{"text":"It's important to communicate the OAC maximum rate is a billable rate","startTime":14.76,"finishTime":18.559},{"text":"maximum and includes the provider's hourly pay rate and employer taxes.","startTime":18.559,"finishTime":22.62},{"text":"Approximately 18% of the bill will rate goes towards employer taxes,","startTime":23.51,"finishTime":27.459},{"text":"which includes these tax fluctuations,","startTime":27.639,"finishTime":29.62},{"text":"which will ensure the individual's status within the OAC max rate over time.","startTime":29.719,"finishTime":33.459}]}},"g2yD3PsdYqEWy5k24":{"_id":"g2yD3PsdYqEWy5k24","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":177093,"uploadedFileName":"image.png","height":709,"uploadedFileNameExtension":".png","width":1259},"dates":{"dateCreated":"2026-04-17T15:53:52.663Z","dateModified":"2026-04-17T15:53:52.663Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"M3Ya2pBK3ys9LMKsP","thumbnail":"y6TsPYtnq4vwnnxzJ"},"g3t5Fa9CwtkK6rcLJ":{"_id":"g3t5Fa9CwtkK6rcLJ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1198080,"uploadedFileName":"Nancy-en-Blank-4202026.mp3","uploadedFileNameExtension":".mp3","duration":49.875},"dates":{"dateCreated":"2026-04-20T15:07:57.423Z","dateModified":"2026-04-20T15:07:58.784Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"As you can see we used a 9% SUI rate to leave a small buffer for employer tax fluctuations each year. Using 9% as the SUI rate leaves about 18% for all the employer taxes. The 18% can help accommodate future tax rate fluctuations. This will ensure that when employer tax rates fluctuate, the provider will not go over the OAC maximum rate. A quick note. You will use 9% here or the individual SUI rate in their PPL portal profile, whichever is higher as the SUI rate. Now that you've determined the providers hourly pay rate with the individual, it's now time to find the billable rate. This is the rate that will be entered into the individual's PIM service plan. The next slide presents a quick tutorial on how to do this.  ","voiceCode":"en-US-NancyNeural","language":"en","originalResourceId":"vz8Cepp2wCtstosRJ","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-NancyNeural\">As you can see we used a 9% SUI rate to leave a small buffer for employer tax fluctuations each year. Using 9% as the SUI rate leaves about 18% for all the employer taxes. The 18% can help accommodate future tax rate fluctuations. This will ensure that when employer tax rates fluctuate, the provider will not go over the OAC maximum rate. A quick note. You will use 9% here or the individual SUI rate in their PPL portal profile, whichever is higher as the SUI rate. Now that you've determined the providers hourly pay rate with the individual, it's now time to find the billable rate. This is the rate that will be entered into the individual's PIM service plan. The next slide presents a quick tutorial on how to do this.  \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"As you can see,","startTime":0.119,"finishTime":0.639},{"text":"we used a 9% SUI rate to leave a small buffer for employer tax fluctuations each year.","startTime":0.649,"finishTime":5.829},{"text":"Using 9% as the SUI rate leaves about 18% for all the employer taxes.","startTime":6.67,"finishTime":11.97},{"text":"The 18% can help accommodate future tax rate fluctuations.","startTime":12.77,"finishTime":16.84},{"text":"This will ensure that when employer tax rates fluctuate,","startTime":17.659,"finishTime":20.379},{"text":"the provider will not go over the OAC maximum rate.","startTime":20.549,"finishTime":23.37},{"text":"A quick note","startTime":24.389,"finishTime":25.54},{"text":"You will use 9% here or the individual SUI rate in their PPL portal profile,","startTime":26.35,"finishTime":30.979},{"text":"whichever is higher as the SUI rate.","startTime":31.25,"finishTime":33.259},{"text":"Now that you've determined the provider's hourly pay rate with the individual,","startTime":34.31,"finishTime":37.889},{"text":"it's now time to find the billable rate.","startTime":38.169,"finishTime":40.31},{"text":"This is the rate that will be entered into the individual's PIM service plan.","startTime":41.18,"finishTime":45.009},{"text":"The next slide presents a quick tutorial on how to do this.","startTime":45.86,"finishTime":49.169}]}},"hK5bAzTpKTK3NzNds":{"_id":"hK5 o this? This gives the individual more flexibility in autonomy on how they use their hours, which is ideal in a self-directed model. There may be scenarios where a monthly budget does not make sense. For example, the provider has reached their maximum 40 hours per week allowed in rule. But a monthly authorization is best practiced whenever possible. To determine the monthly number of hours, simply multiply the number of hours per week by 4.3. On the occasion you are authorizing 40 hours per week, multiply the number of weekly hours by 4.5 instead.  \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Use discretion with completing the step in the process.","startTime":0.129,"finishTime":3.13},{"text":"Depending on the situation,","startTime":3.94,"finishTime":5.46},{"text":"you may already know how many hours are approved.","startTime":5.579,"finishTime":8.159},{"text":"So this step can be skipped if it's already been done recently.","startTime":9.069,"finishTime":11.85},{"text":"To determine the approved number of Choice's home care attendance service hours,","startTime":13.01,"finishTime":16.639},{"text":"use your PA's internal process to complete an assessment of the individual's needs","startTime":16.809,"finishTime":20.45},{"text":"based on the allowable tasks under the Choice's home care attendance service rule,","startTime":20.45,"finishTime":24.04},{"text":"OAC 173-39-02.4 section 8.","startTime":24.17,"finishTime":27.85},{"text":"Ideally,","startTime":27.989,"finishTime":28.52},{"text":"Choice's home care attendance service is authorized as a monthly number of hours","startTime":28.69,"finishTime":32.63},{"text":"instead of daily or weekly as commonly done with an agency provider.","startTime":33,"finishTime":36.63},{"text":"Why do this?","startTime":37.58,"finishTime":38.68},{"text":"This gives the individual more flexibility and","startTime":39.52,"finishTime":41.799},{"text":"autonomy on how they use their hours,","startTime":41.799,"finishTime":43.84},{"text":"which is ideal in a self-directed model.","startTime":44.009,"finishTime":46.069},{"text":"There may be scenarios where a monthly budget does not make sense.","startTime":47.09,"finishTime":50.59},{"text":"For example,","startTime":51.45,"finishTime":52.169},{"text":"the provider has reached their maximum 40 hours per week allowed enroll.","startTime":52.33,"finishTime":56.369},{"text":"But a monthly authorization is best practiced whenever possible.","startTime":57.169,"finishTime":60.939},{"text":"To determine the monthly number of hours,","startTime":61.72,"finishTime":63.669},{"text":"simply multiply the number of hours per week by 4.3.","startTime":64.01,"finishTime":67.449},{"text":"On the occasion you are authorizing 40 hours per week,","startTime":68.26,"finishTime":71.139},{"text":"multiply the number of weekly hours by 4.5 instead.","startTime":71.349,"finishTime":74.61}]}},"saytaC9yhahE5qcPx":{"_id":"saytaC9yhahE5qcPx","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1385856,"uploadedFileName":"Nancy-en-BudgetManagement-4202026.mp3","uploadedFileNameExtension":".mp3","duration":57.7},"dates":{"dateCreated":"2026-04-20T17:56:57.768Z","dateModified":"2026-04-20T17:57:00.475Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Lastly, here is guidance for how the individual was support from the case manager. Monitors and managers their budget. The individuals should know what is authorized in their service plan and is responsible for authorizing and approving their provider's service based on it. It is the case manager's responsibility to provide education and support during this process as needed. The individual sets the schedule with their provider and n into the individual service plan. We'll start with reviewing some important details to include in the service authorization. For new referrals, you should add the service authorization in the service plan when the PPL referral is made. For existing participants, update the Service Plan and use the Start Date and turn on the Employer Employee Agreement for the new Service Authorization line. For the Unit Rate, enter the Billible unit rate determined with the OH passport calculator tool. In the comment section, enter the number of approved hours in hourly pay rate. For new referrals, once the good to go is received from PPL, update the provider's start date in the service authorization to the start date determined with the individual. The next slide shows a quick tutorial on entering a service authorization into the service plan  \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Now it's time to enter the Choices Home Care","startTime":0.159,"finishTime":2.289},{"text":"tenants service authorization into the individual service plan.","startTime":2.289,"finishTime":5.6899999999999995},{"text":"We'll start with reviewing some important details","startTime":6.559,"finishTime":8.96},{"text":"to include in the service authorization.","startTime":8.96,"finishTime":11.34},{"text":"For new referrals,","startTime":11.92,"finishTime":12.88},{"text":"you should add the service authorization in the","startTime":13.039,"finishTime":15},{"text":"service plan when the PPL referral is made.","startTime":15,"finishTime":17.739},{"text":"For existing participants,","startTime":18.399,"finishTime":19.75},{"text":"update the service plan and use the start date and turn","startTime":20.079,"finishTime":22.559},{"text":"on the employer-employee agreement for the new service authorization line.","startTime":22.559,"finishTime":26.239},{"text":"For the unit rate,","startTime":27.12,"finishTime":27.879},{"text":"enter the billable unit rate determined with the OH passport calculator tool.","startTime":28.04,"finishTime":32.5},{"text":"In the comments section,","startTime":33.209,"finishTime":34.369},{"text":"enter the number of approved hours and hourly pay rate.","startTime":34.45,"finishTime":37.669},{"text":"For new referrals,","startTime":38.33,"finishTime":39.29},{"text":"once the good to go is received from PPL,","startTime":39.479,"finishTime":41.569},{"text":"update the provider's start date in the service authorization","startTime":41.9,"finishTime":44.529},{"text":"to the start date determined with the individual.","startTime":44.529,"finishTime":46.95},{"text":"The next slide shows a quick tutorial on","startTime":47.689,"finishTime":49.93},{"text":"entering a service authorization into the service plan.","startTime":49.93,"finishTime":52.77}]}},"uKgBoCm7dBknyZ53D":{"_id":"uKgBoCm7dBknyZ53D","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1089792,"uploadedFileName":"Nancy-en-ServicePlanQuickRecap-4202026.mp3","uploadedFileNameExtension":".mp3","duration":45.3625},"dates":{"dateCreated":"2026-04-20T15:11:07.944Z","dateModified":"2026-04-20T15:11:10.608Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"As noted in the tutorial, you will use 2.7% as the SUI rate for individuals new to choices home care attendant service. The cost to employer with instructions document can be used as a quick reference for those with 2.7% SUI rate. For individuals already enrolled on choices HomeCareTendant Service, use the sui rate in the individuals PPL portal chart. To find the SUI rate for a current choice's HomeCareTendant Service individual, log into the PPL portal, search the individual under participant search, click participant profile, and the SUI ra "Employer taxes can fluctuate periodically throughout each year.","startTime":12.779,"finishTime":16.44},{"text":"One that fluctuates regularly each March is the sway rate.","startTime":17.329,"finishTime":20.579},{"text":"Every individual has a unique,","startTime":21.459,"finishTime":23.059},{"text":"unique sway rate which is tied to state unemployment insurance claims.","startTime":23.25,"finishTime":27.159},{"text":"In March,","startTime":27.909,"finishTime":28.43},{"text":"some individuals' employer sway rates may fluctuate.","startTime":28.54,"finishTime":31.489},{"text":"They can increase,","startTime":32.36,"finishTime":33.22},{"text":"decrease,","startTime":33.52,"finishTime":33.97},{"text":"or remain the same.","startTime":34.04,"finishTime":35.119},{"text":"Other tax rates such as workers' confidencesur can also fluctuate each year.","startTime":35.93,"finishTime":40.459},{"text":"Tax rate fluctuations will directly impact the billable rate,","startTime":41.2,"finishTime":44.38},{"text":"and when this happens,","startTime":44.52,"finishTime":45.47},{"text":"the OAC maximum billable rate cannot be exceeded.","startTime":45.599,"finishTime":48.759}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ZogCqqCubGfMhnroP","GxRTBsYXypC97Tpoa"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To piggyback off the billable rate conversation, it's also important to understand employer tax rate fluctuations. The billable rate includes the provider's hourly pay rate, plus the employer taxes. Employer taxes can fluctuate periodically throughout each year. One that fluctuates regularly each March is the Sui rate. Every individual has a unique, unique Sui rate which is tied to state unemployment insurance claims. In March some individuals employer Sui rates may fluctuate. They can increase, decrease or remain the sa
