.","startTime":12,"finishTime":13.739},{"text":"Emphasis is placed on the members' ability to describe","startTime":14.55,"finishTime":17.149},{"text":"red flags in their own words and document,","startTime":17.149,"finishTime":19.17},{"text":"both symptoms and response plans within the personal health","startTime":19.19,"finishTime":21.92},{"text":"record to support timely and appropriate use of care.","startTime":21.92,"finishTime":24.549}]}},"4eEiPzaoqS7yieHRx":{"_id":"4eEiPzaoqS7yieHRx","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":822853,"uploadedFileName":"5_Purpose-of-the-Care-Transitions-Program.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-30T18:36:51.127Z","dateModified":"2026-03-30T18:36:51.127Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"XX2qQ8Nt8wRfopwNX","thumbnail":"hNBD4ZiFYhEFe5Mob"},"5ceGBMjG6cihzQXHN":{"_id":"5ceGBMjG6cihzQXHN","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":726336,"uploadedFileName":"Guy-en-InstitutiontoPerson-CenteredCare-3302026.mp3","uploadedFileNameExtension":".mp3","duration":30.225},"dates":{"dateCreated":"2026-03-30T19:35:22.563Z","dateModified":"2026-03-30T19:35:23.997Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Historically, care transitions have focused on institutional processes rather than individual readiness. The Care Transitions program represents a shift toward person-centered care, where education, engagement, and understanding are prioritized. This approach recognizes that succe
