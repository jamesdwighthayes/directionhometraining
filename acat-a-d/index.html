cation lists,","startTime":22.569,"finishTime":24.19},{"text":"appointment cards,","startTime":24.28,"finishTime":25.239},{"text":"or discharge summaries,","startTime":25.479,"finishTime":27.04},{"text":"because self-report is often incomplete or inaccurate.","startTime":27.29,"finishTime":30.489},{"text":"Section B relies heavily on observation,","startTime":31.479,"finishTime":33.95},{"text":"collateral information,","startTime":34.24,"finishTime":35.439},{"text":"and professional judgment,","startTime":35.52,"finishTime":37.159},{"text":"and it often requires the interviewer to return","startTime":37.36,"finishTime":40},{"text":"to certain items later once verification is available.","startTime":40,"finishTime":43.06},{"text":"A great tip is to add medical equipment and","startTime":43.909,"finishTime":46.279},{"text":"incontinence supply companies the member utilizes into the pharmacy section","startTime":46.279,"finishTime":50.759},{"text":"inside of section B as this makes it easier","startTime":50.759,"finishTime":52.939},{"text":"to document and reference these providers in future sections.","startTime":52.939,"finishTime":56.36}]}},"6G6Hbm8dkbnCW4ygC":{"_id":"6G6Hbm8dkbnCW4ygC","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":3096576,"uploadedFileName":"Ava-en-ComplexPersonalHistory-3132026.mp3","uploadedFileNameExtension":".mp3","duration":129},"dates":{"dateCreated":"2026-03-13T19:28:08.217Z","dateModified":"2026-03-13T19:28:11.369Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"This portion of Section B involves questions that can feel personal or sensitive for many individuals. Interviewers should avoid reading the technical A CAT, wording verbatim, because the clinical phrasing can be confusing or may create discomfort. Instead, questions should be rephrased into clear, conversational language that focuses on gathering accurate information without causing embarrassment or misunderstanding.\nWhen asking about allergies, the interviewer should explore medication, food, and environmental categories. If the individual cannot recall the details, the interviewer should rely on caregiver input or past medical documentation rather than pressing for precise memory. It is not sufficient to document the allergen alone—the reaction must also be recorded. For example, documenting “shellfish” without noting that it causes anaphylaxis does not accurately reflect risk. Individuals often remember that they are “allergic” to something but may not immediately recall the reaction. Follow-up questions such as, “What happens when you’re exposed?” help clarify whether the response involves mild symptoms like a rash or more serious reactions such as breathing difficulty or swelling. Be sure to document the reaction.\nFor substance‑use history, many individuals remember only the month and year of last use. In those cases, the interviewer may use the first day of that month as the estimated date and clearly note that the date is approximate. The emphasis should remain on factual patterns such as frequency, rather than judgment or interpretation.\nWhen discussing transplant history, individuals may not know the exact organ, date, or whether they remain a candidate. The interviewer should rely on caregiver information or medical paperwork when available to ensure the assessment reflects an accurate and complete picture.\nThroughout these items, the guiding principle is to collect reliable information in a respectful and non‑technical manner, ensuring the individual feels comfortable and understood.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"LfTuvHwS9z7nJWivz","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts s medically stable. These questions are complex and often cannot be answered accurately through interview alone.\nMedical stability determinations frequently require a review of medical records and, in some cases, written physician documentation. Interviewers should not independently declare medical instability based solely on self‑report, caregiver concern, or observation without appropriate medical support.\nIndividuals may describe symptoms that sound serious, such as fluctuating blood pressure or unstable diabetes, but these do not automatically indicate medical instability unless a physician has identified the condition as such or unless records clearly support that conclusion. Likewise, individuals may understate symptoms that are clinically significant.\nThe interviewer’s role is to gather detailed information about symptoms, frequency, urgency, and interventions; document observations; and clearly note when medical verification is required. When uncertainty exists, the A CAT, should reflect that medical records are pending or that physician input is needed. This approach protects both the individual and the integrity of the assessment while ensuring that medical instability is documented accurately and defensibly.\nThe interviewer must apply professional judgment rather than relying on diagnosis alone.\nTo guide this judgment, the interviewer should consider three key questions.\nFirst: Does the condition require specialized training to address?\nSecond: Would immediate action be necessary if the condition suddenly became worse?\nAnd third: Is the intervention needed daily or multiple times per week?\nWhen documenting information for this section, the interviewer should capture details such as the frequency of wound care, the regularity of incontinence care, any seizure activity that requires rescue medication, and the use of oxygen, suctioning, or tube feeding. These items help clarify whether the condition requires skilled involvement.\nIt is important to edically stable.","startTime":6.329,"finishTime":9.159},{"text":"These questions are complex and often cannot","startTime":9.489,"finishTime":12.09},{"text":"be answered accurately through interview alone.","startTime":12.09,"finishTime":14.47},{"text":"Medical stability determinations frequently require","startTime":15.55,"finishTime":18.51},{"text":"a review of medical records and","startTime":18.51,"finishTime":20.77},{"text":"in some cases,","startTime":21.03,"finishTime":22.2},{"text":"written physician documentation.","startTime":22.469,"finishTime":24.329},{"text":"Interviewers should not independently declare medical","startTime":24.629,"finishTime":27.35},{"text":"instability based solely on self-report,","startTime":27.35,"finishTime":30.03},{"text":"caregiver concern,","startTime":30.309,"finishTime":31.35},{"text":"or observation without appropriate medical support.","startTime":31.51,"finishTime":34.369},{"text":"Individuals may describe symptoms that sound serious,","startTime":35.11,"finishTime":38.47},{"text":"such as fluctuating blood pressure or unstable diabetes,","startTime":38.63,"finishTime":42.529},{"text":"but these do not automatically indicate","startTime":43.069,"finishTime":45.229},{"text":"medical instability unless a physician has","startTime":45.229,"finishTime":47.549},{"text":"identified the condition as such or","startTime":47.549,"finishTime":49.95},{"text":"unless records clearly support that conclusion.","startTime":49.95,"finishTime":52.77},{"text":"Likewise,","startTime":53.11,"finishTime":53.689},{"text":"individuals may understate symptoms that are clinically significant.","startTime":54.36,"finishTime":57.95},{"text":"The interviewer's role is to gather detailed information about symptoms,","startTime":58.799,"finishTime":62.63},{"text":"frequency,","startTime":62.88,"finishTime":63.659},{"text":"urgency,","startTime":63.86,"finishTime":64.66},{"text":"and interventions,","startTime":64.669,"finishTime":65.87},{"text":"document observations,","startTime":66.08,"finishTime":67.459},{"text":"and clearly note when medical verification is required.","startTime":67.639,"finishTime":70.989},{"text":"When uncertainty exists,","startTime":71.319,"finishTime":72.639},{"text":"the ACAT","startTime":72.76,"finishTime":73.51},{"text":"should reflect that medical records are pending or that physician input is needed.","startTime":73.839,"finishTime":78.51},{"text":"This approach protects both the individual and the integrity of the","startTime":78.839,"finishTime":82.19},{"text":"assessment while ensuring that medical instability","startTime":82.19,"finishTime":84.919},{"text":"is documented accurately and defensively.","startTime":84.919,"finishTime":87.519},{"text":"The interviewer must apply professional judgment","startTime":88.389,"finishTime":91.04},{"text":"rather than relying on diagnosis alone.","startTime":91.04,"finishTime":93.3},{"text":"To guide this judgment,","startTime":94.37,"finishTime":95.65},{"text":"the interviewer should consider 3 key questions.","startTime":95.9,"finishTime":98.8},{"text":"First,","startTime":99.75,"finishTime":100.3},{"text":"does the condition require specialized training to address?","startTime":100.51,"finishTime":103.569},{"text":"Second,","startTime":104.5,"finishTime":105.099},{"text":"would immediate action be necessary if the condition suddenly became worse?","startTime":105.4,"finishTime":109.4},{"text":"And 3rd,","startTime":110.209,"finishTime":111.12},{"text":"is the intervention needed daily or multiple times per week.","startTime":111.33,"finishTime":114.75},{"text":"When documenting information for this section,","startTime":115.569,"finishTime":117.889},{"text":"the interviewer should capture details such as the frequency of wound care,","startTime":118.209,"finishTime":122.129},{"text":"the regularity of incontinence care,","startTime":122.33,"finishTime":124.55},{"text":"any seizure activity that requires rescue medication,","startTime":124.73,"finishTime":127.58},{"text":"and the use of oxygen,","startTime":128.21,"finishTime":129.85},{"text":"suctioning or tube feeding.","startTime":130.21,"finishTime":132.029},{"text":"These items help clarify whether the condition requires skilled involvement.","startTime":132.36,"finishTime":136.49},{"text":"It is important to note that these questions","startTime":137.289,"finishTime":139.49},{"text":"should not be read verbatim to the individual.","startTime":139.49,"finishTime":141.83},{"text":"Many individuals cannot interpret the terminology,","startTime":142.169,"finishTime":145.05},{"text":"and asking them directly could create confusion.","startTime":145.25,"finishTime":148.149},{"text":"Instead,","startTime":148.449,"finishTime":149.05},{"text":"the interviewer should rely on medical records,","startTime":149.289,"finishTime":151.96},{"text":"caregiver input,","startTime":152.25,"finishTime":153.169},{"text":"and observation.","startTime":153.25,"finishTime":154.41},{"text":"Additionally,","startTime":155.21,"finishTime":155.97},{"text":"any complex tasks such as catheter management,","startTime":156.119,"finishTime":159.009},{"text":"tracheostomy care,","startTime":159.169,"finishTime":160.529},{"text":"or nebulizer use","startTime":160.649,"finishTime":162.059},{"text":"must be cross-listed in the equipment and","startTime":162.38,"finishTime":164.57},{"text":"services sections later in the assessment.","startTime":164.57,"finishTime":166.85}]}},"am2MwzSE7PZsWFiQv":{"_id":"am2MwzSE7PZsWFiQv","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1112256,"uploadedFileName":"Ava-en-HowtoUseThisGuide-362026.mp3","uploadedFileNameExtension":".mp3","duration":46.3125},"dates":{"dateCreated":"2026-03-06T19:58:04.324Z","dateModified":"2026-03-06T19:58:06.019Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"This training is designed as a practical interviewing guide, not a simple description of what appears on each page of the A CAT. \nThe narration focuses on how to ask the questions, how to interpret responses, and how to handle common challenges—such as conflicting accounts from individuals and caregivers, missing information, or misunderstandings of terminology. \nBecause experienced assessors frequently jump between sections during the interview, this training mirrors that approach by showing how information discovered early can affect documentation later. \nLearners will also see where cross‑section consistency is critical and how observation, tone, and conversational flow help interviewers gather accurate information without overwhelming the individual.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"og7p3u47uaD9vxgSb","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">This training is designed as a practical interviewing guide, not a simple description of what appears on each page of the A CAT. <break time=\"0.5s\"/>The narration focuses on how to ask the questions, how to interpret responses, and how to handle common challenges—such as conflicting accounts from individuals and caregivers, missing information, or misunderstandings of terminology. <break time=\"0.5s\"/>Because experienced assessors frequently jump between sections during the interview, this training mirrors that approach by showing how information discovered early can affect documentation later. <break time=\"0.5s\"/>Learners will also see where cross‑section consistency is critical and how observation, tone, and con p3","uploadedFileNameExtension":".mp3","duration":40.025},"dates":{"dateCreated":"2026-03-06T21:16:45.152Z","dateModified":"2026-03-06T21:16:47.320Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section A scenarios will appear in the scenario-based learning portion of this training. These scenarios help interviewers learn how to identify communication abilities from natural conversation rather than rigid questioning. \nThey also highlight situations in which the caregiver and the individual provide differing accounts. In those cases, the interviewer must document both perspectives clearly and neutrally while determining what should be coded in the A CAT. \nThese scenarios help reinforce the idea that Section A is not just demographic information—it is the beginning of an interpretive process that shapes how the interviewer approaches the remainder of the assessment.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"wDBQz8xi5Xbbx3icf","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Section A scenarios will appear in the scenario-based learning portion of this training. These scenarios help interviewers learn how to identify communication abilities from natural conversation rather than rigid questioning. <break time=\"0.5s\"/>They also highlight situations in which the caregiver and the individual provide differing accounts. In those cases, the interviewer must document both perspectives clearly and neutrally while determining what should be coded in the A CAT. <break time=\"0.5s\"/>These scenarios help reinforce the idea that Section A is not just demographic information—it is the beginning of an interpretive process that shapes how the interviewer approaches the remainder of the assessment.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Section A scenarios will appear in the","startTime":0.209,"finishTime":2.17},{"text":"scenario-based learning portion of this training.","startTime":2.17,"finishTime":4.8},{"text":"These scenarios help interviewers learn how to identify communication","startTime":5.13,"finishTime":8.81},{"text":"abilities from natural conversation rather than rigid questioning.","startTime":8.81,"finishTime":12.63},{"text":"They also highlight situations in which the","startTime":13.55,"finishTime":15.67},{"text":"caregiver and the individual provide differing accounts.","startTime":15.67,"finishTime":18.729},{"text":"In those cases,","startTime":18.989,"finishTime":20.049},{"text":"the interviewer must document both perspectives clearly and neutrally","startTime":20.27,"finishTime":24.309},{"text":"while determining what should be coded in the ACCAT.","startTime":24.309,"finishTime":26.709},{"text":"These scenarios help reinforce the idea that","startTime":27.69,"finishTime":30.239},{"text":"section A is not just demographic information,","startTime":30.239,"finishTime":33.349},{"text":"it is the beginning of an interpretive process that shapes","startTime":33.61,"finishTime":36.61},{"text":"how the interviewer approaches the remainder of the assessment.","startTime":36.61,"finishTime":39.729}]}},"bSr9hjd73AdxnK4hr":{"_id":"bSr9hjd73AdxnK4hr","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1200960,"uploadedFileName":"Ava-en-SectionD-362026.mp3","uploadedFileNameExtension":".mp3","duration":50},"dates":{"dateCreated":"2026-03-06T22:00:29.676Z","dateModified":"2026-03-06T22:00:31.432Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section D focuses on developmental disability screening, and this portion of the A CAT, requires a careful, measured interviewing approach. \nMany individuals are unfamiliar with clinical terminology, and some may not know whether they have ever received a formal developmental or intellectual disability diagnosis. For this reason, Section D relies heavily on functional history and collateral information. \nThe interviewer should use clear, accessible language and explore whether challenges began in childhood or early adulthood. Information from caregivers, family members, and old records is often necessary. \nBecause developmental disability status can affect service access and eligibility, this section must be completed with precision and respect.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"W7mKcauRt2Q5wFJsL","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Section D focuses on developmental disability screening, and this portion of the A CAT, requires a careful, measured interviewing approach. <break time=\"0.5s\"/>Many individuals are unfamiliar with clinical terminology, and some may not know whether they have ever received a formal developmental or intellectual disability diagnosis. For this reason, Section D relies heavily on functional history and collateral information. <break time=\"0.5s\"/>The interviewer should use clear, accessible language and explore whether challenges began in childhood or early adulthood. Information from caregivers, family members, and old records is often necessary. <break time=\"0.5s\"/>Because developmental disability status can affect service access and eligibility, this section must be completed with precision and respect.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Section D focuses on developmental disability screening,","startTime":0.209,"finishTime":3.49},{"text":"and this portion of the ACAT","startTime":3.7199999999999998,"finishTime":5.36},{"text":"requires a careful,","startTime":5.849,"finishTime":6.829},{"text":"measured interviewing approach.","startTime":7.21,"finishTime":8.67},{"text":"Many individuals are unfamiliar with clinical terminology,","startTime":9.739,"finishTime":13.159},{"text":"and some may not know whether they have ever","startTime":13.46,"finishTime":15.38},{"text":"received a formal developmental or intellectual disability diagnosis.","startTime":15.38,"finishTime":19.68},{"text":"For this reason,","startTime":19.979,"finishTime":20.889},{"text":"section D relies heavily on functional history and collateral information.","startTime":21.18,"finishTime":25.94},{"text":"The interviewer should use clear,","startTime":26.829,"finishTime":28.54},{"text":"accessible language and explore whether challenges","startTime":28.92,"finishTime":31.639},{"text":"began in childhood or early adulthood.","startTime":31.639,"finishTime":34.119},{"text":"Information from caregivers,","startTime":34.439,"finishTime":36.029},{"text":"family members,","startTime":36.34,"finishTime":37.24},{"text":"and old records is often necessary.","startTime":37.29,"finishTime":39.779},{"text":"Because developmental disability status can","startTime":40.709,"finishTime":43.409},{"text":"affect service access and eligibility,","startTime":43.409,"finishTime":45.759},{"text":"this section must be completed with precision and respect.","startTime":46.159,"finishTime":49.54}]}},"bc28dePHneEK34EZn":{"_id":"bc28dePHneEK34EZn","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":168690,"uploadedFileName":"How-to-Approach-Section-A-During-the-Interview.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T17:01:37.303Z","dateModified":"2026-03-03T17:01:37.303Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"Lx8txJRJQqEbhGTpD","thumbnail":"5z22qQdqzf95gu5qF"},"dwGARP34XvwJ4NXyv":{"_id":"dwGARP34XvwJ4NXyv","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":202610,"uploadedFileName":"Key-Interview-Themes-for-Section-B-and-What-Comes-Next.png","height":972,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T22:56:55.597Z","dateModified":"2026-03-03T22:56:55.597Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"sFFw2emei6zhxBNwy","thumbnail":"ayToxSmS5B7Wbv4TQ"},"eJKLTFB6wJoy7unyS":{"_id":"eJKLTFB6wJoy7unyS","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":466164,"uploadedFileName":"Accurately-Completing-Medication-Lists-During-the-Interview (1).png","height":960,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-13T19:22:24.091Z","dateModified":"2026-03-13T19:22:24.091Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"qHcbkFoWjupMnB9e4","thumbnail":"3CCGQXMDXssmLXnPR"},"fEqNSxkshnoHLg2EF":{"_id":"fEqNSxkshnoHLg2EF","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":181581,"uploadedFileName":"How-to-Use-This-Guide.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T16:56:36.512Z","dateModified":"2026-03-03T16:56:36.512Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"EjDnHtm5vx6S8vLNB","thumbnail":"oMLMgJGgR9z22i84m"},"fa54o7Cj33sFdEmhk":{"_id":"fa54o7Cj33sFdEmhk","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1490688,"uploadedFileName":"Ava-en-AssessMobilityandTransfers-362026.mp3","uploadedFileNameExtension":".mp3","duration":62.0875},"dates":{"dateCreated":"2026-03-06T21:58:52.871Z","dateModified":"2026-03-06T21:58:54.800Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Mobility assessment begins the moment the interviewer arrives, long before the formal A D L questions are asked. How the individual stands, walks, turns, and transitions between positions provides meaningful insight into daily functioning. \nDuring the interview, the individual may state that walking is ‘fine,’ yet struggle with balance when moving from one chair to another. These observed moments often reveal more than direct questioning. \nAsking practical, situation‑based questions helps uncover the level of assistance actually required. Examples include asking how the individual moves from their bedroom to the bathroom at night or whether they rely on furniture or walls for support. \nAny use of mobility devices—whether walkers, canes, wheelchairs, or transport chairs—must also be documented consistently across the A CAT. Even devices used only on ‘bad days’ indicate functional limitations that affect safety and Level of Care considerations.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"WrLAmrqJnwS8SWFQF","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Mobility assessment begins the moment the interviewer arrives, long before the formal A D L questions are asked. How the individual stands, walks, turns, and transitions between positions provides meaningful insight into daily functioning. <break time=\"0.5s\"/>During the interview, the individual may state that walking is ‘fine,’ yet struggle with balance when moving from one chair to another. These observed moments often reveal more than direct questioning. <break time=\"0.5s\"/>Asking practical, situation‑based questions helps uncover the level of assistance actually required. Examples include asking how the individual moves from their bedroom to the bathroom at night or whether they rely on furniture or walls for support. <break time=\"0.5s\"/>Any use of mobility devices—whether walkers, canes, wheelchairs, or transport chairs—must also be documented consistently across the A CAT. Even devices used only on ‘bad days’ indicate functional limitations that affect safety and Level of Care considerations.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Mobility assessment begins the moment the interviewer arrives,","startTime":0.17,"finishTime":3.64},{"text":"long before the formal ADL questions are asked.","startTime":3.93,"finishTime":7.309},{"text":"How the individual stands,","startTime":7.73,"finishTime":9.189},{"text":"walks,","startTime":9.369,"finishTime":9.84},{"text":"turns,","startTime":10.079,"finishTime":10.479},{"text":"and transitions between positions provides","startTime":10.568999999999999,"finishTime":13.21},{"text":"meaningful insight into daily functioning.","startTime":13.21,"finishTime":15.529},{"text":"During the interview,","startTime":16.419,"finishTime":17.499},{"text":"the individual may state that walking is fine,","startTime":17.698,"finishTime":20.518},{"text":"yet struggle with balance when moving from one chair to another.","startTime":20.778,"finishTime":24.589},{"text":"These observed moments often reveal more than direct questioning.","startTime":24.899,"finishTime":28.458},{"text":"Asking practical,","startTime":29.319,"finishTime":30.43},{"text":"situation-based questions helps uncover the","startTime":31.11,"finishTime":33.08},{"text":"level of assistance actually required.","startTime":33.08,"finishTime":35.419},{"text":"Examples include asking how the individual","startTime":35.72,"finishTime":38.08},{"text":"moves from their bedroom to the bathroom","startTime":38.08,"finishTime":39.759},{"text":"at night or whether they rely on furniture or walls for support.","startTime":39.759,"finishTime":43.5},{"text":"Any use of mobility devices,","startTime":44.509,"finishTime":46.34},{"text":"weather walkers,","startTime":46.509,"finishTime":47.38},{"text":"canes,","startTime":47.709,"finishTime":48.189},{"text":"wheelchairs,","startTime":48.409,"finishTime":49.18},{"text":"or transport chairs","startTime":49.27,"finishTime":50.83},{"text":"must also be documented consistently across the ACAT.","startTime":51.11,"finishTime":53.979},{"text":"Even devices used only on bad","startTime":54.54,"finishTime":56.549},{"text":"days indicate functional limitations that affect safety","startTime":56.549,"finishTime":59.77},{"text":"and level of care considerations.","startTime":59.9,"finishTime":61.79}]}},"gc4XTKgSkbjDzupop":{"_id":"gc4XTKgSkbjDzupop","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":198585,"uploadedFileName":"Translating-Technical-Questions-Into-Accessible-Language.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T23:04:39.449Z","dateModified":"2026-03-03T23:04:39.449Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"6BkwQXLXbtHZk8Avb","thumbnail":"FbmX8Rc5EtMaPxqcD"},"guZ62owPXgirNTXxG":{"_id":"guZ62owPXgirNTXxG","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1296576,"uploadedFileName":"Ava-en-BathingAssistanceNeeds-362026.mp3","uploadedFileNameExtension":".mp3","duration":54},"dates":{"dateCreated":"2026-03-06T17:48:08.975Z","dateModified":"2026-03-06T17:48:10.939Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Bathing is another area where individuals frequently overstate independence. Many individuals can perform pieces of the task but require support for safety, balance, or physical assistance. \nTo gather accurate information, interviewers should ask when the last bath or shower occurred and whether anyone was present. Additional prompts such as ‘Who helped with washing or drying?’ or ‘Do you use the shower chair every time?’ help clarify the level of assistance required. \nEnvironmental indicators—grab bars, non‑slip mats, handheld showerheads—also provide clues about the individual’s real bathing routine. \nInterviewers should quietly observe overall grooming, hair condition, and hygiene. If these observations contradict self‑report, both must be documented neutrally, and professional judgment must guide the coded response.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"o5eaYCoPK262qaew9","ssml":"<speak \n            xmlns=\"ht o helped with washing or drying,","startTime":21.03,"finishTime":24.219},{"text":"or do you use the shower chair every time,","startTime":24.399,"finishTime":26.7},{"text":"help clarify the level of assistance required.","startTime":26.92,"finishTime":29.319},{"text":"Environmental indicators,","startTime":30.149,"finishTime":31.889},{"text":"grab bars,","startTime":31.94,"finishTime":32.75},{"text":"non-slip mats,","startTime":32.95,"finishTime":33.909},{"text":"handheld showerheads also provide clues about","startTime":34.029,"finishTime":36.909},{"text":"the individual's real bathing routine.","startTime":36.909,"finishTime":38.889},{"text":"Interviewers should quietly observe overall grooming,","startTime":39.81,"finishTime":42.799},{"text":"hair condition,","startTime":43.09,"finishTime":43.86},{"text":"and hygiene.","startTime":44.009,"finishTime":45.009},{"text":"If these observations contradict self-report,","startTime":45.29,"finishTime":47.93},{"text":"both must be documented neutrally and professional","startTime":48.33,"finishTime":51.29},{"text":"judgment must guide the coded response.","startTime":51.29,"finishTime":53.849}]}},"h5WRiGQAPZqcfhThy":{"_id":"h5WRiGQAPZqcfhThy","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1291968,"uploadedFileName":"Ava-en-ADLDocumentation-362026.mp3","uploadedFileNameExtension":".mp3","duration":53.8},"dates":{"dateCreated":"2026-03-06T21:52:56.381Z","dateModified":"2026-03-06T21:52:58.786Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Observation is a core component of accurate A D L and I A D L documentation. Many functional limitations appear naturally during conversation, without the individual realizing they are demonstrating them. \nFor example, difficulty standing, shifting position, or following a sequence of questions may indicate mobility or cognitive barriers. An unsteady gait, tremors, poor hygiene, or a hesitant response to routine tasks can all provide valuable clues. \nInterviewers should also pay attention to environmental indicators—mobility devices situated near frequently used furniture, grab bars installed in the bathroom, or cluttered areas that restrict movement. \nThese observations must be recorded alongside verbal responses and help ensure Section C aligns with the medical information documented earlier in Section B.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"38eehRmjmieBRyjqL","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Observation is a core component of accurate A D L and I A D L documentation. Many functional limitations appear naturally during conversation, without the individual realizing they are demonstrating them. <break time=\"0.5s\"/>For example, difficulty standing, shifting position, or following a sequence of questions may indicate mobility or cognitive barriers. An unsteady gait, tremors, poor hygiene, or a hesitant response to routine tasks can all provide valuable clues. <break time=\"0.5s\"/>Interviewers should also pay attention to environmental indicators—mobility devices situated near frequently used furniture, grab bars installed in the bathroom, or cluttered areas that restrict movement. <break time=\"0.5s\"/>These observations must be recorded alongside verbal responses and help ensure Section C aligns with the medical information documented earlier in Section B.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Observation is a core component of accurate ADL","startTime":0.129,"finishTime":3.609},{"text":"and IADL documentation.","startTime":3.73,"finishTime":6.119},{"text":"Many functional limitations appear naturally during conversation","startTime":6.449,"finishTime":10.119},{"text":"without the individual realizing they are demonstrating them.","startTime":10.529,"finishTime":13.25},{"text":"For example,","startTime":14.149,"finishTime":14.979},{"text":"difficulty standing,","startTime":15.189,"finishTime":16.469},{"text":"shifting position,","startTime":16.629,"finishTime":17.7},{"text":"or following a sequence of questions may indicate mobility or cognitive barriers.","startTime":17.829,"finishTime":22.809},{"text":"An unsteady gait,","startTime":23.069,"finishTime":24.069},{"text":"tremors,","startTime":24.19,"finishTime":24.75},{"text":"poor hygiene,","startTime":24.92,"finishTime":25.729},{"text":"or a hesitant response to routine tasks can all provide valuable clues.","startTime":25.829,"finishTime":30.35},{"text":"Interviewers should also pay attention to environmental indicators,","startTime":31.149,"finishTime":34.93},{"text":"mobility devices situated near frequently used furniture,","startTime":35.009,"finishTime":38.369},{"text":"grab bars installed in the bathroom,","startTime":38.79,"finishTime":40.97},{"text":"or cluttered areas that restrict movement.","startTime":41.15,"finishTime":43.509},{"text":"These observations must be recorded alongside verbal responses","startTime":44.419,"finishTime":48.11},{"text":"and help ensure Section C aligns with the","startTime":48.31,"finishTime":50.43},{"text":"medical information documented earlier in Section B.","startTime":50.43,"finishTime":53.549}]}},"hXcZqrEGoXdWCEyqu":{"_id":"hXcZqrEGoXdWCEyqu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":255711,"uploadedFileName":"Strategies-for-Assessing-IADLs-Accurately.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T22:59:25.219Z","dateModified":"2026-03-03T22:59:25.219Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"DYx3yFgcANLhT6p6A","thumbnail":"3y4yvNGRy6imhojJa"},"i866XrDtQhywwyBgu":{"_id":"i866XrDtQhywwyBgu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1395648,"uploadedFileName":"Ava-en-DocumentingHealthPatterns-362026.mp3","uploadedFileNameExtension":".mp3","duration":58.125},"dates":{"dateCreated":"2026-03-06T21:51:21.804Z","dateModified":"2026-03-06T21:51:23.871Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Questions related to continence and toileting can be sensitive, so interviewers should approach them with neutrality and functional language. Individuals often downplay incontinence due to embarrassment, but caregiver input typically offers a clearer picture of how frequently assistance is needed. \nInterviewers should focus on what typically occurs each day—whether the individual makes it to the toilet on time, whether supplies are needed, and whether assistance is required for cleanup, hygiene, or equipment management. \nIf the individual uses a catheter or an ostomy system, it is essential to determine who performs maintenance and whether that task requires skilled support. \nInformation gathered here must be consistent with A D L scores documented later in Section C. Discrepancies between stated toileting independence and reliance on incontinence supplies or caregiver help should be addressed directly and documented factually.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"MbnrczZBgvZYMvRvW","ssml": artTime":17.989,"finishTime":21.34},{"text":"whether the individual makes it to the toilet on time,","startTime":21.629,"finishTime":24.739},{"text":"whether supplies are needed,","startTime":25.059,"finishTime":26.45},{"text":"and whether assistance is required for cleanup,","startTime":26.549,"finishTime":29.18},{"text":"hygiene,","startTime":29.43,"finishTime":30.059},{"text":"or equipment management.","startTime":30.229,"finishTime":31.629},{"text":"If the individual uses a catheter or an ostomy system,","startTime":32.539,"finishTime":35.828},{"text":"it is essential to determine who performs maintenance","startTime":36.069,"finishTime":38.769},{"text":"and whether that task requires skilled support.","startTime":38.769,"finishTime":41.528},{"text":"Information gathered here must be consistent with","startTime":42.29,"finishTime":45.09},{"text":"ADL scores documented later in Section C.","startTime":45.09,"finishTime":48.069},{"text":"Discrepancies between stated toileting independence","startTime":48.49,"finishTime":51.47},{"text":"and reliance on incontinence supplies","startTime":51.47,"finishTime":53.81},{"text":"or caregiver help should be addressed directly and documented factually.","startTime":53.81,"finishTime":57.869}]}},"iDMBxdB3qiQBr3EFB":{"_id":"iDMBxdB3qiQBr3EFB","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1207872,"uploadedFileName":"Ava-en-LanguageandInterpreterNeeds-362026.mp3","uploadedFileNameExtension":".mp3","duration":50.3},"dates":{"dateCreated":"2026-03-06T21:07:44.910Z","dateModified":"2026-03-06T21:07:46.731Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Interpreter needs and cultural preferences must be identified early to ensure the rest of the interview is accessible and respectful. Individuals may speak conversational English yet still prefer another language for complex or sensitive topics. The interviewer should never make assumptions based on surface‑level fluency. \nIf an individual indicates that an interpreter ‘might help,’ the safest approach is to mark that an interpreter is needed. This protects both the individual and the assessor from miscommunication later in the process. \nCultural preferences should also be gathered using an open‑ended, respectful approach. These responses may influence communication styles, caregiving expectations, or service preferences later in the A CAT, so capturing them accurately at the start is important.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"mhuT8RB6iB5sWmyze","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Interpreter needs and cultural preferences must be identified early to ensure the rest of the interview is accessible and respectful. Individuals may speak conversational English yet still prefer another language for complex or sensitive topics. The interviewer should never make assumptions based on surface‑level fluency. <break time=\"0.5s\"/>If an individual indicates that an interpreter ‘might help,’ the safest approach is to mark that an interpreter is needed. This protects both the individual and the assessor from miscommunication later in the process. <break time=\"0.5s\"/>Cultural preferences should also be gathered using an open‑ended, respectful approach. These responses may influence communication styles, caregiving expectations, or service preferences later in the A CAT, so capturing them accurately at the start is important.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Interpreter needs and cultural preferences must be identified early to","startTime":0.009,"finishTime":4.61},{"text":"ensure the rest of the interview is accessible and respectful.","startTime":4.61,"finishTime":8.069},{"text":"Individuals may speak conversational English,","startTime":8.329,"finishTime":10.869},{"text":"yet still prefer another language for complex or sensitive topics.","startTime":11.01,"finishTime":15.21},{"text":"The interviewer should never make assumptions based on surface level fluency.","startTime":15.568999999999999,"finishTime":19.45},{"text":"If an individual indicates that an interpreter might help,","startTime":20.219,"finishTime":23.569},{"text":"the safest approach is to mark that an interpreter is needed.","startTime":23.86,"finishTime":27.29},{"text":"This protects both the individual and the","startTime":27.579,"finishTime":29.7},{"text":"assessor from miscommunication later in the process.","startTime":29.7,"finishTime":32.88},{"text":"Cultural preferences should also be gathered using an open-ended,","startTime":33.72,"finishTime":37.33},{"text":"respectful approach.","startTime":37.81,"finishTime":38.909},{"text":"These responses may influence communication styles,","startTime":39.25,"finishTime":42.43},{"text":"caregiving expectations,","startTime":42.65,"finishTime":44.15},{"text":"or service preferences later in the ACAT,","startTime":44.349,"finishTime":46.54},{"text":"so capturing them accurately at the start is important.","startTime":47.009,"finishTime":50.009}]}},"ibbBzhYYX46Wt5Hqb":{"_id":"ibbBzhYYX46Wt5Hqb","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1421568,"uploadedFileName":"Ava-en-ToiletingNeeds-362026.mp3","uploadedFileNameExtension":".mp3","duration":59.1875},"dates":{"dateCreated":"2026-03-06T17:41:20.104Z","dateModified":"2026-03-06T17:41:22.052Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Toileting questions are often sensitive, and individuals may feel embarrassed discussing them. Because of this, interviewers should rely on calm, neutral language that focuses on daily routines rather than personal dignity. \nAsking questions in functional terms—such as whether the individual reaches the toilet on time, whether they need help cleaning up, or whether supplies are needed—produces more accurate information than asking bluntly about incontinence. \nCaregivers frequently provide clearer details about frequency, assistance, or equipment needs, especially when the individual minimizes challenges. \nWhen catheters, ostomy equipment, or incontinence supplies are present, the interviewer must determine who manages the equipment and whether any part of the process requires skilled care. \nWhatever is documented here must align with findings in earlier health sections and with the ADL scoring coded later.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"bkgRNj2gsMzF3kJmB","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Toileting questions are often sensitive, and individuals may feel embarrassed discussing them. Because of this, interviewers should rely on calm, neutral language that focuses on daily routines rather than personal dignity. <break time=\"0.5s\"/>Asking questions in functional terms—such as whether the individual reaches the toilet on time, whether they need help cleaning up, or whether supplies are needed—produces more accurate information than asking bluntly about incontinence. <break time=\"0.5s\"/>Caregivers frequently provide clearer details about frequency, assistance, or equipment needs, especially when the individual minimizes challenges. <break time=\"0.5s\"/>When catheters, ostomy equipment, or incontinence supplies are present, the interviewer must determine who manages the equipment and whether any part of the process requires skilled care. <break time=\"0.5s\"/>Whatever is documented here must align with findings in earlier health sections and with the ADL scoring coded later.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Toileting questions are often sensitive,","startTime":0.119,"finishTime":2.39},{"text":"and individuals may feel embarrassed discussing them.","startTime":2.569,"finishTime":5.829},{"text":"Because of this,","startTime":6.25,"finishTime":6.989},{"text":"interviewers should rely on calm,","startTime":7.449,"finishTime":9.25},{"text":"neutral language that focuses on daily routines rather than personal dignity.","startTime":9.439,"finishTime":13.89},{"text":"Asking questions in functional terms,","startTime":14.779,"finishTime":16.979},{"text":"such as whether the individual reaches the toilet on time,","startTime":17.18,"finishTime":20.37},{"text":"whether they need help cleaning up,","startTime":20.659,"finishTime":22.319},{"text":"or whether supplies are needed,","startTime":22.579,"finishTime":24.28},{"text":"produces more accurate information than asking bluntly about incontinence.","startTime":24.579,"finishTime":28.5},{"text":"Caregivers frequently provide clearer details about frequency,","startTime":29.459,"finishTime":33.2},{"text":"assistance,","startTime":33.58,"finishTime":34.159},{"text":"or equipment needs,","startTime":34.22,"finishTime":35.439},{"text":"especially when the individual minimizes challenges.","startTime":35.849,"finishTime":38.659},{"text":"When catheters,","startTime":39.549,"finishTime":40.47},{"text":"ostomy equipment,","startTime":40.669,"finishTime":41.79},{"text":"or incontinence supplies are present,","startTime":41.869,"finishTime":43.97},{"text":"the interviewer must determine who manages the equipment","startTime":44.229,"finishTime":47.36},{"text":"and whether any part of the process requires skilled care.","startTime":47.509,"finishTime":50.81},{"text":"Whatever is documented here must align with findings in earlier health sections","startTime":51.84,"finishTime":56.279},{"text":"and with the ADL scoring coded later.","startTime":56.479,"finishTime":58.779}]}},"j6o7aobv2jso8Sr73":{"_id":"j6o7aobv2jso8Sr73","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1118592,"uploadedFileName":"Ava-en-Cross-ReferencingInformation-362026.mp3","uploadedFileNameExtension":".mp3","duration":46.5625},"dates":{"dateCreated":"2026-03-06T21:12:35.809Z","dateModified":"2026-03-06T21:12:37.696Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"As Section A concludes, the interviewer should already be identifying information that will reappear in multiple future sections of the A CAT. \nFor example, if the individual uses a communication device or mentions a family member who assists regularly, these details will need to be recorded again in later sections. Experienced assessors emphasize that cross‑referencing is one of the most important skills in completing an accurate A CAT, because so many entries flow across multiple domains. \nBy noticing these connections early, the interviewer reduces the risk of missing important details later in the assessment. This early awareness helps ensure that all sections align logically and support a complete understanding of the individual’s needs.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"XpX2gfeouiRu6Cvbw","ssml": ported by examples, observations, and caregiver accounts. \nThe A D L and I A D L findings must align with information collected in the medical, caregiver, and environmental sections. Any inconsistencies should either be resolved through follow‑up questions or clearly documented as differing perspectives. \nSection C serves as a cornerstone for Level of Care determination by describing how the individual manages daily life in real terms. \nWith functional assessment complete, the training will now transition into Section D, which examines whether the individual meets the criteria for a developmental disability and how long‑standing functional limitations may have originated.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"4rJAaR7AomwtkNnqW","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">At the conclusion of Section C, the interviewer should have a detailed understanding of the individual’s daily functioning—supported by examples, observations, and caregiver accounts. <break time=\"0.5s\"/>The A D L and I A D L findings must align with information collected in the medical, caregiver, and environmental sections. Any inconsistencies should either be resolved through follow‑up questions or clearly documented as differing perspectives. <break time=\"0.5s\"/>Section C serves as a cornerstone for Level of Care determination by describing how the individual manages daily life in real terms. <break time=\"0.5s\"/>With functional assessment complete, the training will now transition into Section D, which examines whether the individual meets the criteria for a developmental disability and how long‑standing functional limitations may have originated.</voice>\n          </speak>"},"captionData": ing childhood or adolescence and confirm whether a doctor or school professional ever described them as long‑term conditions. <break time=\"0.5s\"/>Accurately distinguishing early‑onset challenges from later‑life conditions ensures the assessment remains clinically sound and supports appropriate service pathways.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"One of the most important responsibilities","startTime":0.129,"finishTime":2.25},{"text":"in Section D is ensuring that functional","startTime":2.25,"finishTime":4.53},{"text":"limitations acquired later in life are","startTime":4.53,"finishTime":7.09},{"text":"not mistakenly labeled as developmental disabilities.","startTime":7.09,"finishTime":10.229},{"text":"Conditions such as stroke,","startTime":11.119,"finishTime":12.52},{"text":"dementia,","startTime":12.729,"finishTime":13.289},{"text":"or traumatic brain injury may produce lifelong support needs,","startTime":13.439,"finishTime":17.09},{"text":"but they do not qualify under developmental disability","startTime":17.329,"finishTime":20.129},{"text":"criteria if they occurred after age 22.","startTime":20.129,"finishTime":22.989},{"text":"To avoid misclassification,","startTime":23.84,"finishTime":25.7},{"text":"the interviewer should ask whether challenges","startTime":25.959,"finishTime":28.239},{"text":"were present during childhood or adolescence","startTime":28.239,"finishTime":30.799},{"text":"and confirm whether a doctor or school","startTime":30.959,"finishTime":33.479},{"text":"professional ever described them as long-term conditions.","startTime":33.479,"finishTime":36.56},{"text":"Accurately distinguishing early onset challenges","startTime":37.49,"finishTime":40.099},{"text":"from later life conditions ensures","startTime":40.099,"finishTime":42.06},{"text":"the assessment remains clinically sound","startTime":42.06,"finishTime":44.119},{"text":"and supports appropriate service pathways.","startTime":44.119,"finishTime":46.959}]}},"mRSmCMp7Y6PEkidCk":{"_id":"mRSmCMp7Y6PEkidCk","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2473344,"uploadedFileName":"Ava-en-CollectingUtilizationHistory-362026.mp3","uploadedFileNameExtension":".mp3","duration":103.025},"dates":{"dateCreated":"2026-03-06T21:50:52.988Z","dateModified":"2026-03-06T21:50:56.498Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Many portions of Section B provide early clues about how well the individual completes tasks documented later in the A CAT. For example, difficulties with medication management may signal a need for assistance with complex tasks in the I A D L section. \nTo gather accurate information, interviewers should listen for functional indicators embedded in the individual’s description of their health. Confusion about medications, difficulty attending appointments, or trouble managing treatments often reveals underlying cognitive, mobility, or organizational challenges. \nIf there are discrepancies between what the individual reports and what caregivers describe, both must be documented neutrally. These differences are important because they may indicate emerging medical instability or functional decline.\nAnother important part of Section B involves collecting information about recent emergency room visits, hospital admissions, and skilled‑facility stays. These events are often difficult for individuals to recall in detail, so the interviewer should expect approximate dates and, when necessary, document estimated entries, noting clearly that the information is approximate. \nIt is common for individuals to confuse urgent care visits with emergency department visits, or to misinterpret overnight observation as a full admission. Clarifying questions such as ‘Did you stay overnight?’ and ‘Where did you go for that visit?’ can help differentiate these settings. \nCaregivers frequently provide more accurate timelines, and their input should be recorded when available. These utilization patterns help identify trends in medical instability and guide follow‑up in later sections.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"m3z9QHRMS4LpMPMxu","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Many portions of Section B provide early clues about how well the individual completes tasks documented later in the A CAT. For example, difficulties with medication management may signal a need for assistance with complex tasks in the I A D L section. <break time=\"0.5s\"/>To gather accurate information, interviewers should listen for functional indicators embedded in the individual’s description of their health. Confusion about medications, difficulty attending appointments, or trouble managing treatments often reveals underlying cognitive, mobility, or organizational challenges. <break time=\"0.5s\"/>If there are discrepancies between what the individual reports and what caregivers describe, both must be documented neutrally. These differences are important because they may indicate emerging medical instability or functional decline.<break time=\"0.5s\"/>Another important part of Section B involves collecting information about recent emergency room visits, hospital admissions, and skilled‑facility stays. These events are often difficult for individuals to recall in detail, so the interviewer should expect approximate dates and, when necessary, document estimated entries, noting clearly that the information is approximate. <break time=\"0.5s\"/>It is common for individuals to confuse urgent care visits with emergency department visits, or to misinterpret overnight observation as a full admission. Clarifying questions such as ‘Did you stay overnight?’ and ‘Where did you go for that visit?’ can help differentiate these settings. <break time=\"0.5s\"/>Caregivers frequently provide more accurate timelines, and their input should be recorded when available. These utilization patterns help identify trends in medical instability and guide follow‑up in later sections.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Many portions of section provide early clues about how well","startTime":0.14,"finishTime":3.41},{"text":"the individual completes tasks documented later in the ACCAT.","startTime":3.41,"finishTime":6.76},{"text":"For example,","startTime":7.36,"finishTime":8.119},{"text":"difficulties with medication management may signal a need for","startTime":8.42,"finishTime":11.93},{"text":"assistance with complex tasks in the IADL section.","startTime":11.93,"finishTime":15.93},{"text":"To gather accurate information,","startTime":16.809,"finishTime":18.659},{"text":"interviewers should listen for functional indicators embedded","startTime":19.18,"finishTime":22.139},{"text":"in the individual's description of their health.","startTime":22.139,"finishTime":24.53},{"text":"Confusion about medications,","startTime":24.86,"finishTime":26.45},{"text":"difficulty attending appointments,","startTime":26.659,"finishTime":28.399},{"text":"or trouble managing treatments often reveals underlying cognitive,","startTime":28.42,"finishTime":32.279},{"text":"mobility or organizational challenges.","startTime":32.38,"finishTime":35.06},{"text":"If there are discrepancies between what the","startTime":35.889,"finishTime":38.13},{"text":"individual reports and what caregivers describe,","startTime":38.13,"finishTime":40.709},{"text":"both must be documented neutrally.","startTi  tremors, slow utensil handling, or reliance on caregiver prompts should be noted. These observations support an accurate understanding of both eating ability and underlying medical or cognitive factors.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"iFMBCe3kixpKpji5Z","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">When assessing eating, it is important to distinguish between the ability to move food from plate to mouth and the broader process of preparing, managing, and safely consuming a meal. <break time=\"0.5s\"/>Many individuals state they ‘eat on their own,’ even when they rely on others to cook, cut food, or remind them to eat. Interviewers should therefore ask who prepares meals and whether the individual needs help with cutting, pouring, or maintaining a safe eating pace. <break time=\"0.5s\"/>If the individual mentions choking episodes, coughing during meals, or the use of thickeners, the interviewer must document these carefully and connect them to findings in the nutrition and dental screening sections. <break time=\"0.5s\"/>Physical signs such as tremors, slow utensil handling, or reliance on caregiver prompts should be noted. These observations support an accurate understanding of both eating ability and underlying medical or cognitive factors.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"When assessing eating,","startTime":0.119,"finishTime":1.2690000000000001},{"text":"it is important to distinguish between the ability to move food","startTime":1.429,"finishTime":4.53},{"text":"from plate to mouth and the broader process of preparing,","startTime":4.53,"finishTime":7.389},{"text":"managing,","startTime":7.63,"finishTime":8.27}, lized treatment, they do not qualify as skilled needs. \nOn the other hand, individuals may understate symptoms that do require skilled support, such as recurrent seizures or respiratory conditions that involve suctioning or oxygen titration. \nTo complete this section accurately, the interviewer must evaluate not just the diagnosis itself, but the frequency, urgency, and type of intervention the condition requires. Whenever uncertainty arises, caregiver input, medical records, and observation all help determine the correct classification.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"nWevMagNdzMtrrctn","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Section B includes several items related to skilled nursing needs, and these questions often require the interviewer to apply judgement rather than rely on clinical terminology. Many individuals describe conditions that sound serious but do not actually require skilled intervention. For example, fluctuating blood pressure or unstable diabetes may be clinically significant, but unless they require immediate or specialized treatment, they do not qualify as skilled needs. <break time=\"0.5s\"/>On the other hand, individuals may understate symptoms that do require skilled support, such as recurrent seizures or respiratory conditions that involve suctioning or oxygen titration. <break time=\"0.5s\"/>To complete this section accurately, the interviewer must evaluate not just the diagnosis itself, but the frequency, urgency, and type of intervention the condition requires. Whenever uncertainty arises, caregiver input, medical records, and observation all help determine the correct classification.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Section B includes several items related to skilled nursing needs,","startTime":0.209,"finishTime":3.769},{"text":"and these questions often require the interviewer to","startTime":3.9699999999999998,"finishTime":6.559},{"text":"apply judgment rather than rely on clinical terminology.","startTime":6.559,"finishTime":10.189},{"text":"Many individuals describe conditions that sound serious,","startTime":10.568999999999999,"finishTime":13.59},{"text":"but do not actually require skilled intervention.","startTime":13.729,"finishTime":16.549},{"text":"For example,","startTime":16.809,"finishTime":17.639},{"text":"fluctuating blood pressure or unstable diabetes may be clinically significant,","startTime":17.889,"finishTime":22.889},{"text":"but unless they require immediate or specialized treatment,","startTime":23.129,"finishTime":26.68},{"text":"they do not qualify as skilled needs.","startTime":27.01,"finishTime":29.17},{"text":"On the other hand,","startTime":30.069,"finishTime":30.85},{"text":"individuals may understate symptoms that do require skilled support,","startTime":31.51,"finishTime":34.889},{"text":"such as recurrent seizures or respiratory conditions","startTime":35.27,"finishTime":38.069},{"text":"that involve suctioning or oxygen titration.","startTime":38.069,"finishTime":40.75},{"text":"To complete this section accurately,","startTime":41.619,"finishTime":43.43},{"text":"the interviewer must evaluate not just the diagnosis itself,","startTime":43.75,"finishTime":47.169},{"text":"but the frequency,","startTime":47.669,"finishTime":48.77},{"text":"urgency,","startTime":48.95,"finishTime":49.709},{"text":"and type of intervention the condition requires.","startTime":49.72,"finishTime":52.61},{"text":"Whenever uncertainty arises,","startTime":52.909,"finishTime":54.659},{"text":"caregiver input,","startTime":54.95,"finishTime":56.009},{"text":"medical records,","startTime":56.349,"finishTime":57.259},{"text":"and observation all help determine the correct classification.","startTime":57.31,"finishTime":61.189}]}},"qceDYB58xLNuaZWzB":{"_id":"qceDYB58xLNuaZWzB","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1269504,"uploadedFileName":"Ava-en-FrequentPitfalls-362026.mp3","uploadedFileNameExtension":".mp3","duration":52.85},"dates":{"dateCreated":"2026-03-06T21:16:20.512Z","dateModified":"2026-03-06T21:16:22.391Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section A contains several pitfalls that interviewers encounter frequently. Many of these errors come from moving too quickly through the section or assuming that certain items are optional. \nHidden checkboxes and small embedded fields are the most commonly missed elements, so a slow and thorough visual scan is essential. \nAnother common mistake occurs when interviewers document referral information for reassessments—even though this field is required only for initial assessments. \nAdditionally, individuals often provide incomplete information about who participated in the interview. Anyone who contributes information, even in a small way, must be documented as a source. \nAttending to these details prevents inconsistencies that can affect later sections and ensures that the A CAT, reflects a complete and accurate assessment.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"HQWXxkT6tHNLsu9gy","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Section A contains several pitfalls that inter "startTime":31.489,"finishTime":34.33},{"text":"who participated in the interview.","startTime":34.33,"finishTime":36.27},{"text":"Anyone who contributes information,","startTime":36.49,"finishTime":38.569},{"text":"even in a small way,","startTime":38.81,"finishTime":40.189},{"text":"must be documented as a source.","startTime":40.409,"finishTime":42.31},{"text":"Attending to these details prevents inconsistencies that can","startTime":43.2,"finishTime":46.529},{"text":"affect later sections and ensures that the ACAT","startTime":46.529,"finishTime":49.409},{"text":"reflects a complete and accurate assessment.","startTime":50.049,"finishTime":52.569}]}},"qy5vy6KZbrZS4Bmhm":{"_id":"qy5vy6KZbrZS4Bmhm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":192935,"uploadedFileName":"Roles-and-Section-Responsibilities.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T16:55:42.522Z","dateModified":"2026-03-03T16:55:42.522Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"9TpKBfy2wKp5ML428","thumbnail":"Y4ay8a9AeuoF8YJqL"},"s25mwhAKurWZ3E7hk":{"_id":"s25mwhAKurWZ3E7hk","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1268928,"uploadedFileName":"Ava-en-IdentifyingAssessmentParticipants-362026.mp3","uploadedFileNameExtension":".mp3","duration":52.825},"dates":{"dateCreated":"2026-03-06T21:08:53.828Z","dateModified":"2026-03-06T21:08:55.598Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section A also requires the interviewer to document who participates in the assessment and who provides information. This list must include everyone who contributes meaningfully—whether they actively answer questions or simply confirm details occasionally during the conversation. \nAccurately identifying these contributors is essential, because many sections of the A CAT, rely on caregiver insight, collateral information, or observations from support persons. \nWhen caregivers and individuals offer conflicting accounts, noting the sources clearly in this section creates transparency and context for later sections such as A D Ls, caregiver assessment, and services. \nFor individuals with cognitive limitations or legal representation, Section A is also the point where the interviewer confirms whether guardianship or other legal authority exists.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"dZeRjJ7koAu2BLzba","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Section A also requires the interviewer to document who participates in the assessment and who provides information. This list must include everyone who contributes meaningfully—whether they actively answer questions or simply confirm details occasionally during the conversation. <break time=\"0.5s\"/>Accurately identifying these contributors is essential, because many sections of the A CAT, rely on caregiver insight, collateral information, or observations from support persons. <break time=\"0.5s\"/>When caregivers and individuals offer conflicting accounts, noting the sources clearly in this section creates transparency and context for later sections such as A D Ls, caregiver assessment, and services. <break time=\"0.5s\"/>For individuals with cognitive limitations or legal representation, Section A is
