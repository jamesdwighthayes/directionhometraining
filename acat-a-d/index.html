ndividual manages daily life in real terms. \nWith functional assessment complete, the training will now transition into Section D, which examines whether the individual meets the criteria for a developmental disability and how long‑standing functional limitations may have originated.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"aPLDczGxLy3yCk5RB"}},"iSCdb37ReE8ZxARgP":{"_id":"iSCdb37ReE8ZxARgP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"YPaoywDTxw8c8jXof"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T14:57:27.194Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Nwcf4xPYeN6HL8iMX","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"eJKLTFB6wJoy7unyS","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0.78125,"width":100,"height":98.4375}}],"duration":68.9625,"captions":[{"text":"One of the most challenging parts of","startTime":0.129,"finishTime":1.7690000000000001},{"text":"section B is documenting medications accurately.","startTime":1.7690000000000001,"finishTime":4.9},{"text":"Many individuals cannot recall medication names,","startTime":5.21,"finishTime":7.88},{"text":"dosages,","startTime":8.13,"finishTime":8.729},{"text":"or schedules,","startTime":8.81,"finishTime":9.71},{"text":"and it is very common for the initial list provided verbally to be incomplete.","startTime":9.92,"finishTime":14.069},{"text":"Interviewers should request medication bottles,","startTime":14.979,"finishTime":17.569},{"text":"pill organizers,","startTime":17.77,"finishTime":18.959},{"text":"or pharmacy printouts whenever available.","startTime":19.139,"finishTime":21.69},{"text":"These provide the most reliable information.","startTime":22.01,"finishTime":24.479},{"text":"If those items are not present,","startTime":24.78,"finishTime":26.42},{"text":"caregivers are often the best secondary source","startTime":26.739,"finishTime":29.36},{"text":"and may give a far more accurate description of what is taken each day.","startTime":29.579,"finishTime":33.34},{"text":"The interviewer should also clarify terms such as dose,","startTime":34.18,"finishTime":37.419},{"text":"frequency,","startTime":37.659,"finishTime":38.319},{"text":"and route,","startTime":38.419,"finishTime":39.139},{"text":"since individuals frequently misunderstand them.","startTime":39.459,"finishTime":42.29},{"text":"PRN","startTime":42.659,"finishTime":43.58},{"text":"medications,","startTime":43.729,"finishTime":43.979},{"text":"inhalers,","startTime":44.06,"finishTime":44.81},{"text":"topicals,","startTime":45.09,"finishTime":45.689},{"text":"and as needed treatments must also be documented even when used infrequently.","startTime":45.779,"finishTime":50.2},{"text":"Additionally,","startTime":50.979,"finishTime":51.77},{"text":"include over the counter medications,","startTime":52.099,"finishTime":53.81},{"text":"vitamins,","startTime":54.02,"finishTime":54.72},{"text":"and supplements as these can sometimes interact with some medications.","startTime":54.729,"finishTime":58.599},{"text":"When the full list cannot be verified during the visit,","startTime":59.47,"finishTime":62.27},{"text":"the interviewer should note that reconciliation is pending","startTime":62.599,"finishTime":65.68},{"text":"and follow up after consulting pharmacy records.","startTime":65.68,"finishTime":68.72}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["YPaoywDTxw8c8jXof","eJKLTFB6wJoy7unyS"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"WHHuWNbytPhziwun9","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"One of the most challenging parts of Section B is documenting medications accurately. Many individuals cannot recall medication names, dosages, or schedules, and it is very common for the initial list provided verbally to be incomplete. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should request medication bottles, pill organizers, or pharmacy printouts whenever available. These provide the most reliable information. If those items are not present, caregivers are often the best secondary source and may give a far more accurate description of what is taken each day. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should also clarify terms such as dose, frequency, and route, since individuals frequently misunderstand them. P R N medications, inhalers, topicals, and as‑needed treatments must also be documented even when used infrequently.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Additionally, include over the counter medications, vitamins and supplements as these can sometimes interact with some medications. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When the full list cannot be verified during the visit, the interviewer should note that reconciliation is pending and follow up after consulting pharmacy records.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"One of the most challenging parts of Section B is documenting medications accurately. Many individuals cannot recall medication names, dosages, or schedules, and it is very common for the initial list provided verbally to be incomplete. \nInterviewers should request medication bottles, pill organizers, or pharmacy printouts whenever available. These provide the most reliable information. If those items are not present, caregivers are often the best secondary source and may give a far more accurate description of what is taken each day. \nThe interviewer should also clarify terms such as dose, frequency, and route, since individuals frequently misunderstand them. P R N medications, inhalers, topicals, and as‑needed treatments must also be documented even when used infrequently.\nAdditionally, include over the counter medications, vitamins and supplements as these can sometimes interact with some medications. \nWhen the full list cannot be verified during the visit, the interviewer should note that reconciliation is pending and follow up after consulting pharmacy records.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"kgE3mKgdyWBTQTEgu":{"_id":"kgE3mKgdyWBTQTEgu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"zLqnuyXgsjTnqaZcq"},"dates":{"dateCreated":"2026-03-20T15:19:39.161Z","dateModified":"2026-03-20T15:20:11.798Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"2hReyWw9a862CFmcn","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"MZJEoHhAk8ZrpfjrS","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":41.7625,"captions":[{"text":"When an individual appears to meet criteria for a developmental disability,","startTime":0.129,"finishTime":4.28},{"text":"Section D requires supporting documents","startTime":4.73,"finishTime":7.11},{"text":"such as psychological evaluations or therapy assessments.","startTime":7.25,"finishTime":10.89},{"text":"The interviewer does not need to collect these materials during the home visit.","startTime":11.76,"finishTime":15.619},{"text":"Instead,","startTime":15.89,"finishTime":16.52},{"text":"they should determine whether such documents exist","startTime":16.719,"finishTime":19.2},{"text":"and where they might be located.","startTime":19.2,"finishTime":20.84},{"text":"If documentation is missing,","startTime":21.729,"finishTime":23.44},{"text":"the interviewer can note that verification is pending","startTime":23.62,"finishTime":26.479},{"text":"and ensure follow-up steps are initiated afterward.","startTime":26.479,"finishTime":29.579},{"text":"Section D ultimately helps clarify","startTime":30.549,"finishTime":32.909},{"text":"when long-standing functional limitations are related","startTime":32.909,"finishTime":35.509},{"text":"to early onset conditions rather than new or acquired disabilities,","startTime":35.509,"finishTime":39.389},{"text":"which makes documentation critical.","startTime":39.59,"finishTime":41.529}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zLqnuyXgsjTnqaZcq","MZJEoHhAk8ZrpfjrS"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When an individual appears to meet criteria for a developmental disability, Section D requires supporting documents such as psychological evaluations or therapy assessments. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer does not need to collect these materials during the home visit. Instead, they should determine whether such documents exist and where they might be located. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If documentation is missing, the interviewer can note that verification is pending and ensure follow‑up steps are initiated afterward. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section D ultimately helps clarify when long‑standing functional limitations are related to early‑onset conditions rather than new or acquired disabilities, which makes documentation critical.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"When an individual appears to meet criteria for a developmental disability, Section D requires supporting documents such as psychological evaluations or therapy assessments. \nThe interviewer does not need to collect these materials during the home visit. Instead, they should determine whether such documents exist and where they might be located. \nIf documentation is missing, the interviewer can note that verification is pending and ensure follow‑up steps are initiated afterward. \nSection D ultimately helps clarify when long‑standing functional limitations are related to early‑onset conditions rather than new or acquired disabilities, which makes documentation critical.","jobId":"9zJzk5co88KD8yXiM"}},"mFoQtFeJ8zChdZrd7":{"_id":"mFoQtFeJ8zChdZrd7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"zfxcLtaXPm96SLB74"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T14:57:27.194Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"7sg4ScFZsPC458aoF","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"YCsxnosGbnJW8ZpwG","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0,"width":100,"height":100}}],"duration":97.2875,"captions":[{"text":"When exploring activities of daily living,","startTime":0.129,"finishTime":2.4},{"text":"the interviewer should avoid asking individuals whether","startTime":2.69,"finishTime":5.61},{"text":"they are independent with a task.","startTime":5.61,"finishTime":7.789},{"text":"Most people will answer yes,","startTime":8.13,"finishTime":9.6},{"text":"even when they rely on prompting,","startTime":9.77,"finishTime":11.52},{"text":"supervision,","startTime":11.689,"finishTime":12.43},{"text":"or partial assistance.","startTime":12.489,"finishTime":13.89},{"text":"Instead,","startTime":14.699,"finishTime":15.46},{"text":"focus on specifics.","startTime":15.779,"finishTime":17.5},{"text":"Ask when the task was last completed and who was present.","startTime":17.739,"finishTime":21.219},{"text":"Questions like what part of the task is difficult","startTime":21.579,"finishTime":24.319},{"text":"or does anyone help with this","startTime":24.54,"finishTime":26.36},{"text":"prompt more accurate descriptions.","startTime":26.54,"finishTime":28.26},{"text":"Caregivers often provide clearer insight into daily functioning,","startTime":29.149,"finishTime":32.77},{"text":"especially when individuals minimize their need for assistance.","startTime":33.169,"finishTime":36.61},{"text":"The interviewer must document both perspectives neutrally,","startTime":36.909,"finishTime":40.09},{"text":"but use professional judgment when selecting the coded response.","startTime":40.31,"finishTime":43.65},{"text":"Medication management deserves special attention during ADL assessment.","startTime":44.759,"finishTime":49.069},{"text":"The highest level of medication assistance is a","startTime":49.4,"finishTime":52},{"text":"key factor in level of care determination,","startTime":52,"finishTime":54.4},{"text":"particularly for individuals who may only require assistance with one other ADL.","startTime":54.819,"finishTime":59.24},{"text":"Individuals often describe themselves as independent with medications","startTime":60.009,"finishTime":64.05},{"text":"because they swallow pills on their own,","startTime":64.05,"finishTime":65.889},{"text":"even when someone else organizes medications,","startTime":66.129,"finishTime":68.79},{"text":"provides reminders,","startTime":69.129,"finishTime":70.16},{"text":"administers injections,","startTime":70.37,"finishTime":71.87},{"text":"or monitors for safety.","startTime":72.089,"finishTime":73.73},{"text":"These supports represent a higher level of","startTime":74.089,"finishTime":76.449},{"text":"assistance and must be coded accurately.","startTime":76.449,"finishTime":78.769},{"text":"When medication assistance is understated or miscoded,","startTime":79.65,"finishTime":83.129},{"text":"the ACCAT","startTime":83.33,"finishTime":84.239},{"text":"may fail to reflect the individual's true level of care needs.","startTime":84.569,"finishTime":88.51},{"text":"The goal is to reflect typical performance,","startTime":88.809,"finishTime":91.23},{"text":"not a best day scenario,","startTime":91.449,"finishTime":93.029},{"text":"and not an idealized description influenced by pride or habit.","startTime":93.169,"finishTime":97.01}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zfxcLtaXPm96SLB74","YCsxnosGbnJW8ZpwG"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"ZMP2HbJun9tAGCn6b","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When exploring Activities of Daily Living, the interviewer should avoid asking individuals whether they are ‘independent’ with a task. Most people will answer yes, even when they rely on prompting, supervision, or partial assistance. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Instead, focus on specifics. Ask when the task was last completed and who was present. Questions like ‘What part of the task is difficult?’ or ‘Does anyone help with this?’ prompt more accurate descriptions. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers often provide clearer insight into daily functioning, especially when individuals minimize their need for assistance. The interviewer must document both perspectives neutrally, but use professional judgment when selecting the coded response. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Medication management deserves special attention during ADL assessment. The highest level of medication assistance is a key factor in Level of Care determination, particularly for individuals who may only require assistance with one other ADL.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals often describe themselves as independent with medications because they swallow pills on their own, even when someone else organizes medications, provides reminders, administers injections, or monitors for safety. These supports represent a higher level of assistance and must be coded accurately.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When medication assistance is understated or miscoded, the A CAT, may fail to reflect the individual’s true Level of Care needs. The goal is to reflect typical performance—not a best‑day scenario, and not an idealized description influenced by pride or habit.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"When exploring Activities of Daily Living, the interviewer should avoid asking individuals whether they are ‘independent’ with a task. Most people will answer yes, even when they rely on prompting, supervision, or partial assistance. \nInstead, focus on specifics. Ask when the task was last completed and who was present. Questions like ‘What part of the task is difficult?’ or ‘Does anyone help with this?’ prompt more accurate descriptions. \nCaregivers often provide clearer insight into daily functioning, especially when individuals minimize their need for assistance. The interviewer must document both perspectives neutrally, but use professional judgment when selecting the coded response. \nMedication management deserves special attention during ADL assessment. The highest level of medication assistance is a key factor in Level of Care determination, particularly for individuals who may only require assistance with one other ADL.\nIndividuals often describe themselves as independent with medications because they swallow pills on their own, even when someone else organizes medications, provides reminders, administers injections, or monitors for safety. These supports represent a higher level of assistance and must be coded accurately.\nWhen medication assistance is understated or miscoded, the A CAT, may fail to reflect the individual’s true Level of Care needs. The goal is to reflect typical performance—not a best‑day scenario, and not an idealized description influenced by pride or habit.\n","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"pGMfzyNThBPKnPSDC":{"_id":"pGMfzyNThBPKnPSDC","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"iDMBxdB3qiQBr3EFB"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"4iv4AynMRiZJ2gRS5","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"vZ5YQMDRynWxX3QMw","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.3,"captions":[{"text":"Interpreter needs and cultural preferences must be identified early to","startTime":0.009,"finishTime":4.61},{"text":"ensure the rest of the interview is accessible and respectful.","startTime":4.61,"finishTime":8.069},{"text":"Individuals may speak conversational English,","startTime":8.329,"finishTime":10.869},{"text":"yet still prefer another language for complex or sensitive topics.","startTime":11.01,"finishTime":15.21},{"text":"The interviewer should never make assumptions based on surface level fluency.","startTime":15.568999999999999,"finishTime":19.45},{"text":"If an individual indicates that an interpreter might help,","startTime":20.219,"finishTime":23.569},{"text":"the safest approach is to mark that an interpreter is needed.","startTime":23.86,"finishTime":27.29},{"text":"This protects both the individual and the","startTime":27.579,"finishTime":29.7},{"text":"assessor from miscommunication later in the process.","startTime":29.7,"finishTime":32.88},{"text":"Cultural preferences should also be gathered using an open-ended,","startTime":33.72,"finishTime":37.33},{"text":"respectful approach.","startTime":37.81,"finishTime":38.909},{"text":"These responses may influence communication styles,","startTime":39.25,"finishTime":42.43},{"text":"caregiving expectations,","startTime":42.65,"finishTime":44.15},{"text":"or service preferences later in the ACAT,","startTime":44.349,"finishTime":46.54},{"text":"so capturing them accurately at the start is important.","startTime":47.009,"finishTime":50.009}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["iDMBxdB3qiQBr3EFB","vZ5YQMDRynWxX3QMw"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interpreter needs and cultural preferences must be identified early to ensure the rest of the interview is accessible and respectful. Individuals may speak conversational English yet still prefer another language for complex or sensitive topics. The interviewer should never make assumptions based on surface‑level fluency. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If an individual indicates that an interpreter ‘might help,’ the safest approach is to mark that an interpreter is needed. This protects both the individual and the assessor from miscommunication later in the process. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Cultural preferences should also be gathered using an open‑ended, respectful approach. These responses may influence communication styles, caregiving expectations, or service preferences later in the A CAT, so capturing them accurately at the start is important.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Interpreter needs and cultural preferences must be identified early to ensure the rest of the interview is accessible and respectful. Individuals may speak conversational English yet still prefer another language for complex or sensitive topics. The interviewer should never make assumptions based on surface‑level fluency. \nIf an individual indicates that an interpreter ‘might help,’ the safest approach is to mark that an interpreter is needed. This protects both the individual and the assessor from miscommunication later in the process. \nCultural preferences should also be gathered using an open‑ended, respectful approach. These responses may influence communication styles, caregiving expectations, or service preferences later in the A CAT, so capturing them accurately at the start is important.","jobId":"4fpaCmBzRm5npbY83"}},"shizhCwyCh6Grh47W":{"_id":"shizhCwyCh6Grh47W","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"YZvjJMmNc4oo5Bw2F"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"qEbpn6r8KPsJjGZuH","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"bc28dePHneEK34EZn","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":43.925,"captions":[{"text":"Section A may appear simple at first glance,","startTime":0.209,"finishTime":2.89},{"text":"but experienced assessors repeatedly highlight that this section contains a","startTime":3.069,"finishTime":7.05},{"text":"surprising number of fields that are easy to overlook.","startTime":7.05,"finishTime":10.039},{"text":"The goal in section A is to gather accurate demographic","startTime":10.369,"finishTime":13.439},{"text":"details while also establishing early insights into communication style,","startTime":13.439,"finishTime":17.719},{"text":"cultural considerations,","startTime":17.92,"finishTime":19.28},{"text":"household dynamics,","startTime":19.53,"finishTime":20.639},{"text":"and potential caregiver roles.","startTime":20.729,"finishTime":22.61},{"text":"Because this section lays the foundation for later interpretation,","startTime":23.45,"finishTime":26.909},{"text":"the interviewer should move slowly and deliberately,","startTime":27.129,"finishTime":30.03},{"text":"visually checking for embedded checkboxes and sub-items.","startTime":30.2,"finishTime":33.47},{"text":"Even minor errors here,","startTime":33.759,"finishTime":35},{"text":"such as skipping a notation about preferred language or","startTime":35.169,"finishTime":38.169},{"text":"missing a required field for an initial assessment,","startTime":38.169,"finishTime":40.729},{"text":"can create inconsistencies later in the ACA.","startTime":40.97,"finishTime":43.49}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["YZvjJMmNc4oo5Bw2F","bc28dePHneEK34EZn"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section A may appear simple at first glance, but experienced assessors repeatedly highlight that this section contains a surprising number of fields that are easy to overlook. The goal in Section A is to gather accurate demographic details while also establishing early insights into communication style, cultural considerations, household dynamics, and potential caregiver roles. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because this section lays the foundation for later interpretation, the interviewer should move slowly and deliberately, visually checking for embedded checkboxes and sub‑items. Even minor errors here—such as skipping a notation about preferred language or missing a required field for an initial assessment—can create inconsistencies later in the A CAT.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section A may appear simple at first glance, but experienced assessors repeatedly highlight that this section contains a surprising number of fields that are easy to overlook. The goal in Section A is to gather accurate demographic details while also establishing early insights into communication style, cultural considerations, household dynamics, and potential caregiver roles. \nBecause this section lays the foundation for later interpretation, the interviewer should move slowly and deliberately, visually checking for embedded checkboxes and sub‑items. Even minor errors here—such as skipping a notation about preferred language or missing a required field for an initial assessment—can create inconsistencies later in the A CAT.","jobId":"NHGEhioWwASWR3hmK"}},"sr7g2H7yjoS2kngua":{"_id":"sr7g2H7yjoS2kngua","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"j6o7aobv2jso8Sr73"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"pzCWHWQaH8okRWGqH","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"zhdvjteZMQYPsuDBW","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.5625,"captions":[{"text":"As section A concludes,","startTime":0.119,"finishTime":1.6},{"text":"the interviewer should already be identifying information that will","startTime":1.929,"finishTime":5.36},{"text":"reappear in multiple future sections of the ACA.","startTime":5.36,"finishTime":8.1},{"text":"For example,","startTime":9.229,"finishTime":9.979},{"text":"if the individual uses a communication device or","startTime":10.109,"finishTime":12.869},{"text":"mentions a family member who assists regularly,","startTime":12.869,"finishTime":15.859},{"text":"these details will need to be recorded again in later sections.","startTime":16.27,"finishTime":19.549},{"text":"Experienced assessors emphasize that cross-referencing is one of","startTime":19.909,"finishTime":23.35},{"text":"the most important skills in completing an accurate ACAT","startTime":23.35,"finishTime":26.5},{"text":"because so many entries flow across multiple domains.","startTime":26.95,"finishTime":30.19},{"text":"By noticing these connections early,","startTime":31.1,"finishTime":33.13},{"text":"the interviewer reduces the risk of missing","startTime":33.34,"finishTime":36.099},{"text":"important details later in the assessment.","startTime":36.099,"finishTime":38.49},{"text":"This early awareness helps ensure that all sections align logically","startTime":38.819,"finishTime":42.68},{"text":"and support a complete understanding of the individual's needs.","startTime":42.68,"finishTime":46.299}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["j6o7aobv2jso8Sr73","zhdvjteZMQYPsuDBW"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As Section A concludes, the interviewer should already be identifying information that will reappear in multiple future sections of the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For example, if the individual uses a communication device or mentions a family member who assists regularly, these details will need to be recorded again in later sections. Experienced assessors emphasize that cross‑referencing is one of the most important skills in completing an accurate A CAT, because so many entries flow across multiple domains. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"By noticing these connections early, the interviewer reduces the risk of missing important details later in the assessment. This early awareness helps ensure that all sections align logically and support a complete understanding of the individual’s needs.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"As Section A concludes, the interviewer should already be identifying information that will reappear in multiple future sections of the A CAT. \nFor example, if the individual uses a communication device or mentions a family member who assists regularly, these details will need to be recorded again in later sections. Experienced assessors emphasize that cross‑referencing is one of the most important skills in completing an accurate A CAT, because so many entries flow across multiple domains. \nBy noticing these connections early, the interviewer reduces the risk of missing important details later in the assessment. This early awareness helps ensure that all sections align logically and support a complete understanding of the individual’s needs.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"bX4yboZNPWZGkuZHv"}},"v27xLLkABda2YjKyL":{"_id":"v27xLLkABda2YjKyL","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"AnMGY9jcESRnTjABw"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"nWWkmu8d5ibMsr8AB","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"W6jtJawkzXsP4rZzY","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":61.5,"captions":[{"text":"Section B also includes questions about","startTime":0.209,"finishTime":2.41},{"text":"therapy services such as physical therapy,","startTime":2.41,"finishTime":4.989},{"text":"occupational therapy,","startTime":5.17,"finishTime":6.639},{"text":"speech language pathology,","startTime":7.09,"finishTime":8.63},{"text":"or behavioral therapies.","startTime":8.81,"finishTime":10.47},{"text":"Individuals may report that they go to therapy,","startTime":10.729,"finishTime":13.52},{"text":"but this may refer to sessions from months","startTime":13.689,"finishTime":15.85},{"text":"ago or services that have been discontinued.","startTime":15.85,"finishTime":18.29},{"text":"The interviewer should confirm how often therapy is scheduled,","startTime":19.19,"finishTime":22.479},{"text":"how often the individual actually attends,","startTime":22.68,"finishTime":25.18},{"text":"and whether services occur in the home or a clinic.","startTime":25.399,"finishTime":28.51},{"text":"Clarifying questions also help identify barriers,","startTime":28.84,"finishTime":31.819},{"text":"such as transportation difficulties or inconsistent provider availability.","startTime":31.959,"finishTime":36.24},{"text":"Therapy information must align with observed function in later sections.","startTime":37.119,"finishTime":41.58},{"text":"If mobility challenges or speech limitations are evident,","startTime":41.799,"finishTime":45.34},{"text":"but the individual reports no current therapy,","startTime":45.56,"finishTime":48.159},{"text":"it may indicate unmet needs or recently discontinued services.","startTime":48.36,"finishTime":52.599},{"text":"Capturing this information accurately","startTime":53.529,"finishTime":55.33},{"text":"helps support consistent service planning","startTime":55.33,"finishTime":57.549},{"text":"and ensures the care team understands where gaps may exist.","startTime":57.659,"finishTime":61.229}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["AnMGY9jcESRnTjABw","W6jtJawkzXsP4rZzY"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section B also includes questions about therapy services such as physical therapy, occupational therapy, speech‑language pathology, or behavioral therapies. Individuals may report that they ‘go to therapy,’ but this may refer to sessions from months ago or services that have been discontinued. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should confirm how often therapy is scheduled, how often the individual actually attends, and whether services occur in the home or a clinic. Clarifying questions also help identify barriers, such as transportation difficulties or inconsistent provider availability. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Therapy information must align with observed function in later sections. If mobility challenges or speech limitations are evident, but the individual reports no current therapy, it may indicate unmet needs or recently discontinued services. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Capturing this information accurately helps support consistent service planning and ensures the care team understands where gaps may exist.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section B also includes questions about therapy services such as physical therapy, occupational therapy, speech‑language pathology, or behavioral therapies. Individuals may report that they ‘go to therapy,’ but this may refer to sessions from months ago or services that have been discontinued. \nThe interviewer should confirm how often therapy is scheduled, how often the individual actually attends, and whether services occur in the home or a clinic. Clarifying questions also help identify barriers, such as transportation difficulties or inconsistent provider availability. \nTherapy information must align with observed function in later sections. If mobility challenges or speech limitations are evident, but the individual reports no current therapy, it may indicate unmet needs or recently discontinued services. \nCapturing this information accurately helps support consistent service planning and ensures the care team understands where gaps may exist.","jobId":"qGb5JEctyBrFqCQcE"}},"v6FjHhpgwjJCYX6qT":{"_id":"v6FjHhpgwjJCYX6qT","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"bSr9hjd73AdxnK4hr"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"HWGzzqATwFEgRCwzZ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"xJDDR2dEhEeES6NG4","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50,"captions":[{"text":"Section D focuses on developmental disability screening,","startTime":0.209,"finishTime":3.49},{"text":"and this portion of the ACAT","startTime":3.7199999999999998,"finishTime":5.36},{"text":"requires a careful,","startTime":5.849,"finishTime":6.829},{"text":"measured interviewing approach.","startTime":7.21,"finishTime":8.67},{"text":"Many individuals are unfamiliar with clinical terminology,","startTime":9.739,"finishTime":13.159},{"text":"and some may not know whether they have ever","startTime":13.46,"finishTime":15.38},{"text":"received a formal developmental or intellectual disability diagnosis.","startTime":15.38,"finishTime":19.68},{"text":"For this reason,","startTime":19.979,"finishTime":20.889},{"text":"section D relies heavily on functional history and collateral information.","startTime":21.18,"finishTime":25.94},{"text":"The interviewer should use clear,","startTime":26.829,"finishTime":28.54},{"text":"accessible language and explore whether challenges","startTime":28.92,"finishTime":31.639},{"text":"began in childhood or early adulthood.","startTime":31.639,"finishTime":34.119},{"text":"Information from caregivers,","startTime":34.439,"finishTime":36.029},{"text":"family members,","startTime":36.34,"finishTime":37.24},{"text":"and old records is often necessary.","startTime":37.29,"finishTime":39.779},{"text":"Because developmental disability status can","startTime":40.709,"finishTime":43.409},{"text":"affect service access and eligibility,","startTime":43.409,"finishTime":45.759},{"text":"this section must be completed with precision and respect.","startTime":46.159,"finishTime":49.54}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["bSr9hjd73AdxnK4hr","xJDDR2dEhEeES6NG4"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"hitRBD28R4cXmG8q6","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section D focuses on developmental disability screening, and this portion of the A CAT, requires a careful, measured interviewing approach. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals are unfamiliar with clinical terminology, and some may not know whether they have ever received a formal developmental or intellectual disability diagnosis. For this reason, Section D relies heavily on functional history and collateral information. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should use clear, accessible language and explore whether challenges began in childhood or early adulthood. Information from caregivers, family members, and old records is often necessary. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because developmental disability status can affect service access and eligibility, this section must be completed with precision and respect.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section D focuses on developmental disability screening, and this portion of the A CAT, requires a careful, measured interviewing approach. \nMany individuals are unfamiliar with clinical terminology, and some may not know whether they have ever received a formal developmental or intellectual disability diagnosis. For this reason, Section D relies heavily on functional history and collateral information. \nThe interviewer should use clear, accessible language and explore whether challenges began in childhood or early adulthood. Information from caregivers, family members, and old records is often necessary. \nBecause developmental disability status can affect service access and eligibility, this section must be completed with precision and respect.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"vRXhxyDskvhEvJpsX":{"_id":"vRXhxyDskvhEvJpsX","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"GPFnti7NMHn7zNNEW"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T14:57:27.194Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"MDHtg5bg73xxdno2Q","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"hXcZqrEGoXdWCEyqu","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":57.2625,"captions":[{"text":"Instrumental activities of daily living often reveal","startTime":0.009,"finishTime":3.049},{"text":"the earliest signs of declining independence.","startTime":3.049,"finishTime":5.76},{"text":"Tasks such as preparing meals,","startTime":6.17,"finishTime":8},{"text":"cleaning,","startTime":8.289,"finishTime":8.8},{"text":"shopping,","startTime":9.05,"finishTime":9.568999999999999},{"text":"managing money,","startTime":9.729,"finishTime":10.479},{"text":"or traveling in the community frequently shift to","startTime":10.609,"finishTime":13.489},{"text":"caregivers long before the individual acknowledges the change.","startTime":13.489,"finishTime":17.069},{"text":"Interviewers should avoid hypothetical questions such as,","startTime":17.909,"finishTime":20.86},{"text":"could you do this if needed?","startTime":20.92,"finishTime":22.229},{"text":"Instead,","startTime":22.579,"finishTime":23.29},{"text":"anchor the conversation in daily routine,","startTime":23.549,"finishTime":25.78},{"text":"who cooks most meals,","startTime":26.069,"finishTime":27.659},{"text":"or when were the dishes last washed,","startTime":27.67,"finishTime":29.93},{"text":"and who did that?","startTime":30.1,"finishTime":31.11},{"text":"Listening carefully to the structure of the day","startTime":31.959,"finishTime":34.2},{"text":"helps identify who truly performs these tasks.","startTime":34.2,"finishTime":37.259},{"text":"If a child or a neighbor handles meal preparation,","startTime":37.479,"finishTime":40.56},{"text":"or if transportation is always provided by someone else,","startTime":40.779,"finishTime":44.24},{"text":"these details must be documented clearly.","startTime":44.56,"finishTime":47.15},{"text":"IADL findings should reflect not only what the individual says,","startTime":48.009,"finishTime":52.169},{"text":"but what the living situation,","startTime":52.259,"finishTime":53.84},{"text":"caregiver input,","startTime":54.099,"finishTime":54.979},{"text":"and observed environment suggest.","startTime":55.06,"finishTime":57.029}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["GPFnti7NMHn7zNNEW","hXcZqrEGoXdWCEyqu"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Instrumental Activities of Daily Living often reveal the earliest signs of declining independence. Tasks such as preparing meals, cleaning, shopping, managing money, or traveling in the community frequently shift to caregivers long before the individual acknowledges the change. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should avoid hypothetical questions such as ‘Could you do this if needed?’ Instead, anchor the conversation in daily routine: ‘Who cooks most meals?’ or ‘When were the dishes last washed, and who did that?’ \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Listening carefully to the structure of the day helps identify who truly performs these tasks. If a child or neighbor handles meal preparation, or if transportation is always provided by someone else, these details must be documented clearly. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"I A D L findings should reflect not only what the individual says but what the living situation, caregiver input, and observed environment suggest.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Instrumental Activities of Daily Living often reveal the earliest signs of declining independence. Tasks such as preparing meals, cleaning, shopping, managing money, or traveling in the community frequently shift to caregivers long before the individual acknowledges the change. \nInterviewers should avoid hypothetical questions such as ‘Could you do this if needed?’ Instead, anchor the conversation in daily routine: ‘Who cooks most meals?’ or ‘When were the dishes last washed, and who did that?’ \nListening carefully to the structure of the day helps identify who truly performs these tasks. If a child or neighbor handles meal preparation, or if transportation is always provided by someone else, these details must be documented clearly. \nI A D L findings should reflect not only what the individual says but what the living situation, caregiver input, and observed environment suggest.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"Cm7L5kPvNRXiDZ2En"}},"vcyBBeGYNPmYdNy5x":{"_id":"vcyBBeGYNPmYdNy5x","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"qceDYB58xLNuaZWzB"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"764zYEmispg9HjT4M","kind":"overlay","type":"rectangle","width":1075,"height":746.1011904761904,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"zgX7rWDTp867rjjtS","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":52.85,"captions":[{"text":"Section A contains several pitfalls that interviewers encounter frequently.","startTime":0.209,"finishTime":4.71},{"text":"Many of these errors come from moving too quickly through","startTime":5.05,"finishTime":7.57},{"text":"the section or assuming that certain items are optional.","startTime":7.57,"finishTime":10.789},{"text":"Hidden checkboxes and small embedded fields","startTime":11.68,"finishTime":14.119},{"text":"are the most commonly missed elements,","startTime":14.119,"finishTime":16.11},{"text":"so a slow and thorough visual scan is essential.","startTime":16.399,"finishTime":19.399},{"text":"Another common mistake occurs when interviewers","s
