t\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Another common mistake occurs when interviewers document referral information for reassessments—even though this field is required only for initial assessments. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Additionally, individuals often provide incomplete information about who participated in the interview. Anyone who contributes information, even in a small way, must be documented as a source. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Attending to these details prevents inconsistencies that can affect later sections and ensures that the A CAT, reflects a complete and accurate assessment.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section A contains several pitfalls that interviewers encounter frequently. Many of these errors come from moving too quickly through the section or assuming that certain items are optional. \nHidden checkboxes and small embedded fields are the most commonly missed elements, so a slow and thorough visual scan is essential. \nAnother common mistake occurs when interviewers document referral information for reassessments—even though this field is required only for initial assessments. \nAdditionally, individuals often provide incomplete information about who participated in the interview. Anyone who contributes information, even in a small way, must be documented as a source. \nAttending to these details prevents inconsistencies that can affect later sections and ensures that the A CAT, reflects a complete and accurate assessment.","jobId":"CevBEGmShHzpQErkg","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"vy6hT7Wyks8Za8KKe":{"_id":"vy6hT7Wyks8Za8KKe","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"i866XrDtQhywwyBgu"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"dZBd88yJAbZXPsSjy","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"uMjZHWvXMsERzPQ5d","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":58.125,"captions":[{"text":"Questions related to continence and toileting can be sensitive,","startTime":0.119,"finishTime":3.48},{"text":"so interviewers should approach them with neutrality and functional language.","startTime":3.849,"finishTime":8.148},{"text":"Individuals often downplay incontinence due to embarrassment,","startTime":8.409,"finishTime":11.789},{"text":"but caregiver input typically offers a clearer","startTime":12.039,"finishTime":14.6},{"text":"picture of how frequently assistance is needed.","startTime":14.6,"finishTime":17.17},{"text":"Interviewers should focus on what typically occurs each day,","startTime":17.989,"finishTime":21.34},{"text":"whether the individual makes it to the toilet on time,","startTime":21.629,"finishTime":24.739},{"text":"whether supplies are needed,","startTime":25.059,"finishTime":26.45},{"text":"and whether assistance is required for cleanup,","startTime":26.549,"finishTime":29.18},{"text":"hygiene,","startTime":29.43,"finishTime":30.059},{"text":"or equipment management.","startTime":30.229,"finishTime":31.629},{"text":"If the individual uses a catheter or an ostomy system,","startTime":32.539,"finishTime":35.828},{"text":"it is essential to determine who performs maintenance","startTime":36.069,"finishTime":38.769},{"text":"and whether that task requires skilled support.","startTime":38.769,"finishTime":41.528},{"text":"Information gathered here must be consistent with","startTime":42.29,"finishTime":45.09},{"text":"ADL scores documented later in Section C.","startTime":45.09,"finishTime":48.069},{"text":"Discrepancies between stated toileting independence","startTime":48.49,"finishTime":51.47},{"text":"and reliance on incontinence supplies","startTime":51.47,"finishTime":53.81},{"text":"or caregiver help should be addressed directly and documented factually.","startTime":53.81,"finishTime":57.869}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["i866XrDtQhywwyBgu","uMjZHWvXMsERzPQ5d"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Questions related to continence and toileting can be sensitive, so interviewers should approach them with neutrality and functional language. Individuals often downplay incontinence due to embarrassment, but caregiver input typically offers a clearer picture of how frequently assistance is needed. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should focus on what typically occurs each day—whether the individual makes it to the toilet on time, whether supplies are needed, and whether assistance is required for cleanup, hygiene, or equipment management. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the individual uses a catheter or an ostomy system, it is essential to determine who performs maintenance and whether that task requires skilled support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Information gathered here must be consistent with A D L scores documented later in Section C. Discrepancies between stated toileting independence and reliance on incontinence supplies or caregiver help should be addressed directly and documented factually.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Questions related to continence and toileting can be sensitive, so interviewers should approach them with neutrality and functional language. Individuals often downplay incontinence due to embarrassment, but caregiver input typically offers a clearer picture of how frequently assistance is needed. \nInterviewers should focus on what typically occurs each day—whether the individual makes it to the toilet on time, whether supplies are needed, and whether assistance is required for cleanup, hygiene, or equipment management. \nIf the individual uses a catheter or an ostomy system, it is essential to determine who performs maintenance and whether that task requires skilled support. \nInformation gathered here must be consistent with A D L scores documented later in Section C. Discrepancies between stated toileting independence and reliance on incontinence supplies or caregiver help should be addressed directly and documented factually.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"qmyXcZTtPXph5oZDX"}},"wKGMb9XBs8nApAc3x":{"_id":"wKGMb9XBs8nApAc3x","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"8dgtnboJ5855GAfwW"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"gkyzCGQaSHWGcNsZW","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"WmdKCq39gvYyDZPsN","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":61.4625,"captions":[{"text":"Functional assessment often involves conflicting descriptions.","startTime":0.129,"finishTime":3.67},{"text":"An individual may report full independence,","startTime":3.93,"finishTime":6.59},{"text":"while the caregiver describes daily hands-on assistance.","startTime":6.769,"finishTime":9.949},{"text":"The interviewer must treat both accounts respectfully,","startTime":10.21,"finishTime":13.189},{"text":"document each perspective,","startTime":13.369,"finishTime":14.869},{"text":"and then use reasoned judgment to determine the coded response.","startTime":15.01,"finishTime":18.03},{"text":"When discrepancies arise,","startTime":19.139,"finishTime":20.559},{"text":"grounding the discussion in specific examples helps.","startTime":21.1,"finishTime":24.239},{"text":"Ask what happened the last time the task was completed,","startTime":24.52,"finishTime":27.409},{"text":"who was involved,","startTime":27.62,"finishTime":28.36},{"text":"and whether the task was completed safely.","startTime":28.86,"finishTime":31.399},{"text":"Observation also becomes important.","startTime":32.258,"finishTime":34.729},{"text":"If the individual demonstrates difficulty with mobility,","startTime":34.988,"finishTime":38.308},{"text":"memory,","startTime":38.629,"finishTime":39.179},{"text":"or physical coordination during the interview,","startTime":39.388,"finishTime":42.028},{"text":"those findings should inform the final assessment.","startTime":42.308,"finishTime":45.028},{"text":"Ultimately,","startTime":45.959,"finishTime":46.59},{"text":"section C should reflect the individual's typical level of functioning,","startTime":46.759,"finishTime":50.34},{"text":"supported by real examples,","startTime":50.759,"finishTime":52.229},{"text":"observation,","startTime":52.479,"finishTime":53.36},{"text":"and caregiver insight.","startTime":53.439,"finishTime":54.909},{"text":"This clarity strengthens the entire ACAT","startTime":55.2,"finishTime":58.04},{"text":"and supports an accurate level of care determination.","startTime":58.319,"finishTime":61.159}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["8dgtnboJ5855GAfwW","WmdKCq39gvYyDZPsN"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Functional assessment often involves conflicting descriptions. An individual may report full independence, while the caregiver describes daily hands‑on assistance. The interviewer must treat both accounts respectfully, document each perspective, and then use reasoned judgment to determine the coded response. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When discrepancies arise, grounding the discussion in specific examples helps. Ask what happened the last time the task was completed, who was involved, and whether the task was completed safely. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Observation also becomes important. If the individual demonstrates difficulty with mobility, memory, or physical coordination during the interview, those findings should inform the final assessment. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Ultimately, Section C should reflect the individual’s typical level of functioning, supported by real examples, observation, and caregiver insight. This clarity strengthens the entire A C A T and supports an accurate Level of Care determination.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Functional assessment often involves conflicting descriptions. An individual may report full independence, while the caregiver describes daily hands‑on assistance. The interviewer must treat both accounts respectfully, document each perspective, and then use reasoned judgment to determine the coded response. \nWhen discrepancies arise, grounding the discussion in specific examples helps. Ask what happened the last time the task was completed, who was involved, and whether the task was completed safely. \nObservation also becomes important. If the individual demonstrates difficulty with mobility, memory, or physical coordination during the interview, those findings should inform the final assessment. \nUltimately, Section C should reflect the individual’s typical level of functioning, supported by real examples, observation, and caregiver insight. This clarity strengthens the entire A C A T and supports an accurate Level of Care determination.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"xHCmkJ2vE5jGGMkpE"}},"x3YXovJDDAKJeLLhT":{"_id":"x3YXovJDDAKJeLLhT","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ibbBzhYYX46Wt5Hqb"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"sD2rjREEpKXDrcWb5","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"ocGvtwHd3aa8PE7Jg","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":59.1875,"captions":[{"text":"Toileting questions are often sensitive,","startTime":0.119,"finishTime":2.39},{"text":"and individuals may feel embarrassed discussing them.","startTime":2.569,"finishTime":5.829},{"text":"Because of this,","startTime":6.25,"finishTime":6.989},{"text":"interviewers should rely on calm,","startTime":7.449,"finishTime":9.25},{"text":"neutral language that focuses on daily routines rather than personal dignity.","startTime":9.439,"finishTime":13.89},{"text":"Asking questions in functional terms,","startTime":14.779,"finishTime":16.979},{"text":"such as whether the individual reaches the toilet on time,","startTime":17.18,"finishTime":20.37},{"text":"whether they need help cleaning up,","startTime":20.659,"finishTime":22.319},{"text":"or whether supplies are needed,","startTime":22.579,"finishTime":24.28},{"text":"produces more accurate information than asking bluntly about incontinence.","startTime":24.579,"finishTime":28.5},{"text":"Caregivers frequently provide clearer details about frequency,","startTime":29.459,"finishTime":33.2},{"text":"assistance,","startTime":33.58,"finishTime":34.159},{"text":"or equipment needs,","startTime":34.22,"finishTime":35.439},{"text":"especially when the individual minimizes challenges.","startTime":35.849,"finishTime":38.659},{"text":"When catheters,","startTime":39.549,"finishTime":40.47},{"text":"ostomy equipment,","startTime":40.669,"finishTime":41.79},{"text":"or incontinence supplies are present,","startTime":41.869,"finishTime":43.97},{"text":"the interviewer must determine who manages the equipment","startTime":44.229,"finishTime":47.36},{"text":"and whether any part of the process requires skilled care.","startTime":47.509,"finishTime":50.81},{"text":"Whatever is documented here must align with findings in earlier health sections","startTime":51.84,"finishTime":56.279},{"text":"and with the ADL scoring coded later.","startTime":56.479,"finishTime":58.779}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ibbBzhYYX46Wt5Hqb","ocGvtwHd3aa8PE7Jg"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Toileting questions are often sensitive, and individuals may feel embarrassed discussing them. Because of this, interviewers should rely on calm, neutral language that focuses on daily routines rather than personal dignity. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking questions in functional terms—such as whether the individual reaches the toilet on time, whether they need help cleaning up, or whether supplies are needed—produces more accurate information than asking bluntly about incontinence. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers frequently provide clearer details about frequency, assistance, or equipment needs, especially when the individual minimizes challenges. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When catheters, ostomy equipment, or incontinence supplies are present, the interviewer must determine who manages the equipment and whether any part of the process requires skilled care. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Whatever is documented here must align with findings in earlier health sections and with the ADL scoring coded later.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Toileting questions are often sensitive, and individuals may feel embarrassed discussing them. Because of this, interviewers should rely on calm, neutral language that focuses on daily routines rather than personal dignity. \nAsking questions in functional terms—such as whether the individual reaches the toilet on time, whether they need help cleaning up, or whether supplies are needed—produces more accurate information than asking bluntly about incontinence. \nCaregivers frequently provide clearer details about frequency, assistance, or equipment needs, especially when the individual minimizes challenges. \nWhen catheters, ostomy equipment, or incontinence supplies are present, the interviewer must determine who manages the equipment and whether any part of the process requires skilled care. \nWhatever is documented here must align with findings in earlier health sections and with the ADL scoring coded later.","jobId":"Z3hCXHhmJTknZjjgf"}},"yc4sDyhoEW9SNFLuf":{"_id":"yc4sDyhoEW9SNFLuf","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"fa54o7Cj33sFdEmhk"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"pDbKsPBxmWz7g5L2A","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"col ndividual moves from their bedroom to the bathroom at night or whether they rely on furniture or walls for support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any use of mobility devices—whether walkers, canes, wheelchairs, or transport chairs—must also be documented consistently across the A CAT. Even devices used only on ‘bad days’ indicate functional limitations that affect safety and Level of Care considerations.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Mobility assessment begins the moment the interviewer arrives, long before the formal A D L questions are asked. How the individual stands, walks, turns, and transitions between positions provides meaningful insight into daily functioning. \nDuring the interview, the individual may state that walking is ‘fine,’ yet struggle with balance when moving from one chair to another. These observed moments often reveal more than direct questioning. \nAsking practical, situation‑based questions helps uncover the level of assistance actually required. Examples include asking how the individual moves from their bedroom to the bathroom at night or whether they rely on furniture or walls for support. \nAny use of mobility devices—whether walkers, canes, wheelchairs, or transport chairs—must also be documented consistently across the A CAT. Even devices used only on ‘bad days’ indicate functional limitations that affect safety and Level of Care considerations.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPa
