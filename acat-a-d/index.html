g","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-03T22:58:46.781Z","dateModified":"2026-03-03T22:58:46.781Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"oxvpdw75eqvTWTEgr","thumbnail":"tHkKG8CakbwNm5Gyi"},"zfxcLtaXPm96SLB74":{"_id":"zfxcLtaXPm96SLB74","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2335680,"uploadedFileName":"Ava-en-AssistanceLevelsforADLs-3132026.mp3","uploadedFileNameExtension":".mp3","duration":97.2875},"dates":{"dateCreated":"2026-03-13T20:13:18.411Z","dateModified":"2026-03-13T20:13:20.749Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"When exploring Activities of Daily Living, the interviewer should avoid asking individuals whether they are ‘independent’ with a task. Most people will answer yes, even when they rely on prompting, supervision, or partial assistance. \nInstead, focus on specifics. Ask when the task was last completed and who was present. Questions like ‘What part of the task is difficult?’ or ‘Does anyone help with this?’ prompt more accurate descriptions. \nCaregivers often provide clearer insight into daily functioning, especially when individuals minimize their need for assistance. The interviewer must document both perspectives neutrally, but use professional judgment when selecting the coded response. \nMedication management deserves special attention during ADL assessment. The highest level of medication assistance is a key factor in Level of Care determination, particularly for individuals who may only require assistance with one other ADL.\nIndividuals often describe themselves as independent with medications because they swallow pills on their own, even when someone else organizes medications, provides reminders, administers injections, or monitors for safety. These supports represent a higher level of assistance and must be coded accurately.\nWhen medication assistance is understated or miscoded, the A CAT, may fail to reflect the individual’s true Level of Care needs. The goal is to reflect typical performance—not a best‑day scenario, and not an idealized description influenced by pride or habit.\n","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"ApE6TNHAk29Cenix5","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">When exploring Activities of Daily Living, the interviewer should avoid asking individuals whether they are ‘independent’ with a task. Most people will answer yes, even when they rely on prompting, supervision, or partial assistance. <break time=\"0.5s\"/>Instead, focus on specifics. Ask when the task was last completed and who was present. Questions like ‘What part of the task is difficult?’ or ‘Does anyone help with this?’ prompt more accurate descriptions. <break time=\"0.5s\"/>Caregivers often provide clearer insight into daily functioning, especially when individuals minimize their need for assistance. The interviewer must document both perspectives neutrally, but use professional judgment when selecting the coded response. <break time=\"0.5s\"/>Medication management deserves special attention during ADL assessment. The highest level of medication assistance is a key factor in Level of Care determination, particularly for individuals who may only require assistance with one other ADL.<break time=\"0.5s\"/>Individuals often describe themselves as independent with medications because they swallow pills on their own, even when someone else organizes medications, provides reminders, administers injections, or monitors for safety. These supports represent a higher level of assistance and must be coded accurately.<break time=\"0.5s\"/>When medication assistance is understated or miscoded, the A CAT, may fail to reflect the individual’s true Level of Care needs. The goal is to reflect typical performance—not a best‑day scenario, and not an idealized description influenced by pride or habit.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"When exploring activities of daily living,","startTime":0.129,"finishTime":2.4},{"text":"the interviewer should avoid asking individuals whether","startTime":2.69,"finishTime":5.61},{"text":"they are independent with a task.","startTime":5.61,"finishTime":7.789},{"text":"Most people will answer yes,","startTime":8.13,"finishTime":9.6},{"text":"even when they rely on prompting,","startTime":9.77,"finishTime":11.52},{"text":"supervision,","startTime":11.689,"finishTime":12.43},{"text":"or partial assistance.","startTime":12.489,"finishTime":13.89},{"text":"Instead,","startTime":14.699,"finishTime":15.46},{"text":"focus on specifics.","startTime":15.779,"finishTime":17.5},{"text":"Ask when the task was last completed and who was present.","startTime":17.739,"finishTime":21.219},{"text":"Questions like what part of the task is difficult","startTime":21.579,"finishTime":24.319},{"text":"or does anyone help with this","startTime":24.54,"finishTime":26.36},{"text":"prompt more accurate descriptions.","startTime":26.54,"finishTime":28.26},{"text":"Caregivers often provide clearer insight into daily functioning,","startTime":29.149,"finishTime":32.77},{"text":"especially when individuals minimize their need for assistance.","startTime":33.169,"finishTime":36.61},{"text":"The interviewer must document both perspectives neutrally,","startTime":36.909,"finishTime":40.09},{"text":"but use professional judgment when selecting the coded response.","startTime":40.31,"finishTime":43.65},{"text":"Medication management deserves special attention during ADL assessment.","startTime":44.759,"finishTime":49.069},{"text":"The highest level of medication assistance is a","startTime":49.4,"finishTime":52},{"text":"key factor in level of care determination,","startTime":52,"finishTime":54.4},{"text":"particularly for individuals who may only require assistance with one other ADL.","startTime":54.819,"finishTime":59.24},{"text":"Individuals often describe themselves as independent with medications","startTime":60.009,"finishTime":64.05},{"text":"because they swallow pills on their own,","startTime":64.05,"finishTime":65.889},{"text":"even when someone else organizes medications,","startTime":66.129,"finishTime":68.79},{"text":"provides reminders,","startTime":69.129,"finishTime":70.16},{"text":"administers injections,","startTime":70.37,"finishTime":71.87},{"text":"or monitors for safety.","startTime":72.089,"finishTime":73.73},{"text":"These supports represent a higher level of","startTime":74.089,"finishTime":76.449},{"text":"assistance and must be coded accurately.","startTime":76.449,"finishTime":78.769},{"text":"When medication assistance is understated or miscoded,","startTime":79.65,"finishTime":83.129},{"text":"the ACCAT","startTime":83.33,"finishTime":84.239},{"text":"may fail to reflect the individual's true level of care needs.","startTime":84.569,"finishTime":88.51},{"text":"The goal is to reflect typical performance,","startTime":88.809,"finishTime":91.23},{"text":"not a best day scenario,","startTime":91.449,"finishTime":93.029},{"text":"and not an idealized description influenced by pride or habit.","startTime":93.169,"finishTime":97.01}]}},"zgX7rWDTp867rjjtS":{"_id":"zgX7rWDTp867rjjtS","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":2 on. \nIf the assessment is an initial L O C determination, referral source fields must be completed; however, these fields do not apply to reassessments, and the interviewer must take care not to mark them unnecessarily. \nDates are another area where precision can be difficult for individuals. If only a month and year are provided, the interviewer may enter an estimated placeholder day and document that it reflects an approximate response. \nThis part of the interview is also a practical place to identify early who is involved in the individual’s care—information that will be needed repeatedly as the A CAT, progresses.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"XPbLcmEoJNybw8tZu","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">When completing demographic and assessment details, the interviewer should confirm names, addresses, and contact information both verbally and, when possible, visually. Items like medication bottles, appointment cards, or identification documents can provide reliable verification. <break time=\"0.5s\"/>If the assessment is an initial L O C determination, referral source fields must be completed; however, these fields do not apply to reassessments, and the interviewer must take care not to mark them unnecessarily. <break time=\"0.5s\"/>Dates are another area where precision can be difficult for individuals. If only a month and year are provided, the interviewer may enter an estimated placeholder day and document that it reflects an approximate response. <break time=\"0.5s\"/>This part of the interview is also a practical place to identify early who is involved in the individual’s care—information that will be needed repeatedly as the A CAT, progresses.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"When completing demographic and assessment details,","startTime":0.129,"finishTime":3.23},{"text":"the interviewer should confirm names,","startTime":3.48,"finishTime":5.53},{"text":"addresses,","startTime":5.969,"finishTime":6.48},{"text":"and contact information both verbally and","startTime":6.61,"finishTime":9.43},{"text":"when possible,","startTime":9.609,"finishTime":10.489},{"text":"visually.","startTime":10.64,"finishTime":11.39},{"text":"Items like medication bottles,","startTime":11.689,"finishTime":13.52},{"text":"appointment cards,","startTime":13.68,"finishTime":14.619},{"text":"or identification documents can provide reliable verification.","startTime":14.729,"finishTime":18.85},{"text":"If the assessment is an initial LOC determination,","startTime":19.76,"finishTime":22.709},{"text":"referral source fields must be completed.","startTime":23.409,"finishTime":25.899},{"text":"However,","startTime":26.17,"finishTime":26.719},{"text":"these fields do not apply to reassessments,","startTime":27.01,"finishTime":29.43},{"text":"and the interviewer must take care not to mark them unnecessarily.","startTime":29.569,"finishTime":33.509},{"text":"Dates are another area where precision can be difficult for individuals.","startTime":34.38,"finishTime":38.189},{"text":"If only a month and year are provided,","startTime":38.419,"finishTime":40.529},{"text":"the interviewer may enter an estimated placeholder day","startTime":40.779,"finishTime":44},{"text":"and document that it reflects an approximate response.","startTime":44,"finishTime":46.919},{"text":"This part of the interview is also a practical place","startTime":48.06,"finishTime":50.709},{"text":"to identify Early who is involved in the individual's care,","startTime":50.709,"finishTime":54.06},{"text":"information that will be needed repeatedly as the ACAT progresses.","startTime":54.729,"finishTime":58.209}]}}},"questionsByI ction A is not just demographic information—it is the beginning of an interpretive process that shapes how the interviewer approaches the remainder of the assessment.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section A scenarios will appear in the scenario-based learning portion of this training. These scenarios help interviewers learn how to identify communication abilities from natural conversation rather than rigid questioning. \nThey also highlight situations in which the caregiver and the individual provide differing accounts. In those cases, the interviewer must document both perspectives clearly and neutrally while determining what should be coded in the A CAT. \nThese scenarios help reinforce the idea that Section A is not just demographic information—it is the beginning of an interpretive process that shapes how the interviewer approaches the remainder of the assessment.","jobId":"MPzdaNys7rzSfgDWc"}},"2Zhn4kZrveRFwQzEm":{"_id":"2Zhn4kZrveRFwQzEm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Thank You","upload":"9PLR8PgmxRS4n2orB"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T15:14:45.564Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"hpn28jFwzAGyzfm8b","kind":"overlay","type":"rectangle","width":1147,"height":61.00000000000001,"x":82,"y":180,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"font":{"size":35,"bold":true,"underline":false,"italic":false},"fontColor":"rgba(26,110,156,1)","textAlignment":"left","type":"rectangle","border":{"size":0,"color":"#000000","left":true,"right":true,"top":true,"bottom":true},"padding":{"top":0,"bottom":0,"left":0,"right":0},"lineHeight":1.2,"title":"Body Text","fill":{"type":"color","color":"rgba(255,255,255,0)"},"roundedCorners":{"bottomLeft":0,"bottomRight":0,"topLeft":0,"topRight":0},"textHeading":"heading1"},"htmlContent":"<div>Thank you for completing the ACAT Training</div>\n\n<div>&nbsp;</div>\n\n<div>You may exit the lesson</div>\n","start":0,"behaviorType":"continue","rotationAngle":0}],"duration":7.3125,"captions":[{"text":"This concludes administering the adult comprehensive assessment tool training.","startTime":0.129,"finishTime":3.95},{"text":"You may now exit this lesson.","startTime":4.17,"finishTime":5.809}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["9PLR8PgmxRS4n2orB"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This concludes Administering the Adult Comprehensive Assessment Tool training Sections A through D, you may now exit this lesson.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This concludes Administering the Adult Comprehensive Assessment Tool training Sections A through D, you may now exit this lesson.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"TZq8aqAAMWYXoTWb2"}},"9sf3TEJW7yy25CPsp":{"_id":"9sf3TEJW7yy25CPsp","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"QXqrcYLx2LErajLro"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"XS45SdWTDsCWRjEqZ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"DBCbLDjKDMGdiHDCS","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":55.0125,"captions":[{"text":"As the interviewer completes section B,","startTime":0.119,"finishTime":2.3689999999999998},{"text":"observation continues to play a critical role.","startTime":2.609,"finishTime":5.55},{"text":"Individuals often minimize or misunderstand their health needs,","startTime":5.849,"finishTime":9.489},{"text":"and relying solely on what they report can result in an incomplete picture.","startTime":9.689,"finishTime":13.67},{"text":"When medical equipment is visible in the home,","startTime":14.739,"finishTime":16.979},{"text":"such as wound care supplies,","startTime":17.139,"finishTime":18.659},{"text":"pill organizers,","startTime":18.889,"finishTime":20.12},{"text":"oxygen tanks,","startTime":20.26,"finishTime":21.159},{"text":"or nebulizers,","startTime":21.219,"finishTime":22.329},{"text":"these items should immediately prompt follow-up questions.","startTime":22.7,"finishTime":25.78},{"text":"Even if the individual says the item is used rarely or not anymore,","startTime":26.139,"finishTime":30.2},{"text":"its presence typically indicates an ongoing or recent clinical need.","startTime":30.54,"finishTime":34.54},{"text":"Experts note that visible equipment often tells a","startTime":35.369,"finishTime":38.09},{"text":"more accurate story than the interviewee does,","startTime":38.09,"finishTime":40.52},{"text":"particularly when the individual seeks to appear","startTime":41.009,"finishTime":43.729},{"text":"independent or simply forget certain health routines.","startTime":43.729,"finishTime":46.52},{"text":"The interviewer must document both what is observed","startTime":46.849,"finishTime":49.45},{"text":"and what the individual or caregiver states,","startTime":49.45,"finishTime":52.139},{"text":"especially when these perspectives do not match.","startTime":52.45,"finishTime":54.75}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["QXqrcYLx2LErajLro","DBCbLDjKDMGdiHDCS"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As the interviewer completes Section B, observation continues to play a critical role. Individuals often minimize or misunderstand their health needs, and relying solely on what they report can result in an incomplete picture. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When medical equipment is visible in the home—such as wound care supplies, pill organizers, oxygen tanks, or nebulizers—these items should immediately prompt follow‑up questions. Even if the individual says the item is used ‘rarely’ or ‘not anymore,’ its presence typically indicates an ongoing or recent clinical need. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Experts note that visible equipment often tells a more accurate story than the interviewee does, particularly when the individual seeks to appear independent or simply forgets certain health routines. The interviewer must document both what is observed and what the individual or caregiver states, especially when these perspectives do not match.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"As the interviewer completes Section B, observation continues to play a critical role. Individuals often minimize or misunderstand their health needs, and relying solely on what they report can result in an incomplete picture. \nWhen medical equipment is visible in the home—such as wound care supplies, pill organizers, oxygen tanks, or nebulizers—these items should immediately prompt follow‑up questions. Even if the individual says the item is used ‘rarely’ or ‘not anymore,’ its presence typically indicates an ongoing or recent clinical need. \nExperts note that visible equipment often tells a more accurate story than the interviewee does, particularly when the individual seeks to appear independent or simply forgets certain health routines. The interviewer must document both what is observed and what the individual or caregiver states, especially when these perspectives do not match.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"L59WnkdThPzHN6fMH"}},"AK3HAq8JGDo75ewGo":{"_id":"AK3HAq8JGDo75ewGo","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"mpY8JwXJmC9krGfJ9"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"9MKxXgWWDFiFXek6K","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"SRzarLthf8qALSXTX","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":54.75,"captions":[{"text":"When assessing eating,","startTime":0.119,"finishTime":1.2690000000000001},{"text":"it is important to distinguish between the ability to move food","startTime":1.429,"finishTime":4.53},{"text":"from plate to mouth and the broader process of preparing,","startTime":4.53,"finishTime":7.389},{"text":"managing,","startTime":7.63,"finishTime":8.27},{"text":"and safely consuming a meal.","startTime":8.409,"finishTime":10.27},{"text":"Many individuals state they eat on their own,","startTime":11.189,"finishTime":13.21},{"text":"even when they rely on others to cook,","startTime":13.63,"finishTime":15.579},{"text":"cut food,","startTime":15.84,"finishTime":16.37},{"text":"or remind them to eat.","startTime":16.67,"finishTime":18.02},{"text":"Interviewers should therefore ask who prepares meals and","startTime":18.35,"finishTime":21.309},{"text":"whether the individual needs help with cutting,","startTime":21.309,"finishTime":23.5},{"text":"pouring,","startTime":23.709,"finishTime":24.26},{"text":"or maintaining a safe eating pace.","startTime":24.469,"finishTime":26.569},{"text":"If the individual mentions choking episodes,","startTime":27.399,"finishTime":29.909},{"text":"coughing during meals,","startTime":30.049,"finishTime":31.25},{"text":"or the use of thickeners,","startTime":31.52,"finishTime":32.84},{"text":"the interviewer must document these carefully and connect them","startTime":33.13,"finishTime":36.529},{"text":"to findings in the nutrition and dental screening sections.","startTime":36.529,"finishTime":39.93},{"text":"Physical signs such as tremors,","startTime":40.84,"finishTime":42.639},{"text":"slow utensil handling,","startTime":42.84,"finishTime":44.25},{"text":"or reliance on caregiver prompts should be noted.","startTime":44.369,"finishTime":47.24},{"text":"These observations support an accurate understanding of both","startTime":47.56,"finishTime":50.81},{"text":"eating ability and underlying medical or cognitive factors.","startTime":50.81,"finishTime":54.49}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["mpY8JwXJmC9krGfJ9","SRzarLthf8qALSXTX"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When assessing eating, it is important to distinguish between the ability to move food from plate to mouth and the broader process of preparing, managing, and safely consuming a meal. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals state they ‘eat on their own,’ even when they rely on others to cook, cut food, or remind them to eat. Interviewers should therefore ask who prepares meals and whether the individual needs help with cutting, pouring, or maintaining a safe eating pace. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the individual mentions choking episodes, coughing during meals, or the use of thickeners, the interviewer must document these carefully and connect them to findings in the nutrition and dental screening sections. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Physical signs such as tremors, slow utensil handling, or reliance on caregiver prompts should be noted. These observations support an accurate understanding of both eating ability and underlying medical or cognitive factors.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"When assessing eating, it is important to distinguish between the ability to move food from plate to mouth and the broader process of preparing, managing, and safely consuming a meal. \nMany individuals state they ‘eat on their own,’ even when they rely on others to cook, cut food, or remind them to eat. Interviewers should therefore ask who prepares meals and whether the individual needs help with cutting, pouring, or maintaining a safe eating pace. \nIf the individual mentions choking episodes, coughing during meals, or the use of thickeners, the interviewer must document these carefully and connect them to findings in the nutrition and dental screening sections. \nPhysical signs such as tremors, slow utensil handling, or reliance on caregiver prompts should be noted. These observations support an accurate understanding of both eating ability and underlying medical or cognitive factors.","jobId":"d2f2eThPEEjvfmXwR"}},"BpCcL3ek9TdZvjRA4":{"_id":"BpCcL3ek9TdZvjRA4","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"7dsXWDcAMgKWYuDc5"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"8Gc2enYPmD2mykgoQ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"QBDiDMP75fp8NbH37","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":51.8,"captions":[{"text":"As we enter section B,","startTime":0.119,"finishTime":1.49},{"text":"it is important to remember that this is rarely completed in a single pass.","startTime":1.69,"finishTime":6.03},{"text":"Individuals often recall only part of","startTime":6.289,"finishTime":8.529},{"text":"their medical history or medication regimen.","startTime":8.529,"finishTime":11.149},{"text":"Caregivers may add important details later in the interview,","startTime":11.529,"finishTime":14.67},{"text":"and medical documents may need to be obtained after the visit.","startTime":14.85,"finishTime":18.09},{"text":"The interviewer's role is to capture as much","startTime":19.01,"finishTime":21.5},{"text":"accurate information as possible in the moment,","startTime":21.5,"finishTime":24.129},{"text":"while noting clearly which entries will require follow-up.","startTime":24.42,"finishTime":27.479},{"text":"Observation also plays a major role in this section.","startTime":28.34,"finishTime":31.52},{"text":"The presence of medical equipment,","startTime":31.819,"finishTime":33.529},{"text":"signs of limited mobility,","startTime":33.889,"finishTime":35.36},{"text":"or medication organizers can all provide valuable clues about","startTime":35.5,"finishTime":39.22},{"text":"health needs even if they are not stated explicitly.","startTime":39.22,"finishTime":41.939},{"text":"Section B establishes the clinical foundation for a level of care determination,","startTime":42.909,"finishTime":47.099},{"text":"so accuracy,","startTime":47.389,"finishTime":48.34},{"text":"patience,","startTime":48.58,"finishTime":49.22},{"text":"and methodical detail are essential.","startTime":49.279,"finishTime":51.549}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["7dsXWDcAMgKWYuDc5","QBDiDMP75fp8NbH37"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As we enter Section B, it is important to remember that this is rarely completed in a single pass. Individuals often recall only part of their medical history or medication regimen. Caregivers may add important details later in the interview, and medical documents may need to be obtained after the visit. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer’s role is to capture as much accurate information as possible in the moment, while noting clearly which entries will require follow‑up. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Observation also plays a major role in this section. The presence of medical equipment, signs of limited mobility, or medication organizers can all provide valuable clues about health needs even if they are not stated explicitly. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section B establishes the clinical foundation for Level of Care determination, so accuracy, patience, and methodical detail are essential.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"As we enter Section B, it is important to remember that this is rarely completed in a single pass. Individuals often recall only part of their medical history or medication regimen. Caregivers may add important details later in the interview, and medical documents may need to be obtained after the visit. \nThe interviewer’s role is to capture as much accurate information as possible in the moment, while noting clearly which entries will require follow‑up. \nObservation also plays a major role in this section. The presence of medical equipment, signs of limited mobility, or medication organizers can all provide valuable clues about health needs even if they are not stated explicitly. \nSection B establishes the clinical foundation for Level of Care determination, so accuracy, patience, and methodical detail are essential.","jobId":"Rz93GGhNKmWyJyWuT"}},"DBc7FpRPtaBdzwRok":{"_id":"DBc7FpRPtaBdzwRok","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"TLhXM9LznmHaghj5q"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T15:11:55.878Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"BQBpMc8qE573YdWB3","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"xfKwwyMn2vJuXb5FX","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0,"width":100,"height":100}}],"duration":48.85,"captions":[{"text":"Section C marks the transition from medical history to daily functioning,","startTime":0.209,"finishTime":4.38},{"text":"and this is one of the most important sections in the ACET.","startTime":4.61,"finishTime":7.6899999999999995},{"text":"Functional performance directly influences level of care determination,","startTime":8.09,"finishTime":11.84},{"text":"so accuracy here is essential.","startTime":12.13,"finishTime":13.829},{"text":"Individuals often describe what they believe they can do","startTime":14.789,"finishTime":17.67},{"text":"rather than what actually happens day to day.","startTime":17.67,"finishTime":20.25},{"text":"The interviewer's task is to uncover real world functioning,","startTime":20.549,"finishTime":23.93},{"text":"using probing questions and observation rather","startTime":24.069,"finishTime":26.829},{"text":"than relying solely on self-report.","startTime":26.829,"finishTime":29.049},{"text":"During this part of the assessment,","startTime":29.959,"finishTime":31.6},{"text":"subtle cues such as how the individual moves,","startTime":31.84,"finishTime":34.639},{"text":"how they respond to multi-step questions,","startTime":34.84,"finishTime":37.099},{"text":"or how they describe daily routines","startTime":37.319,"finishTime":39.5},{"text":"often reveal far more than direct answers alone.","startTime":39.72,"finishTime":42.459},{"text":"Those observations should shape how the interviewer records ADL","startTime":43.04,"finishTime":46.619},{"text":"and IEDL performance.","startTime":46.759,"finishTime":48.459}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["TLhXM9LznmHaghj5q","xfKwwyMn2vJuXb5FX"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section C marks the transition from medical history to daily functioning, and this is one of the most important sections in the A CAT. Functional performance directly influences Level of Care determination, so accuracy here is essential. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals often describe what they believe they can do rather than what actually happens day to day. The interviewer’s task is to uncover real‑world functioning, using probing questions and observation rather than relying solely on self‑report. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"During this part of the assessment, subtle cues—such as how the individual moves, how they respond to multi‑step questions, or how they describe daily routines—often reveal far more than direct answers alone. Those observations should shape how the interviewer records A D L and I A D L performance.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section C marks the transition from medical history to daily functioning, and this is one of the most important sections in the A CAT. Functional performance directly influences Level of Care determination, so accuracy here is essential. \nIndividuals often describe what they believe they can do rather than what actually happens day to day. The interviewer’s task is to uncover real‑world functioning, using probing questions and observation rather than relying solely on self‑report. \nDuring this part of the assessment, subtle cues—such as how the individual moves, how they respond to multi‑step questions, or how they describe daily routines—often reveal far more than direct answers alone. Those observations should shape how the interviewer records A D L and I A D L performance.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"DCyBReyL4kP6k84Wk"}},"EwZh2XQkePyWLY5ce":{"_id":"EwZh2XQkePyWLY5ce","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"D8g67sPhgWc8jKhCv"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Hx4zr3LvqwwhfuPoN","kind":"overlay","type":"rectangle","width":1280,"height":740.5714285714287,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"dwGARP34XvwJ4NXyv","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":60.0375,"captions":[{"text":"Section B concludes with a comprehensive","startTime":0.209,"finishTime":2.289},{"text":"snapshot of the individual's medical picture,","startTime":2.289,"finishTime":4.76},{"text":"support needs,","startTime":5.21,"finishTime":5.849},{"text":"and potential risks.","startTime":5.929,"finishTime":7.389},{"text":"By this point,","startTime":7.6899999999999995,"finishTime":8.51},{"text":"the interviewer should have collected and observed enough information","startTime":8.699,"finishTime":11.93},{"text":"to begin identifying patterns such as declining mobility,","startTime":11.93,"finishTime":15.47},{"text":"inconsistent medication routines,","startTime":15.729,"finishTime":17.719},{"text":"or increased reliance on caregiver support.","startTime":18.01,"finishTime":20.67},{"text":"These patterns must carry forward into Section C,","startTime":21.559,"finishTime":24.52},{"text":"which focuses on activities of daily living","startTime":24.76,"finishTime":27.379},{"text":"and instrumental activities of daily living.","startTime":27.379,"finishTime":30.059},{"text":"Section C builds directly on information gathered in Section B,","startTime":30.479,"finishTime":33.889},{"text":"and any disconnect between medical needs and","startTime":34.159,"finishTime":36.919},{"text":"functional performance should be addressed proactively.","startTime":36.919,"finishTime":39.599},{"text":"With section be complete,","startTime":40.47,"finishTime":42.029},{"text":"the training now shifts to functional assessment.","startTime":42.27,"finishTime":45.099},{"text":"The next slides introduce practical interviewing techniques for","startTime":45.43,"finishTime":48.59},{"text":"determining how the individual performs personal care tasks,","startTime":48.59,"finishTime":52.029},{"text":"household activities,","startTime":52.229,"finishTime":53.389},{"text":"and daily routines.","startTime":53.47,"finishTime":54.86},{"text":"This part of the ACAT","startTime":55.229,"finishTime":56.43},{"text":"is essential for an accurate level of care determination.","startTime":56.599,"finishTime":59.75}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["D8g67sPhgWc8jKhCv","dwGARP34XvwJ4NXyv"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section B concludes with a comprehensive snapshot of the individual’s medical picture, support needs, and potential risks. By this point, the interviewer should have collected and observed enough information to begin identifying patterns—such as declining mobility, inconsistent medication routines, or increased reliance on caregiver support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These patterns must carry forward into Section C, which focuses on Activities of Daily Living and Instrumental Activities of Daily Living. Section C builds directly on information gathered in Section B, and any disconnect between medical needs and functional performance should be addressed proactively. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"With Section B complete, the training now shifts to functional assessment. The next slides introduce practical interviewing techniques for determining how the individual performs personal care tasks, household activities, and daily routines. This part of the A CAT, is essential for an accurate Level of Care determination.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section B concludes with a comprehensive snapshot of the individual’s medical picture, support needs, and potential risks. By this point, the interviewer should have collected and observed enough information to begin identifying patterns—such as declining mobility, inconsistent medication routines, or increased reliance on caregiver support. \nThese patterns must carry forward into Section C, which focuses on Activities of Daily Living and Instrumental Activities of Daily Living. Section C builds directly on information gathered in Section B, and any disconnect between medical needs and functional performance should be addressed proactively. \nWith Section B complete, the training now shifts to functional assessment. The next slides introduce practical interviewing techniques for determining how the individual performs personal care tasks, household activities, and daily routines. This part of the A CAT, is essential for an accurate Level of Care determination.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"P3TmR2a8gpwPHkoDn"}},"GTJN8Bs9J29LWCk8M":{"_id":"GTJN8Bs9J29LWCk8M","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"s25mwhAKurWZ3E7hk"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"p62ESqaxmaffyCqyE","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"TigHADdunGyGDKsrM","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":52.825,"captions":[{"text":"Section A also requires the interviewer","startTime":0.209,"finishTime":2.289},{"text":"to document who participates in the assessment","startTime":2.289,"finishTime":4.73},{"text":"and who provides information.","startTime":4.869,"finishTime":6.519},{"text":"This list must include everyone who contributes meaningfully,","startTime":6.88,"finishTime":10.239},{"text":"whether they actively answer questions or simply","startTime":10.489,"finishTime":13.17},{"text":"confirm details occasionally during the conversation.","startTime":13.17,"finishTime":15.729},{"text":"Accurately identifying these contributors is essential","startTime":16.549,"finishTime":19.45},{"text":"because many sections of the ACAT","startTime":19.909,"finishTime":21.579},{"text":"rely on caregiver insight,","startTime":21.95,"finishTime":23.739},{"text":"collateral information,","startTime":24.03,"finishTime":25.309},{"text":"or observations from support persons.","startTime":25.389,"finishTime":27.79},{"text":"When caregivers and individuals offer conflicting accounts,","startTime":28.649,"finishTime":31.719},{"text":"noting the sources clearly in this section creates transparency","startTime":32.06,"finishTime":35.459},{"text":"and context for later sections such as ADLS,","startTime":35.459,"finishTime":38.529},{"text":"caregiver assessment,","startTime":38.81,"finishTime":39.79},{"text":"and services.","startTime":39.97,"finishTime":40.97},{"text":"For individuals with cognitive limitations or legal representation,","startTime":41.849,"finishTime":45.919},{"text":"Section A is also the point where the interviewer","startTime":46.34,"finishTime":49.119},{"text":"confirms whether guardianship or other legal authority exists.","startTime":49.119,"finishTime":52.56}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["s25mwhAKurWZ3E7hk","TigHADdunGyGDKsrM"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"iebt9YKn3giMBwJLr","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section A also requires the interviewer to document who participates in the assessment and who provides information. This list must include everyone who contributes meaningfully—whether they actively answer questions or simply confirm details occasionally during the conversation. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Accurately identifying these contributors is essential, because many sections of the A CAT, rely on caregiver insight, collateral information, or observations from support persons. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When caregivers and individuals offer conflicting accounts, noting the sources clearly in this section creates transparency and context for later sections such as A D Ls, caregiver assessment, and services. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For individuals with cognitive limitations or legal representation, Section A is also the point where the interviewer confirms whether guardianship or other legal authority exists.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section A also requires the interviewer to document who participates in the assessment and who provides information. This list must include everyone who contributes meaningfully—whether they actively answer questions or simply confirm details occasionally during the conversation. \nAccurately identifying these contributors is essential, because many sections of the A CAT, rely on caregiver insight, collateral information, or observations from support persons. \nWhen caregivers and individuals offer conflicting accounts, noting the sources clearly in this section creates transparency and context for later sections such as A D Ls, caregiver assessment, and services. \nFor individuals with cognitive limitations or legal representation, Section A is also the point where the interviewer confirms whether guardianship or other legal authority exists.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"NeMweedaQPnC4jnYe":{"_id":"NeMweedaQPnC4jnYe","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"SwZNDWa4J9sd2WkDQ"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"foLiH9sZBnf9vMM3x","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"gc4XTKgSkbjDzupop","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":47.0125,"captions":[{"text":"The questions in section D should not be read word for word from the form,","startTime":0.119,"finishTime":4.13},{"text":"as the technical phrasing can lead to confusion.","startTime":4.369,"finishTime":7.15},{"text":"Instead,","startTime":7.449,"finishTime":8.09},{"text":"the interviewer should ask conversational questions","startTime":8.329,"finishTime":11.27},{"text":"designed to uncover the underlying information.","startTime":11.279,"finishTime":13.729},{"text":"For example,","startTime":14.609,"finishTime":15.409},{"text":"rather than asking whether the individual","startTime":15.609,"finishTime":17.79},{"text":"has a developmental disability,","startTime":17.969,"finishTime":19.709},{"text":"the interviewer may ask whether certain","startTime":20.049,"finishTime":22.129},{"text":"challenges have been present since childhood,","startTime":22.129,"finishTime":24.59},{"text":"or whether they participated in special","startTime":24.889,"finishTime":27.489},{"text":"education or early intervention programs.","startTime":27.489,"finishTime":29.77},{"text":"Caregivers often have deeper insight into","startTime":30.68,"finishTime":32.959},{"text":"early functioning and developmental history,","startTime":32.959,"finishTime":35.779},{"text":"especially when individuals cannot recall or explain past diagnoses.","startTime":36.2,"finishTime":40.549},{"text":"Their contributions should be documented clearly so","startTime":40.95,"finishTime":43.63},{"text":"the ACAD reflects accurate historical context.","startTime":43.63,"finishTime":46.72}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["SwZNDWa4J9sd2WkDQ","gc4XTKgSkbjDzupop"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The questions in Section D should not be read word‑for‑word from the form, as the technical phrasing can lead to confusion. Instead, the interviewer should ask conversational questions designed to uncover the underlying information. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For example, rather than asking whether the individual ‘has a developmental disability,’ the interviewer may ask whether certain challenges have been present since childhood, or whether they participated in special education or early intervention programs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers often have deeper insight into early functioning and developmental history, especially when individuals cannot recall or explain past diagnoses. Their contributions should be documented clearly so the ACAT reflects accurate historical context.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The questions in Section D should not be read word‑for‑word from the form, as the technical phrasing can lead to confusion. Instead, the interviewer should ask conversational questions designed to uncover the underlying information. \nFor example, rather than asking whether the individual ‘has a developmental disability,’ the interviewer may ask whether certain challenges have been present since childhood, or whether they participated in special education or early intervention programs. \nCaregivers often have deeper insight into early functioning and developmental history, especially when individuals cannot recall or explain past diagnoses. Their contributions should be documented clearly so the ACAT reflects accurate historical context.","jobId":"r8YkW8AGEfcyzfLhi"}},"PJqjN2wNxgfFJb7x5":{"_id":"PJqjN2wNxgfFJb7x5","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"D3yWQjcfRRmiy5Dav"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"miZEGyzvaZubaACKX","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"W8D9rcb3zywAYsjTr","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":43.3125,"captions":[{"text":"The ACAT is the standardized instrument used by the","startTime":0.009,"finishTime":3.21},{"text":"Ohio Department of Medicaid to determine whether an individual","startTime":3.21,"finishTime":6.829},{"text":"meets the criteria for a level of care.","startTime":7.179,"finishTime":9.449},{"text":"The tool brings together information about medical needs,","startTime":9.729,"finishTime":12.64},{"text":"functional limitations,","startTime":13,"finishTime":14.31},{"text":"social supports,","startTime":14.568999999999999,"finishTime":15.56},{"text":"environmental risks,","startTime":15.85,"finishTime":16.92},{"text":"and behavioral or cognitive challenges.","startTime":17,"finishTime":19.45},{"text":"Rather than serving as a checklist alone,","startTime":20.329,"finishTime":22.409},{"text":"the ACAT","startTime":22.709,"finishTime":23.469},{"text":"guides the interviewer in forming a complete understanding","startTime":23.709,"finishTime":26.829},{"text":"of how the individual functions day to day.","startTime":26.829,"finishTime":29.329},{"text":"The information collected here sets the foundation for eligibility decisions,","startTime":29.629,"finishTime":33.939},{"text":"service planning,","startTime":34.229,"finishTime":35.069},{"text":"and long-term care coordination.","startTime":35.11,"finishTime":37.27},{"text":"Because of this,","startTime":37.75,"finishTime":38.389},{"text":"the quality of the interview directly affects the quality of downstream supports.","startTime":38.63,"finishTime":43.029}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["D3yWQjcfRRmiy5Dav","W8D9rcb3zywAYsjTr"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"ZLu5BDagS4bgz8cET","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The A CAT, is the standardized instrument used by the Ohio Department of Medicaid to determine whether an individual meets the criteria for a Level of Care. The tool brings together information about medical needs, functional limitations, social supports, environmental risks, and behavioral or cognitive challenges. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Rather than serving as a checklist alone, the A CAT, guides the interviewer in forming a complete understanding of how the individual functions day to day. The information collected here sets the foundation for eligibility decisions, service planning, and long‑term care coordination. Because of this, the quality of the interview directly affects the quality of downstream supports.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The A CAT, is the standardized instrument used by the Ohio Department of Medicaid to determine whether an individual meets the criteria for a Level of Care. The tool brings together information about medical needs, functional limitations, social supports, environmental risks, and behavioral or cognitive challenges. \nRather than serving as a checklist alone, the A CAT, guides the interviewer in forming a complete understanding of how the individual functions day to day. The information collected here sets the foundation for eligibility decisions, service planning, and long‑term care coordination. Because of this, the quality of the interview directly affects the quality of downstream supports.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"QEc9Zstrqn9mZ2QAk":{"_id":"QEc9Zstrqn9mZ2QAk","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"zybwKWsRCrbSK5RqC"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"xgf3sgTS9JrKzxgzw","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"LKFHr2j55CzbEkP4S","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":58.475,"captions":[{"text":"When completing demographic and assessment details,","startTime":0.129,"finishTime":3.23},{"text":"the interviewer should confirm names,","startTime":3.48,"finishTime":5.53},{"text":"addresses,","startTime":5.969,"finishTime":6.48},{"text":"and contact information both verbally and","startTime":6.61,"finishTime":9.43},{"text":"when possible,","startTime":9.609,"finishTime":10.489},{"text":"visually.","startTime":10.64,"finishTime":11.39},{"text":"Items like medication bottles,","startTime":11.689,"finishTime":13.52},{"text":"appointment cards,","startTime":13.68,"finishTime":14.619},{"text":"or identification documents can provide reliable verification.","startTime":14.729,"finishTime":18.85},{"text":"If the assessment is an initial LOC determination,","startTime":19.76,"finishTime":22.709},{"text":"referral source fields must be completed.","startTime":23.409,"finishTime":25.899},{"text":"However,","startTime":26.17,"finishTime":26.719},{"text":"these fields do not apply to reassessments,","startTime":27.01,"finishTime":29.43},{"text":"and the interviewer must take care not to mark them unnecessarily.","startTime":29.569,"finishTime":33.509},{"text":"Dates are another area where precision can be difficult for individuals.","startTime":34.38,"finishTime":38.189},{"text":"If only a month and year are provided,","startTime":38.419,"finishTime":40.529},{"text":"the interviewer may enter an estimated placeholder day","startTime":40.779,"finishTime":44},{"text":"and document that it reflects an approximate response.","startTime":44,"finishTime":46.919},{"text":"This part of the interview is also a practical place","startTime":48.06,"finishTime":50.709},{"text":"to identify Early who is involved in the individual's care,","startTime":50.709,"finishTime":54.06},{"text":"information that will be needed repeatedly as the ACAT progresses.","startTime":54.729,"finishTime":58.209}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zybwKWsRCrbSK5RqC","LKFHr2j55CzbEkP4S"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When completing demographic and assessment details, the interviewer should confirm names, addresses, and contact information both verbally and, when possible, visually. Items like medication bottles, appointment cards, or identification documents can provide reliable verification. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the assessment is an initial L O C determination, referral source fields must be completed; however, these fields do not apply to reassessments, and the interviewer must take care not to mark them unnecessarily. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Dates are another area where precision can be difficult for individuals. If only a month and year are provided, the interviewer may enter an estimated placeholder day and document that it reflects an approximate response. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This part of the interview is also a practical place to identify early who is involved in the individual’s care—information that will be needed repeatedly as the A CAT, progresses.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"When completing demographic and assessment details, the interviewer should confirm names, addresses, and contact information both verbally and, when possible, visually. Items like medication bottles, appointment cards, or identification documents can provide reliable verification. \nIf the assessment is an initial L O C determination, referral source fields must be completed; however, these fields do not apply to reassessments, and the interviewer must take care not to mark them unnecessarily. \nDates are another area where precision can be difficult for individuals. If only a month and year are provided, the interviewer may enter an estimated placeholder day and document that it reflects an approximate response. \nThis part of the interview is also a practical place to identify early who is involved in the individual’s care—information that will be needed repeatedly as the A CAT, progresses.","jobId":"YbBswNwaWCqEAsj8j","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"WczzbsBP2W75bHYw5":{"_id":"WczzbsBP2W75bHYw5","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"6G6Hbm8dkbnCW4ygC"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"o57zKYpgLxaY7KFzk","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"CT8aZKfz8ePaJb4Bg","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0,"width":100,"height":100}}],"duration":129,"captions":[{"text":"This portion of section involves questions that can","startTime":0.129,"finishTime":2.69},{"text":"feel personal or sensitive for many individuals.","startTime":2.69,"finishTime":5.71},{"text":"Interviewers should avoid reading the technical ACAT","startTime":5.969,"finishTime":8.479},{"text":"wording verbatim,","startTime":8.97,"finishTime":9.92},{"text":"because the clinical phrasing can be confusing or may create discomfort.","startTime":10.17,"finishTime":14.229},{"text":"Instead,","startTime":14.529,"finishTime":15.239},{"text":"questions should be rephrased into clear,","startTime":15.85,"finishTime":17.87},{"text":"conversational language that focuses on gathering accurate","startTime":18.53,"finishTime":21.93},{"text":"information without causing embarrassment or misunderstanding.","startTime":21.93,"finishTime":25.329},{"text":"When asking about allergies,","startTime":26.229,"finishTime":27.77},{"text":"the interviewer should explore medication,","startTime":27.989,"finishTime":30.059},{"text":"food,","startTime":30.79,"finishTime":31.18},{"text":"and environmental categories.","startTime":31.309,"finishTime":33.25},{"text":"If the individual cannot recall the details,","startTime":33.509,"finishTime":35.939},{"text":"the interviewer should rely on caregiver input or past medical documentation","startTime":36.27,"finishTime":41.369},{"text":"rather than pressing for precise memory.","startTime":41.509,"finishTime":43.889},{"text":"For substance use history,","startTime":44.75,"finishTime":46.33},{"text":"many individuals remember only the month and year of last use.","startTime":46.58,"finishTime":50.409},{"text":"In those cases,","startTime":50.669,"finishTime":51.659},{"text":"the interviewer may use the first day of that month as","startTime":51.99,"finishTime":54.79},{"text":"the estimated date and clearly note that the date is approximate.","startTime":54.79,"finishTime":58.939},{"text":"The emphasis should remain on factual patterns such as frequency","startTime":59.229,"finishTime":62.75},{"text":"rather than judgment or interpretation.","startTime":62.99,"finishTime":65.23},{"text":"When discussing transplant history,","startTime":66.139,"finishTime":68.26},{"text":"individuals may not know the exact organ,","startTime":68.779,"finishTime":70.9},{"text":"date,","startTime":71.18,"finishTime":71.68},{"text":"or whether they remain a candidate.","startTime":71.9,"finishTime":73.599},{"text":"The interviewer should rely on caregiver information or medical paperwork when","startTime":74.139,"finishTime":78.9},{"text":"available to ensure the assessment reflects an accurate and complete picture.","startTime":78.9,"finishTime":83},{"text":"Throughout these items,","startTime":83.76,"finishTime":85},{"text":"the guiding principle is to collect reliable","startTime":85.279,"finishTime":88.23},{"text":"information in a respectful and non-technical manner,","startTime":88.23,"finishTime":91.129},{"text":"ensuring the individual feels comfortable and understood.","startTime":91.389,"finishTime":94.76}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["6G6Hbm8dkbnCW4ygC","CT8aZKfz8ePaJb4Bg"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"pdzkcq7fxQPx2QZsS","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This portion of Section B involves questions that can feel personal or sensitive for many individuals. Interviewers should avoid reading the technical A CAT, wording verbatim, because the clinical phrasing can be confusing or may create discomfort. Instead, questions should be rephrased into clear, conversational language that focuses on gathering accurate information without causing embarrassment or misunderstanding.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When asking about allergies, the interviewer should explore medication, food, and environmental categories. If the individual cannot recall the details, the interviewer should rely on caregiver input or past medical documentation rather than pressing for precise memory. It is not sufficient to document the allergen alone—the reaction must also be recorded. For example, documenting “shellfish” without noting that it causes anaphylaxis does not accurately reflect risk. Individuals often remember that they are “allergic” to something but may not immediately recall the reaction. Follow-up questions such as, “What happens when you’re exposed?” help clarify whether the response involves mild symptoms like a rash or more serious reactions such as breathing difficulty or swelling. Be sure to document the reaction.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For substance‑use history, many individuals remember only the month and year of last use. In those cases, the interviewer may use the first day of that month as the estimated date and clearly note that the date is approximate. The emphasis should remain on factual patterns such as frequency, rather than judgment or interpretation.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When discussing transplant history, individuals may not know the exact organ, date, or whether they remain a candidate. The interviewer should rely on caregiver information or medical paperwork when available to ensure the assessment reflects an accurate and complete picture.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Throughout these items, the guiding principle is to collect reliable information in a respectful and non‑technical manner, ensuring the individual feels comfortable and understood.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This portion of Section B involves questions that can feel personal or sensitive for many individuals. Interviewers should avoid reading the technical A CAT, wording verbatim, because the clinical phrasing can be confusing or may create discomfort. Instead, questions should be rephrased into clear, conver
