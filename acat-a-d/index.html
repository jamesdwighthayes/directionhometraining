sational language that focuses on gathering accurate information without causing embarrassment or misunderstanding.\nWhen asking about allergies, the interviewer should explore medication, food, and environmental categories. If the individual cannot recall the details, the interviewer should rely on caregiver input or past medical documentation rather than pressing for precise memory. It is not sufficient to document the allergen alone—the reaction must also be recorded. For example, documenting “shellfish” without noting that it causes anaphylaxis does not accurately reflect risk. Individuals often remember that they are “allergic” to something but may not immediately recall the reaction. Follow-up questions such as, “What happens when you’re exposed?” help clarify whether the response involves mild symptoms like a rash or more serious reactions such as breathing difficulty or swelling. Be sure to document the reaction.\nFor substance‑use history, many individuals remember only the month and year of last use. In those cases, the interviewer may use the first day of that month as the estimated date and clearly note that the date is approximate. The emphasis should remain on factual patterns such as frequency, rather than judgment or interpretation.\nWhen discussing transplant history, individuals may not know the exact organ, date, or whether they remain a candidate. The interviewer should rely on caregiver information or medical paperwork when available to ensure the assessment reflects an accurate and complete picture.\nThroughout these items, the guiding principle is to collect reliable information in a respectful and non‑technical manner, ensuring the individual feels comfortable and understood.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"XgaNeaprue7FgadJM":{"_id":"XgaNeaprue7FgadJM","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"wtjktkiARgmbGgGvG"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ibBtGZvBk89c3Bxsj","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"FMvnK5wamMp8B2CNn","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":47.825,"captions":[{"text":"The communication items in section A can often be completed","startTime":0.119,"finishTime":3.769},{"text":"simply by observing how the individual interacts during normal conversation.","startTime":3.769,"finishTime":8.159},{"text":"Clarity of speech,","startTime":8.449,"finishTime":9.39},{"text":"ability to follow questions,","startTime":9.729,"finishTime":11.369},{"text":"and ability to express needs often become evident as the interview progresses.","startTime":11.449,"finishTime":16.409},{"text":"Direct questioning is only needed when conversational","startTime":17.34,"finishTime":20.27},{"text":"interaction does not provide enough information.","startTime":20.27,"finishTime":22.79},{"text":"When communication devices or alternative communication methods are used,","startTime":23.69,"finishTime":28.059},{"text":"interviewers should document them here,","startTime":28.61,"finishTime":30.069},{"text":"but remember that these items must be","startTime":30.37,"finishTime":32.49},{"text":"recorded again in the later equipment section.","startTime":32.49,"finishTime":34.95},{"text":"Finally,","startTime":35.86,"finishTime":36.419},{"text":"cultural and personal comfort preferences should be explored using open,","startTime":36.54,"finishTime":41.02},{"text":"respectful language.","startTime":41.459,"finishTime":42.54},{"text":"These early insights help shape the rapport","startTime":42.86,"finishTime":45.099},{"text":"and improve accuracy throughout the interview.","startTime":45.099,"finishTime":47.56}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["wtjktkiARgmbGgGvG","FMvnK5wamMp8B2CNn"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The communication items in Section A can often be completed simply by observing how the individual interacts during normal conversation. Clarity of speech, ability to follow questions, and ability to express needs often become evident as the interview progresses. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Direct questioning is only needed when conversational interaction does not provide enough information. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When communication devices or alternative communication methods are used, interviewers should document them here but remember that these items must be recorded again in the later equipment section. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Finally, cultural and personal comfort preferences should be explored using open, respectful language. These early insights help shape the rapport and improve accuracy throughout the interview.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The communication items in Section A can often be completed simply by observing how the individual interacts during normal conversation. Clarity of speech, ability to follow questions, and ability to express needs often become evident as the interview progresses. \nDirect questioning is only needed when conversational interaction does not provide enough information. \nWhen communication devices or alternative communication methods are used, interviewers should document them here but remember that these items must be recorded again in the later equipment section. \nFinally, cultural and personal comfort preferences should be explored using open, respectful language. These early insights help shape the rapport and improve accuracy throughout the interview.","jobId":"tgMTnDooHNiAYSHfL"}},"XhfnPSS8tZBLiXJB3":{"_id":"XhfnPSS8tZBLiXJB3","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"guZ62owPXgirNTXxG"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"KS6E8n2H6v9ba7Q3R","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"thQLTN2dbvFaSd4Cf","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":54,"captions":[{"text":"Bathing is another area where individuals frequently overstate independence.","startTime":0.129,"finishTime":4.63},{"text":"Many individuals can perform pieces of the task,","startTime":4.969,"finishTime":7.78},{"text":"but require support for safety,","startTime":7.969,"finishTime":10.01},{"text":"balance,","startTime":10.289,"finishTime":10.85},{"text":"or physical assistance.","startTime":10.899000000000001,"finishTime":12.369},{"text":"To gather accurate information,","startTime":13.239,"finishTime":14.71},{"text":"interviewers should ask when the last bath or","startTime":15.68,"finishTime":17.92},{"text":"shower occurred and whether anyone was present.","startTime":17.92,"finishTime":20.739},{"text":"Additional prompts such as who helped with washing or drying,","startTime":21.03,"finishTime":24.219},{"text":"or do you use the shower chair every time,","startTime":24.399,"finishTime":26.7},{"text":"help clarify the level of assistance required.","startTime":26.92,"finishTime":29.319},{"text":"Environmental indicators,","startTime":30.149,"finishTime":31.889},{"text":"grab bars,","startTime":31.94,"finishTime":32.75},{"text":"non-slip mats,","startTime":32.95,"finishTime":33.909},{"text":"handheld showerheads also provide clues about","startTime":34.029,"finishTime":36.909},{"text":"the individual's real bathing routine.","startTime":36.909,"finishTime":38.889},{"text":"Interviewers should quietly observe overall grooming,","startTime":39.81,"finishTime":42.799},{"text":"hair condition,","startTime":43.09,"finishTime":43.86},{"text":"and hygiene.","startTime":44.009,"finishTime":45.009},{"text":"If these observations contradict self-report,","startTime":45.29,"finishTime":47.93},{"text":"both must be documented neutrally and professional","startTime":48.33,"finishTime":51.29},{"text":"judgment must guide the coded response.","startTime":51.29,"finishTime":53.849}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["guZ62owPXgirNTXxG","thQLTN2dbvFaSd4Cf"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Bathing is another area where individuals frequently overstate independence. Many individuals can perform pieces of the task but require support for safety, balance, or physical assistance. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To gather accurate information, interviewers should ask when the last bath or shower occurred and whether anyone was present. Additional prompts such as ‘Who helped with washing or drying?’ or ‘Do you use the shower chair every time?’ help clarify the level of assistance required. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Environmental indicators—grab bars, non‑slip mats, handheld showerheads—also provide clues about the individual’s real bathing routine. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should quietly observe overall grooming, hair condition, and hygiene. If these observations contradict self‑report, both must be documented neutrally, and professional judgment must guide the coded response.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Bathing is another area where individuals frequently overstate independence. Many individuals can perform pieces of the task but require support for safety, balance, or physical assistance. \nTo gather accurate information, interviewers should ask when the last bath or shower occurred and whether anyone was present. Additional prompts such as ‘Who helped with washing or drying?’ or ‘Do you use the shower chair every time?’ help clarify the level of assistance required. \nEnvironmental indicators—grab bars, non‑slip mats, handheld showerheads—also provide clues about the individual’s real bathing routine. \nInterviewers should quietly observe overall grooming, hair condition, and hygiene. If these observations contradict self‑report, both must be documented neutrally, and professional judgment must guide the coded response.","jobId":"zfYj8GF8NwW6ii5so"}},"Z4nwL83ugGsfEDdGY":{"_id":"Z4nwL83ugGsfEDdGY","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ZzMS3ZsqnyWykSdLC"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T14:57:27.194Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"p2SzXJwisRrBY85Rm","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"LuptZCmf52MPANtpm","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0.15822784810126933,"width":100,"height":99.68354430379746}}],"duration":167.1125,"captions":[{"text":"This part of section B focuses on determining whether a health condition","startTime":0.129,"finishTime":3.789},{"text":"meets the threshold for skilled care needs","startTime":3.9699999999999998,"finishTime":6.15},{"text":"and whether the individual is medically stable.","startTime":6.329,"finishTime":9.159},{"text":"These questions are complex and often cannot","startTime":9.489,"finishTime":12.09},{"text":"be answered accurately through interview alone.","startTime":12.09,"finishTime":14.47},{"text":"Medical stability determinations frequently require","startTime":15.55,"finishTime":18.51},{"text":"a review of medical records and","startTime":18.51,"finishTime":20.77},{"text":"in some cases,","startTime":21.03,"finishTime":22.2},{"text":"written physician documentation.","startTime":22.469,"finishTime":24.329},{"text":"Interviewers should not independently declare medical","startTime":24.629,"finishTime":27.35},{"text":"instability based solely on self-report,","startTime":27.35,"finishTime":30.03},{"text":"caregiver concern,","startTime":30.309,"finishTime":31.35},{"text":"or observation without appropriate medical support.","startTime":31.51,"finishTime":34.369},{"text":"Individuals may describe symptoms that sound serious,","startTime":35.11,"finishTime":38.47},{"text":"such as fluctuating blood pressure or unstable diabetes,","startTime":38.63,"finishTime":42.529},{"text":"but these do not automatically indicate","startTime":43.069,"finishTime":45.229},{"text":"medical instability unless a physician has","startTime":45.229,"finishTime":47.549},{"text":"identified the condition as such or","startTime":47.549,"finishTime":49.95},{"text":"unless records clearly support that conclusion.","startTime":49.95,"finishTime":52.77},{"text":"Likewise,","startTime":53.11,"finishTime":53.689},{"text":"individuals may understate symptoms that are clinically significant.","startTime":54.36,"finishTime":57.95},{"text":"The interviewer's role is to gather detailed information about symptoms,","startTime":58.799,"finishTime":62.63},{"text":"frequency,","startTime":62.88,"finishTime":63.659},{"text":"urgency,","startTime":63.86,"finishTime":64.66},{"text":"and interventions,","startTime":64.669,"finishTime":65.87},{"text":"document observations,","startTime":66.08,"finishTime":67.459},{"text":"and clearly note when medical verification is required.","startTime":67.639,"finishTime":70.989},{"text":"When uncertainty exists,","startTime":71.319,"finishTime":72.639},{"text":"the ACAT","startTime":72.76,"finishTime":73.51},{"text":"should reflect that medical records are pending or that physician input is needed.","startTime":73.839,"finishTime":78.51},{"text":"This approach protects both the individual and the integrity of the","startTime":78.839,"finishTime":82.19},{"text":"assessment while ensuring that medical instability","startTime":82.19,"finishTime":84.919},{"text":"is documented accurately and defensively.","startTime":84.919,"finishTime":87.519},{"text":"The interviewer must apply professional judgment","startTime":88.389,"finishTime":91.04},{"text":"rather than relying on diagnosis alone.","startTime":91.04,"finishTime":93.3},{"text":"To guide this judgment,","startTime":94.37,"finishTime":95.65},{"text":"the interviewer should consider 3 key questions.","startTime":95.9,"finishTime":98.8},{"text":"First,","startTime":99.75,"finishTime":100.3},{"text":"does the condition require specialized training to address?","startTime":100.51,"finishTime":103.569},{"text":"Second,","startTime":104.5,"finishTime":105.099},{"text":"would immediate action be necessary if the condition suddenly became worse?","startTime":105.4,"finishTime":109.4},{"text":"And 3rd,","startTime":110.209,"finishTime":111.12},{"text":"is the intervention needed daily or multiple times per week.","startTime":111.33,"finishTime":114.75},{"text":"When documenting information for this section,","startTime":115.569,"finishTime":117.889},{"text":"the interviewer should capture details such as the frequency of wound care,","startTime":118.209,"finishTime":122.129},{"text":"the regularity of incontinence care,","startTime":122.33,"finishTime":124.55},{"text":"any seizure activity that requires rescue medication,","startTime":124.73,"finishTime":127.58},{"text":"and the use of oxygen,","startTime":128.21,"finishTime":129.85},{"text":"suctioning or tube feeding.","startTime":130.21,"finishTime":132.029},{"text":"These items help clarify whether the condition requires skilled involvement.","startTime":132.36,"finishTime":136.49},{"text":"It is important to note that these questions","startTime":137.289,"finishTime":139.49},{"text":"should not be read verbatim to the individual.","startTime":139.49,"finishTime":141.83},{"text":"Many individuals cannot interpret the terminology,","startTime":142.169,"finishTime":145.05},{"text":"and asking them directly could create confusion.","startTime":145.25,"finishTime":148.149},{"text":"Instead,","startTime":148.449,"finishTime":149.05},{"text":"the interviewer should rely on medical records,","startTime":149.289,"finishTime":151.96},{"text":"caregiver input,","startTime":152.25,"finishTime":153.169},{"text":"and observation.","startTime":153.25,"finishTime":154.41},{"text":"Additionally,","startTime":155.21,"finishTime":155.97},{"text":"any complex tasks such as catheter management,","startTime":156.119,"finishTime":159.009},{"text":"tracheostomy care,","startTime":159.169,"finishTime":160.529},{"text":"or nebulizer use","startTime":160.649,"finishTime":162.059},{"text":"must be cross-listed in the equipment and","startTime":162.38,"finishTime":164.57},{"text":"services sections later in the assessment.","startTime":164.57,"finishTime":166.85}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ZzMS3ZsqnyWykSdLC","LuptZCmf52MPANtpm"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"qtQST5hTsNzoFnGQB","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This part of Section B focuses on determining whether a health condition meets the threshold for skilled‑care needs and whether the individual is medically stable. These questions are complex and often cannot be answered accurately through interview alone.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Medical stability determinations frequently require a review of medical records and, in some cases, written physician documentation. Interviewers should not independently declare medical instability based solely on self‑report, caregiver concern, or observation without appropriate medical support.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals may describe symptoms that sound serious, such as fluctuating blood pressure or unstable diabetes, but these do not automatically indicate medical instability unless a physician has identified the condition as such or unless records clearly support that conclusion. Likewise, individuals may understate symptoms that are clinically significant.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer’s role is to gather detailed information about symptoms, frequency, urgency, and interventions; document observations; and clearly note when medical verification is required. When uncertainty exists, the A CAT, should reflect that medical records are pending or that physician input is needed. This approach protects both the individual and the integrity of the assessment while ensuring that medical instability is documented accurately and defensibly.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer must apply professional judgment rather than relying on diagnosis alone.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To guide this judgment, the interviewer should consider three key questions.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"First: Does the condition require specialized training to address?\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Second: Would immediate action be necessary if the condition suddenly became worse?\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"And third: Is the intervention needed daily or multiple times per week?\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When documenting information for this section, the interviewer should capture details such as the frequency of wound care, the regularity of incontinence care, any seizure activity that requires rescue medication, and the use of oxygen, suctioning, or tube feeding. These items help clarify whether the condition requires skilled involvement.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is important to note that these questions should not be read verbatim to the individual. Many individuals cannot interpret the terminology, and asking them directly could create confusion. Instead, the interviewer should rely on medical records, caregiver input, and observation.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Additionally, any complex tasks—such as catheter management, tracheostomy care, or nebulizer use—must be cross‑listed in the equipment and services sections later in the assessment.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This part of Section B focuses on determining whether a health condition meets the threshold for skilled‑care needs and whether the individual is medically stable. These questions are complex and often cannot be answered accurately through interview alone.\nMedical stability determinations frequently require a review of medical records and, in some cases, written physician documentation. Interviewers should not independently declare medical instability based solely on self‑report, caregiver concern, or observation without appropriate medical support.\nIndividuals may describe symptoms that sound serious, such as fluctuating blood pressure or unstable diabetes, but these do not automatically indicate medical instability unless a physician has identified the condition as such or unless records clearly support that conclusion. Likewise, individuals may understate symptoms that are clinically significant.\nThe interviewer’s role is to gather detailed information about symptoms, frequency, urgency, and interventions; document observations; and clearly note when medical verification is required. When uncertainty exists, the A CAT, should reflect that medical records are pending or that physician input is needed. This approach protects both the individual and the integrity of the assessment while ensuring that medical instability is documented accurately and defensibly.\nThe interviewer must apply professional judgment rather than relying on diagnosis alone.\nTo guide this judgment, the interviewer should consider three key questions.\nFirst: Does the condition require specialized training to address?\nSecond: Would immediate action be necessary if the condition suddenly became worse?\nAnd third: Is the intervention needed daily or multiple times per week?\nWhen documenting information for this section, the interviewer should capture details such as the frequency of wound care, the regularity of incontinence care, any seizure activity that requires rescue medication, and the use of oxygen, suctioning, or tube feeding. These items help clarify whether the condition requires skilled involvement.\nIt is important to note that these questions should not be read verbatim to the individual. Many individuals cannot interpret the terminology, and asking them directly could create confusion. Instead, the interviewer should rely on medical records, caregiver input, and observation.\nAdditionally, any complex tasks—such as catheter management, tracheostomy care, or nebulizer use—must be cross‑listed in the equipment and services sections later in the assessment.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"ZXrfPcwmYD6GiuA4X":{"_id":"ZXrfPcwmYD6GiuA4X","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"am2MwzSE7PZsWFiQv"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T15:38:01.551Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ms8YheRywz7hN6MWd","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"fEqNSxkshnoHLg2EF","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.3125,"captions":[{"text":"This training is designed as a practical interviewing guide,","startTime":0.129,"finishTime":3.359},{"text":"not a simple description of what appears on each page of the ACAT.","startTime":3.69,"finishTime":7.09},{"text":"The narration focuses on how to ask the questions,","startTime":7.98,"finishTime":10.729},{"text":"how to interpret responses,","startTime":11.06,"finishTime":12.64},{"text":"and how to handle common challenges such","startTime":12.818999999999999,"finishTime":15.02},{"text":"as conflicting accounts from individuals and caregivers,","startTime":15.02,"finishTime":18.059},{"text":"missing information","startTime":18.42,"finishTime":19.559},{"text":"or misunderstandings of terminology.","startTime":19.739,"finishTime":22.02},{"text":"Because experienced assessors frequently jump","startTime":22.93,"finishTime":25.62},{"text":"between sections during the interview,","startTime":25.62,"finishTime":27.319},{"text":"this training mirrors that approach by showing how","startTime":27.649,"finishTime":30.79},{"text":"information discovered early can affect documentation later.","startTime":30.79,"finishTime":33.79},{"text":"Learners will also see where cross-section","startTime":34.72,"finishTime":36.759},{"text":"consistency is critical and how observation,","startTime":36.759,"finishTime":39.47},{"text":"tone,","startTime":39.84,"finishTime":40.2},{"text":"and conversational flow help interviewers gather","startTime":40.319,"finishTime":42.919},{"text":"accurate information without overwhelming the individual.","startTime":42.919,"finishTime":45.86}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["am2MwzSE7PZsWFiQv","fEqNSxkshnoHLg2EF"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This training is designed as a practical interviewing guide, not a simple description of what appears on each page of the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The narration focuses on how to ask the questions, how to interpret responses, and how to handle common challenges—such as conflicting accounts from individuals and caregivers, missing information, or misunderstandings of terminology. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because experienced assessors frequently jump between sections during the interview, this training mirrors that approach by showing how information discovered early can affect documentation later. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Learners will also see where cross‑section consistency is critical and how observation, tone, and conversational flow help interviewers gather accurate information without overwhelming the individual.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"This training is designed as a practical interviewing guide, not a simple description of what appears on each page of the A CAT. \nThe narration focuses on how to ask the questions, how to interpret responses, and how to handle common challenges—such as conflicting accounts from individuals and caregivers, missing information, or misunderstandings of terminology. \nBecause  Assessors who complete section A through section D of the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This training provides a comprehensive, interviewer‑focused walkthrough of the Adult Comprehensive Assessment Tool, or A, CAT. The goal of this training is to help assessors and service coordinators complete the A CAT, accurately, confidently, and consistently. Throughout the lesson, the narration will focus on real‑world interviewing techniques—how to gather reliable information, how to interpret what is observed, and how to ensure that the final A CAT, reflects the individual’s true support needs.\nClick the button to download a copy of the A CAT. It can be helpful to follow along section by section in this document as the training offers practical guidance on how to complete each section.\nThis Training specifically focuses on Level of Care Assessors who complete section A through section D of the A CAT. ","jobId":"jxN7pMABKQMEzTEAh","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"aZHMyT4JRkYZRfD64":{"_id":"aZHMyT4JRkYZRfD64","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"yCjnKLuMqt9BXD5NE"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T15:32:44.547Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"duration":55.325,"captions":[{"text":"The ACCAT is divided into lettered sections,","startTime":0.09,"finishTime":2.95},{"text":"beginning with section A and ending with section N.","startTime":3.329,"finishTime":6.51},{"text":"Sections A through D are completed by the level of","startTime":7.21,"finishTime":9.729},{"text":"care assessor because they relate directly to determining eligibility.","startTime":9.729,"finishTime":13.63},{"text":"These include demographic information,","startTime":13.97,"finishTime":16.17},{"text":"medical history,","startTime":16.45,"finishTime":17.52},{"text":"diagnoses,","startTime":17.68,"finishTime":18.61},{"text":"and functional performance.","startTime":18.729,"finishTime":20.29},{"text":"Sections E through N are completed by","startTime":21.29,"finishTime":23.45},{"text":"waiver service coordinators and explore resources,","startTime":23.45,"finishTime":26.6},{"text":"caregivers,","startTime":26.889,"finishTime":27.639},{"text":"legal considerations,","startTime":27.819,"finishTime":29.12},{"text":"health screenings,","startTime":29.37,"finishTime":30.2},{"text":"work and school participation,","startTime":30.53,"finishTime":32.52},{"text":"services and supports,","startTime":32.889,"finishTime":34.33},{"text":"equipment,","startTime":34.45,"finishTime":35.08},{"text":"the home environment,","startTime":35.29,"finishTime":36.509},{"text":"and supplemental screening items.","startTime":36.81,"finishTime":38.75},{"text":"Although responsibilities are divided,","startTime":39.619,"finishTime":41.61},{"text":"understanding all sections is beneficial because many responses in one","startTime":42.13,"finishTime":46.099},{"text":"section must logically align with information documented in another.","startTime":46.099,"finishTime":50.52},{"text":"The training today focuses on level of care assessors and sections of through D.","startTime":50.819,"finishTime":55.099}],"overlays":[{"identifier":"2cksZGEiZfBGa4Tu3","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHei ion\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Although responsibilities are divided, understanding all sections is beneficial because many responses in one section must logically align with information documented in another. The training today focuses on level of care assessors and Sections A through D.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The A CAT, is divided into lettered sections, beginning with Section A and ending with Section N. \nSections A through D are completed by the Level of Care Assessor because they relate directly to determining eligibility—these include demographic information, medical history, diagnoses, and functional performance. \nSections E through N are completed by Waiver Service Coordinators and explore resources, caregivers, legal considerations, health screenings, work and school participation, services and supports, equipment, the home environment, and supplemental screening items. \nAlthough responsibilities are divided, understanding all sections is beneficial because many responses in one section must logically align with information documented in another. The training today focuses on level of care assessors and Sections A through D.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"o4AhAmJkmruFnQNgv"}},"bHzTtmQuP3mwM5KJv":{"_id":"bHzTtmQuP3mwM5KJv","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"5xTuKYfgew6rzRKBh"},"dates":{" 9,"finishTime":24.19},{"text":"appointment cards,","startTime":24.28,"finishTime":25.239},{"text":"or discharge summaries,","startTime":25.479,"finishTime":27.04},{"text":"because self-report is often incomplete or inaccurate.","startTime":27.29,"finishTime":30.489},{"text":"Section B relies heavily on observation,","startTime":31.479,"finishTime":33.95},{"text":"collateral information,","startTime":34.24,"finishTime":35.439},{"text":"and professional judgment,","startTime":35.52,"finishTime":37.159},{"text":"and it often requires the interviewer to return","startTime":37.36,"finishTime":40},{"text":"to certain items later once verification is available.","startTime":40,"finishTime":43.06},{"text":"A great tip is to add medical equipment and","startTime":43.909,"finishTime":46.279},{"text":"incontinence supply companies the member utilizes into the pharmacy section","startTime":46.279,"finishTime":50.759},{"text":"inside of section B as this makes it easier","startTime":50.759,"finishTime":52.939},{"text":"to document and reference these providers in future sections.","startTime":52.939,"finishTime":56.36}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["5xTuKYfgew6rzRKBh","q4yTEgQb5n96wAjeP"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Now the training shifts into Section B, which contains the most medically detailed sections of the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This section includes physician information, diagnoses, medications, and health‑related questions that require a high degree of accuracy and verification. \",\"type\":\"text\",\"version\":1}],\ pe":"continue","rotationAngle":0}],"duration":30.15,"captions":[{"text":"The training now begins with Section A of the ACA.","startTime":0.09,"finishTime":2.96},{"text":"Although Section A appears straightforward,","startTime":3.569,"finishTime":5.909},{"text":"with demographic information,","startTime":6.05,"finishTime":7.849},{"text":"language needs,","startTime":8.17,"finishTime":9.159},{"text":"cultural preferences,","startTime":9.369,"finishTime":10.67},{"text":"and the list of people participating in the interview,","startTime":10.85,"finishTime":13.56},{"text":"this section contains some of the most commonly missed items.","startTime":13.93,"finishTime":17.209},{"text":"The narration will walk through how to collect this information accurately,","startTime":18.059,"finishTime":21.889},{"text":"how to avoid skipping embedded checkboxes,","startTime":22.26,"finishTime":24.659},{"text":"and how to gather early insights that prepare","startTime":24.93,"finishTime":27.34},{"text":"the interviewer for later parts of the assessment.","startTime":27.34,"finishTime":29.86}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["QCscyK4FxKbFRGKgu","jLTC9h8sQuBdDjBeq"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The training now begins with Section A of the A CAT. Although Section A appears straightforward—with demographic information, language needs, cultural preferences, and the list of people participating in the interview—this section contains some of the most commonly missed items. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The narration will walk through how to collect this inf Left":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"KnkPpEonWpq9oH2td","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":103.025,"captions":[{"text":"Many portions of section provide early clues about how well","startTime":0.14,"finishTime":3.41},{"text":"the individual completes tasks documented later in the ACCAT.","startTime":3.41,"finishTime":6.76},{"text":"For example,","startTime":7.36,"finishTime":8.119},{"text":"difficulties with medication management may signal a need for","startTime":8.42,"finishTime":11.93},{"text":"assistance with complex tasks in the IADL section.","startTime":11.93,"finishTime":15.93},{"text":"To gather accurate information,","startTime":16.809,"finishTime":18.659},{"text":"interviewers should listen for functional indicators embedded","startTime":19.18,"finishTime":22.139},{"text":"in the individual's description of their health.","startTime":22.139,"finishTime":24.53},{"text":"Confusion about medications,","startTime":24.86,"finishTime":26.45},{"text":"difficulty attending appointments,","startTime":26.659,"finishTime":28.399},{"text":"or trouble managing treatments often reveals underlying cognitive,","startTime":28.42,"finishTime":32.279},{"text":"mobility or organizational challenges.","startTime":32.38,"finishTime":35.06},{"text":"If there are discrepancies between what the","startTime":35.889,"finishTime":38.13},{"text":"individual reports and what caregivers describe,","startTime":38.13,"finishTime":40.709},{"text":"both must be documented neutrally.","startTime":41.069,"finishTime":43.15},{"text":"These differences are important because they may","startTime":43.49,"finishTime":45.7},{"text":"indicate emerging medical instability or functional decline.","startTime":45.7,"finishTime":49.25},{"text":"Another important part of Section B involves","startTime":50.02,"finishTime":52.54},{"text":"collecting information about recent emergency room visits,","startTime":52.54,"finishTime":55.529},{"text":"hospital admissions,","startTime":55.83,"finishTime":56.889},{"text":"and skilled facility stays.","startTime":56.979,"finishTime":58.77},{"text":"These events are often difficult for individuals to recall in detail,","startTime":59.099,"finishTime":62.86},{"text":"so the interviewer should expect approximate dates and,","startTime":62.979,"finishTime":66.199},{"text":"when necessary,","startTime":66.379,"finishTime":67.22},{"text":"document estimated entries,","startTime":67.739,"finishTime":69.44},{"text":"noting clearly that the information is approximate.","startTime":69.739,"finishTime":72.419},{"text":"It is common for individuals to confuse","startTime":73.269,"finishTime":75.47},{"text":"urgent care visits with emergency department visits","startTime":75.47,"finishTime":78.37},{"text":"or to misinterpret overnight observation as a full admission.","startTime":78.55,"finishTime":82.209},{"text":"Clarifying questions such as,","startTime":82.589,"finishTime":84.11},{"text":"did you stay overnight and where did you go for that visit","startTime":84.19,"finishTime":87.11},{"text":"can help differentiate these settings.","startTime":87.269,"finishTime":89.129},{"text":"Caregivers frequently provide more accurate timelines","startTime":90.04,"finishTime":93.08},{"text":"and their input should be recorded when available.","startTime":93.279,"finishTime":95.83},{"text":"These utilization patterns help identify trends in medical","startTime":96.16,"finishTime":99.5},{"text":"instability and guide follow-up in later sections.","startTime":99.5,"finishTime":102.76}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["mRSmCMp7Y6PEkidCk","KnkPpEonWpq9oH2td"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many portions of Section B provide early clues about how well the individual completes tasks documented later in the A CAT. For example, difficulties with medication management may signal a need for assistance with complex tasks in the I A D L section. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To gather accurate information, interviewers should listen for functional indicators embedded in the individual’s description of their health. Confusion about medications, difficulty attending appointments, or trouble managing treatments often reveals underlying cognitive, mobility, or organizational challenges. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If there are discrepancies between what the individual reports and what caregivers describe, both must be documented neutrally. These differences are important because they may indicate emerging medical instability or functional decline.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Another important part of Section B involves collecting information about recent emergency room visits, hospital admissions, and skilled‑facility stays. These events are often difficult for individuals to recall in detail, so the interviewer should expect approximate dates and, when necessary, document estimated entries, noting clearly that the information is approximate. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is common for individuals to confuse urgent care visits with emergency department visits, or to misinterpret overnight observation as a full admission. Clarifying questions such as ‘Did you stay overnight?’ and ‘Where did you go for that visit?’ can help differentiate these settings. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers frequently provide more accurate timelines, and their input should be recorded when available. These utilization patterns help identify trends in medical instability and guide follow‑up in later sections.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Many portions of Section B provide early clues about how well the individual completes tasks documented later in the A CAT. For example, difficulties with medication management may signal a need for assistance with complex tasks in the I A D L section. \nTo gather accurate information, interviewers should listen for functional indicators embedded in the individual’s description of their health. Confusion about medications, difficulty attending appointments, or trouble managing treatments often reveals underlying cognitive, mobility, or organizational challenges. \nIf there are discrepancies between what the individual reports and what caregivers describe, both must be documented neutrally. These differences are important because they may indicate emerging medical instability or functional decline.\nAnother important part of Section B involves collecting information about recent emergency room visits, hospital admissions, and skilled‑facility stays. These events are often difficult for individuals to recall in detail, so the interviewer should expect approximate dates and, when necessary, document estimated entries, noting clearly that the information is approximate. \nIt is common for individuals to confuse urgent care visits with emergency department visits, or to misinterpret overnight observation as a full admission. Clarifying questions such as ‘Did you stay overnight?’ and ‘Where did you go for that visit?’ can help differentiate these settings. \nCaregivers frequently provide more accurate timelines, and their input should be recorded when available. These utilization patterns help identify trends in medical instability and guide follow‑up in later sections.","jobId":"Stb5pRtT2LuvdTwLw","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"coytzZuQM7SMgbzAx":{"_id":"coytzZuQM7SMgbzAx","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"qLuW7NN3vaDgqAmZb"},"dates":{"dateCreated":"2026-03-20T14:57:27.195Z","dateModified":"2026-03-20T14:57:27.195Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Z92RgYJMarvNSN8nt","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"RZtNAixEyEDbhyRNj","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":61.45,"captions":[{"text":"Section B includes several items related to skilled nursing needs,","startTime":0.209,"finishTime":3.769},{"text":"and these questions often require the interviewer to","startTime":3.9699999999999998,"finishTime":6.559},{"text":"apply judgment rather than rely on clinical terminology.","startTime":6.559,"finishTime":10.189},{"text":"Many individuals describe conditions that sound serious,","startTime":10.568999999999999,"finishTime":13.59},{"text":"but do not actually require skilled intervention.","startTime":13.729,"finishTime":16.549},{"text":"For example,","startTime":16.809,"finishTime":17.639},{"text":"fluctuating blood pressure or unstable diabetes may be clinically significant,","startTime":17.889,"finishTime":22.889},{"text":"but unless they require immediate or specialized treatment,","startTime":23.129,"finishTime":26.68},{"text":"they do not qualify as skilled needs.","startTime":27.01,"finishTime":29.17},{"text":"On the other hand,","startTime":30.069,"finishTime":30.85},{"text":"individuals may understate symptoms that do require skilled support,","startTime":31.51,"finishTime":34.889},{"text":"such as recurrent seizures or respiratory conditions","startTime":35.27,"finishTime":38.069},{"text":"that involve suctioning or oxygen titration.","startTime":38.069,"finishTime":40.75},{"text":"To complete this section accurately,","startTime":41.619,"finishTime":43.43},{"text":"the interviewer must evaluate not just the diagnosis itself,","startTime":43.75,"finishTime":47.169},{"text":"but the frequency,","startTime":47.669,"finishTime":48.77},{"text":"urgency,","startTime":48.95,"finishTime":49.709},{"text":"and type of intervention the condition requires.","startTime":49.72,"finishTime":52.61},{"text":"Whenever uncertainty arises,","startTime":52.909,"finishTime":54.659},{"text":"caregiver input,","startTime":54.95,"finishTime":56.009},{"text":"medical records,","startTime":56.349,"finishTime":57.259},{"text":"and observation all help determine the correct classification.","startTime":57.31,"finishTime":61.189}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["qLuW7NN3vaDgqAmZb","RZtNAixEyEDbhyRNj"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section B includes several items related to skilled nursing needs, and these questions often require the interviewer to apply judgement rather than rely on clinical terminology. Many individuals describe conditions that sound serious but do not actually require skilled intervention. For example, fluctuating blood pressure or unstable diabetes may be clinically significant, but unless they require immediate or specialized treatment, they do not qualify as skilled needs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"On the other hand, individuals may understate symptoms that do require skilled support, such as recurrent seizures or respiratory conditions that involve suctioning or oxygen titration. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To complete this section accurately, the interviewer must evaluate not just the diagnosis itself, but the frequency, urgency, and type of intervention the condition requires. Whenever uncertainty arises, caregiver input, medical records, and observation all help determine the correct classification.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section B includes several items related to skilled nursing needs, and these questions often require the interviewer to apply judgement rather than rely on clinical terminology. Many individuals describe conditions that sound serious but do not actually require skilled intervention. For example, fluctuating blood pressure or unstable diabetes may be clinically significant, but unless they require immediate or specialized treatment, they do not qualify as skilled needs. \nOn the other hand, individuals may understate symptoms that do require skilled support, such as recurrent seizures or respiratory conditions that involve suctioning or oxygen titration. \nTo complete this section accurately, the interviewer must evaluate not just the diagnosis itself, but the frequency, urgency, and type of intervention the condition requires. Whenever uncertainty arises, caregiver input, medical records, and observation all help determine the correct classification.","jobId":"MWTjurjkpskFqDzRH"}},"dAgs2boeiC3Fp57bm":{"_id":"dAgs2boeiC3Fp57bm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"kx7L76jkofLe7ARJC"},"dates":{"dateCreated":"2026-03-20T15:20:20.866Z","dateModified":"2026-03-20T15:20:57.541Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"uxe5dupTpH3kYmAHF","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"tY7mXXhcunpCSjb2W","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":47.0875,"captions":[{"text":"One of the most important responsibilities","startTime":0.129,"finishTime":2.25},{"text":"in Section D is ensuring that functional","startTime":2.25,"finishTime":4.53},{"text":"limitations acquired later in life are","startTime":4.53,"finishTime":7.09},{"text":"not mistakenly labeled as developmental disabilities.","startTime":7.09,"finishTime":10.229},{"text":"Conditions such as stroke,","startTime":11.119,"finishTime":12.52},{"text":"dementia,","startTime":12.729,"finishTime":13.289},{"text":"or traumatic brain injury may produce lifelong support needs,","startTime":13.439,"finishTime":17.09},{"text":"but they do not qualify under developmental disability","startTime":17.329,"finishTime":20.129},{"text":"criteria if they occurred after age 22.","startTime":20.129,"finishTime":22.989},{"text":"To avoid misclassification,","startTime":23.84,"finishTime":25.7},{"text":"the interviewer should ask whether challenges","startTime":25.959,"finishTime":28.239},{"text":"were present during childhood or adolescence","startTime":28.239,"finishTime":30.799},{"text":"and confirm whether a doctor or school","startTime":30.959,"finishTime":33.479},{"text":"professional ever described them as long-term conditions.","startTime":33.479,"finishTime":36.56},{"text":"Accurately distinguishing early onset challenges","startTime":37.49,"finishTime":40.099},{"text":"from later life conditions ensures","startTime":40.099,"finishTime":42.06},{"text":"the assessment remains clinically sound","startTime":42.06,"finishTime":44.119},{"text":"and supports appropriate service pathways.","startTime":44.119,"finishTime":46.959}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["kx7L76jkofLe7ARJC","tY7mXXhcunpCSjb2W"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"One of the most important responsibilities in Section D is ensuring that functional limitations acquired later in life are not mistakenly labeled as developmental disabilities. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Conditions such as stroke, dementia, or traumatic brain injury may produce lifelong support needs, but they do not qualify under developmental disability criteria if they occurred after age twenty‑two. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To avoid misclassification, the interviewer should ask whether challenges were present during childhood or adolescence and confirm whether a doctor or school professional ever described them as long‑term conditions. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Accurately distinguishing early‑onset challenges from later‑life conditions ensures the assessment remains clinically sound and supports appropriate service pathways.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"One of the most important responsibilities in Section D is ensuring that functional limitations acquired later in life are not mistakenly labeled as developmental disabilities. \nConditions such as stroke, dementia, or traumatic brain injury may produce lifelong support needs, but they do not qualify under developmental disability criteria if they occurred after age twenty‑two. \nTo avoid misclassification, the interviewer should ask whether challenges were present during childhood or adolescence and confirm whether a doctor or school professional ever described them as long‑term conditions. \nAccurately distinguishing early‑onset challenges from later‑life conditions ensures the assessment remains clinically sound and supports appropriate service pathways.","jobId":"9SbtDMuWBFr8zfg3m"}},"fFxJ2Dkds6BfSBjhS":{"_id":"fFxJ2Dkds6BfSBjhS","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"h5WRiGQAPZqcfhThy"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T14:57:27.194Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"HZkz6FPWK9n9Q2Shz","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"zSRwuHKGhPx9KNk53","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":53.8,"captions":[{"text":"Observation is a core component of accurate ADL","startTime":0.129,"finishTime":3.609},{"text":"and IADL documentation.","startTime":3.73,"finishTime":6.119},{"text":"Many functional limitations appear naturally during conversation","startTime":6.449,"finishTime":10.119},{"text":"without the individual realizing they are demonstrating them.","startTime":10.529,"finishTime":13.25},{"text":"For example,","startTime":14.149,"finishTime":14.979},{"text":"difficulty standing,","startTime":15.189,"finishTime":16.469},{"text":"shifting position,","startTime":16.629,"finishTime":17.7},{"text":"or following a sequence of questions may indicate mobility or cognitive barriers.","startTime":17.829,"finishTime":22.809},{"text":"An unsteady gait,","startTime":23.069,"finishTime":24.069},{"text":"tremors,","startTime":24.19,"finishTime":24.75},{"text":"poor hygiene,","startTime":24.92,"finishTime":25.729},{"text":"or a hesitant response to routine tasks can all provide valuable clues.","startTime":25.829,"finishTime":30.35},{"text":"Interviewers should also pay attention to environmental indicators,","startTime":31.149,"finishTime":34.93},{"text":"mobility devices situated near frequently used furniture,","startTime":35.009,"finishTime":38.369},{"text":"grab bars installed in the bathroom,","startTime":38.79,"finishTime":40.97},{"text":"or cluttered areas that restrict movement.","startTime":41.15,"finishTime":43.509},{"text":"These observations must be recorded alongside verbal responses","startTime":44.419,"finishTime":48.11},{"text":"and help ensure Section C aligns with the","startTime":48.31,"finishTime":50.43},{"text":"medical information documented earlier in Section B.","startTime":50.43,"finishTime":53.549}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["h5WRiGQAPZqcfhThy","zSRwuHKGhPx9KNk53"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"hp4bwEoK38vGe7ZwY","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Observation is a core component of accurate A D L and I A D L documentation. Many functional limitations appear naturally during conversation, without the individual realizing they are demonstrating them. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For example, difficulty standing, shifting position, or following a sequence of questions may indicate mobility or cognitive barriers. An unsteady gait, tremors, poor hygiene, or a hesitant response to routine tasks can all provide valuable clues. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should also pay attention to environmental indicators—mobility devices situated near frequently used furniture, grab bars installed in the bathroom, or cluttered areas that restrict movement. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These observations must be recorded alongside verbal responses and help ensure Section C aligns with the medical information documented earlier in Section B.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Observation is a core component of accurate A D L and I A D L documentation. Many functional limitations appear naturally during conversation, without the individual realizing they are demonstrating them. \nFor example, difficulty standing, shifting position, or following a sequence of questions may indicate mobility or cognitive barriers. An unsteady gait, tremors, poor hygiene, or a hesitant response to routine tasks can all provide valuable clues. \nInterviewers should also pay attention to environmental indicators—mobility devices situated near frequently used furniture, grab bars installed in the bathroom, or cluttered areas that restrict movement. \nThese observations must be recorded alongside verbal responses and help ensure Section C aligns with the medical information documented earlier in Section B.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"gtg7G7fm6SnStu5SC":{"_id":"gtg7G7fm6SnStu5SC","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"jm45jwBJWzvrmEWhg"},"dates":{"dateCreated":"2026-03-20T14:57:27.194Z","dateModified":"2026-03-20T14:57:27.194Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"JP4BcGYdDgyptiTxy","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"BqK7ejnXzKejyg6vZ","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.2,"captions":[{"text":"At the conclusion of section C,","startTime":0.119,"finishTime":1.85},{"text":"the interviewer should have a detailed","startTime":2.1189999999999998,"finishTime":4.17},{"text":"understanding of the individual's daily functioning,","startTime":4.17,"finishTime":6.55},{"text":"supported by examples,","startTime":6.809,"finishTime":8.05},{"text":"observations,","startTime":8.25,"finishTime":9.17},{"text":"and caregiver accounts.","startTime":9.25,"finishTime":10.689},{"text":"The ADL and IADL findings must align with information collected in the medical,","startTime":11.52,"finishTime":17.219},{"text":"caregiver,","startTime":17.6,"finishTime":18.18},{"text":"and environmental sections.","startTime":18.239,"finishTime":19.87},{"text":"Any inconsistencies should either be resolved through follow-up","startTime":20.19,"finishTime":23.62},{"text":"questions or clearly documented as differing perspectives.","startTime":23.62,"finishTime":26.799},{"text":"Section C serves as a cornerstone for level of care determination","startTime":27.829,"finishTime":31.36},{"text":"by describing how the individual manages daily life in real terms.","startTime":31.36,"finishTime":35.25},{"text":"With functional assessment complete,","startTime":36.13,"finishTime":37.869},{"text":"the training will now transition into section D,","startTime":38.29,"finishTime":40.93},{"text":"which examines whether the individual","startTime":41.169,"finishTime":43.27},{"text":"meets the criteria for a developmental disability","startTime":43.409,"finishTime":46.27},{"text":"and how long-standing functional limitations may have originated.","startTime":46.49,"finishTime":49.93}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["jm45jwBJWzvrmEWhg","BqK7ejnXzKejyg6vZ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"At the conclusion of Section C, the interviewer should have a detailed understanding of the individual’s daily functioning—supported by examples, observations, and caregiver accounts. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The A D L and I A D L findings must align with information collected in the medical, caregiver, and environmental sections. Any inconsistencies should either be resolved through follow‑up questions or clearly documented as differing perspectives. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section C serves as a cornerstone for Level of Care determination by describing how the individual manages daily life in real terms. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"With functional assessment complete, the training will now transition into Section D, which examines whether the individual meets the criteria for a developmental disability and how long‑standing functional limitations may have originated.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"At the conclusion of Section C, the interviewer should have a detailed understanding of the individual’s daily functioning—supported by examples, observations, and caregiver accounts. \nThe A D L and I A D L findings must align with information collected in the medical, caregiver, and environmental sections. Any inconsistencies should either be resolved through follow‑up questions or clearly documented as differing perspectives. \nSection C serves as a cornerstone for Level of Care determination by describing how the i
