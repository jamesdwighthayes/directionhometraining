oice and payment information ensures that irregularities are identified before transactions are approved. ","voiceCode":"en-US-BrianNeural","language":"en","originalResourceId":"KLK9NHSyerXzWmieY","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-BrianNeural\">Accounts payable processes are frequently targeted by fraud due to the routine nature of invoice handling and payment processing. Indicators of fraudulent activity may include invoices with altered details, unexpected changes to payment instructions, or inconsistencies when compared to prior transactions. Additional warning signs include unfamiliar vendors, duplicate invoices, or documentation that does not align with known records. Careful review of all invoice and payment information ensures that irregularities are identified before transactions are approved. \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Accounts payable processes are frequently targeted by fraud due to","startTime":0.009,"finishTime":3.799},{"text":"the routine nature of invoice handling and payment processing.","startTime":3.799,"finishTime":6.96},{"text":"Indicators of fraudulent activity may include invoices with altered details,","startTime":7.25,"finishTime":11.52},{"text":"unexpected changes to payment instructions,","startTime":11.89,"finishTime":14.319},{"text":"or inconsistencies when compared to prior transactions.","startTime":14.689,"finishTime":17.84},{"text":"Additional warning signs include unfamiliar vendors.","startTime":18.09,"finishTime":21.17},{"text":"Duplicate invoices,","startTime":21.68,"finishTime":23.03},{"text":"or documentation that does not align with known records.","startTime":23.04,"finishTime":26.2},{" , and external partners to investigate and contain the impact. This scenario highlights the importance of verifying financial requests at every stage, even when they appear routine. ","voiceCode":"en-US-BrianNeural","language":"en","originalResourceId":"uqHHsejEgZvbt5gu4","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-BrianNeural\">This section introduces a real-world financial fraud incident that demonstrates how targeted attacks can impact financial operations. The incident involved an email-based request to update vendor banking information. The communication appeared legitimate and aligned with normal business processes. As a result, the request advanced through standard workflows without immediate detection of any irregularities. Multiple payments were processed to an unauthorized account before the issue was identified. The discovery required coordination across financial leadership, IT, and external partners to investigate and contain the impact. This scenario highlights the importance of verifying financial requests at every stage, even when they appear routine. \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"This section introduces a real world financial fraud incident","startTime":0.009,"finishTime":3.41},{"text":"that demonstrates how targeted attacks can impact financial operations.","startTime":3.41,"finishTime":7.36},{"text":"The incident involved an email-based request","startTime":7.6899999999999995,"finishTime":10.289},{"text":"to update vendor banking information.","startTime":10.289,"finishTime":12.359},{"text":"The communication appeared legitimate and","startTime":12.649000000000001,"finishTime":14.81},{"text":"aligned with normal busines ritical vulnerability occurred when verification relied","startTime":25.11,"finishTime":28.11},{"text":"on information provided within the email itself,","startTime":28.11,"finishTime":30.569},{"text":"rather than through independently verified contact channels,","startTime":31.35,"finishTime":34.4},{"text":"because the issue was not immediately identified,","startTime":34.79,"finishTime":37.549},{"text":"multiple transactions were completed before escalation occurred.","startTime":38.069,"finishTime":41.47},{"text":"This reinforces the need for independent verification","startTime":41.84,"finishTime":44.97},{"text":"and strict adherence to established control procedures.","startTime":44.97,"finishTime":47.93}]}},"nckghmeTucCQtFsmy":{"_id":"nckghmeTucCQtFsmy","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":169863,"uploadedFileName":"14_Stage-2-Sender-and-Domain-Verification.png","height":1095,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-05-27T12:30:20.469Z","dateModified":"2026-05-27T12:30:20.469Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"ksJTttcwc34hNWBuP","thumbnail":"kHs4dZRC6eMEsd2oT"},"oshdGvkA7TBNdbrDs":{"_id":"oshdGvkA7TBNdbrDs","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":979776,"uploadedFileName":"Brian-en-ReportingandContainment-5272026.mp3","uploadedFileNameExtension":".mp3","duration":40.7875},"dates":{"dateCreated":"2026-05-27T14:10:39.721Z","dateModified":"2026-05-27T14:10:43.359Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"When a financial request appears suspicious or inconsistent with standard procedures, immediate containment actions are required. All activity associated with the request must stop, and the communication must be submitted to IT through the helpdesk system for formal review. The original email must be preserved and submitted in its native format to support accurate analysis. Confirmation must also be provided that no links were selected and no attachments were opened prior to submission. Prompt reporting and proper documentation enable security personnel to assess the situation quickly and determine whether further action is necessary to protect organizational systems and financial resources. ","voiceCode":"en-US-BrianNeural","language":"en","originalResourceId":"2cKFzuZyFo3XK6YgA","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-BrianNeural\">When a financial request appears suspicious or inconsistent with standard procedures, immediate containment actions are required. All activity associated with the request must stop, and the communication must be submitted to IT through the helpdesk system for formal review. The original email must be preserved and submitted in its native format to support accurate analysis. Confirmation must also be provided that no links were selected and no attachments were opened prior to submission. Prompt reporting and proper documentation enable security personnel to assess the situation quickly and determine whether further action is necessary to protect organizational systems and financial resources. \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"When a financial request appears suspicious","startTime":0.05,"finishTime":2.39},{"text":"or inconsistent with standard procedures,","startTime":2.39,"finishTime":4.84},{"text":"immediate containment actions are required.","startTime":5.409,"finishTime":7.559},{"text":"All activity associated with the request must stop.","startTime":7.849,"finishTime":10.63},{"text":"And the communication must be submitted to IT","startTime":11.109,"finishTime":13.67},{"text":"through the help desk system for formal review.","startTime":13.67,"finishTime":15.939},{"text":"The original email must be preserved and submitted","startTime":16.229,"finishTime":18.909},{"text":"in its native format to support accurate analysis.","startTime":18.909,"finishTime":21.86},{"text":"Confirmation must also be provided that no links were","startTime":22.19,"finishTime":25.1},{"text":"selected and no attachments were opened prior to submission.","startTime":25.1,"finishTime":28.379},{"text":"Prompt reporting and proper documentation enable security personnel","startTime":28.75,"finishTime":32.49},{"text":"to assess the situation quickly and determine whether further action","startTime":32.668,"finishTime":36.31},{"text":"is necessary to protect organizational systems and financial resources.","startTime":36.31,"finishTime":40.47}]}},"pFr27ogZW8XmFwDnH":{"_id":"pFr27ogZW8XmFwDnH","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1603902,"uploadedFileName":"21_Payment-Changes-and-Banking-Detail-Risks.png","height":951,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-05-27T12:30:21.126Z","dateModified":"2026-05-27T12:30:21.126Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"3QBibNsyZTvWdn3Jx","thumbnail":"zvsY4yZF6JuyzK7fC"},"raAAQ55epcSSbuzg6":{"_id":"raAAQ55epcSSbuzg6","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/pn ails, or maintaining accurate financial records. These disruptions may affect vendors, service providers, and individuals who rely on consistent payment processing. Extended disruption may also introduce compliance concerns and reputational risk if financial obligations cannot be fulfilled as expected. Recognizing these potential impacts highlights the importance of maintaining secure and resilient financial operations.","voiceCode":"en-US-BrianNeural","language":"en","originalResourceId":"BmABfXwFbqbHiDDux","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-BrianNeural\">Operational disruption caused by cybersecurity events can have widespread impact beyond the Financial Services Division. Inability to access financial systems may prevent the organization from issuing timely payments, verifying transaction details, or maintaining accurate financial records. These disruptions may affect vendors, service providers, and individuals who rely on consistent payment processing. Extended disruption may also introduce compliance concerns and reputational risk if financial obligations cannot be fulfilled as expected. Recognizing these potential impacts highlights the importance of maintaining secure and resilient financial operations.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Operational disruption caused by cybersecurity events can have","startTime":0.009,"finishTime":3.65},{"text":"widespread impact beyond the financial services division.","startTime":3.65,"finishTime":6.869},{"text":"Inability to access financial systems may prevent","startTime":7.17,"finishTime":9.97},{"text":"the organization from issuing timely payments,","startTime":9.97,"finishTime":12.6},{"text":"verifying transaction details,","startTime":12.93,"finishTime":14.92},{"text":"or maintaining accurate financial records.","startTime":15.289,"finishTime":17.559},{"text":"These disruptions may affect vendors,","startTime":17.85,"finishTime":19.879},{"text":"service providers,","startTime":20.37,"finishTime":21.399},{"text":"and individuals who rely on consistent payment processing.","startTime":21.649,"finishTime":24.93},{"text":"Extended disruption may also introduce","startTime":25.27,"finishTime":27.549},{"text":"compliance concerns and reputational risk","startTime":27.549,"finishTime":30.129},{"text":"if financial obligations cannot be fulfilled as expected.","startTime":30.309,"finishTime":33.819},{"text":"Recognizing these potential impacts highlights the importance","startTime":34.15,"finishTime":37.369},{"text":"of maintaining secure and resilient financial operations.","startTime":37.369,"finishTime":40.709}]}},"tETvANP52MuvrxYjF":{"_id":"tETvANP52MuvrxYjF","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1148536,"uploadedFileName":"13_Stage-1-Initial-Red-Flag-Assessment.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-05-27T12:30:20.534Z","dateModified":"2026-05-27T12:30:20.534Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"2X7RyvE6E2cpm8Ewc","thumbnail":"Rz7AJA4bQ6es8RcoA"},"u5mtPd3PXRTBK8prR":{"_id":"u5mtPd3PXRTBK8prR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":102948,"uploadedFileName":"12_Email-Legitimacy-Review-Process.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-05-27T12:30:20.255Z","dateModified":"2026-05-27T12:30:20.255Z"},"users":{"_userCreatorID": l processes involve multiple individuals, each responsible for different stages of the transaction. One individual initiates the request, while another independently verifies and approves it. By separating responsibilities, the organization ensures that no single individual has full control over a financial transaction. This structure introduces oversight and reduces the risk of error, manipulation, or unauthorized activity.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Segregation of duties is an essential internal control that","startTime":0.209,"finishTime":3.529},{"text":"reduces the likelihood of fraudulent or unauthorized transactions.","startTime":3.529,"finishTime":7.4},{"text":"This control requires that financial processes involve multiple individuals,","startTime":7.73,"finishTime":12.329},{"text":"each responsible for different stages of the transaction.","startTime":12.729,"finishTime":15.76},{"text":"One individual initiates the request","startTime":16.129,"finishTime":18.659},{"text":"while another independently verifies and approves it.","startTime":18.93,"finishTime":21.93},{"text":"By separating responsibilities,","startTime":22.29,"finishTime":24.12},{"text":"the organization ensures that no single individual","startTime":24.409,"finishTime":27.329},{"text":"has full control over a financial transaction.","startTime":27.329,"finishTime":30.19},{"text":"This structure introduces oversight and reduces the risk of error,","startTime":30.489,"finishTime":34.319},{"text":"manipulation,","startTime":34.689,"finishTime":35.61},{"text":"or unauthorized activity.","startTime":35.97,"finishTime":37.689}]}},"uJb3NJcYDMjatZr8D":{"_id":"uJb3NJcYDMjatZr8D","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":927465,"uploadedFileName":"5_How-Legitimate-Processes-Were-Exploited.png","height":1058,"uploadedFileNameExtension":".png","width":1680 ds or manipulate financial data. Fraud attempts are often designed to align with normal workflows, particularly those involving accounts payable, vendor onboarding, and banking changes. By mimicking legitimate activity, attackers reduce the likelihood of detection. Periods of increased transaction volume, such as payroll processing or month-end close, may weaken the ability to identify irregularities due to time pressures and workload demands. Understanding the elevated risk associated with financial operations reinforces the importance of following verification procedures consistently and without exception. ","voiceCodeUsed":"en-US-BrianNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"PCiw6eASCZm4Gz5aF"}},"Jc8awiqayucffXfao":{"_id":"Jc8awiqayucffXfao","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"KXqNTuoPvpd3dXgJn"},"dates":{"dateCreated":"2026-05-27T12:31:09.727Z","dateModified":"2026-05-27T14:36:03.171Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"rjcMk5P4cRXB5Jd76","kind":"overlay","type":"rectangle","width":1280,"height":854.0952380952381,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"vDXChQfQvtDMSFsoH","isRat "}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["WihE8BpJk2Cu5mv54","vTbQchWuPi5bwfhCd"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Prompt reporting and escalation are critical components of effective fraud prevention and response. Any suspicious communication, unusual financial request, or potential fraud indicator must be reported immediately through established organizational channels, including submission to IT through the helpdesk system. Financial staff must not proceed with any transaction until the request has been validated through the appropriate review process. Timely reporting enables designated personnel to investigate, contain potential threats, and prevent further financial or data loss, reinforcing the importance of immediate action when concerns arise. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-BrianNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Prompt reporting and escalation are critical components of effective fraud prevention and response. Any suspicious communication, unusual financial request, or potential fraud indicator must be reported immediately through established organizational channels, including submission to IT through the helpdesk system. Financial staff must not proceed with any transaction until the request has been validated through the appropriate review process. Timely reporting enables designated personnel to investigate, contain potential threats, and prevent further financial or data loss, reinforcing the importance of immediate action when concerns arise. ","voiceCodeUsed":"en-US-BrianNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"Ljre6PvbMLjSRf7mE"}},"f3eGxXm8xcpkYbskL":{"_id":"f3eGxXm8xcpkYbskL","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Learning Objectives Review","upload":"6zERPaKDCCuzNqaNj"},"dates":{"dateCreated":"2026-05-27T16:06:15.746Z","dateModified":"2026-05-27T16:08:05.907Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"p7Ntw3tzM3GKwYtSr","kind":"overlay","type":"rectangle","width":1148,"height":750.3000000000001,"x":0,"y":-24,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"QgwZ5KuMxS4DovJWG","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":71.6625,"captions":[{"text":"This lesson reinforces several key principles","startTime":0.05,"finishTime":2.89},{"text":"that support secure financial operations.","startTime":2.89,"finishTime":5.36},{"text":"Financial fraud most often targets routine processes,","startTime":5.73,"finishTime":8.93},{"text":"particularly those involving payments,","startTime":9.369,"finishTime":11.05},{"text":"vendor management,","startTime":11.159,"finishTime":12.029},{"text":"and accounts payable activities,","startTime":12.409,"finishTime":14.229},{"text":"because these workflows occur regularly,","startTime":14.609,"finishTime":16.639},{"text":"they provide opportunities for deceptive requests","startTime":16.969,"finishTime":19.649},{"text":"to be introduced without immediate detection.","startTime":19.649,"finishTime":21.969},{"text":"Recognition of warning signs is essential and must","startTime":22.379,"finishTime":25.379},{"text":"occur before any financial action is taken.","startTime":25.379,"finishTime":27.93},{"text":"Even routine requests must be evaluated carefully to ensure","startTime":28.25,"finishTime":31.76},{"text":"that they align with expected patterns and procedures.","startTime":31.76,"finishTime":34.65},{"text":"All financial changes,","startTime":34.939,"finishTime":36.459},{"text":"especially those involving banking information,","startTime":36.9,"finishTime":39.36},{"text":"must be independently verified through established methods.","startTime":39.779,"finishTime":42.97},{"text":"Email communication alone is not sufficient to validate a request","startTime":43.299,"finishTime":46.959},{"text":"and introduces significant risk if relied upon without additional confirmation.","startTime":46.959,"finishTime":51.22},{"text":"Sensitive financial data must also be handled securely at all times,","startTime":51.669,"finishTime":55.659},{"text":"ensuring that appropriate systems and controls","startTime":56,"finishTime":58.36},{"text":"are used for storage and transmission.","startTime":58.36,"finishTime":60.47},{"text":"Finally,","startTime":60.819,"finishTime":61.349},{"text":"any suspicious activity must be reported immediately,","startTime":61.68,"finishTime":64.709},{"text":"and no financial action should proceed until the request","startTime":65.04,"finishTime":67.94},{"text":"has been fully validated through the appropriate review process.","startTime":67.94,"finishTime":71.36}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["6zERPaKDCCuzNqaNj","QgwZ5KuMxS4DovJWG"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"38CxgJvkjmPJdPF5w","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This lesson reinforces several key principles that support secure financial operations. Financial fraud most often targets routine processes, particularly those involving payments, vendor management, and accounts payable activities. Because these workflows occur regularly, they provide opportunities for deceptive requests to be introduced without immediate detection. Recognition of warning signs is essential and must occur before any financial action is taken. Even routine requests must be evaluated carefully to ensure that they align with expected patterns and procedures. All financial changes, especially those involving banking information, must be independently verified through established methods. Email communication alone is not sufficient to validate a request and introduces significant risk if relied upon without additional confirmation. Sensitive financial data must also be handled securely at all times, ensuring that appropriate systems and controls are used for storage and transmission. Finally, any suspicious activity must be reported immediately, and no financial action should proceed until the request has been fully validated through the appropriate review process.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-BrianNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This lesson reinforces several key principles that support secure financial operations. Financial fraud most often targets routine processes, particularly those involving payments, vendor management, and accounts payable activities. Because these workflows occur regularly, they provide opportunities for deceptive requests to be introduced without immediate detection. Recognition il legitimacy","startTime":37.669,"finishTime":41.15},{"text":"review process prior to taking action on financial communications,","startTime":41.15,"finishTime":44.61},{"text":"reinforcing a structured and controlled approach to decision making.","startTime":44.95,"finishTime":48.31},{"text":"In addition,","startTime":48.63,"finishTime":49.38},{"text":"the lesson reinforces the importance of secure handling of financial data,","startTime":49.59,"finishTime":53.659},{"text":"including information that is subject to privacy and regulatory requirements.","startTime":54.15,"finishTime":58.22},{"text":"Finally,","startTime":58.63,"finishTime":59.139},{"text":"staff are expected to demonstrate appropriate reporting and","startTime":59.52,"finishTime":62.43},{"text":"escalation behaviors when suspicious activity is encountered,","startTime":62.43,"finishTime":66.01},{"text":"ensuring that potential risks are addressed promptly and effectively.","startTime":66.379,"finishTime":69.79}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["w2o4Ds6d6o45Gzzjo","KtfuqSSHzbN82DEcx"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This lesson establishes the core competencies required to identify and prevent financial fraud within Financial Services operations. At its conclusion, Financial Services staff are expected to recognize common fraud tactics that target payment processes, vendor relationships, and accounts payable workflows. This includes identifying warning signs within emails, invoices, and other financial communications that may indicate deceptive activity. The lesson also emphasizes the consistent application of verification controls, ensuring that no financial transaction or change is processed without proper validation. Staff are expected to follow the established Email Legitimacy Review process prior to taking a tion occurred. This reinforces the need for independent verification and strict adherence to established control procedures. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-BrianNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This incident demonstrates that financial fraud does not require system compromise to be successful. Instead, attackers often exploit trust in established business processes. The communication used in this event appeared consistent with previous vendor interactions, which allowed it to pass initial review. The request followed a familiar pattern, reducing suspicion and increasing the likelihood of approval. A critical vulnerability occurred when verification relied on information provided within the email itself, rather than through independently verified contact channels. Because the issue was not immediately identified, multiple transactions were completed before escalation occurred. This reinforces the need for independent verification and strict adherence to established control procedures. ","voiceCodeUsed":"en-US-BrianNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"uNMZqbxBM3CjnGKeg"}},"uqHHsejEgZvbt5gu4":{"_id":"uqHHsejEgZvbt5gu4","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"PWoNtRaQKs8u2ddsr"},"dates":{"dateCreated":"2026-05-27T12:30:52.746Z","dateModified":"2026-05-27T14:36:00.541Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"W5DPBo5BNnv8v8jty","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500}," 709,"finishTime":37.939},{"text":"This scenario highlights the importance of","startTime":38.229,"finishTime":40.33},{"text":"verifying financial requests at every stage,","startTime":40.33,"finishTime":43.13},{"text":"even when they appear routine.","startTime":43.509,"finishTime":45.029}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["PWoNtRaQKs8u2ddsr","6ZfjicZajNe6dQYFj"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This section introduces a real-world financial fraud incident that demonstrates how targeted attacks can impact financial operations. The incident involved an email-based request to update vendor banking information. The communication appeared legitimate and aligned with normal business processes. As a result, the request advanced through standard workflows without immediate detection of any irregularities. Multiple payments were processed to an unauthorized account before the issue was identified. The discovery required coordination across financial leadership, IT, and external partners to investigate and contain the impact. This scenario highlights the importance of verifying financial requests at every stage, even when they appear routine. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-BrianNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This section introduces a real-world financial fraud incident that demonstrates how targeted attacks can impact financial operations. The incident involved an email-based request to update vendor banking information. The communication appeared legitimate and aligned with normal business processes. As a result, the requ
