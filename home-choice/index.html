fits","startTime":33.409,"finishTime":36.409},{"text":"Long-term Services and supports agencies in the state.","startTime":36.409,"finishTime":39.72},{"text":"Finally,","startTime":40.09,"finishTime":40.63},{"text":"they must be able to have their care needs supported by community-based services.","startTime":40.77,"finishTime":44.669}]}},"AAjDNLkGaZHRn8mGu":{"_id":"AAjDNLkGaZHRn8mGu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1651392,"uploadedFileName":"Ava-en-TransitioningwithMyCareWaiver-322026.mp3","uploadedFileNameExtension":".mp3","duration":68.775},"dates":{"dateCreated":"2026-03-02T19:26:16.786Z","dateModified":"2026-03-02T19:26:19.985Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The Transition Coordinator submits a request for Community Transition Services funds by emailing the Waiver Community Transition Services Authorization Template (ODM form 10253) to the Mycare ohio plan identified contact. MyCare ohio plan staff communicates directly with the Transition Coordinator regarding any questions or need for additional information. The MyCare ohio plan staff will indicate approval or denial for each item, initialing the approval, and enter date of approval for each item. Date of approval is included. The Reviewed Template will be returned to the assigned Transition Coordinator who will begin purchasing approved items. The Transition Coordinator will update the Template with purchase dates and actual amounts for each item. Once information is entered for all approved items, the Transition Coordinator will resubmit updated Template with receipts attached. MyCare plan will review receipts to confirm total is correct, add it to their WSP and sign date and add authorization number to final Community Transition Services form and return to the form to the Transition Coordinator.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"iobjGuohny5mJG3fD","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">The Transition Coordinator submits a request for Community Transition Services funds by emailing the Waiver Community Transition Services Authorization Template (ODM form 10253) to the Mycare ohio plan identified contact. MyCare ohio plan staff communicates directly with the Transition Coordinator regarding any questions or need for additional information. The MyCare ohio plan staff will indicate approval or denial for each item, initialing the approval, and enter date of approval for each item. Date of approval is included. The Reviewed Template will be returned to the assigned Transition Coordinator who will begin purchasing approved items. The Transition Coordinator will update the Template with purchase dates and actual amounts for each item. Once information is entered for all approved items, the Transition Coordinator will resubmit updated Template with receipts attached. MyCare plan will review receipts to confirm total is correct, add it to their WSP and sign date and add authorization number to final Community Transition Services form and return to the form to the Transition Coordinator.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"The transition coordinator submits a request for Community Transition Services","startTime":0.119,"finishTime":4.369},{"text":"funds by emailing the waiver","startTime":4.369,"finishTime":6.139},{"text":"Community Transition Services authorization template,","startTime":6.139,"finishTime":9.029},{"text":"ODM Form 1  applied, had a HOME Choice assessment, and approved for the program they are enrolled for a period of up to 180 days and a Transition Coordinator is assigned. Once the individual moves to the community, the Transition Coordinator continues to follow the individual for an additional 30 days to ensure all the services needed are set up. Important to note, HOME Choice is a one-time program.  Once an individual successfully transitions to the community using the program, they are not eligible to participate again. When an individual is enrolled and has challenges with their transition, the Transition Coordinator closely monitors progress and will close the case during the pre-transition phase of the program if a transition is not possible.  The individual can re-apply to participate in the program when circumstances change (i.e., health improves, they come to the top of a waiting list for an apartment, etc.).","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"uALegncKvrM6bD5Ti","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Once an individual has applied, had a HOME Choice assessment, and approved for the program they are enrolled for a period of up to 180 days and a Transition Coordinator is assigned. Once the individual moves to the community, the Transition Coordinator continues to follow the individual for an additional 30 days to ensure all the services needed are set up. Important to note, HOME Choice is a one-time program.  Once an individual successfully transitions to the community using the program, they are not eligible to participate again. When an individual is enrolled and has challenges with their transition, the Transition Coordinator closely monitors progress and will close the case during the pre-transition phase of the program if a transition is not possible.  The individual can re-apply to participate in the program when circumstances change (i.e., health improves, they come to the top of a waiting list for an apartment, etc.).</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Once an individual has applied,","startTime":0.17,"finishTime":1.96},{"text":"had a home choice assessment,","startTime":2.21,"finishTime":3.509},{"text":"and approved for the program,","startTime":3.769,"finishTime":5.17},{"text":"they're enrolled for a period of up to 180 days,","startTime":5.25,"finishTime":8.55},{"text":"and a transition coordinator is assigned.","startTime":8.77,"finishTime":11.47},{"text":"Once the individual moves to the community,","startTime":11.77,"finishTime":13.88},{"text":"the transition coordinator continues to follow the individual for an additional","startTime":14.13,"finishTime":18.04},{"text":"30 days to ensure all the services needed are set up.","startTime":18.04,"finishTime":21.6},{"text":"Important to note,","startTime":21.889,"finishTime":22.889},{"text":"Home Choice is a one-time program.","startTime":23.29,"finishTime":25.35},{"text":"Once an individual successfully transitions to the community using the program,","startTime":25.92,"finishTime":30.26},{"text":"they are not eligible to participate again.","startTime":30.59,"finishTime":33.13},{"text":"When an individual is enrolled and has challenges with their transition,","startTime":33.43,"finishTime":37.06},{"text":"The transition coordinator closely monitors progress","startTime":37.279,"finishTime":40.54},{"text":"and will close the case during","startTime":40.54,"finishTime":42.04},{"text":"the pre-transition phase of the program if a transition is not possible.","startTime":42.04,"finishTime":46.229},{"text":"The individual can reapply to participate","startTime":46.56,"finishTime":48.72},{"text":"in the program when circumstances change,","startTime":48.72,"finishTime":50.939},{"text":"i.e.,","startTime":51.34,"finishTime":51.869},{"text":"health improves.","startTime":52.08,"finishTime":52.99},{"text":"They come to the top of a waiting list for an apartment,","startTime":53.319,"finishTime":55.959},{"text":"etc.","startTime":56.069,"finishTime":56.72}]}},"EQpT7ukpzpwi839KH":{"_id":"EQpT7ukpzpwi839KH","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":21633,"uploadedFileName":"image.png","height":48,"uploadedFileNameExtension":".png","width":1437},"dates":{"dateCreated":"2026-03-02T18:09:42.241Z","dateModified":"2026-03-02T18:09:42.241Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"N6zE4PakGJJFQiiid","thumbnail":"LZwKCrhYCDSdi5CZD"},"FofGZRccFghMMAfq3":{"_id":"FofGZRccFghMMAfq3","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1628928,"uploadedFileName":"Ava-en-MemberMeetsWaiverLOC-322026.mp3","uploadedFileNameExtension":".mp3","duration":67.825},"dates":{"dateCreated":"2026-03-02T19:20:12.811Z","dateModified":"2026-03-02T19:20:15.552Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"When the member is discharged from the nursing facility or hospital, the MyCare Ohio Plan and the Transition Coordinator continue working closely together. Their shared responsibility at this stage is to review the discharge plan, communicate regularly, and ensure the member experiences no gaps in services as they settle into the community.\nBefore the 30th day after discharge, the Transition Coordinator must submit the final Waiver CTS Authorization Template along with all receipts to the MyCare Ohio Plan. This documentation confirms what was purchased and ensures the plan has everything needed to process reimbursement.\nOnce the plan receives the invoice and supporting receipts, it is responsible for reimbursing all approved Community Transition Services. Importantly, reimbursement can only occur on or after the member’s discharge date, because that date also becomes the official CTS service date. These steps complete the financial portion of the transition process and help ensure the member has the resources needed for a safe and successful move into the community.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"BLjCRaRa92DuxHYES","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">When the member is discharged from the nursing facility or hospital, the MyCare Ohio Plan and the Transition Coordinator continue working closely together. Their shared responsibility at this stage is to review the discharge plan, communicate regularly, and ensure the member experiences no gaps in services as they settle into the community.<break time=\"0.5s\"/>Before the 30th day after discharge, the Transition Coordinator must submit the final Waiver CTS Authorization Template along with all receipts to the MyCare Ohio Plan. This documentation confirms what was purchased and ensures the plan has everything needed to process reimbursement.<break time=\"0.5s\"/>Once the plan receives the invoice and supporting receipts, it is responsible for reimbursing all approved Community Transition Services. Importantly, reimbursement can only occur on or after the member’s discharge date, because that date also becomes the official CTS service date. These steps complete the financial portion of the transition process and help ensure the member has the resources needed for a safe and successful move into the community.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"When the member is discharged from the nursing facility or hospital,","startTime":0.129,"finishTime":3.69},{"text":"the MyCare Ohio plan and the","startTime":4.01,"finishTime":5.969},{"text":"transition coordinator continue working closely together.","startTime":5.969,"finishTime":9.77},{"text":"Their shared responsibility at this stage is to review the discharge plan,","startTime":10.09,"finishTime":14.05},{"text":"communicate regularly,","startTime":14.21,"finishTime":15.609},{"text":"and ensure the member experiences no gaps in","startTime":15.85,"finishTime":18.69},{"text":"services as they settle into the community.","startTime":18.69,"finishTime":21.069},{"text":"Before the 30th day after discharge,","startTime":22.059,"finishTime":24.19},{"text":"the transition coordinator must submit","startTime":24.489,"finishTime":26.79},{"text":"the final waiver CTS authorization template","startTime":26.79,"finishTime":29.61},{"text":"along with all receipts to the MyCare Ohio plan.","startTime":29.829,"finishTime":32.979},{"text":"This documentation confirms what was purchased and ensures","startTime":33.27,"finishTime":36.669},{"text":"the plan has everything needed to process reimbursement.","startTime":36.669,"finishTime":39.869},{"text":"Once the plan receives the invoice and supporting receipts,","startTime":40.779,"finishTime":43.97},{"text":"it is responsible for reimbursing all approved community transition services.","startTime":44.169,"finishTime":48.869},{"text":"Importantly,","startTime":49.169,"finishTime":49.919},{"text":"reimbursement can only occur on or after the member's discharge date","startTime":50.08,"finishTime":54.259},{"text":"because that date also becomes the official CTS service date.","start es or apartments – either alone or in with friends or family members. Over 30% of transitions in 2025 were to homes that were leased or owned by the individual participant, family or friends. The program also assists with transitions to Assisted Living Facilities. Individuals can also participate in HOME Choice even if they have housing to return to as they may have other obstacles requiring the assistance of a transition coordinator. There are some settings that do not meet the requirements: Transitioning to shelters or hotels; Transitioning from one Nursing Facility to another; Transitioning from one Assisted Living facility to another – since residing in an Assisted Living facility is considered a community placement.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"The Home Choice program can assist individuals","startTime":0.05,"finishTime":2.609},{"text":"with transitions to homes or apartments,","startTime":2.609,"finishTime":5.17},{"text":"either alone or in with friends or family members.","startTime":5.329,"finishTime":8.59},{"text":"Over 30% of transitions in 2025 were to homes","startTime":8.85,"finishTime":12.689},{"text":"that were leased or owned by the individual participant,","startTime":12.689,"finishTime":15.81},{"text":"family or friends.","startTime":16.25,"finishTime":17.53},{"text":"The program also assists with transitions to assisted living facilities.","startTime":17.93,"finishTime":22.399},{"text":"Individuals can also participate in Home Choice,","startTime":22.729,"finishTime":25.25},{"text":"even if they have housing to return to,","startTime":25.37,"finishTime":27.049},{"text":"as they may have other obstacles requiring","startTime":27.129,"finishTime":29.209},{"text":"the assistance of a transition coordinator.","startTime":29.209,"finishTime":31.709},{"text":"There are some settings that do not.","startTime":31.969,"finishTime":33.33},{"text":"Meet the requirements","startTime":33.54,"finishTime":3 prompt":"HOME Choice Community Transition Staff involves Four roles, two at the Ohio Department of Medicaid and two at contracted agencies. HOME Choice Intake Coordinators work at the Ohio Department of Medicaid. They review applications for initial eligibility, provide technical assistance, respond to inquiries, and provide overall support to the HOME Choice application, assessment, and enrollment processes. HOME Choice assessors from Ohio Benefits Long-Term Services and Supports network agencies throughout the state complete HOME Choice assessments and make a recommendation as to whether an applicant has community-living potential. Completed assessments are reviewed by Community Living Administrators at ODM and they make the HOME Choice enrollment decision. Case consultation & other approvals. Transition Coordinators are from 2 contracted agencies: CareStar & National Church Residences.\nRoles that support the overall function of the program include the following. The Project Director, whose responsibilities include managing grant requirements, budgeting, program direction & management, monitoring policy and working to implement changes as they arise. The Housing Manager who works to support both the MFP specific network, as well as the overall Medicaid networks. The Data Reporting Manager who completes CMS required reporting, completes data management & analysis. And Lastly, the Education & Outreach Manager who works to raise program awareness and connect with many of our stakeholders, provides information sessions, designs, develops and implements training and education sessions, develops communication around program updates.\n","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"H68pstcTpSgQzRTvM","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"e ishTime":65.949},{"text":"program direction and management,","startTime":66.4,"finishTime":68.23},{"text":"monitoring policy and working to implement changes as they arise.","startTime":68.51,"finishTime":72.62},{"text":"The housing manager who works to support both the MFP specific network,","startTime":72.959,"finishTime":77.26},{"text":"as well as the overall Medicaid networks,","startTime":77.5,"finishTime":80.26},{"text":"the data reporting manager who completes.","startTime":80.519,"finishTime":82.72},{"text":"EMS required reporting completes data management and analysis.","startTime":82.824,"finishTime":87.205},{"text":"And lastly,","startTime":87.464,"finishTime":88.324},{"text":"the education and outreach manager who works to raise","startTime":88.425,"finishTime":92.065},{"text":"program awareness and connect with many of our stakeholders,","startTime":92.065,"finishTime":95.364},{"text":"provides information sessions,","startTime":95.785,"finishTime":97.324},{"text":"designs,","startTime":97.665,"finishTime":98.205},{"text":"develops and implements training and education sessions,","startTime":98.495,"finishTime":101.964},{"text":"develops communication around program updates.","startTime":102.544,"finishTime":105.224}]}},"zwMf5YX396pKk8X7F":{"_id":"zwMf5YX396pKk8X7F","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1224576,"uploadedFileName":"Ava-en-MemberDoesNotMeetLOC-322026.mp3","uploadedFileNameExtension":".mp3","duration":50.9875},"dates":{"dateCreated":"2026-03-02T19:21:24.108Z","dateModified":"2026-03-02T19:21:26.029Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"When a member is assessed and does not meet the waiver Level of Care, the MyCare Ohio Plan still plays an important role in supporting their successful transition back into the community. In these situations, the plan must incorporate the individual’s HOME Choice goals and transition activities into their individualized care plan. This ensures that the member’s transition needs remain visible, prioritized, and actively addressed even without waiver involvement.\nAdditionally, once the member returns to the community, the MyCare Ohio Plan and the Transition Coordinator must connect within 30 calendar days. This follow‑up communication is essential to confirm that the member’s needs are being met, that they are settling safely into the community, and that any remaining gaps in services or supports are quickly identified and resolved.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"RFr6QyBS7SkRQiCbS","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">When a member is assessed and does not meet the waiver Level of Care, the MyCare Ohio Plan still plays an important role in supporting their successful transition back into the community. In these situations, the plan must incorporate the individual’s HOME Choice goals and transition activities into their individualized care plan. This ensures that the member’s transition needs remain visible, prioritized, and actively addressed even without waiver involvement.<break time=\"0.5s\"/>Additionally, once the member returns to the community, the MyCare Ohio Plan and the Transition Coordinator must connect within 30 calendar days. This follow‑up communication is essential to confirm that the member’s needs are being met, that they are settling safely into the community, and that any remaining gaps in services or supports are quickly identified and resolved.</voice>\n  assessments and make a recommendation as to whether an applicant has community-living potential. Completed assessments are reviewed by Community Living Administrators at ODM and they make the HOME Choice enrollment decision. Case consultation & other approvals. Transition Coordinators are from 2 contracted agencies: CareStar & National Church Residences.\nRoles that support the overall function of the program include the following. The Project Director, whose responsibilities include managing grant requirements, budgeting, program direction & management, monitoring policy and working to implement changes as they arise. The Housing Manager who works to support both the MFP specific network, as well as the overall Medicaid networks. The Data Reporting Manager who completes CMS required reporting, completes data management & analysis. And Lastly, the Education & Outreach Manager who works to raise program awareness and connect with many of our stakeholders, provides information sessions, designs, develops and implements training and education sessions, develops communication around program updates.\n","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"QRWni9ZyJSrbJu6Tz"}},"PoEwjxkcBodod563R":{"_id":"PoEwjxkcBodod563R","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"mtX7oH7BiXY9HGnzF"},"dates":{"dateCreated":"2026-03-02T17:59:42.459Z","dateModified":"2026-03-02T19:35:04.355Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"g4rC5tzc6Xakv967Y","kind":"overlay","type":"rectangle","width":1280,"height":718.4401114206129,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","
