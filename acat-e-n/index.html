ould connect back to the","startTime":36.209,"finishTime":38.84},{"text":"eating and swallowing information documented in Section C.","startTime":38.84,"finishTime":42.549}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["RAy82vPsyJ3c2BdqG","BvJAQuiNscXx2Feph"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Nutrition screening is most effective when the interviewer focuses on specific behaviors rather than broad questions. Many individuals will say they ‘eat fine,’ even when appetite has decreased or meals are irregular. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking about what a typical day of eating looks like, whether meals are ever skipped, or whether appetite has changed helps uncover meaningful information. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When individuals do not recognize that weight loss, reduced appetite, or difficulty preparing meals is significant, caregiver input becomes especially valuable. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any mention of choking, coughing, or avoiding certain foods should connect back to the eating and swallowing information documented in Section C.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Nutrition screening is most effective when the interviewer focuses on specific behaviors rather than broad questions. Many individuals will say they ‘eat fine,’ even when appetite has decreased or meals are irregular. \nAsking about what a typical day of eating looks like, whether meals are ever skipped, or whether appetite has changed helps uncover meaningful information. \nWhen individuals do not recognize that weight loss, reduced appetite, or difficulty preparing meals is significant, caregiver input becomes especially valuable. \nAny mention of choking, coughing, or avoiding certain foods should connect back to the eating and swallowing information documented in Section C.","jobId":"wYzHsRvHXukqnNp8y"}},"wHfdvm4b3sgCpnTdX":{"_id":"wHfdvm4b3sgCpnTdX","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"D3yWQjcfRRmiy5Dav"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"miZEGyzvaZubaACKX","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roun ,"assets":["D3yWQjcfRRmiy5Dav","W8D9rcb3zywAYsjTr"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"ZLu5BDagS4bgz8cET","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The A CAT, is the standardized instrument used by the Ohio Department of Medicaid to determine whether an individual meets the criteria for a Level of Care. The tool brings together information about medical needs, functional limitations, social supports, environmental risks, and behavioral or cognitive challenges. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Rather than serving as a checklist alone, the A CAT, guides the interviewer in forming a complete understanding of how the individual functions day to day. The information collected here sets the foundation for eligibility decisions, service planning, and long‑term care coordination. Because of this, the quality of the interview directly affects the quality of downstream supports.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The A CAT, is the standardized instrument used by the Ohio Department of Medicaid to determine whether an individual meets the criteria for a Level of Care. The tool brings together information about medical needs, functional limitations, social supports, environmental risks, and behavioral or cognitive challenges. \nRather than serving as a checklist alone, the A CAT, guides the interviewer in forming a complete understanding of how the iguration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If a caregiver provided significant details about medications, daily routines, or safety issues, that caregiver should appear in Section A as an information source—even if they participated informally or only intermittently. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This transparency helps explain areas where the individual’s account and caregiver account differ, and it ensures that later reviewers understand the context behind each entry. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Documenting sources clearly is especially important when discrepancies arise. By noting which information came from direct observation, which came from the individual, and which came from caregivers, the interviewer creates a professionally grounded, defensible assessment.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"During the final review, the interviewer must also confirm that the sources of information listed in Section A accurately reflect who contributed to each part of the assessment. \nIf a caregiver provided significant details about medications, daily routines, or safety issues, that caregiver should appear in Section A as an information source—even if they participated informally or only intermittently. \nThis transparency helps explain areas where the individual’s account and caregiver account differ, and it ensures that later reviewers understand the context behind each entry. \nDocumenting sources clearly is especially important when discrepancies arise. By noting which information came from direct observation, which came from the individual, and which came from caregivers, the interviewer creates a professionally grounded, defensible assessment.","jobId":"d9WZZAgpazXkmnY6B"}},"xPW8Y48bYmsJKbpMy":{"_id":"xPW8Y48bYmsJKbpMy","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"xLprwyjpywaQnZScc"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"4n9ZsFmQurZKs2sSb","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"ehMkJCMqP8RQ4tHiL","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":40.525,"captions":[{"t ives in the home, while the caregiver might identify someone entirely different—such as an adult child who checks in daily or manages appointments. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To clarify roles, the interviewer should ask practical questions such as, ‘Who helps you most often?’ or ‘Who steps in if something unexpected happens?’ \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is also important to document secondary supports, even when a single person provides most of the care. These details help create a complete picture of the support network and its reliability.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"One of the interviewer’s key responsibilities in Section F is determining who the primary caregiver actually is. \nThe individual may list someone who lives in the home, while the caregiver might identify someone entirely different—such as an adult child who checks in daily or manages appointments. \nTo clarify roles, the interviewer should ask practical questions such as, ‘Who helps you most often?’ or ‘Who steps in if something unexpected happens?’ \nIt is also important to document secondary supports, even when a single person provides most of the care. These details help create a complete picture of the support network and its reliability.","jobId":"gXPBSwH3vaykqyJHL"}},"xuZoMpYt6BtA6w98d":{"_id":"xuZoMpYt6BtA6w98d","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ZtLJ5yKdjfCEGHCc6"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"jKfWQ97XBHNWbNpYo","kind":"overlay","type":"rectangle","width":1151,"height":752.260714285714,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"k7HRq9hFZeP9mdqws","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":45.625,"captions":[{"text":"Section L focuses on the individual's home","startTime":0.209,"finishTime":2.779},{"text":"environment and the safety of that environment.","startTime":2.779,"finishTime":5.349},{"text":"Unlike earlier sections that rely primarily on interview responses,","startTime":5.6899999999999995,"finishTime":9.72},{"text":"section L is driven by what the interviewer observes firsthand.","startTime":10.01,"finishTime":13.63},{"text":"Many people become so accustomed to their home setup","startTime":14.779,"finishTime":17.639},{"text":"that they no longer recognize hazards or accessibility challenges.","startTime":17.639,"finishTime":21.34},{"text":"Because of this,","startTime":21.819,"finishTime":22.569},{"text":"the interviewer must be attentive and","startTime":22.819,"finishTime":24.899},{"text":"methodical during the environmental review.","startTime":24.899,"finishTime":27.28},{"text":"This section links directly to mobility findings from Section C,","startTime":28.139,"finishTime":31.659},{"text":"equipment in Section K,","startTime":31.86,"finishTime":33.38},{"text":"and service gaps identified in Section J.","startTime":33.619,"finishTime":36.52},{"text":"A home that does not support an individual's","startTime":36.819,"finishTime":38.979},{"text":"functional and health needs can significantly increase risk,","startTime":38.979,"finishTime":42.319},{"text":"making Section L an essential part of the ACCAT.","startTime":42.54,"finishTime":45.299}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ZtLJ5yKdjfCEGHCc6","k7HRq9hFZeP9mdqws"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section L focuses on the individual’s home environment and the safety of that environment. Unlike earlier sections that rely primarily on interview responses, Section L is driven by what the interviewer observes firsthand. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many people become so accustomed to their home setup that they no longer recognize hazards or accessibility challenges. Because of this, the interviewer must be attentive and methodical during the environmental review. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This section links directly to mobility findings from Section C, equipment in Section K, and service gaps identified in Section J. A home that does not support an individual’s functional and health needs can significantly increase risk, making Section L an essential part of the A CAT.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section L focuses on the individual’s home environment and the safety of that environment. Unlike earlier sections that rely primarily on interview responses, Section L is driven by what the interviewer observes firsthand. \nMany people become so accustomed to their home setup that they no longer recognize hazards or accessibility challenges. Because of this, the interviewer must be attentive and methodical during the environmental review. \nThis section links directly to mobility findings from Section C, equipment in Section K, and service gaps identified in Section J. A home that does not support an individual’s functional and health needs can significantly increase risk, making Section L an essential part of the A CAT.","jobId":"FxpfPSRDfitQMshuh"}},"zMGmeYsg4RnWJyLHz":{"_id":"zMGmeYsg4RnWJyLHz","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"fQY7nQkdYpA4ZbHiQ"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"qn6vH5c8tdB3LSGs6","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"aQPNtyfQ2qGMTMHdN","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":122.5,"captions":[{"text":"This section of the assessment focuses on behavioral concerns that","startTime":0.129,"finishTime":3.3689999999999998},{"text":"may influence safety or the level of support required.","startTime":3.3689999999999998,"finishTime":6.559},{"text":"These issues often do not emerge through direct questioning.","startTime":6.929,"finishTime":10.31},{"text":"Instead,","startTime":10.568999999999999,"finishTime":11.21},{"text":"they surface indirectly during conversation,","startTime":11.369,"finishTime":13.34},{"text":"through observation or through caregiver descriptions.","startTime":14.05,"finishTime":17.35},{"text":"Because of this,","startTime":17.809,"finishTime":18.59},{"text":"interviewers must remain attentive to subtle","startTime":19.09,"finishTime":21.159},{"text":"indicators throughout the entire assessment.","startTime":21.159,"finishTime":23.569},{"text":"Wandering is one of the most critical behavioral risks to identify.","startTime":24.569,"finishTime":28.579},{"text":"Leaving the home without awareness or purpose creates immediate safety concerns","startTime":28.92,"finishTime":33.439},{"text":"and should be documented carefully when observed or reported.","startTime":33.68,"finishTime":36.959},{"text":"Agitation is another behavioral pattern to note,","startTime":37.729,"finishTime":40.709},{"text":"particularly when escalating frustration or","startTime":41.159,"finishTime":43.56},{"text":"aggression affects care interactions or","startTime":43.56,"finishTime":46.09},{"text":"the individual's ability to participate safely in daily tasks.","startTime":46.09,"finishTime":49.849},{"text":"Hoarding or cluttering behaviors may also appear.","startTime":50.759,"finishTime":53.58},{"text":"Accumulation of items can create significant environmental hazards,","startTime":53.84,"finishTime":57.779},{"text":"as well as hygiene or mobility concerns,","startTime":57.959,"finishTime":60.74},{"text":"and must be documented when present.","startTime":60.959,"finishTime":63.08},{"text":"Impulsive decisions such as unsafe choices","startTime":63.919,"finishTime":66.879},{"text":"or difficulty following instructions signal impaired judgment","startTime":66.879,"finishTime":70.8},{"text":"and can put the individual at risk of injury or medical complications.","startTime":70.8,"finishTime":74.94},{"text":"Rather than using clinical phrasing,","startTime":75.809,"finishTime":77.69},{"text":"interviewers should ask questions in everyday language,","startTime":78.169,"finishTime":81.01},{"text":"such as,","startTime":81.019,"finishTime":81.559},{"text":"have there been situations where others were worried about your safety,","startTime":81.809,"finishTime":85.11},{"text":"or do reminders help you stay on track with daily tasks?","startTime":85.25,"finishTime":88.72},{"text":"These approaches help gather accurate information","startTime":89.089,"finishTime":91.73},{"text":"without causing confusion or discomfort.","startTime":91.73,"finishTime":94.01},{"text":"Behavioral findings must also align with other sections of the ACAT.","startTime":94.919,"finishTime":98.639},{"text":"Environmental concerns identified in Section L","startTime":99.5,"finishTime":102.54},{"text":"and safety or medical stability concerns captured in Section B","startTime":102.739,"finishTime":106.62},{"text":"should connect with these behavioral observations.","startTime":106.94,"finishTime":109.379},{"text":"Interviewers should document specific examples provided","startTime":110.19,"finishTime":113.309},{"text":"by caregivers or observed firsthand,","startTime":113.309,"finishTime":115.569},{"text":"ensuring that the assessment presents a clear and accurate","startTime":116.069,"finishTime":119.08},{"text":"picture of how behavior affects safety and care needs.","startTime":119.08,"finishTime":122.37}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["fQY7nQkdYpA4ZbHiQ","aQPNtyfQ2qGMTMHdN"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This section of the assessment focuses on behavioral concerns that may influence safety or the level of support required. These issues often do not emerge through direct questioning. Instead, they surface indirectly during conversation, through observation, or through caregiver descriptions. Because of this, interviewers must remain attentive to subtle indicators throughout the entire assessment.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Wandering is one of the most critical behavioral risks to identify. Leaving the home without awareness or purpose creates immediate safety concerns and should be documented carefully when observed or reported.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Agitation is another behavioral pattern to note, particularly when escalating frustration or aggression affects care interactions or the individual’s ability to participate safely in daily tasks.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Hoarding or cluttering behaviors may also appear. Accumulation of items can create significant environmental hazards, as well as hygiene or mobility concerns, and must be documented when present.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Impulsive decisions—such as unsafe choices or difficulty following instructions—signal impaired judgment and can put the individual at risk of injury or medical complications.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Rather than using clinical phrasing, interviewers should ask questions in everyday language, such as, ‘Have there been situations where others were worried about your safety?’ or ‘Do reminders help you stay on track with daily tasks?’ These approaches help gather accurate information without causing confusion or discomfort.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Behavioral findings must also align with other sections of the A CAT.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Environmental concerns identified in Section L, and safety or medical‑stability concerns captured in Section B, should connect with these behavioral observations.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should document specific examples provided by caregivers or observed firsthand, ensuring that the assessment presents a clear and accurate picture of how behavior affects safety and care needs.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This section of the assessment focuses on behavioral concerns that may influence safety or the level of support required. These issues often do not emerge through direct questioning. Instead, they surface indirectly during conversation, through observation, or through caregiver descriptions. Because of this, interviewers must remain attentive to subtle indicators throughout the entire assessment.\nWandering is one of the most critical behavioral risks to identify. Leaving the home without awareness or purpose creates immediate safety concerns and should be documented carefully when observed or reported.\nAgitation is another behavioral pattern to note, particularly when escalating frustration or aggression affects care interactions or the individual’s ability to participate safely in daily tasks.\nHoarding or cluttering behaviors may also appear. Accumulation of items can create significant environmental hazards, as well as hygiene or mobility concerns, and must be documented when present.\nImpulsive decisions—such as unsafe choices or difficulty following instructions—signal impaired judgment and can put the individual at risk of injury or medical complications.\nRather than using clinical phrasing, interviewers should ask questions in everyday language, such as, ‘Have there been situations where others were worried about your safety?’ or ‘Do reminders help you stay on track with daily tasks?’ These approaches help gather accurate information without causing confusion or discomfort.\nBehavioral findings must also align with other sections of the A CAT.\nEnvironmental concerns identified in Section L, and safety or medical‑stability concerns captured in Section B, should connect with these behavioral observations.\nInterviewers should document specific examples provided by caregivers or observed firsthand, ensuring that the assessment presents a clear and accurate picture of how behavior affects safety and care needs.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"mi3jytdsqf8oEvhrc"}}},"fontFamiliesById":{"fidDDeTM9CK4AgjsEHMz":{"_id":"fidDDeTM9CK4AgjsEHMz","_siteID":"ZoiyEJNGnnXpx9Jbx","title":"Mulish","regular":{"woff":"Jfk7edEmSaJQ4b88K","woff2":"L7EqJg9MPr2SvaBdj"},"bold":{"woff":"o2Hk3jWDgiqsLPbEM","woff2":"BoFQAHQiHbpeLCdfN"},"italic":{"woff"
