overstated independence or underreported caregiver involvement","startTime":44.349,"finishTime":48.31},{"text":"can affect the level of care determinations,","startTime":48.63,"finishTime":50.779},{"text":"service planning,","startTime":51.08,"finishTime":51.909},{"text":"and risk assessments.","startTime":51.959,"finishTime":53.389},{"text":"By ensuring accuracy and alignment across all sections,","startTime":54.27,"finishTime":57.7},{"text":"the interviewer strengthens the reliability and integrity of the entire ACAT.","startTime":58.029,"finishTime":62.79}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["4uDgzLTmu79XFkGqq","xerBog8ciPWCjgbbP"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Before the A CAT, can be considered complete, the interviewer must perform a final cross‑section review to ensure that all entries support a single, coherent narrative. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Sections A through N should not tell disconnected stories. Each section must reinforce and clarify the others. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For example, if Section C shows that the individual needs daily assistance with bathing, then Section J should reflect the presence of that support or highlight that it is missing. If medication complexity is described in Section B, Section L should reflect whether medications are stored safely and whether the individual can manage them reliably. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This final review is essential because discrepancies—such as overstated independence or underreported caregiver involvement—can affect Level of Care determinations, service planning, and risk assessments. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"By ensuring accuracy and alignment across all sections, the interviewer strengthens the reliability and integrity of the entire A CAT.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Before the A CAT, can be considered complete, the interviewer must perform a final cross‑section review to ensure that all entries support a single, coherent narrative. \nSections A through N should not tell disconnected stories. Each section must reinforce and clarify the others. \nFor example, if Section C shows that the individual needs daily assistance with bathing, then Section J should reflect the presence of that support or highlight that it is missing. If medication complexity is described in Section B, Section L should reflect whether medications are stored safely and whether the individual can manage them reliably. \nThis final review is essential because discrepancies—such as overstated independence or underreported caregiver involvement—can affect Level of Care determinations, service planning, and risk assessments. \nBy ensuring accuracy and alignment across all sections, the interviewer strengthens the reliability and integrity of the entire A CAT.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"vWttHF5x5x9hjJCry"}},"THw9hyW8QqE3gxAQF":{"_id":"THw9hyW8QqE3gxAQF","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"rTphFJZnugjRcLbew"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Dv3kxcACr7HMLDeLm","kind":"overlay","type":"rectangle","width":1205,"height":762.4494047619047,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"oYNiXbmoCpNXa3kHH","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":49.325,"captions":[{"text":"Section J also requires documenting how each service is funded.","startTime":0.209,"finishTime":4.15},{"text":"This includes Medicaid state plan services,","startTime":4.409,"finishTime":7},{"text":"waiver programs,","startTime":7.17,"finishTime":8.35},{"text":"Medicare benefits,","startTime":8.568999999999999,"finishTime":9.6},{"text":"commercial insurance,","startTime":9.68,"finishTime":10.949},{"text":"private pay arrangements,","startTime":11.21,"finishTime":12.55},{"text":"or unpaid support from family and friends.","startTime":12.77,"finishTime":15.689},{"text":"Understanding funding sources helps clarify which supports can be expanded,","startTime":16.59,"finishTime":20.94},{"text":"which may require additional authorization,","startTime":21.19,"finishTime":23.17},{"text":"and which rely heavily on the availability of unpaid caregivers.","startTime":23.79,"finishTime":27.77},{"text":"Many individuals do not know how their services are paid for,","startTime":28.709,"finishTime":31.739},{"text":"so the interviewer may need to clarify details with caregivers","startTime":31.989,"finishTime":35.389},{"text":"or refer back to insurance information collected in Section E.","startTime":35.389,"finishTime":39.09},{"text":"By accurately documenting these funding sources,","startTime":39.59,"finishTime":42.18},{"text":"the ACAT","startTime":42.349,"finishTime":43.06},{"text":"paints a full picture of support patterns and identifies","startTime":43.389,"finishTime":46.389},{"text":"where adjustments or new services may be needed.","startTime":46.389,"finishTime":49.029}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["rTphFJZnugjRcLbew","oYNiXbmoCpNXa3kHH"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section J also requires documenting how each service is funded. This includes Medicaid State Plan services, waiver programs, Medicare benefits, commercial insurance, private pay arrangements, or unpaid support from family and friends. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Understanding funding sources helps clarify which supports can be expanded, which may require additional authorization, and which rely heavily on the availability of unpaid caregivers. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals do not know how their services are paid for, so the interviewer may need to clarify details with caregivers or refer back to insurance information collected in Section E. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"By accurately documenting these funding sources, the A CAT, paints a full picture of support patterns and identifies where adjustments or new services may be needed.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section J also requires documenting how each service is funded. This includes Medicaid State Plan services, waiver programs, Medicare benefits, commercial insurance, private pay arrangements, or unpaid support from family and friends. \nUnderstanding funding sources helps clarify which supports can be expanded, which may require additional authorization, and which rely heavily on the availability of unpaid caregivers. \nMany individuals do not know how their services are paid for, so the interviewer may need to clarify details with caregivers or refer back to insurance information collected in Section E. \nBy accurately documenting these funding sources, the A CAT, paints a full picture of support patterns and identifies where adjustments or new services may be needed.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"NqLnhebAAPcf3ZPkJ"}},"TirdCosahvcr65JGP":{"_id":"TirdCosahvcr65JGP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"zDWH9Hf5qfho7YfYk"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ZpFJgYsjM4JKWneKA","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"eA9NBNruBKtBjH2SD","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0,"width":100,"height":100}}],"duration":47.0125,"captions":[{"text":"When gathering insurance information,","startTime":0.129,"finishTime":2.13},{"text":"the interviewer should begin by requesting any available documentation,","startTime":2.329,"finishTime":6.309},{"text":"such as insurance cards,","startTime":6.449,"finishTime":7.829},{"text":"letters from managed care plans,","startTime":8.09,"finishTime":9.949},{"text":"or Medicare enrollment materials.","startTime":10.13,"finishTime":12.189},{"text":"Individuals frequently misunderstand or misstate their insurance type,","startTime":12.939,"finishTime":17.36},{"text":"especially when they participate in multiple","startTime":17.78,"finishTime":20.18},{"text":"programs or managed care environments.","startTime":20.18,"finishTime":22.26},{"text":"If cards are not available,","startTime":23.149,"finishTime":24.829},{"text":"the interviewer should record the individual's best","startTime":25.04,"finishTime":27.739},{"text":"recollection and document that verification is pending.","startTime":27.739,"finishTime":31.12},{"text":"Clarifying whether coverage includes Medicaid,","startTime":32.009,"finishTime":34.729},{"text":"Medicare Parts A,","startTime":35.009,"finishTime":36.33},{"text":"B,","startTime":36.61,"finishTime":36.93},{"text":"or D.","startTime":37.049,"finishTime":37.819},{"text":"A commercial insurance plan or veteran status,","startTime":38.009,"finishTime":40.919},{"text":"and Tricare coverage","startTime":40.93,"finishTime":42.069},{"text":"ensures the service planning team has the","startTime":42.61,"finishTime":44.72},{"text":"correct information later in the process.","startTime":44.72,"finishTime":46.849}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zDWH9Hf5qfho7YfYk","eA9NBNruBKtBjH2SD"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"xMNR96ijjqpxo5o44","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When gathering insurance information, the interviewer should begin by requesting any available documentation, such as insurance cards, letters from managed‑care plans, or Medicare enrollment materials. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals frequently misunderstand or misstate their insurance type, especially when they participate in multiple programs or managed‑care environments. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If cards are not available, the interviewer should record the individual’s best recollection and document that verification is pending. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Clarifying whether coverage includes Medicaid, Medicare Parts A, B, or D, a commercial insurance plan, or Veteran status and TRICARE coverage ensures the service‑planning team has the correct information later in the process.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"When gathering insurance information, the interviewer should begin by requesting any available documentation, such as insurance cards, letters from managed‑care plans, or Medicare enrollment materials. \nIndividuals frequently misunderstand or misstate their insurance type, especially when they participate in multiple programs or managed‑care environments. \nIf cards are not available, the interviewer should record the individual’s best recollection and document that verification is pending. \nClarifying whether coverage includes Medicaid, Medicare Parts A, B, or D, a commercial insurance plan, or Veteran status and TRICARE coverage ensures the service‑planning team has the correct information later in the process.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"WKXBpwt9DbroiEjEt":{"_id":"WKXBpwt9DbroiEjEt","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"hhi57FgPvEjNuPa2M"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"6aiFAHvAcMj8SS8v6","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"QkrioDRpr8ax2Esyz","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":102.0875,"captions":[{"text":"This portion of section M focuses","startTime":0.129,"finishTime":2.089},{"text":"on understanding the individual's social support","startTime":2.089,"finishTime":4.92},{"text":"network and the frequency and quality of their interactions with others.","startTime":4.92,"finishTime":8.81},{"text":"Interviewers should avoid relying on a simple question,","startTime":9.59,"finishTime":12.409},{"text":"such as,","startTime":12.67,"finishTime":12.949},{"text":"do you feel lonely,","startTime":13.029,"finishTime":14.09},{"text":"because many individuals underreport isolation.","startTime":14.35,"finishTime":17.09},{"text":"Often,","startTime":17.389,"finishTime":17.85},{"text":"they do not want to appear burdensome or may believe that","startTime":18.27,"finishTime":21.1},{"text":"loneliness reflects personal failure rather than a practical need for support.","startTime":21.1,"finishTime":25.209},{"text":"Instead,","startTime":26.2,"finishTime":26.92},{"text":"the goal is to ask questions that reveal","startTime":27.239,"finishTime":29.44},{"text":"the individual's actual pattern of social contact.","startTime":29.44,"finishTime":32.459},{"text":"Asking how often the individual spends time with friends or family","startTime":33.509,"finishTime":37.49},{"text":"helps establish the baseline frequency of meaningful interaction.","startTime":37.669,"finishTime":41.509},{"text":"Asking whether the individual has someone to","startTime":42.419,"finishTime":44.54},{"text":"talk to when something is troubling them helps","startTime":44.54,"finishTime":46.58},{"text":"identify whether emotional support is available or if","startTime":46.58,"finishTime":49.819},{"text":"the individual tends to navigate difficulties alone.","startTime":49.819,"finishTime":52.639},{"text":"Asking if there are days when the individual does not","startTime":53.7,"finishTime":56.299},{"text":"see or speak to anyone reveals periods of complete isolation,","startTime":56.299,"finishTime":59.919},{"text":"which increases health and safety risks.","startTime":60.139,"finishTime":62.419},{"text":"Caregiver input is especially important in this area.","startTime":63.34,"finishTime":66.459},{"text":"Caregivers often notice reduced social contact","startTime":66.819,"finishTime":69.58},{"text":"long before the individual acknowledges it.","startTime":69.58,"finishTime":71.86},{"text":"Social support findings influence several parts of service planning,","startTime":72.809,"finishTime":76.309},{"text":"including adult day services,","startTime":76.65,"finishTime":78.239},{"text":"friendly visiting programs,","startTime":78.55,"finishTime":79.839},{"text":"and transportation supports.","startTime":79.93,"finishTime":81.91},{"text":"Any concerns about isolation should align with","startTime":82.779,"finishTime":85.54},{"text":"behavioral risk items identified in the environmental section","startTime":85.54,"finishTime":88.94},{"text":"and with functional needs recorded in Section C.","startTime":89.139,"finishTime":91.94},{"text":"Together,","startTime":92.809,"finishTime":93.44},{"text":"these questions help the interviewer understand how isolation affects the","startTime":93.69,"finishTime":97.769},{"text":"individual's overall well-being and where additional supports may be needed.","startTime":97.769,"finishTime":101.809}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["hhi57FgPvEjNuPa2M","QkrioDRpr8ax2Esyz"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"bECobedGv8bxka3xz","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This portion of Section M focuses on understanding the individual’s social‑support network and the frequency and quality of their interactions with others.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should avoid relying on a simple question such as ‘Do you feel lonely?’ because many individuals underreport isolation. Often, they do not want to appear burdensome or may believe that loneliness reflects personal failure rather than a practical need for support.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Instead, the goal is to ask questions that reveal the individual’s actual pattern of social contact.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking how often the individual spends time with friends or family helps establish the baseline frequency of meaningful interaction.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking whether the individual has someone to talk to when something is troubling them helps identify whether emotional support is available or if the individual tends to navigate difficulties alone.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking if there are days when the individual does not see or speak to anyone reveals periods of complete isolation, which increases health and safety risks.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregiver input is especially important in this area. Caregivers often notice reduced social contact long before the individual acknowledges it.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Social‑support findings influence several parts of service planning, including adult day services, friendly‑visiting programs, and transportation supports.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any concerns about isolation should align with behavioral‑risk items identified in the environmental section and with functional needs recorded in Section C.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Together, these questions help the interviewer understand how isolation affects the individual’s overall well‑being and where additional supports may be needed.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This portion of Section M focuses on understanding the individual’s social‑support network and the frequency and quality of their interactions with others.\nInterviewers should avoid relying on a simple question such as ‘Do you feel lonely?’ because many individuals underreport isolation. Often, they do not want to appear burdensome or may believe that loneliness reflects personal failure rather than a practical need for support.\nInstead, the goal is to ask questions that reveal the individual’s actual pattern of social contact.\nAsking how often the individual spends time with friends or family helps establish the baseline frequency of meaningful interaction.\nAsking whether the individual has someone to talk to when something is troubling them helps identify whether emotional support is available or if the individual tends to navigate difficulties alone.\nAsking if there are days when the individual does not see or speak to anyone reveals periods of complete isolation, which increases health and safety risks.\nCaregiver input is especially important in this area. Caregivers often notice reduced social contact long before the individual acknowledges it.\nSocial‑support findings influence several parts of service planning, including adult day services, friendly‑visiting programs, and transportation supports.\nAny concerns about isolation should align with behavioral‑risk items identified in the environmental section and with functional needs recorded in Section C.\nTogether, these questions help the interviewer understand how isolation affects the individual’s overall well‑being and where additional supports may be needed.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"YPbG3fBCrkfWHhaQn":{"_id":"YPbG3fBCrkfWHhaQn","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"EpgPZGhvSw3eJAu4P"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5 nsures","startTime":28.44,"finishTime":32.95},{"text":"that future care planning occurs with the correct participants.","startTime":32.95,"finishTime":36.27},{"text":"With section G complete,","startTime":37.159,"finishTime":38.669},{"text":"the assessment now shifts to section H,","startTime":38.849,"finishTime":41.24},{"text":"where the focus moves to nutrition,","startTime":41.569,"finishTime":43.569},{"text":"eating patterns,","startTime":43.849,"finishTime":44.759},{"text":"and dental health areas where individuals often minimize concerns.","startTime":44.93,"finishTime":49.36},{"text":"The next portion of the narration addresses","startTime":49.729,"finishTime":51.99},{"text":"how to explore these topics respectfully and accurately.","startTime":52.13,"finishTime":55.47}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["EpgPZGhvSw3eJAu4P","Guk9NjChJ2PdPeevM"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Before leaving Section G, the interviewer should make sure that the legal information documented here aligns with earlier sections of the A CAT, especially Section E. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If a Power of Attorney or guardian was identified earlier, that person’s role should be reflected in the advance‑directive and decision‑making questions. If no legal representatives exist, the A CAT, should not reflect decision‑making authority that has not been established. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Clear and consistent documentation protects the individual and ensures that future care planning occurs with the correct participants. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"With Section G complete, the assessment now shifts to Section H, where the focus moves to nutrition, eating patterns, and dental health—areas where individuals often minimize concerns. The next portion of the narration addresses how to explore these topics respectfully and accurately.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Before leaving Section G, the interviewer should make sure that the legal information documented here aligns with earlier sections of the A CAT, especially Section E. \nIf a Power of Attorney or guardian was identified earlier, that person’s role should be reflected in the advance‑directive and decision‑making questions. If no legal representatives exist, the A CAT, should not reflect decision‑making authority that has not been established. \nClear and consistent documentation protects the individual and ensures that future care planning occurs with the correct participants. \nWith Section G complete, the assessment now shifts to Section H, where the focus moves to nutrition, eating patterns, and dental health—areas where individuals often minimize concerns. The next portion of the narration addresses how to explore these topics respectfully and accurately.","jobId":"fbkcKKhtcTsDJk3K9","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"YXvp6QoXH4E8k5scH":{"_id":"YXvp6QoXH4E8k5scH","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ejtDcvhDJ3Je9tyMv"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"M2bDn9Qo6cutYuSx4","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"3KvwxHsdjqrTahEcS","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0,"width":100,"height":100}}],"duration":59.0375,"captions":[{"text":"Section E also requires the interviewer to determine","startTime":0.209,"finishTime":2.849},{"text":"whether the individual has any legal representatives,","startTime":2.849,"finishTime":5.96},{"text":"such as a guardian,","startTime":5.969,"finishTime":6.96},{"text":"power of attorney,","startTime":7.25,"finishTime":8.25},{"text":"or a representative pay.","startTime":8.409,"finishTime":9.93},{"text":"These roles cannot be assumed,","startTime":10.81,"finishTime":12.85},{"text":"even when a family member is highly involved.","startTime":13.09,"finishTime":15.71},{"text":"Interviewers should ask clearly whether anyone","startTime":16.5,"finishTime":19.219},{"text":"has legal authority to make decisions,","startTime":19.219,"finishTime":21.29},{"text":"and if so,","startTime":21.299,"finishTime":22.42},{"text":"what kind of authority that person holds.","startTime":22.739,"finishTime":24.959},{"text":"Documentation may not be immediately available,","startTime":25.819,"finishTime":28.92},{"text":"and that is acceptable.","startTime":29.139,"finishTime":30.489},{"text":"The interviewer should simply note that confirmation is pending.","startTime":30.819,"finishTime":34.299},{"text":"This information directly affects how care plans are developed","startTime":35.2,"finishTime":38.599},{"text":"and who must be involved in future communication.","startTime":38.599,"finishTime":41.419},{"text":"When caregivers,","startTime":42.29,"finishTime":43.24},{"text":"representatives,","startTime":43.569,"finishTime":44.25},{"text":"or other supports are identified,","startTime":44.369,"finishTime":46.229},{"text":"interviewers should also consider whether a release of information is needed.","startTime":46.93,"finishTime":50.869},{"text":"If the individual agrees to allow information sharing,","startTime":51.119,"finishTime":54.009},{"text":"a signed ROI should be on file to support communication with those individuals.","startTime":54.209,"finishTime":58.83}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ejtDcvhDJ3Je9tyMv","3KvwxHsdjqrTahEcS"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"HBqW4cAAiATe2hMyF","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section E also requires the interviewer to determine whether the individual has any legal representatives, such as a guardian, Power of Attorney, or a representative payee. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These roles cannot be assumed, even when a family member is highly involved. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should ask clearly whether anyone has legal authority to make decisions and, if so, what kind of authority that person holds. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Documentation may not be immediately available, and that is acceptable; the interviewer should simply note that confirmation is pending. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This information directly affects how care plans are developed and who must be involved in future communication.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When caregivers, representatives, or other supports are identified, interviewers should also consider whether a Release of Information is needed. If the individual agrees to allow information sharing, a signed ROI should be on file to support communication with those individuals.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section E also requires the interviewer to determine whether the individual has any legal representatives, such as a guardian, Power of Attorney, or a representative payee. \nThese roles cannot be assumed, even when a family member is highly involved. \nInterviewers should ask clearly whether anyone has legal authority to make decisions and, if so, what kind of authority that person holds. \nDocumentation may not be immediately available, and that is acceptable; the interviewer should simply note that confirmation is pending. \nThis information directly affects how care plans are developed and who must be involved in future communication.\nWhen caregivers, representatives, or other supports are identified, interviewers should also consider whether a Release of Information is needed. If the individual agrees to allow information sharing, a signed ROI should be on file to support communication with those individuals.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"awonLzxgo3Y9RpuA8":{"_id":"awonLzxgo3Y9RpuA8","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"RuGMTvPPp8GJfEeif"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"cNi9Co8Pjhgk7s8bW","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"TPoaAsCzcZptaHnBR","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":49.5875,"captions":[{"text":"Section L continues with a closer look at the home's physical layout.","startTime":0.209,"finishTime":3.99},{"text":"Individuals often adapt to limitations in their","startTime":4.489,"finishTime":7.289},{"text":"environment without recognizing the safety implications,","startTime":7.289,"finishTime":10.329},{"text":"so self-report alone may not provide the full picture.","startTime":10.649000000000001,"finishTime":13.59},{"text":"During this portion of the assessment,","startTime":14.47,"finishTime":16.29},{"text":"the interviewer should observe how the individual moves from room to room,","startTime":16.51,"finishTime":20.01},{"text":"whether mobility devices fit through doorways,","startTime":20.51,"finishTime":23.129},{"text":"and whether any areas of the home appear difficult or unsafe to navigate.","startTime":23.309,"finishTime":27.95},{"text":"Statements like I hold the wall","startTime":29.01,"finishTime":30.75},{"text":"or I avoid that room now provide important insight","startTime":30.85,"finishTime":34.009},{"text":"into whether the layout supports safe daily function.","startTime":34.009,"finishTime":36.77},{"text":"If the home environment seems incompatible with","startTime":37.65,"finishTime":39.979},{"text":"the individual's mobility or equipment needs,","startTime":39.979,"finishTime":42.65},{"text":"this must be documented clearly,","startTime":42.939,"finishTime":44.799},{"text":"as it may impact recommendations for services or home modifications.","startTime":45.06,"finishTime":49.34}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["RuGMTvPPp8GJfEeif","TPoaAsCzcZptaHnBR"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section L continues with a closer look at the home’s physical layout. Individuals often adapt to limitations in their environment without recognizing the safety implications, so self‑report alone may not provide the full picture. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"During this portion of the assessment, the interviewer should observe how the individual moves from room to room, whether mobility devices fit through doorways, and whether any areas of the home appear difficult or unsafe to navigate. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Statements like ‘I hold the wall’ or ‘I avoid that room now’ provide important insight into whether the layout supports safe daily function. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the home environment seems incompatible with the individual’s mobility or equipment needs, this must be documented clearly, as it may impact recommendations for services or home modifications.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section L continues with a closer look at the home’s physical layout. Individuals often adapt to limitations in their environment without recognizing the safety implications, so self‑report alone may not provide the full picture. \nDuring this portion of the assessment, the interviewer should observe how the individual moves from room to room, whether mobility devices fit through doorways, and whether any areas of the home appear difficult or unsafe to navigate. \nStatements like ‘I hold the wall’ or ‘I avoid that room now’ provide important insight into whether the layout supports safe daily function. \nIf the home environment seems incompatible with the individual’s mobility or equipment needs, this must be documented clearly, as it may impact recommendations for services or home modifications.","jobId":"JctALgTuENmtu3HaP"}},"cPMS3CvDgQi6Ziok9":{"_id":"cPMS3CvDgQi6Ziok9","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"T7NKWhrubCtJb9DPf"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"fobE5xgm2CL6SFvZp","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"WDSNHZNjHquY5nCs3","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.975,"captions":[{"text":"Section one focuses on school,","startTime":0.209,"finishTime":2.049},{"text":"work,","startTime":2.329,"finishTime":2.769},{"text":"and community participation.","startTime":2.809,"finishTime":4.719},{"text":"These questions help the interviewer understand not only whether","startTime":5.05,"finishTime":8.409},{"text":"the individual is currently engaged in meaningful daily activities,","startTime":8.409,"finishTime":12.21},{"text":"but also whether they are able to participate and","startTime":12.409,"finishTime":15.01},{"text":"what barriers may be getting in the way.","startTime":15.01,"finishTime":17.01},{"text":"Individuals often report past involvement or express interest in work or school,","startTime":17.819,"finishTime":22.76},{"text":"but interest is not the same as current participation.","startTime":23.02,"finishTime":26.09},{"text":"Because of this,","startTime":26.579,"finishTime":27.17},{"text":"the interviewer must anchor the conversation","startTime":27.299,"finishTime":29.5},{"text":"in the present and gather very specific","startTime":29.5,"finishTime":31.92},{"text":"time-based details.","startTime":32.18,"finishTime":33.459},{"text":"The information collected here must remain consistent","startTime":34.279,"finishTime":36.99},{"text":"with earlier findings in Section C,","startTime":36.99,"finishTime":39.189},{"text":"especially mobility,","startTime":39.61,"finishTime":40.669},{"text":"cognition,","startTime":40.939,"finishTime":41.63},{"text":"and IADL performance,","startTime":41.93,"finishTime":43.909},{"text":"and with the medical details captured in section B.","startTime":44.049,"finishTime":46.99}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["T7NKWhrubCtJb9DPf","WDSNHZNjHquY5nCs3"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"TfJRdwExLwFbxgp54","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section eye focuses on school, work, and community participation. These questions help the interviewer understand not only whether the individual is currently engaged in meaningful daily activities, but also whether they are able to participate and what barriers may be getting in the way. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals often report past involvement or express interest in work or school, but interest is not the same as current participation. Because of this, the interviewer must anchor the conversation in the present and gather very specific, time‑based details. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The information collected here must remain consistent with earlier findings in Section C—especially mobility, cognition, and I A D L performance—and with the medical details captured in Section B.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section eye focuses on school, work, and community participation. These questions help the interviewer understand not only whether the individual is currently engaged in meaningful daily activities, but also whether they are able to participate and what barriers may be getting in the way. \nIndividuals often report past involvement or express interest in work or school, but interest is not the same as current participation. Because of this, the interviewer must anchor the conversation in the present and gather very specific, time‑based details. \nThe information collected here must remain consistent with earlier findings in Section C—especially mobility, cognition, and I A D L performance—and with the medical details captured in Section B.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"cSQssvMZv9WGuyYjP":{"_id":"cSQssvMZv9WGuyYjP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"4A9y4bzRqMRZtQ72P"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"PrZu8RvWuPFfm7Ljx","kind":"overlay","type":"rectangle","width":1041,"height":746.0499999999998,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"MGzXYF93asRhrpLjL","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.675,"captions":[{"text":"Section J focuses on identifying all formal and informal","startTime":0.209,"finishTime":4.01},{"text":"services that support the individual in their daily life.","startTime":4.01,"finishTime":7.19},{"text":"Unlike earlier sections","startTime":7.449,"finishTime":8.97},{"text":"where individuals may be able to describe","startTime":9.189,"finishTime":11.25},{"text":"their health or functioning in general terms,","startTime":11.25,"finishTime":13.63},{"text":"Section J requires specificity about who provides assistance,","startTime":14.01,"finishTime":17.77},{"text":"how often it occurs,","startTime":17.969,"finishTime":19.229},{"text":"and whether it meets the individual's needs.","startTime":19.409,"finishTime":21.77},{"text":"Interviewers must remember that many people do not view","startTime":22.59,"finishTime":25.75},{"text":"everyday help from family or neighbors as services,","startTime":25.75,"finishTime":29.149},{"text":"even when those supports are essential to their functioning.","startTime":29.35,"finishTime":31.93},{"text":"For this reason,","startTime":32.819,"finishTime":33.77},{"text":"section J relies heavily on careful probing and attentive listening.","startTime":34.06,"finishTime":38.68},{"text":"It also requires the interviewer to connect insights from earlier sections,","startTime":38.919,"finishTime":42.97},{"text":"particularly functional limitations,","startTime":43.419,"finishTime":45.25},{"text":"caregiver strain,","startTime":45.54,"finishTime":46.5},{"text":"and medical needs","startTime":46.58,"finishTime":47.799},{"text":"to determine whether gaps in support exist.","startTime":48.02,"finishTime":50.419}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["4A9y4bzRqMRZtQ72P","MGzXYF93asRhrpLjL"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section J focuses on identifying all formal and informal services that support the individual in their daily life. Unlike earlier sections, where individuals may be able to describe their health or functioning in general terms, Section J requires specificity about who provides assistance, how often it occurs, and whether it meets the individual’s needs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers must remember that many people do not view everyday help from family or neighbors as ‘services,’ even when those supports are essential to their functioning. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For this reason, Section J relies heavily on careful probing and attentive listening. It also requires the interviewer to connect insights from earlier sections—particularly functional limitations, caregiver strain, and medical needs—to determine whether gaps in support exist.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section J focuses on identifying all formal and informal services that support the individual in their daily life. Unlike earlier sections, where individuals may be able to describe their health or functioning in general terms, Section J requires specificity about who provides assistance, how often it occurs, and whether it meets the individual’s needs. \nInterviewers must remember that many people do not view everyday help from family or neighbors as ‘services,’ even when those supports are essential to their functioning. \nFor this reason, Section J relies heavily on careful probing and attentive listening. It also requires the interviewer to connect insights from earlier sections—particularly functional limitations, caregiver strain, and medical needs—to determine whether gaps in support exist.","jobId":"xRWCEQB8DMmQxYBmA"}},"dZHJfxysA2uwcQgQg":{"_id":"dZHJfxysA2uwcQgQg","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"q8RjSvqkgWA3MnAWT"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"225s5SDfARsQBstFA","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"geGJhbzucFeD7Yqph","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":48.1125,"captions":[{"text":"It is not enough to document that a service exists.","startTime":0.019,"finishTime":2.599},{"text":"Section J also requires the interviewer to","startTime":2.849,"finishTime":5.199},{"text":"determine whether the service is reliable.","startTime":5.199,"finishTime":7.269},{"text":"Individuals may report that an aide comes 3 times a week,","startTime":8.029,"finishTime":11.55},{"text":"but upon further discussion,","startTime":11.789,"finishTime":13.21},{"text":"it may become clear that visits are frequently missed or shortened.","startTime":13.67,"finishTime":17.54},{"text":"These inconsistencies affect the person's safety","startTime":17.899,"finishTime":20.489},{"text":"and must be reflected in the ACAT.","startTime":20.77,"finishTime":22.809},{"text":"Asking whether caregivers show up on time,","startTime":23.76,"finishTime":26.1},{"text":"stay the full duration,","startTime":26.44,"finishTime":27.459},{"text":"and complete all necessary tasks","startTime":27.559,"finishTime":29.86},{"text":"helps the interviewer understand the stability of support.","startTime":30.04,"finishTime":33.259},{"text":"If services are unreliable or insufficient,","startTime":34.009,"finishTime":36.77},{"text":"the ACAT","startTime":36.97,"finishTime":37.68},{"text":"should explicitly document these gaps.","startTime":38.049,"finishTime":40.24},{"text":"This information drives decisions about increasing support,","startTime":40.569,"finishTime":43.669},{"text":"requesting alternate providers,","startTime":44.049,"finishTime":45.83},{"text":"or adding additional services.","startTime":46.009,"finishTime":47.849}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["q8RjSvqkgWA3MnAWT","geGJhbzucFeD7Yqph"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is not enough to document that a service exists—Section J also requires the interviewer to determine whether the service is reliable. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals may report that an aide comes three times a week, but upon further discussion, it may become clear that visits are frequently missed or shortened. These inconsistencies affect the person’s safety and must be reflected in the ACAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking whether caregivers show up on time, stay the full duration, and complete all necessary tasks helps the interviewer understand the stability of support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If services are unreliable or insufficient, the A CAT, should explicitly document these gaps. This information drives decisions about increasing support, requesting alternate providers, or adding additional services.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"It is not enough to document that a service exists—Section J also requires the interviewer to determine whether the service is reliable. \nIndividuals may report that an aide comes three times a week, but upon further discussion, it may become clear that visits are frequently missed or shortened. These inconsistencies affect the person’s safety and must be reflected in the ACAT. \nAsking whether caregivers show up on time, stay the full duration, and complete all necessary tasks helps the interviewer understand the stability of support. \nIf services are unreliable or insufficient, the A CAT, should explicitly document these gaps. This information drives decisions about increasing support, requesting alternate providers, or adding additional services.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"czp55gWm9jHrYTZJe"}},"gBrdeou8hqwNXTNEp":{"_id":"gBrdeou8hqwNXTNEp","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank Slide","upload":"J7nSMHAAA49JEQrzp"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T15:26:04.557Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"evt9pNkJTS9SgX63P","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","borde
