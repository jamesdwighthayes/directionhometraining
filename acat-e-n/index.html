rtTime":13.96,"finishTime":16.068},{"text":"Throughout the lesson,","startTime":16.28,"finishTime":17.44},{"text":"the narration will focus on real world interviewing techniques,","startTime":17.61,"finishTime":21.19},{"text":"how to gather reliable information.","startTime":21.409,"finishTime":23.37},{"text":"How to interpret what is observed","startTime":23.77,"finishTime":25.549},{"text":"and how to ensure that the final ACA","startTime":25.77,"finishTime":27.889},{"text":"reflects the individual's true support needs.","startTime":28.61,"finishTime":31.27},{"text":"Click the button to download a copy of the ACCAT.","startTime":32.11,"finishTime":34.54},{"text":"It can be helpful to follow a long section by section in this","startTime":35.099,"finishTime":38.09},{"text":"document as the training offers practical guidance","startTime":38.09,"finishTime":41.099},{"text":"on how to complete each section.","startTime":41.099,"finishTime":42.86},{"text":"This training specifically focuses on waiver service coordinators who","startTime":43.77,"finishTime":47.889},{"text":"complete Section E through Section N of the ACCAT.","startTime":47.889,"finishTime":50.65}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["J7nSMHAAA49JEQrzp","mku6Dj8fsBFAQiT8m","9BJ2AKjMCEJWD9pgb"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This training provides a comprehensive, interviewer‑focused walkthrough of the Adult Comprehensive Assessment Tool, or A, CAT. The goal of this training is to help assessors and service coordinators complete the A CAT, accurately, confidently, and consistently. Throughout the lesson, the narration will focus on real‑world interviewing techniques—how to gather reliable information, how to interpret what is observed, and how to ensure that the final A CAT, reflects the individual’s true support needs.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Click the button to download a copy of the A CAT. It can be helpful to follow along section by section in this document as the training offers practical guidance on how to complete each section.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This Training specifically focuses on Waiver Service Coordinators who complete section E through section N of the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This training provides a comprehensive, interviewer‑focused walkthrough of the Adult Comprehensive Assessment Tool, or A, CAT. The goal of this training is to help assessors and service coordinators complete the A CAT, accurately, confidently, and consistently. Throughout the lesson, the narration will focus on real‑world interviewing techniques—how to gather reliable information, how to interpret what is observed, and how to ensure that the final A CAT, reflects the individual’s true support needs.\nClick the button to download a copy of the A CAT. It can be helpful to follow along section by section in this document as the training offers practical guidance on how to complete each section.\nThis Training specifically focuses on Waiver Service Coordinators who complete section E through section N of the A CAT. ","jobId":"Gd5ZBwtNXvoD3XHdJ","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"h8Y8488hyDEqRwwMQ":{"_id":"h8Y8488hyDEqRwwMQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"GZad4aSXAAjBcwf7A"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"pgTN3hjaBTYnkvqYF","kind":"overlay","type":"rectangle","width":1064,"height":775.2000000000007,"x":20,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"8L3Tt6odg3QMLPSWd","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":4.861111111111107,"positionY":0,"width":90.27777777777779,"height":100}}],"duration":70.5625,"captions":[{"text":"The screenings that take place in section M","startTime":0.119,"finishTime":2.45},{"text":"are usually contained in separate documents and questionnaires.","startTime":2.45,"finishTime":6.01},{"text":"Waiver service coordinators administer these questionnaire tools","startTime":6.369,"finishTime":9.71},{"text":"and then record only the results in section M of the ACCAT.","startTime":9.93,"finishTime":13.289},{"text":"Cognitive screening and.","startTime":13.97,"finishTime":14.93},{"text":"Section M relies heavily on functional examples.","startTime":15.074,"finishTime":18.385},{"text":"Instead of asking whether someone has cognitive impairment,","startTime":18.635,"finishTime":21.774},{"text":"the interviewer should ask whether they ever forget steps when completing","startTime":22.014,"finishTime":25.514},{"text":"tasks or whether they have trouble","startTime":25.514,"finishTime":27.444},{"text":"remembering appointments or managing routines.","startTime":27.444,"finishTime":29.954},{"text":"During the interview,","startTime":30.819,"finishTime":31.86},{"text":"signs such as repeating questions,","startTime":32.098,"finishTime":33.93},{"text":"losing track of the conversation,","startTime":34.11,"finishTime":35.849},{"text":"or inconsistent recall may signal cognitive challenges.","startTime":36.02,"finishTime":39.56},{"text":"These observations must be captured alongside verbal responses.","startTime":39.86,"finishTime":43.819},{"text":"In many cases,","startTime":44.65,"finishTime":45.88},{"text":"caregivers may offer a more accurate","startTime":46.139,"finishTime":48.09},{"text":"account of memory or orientation difficulties.","startTime":48.09,"finishTime":50.99},{"text":"If the caregiver reports concerns that the individual denies,","startTime":51.25,"finishTime":54.52},{"text":"the interviewer should document both perspectives neutrally.","startTime":54.81,"finishTime":57.97},{"text":"This information must align with concerns noted earlier in the ACAT,","startTime":58.83,"finishTime":62.709},{"text":"especially medication safety,","startTime":64.25,"finishTime":65.029},{"text":"ADL prompting needs,","startTime":65.269,"finishTime":67.129},{"text":"and environmental risks observed in section L.","startTime":67.309,"finishTime":70.29}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["GZad4aSXAAjBcwf7A","8L3Tt6odg3QMLPSWd"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"GXf6sJqC6bMTKmbMA","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The screenings that take place in section M are usually contained in separate documents and questionnaires. Waiver service coordinators administer these questionnaire tools and then record only the results in section M of the A CAT.  Cognitive screening in Section M relies heavily on functional examples. Instead of asking whether someone has ‘cognitive impairment,’ the interviewer should ask whether they ever forget steps when completing tasks or whether they have trouble remembering appointments or managing routines. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"During the interview, signs such as repeating questions, losing track of the conversation, or inconsistent recall may signal cognitive challenges. These observations must be captured alongside verbal responses. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In many cases, caregivers may offer a more accurate account of memory or orientation difficulties. If the caregiver reports concerns that the individual denies, the interviewer should document both perspectives neutrally. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This information must align with concerns noted earlier in the A CAT, especially medication safety, A D L prompting needs, and environmental risks observed in Section L.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The screenings that take place in section M are usually contained in separate documents and questionnaires. Waiver service coordinators administer these questionnaire tools and then record only the results in section M of the A CAT.  Cognitive screening in Section M relies heavily on functional examples. Instead of asking whether someone has ‘cognitive impairment,’ the interviewer should ask whether they ever forget steps when completing tasks or whether they have trouble remembering appointments or managing routines. \nDuring the interview, signs such as repeating questions, losing track of the conversation, or inconsistent recall may signal cognitive challenges. These observations must be captured alongside verbal responses. \nIn many cases, caregivers may offer a more accurate account of memory or orientation difficulties. If the caregiver reports concerns that the individual denies, the interviewer should document both perspectives neutrally. \nThis information must align with concerns noted earlier in the A CAT, especially medication safety, A D L prompting needs, and environmental risks observed in Section L.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"ic98fvreGMDzJD7Pz":{"_id":"ic98fvreGMDzJD7Pz","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"vyjeyzGaaY8dm9KQC"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"n4fiATqqDZBwGTGzs","kind":"overlay","type":"rectangle","width":957,"height":747.3714285714284,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"eatiBGQWWcJuMejQ4","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":40.3,"captions":[{"text":"Section J concludes with a full understanding of who provides support,","startTime":0.209,"finishTime":4.17},{"text":"how often they help,","startTime":4.409,"finishTime":5.53},{"text":"how reliable that help is,","startTime":5.809,"finishTime":7.19},{"text":"and whether it is expected to continue.","startTime":7.329,"finishTime":9.449},{"text":"These details set the stage for section K,","startTime":10.34,"finishTime":12.89},{"text":"which focuses on adaptive and assistive equipment.","startTime":13.18,"finishTime":16.42},{"text":"Because","startTime":17.26,"finishTime":17.27},{"text":"equipment,","startTime":17.579,"finishTime":18.1},{"text":"environment,","startTime":18.34,"finishTime":18.889},{"text":"and support needs are tightly connected,","startTime":18.979,"finishTime":21.209},{"text":"the information gathered in Section J will help guide the interviewer as they","startTime":21.5,"finishTime":25.17},{"text":"document every device and tool the individual uses or keeps in the home.","startTime":25.17,"finishTime":29.5},{"text":"The next section begins a careful review of equipment,","startTime":30.34,"finishTime":33.299},{"text":"both used and unused,","startTime":33.619,"finishTime":35.139},{"text":"to ensure that all supports,","startTime":35.38,"finishTime":36.93},{"text":"risks,","startTime":37.229,"finishTime":37.689},{"text":"and needs are captured comprehensively.","startTime":37.7,"finishTime":40.04}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["vyjeyzGaaY8dm9KQC","eatiBGQWWcJuMejQ4"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section J concludes with a full understanding of who provides support, how often they help, how reliable that help is, and whether it is expected to continue. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These details set the stage for Section K, which focuses on adaptive and assistive equipment. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because equipment, environment, and support needs are tightly connected, the information gathered in Section J will help guide the interviewer as they document every device and tool the individual uses or keeps in the home. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The next section begins a careful review of equipment—both used and unused—to ensure that all supports, risks, and needs are captured comprehensively.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section J concludes with a full understanding of who provides support, how often they help, how reliable that help is, and whether it is expected to continue. \nThese details set the stage for Section K, which focuses on adaptive and assistive equipment. \nBecause equipment, environment, and support needs are tightly connected, the information gathered in Section J will help guide the interviewer as they document every device and tool the individual uses or keeps in the home. \nThe next section begins a careful review of equipment—both used and unused—to ensure that all supports, risks, and needs are captured comprehensively.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"zipaKxDt6EuRG8BxK"}},"imfBJEqs737rZfvZY":{"_id":"imfBJEqs737rZfvZY","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"GdGSb62NxYHj9wCkW"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"YFvuwRw8sra3fkzTc","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"TiiWnfCm3k3vMJCg8","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":44.675,"captions":[{"text":"In addition to self-report,","startTime":0.05,"finishTime":1.7690000000000001},{"text":"interviewers should listen for subtle signs of nutritional risk.","startTime":2.289,"finishTime":5.59},{"text":"These may include difficulty chewing,","startTime":5.929,"finishTime":7.909},{"text":"discomfort after eating,","startTime":8.05,"finishTime":9.479},{"text":"reliance on convenience foods,","startTime":9.68,"finishTime":11.56},{"text":"or statements like,","startTime":11.81,"finishTime":12.859},{"text":"I usually just have coffee in the morning.","startTime":12.97,"finishTime":15.09},{"text":"Food insecurity can also emerge during the discussion,","startTime":15.979,"finishTime":19.01},{"text":"especially if the individual depends on others for groceries or transportation.","startTime":19.409,"finishTime":23.77},{"text":"If the individual uses modified textures or thickeners,","startTime":24.639,"finishTime":28},{"text":"the interviewer must clarify who prepares these","startTime":28.37,"finishTime":31.11},{"text":"modifications and whether they are used consistently.","startTime":31.11,"finishTime":34.15},{"text":"All of these details should be captured clearly","startTime":35.02,"finishTime":37.599},{"text":"as they may indicate a need for meal support services,","startTime":37.779,"finishTime":40.77},{"text":"dietary education,","startTime":41.06,"finishTime":42.439},{"text":"or additional in-home assistance.","startTime":42.5,"finishTime":44.52}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["GdGSb62NxYHj9wCkW","TiiWnfCm3k3vMJCg8"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In addition to self‑report, interviewers should listen for subtle signs of nutritional risk. These may include difficulty chewing, discomfort after eating, reliance on convenience foods, or statements like ‘I usually just have coffee in the morning.’ \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Food insecurity can also emerge during the discussion, especially if the individual depends on others for groceries or transportation. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the individual uses modified textures or thickeners, the interviewer must clarify who prepares these modifications and whether they are used consistently. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"All of these details should be captured clearly, as they may indicate a need for meal support services, dietary education, or additional in‑home assistance.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"In addition to self‑report, interviewers should listen for subtle signs of nutritional risk. These may include difficulty chewing, discomfort after eating, reliance on convenience foods, or statements like ‘I usually just have coffee in the morning.’ \nFood insecurity can also emerge during the discussion, especially if the individual depends on others for groceries or transportation. \nIf the individual uses modified textures or thickeners, the interviewer must clarify who prepares these modifications and whether they are used consistently. \nAll of these details should be captured clearly, as they may indicate a need for meal support services, dietary education, or additional in‑home assistance.","jobId":"izcxtT8DZ9YLdFTnb"}},"iq6Hu2StFJTyzgjMR":{"_id":"iq6Hu2StFJTyzgjMR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"dbrbkLtdZaJcsXD8K"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"s3LRq3FZZuooNYgq8","kind":"overlay","type":"rectangle","width":1242,"height":758.5071428571431,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"LWKubebqYXM9gFyu9","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.1375,"captions":[{"text":"Equipment must always be documented in a","startTime":0.129,"finishTime":2.529},{"text":"way that reflects the individual's actual functioning.","startTime":2.529,"finishTime":5.59},{"text":"If the person uses grab bars,","startTime":6.46,"finishTime":8.34},{"text":"railings,","startTime":8.539,"finishTime":9.189},{"text":"or a bath chair,","startTime":9.3,"finishTime":10.38},{"text":"those details should align with section C bathing and mobility descriptions.","startTime":10.67,"finishTime":15.06},{"text":"Likewise,","startTime":15.43,"finishTime":15.989},{"text":"respiratory devices such as nebulizers or oxygen","startTime":16.068,"finishTime":19.469},{"text":"must match the medical information recorded in section B.","startTime":19.709,"finishTime":22.989},{"text":"If equipment seems inconsistent with the individual's reported ability,","startTime":23.6,"finishTime":27.319},{"text":"such as a walker in the home when the individual reports no mobility limitations,","startTime":27.559,"finishTime":31.93},{"text":"the interviewer should explore how often the","startTime":32.29,"finishTime":34.61},{"text":"device is used and under what circumstances.","startTime":34.61,"finishTime":37.25},{"text":"These conversations help clarify whether the device is a backup support,","startTime":38.18,"finishTime":42.279},{"text":"a tool used on bad days,","startTime":42.5,"finishTime":44.24},{"text":"or an indicator of a more significant functional","startTime":44.459,"finishTime":47.22},{"text":"challenge that the individual may be downplaying.","startTime":47.22,"finishTime":49.9}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["dbrbkLtdZaJcsXD8K","LWKubebqYXM9gFyu9"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Equipment must always be documented in a way that reflects the individual’s actual functioning. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the person uses grab bars, railings, or a bath chair, those details should align with Section C bathing and mobility descriptions. Likewise, respiratory devices such as nebulizers or oxygen must match the medical information recorded in Section B. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If equipment seems inconsistent with the individual’s reported ability—such as a walker in the home when the individual reports no mobility limitations—the interviewer should explore how often the device is used and under what circumstances. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These conversations help clarify whether the device is a backup support, a tool used on ‘bad days,’ or an indicator of a more significant functional challenge that the individual may be downplaying.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"for :{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Information gathered here helps support appropriate referrals and service recommendations in Section J.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section N also explores the community and social factors that may influence health and safety. \nTransportation challenges, difficulty accessing medical appointments, housing instability, financial stress, or social vulnerability each contribute to the individual’s overall risk profile. \nInterviewers should ask concrete, functional questions to uncover these challenges, such as whether the individual has missed appointments due to lack of transportation or whether managing bills or errands has become more difficult. \nThese factors rarely appear without prompting, so the interviewer should follow up when earlier sections hint at social or environmental barriers. \nInformation gathered here helps support appropriate referrals and service recommendations in Section J.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"kGFqkaHhXvCPrGtCY":{"_id":"kGFqkaHhXvCPrGtCY","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"JDBgdvjxquQJx64kE"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"cpo9nvCEquWWBj5TQ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0  review complete,","startTime":41.139,"finishTime":43.02},{"text":"the assessment moves next into Section M,","startTime":43.259,"finishTime":45.569},{"text":"where supplemental screening results further clarify cognitive,","startTime":45.86,"finishTime":49.24},{"text":"behavioral,","startTime":49.58,"finishTime":50.139},{"text":"and social factors.","startTime":50.259,"finishTime":51.54}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["JDBgdvjxquQJx64kE","tZSHRzdDASxE9QpZk"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should provide and document safety education whenever a risk is observed. Examples include reminding individuals not to smoke near oxygen tanks, advising on safer medication storage, or suggesting methods for reducing clutter to prevent falls. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any education offered during the visit must be recorded clearly, along with the reason it was provided. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These teaching moments are an important part of the assessment, as they help address immediate risks and reinforce safe practices. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section L often explains why certain A D Ls are difficult or why equipment is underused, and it may lead to service recommendations in Section J. With the environmental review complete, the assessment moves next into Section M, where supplemental screening results further clarify cognitive, behavioral, and social factors.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The interviewer should provide and document safety education whenever a risk is observed. Examples include reminding individuals not to smoke near oxygen tanks, advising on safer medication storage, or suggesting methods for reducing clutter to prevent falls. \nAny education offered during the visit must be recorded clearly, along with the reason it was provided. \nThese teaching moments are an important part of the assessment, as they help address immediate risks and reinforce safe practices. \nSection L often explains why certain A D Ls are difficult or why equipment is underused, and it may lead to service recommendations in Section J. With the environmental review complete, the assessment moves next into Section M, where supplemental screening results further clarify cognitive, behavioral, and social factors.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"MRKLRa7FzudKr67pi"}},"m44gBvHjFGLijTory":{"_id":"m44gBvHjFGLijTory","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"2QXHDYGADq27iSCEz"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{ ice Coordinators and explore resources, caregivers, legal considerations, health screenings, work and school participation, services and supports, equipment, the home environment, and supplemental screening items. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Although responsibilities are divided, understanding all sections is beneficial because many responses in one section must logically align with information documented in another. The training today focuses on waiver service coordinators and Sections E through N.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The A CAT, is divided into lettered sections, beginning with Section A and ending with Section N. \nSections A through D are completed by the Level of Care Assessor because they relate directly to determining eligibility—these include demographic information, medical history, diagnoses, and functional performance. \nSections E through N are completed by Waiver Service Coordinators and explore resources, caregivers, legal considerations, health screenings, work and school participation, services and supports, equipment, the home environment, and supplemental screening items. \nAlthough responsibilities are divided, understanding all sections is beneficial because many responses in one section must logically align with information documented in another. The training today focuses on waiver service coordinators and Sections E through N.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"F3D7bX4txBFY6xFjn"}},"oZqv22i7RGWuAo8JQ":{"_id":"oZqv22i7RGWuAo8JQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"QwMktZptDxuP8Mh64"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"fp9sFaDS8Z9mn2ZEw","kind":"overlay","type":"rectangle","width":1280,"height":720.7619047619048,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"68HNwDgxms8ipsw4s","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":41.5875,"captions":[{"text":"Another critical part of Section J is determining","startTime":0.119,"finishTime":2.89},{"text":"whether current support is expected to continue.","startTime":2.89,"finishTime":5.489},{"text":"Family members may be experiencing burnout,","startTime":6.449,"finishTime":9.05},{"text":"planning to move,","startTime":9.329,"finishTime":10.109},{"text":"or preparing for a change in their own health or employment.","startTime":10.449,"finishTime":13.89},{"text":"Agency services may be temporary or tied to short-term programs.","startTime":14.25,"finishTime":18.37},{"text":"Interviewers should ask whether the caregiver","startTime":19.149,"finishTime":21.27},{"text":"anticipates continuing in the same role","startTime":21.27,"finishTime":23.649},{"text":"and whether agency services are long-term or time limited.","startTime":23.87,"finishTime":27.59},{"text":"If continuation is uncertain,","startTime":28.479,"finishTime":30.45},{"text":"it must be documented clearly.","startTime":30.68,"finishTime":32.63},{"text":"Identifying these risks early allows the service team to plan ahead,","startTime":32.889,"finishTime":36.95},{"text":"ensuring that the individual does not experience a gap in needed support.","startTime":37.24,"finishTime":41.15}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["QwMktZptDxuP8Mh64","68HNwDgxms8ipsw4s"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Another critical part of Section J is determining whether current support is expected to continue. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Family members may be experiencing burnout, planning to move, or preparing for a change in their own health or employment. Agency services may be temporary or tied to short‑term programs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should ask whether the caregiver anticipates continuing in the same role, and whether agency services are long‑term or time‑limited. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If continuation is uncertain, it must be documented clearly. Identifying these risks early allows the service team to plan ahead, ensuring that the individual does not experience a gap in needed support.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Another critical part of Section J is determining whether current support is expected to continue. \nFamily members may be experiencing burnout, planning to move, or preparing for a change in their own health or employment. Agency services may be temporary or tied to short‑term programs. \nInterviewers should ask whether the caregiver anticipates continuing in the same role, and whether agency services are long‑term or time‑limited. \nIf continuation is uncertain, it must be documented clearly. Identifying these risks early allows the service team to plan ahead, ensuring that the individual does not experience a gap in needed support.","jobId":"Gbg4LkWAbKzrCdmMB"}},"qd96skBPG5bXwjXvL":{"_id":"qd96skBPG5bXwjXvL","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"49Ggvqsg9aNsBtoZP"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"gvs8MAqPk4832o5Kt","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"yRAe9uZS59LbeZC6i","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.5375,"captions":[{"text":"Before closing the ACA,","startTime":0.289,"finishTime":1.399},{"text":"the interviewer should identify any items that still require follow-up.","startTime":1.889,"finishTime":6.03},{"text":"It is common for certain details,","startTime":6.78,"finishTime":8.739},{"text":"such as medication lists,","startTime":8.76,"finishTime":10.17},{"text":"provider contact information,","startTime":10.5,"finishTime":12.159},{"text":"or legal documentation","startTime":12.18,"finishTime":13.818999999999999},{"text":"to be incomplete during the interview.","startTime":14.02,"finishTime":15.859},{"text":"Pending items should be clearly noted and","startTime":16.219,"finishTime":18.459},{"text":"communicated to the appropriate staff for follow-up.","startTime":18.459,"finishTime":21.18},{"text":"The interviewer should also review any discrepancies that remain unresolved.","startTime":22.069,"finishTime":26.42},{"text":"These should be documented factually,","startTime":26.78,"finishTime":28.6},{"text":"with each perspective clearly attributed to its source.","startTime":28.719,"finishTime":31.799},{"text":"A systematic checklist approach","startTime":32.648,"finishTime":34.359},{"text":"helps ensure that no required follow-up is overlooked.","startTime":34.778,"finishTime":37.888},{"text":"Completing these final steps enhances the accuracy of the assessment","startTime":38.258,"finishTime":42.138},{"text":"and ensures that service planning can proceed without interruption.","startTime":42.339,"finishTime":46.258}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["49Ggvqsg9aNsBtoZP","yRAe9uZS59LbeZC6i"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Before closing the A CAT, the interviewer should identify any items that still require follow‑up. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is common for certain details—such as medication lists, provider contact information, or legal documentation—to be incomplete during the interview. Pending items should be clearly noted and communicated to the appropriate staff for follow‑up. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should also review any discrepancies that remain unresolved. These should be documented factually, with each perspective clearly attributed to its source. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A systematic checklist approach helps ensure that no required follow‑up is overlooked. Completing these final steps enhances the accuracy of the assessment and ensures that service planning can proceed without interruption.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Before closing the A CAT, the interviewer should identify any items that still require follow‑up. \nIt is common for certain details—such as medication lists, provider contact information, or legal documentation—to be incomplete during the interview. Pending items should be clearly noted and communicated to the appropriate staff for follow‑up. \nThe interviewer should also review any discrepancies that remain unresolved. These should be documented factually, with each perspective clearly attributed to its source. \nA systematic checklist approach helps ensure that no required follow‑up is overlooked. Completing these final steps enhances the accuracy of the assessment and ensures that service planning can proceed without interruption.","jobId":"PuNaspxm2iHRGgerp"}},"sCzQmRKuC8JJ6kLc2":{"_id":"sCzQmRKuC8JJ6kLc2","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"DWsJFjpk3mPwu9RZ7"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"D4FbKjPhLJjqWWxbH","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"CDoRBcCtbGN5mmeNN","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.175,"captions":[{"text":"The ACAT","startTime":0.09,"finishTime":0.93},{"text":"also asks whether the individual wants more information about legal planning.","startTime":1.169,"finishTime":5.489},{"text":"Many people are unsure about advanced directives or the role of a power of attorney,","startTime":5.849,"finishTime":10.439},{"text":"so this question must be asked slowly and without pressure.","startTime":10.77,"finishTime":14.21},{"text":"Some individuals may be interested in planning for future medical decisions,","startTime":15.199,"finishTime":19.069},{"text":"but may not know where to begin.","startTime":19.29,"finishTime":21.03},{"text":"Others may already have documentation but need guidance","startTime":21.329,"finishTime":24.409},{"text":"on how to update or share it.","startTime":24.409,"finishTime":26.17},{"text":"If the individual expresses a desire to learn more,","startTime":27.069,"finishTime":29.95},{"text":"this should be documented clearly so that a","startTime":30.28,"finishTime":32.56},{"text":"service coordinator can follow up after the assessment.","startTime":32.56,"finishTime":35.56},{"text":"This question is not about requiring legal action.","startTime":36.47,"finishTime":39.319},{"text":"It is about recognizing when the individual feels","startTime":39.549,"finishTime":42.069},{"text":"uncertain or wants support navigating complex planning decisions.","startTime":42.069,"finishTime":46.029}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["DWsJFjpk3mPwu9RZ7","CDoRBcCtbGN5mmeNN"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The A CAT, also asks whether the individual wants more information about legal planning. Many people are unsure about advance directives or the role of a Power of Attorney, so this question must be asked slowly and without pressure. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Some individuals may be interested in planning for future medical decisions but may not know where to begin. Others may already have documentation but need guidance on how to update or share it. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the individual expresses a desire to learn more, this should be documented clearly so that a service coordinator can follow up after the assessment. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This question is not about requiring legal action—it is about recognizing when the individual feels uncertain or wants support navigating complex "color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"fEqNSxkshnoHLg2EF","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.3125,"captions":[{"text":"This training is designed as a practical interviewing guide,","startTime":0.129,"finishTime":3.359},{"text":"not a simple description of what appears on each page of the ACAT.","startTime":3.69,"finishTime":7.09},{"text":"The narration focuses on how to ask the questions,","startTime":7.98,"finishTime":10.729},{"text":"how to interpret responses,","startTime":11.06,"finishTime":12.64},{"text":"and how to handle common challenges such","startTime":12.818999999999999,"finishTime":15.02},{"text":"as conflicting accounts from individuals and caregivers,","startTime":15.02,"finishTime":18.059},{"text":"missing information","startTime":18.42,"finishTime":19.559},{"text":"or misunderstandings of terminology.","startTime":19.739,"finishTime":22.02},{"text":"Because experienced assessors frequently jump","startTime":22.93,"finishTime":25.62},{"text":"between sections during the interview,","startTime":25.62,"finishTime":27.319},{"text":"this training mirrors that approach by showing how","startTime":27.649,"finishTime":30.79},{"text":"information discovered early can affect documentation later.","startTime":30.79,"finishTime":33.79},{"text":"Learners will also see where cross-section","startTime":34.72,"finishTime":36.759},{"text":"consistency is critical and how observation,","startTime":36.759,"finishTime":39.47},{"text":"tone,","startTime":39.84,"finishTime":40.2},{"text":"and conversational flow help interviewers gather","startTime":40.319,"finishTime":42.919},{"text":"accurate information without overwhelming the individual.","startTime":42.919,"finishTime":45.86}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["am2MwzSE7PZsWFiQv","fEqNSxkshnoHLg2EF"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This training is designed as a practical interviewing guide, not a simple description of what appears on each page of the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The narration focuses on how to ask the questions, how to interpret responses, and how to handle common challenges—such as conflicting accounts from individuals and caregivers, missing information, or misunderstandings of terminology. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because experienced assessors frequently jump between sections during the interview, this training mirrors that approach by showing how information discovered early can affect documentation later. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Learners will also see where cross‑section consistency is critical and how observation, tone, and conversational flow help interviewers gather accurate information without overwhelming the individual.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"This training is designed as a practical interviewing guide, not a simple description of what appears on each page of the A CAT. \nThe narration focuses on how to ask the questions, how to interpret responses, and how to handle common challenges—such as conflicting accounts from individuals and caregivers, missing information, or misunderstandings of terminology. \nBecause experienced assessors frequently jump between sections during the interview, this training mirrors that approach by showing how information discovered early can affect documentation later. \nLearners will also see where cross‑section consistency is critical and how observation, tone, and conversational flow help interviewers gather accurate information without overwhelming the individual.","jobId":"Yq9jdn7nqQ2N6LLcb"}},"usqfkyZ8PKw8NQCWF":{"_id":"usqfkyZ8PKw8NQCWF","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"aNoLek6PSgaeR2PJ8"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"dgoq5JWpYkCsxEFAS","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"NBx44gpw6qZpAr4Dv","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":84.825,"captions":[{"text":"This portion of section M focuses on identifying cognitive limitations","startTime":0.129,"finishTime":4.449},{"text":"by combining targeted prompts with","startTime":4.449,"finishTime":6.6899999999999995},{"text":"careful observation throughout the interview.","startTime":6.6899999999999995,"finishTime":8.949},{"text":"Cognitive concerns do not always appear through direct questioning.","startTime":9.85,"finishTime":13.71},{"text":"Instead,","startTime":13.96,"finishTime":14.568999999999999},{"text":"they often emerge through repeated questions,","startTime":14.77,"finishTime":17.129},{"text":"losing track of the conversation or","startTime":17.319,"finishTime":19.61},{"text":"giving inconsistent descriptions of recent events.","startTime":19.61,"finishTime":22.479},{"text":"These patterns signal that the interviewer should probe further.","startTime":22.85,"finishTime":25.93},{"text":"Functional prompts are a useful tool,","startTime":26.78,"finishTime":28.889},{"text":"asking whether the individual forgets steps in everyday tasks,","startTime":29.219,"finishTime":32.779},{"text":"whether remembering appointments has become more difficult,","startTime":32.939,"finishTime":35.919},{"text":"or whether they ever become confused about the day or place helps reveal practical,","startTime":36.22,"finishTime":40.799},{"text":"real world challenges.","startTime":41.18,"finishTime":42.5},{"text":"Caregivers often notice more severe symptoms than individuals acknowledge,","startTime":43.419,"finishTime":47.569},{"text":"so both perspectives must be documented neutrally.","startTime":47.939,"finishTime":50.86},{"text":"Cognitive findings must also align with other sections of the ACAT.","startTime":51.79,"finishTime":55.509},{"text":"Environmental safety concerns related to medication","startTime":56.349,"finishTime":59.47},{"text":"management link back to Section L.","startTime":59.47,"finishTime":61.43},{"text":"Assistance needs with daily tasks such as","startTime":62.349,"finishTime":64.949},{"text":"prompting or supervision connect to section C.","startTime":64.949,"finishTime":67.809},{"text":"And increased caregiver burden related to queuing or","startTime":68.62,"finishTime":71.459},{"text":"monitoring should be reflected in Section F.","startTime":71.459,"finishTime":73.94},{"text":"Together,","startTime":74.839,"finishTime":75.43},{"text":"these observations and prompts help the interviewer form a complete,","startTime":75.68,"finishTime":79.019},{"text":"accurate picture of the individual's cognitive functioning and","startTime":79.48,"finishTime":82.599},{"text":"the impact it has on daily life.","startTime":82.599,"finishTime":84.62}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["aNoLek6PSgaeR2PJ8","NBx44gpw6qZpAr4Dv"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This portion of Section M focuses on identifying cognitive limitations by combining targeted prompts with careful observation throughout the interview.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Cognitive concerns do not always appear through direct questioning. Instead, they often emerge through repeated questions, losing track of the conversation, or giving inconsistent descriptions of recent events. These patterns signal that the interviewer should probe further.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Functional prompts are a useful tool. Asking whether the individual forgets steps in everyday tasks, whether remembering appointments has become more difficult, or whether they ever become confused about the day or place helps reveal practical, real‑world challenges.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers often notice more severe symptoms than individuals acknowledge, so both perspectives must be documented neutrally.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Cognitive findings must also align with other sections of the A CAT.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Environmental safety concerns related to medication management link back to Section L.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Assistance needs with daily tasks such as prompting or supervision connect to Section C.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"And increased caregiver burden related to cueing or monitoring should be reflected in Section F.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Together, these observations and prompts help the interviewer form a complete, accurate picture of the individual’s cognitive functioning and the impact it has on daily life.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This portion of Section M focuses on identifying cognitive limitations by combining targeted prompts with careful observation throughout the interview.\nCognitive concerns do not always appear through direct questioning. Instead, they often emerge through repeated questions, losing track of the conversation, or giving inconsistent descriptions of recent events. These patterns signal that the interviewer should probe further.\nFunctional prompts are a useful tool. Asking whether the individual forgets steps in everyday tasks, whether remembering appointments has become more difficult, or whether they ever become confused about the day or place helps reveal practical, real‑world challenges.\nCaregivers often notice more severe symptoms than individuals acknowledge, so both perspectives must be documented neutrally.\nCognitive findings must also align with other sections of the A CAT.\nEnvironmental safety concerns related to medication management link back to Section L.\nAssistance needs with daily tasks such as prompting or supervision connect to Section C.\nAnd increased caregiver burden related to cueing or monitoring should be reflected in Section F.\nTogether, these observations and prompts help the interviewer form a complete, accurate picture of the individual’s cognitive functioning and the impact it has on daily life.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"FaynxFs27N9kC5NyP"}},"vxZXwhxf9D36qPdb7":{"_id":"vxZXwhxf9D36qPdb7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"DwzjCW8YP2jsEADf2"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"wim8WTuv4K36BBn5Q","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"LZJbNR4k56PS7mxBG","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":54.4625,"captions":[{"text":"DN our orders are frequently misunderstood,","startTime":0.17,"finishTime":3.039},{"text":"so the interviewer must take care","startTime":3.329,"finishTime":4.96},{"text":"to distinguish between a person's general preferences","startTime":4.96,"finishTime":7.76},{"text":"and an actual documented order.","startTime":7.969,"finishTime":9.829},{"text":"Asking whether a doctor has ever discussed a do not resuscitate order","startTime":10.72,"finishTime":14.46},{"text":"helps determine whether a formal document exists.","startTime":14.68,"finishTime":17.54},{"text":"If the individual indicates they do not want aggressive treatment","startTime":17.799,"finishTime":21.02},{"text":"but have never completed a DNR,","startTime":21.159,"finishTime":23.299},{"text":"the interviewer must clarify that preference and the absence of paperwork.","startTime":23.639,"finishTime":27.979},{"text":"For organ donor status,","startTime":28.889,"finishTime":30.36},{"text":"the simplest approach is to ask whether this information appears","startTime":30.649,"finishTime":33.77},{"text":"on their identification card or whether they've signed any forms.","startTime":33.77,"finishTime":37.279},{"text":"Because organ donation preferences may not be widely discussed within a family,","startTime":37.77,"finishTime":41.849},{"text":"this part of the interview may require sensitivity.","startTime":42.209,"finishTime":44.97},{"text":"The interviewer should record what is known,","startTime":45.84,"finishTime":48.04},{"text":"confirm whether documentation exists,","startTime":48.4,"finishTime":50.34},{"text":"and ensure that findings here match what is recorded in section E.","startTime":50.52,"finishTime":54.24}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["DwzjCW8YP2jsEADf2","LZJbNR4k56PS7mxBG"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"D N R orders are frequently misunderstood, so the interviewer must take care to distinguish between a person’s general preferences and an actual documented order. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking whether a doctor has ever discussed a Do Not Resuscitate order helps determine whether a formal document exists. If the individual indicates they do not want aggressive treatment but have never completed a D N R, the interviewer must clarify that preference and the absence of paperwork. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For organ‑donor status, the simplest approach is to ask whether this information appears on their identification card or whether they have signed any forms. Because organ donation preferences may not be widely discussed within a family, this part of the interview may require sensitivity. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should record what is known, confirm whether documentation exists, and ensure that findings here match what is recorded in Section E.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"D N R orders are frequently misunderstood, so the interviewer must take care to distinguish between a person’s general preferences and an actual documented order. \nAsking whether a doctor has ever discussed a Do Not Resuscitate order helps determine whether a formal document exists. If the individual indicates they do not want aggressive treatment but have never completed a D N R, the interviewer must clarify that preference and the absence of paperwork. \nFor organ‑donor status, the simplest approach is to ask whether this information appears on their identification card or whether they have signed any forms. Because organ donation preferences may not be widely discussed within a family, this part of the interview may require sensitivity. \nThe interviewer should record what is known, confirm whether documentation exists, and ensure that findings here match what is recorded in Section E.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"2D4WCDtcZPakw6ZeZ"}},"w5FopiaDRTQ4QYwAh":{"_id":"w5FopiaDRTQ4QYwAh","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"3fpNnzZuQmDFoDiMZ"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"3xisvyGbSrrWBk7hd","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"TujMzimmDst35tSBP","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":52.1125,"captions":[{"text":"Section J requires the interviewer to separate formal services,","startTime":0.209,"finishTime":3.92},{"text":"such as agency-provided personal care or therapy","startTime":3.93,"finishTime":6.969},{"text":"from informal supports provided by family,","startTime":7.21,"finishTime":9.64},{"text":"friends,","startTime":9.97,"finishTime":10.39},{"text":"or neighbors.","startTime":10.409,"finishTime":11.229},{"text":"Individuals frequently overlook informal health,","startTime":11.989,"finishTime":14.989},{"text":"especially when the support has become routine.","startTime":15.43,"finishTime":17.86},{"text":"Tasks such as cleaning,","startTime":18.229,"finishTime":19.54},{"text":"grocery shopping,","startTime":19.67,"finishTime":20.809},{"text":"lawn care,","startTime":21.069,"finishTime":21.729},{"text":"and meal preparation may be handled entirely by","startTime":21.79,"finishTime":24.989},{"text":"family members without being recognized as caregiving.","startTime":24.989,"finishTime":27.95},{"text":"The interviewer must clarify who completes each task and how often it occurs.","startTime":28.84,"finishTime":33.59},{"text":"This matters because formal services can be adjusted through authorization,","startTime":33.86,"finishTime":38.11},{"text":"while informal help may not be dependable long-term.","startTime":38.369,"finishTime":41.209},{"text":"Accurate documentation ensures that the assessment","startTime":42.049,"finishTime":45.09},{"text":"captures both professional and unpaid support,","startTime":45.09,"finishTime":48.15},{"text":"creating a realistic picture of the individual's daily life.","startTime":48.45,"finishTime":51.99}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["3fpNnzZuQmDFoDiMZ","TujMzimmDst35tSBP"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section J requires the interviewer to separate formal services—such as agency‑provided personal care or therapy—from informal supports provided by family, friends, or neighbors. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals frequently overlook informal help, especially when the support has become routine. Tasks such as cleaning, grocery shopping, lawn care, and meal preparation may be handled entirely by family members without being recognized as caregiving. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer must clarify who completes each task and how often it occurs. This matters because formal services can be adjusted through authorization, while informal help may not be dependable long‑term. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Accurate documentation ensures that the assessment captures both professional and unpaid support, creating a realistic picture of the individual’s daily life.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section J requires the interviewer to separate formal services—such as agency‑provided personal care or therapy—from informal supports provided by family, friends, or neighbors. \nIndividuals frequently overlook informal help, especially when the support has become routine. Tasks such as cleaning, grocery shopping, lawn care, and meal preparation may be handled entirely by family members without being recognized as caregiving. \nThe interviewer must clarify who completes each task and how often it occurs. This matters because formal services can be adjusted through authorization, while informal help may not be dependable long‑term. \nAccurate documentation ensures that the assessment captures both professional and unpaid support, creating a realistic picture of the individual’s daily life.","jobId":"MibeDmhXwLJwedADe"}},"wFDsFuAXpTrYAH4qq":{"_id":"wFDsFuAXpTrYAH4qq","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"RAy82vPsyJ3c2BdqG"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"oDCEyWXuL8x2m2scL","kind":"overlay","type":"rectangle","width":1280,"heig
