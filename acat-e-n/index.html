ation":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"hxB57ze9tvH37cGnz","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":44.95,"captions":[{"text":"Before closing the ACT,","startTime":0.289,"finishTime":1.71},{"text":"the interviewer should identify any items that still require follow-up.","startTime":2.049,"finishTime":6.15},{"text":"It is common for certain details,","startTime":6.88,"finishTime":8.84},{"text":"such as medication lists,","startTime":8.859,"finishTime":10.27},{"text":"provider contact information,","startTime":10.6,"finishTime":12.26},{"text":"or legal documentation","startTime":12.279,"finishTime":13.92},{"text":"to be incomplete during the interview.","startTime":14.119,"finishTime":15.96},{"text":"Pending items should be clearly noted and","startTime":16.318,"finishTime":18.559},{"text":"communicated to the appropriate staff for follow-up.","startTime":18.559,"finishTime":21.28},{"text":"The interviewer should also review any discrepancies that remain unresolved.","startTime":22.17,"finishTime":26.52},{"text":"These should be documented factually,","startTime":26.879,"finishTime":28.7},{"text":"with each perspective clearly attributed to its source.","startTime":28.819,"finishTime":31.899},{"text":"A systematic checklist approach","startTime":32.75,"finishTime":34.459},{"text":"helps ensure that no required follow-up is overlooked.","startTime":34.88,"finishTime":37.99},{"text":"Completing these final steps enhances the accuracy of the assessment","startTime":38.36,"finishTime":42.24},{"text":"and ensures that service planning can proceed without interruption.","startTime":42.439,"finishTime":46.36}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zN9wiMQmxqdS9ixvT","hxB57ze9tvH37cGnz"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Falls and mobility risks are essential components of Section N. Many individuals deny falling because they fear losing independence or services, so the interviewer must ask about slips, stumbles, or near‑falls—not only full falls. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Questions about dizziness, unsteadiness, or avoiding certain areas of the home often reveal safety concerns that require attention. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers may report falls or balance issues the individual forgot or chose not to mention. These accounts should be documented neutrally and integrated into the overall risk picture. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The information collected here must align with the mobility findings documented in Section C and the environmental observations recorded in Section L.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"zGP5t2FRgrq3dZQot","promptText":"Falls and mobility risks are essential components of Section N. Many individuals deny falling because they fear losing independence or services, so the interviewer must ask about slips, stumbles, or near‑falls—not only full falls. \nQuestions about dizziness, unsteadiness, or avoiding certain areas of the home often reveal safety concerns that require attention. \nCaregivers may report falls or balance issues the individual forgot or chose not to mention. These accounts should be documented neutrally and integrated into the overall risk picture. \nThe information collected here must align with the mobility findings documented in Section C and the environmental observations recorded in Section L."}},"EqYBjBco8nRmei74F":{"_id":"EqYBjBco8nRmei74F","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"j63YBqmZGQ6AzTgZW"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"dA9NkXtYSbMG2uHJk","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"pLSbfPT4cDBfj5e7N","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.1375,"captions":[{"text":"Section M also explores social isolation,","startTime":0.209,"finishTime":3.13},{"text":"which can significantly impact health and emotional well-being.","startTime":3.3689999999999998,"finishTime":6.929},{"text":"Individuals may hesitate to say they feel lonely,","startTime":7.73,"finishTime":10.479},{"text":"so instead the interviewer can ask how often they spend time with others,","startTime":10.729,"finishTime":14.439},{"text":"whether they have someone to talk to about personal concerns,","startTime":14.77,"finishTime":17.549},{"text":"or whether there are days when they do not see or speak to anyone.","startTime":17.85,"finishTime":21.17},{"text":"It is common for individuals to minimize isolation because","startTime":21.95,"finishTime":25.379},{"text":"they do not want to seem dependent or burdensome.","startTime":25.379,"finishTime":27.94},{"text":"Caregivers may provide helpful context about reduced engagement or withdrawal.","startTime":28.299,"finishTime":32.77},{"text":"Any signs of isolation should be documented clearly","startTime":33.619,"finishTime":36.669},{"text":"as they help inform later service planning,","startTime":36.669,"finishTime":39.02},{"text":"including potential referrals to adult day services,","startTime":39.38,"finishTime":42.25},{"text":"friendly visiting programs,","startTime":42.58,"finishTime":43.849},{"text":"or transportation supports.","startTime":43.979,"finishTime":45.86}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["j63YBqmZGQ6AzTgZW","pLSbfPT4cDBfj5e7N"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section M also explores social isolation, which can significantly impact health and emotional well‑being. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals may hesitate to say they feel lonely, so instead the interviewer can ask how often they spend time with others, whether they have someone to talk to about personal concerns, or whether there are days when they do not see or speak to anyone. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is common for individuals to minimize isolation because they do not want to seem dependent or burdensome. Caregivers may provide helpful context about reduced engagement or withdrawal. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any signs of isolation should be documented clearly, as they help inform later service planning, including potential referrals to adult day services, friendly‑visiting programs, or transportation supports.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section M also explores social isolation, which can significantly impact health and emotional well‑being. \nIndividuals may hesitate to say they feel lonely, so instead the interviewer can ask how often they spend time with others, whether they have someone to talk to about personal concerns, or whether there are days when they do not see or speak to anyone. \nIt is common for individuals to minimize isolation because they do not want to seem dependent or burdensome. Caregivers may provide helpful context about reduced engagement or withdrawal. \nAny signs of isolation should be documented clearly, as they help inform later service planning, including potential referrals to adult day services, friendly‑visiting programs, or transportation supports.","jobId":"rrpQdpMbc5GvB9egq"}},"FBGSaoAgGdZEhFLpY":{"_id":"FBGSaoAgGdZEhFLpY","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"HSHFXGhycfBbNYmAE"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"KAH6Zm4Kq3fCKdmpv","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"JpWyZfTXDXgQ2dkHp","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":55.3375,"captions":[{"text":"This final part of section K addresses","startTime":0.129,"finishTime":2.3689999999999998},{"text":"animals that support the individual's functioning.","startTime":2.3689999999999998,"finishTime":4.929},{"text":"Only trained service animals should be listed as adaptive or assistive equipment.","startTime":5.82,"finishTime":10.22},{"text":"Emotional support animals and pets,","startTime":10.51,"finishTime":12.67},{"text":"while important to the individual's well-being,","startTime":12.909,"finishTime":15.31},{"text":"are documented elsewhere in the ACAT,","startTime":15.6,"finishTime":17.659},{"text":"typically under environmental considerations.","startTime":18.19,"finishTime":20.59},{"text":"The interviewer should ask whether the animal is trained to","startTime":21.52,"finishTime":24.489},{"text":"perform specific tasks that assist with the individual's disability,","startTime":24.489,"finishTime":28.309},{"text":"and whether documentation exists to confirm that training.","startTime":28.569,"finishTime":31.85},{"text":"Even when an animal is not a service animal,","startTime":32.729,"finishTime":35.15},{"text":"its presence may affect safety,","startTime":35.29,"finishTime":37.169},{"text":"especially if it creates mobility hazards or interferes with medical equipment.","startTime":37.569,"finishTime":42.25},{"text":"These observations should be carried forward into later sections.","startTime":42.529,"finishTime":45.93},{"text":"With section K complete,","startTime":46.799,"finishTime":48.259},{"text":"the assessment is ready to move into section L,","startTime":48.439,"finishTime":50.99},{"text":"where home environment and safety are explored in greater detail.","startTime":51.279,"finishTime":55.099}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["HSHFXGhycfBbNYmAE","JpWyZfTXDXgQ2dkHp"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This final part of Section K addresses animals that support the individual’s functioning. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Only trained service animals should be listed as adaptive or assistive equipment. Emotional‑support animals and pets, while important to the individual’s well‑being, are documented elsewhere in the A CAT, typically under environmental considerations. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should ask whether the animal is trained to perform specific tasks that assist with the individual’s disability, and whether documentation exists to confirm that training. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Even when an animal is not a service animal, its presence may affect safety—especially if it creates mobility hazards or interferes with medical equipment. These observations should be carried forward into later sections. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"With Section K complete, the assessment is ready to move into Section L, where home environment and safety are explored in greater detail.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"This final part of Section K addresses animals that support the individual’s functioning. \nOnly trained service animals should be listed as adaptive or assistive equipment. Emotional‑support animals and pets, while important to the individual’s well‑being, are documented elsewhere in the A CAT, typically under environmental considerations. \nThe interviewer should ask whether the animal is trained to perform specific tasks that assist with the individual’s disability, and whether documentation exists to confirm that training. \nEven when an animal is not a service animal, its presence may affect safety—especially if it creates mobility hazards or interferes with medical equipment. These observations should be carried forward into later sections. \nWith Section K complete, the assessment is ready to move into Section L, where home environment and safety are explored in greater detail.","jobId":"873cuXn5ncPCnRD88"}},"FCgG9mncEaicau34R":{"_id":"FCgG9mncEaicau34R","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"PXx3pEi8ehyGKzSKs"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"FGcdBrFWcdjgfXGXf","kind":"overlay","type":"rectangle","width":1156,"height":753.4642857142859,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"DBhBgZv8Db3QhuNcv","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":46.1625,"captions":[{"text":"By the end of section M,","startTime":0.05,"finishTime":1.5699999999999998},{"text":"the interviewer should have a clear understanding","startTime":1.799,"finishTime":4.01},{"text":"of the individual's mental health needs,","startTime":4.01,"finishTime":6.159},{"text":"cognitive functioning,","startTime":6.489,"finishTime":7.57},{"text":"social supports,","startTime":7.88,"finishTime":8.81},{"text":"and behavioral patterns.","startTime":8.93,"finishTime":10.409},{"text":"These findings often help explain the ADL","startTime":11.319,"finishTime":14.14},{"text":"and IADL challenges documented earlier in Section C","startTime":14.239,"finishTime":18.18},{"text":"or the environmental and safety issues noted in Section L.","startTime":18.44,"finishTime":22.059},{"text":"Section M does not stand alone,","startTime":22.719,"finishTime":24.5},{"text":"it ties together information gathered throughout the assessment and highlights","startTime":24.6,"finishTime":28.51},{"text":"areas where additional support or follow-up may be required.","startTime":28.51,"finishTime":32.04},{"text":"With supplemental screening findings complete,","startTime":32.95,"finishTime":35.31},{"text":"the assessment now moves into section N,","startTime":35.59,"finishTime":37.869},{"text":"the final section of the ACAT,","startTime":38.229,"finishTime":39.95},{"text":"where additional medical,","startTime":40.229,"finishTime":41.33},{"text":"behavioral,","startTime":41.869,"finishTime":42.45},{"text":"and social risk questions help complete the overall picture.","startTime":42.47,"finishTime":45.909}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["PXx3pEi8ehyGKzSKs","DBhBgZv8Db3QhuNcv"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"By the end of Section M, the interviewer should have a clear understanding of the individual’s mental‑health needs, cognitive functioning, social supports, and behavioral patterns. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These findings often help explain the A D L and I A D L challenges documented earlier in Section C, or the environmental and safety issues noted in Section L. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section M does not stand alone—it ties together information gathered throughout the assessment and highlights areas where additional support or follow‑up may be required. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"With supplemental screening findings complete, the assessment now moves into Section N, the final section of the A CAT, where additional medical, behavioral, and social‑risk questions help complete the overall picture.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"By the end of Section M, the interviewer should have a clear understanding of the individual’s mental‑health needs, cognitive functioning, social supports, and behavioral patterns. \nThese findings often help explain the A D L and I A D L challenges documented earlier in Section C, or the environmental and safety issues noted in Section L. \nSection M does not stand alone—it ties together information gathered throughout the assessment and highlights areas where additional support or follow‑up may be required. \nWith supplemental screening findings complete, the assessment now moves into Section N, the final section of the A CAT, where additional medical, behavioral, and social‑risk questions help complete the overall picture.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"TFxrvDPynkhEwMK4P"}},"FM6Qu4Cf5TdxDWfHZ":{"_id":"FM6Qu4Cf5TdxDWfHZ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"4j77Jf5ZWXW9JSn8p"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Czg52RaENob2rEt3r","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"D3swKxYcBwRAc2gxh","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":40.4625,"captions":[{"text":"Dental screening often requires gentle,","startTime":0.129,"finishTime":2.45},{"text":"supportive conversation because individuals may feel embarrassed about","startTime":2.769,"finishTime":6.289},{"text":"dental problems or fear going to the dentist.","startTime":6.289,"finishTime":9.029},{"text":"Rather than asking general questions,","startTime":9.92,"finishTime":11.93},{"text":"interviewers should explore the timing of the last dental visit,","startTime":12.409,"finishTime":15.27},{"text":"any discomfort during chewing,","startTime":15.8,"finishTime":17.44},{"text":"and whether dentures or partials fit properly.","startTime":17.69,"finishTime":20.569},{"text":"Observation can be particularly helpful.","startTime":21.479,"finishTime":23.899},{"text":"Difficulty chewing,","startTime":24.04,"finishTime":25.18},{"text":"avoiding certain foods,","startTime":25.44,"finishTime":26.659},{"text":"or visible dental issues all provide clues about underlying needs.","startTime":26.879,"finishTime":30.899},{"text":"Caregivers may also be able to provide information about oral hygiene routines,","startTime":31.819,"finishTime":36.119},{"text":"especially for individuals with cognitive or mobility limitations.","startTime":36.419,"finishTime":40.2}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["4j77Jf5ZWXW9JSn8p","D3swKxYcBwRAc2gxh"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Dental screening often requires gentle, supportive conversation because individuals may feel embarrassed about dental problems or fear going to the dentist. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Rather than asking general questions, interviewers should explore the timing of the last dental visit, any discomfort during chewing, and whether dentures or partials fit properly. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Observation can be particularly helpful—difficulty chewing, avoiding certain foods, or visible dental issues all provide clues about underlying needs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers may also be able to provide information about oral‑hygiene routi "version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"To identify all equipment accurately, the interviewer must use targeted, descriptive questions rather than asking whether the individual uses ‘any equipment.’ \nMany people will only mention their primary device—a walker or cane—and overlook items such as shower chairs, commodes, or mobility equipment stored in the garage or a closet. \nThe most reliable way to complete this section is to walk through the home when possible and observe what is present. Even equipment that is broken or no longer used should be documented, as its presence often reflects historical or fluctuating needs. \nInterviewers must also remember to include devices used only in certain circumstances—such as transport chairs used for community outings or communication devices used during appointments.","jobId":"XaSYgjgyJKANjep66"}},"GXD9wBnqTkk9qJask":{"_id":"GXD9wBnqTkk9qJask","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"Nf8SbzCDh6g6Dhc9K"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"DT757NdjfwNYAh76Q","kind":"overlay","type":"rectangle","width":1221.8181818181822,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border finishTime":40.819},{"text":"J,","startTime":41.15,"finishTime":41.479},{"text":"and L.","startTime":41.599,"finishTime":42.459},{"text":"Section K provides important insight into how the individual supports mobility,","startTime":43,"finishTime":47.36},{"text":"communication,","startTime":47.52,"finishTime":48.509},{"text":"safety,","startTime":48.88,"finishTime":49.4},{"text":"and health within the home.","startTime":49.52,"finishTime":50.959}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["Nf8SbzCDh6g6Dhc9K","QMgG3oRM3DzAxToA7"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section K focuses on all adaptive and assistive equipment present in the home. This includes devices the individual uses every day, items used only occasionally, and even equipment that is broken or stored away. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals often forget about equipment that is not part of their daily routine, so the interviewer should not rely solely on self‑report. A thoughtful environmental scan is an essential part of this section. Section K includes both equipment and supplies be sure to document frequently overlooked items such as incontinence supplies, feeding supplies, eyeglasses, prosthetics. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because equipment use is closely related to functional performance, safety, and skilled‑care needs, every device documented here must connect logically to information found in earlier sections—particularly Sections B, C, J, and L. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section K provides important insight into how the individual supports mobility, communication, safety, and health within the home.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section K focuses on all adaptive and assistive equipment present in the home. This includes devices the individual uses every day, items used only occasionally, and even equipment that is broken or stored away. \nIndividuals often forget about equipment that is not part of their daily routine, so the interviewer should not rely solely on self‑report. A thoughtful environmental scan is an essential part of this section. Section K includes both equipment and supplies be sure to document frequently overlooked items such as incontinence supplies, feeding supplies, eyeglasses, prosthetics. \nBecause equipment use is closely related to functional performance, safety, and skilled‑care needs, every device documented here must connect logically to information found in earlier sections—particularly Sections B, C, J, and L. \nSection K provides important insight into how the individual supports mobility, communication, safety, and health within the home.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"PBj9WXzBAuAaKE3dR"}},"GXYRqafFpKEWuhBfC":{"_id":"GXYRqafFpKEWuhBfC","_sit e planning,","startTime":20.729,"finishTime":21.44},{"text":"and the coordination of medical,","startTime":21.53,"finishTime":23.399},{"text":"behavioral,","startTime":23.819,"finishTime":24.45},{"text":"and social supports.","startTime":24.489,"finishTime":25.969},{"text":"Many individuals are unsure about the specifics","startTime":26.909,"finishTime":29.35},{"text":"of their insurance coverage or legal arrangements,","startTime":29.35,"finishTime":32.098},{"text":"so the interviewer must be prepared to verify information","startTime":32.47,"finishTime":35.669},{"text":"and clarify details through documentation and caregiver input.","startTime":35.669,"finishTime":39.729},{"text":"Section E builds the foundation for understanding who supports the individual","startTime":40.74,"finishTime":45.08},{"text":"and how care is delivered,","startTime":45.299,"finishTime":46.819},{"text":"so a methodical approach is essential as the interview continues.","startTime":47.22,"finishTime":51.06}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["rRBatRXT6u54hMne8","7SHyjzf9xwFWzzNdR"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Beginning at section E where Waiver Service Coordinators complete their portion of the A CAT, the focus of the assessment shifts to the individual’s resources, insurance coverage, support team, and legal roles. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section E requires a high level of accuracy because the information captured here directly affects service authorization, care planning, and the coordination of medical, behavioral, and social supports. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals are unsure about the specifics of their insurance coverage or legal arrangements, so the interviewer must be prepared to verify information and clarify details through documentation and caregiver input. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section E builds the foundation for understanding who supports the individual and how care is delivered, so a methodical approach is essential as the interview continues.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Beginning at section E where Waiver Service Coordinators complete their portion of the A CAT, the focus of the assessment shifts to the individual’s resources, insurance coverage, support team, and legal roles. \nSection E requires a high level of accuracy because the information captured here directly affects service authorization, care planning, and the coordination of medical, behavioral, and social supports. \nMany individuals are unsure about the specifics of their insurance coverage or legal arrangements, so the interviewer must be prepared to verify information and clarify details through documentation and caregiver input. \nSection E builds the foundation for understanding who supports the individual and how care is delivered, so a methodical approach is essential as the interview continues.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"ppe8CytLAJGmtLMBi"}},"H8yh6zffP78jdLrme":{"_id":"H8yh6zffP78jdLrme","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"aB2epLEoDDWJYZtTv"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"RRspGAQQEafjuM4z6","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"pEWW2WqB2HqSDqx9j","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":44.7375,"captions":[{"text":"Another essential part of Section F is determining whether the caregiver","startTime":0.119,"finishTime":3.769},{"text":"has the skills needed to provide safe and effective support.","startTime":3.769,"finishTime":7.25},{"text":"Many caregivers perform tasks such as wound care,","startTime":8.18,"finishTime":11.21},{"text":"catheter maintenance,","startTime":11.46,"finishTime":12.64},{"text":"oxygen support,","startTime":12.859,"finishTime":14.02},{"text":"or medication administration without formal training.","startTime":14.18,"finishTime":17.129},{"text":"These situations represent potential risk and should be documented clearly.","startTime":17.459,"finishTime":21.78},{"text":"The interviewer can explore this by asking","startTime":22.659,"finishTime":25.049},{"text":"whether a nurse has demonstrated the task,","startTime":25.049,"finishTime":27.379},{"text":"whether the caregiver feels confident performing it,","startTime":27.659,"finishTime":30.34},{"text":"or whether additional instruction would be helpful.","startTime":30.569,"finishTime":32.919},{"text":"Any uncertainty expressed by caregivers must be captured in the ACAT","startTime":33.779,"finishTime":37.47},{"text":"because these concerns directly influence service planning,","startTime":37.95,"finishTime":40.959},{"text":"training needs,","startTime":41.27,"finishTime":41.99},{"text":"and overall level of care evaluation.","startTime":42.11,"finishTime":44.47}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["aB2epLEoDDWJYZtTv","pEWW2WqB2HqSDqx9j"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Another essential part of Section F is determining whether the caregiver has the skills needed to provide safe and effective support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many caregivers perform tasks such as wound care, catheter maintenance, oxygen support, or medication administration without formal training. These situations represent potential risk and should be documented clearly. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer can explore this by asking whether a nurse has demonstrated the task, whether the caregiver feels confident performing it, or whether additional instruction would be helpful. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any uncertainty expressed by caregivers must be captured in the A CAT, because these concerns directly influence service planning, training needs, and overall Level of Care evaluation.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Another essential part of Section F is determining whether the caregiver has the skills needed to provide safe and effective support. \nMany caregivers perform tasks such as wound care, catheter maintenance, oxygen support, or medication administration without formal training. These situations represent potential risk and should be documented clearly. \nThe interviewer can explore this by asking whether a nurse has demonstrated the task, whether the caregiver feels confident performing it, or whether additional instruction would be helpful. \nAny uncertainty expressed by caregivers must be captured in the A CAT, because these concerns directly influence service planning, training needs, and overall Level of Care evaluation.","jobId":"sQvbPJtgGAyRTYHfp"}},"H978HHMZYjPMavtD8":{"_id":"H978HHMZYjPMavtD8","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Thank You","upload":"XsAn95HaXEBipenbh"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T15:46:26.562Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"hpn28jFwzAGyzfm8b","kind":"overlay","type":"rectangle","width":1147,"height":61.00000000000001,"x":82,"y":180,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"font":{"size":35,"bold":true,"underline":false,"italic":false},"fontColor":"rgba(26,110,156,1)","textAlignment":"left","type":"rectangle","border":{"size":0,"color":"#000000","left":true,"right":true,"top":true,"bottom":true},"padding":{"top":0,"bottom":0,"left":0,"right":0},"lineHeight":1.2,"title":"Body Text","fill":{"type":"color","color":"rgba(255,255,255,0)"},"roundedCorners":{"bottomLeft":0,"bottomRight":0,"topLeft":0,"topRight":0},"textHeading":"heading1"},"htmlContent":"<div>Thank you for completing the ACAT Training</div>\n\n<div>&nbsp;</div>\n\n<div>You may exit the lesson</div>\n","start":0,"behaviorType":"continue","rotationAngle":0}],"duration":7.2875,"captions":[{"text":"This concludes administering the adult comprehensive assessment","startTime":0.129,"finishTime":3.25},{"text":"tool section E through N training.","startTime":3.25,"finishTime":5.15},{"text":"You may now exit this lesson.","startTime":5.389,"finishTime":7.01}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["XsAn95HaXEBipenbh"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This concludes Administering the Adult Comprehensive Asses rts exist,","startTime":0.009,"finishTime":2.95},{"text":"the interviewer must determine whether the frequency and reliability","startTime":3.25,"finishTime":7.05},{"text":"of those supports adequately meet the individual's needs.","startTime":7.05,"finishTime":10.369},{"text":"It is not uncommon for an aide to be scheduled multiple times per week,","startTime":11.18,"finishTime":14.92},{"text":"only for the individual to report that visits are frequently missed or shortened.","startTime":15.34,"finishTime":19.819},{"text":"The interviewer should explore whether tasks go unfinished,","startTime":20.75,"finishTime":24.04},{"text":"whether assistance is inconsistent,","startTime":24.239,"finishTime":26.18},{"text":"and whether the individual experiences days without the help they need.","startTime":26.399,"finishTime":30.2},{"text":"This information must align with the functional and","startTime":31.079,"finishTime":33.97},{"text":"medical needs documented earlier in the assessment.","startTime":33.97,"finishTime":37.069},{"text":"If the support provided does not match the level of need,","startTime":37.33,"finishTime":40.45},{"text":"that discrepancy must be clearly recorded.","startTime":40.729,"finishTime":43.33}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["upJdvu6bdp6fhN2aM","4X9AYnqfdNY8DS3AL"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In addition to identifying which supports exist, the interviewer must determine whether the frequency and reliability of those supports adequately meet the individual’s needs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is not uncommon for an aide to be scheduled multiple times per week, only for the individual to report that visits are frequently missed or shortened. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should explore whether tasks go unfinished, whether assistance is inconsistent, and whether the individual experiences days without the help they need. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This information must align with the functional and medical needs documented earlier in the assessment. If the support provided does not match the level of need, that discrepancy must be clearly recorded.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"In addition to identifying which supports exist, the interviewer must determine whether the frequency and reliability of those supports adequately meet the individual’s needs. \nIt is not uncommon for an aide to be scheduled multiple times per week, only for the individual to report that visits are frequently missed or shortened. \nThe interviewer should explore whether tasks go unfinished, whether assistance is inconsistent, and whether the individual experiences days without the help they need. \nThis ory challenges,","startTime":13.81,"finishTime":14.949},{"text":"limited transportation,","startTime":15.18,"finishTime":16.569},{"text":"fatigue,","startTime":16.809,"finishTime":17.53},{"text":"or a lack of support for daily tasks.","startTime":17.729,"finishTime":19.969},{"text":"These barriers help explain why certain activities are not happening,","startTime":20.84,"finishTime":24.459},{"text":"even when the individual expresses interest or use to participate.","startTime":24.639,"finishTime":28.42},{"text":"Aligning this information with earlier sections helps ensure the ACAT","startTime":29.309,"finishTime":33.08},{"text":"presents a consistent picture of daily functioning.","startTime":33.52,"finishTime":36.299},{"text":"Accurate documentation here also supports referrals","startTime":37.099,"finishTime":40.099},{"text":"in section J and informs service","startTime":40.099,"finishTime":42.259},{"text":"planning that may help the individual engage more fully with school,","startTime":42.259,"finishTime":45.88},{"text":"work,","startTime":46.18,"finishTime":46.54},{"text":"or community activities.","startTime":46.759,"finishTime":48.36}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["xd77MKZQH6FTmNJat","3FC6KDQ8yRkzc5KfZ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The final part of Section eye involves understanding why participation in school, work, or volunteer activity may be limited or absent. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should ask what makes participating difficult: mobility issues, memory challenges, limited transportation, fatigue, or a lack of support for daily tasks. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These barriers help explain why certain activities are not happening—even when the individual expresses interest or used to participate. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Aligning this information with earlier sections helps ensure the A CAT, presents a consistent picture of daily functioning. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Accurate documentation here also supports referrals in Section J and informs service planning that may help the individual engage more fully with school, work, or community activities.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The final part of Section eye involves understanding why participation in school, work, or volunteer activity may be limited or absent. \nThe interviewer should ask what makes participating difficult: mobility issues, memory challenges, limited transportation, fatigue, or a lack of support for daily tasks. \nThese barriers help explain why certain activities are not happening—even when the individual expresses interest or used to participate. \nAligning this information with earlier sections helps ensure the A CAT, presents a consistent picture of daily functioning. \nAccurate documentation here also supports referrals in Section J and informs service planning that may help the individual engage more fully with school, work, or community activities.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"Jcy3C37cK6vRN2fB2"}},"JRAQXBnJDQa677Tyt":{"_id":"JRAQXBnJDQa677Tyt","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"bpQ9tbkMyp2wXSrM6"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"yb22fgvMMCkKo6RW9","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"6KHiG63iLfgAYkxzf","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":42.675,"captions":[{"text":"Medication safety is a major part of Section L,","startTime":0.129,"finishTime":3.21},{"text":"particularly for individuals with cognitive limitations.","startTime":3.65,"finishTime":6.809},{"text":"Interviewers should ask where medications are stored and observe","startTime":7.61,"finishTime":10.97},{"text":"whether they are kept securely and clearly labeled.","startTime":10.97,"finishTime":13.92},{"text":"Loose pills,","startTime":14.289,"finishTime":14.97},{"text":"unlabeled containers,","startTime":15.1,"finishTime":16.409},{"text":"and unsecured medications present significant risks,","startTime":16.45,"finishTime":20},{"text":"especially for individuals who may confuse","startTime":20.45,"finishTime":22.69},{"text":"doses or forget recent administration.","startTime":22.69,"finishTime":24.87},{"text":"If a caregiver organizes medications,","startTime":26.079,"finishTime":28.29},{"text":"but the individual reports taking them independently,","startTime":28.489,"finishTime":31.59},{"text":"this discrepancy must be noted.","startTime":31.889,"finishTime":33.889},{"text":"Documenting","startTime":34.759,"finishTime":35.799},{"text":"medication safety issues here provides essential context for the","startTime":35.909,"finishTime":39.349},{"text":"medication management findings already recorded in section B.","startTime":39.349,"finishTime":42.419}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["bpQ9tbkMyp2wXSrM6","6KHiG63iLfgAYkxzf"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Medication safety is a major part of Section L, particularly for individuals with cognitive limitations. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers should ask where medications are stored and observe whether they are kept securely
