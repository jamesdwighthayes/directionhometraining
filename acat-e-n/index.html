eechData":{"prompt":"Dental screening often requires gentle, supportive conversation because individuals may feel embarrassed about dental problems or fear going to the dentist. \nRather than asking general questions, interviewers should explore the timing of the last dental visit, any discomfort during chewing, and whether dentures or partials fit properly. \nObservation can be particularly helpful—difficulty chewing, avoiding certain foods, or visible dental issues all provide clues about underlying needs. \nCaregivers may also be able to provide information about oral‑hygiene routines, especially for individuals with cognitive or mobility limitations.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"pEDTZqhXHxWGk8ToX","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Dental screening often requires gentle, supportive conversation because individuals may feel embarrassed about dental problems or fear going to the dentist. <break time=\"0.5s\"/>Rather than asking general questions, interviewers should explore the timing of the last dental visit, any discomfort during chewing, and whether dentures or partials fit properly. <break time=\"0.5s\"/>Observation can be particularly helpful—difficulty chewing, avoiding certain foods, or visible dental issues all provide clues about underlying needs. <break time=\"0.5s\"/>Caregivers may also be able to provide information about oral‑hygiene routines, especially for individuals with cognitive or mobility limitations.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Dental screening often requires gentle,","startTime":0.129,"finishTime":2.45},{"text":"supportive conversation because individuals may feel embarrassed about","startTime":2.769,"finishTime":6.289},{"text":"dental problems or fear going to the dentist.","startTime":6.289,"finishTime":9.029},{"text":"Rather than asking general questions,","startTime":9.92,"finishTime":11.93},{"text":"interviewers should explore the timing of the last dental visit,","startTime":12.409,"finishTime":15.27},{"text":"any discomfort during chewing,","startTime":15.8,"finishTime":17.44},{"text":"and whether dentures or partials fit properly.","startTime":17.69,"finishTime":20.569},{"text":"Observation can be particularly helpful.","startTime":21.479,"finishTime":23.899},{"text":"Difficulty chewing,","startTime":24.04,"finishTime":25.18},{"text":"avoiding certain foods,","startTime":25.44,"finishTime":26.659},{"text":"or visible dental issues all provide clues about underlying needs.","startTime":26.879,"finishTime":30.899},{"text":"Caregivers may also be able to provide information about oral hygiene routines,","startTime":31.819,"finishTime":36.119},{"text":"especially for individuals with cognitive or mobility limitations.","startTime":36.419,"finishTime":40.2}]}},"4uDgzLTmu79XFkGqq":{"_id":"4uDgzLTmu79XFkGqq","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1515456,"uploadedFileName":"Ava-en-EnsuringInternalAccuracy-362026.mp3","uploadedFileNameExtension":".mp3","duration":63.1125},"dates":{"dateCreated":"2026-03-06T19:26:53.845Z","dateModified":"2026-03-06T19:26:55.849Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Before the A CAT, can be considered complete, the interviewer must perform a final cross‑section review to ensure that all entries support a single, coherent narrative. \nSections A through N should not tell disconnected stories. Each section must reinforce and c /10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Finally, Section F asks whether there is a backup caregiver available, and this detail is more important than it may appear. <break time=\"0.5s\"/>Backup caregivers are not always reliable—sometimes they live far away, have limited availability, or are unaware that they are being considered a secondary support. <break time=\"0.5s\"/>The interviewer should confirm who would actually be available if the primary caregiver could not provide support. <break time=\"0.5s\"/>Indicators of risk include situations where no backup exists, or where the backup caregiver is already overwhelmed with other responsibilities. <break time=\"0.5s\"/>This information prepares the service team to identify gaps, consider respite needs, or plan for additional supports. <break time=\"0.5s\"/>With Section F complete, the interview now moves to Section G, where the focus shifts to legal considerations and advance planning.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Finally,","startTime":0.17,"finishTime":0.769},{"text":"section F asks whether there is a backup caregiver available,","startTime":0.92,"finishTime":4.269},{"text":"and this detail is more important than it may appear.","startTime":4.73,"finishTime":7.57},{"text":"Backup caregivers are not always reliable.","startTime":8.449,"finishTime":11.119},{"text":"Sometimes they live far away,","startTime":11.568999999999999,"finishTime":13.149},{"text":"have limited availability,","startTime":13.369,"finishTime":14.859},{"text":"or are unaware that they are being considered a secondary support.","startTime":15.05,"finishTime":18.43},{"text":"The interviewer should confirm who would actually be available","startTime":19.459,"finishTime":22.42},{"text":"if the primary caregiver could not provide support.","startTime":22.42,"finishTime":25.319},{"text":"Indicators of ris fficulty chewing, discomfort after eating, reliance on convenience foods, or statements like ‘I usually just have coffee in the morning.’ <break time=\"0.5s\"/>Food insecurity can also emerge during the discussion, especially if the individual depends on others for groceries or transportation. <break time=\"0.5s\"/>If the individual uses modified textures or thickeners, the interviewer must clarify who prepares these modifications and whether they are used consistently. <break time=\"0.5s\"/>All of these details should be captured clearly, as they may indicate a need for meal support services, dietary education, or additional in‑home assistance.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"In addition to self-report,","startTime":0.05,"finishTime":1.7690000000000001},{"text":"interviewers should listen for subtle signs of nutritional risk.","startTime":2.289,"finishTime":5.59},{"text":"These may include difficulty chewing,","startTime":5.929,"finishTime":7.909},{"text":"discomfort after eating,","startTime":8.05,"finishTime":9.479},{"text":"reliance on convenience foods,","startTime":9.68,"finishTime":11.56},{"text":"or statements like,","startTime":11.81,"finishTime":12.859},{"text":"I usually just have coffee in the morning.","startTime":12.97,"finishTime":15.09},{"text":"Food insecurity can also emerge during the discussion,","startTime":15.979,"finishTime":19.01},{"text":"especially if the individual depends on others for groceries or transportation.","startTime":19.409,"finishTime":23.77},{"text":"If the individual uses modified textures or thickeners,","startTime":24.639,"finishTime":28},{"text":"the interviewer must clarify who prepares these","startTime":28.37,"finishTime":31.11},{"text":"modifications and whether they are used consistently.","startTime":31.11,"finishTime":34.15},{"text":"All of these details should be captured clearly","startTime":35.02,"finishTime":37.599},{"text":"as they may indicate a need for mea peech","textToSpeechData":{"prompt":"Many individuals rely on medical devices such as oxygen tanks, CPAP machines, feeding pumps, or suction equipment. These devices introduce specific environmental risks that may not be obvious to the individual or caregiver. \nThe interviewer should look at where devices are placed, how they are powered, and whether the surrounding area is clear of hazards. \nExamples include oxygen tanks stored too close to heat sources, tubing stretched across walkways, or equipment crowded into tight spaces. \nAsking who sets up the equipment, who monitors it, and whether the individual ever has difficulty accessing it helps clarify both safety and caregiving needs. \nAny risk observed during the visit should be documented immediately, along with any education provided to address it.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"Jf4BWtsrAbgMGpFHG","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Many individuals rely on medical devices such as oxygen tanks, CPAP machines, feeding pumps, or suction equipment. These devices introduce specific environmental risks that may not be obvious to the individual or caregiver. <break time=\"0.5s\"/>The interviewer should look at where devices are placed, how they are powered, and whether the surrounding area is clear of hazards. <break time=\"0.5s\"/>Examples include oxygen tanks stored too close to heat sources, tubing stretched across walkways, or equipment crowded into tight spaces. <break time=\"0.5s\"/>Asking who sets up the equipment, who monitors it, and whether the individual ever has difficulty accessing it helps clarify both safety and caregiving needs. <break time=\"0.5s\"/>Any risk observed during the visit shou n links directly to mobility findings from Section C,","startTime":28.139,"finishTime":31.659},{"text":"equipment in Section K,","startTime":31.86,"finishTime":33.38},{"text":"and service gaps identified in Section J.","startTime":33.619,"finishTime":36.52},{"text":"A home that does not support an individual's","startTime":36.819,"finishTime":38.979},{"text":"functional and health needs can significantly increase risk,","startTime":38.979,"finishTime":42.319},{"text":"making Section L an essential part of the ACCAT.","startTime":42.54,"finishTime":45.299}]}},"ZteAE28YSMxqifMxS":{"_id":"ZteAE28YSMxqifMxS","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1336896,"uploadedFileName":"Ava-en-ServiceswithMultipleHelpers-362026.mp3","uploadedFileNameExtension":".mp3","duration":55.6625},"dates":{"dateCreated":"2026-03-06T18:10:34.693Z","dateModified":"2026-03-06T18:10:41.746Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"In many households, more than one person or agency provides assistance. A daughter may help with bathing on weekends, while an aide handles weekday support. A neighbor may run errands occasionally, and a volunteer driver may provide transportation once a month. \nIndividuals rarely list all of these helpers unless specifically asked, because they often think of support as a single relationship rather than a network. \nFor that reason, the interviewer must explore who helps on which days, how tasks are divided, and whether support is consistent. \nIt is common for caregivers to rotate duties informally, and the reliability of each arrangement can vary. If assistance is inconsistent, irregular, or dependent on someone’s availability, this should be documented clearly. These details help determine whether support is stable and whether additional services are needed.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"C7Ly6txRo6zXNMLPv","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">In many households, more than one person or agency provides assistance. A daughter may help with bathing on weekends, while an aide handles weekday support. A neighbor may run errands occasionally, and a volunteer driver may provide transportation once a month. <break time=\"0.5s\"/>Individuals rarely list all of these helpers unless specifically asked, because they often think of support as a single relationship rather than a network. <break time=\"0.5s\"/>For that reason, the interviewer must explore who helps on which days, how tasks are divided, and whether support is consistent. <break time=\"0.5s\"/>It is common for caregivers to rotate duties informally, and the reliability of each arrangement can vary. If assistance is inconsistent, irregular, or dependent on someone’s availability, this should be documented clearly. These details help determine whether support is stable and whether additional services are needed.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"In many households,","startTime":0.119,"finishTime":1.279},{"text":"more than one person or agency provides assistance.","startTime":1.45,"finishTime":4.869},{"text":"A daughter may help with bathing on weekends,","startTime":5.139,"finishTime":7.489},{"text":"while an aide handles weekday support.","startTime":7.699,"finishTime":10.109},{"text":"A neighbor may run errands occasionally,","startTime":10.329,"finishTime":12.529},{"text":"and a volunteer driver may provide transportation once a month.","sta hether the caregiver has the skills needed to provide safe and effective support. \nMany caregivers perform tasks such as wound care, catheter maintenance, oxygen support, or medication administration without formal training. These situations represent potential risk and should be documented clearly. \nThe interviewer can explore this by asking whether a nurse has demonstrated the task, whether the caregiver feels confident performing it, or whether additional instruction would be helpful. \nAny uncertainty expressed by caregivers must be captured in the A CAT, because these concerns directly influence service planning, training needs, and overall Level of Care evaluation.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"ss2nZSiGKuHb5wkzJ","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Another essential part of Section F is determining whether the caregiver has the skills needed to provide safe and effective support. <break time=\"0.5s\"/>Many caregivers perform tasks such as wound care, catheter maintenance, oxygen support, or medication administration without formal training. These situations represent potential risk and should be documented clearly. <break time=\"0.5s\"/>The interviewer can explore this by asking whether a nurse has demonstrated the task, whether the caregiver feels confident performing it, or whether additional instruction would be helpful. <break time=\"0.5s\"/>Any uncertainty expressed by caregivers must be captured in the A CAT, because these concerns directly influence service planning, training needs, and overall Level of Care evaluation.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Another essential part of Section F i tToSpeech","textToSpeechData":{"prompt":"This portion of Section M focuses on identifying cognitive limitations by combining targeted prompts with careful observation throughout the interview.\nCognitive concerns do not always appear through direct questioning. Instead, they often emerge through repeated questions, losing track of the conversation, or giving inconsistent descriptions of recent events. These patterns signal that the interviewer should probe further.\nFunctional prompts are a useful tool. Asking whether the individual forgets steps in everyday tasks, whether remembering appointments has become more difficult, or whether they ever become confused about the day or place helps reveal practical, real‑world challenges.\nCaregivers often notice more severe symptoms than individuals acknowledge, so both perspectives must be documented neutrally.\nCognitive findings must also align with other sections of the A CAT.\nEnvironmental safety concerns related to medication management link back to Section L.\nAssistance needs with daily tasks such as prompting or supervision connect to Section C.\nAnd increased caregiver burden related to cueing or monitoring should be reflected in Section F.\nTogether, these observations and prompts help the interviewer form a complete, accurate picture of the individual’s cognitive functioning and the impact it has on daily life.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"NDRuMi99ruGiY48em","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">This portion of Section M focuses on identifying cognitive limitations by combining targeted prompts with careful observation throughout the interview.<break time=\"0.5s\"/>Cognitive concerns do not always appe tience,","startTime":15.64,"finishTime":19.579},{"text":"using everyday language rather than technical legal phrasing.","startTime":19.84,"finishTime":23.44},{"text":"The goal is not only to document what legal documents exist,","startTime":23.68,"finishTime":27.079},{"text":"but also to understand whether those documents have","startTime":27.28,"finishTime":29.86},{"text":"been shared with caregivers or medical providers.","startTime":29.86,"finishTime":32.639},{"text":"Section G also must align with section E,","startTime":33.659,"finishTime":36.459},{"text":"where legal representatives were identified.","startTime":36.7,"finishTime":39.159},{"text":"Consistency between these sections ensures that the correct people are notified,","startTime":39.54,"finishTime":43.639},{"text":"involved,","startTime":44.13,"finishTime":44.4},{"text":"and authorized to act when needed.","startTime":44.819,"finishTime":46.819}]}},"aSoetiXCgixkDvNk7":{"_id":"aSoetiXCgixkDvNk7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1346688,"uploadedFileName":"Ava-en-RolesandResponsibilities-3202026.mp3","uploadedFileNameExtension":".mp3","duration":56.075},"dates":{"dateCreated":"2026-03-20T15:33:05.240Z","dateModified":"2026-03-20T15:33:07.683Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The A CAT, is divided into lettered sections, beginning with Section A and ending with Section N. \nSections A through D are completed by the Level of Care Assessor because they relate directly to determining eligibility—these include demographic information, medical history, diagnoses, and functional performance. \nSections E through N are completed by Waiver Service Coordinators and explore resources, caregivers, legal considerations, health s  descriptions. Because of this, interviewers must remain attentive to subtle indicators throughout the entire assessment.\nWandering is one of the most critical behavioral risks to identify. Leaving the home without awareness or purpose creates immediate safety concerns and should be documented carefully when observed or reported.\nAgitation is another behavioral pattern to note, particularly when escalating frustration or aggression affects care interactions or the individual’s ability to participate safely in daily tasks.\nHoarding or cluttering behaviors may also appear. Accumulation of items can create significant environmental hazards, as well as hygiene or mobility concerns, and must be documented when present.\nImpulsive decisions—such as unsafe choices or difficulty following instructions—signal impaired judgment and can put the individual at risk of injury or medical complications.\nRather than using clinical phrasing, interviewers should ask questions in everyday language, such as, ‘Have there been situations where others were worried about your safety?’ or ‘Do reminders help you stay on track with daily tasks?’ These approaches help gather accurate information without causing confusion or discomfort.\nBehavioral findings must also align with other sections of the A CAT.\nEnvironmental concerns identified in Section L, and safety or medical‑stability concerns captured in Section B, should connect with these behavioral observations.\nInterviewers should document specific examples provided by caregivers or observed firsthand, ensuring that the assessment presents a clear and accurate picture of how behavior affects safety and care needs.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"cPmfKQME5EbXGMvx3","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">This section of the assessment focuses on behavioral concerns that may influence safety or the level of support required. These issues often do not emerge through direct questioning. Instead, they surface indirectly during conversation, through observation, or through caregiver descriptions. Because of this, interviewers must remain attentive to subtle indicators throughout the entire assessment.<break time=\"0.5s\"/>Wandering is one of the most critical behavioral risks to identify. Leaving the home without awareness or purpose creates immediate safety concerns and should be documented carefully when observed or reported.<break time=\"0.5s\"/>Agitation is another behavioral pattern to note, particularly when escalating frustration or aggression affects care interactions or the individual’s ability to participate safely in daily tasks.<break time=\"0.5s\"/>Hoarding or cluttering behaviors may also appear. Accumulation of items can create significant environmental hazards, as well as hygiene or mobility concerns, and must be documented when present.<break time=\"0.5s\"/>Impulsive decisions—such as unsafe choices or difficulty following instructions—signal impaired judgment and can put the individual at risk of injury or medical complications.<break time=\"0.5s\"/>Rather than using clinical phrasing, interviewers should ask questions in everyday language, such as, ‘Have there been situations where others were worried about your safety?’ or ‘Do reminders help you stay on track with daily tasks?’ These approaches help gather accurate information without causing confusion or discomfort.<break time=\"0.5s\"/>Behavioral findings must also align with other sections of the A CAT.<break time=\"0.5s\"/>Environmental concerns identified in Section L, and safety or medical‑stability concerns captured in Section B, should connect with these behavioral observations.<break time=\"0.5s\"/>Interviewers should document specific examples provided by caregivers or observed firsthand, ensuring that the assessment presents a clear and accurate picture of how behavior affects safety and care needs.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"This section of the assessment focuses on behavioral concerns that","startTime":0.129,"finishTime":3.3689999999999998},{"text":"may influence safety or the level of support required.","startTime":3.3689999999999998,"finishTime":6.559},{"text":"These issues often do not emerge through direct questioning.","startTime":6.929,"finishTime":10.31},{"text":"Instead,","startTime":10.568999999999999,"finishTime":11.21},{"text":"they surface indirectly during conversation,","startTime":11.369,"finishTime":13.34},{"text":"through observation or through caregiver descriptions.","startTime":14.05,"finishTime":17.35},{"text":"Because of this,","startTime":17.809,"finishTime":18.59},{"text":"interviewers must remain attentive to subtle","startTime":19.09,"finishTime":21.159},{"text":"indicators throughout the entire assessment.","startTime":21.159,"finishTime":23.569},{"text":"Wandering is one of the most critical behavioral risks to identify.","startTime":24.569,"finishTime":28.579},{"text":"Leaving the home without awareness or purpose creates immediate safety concerns","startTime":28.92,"finishTime":33.439},{"text":"and should be documented carefully when observed or reported.","startTime":33.68,"finishTime":36.959},{"text":"Agitation is another behavioral pattern to note,","startTime":37.729,"finishTime":40.709},{"text":"particularly when escalating frustration or","startTime":41.159,"finishTime":43.56},{"text":"aggression affects care interactions or","startTime":43.56,"finishTime":46.09},{"text":"the individual's ability to participate safely in daily tasks.","startTime":46.09,"finishTime":49.849},{"text":"Hoarding or cluttering behaviors may also appear.","startTime":50.759,"finishTime":53.58},{"text":"Accumulation of items can create significant environmental hazards,","startTime":53.84,"finishTime":57.779},{"text":"as well as hygiene or mobility concerns,","startTime":57.959,"finishTime":60.74},{"text":"and must be documented when present.","startTime":60.959,"finishTime":63.08},{"text":"Impulsive decisions such as unsafe choices","startTime":63.919,"finishTime":66.879},{"text":"or difficulty following instructions signal impaired judgment","startTime":66.879,"finishTime":70.8},{"text":"and can put the individual at risk of injury or medical complications.","startTime":70.8,"finishTime":74.94},{"text":"Rather than using clinical phrasing,","startTime":75.809,"finishTime":77.69},{"text":"interviewers should ask questions in everyday language,","startTime":78.169,"finishTime":81.01},{"text":"such as,","startTime":81.019,"finishTime":81.559},{"text":"have there been situations where others were worried about your safety,","startTime":81.809,"finishTime":85.11},{"text":"or do reminders help you stay on track with daily tasks?","startTime":85.25,"finishTime":88.72},{"text":"These approaches help gather accurate information","startTime":89.089,"finishTime":91.73},{"text":"without causing confusion or discomfort.","startTime":91.73,"finishTime":94.01},{"text":"Behavioral findings must also align with other sections of the ACAT.","startTime":94.919,"finishTime":98.639},{"text":"Environmental concerns identified in Section L","startTime":99.5,"finishTime":102.54},{"text":"and safety or medical stability concerns captured in Section B","startTime":102.739,"finishTime":106.62},{"text":"should connect with these behavioral observations.","startTime":106.94,"finishTime":109.379},{"text":"Interviewers should document specific examples provided","startTime":110.19,"finishTime":113.309},{"text":"by caregivers or observed firsthand,","startTime":113.309,"finishTime":115.569},{"text":"ensuring that the assessment presents a clear and accurate","startTime":116.069,"finishTime":119.08 "},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"This portion of Section M focuses on understanding the individual’s social‑support network and the frequency and quality of their interactions with others.\nInterviewers should avoid relying on a simple question such as ‘Do you feel lonely?’ because many individuals underreport isolation. Often, they do not want to appear burdensome or may believe that loneliness reflects personal failure rather than a practical need for support.\nInstead, the goal is to ask questions that reveal the individual’s actual pattern of social contact.\nAsking how often the individual spends time with friends or family helps establish the baseline frequency of meaningful interaction.\nAsking whether the individual has someone to talk to when something is troubling them helps identify whether emotional support is available or if the individual tends to navigate difficulties alone.\nAsking if there are days when the individual does not see or speak to anyone reveals periods of complete isolation, which increases health and safety risks.\nCaregiver input is especially important in this area. Caregivers often notice reduced social contact long before the individual acknowledges it.\nSocial‑support findings influence several parts of service planning, including adult day services, friendly‑visiting programs, and transportation supports.\nAny concerns about isolation should align with behavioral‑risk items identified in the environmental section and with functional needs recorded in Section C.\nTogether, these questions help the interviewer understand how isolation affects the individual’s overall well‑being and where additional supports may be needed.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"TDsRdFi4Bek6CcBcZ","ssml":"<speak \n here are days when the individual does not","startTime":53.7,"finishTime":56.299},{"text":"see or speak to anyone reveals periods of complete isolation,","startTime":56.299,"finishTime":59.919},{"text":"which increases health and safety risks.","startTime":60.139,"finishTime":62.419},{"text":"Caregiver input is especially important in this area.","startTime":63.34,"finishTime":66.459},{"text":"Caregivers often notice reduced social contact","startTime":66.819,"finishTime":69.58},{"text":"long before the individual acknowledges it.","startTime":69.58,"finishTime":71.86},{"text":"Social support findings influence several parts of service planning,","startTime":72.809,"finishTime":76.309},{"text":"including adult day services,","startTime":76.65,"finishTime":78.239},{"text":"friendly visiting programs,","startTime":78.55,"finishTime":79.839},{"text":"and transportation supports.","startTime":79.93,"finishTime":81.91},{"text":"Any concerns about isolation should align with","startTime":82.779,"finishTime":85.54},{"text":"behavioral risk items identified in the environmental section","startTime":85.54,"finishTime":88.94},{"text":"and with functional needs recorded in Section C.","startTime":89.139,"finishTime":91.94},{"text":"Together,","startTime":92.809,"finishTime":93.44},{"text":"these questions help the interviewer understand how isolation affects the","startTime":93.69,"finishTime":97.769},{"text":"individual's overall well-being and where additional supports may be needed.","startTime":97.769,"finishTime":101.809}]}},"hxB57ze9tvH37cGnz":{"_id":"hxB57ze9tvH37cGnz","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":469226,"uploadedFileName":"How-to-Identify-and-Document-Fall-Related-Hazards.png","height":1081,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-04T23:52:15.147Z","dateModified":"2026-03-04T23:52:15.147Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F er discussion, it may become clear that visits are frequently missed or shortened. These inconsistencies affect the person’s safety and must be reflected in the ACAT. \nAsking whether caregivers show up on time, stay the full duration, and complete all necessary tasks helps the interviewer understand the stability of support. \nIf services are unreliable or insufficient, the A CAT, should explicitly document these gaps. This information drives decisions about increasing support, requesting alternate providers, or adding additional services.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"nZrNpRFJoE4syrLCi","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">It is not enough to document that a service exists—Section J also requires the interviewer to determine whether the service is reliable. <break time=\"0.5s\"/>Individuals may report that an aide comes three times a week, but upon further discussion, it may become clear that visits are frequently missed or shortened. These inconsistencies affect the person’s safety and must be reflected in the ACAT. <break time=\"0.5s\"/>Asking whether caregivers show up on time, stay the full duration, and complete all necessary tasks helps the interviewer understand the stability of support. <break time=\"0.5s\"/>If services are unreliable or insufficient, the A CAT, should explicitly document these gaps. This information drives decisions about increasing support, requesting alternate providers, or adding additional services.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"It is not enough to document that a service exists.","startTime":0.019,"finishTime":2.599},{"text":"Section J also requires the interviewer to", TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section F focuses on the primary caregiver, and it is one of the most important areas for understanding the stability of the individual’s daily support system. \nMany caregivers do not view themselves as caregivers—they may describe what they do simply as ‘helping’—so the interviewer must take care to identify who actually provides support and how consistently that support is available. \nThis section requires sensitivity because caregivers may under‑state stress or minimize their own needs. By using calm, open‑ended questions, the interviewer can gather the information needed to determine whether the caregiver arrangement is sustainable. \nSection F must connect back to earlier details in the A CAT, especially who was identified as part of the support team in Section E and who assists with A D Ls and I A D Ls in Section C.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"vjAAsF38Hq7ZhFRrJ","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-AvaNeural\">Section F focuses on the primary caregiver, and it is one of the most important areas for understanding the stability of the individual’s daily support system. <break time=\"0.5s\"/>Many caregivers do not view themselves as caregivers—they may describe what they do simply as ‘helping’—so the interviewer must take care to identify who actually provides support and how consistently that support is available. <break time=\"0.5s\"/>This section requires sensitivity because caregivers may under‑state stress or minimize their own needs. By using calm, open‑ended questions, the interviewer can gather the information needed to determine whether the caregiver arrangement is sustainable. <break time=\ er available,","startTime":0.92,"finishTime":4.269},{"text":"and this detail is more important than it may appear.","startTime":4.73,"finishTime":7.57},{"text":"Backup caregivers are not always reliable.","startTime":8.449,"finishTime":11.119},{"text":"Sometimes they live far away,","startTime":11.568999999999999,"finishTime":13.149},{"text":"have limited availability,","startTime":13.369,"finishTime":14.859},{"text":"or are unaware that they are being considered a secondary support.","startTime":15.05,"finishTime":18.43},{"text":"The interviewer should confirm who would actually be available","startTime":19.459,"finishTime":22.42},{"text":"if the primary caregiver could not provide support.","startTime":22.42,"finishTime":25.319},{"text":"Indicators of risk include situations where no backup exists or","startTime":26.059,"finishTime":30.459},{"text":"where the backup caregiver is already overwhelmed with other responsibilities.","startTime":30.459,"finishTime":34.619},{"text":"This information prepares the service team to identify gaps,","startTime":35.529,"finishTime":39.04},{"text":"consider respite needs,","startTime":39.29,"finishTime":40.509},{"text":"or plan for additional supports.","startTime":40.65,"finishTime":42.61},{"text":"With section F complete,","startTime":43.5,"finishTime":44.9},{"text":"the interview now moves to section G,","startTime":45.189,"finishTime":47.47},{"text":"where the focus shifts to legal considerations and advanced planning.","startTime":47.79,"finishTime":51.509}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["7jxyCHXji54XyKEFs","65T5NB3T2wZbj9giZ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Finally, Section F asks whether there is a backup caregiver available, and this detail is more important than it may appear. \",\"type\":\"text\",\"version\":1}],\"direction\":n advance planning.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Finally, Section F asks whether there is a backup caregiver available, and this detail is more important than it may appear. \nBackup caregivers are not always reliable—sometimes they live far away, have limited availability, or are unaware that they are being considered a secondary support. \nThe interviewer should confirm who would actually be available if the primary caregiver could not provide support. \nIndicators of risk include situations where no backup exists, or where the backup caregiver is already overwhelmed with other responsibilities. \nThis information prepares the service team to identify gaps, consider respite needs, or plan for additional supports. \nWith Section F complete, the interview now moves to Section G, where the focus shifts to legal considerations and advance planning.","jobId":"tdYkzeSoLzfpKHGcx"}},"86Qij5R7Hn4LsanJA":{"_id":"86Qij5R7Hn4LsanJA","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"x6QjHdzgpkQnBBMnJ"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"XnriZr9Z9miEqiwKF","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectang }}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section N is the final content section of the A CAT, and serves as a comprehensive check for any additional health‑related information that has not been captured elsewhere. \nThis section helps clarify the broader context around medical, behavioral, environmental, and social risks, ensuring that nothing important is missed before the assessment is completed. \nIndividuals may not understand why these questions matter, so the interviewer must take time to explore them thoughtfully, using plain language instead of clinical terminology. \nSection N builds on everything gathered throughout the A CAT, and helps form a complete, coherent picture of the individual’s overall health status and risk factors.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"KwsDEphSNLQAkFNdB"}},"8h9NgaTScPQTZywZH":{"_id":"8h9NgaTScPQTZywZH","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"YyX4qD8YdK2mbcWti"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"gaH6gLACxZYXFDhTE","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"fEtv8qpEzhWepAya7","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.425,"captions":[{"text":"Many individuals rely on medical devices such as oxygen tanks,","startTime":0.17,"finishTime":4.429},{"text":"CPAP machines,","startTime":4.61,"finishTime":5.639},{"text":"feeding pumps,","startTime":5.769,"finishTime":6.6899999999999995},{"text":"or suction equipment.","startTime":6.699,"finishTime":8.039},{"text":"These devices introduce specific environmental risks that may","startTime":8.329,"finishTime":11.729},{"text":"not be obvious to the individual or caregiver.","startTime":11.729,"finishTime":14.489},{"text":"The interviewer should look at where devices are placed,","startTime":15.38,"finishTime":18.02},{"text":"how they are powered,","startTime":18.219,"finishTime":19.139},{"text":"and whether the surrounding area is clear of hazards.","startTime":19.219,"finishTime":22.459},{"text":"Examples include oxygen tanks stored too close to heat sources,","startTime":23.319,"finishTime":27.399},{"text":"tubing stretched across walkways,","startTime":27.61,"finishTime":29.36},{"text":"or equipment crowded into tight spaces.","startTime":29.61,"finishTime":32.049},{"text":"Asking who sets up the equipment,","startTime":32.95,"finishTime":34.619},{"text":"who monitors it,","startTime":34.869,"finishTime":35.77},{"text":"and whether the individual ever has difficulty accessing,","startTime":35.909,"finishTime":39.18},{"text":"it helps clarify both safety and caregiving needs.","startTime":39.189,"finishTime":42.63},{"text":"Any risk observed during the visit should be documented immediately,","startTime":43.5,"finishTime":47.04},{"text":"along with any education provided to address it.","startTime":47.38,"finishTime":50.139}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["YyX4qD8YdK2mbcWti","fEtv8qpEzhWepAya7"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals rely on medical devices such as oxygen tanks, CPAP machines, feeding pumps, or suction equipment. These devices introduce specific environmental risks that may not be obvious to the individual or caregiver. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should look at where devices are placed, how they are powered, and whether the surrounding area is clear of hazards. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Examples include oxygen tanks stored too close to heat sources, tubing stretched across walkways, or equipment crowded into tight spaces. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking who sets up the equipment, who monitors it, and whether the individual ever has difficulty accessing it helps clarify both safety and caregiving needs. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any risk observed during the visit should be documented immediately, along with any education provided to address it.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Many individuals rely on medical devices such as oxygen tanks, CPAP machines, feeding pumps, or suction equipment. These devices introduce specific environmental risks that may not be obvious to the individual or caregiver. \nThe interviewer should look at where devices are placed, how they are powered, and whether the surrounding area is clear of hazards. \nExamples include oxygen tanks stored too close to heat sources, tubing stretched across walkways, or equipment crowded into tight spaces. \nAsking who sets up the equipment, who monitors it, and whether the individual ever has difficulty accessing it helps clarify both safety and caregiving needs. \nAny risk observed during the visit should be documented immediately, along with any education provided to address it.","jobId":"QZCimsYnHaWspcm55"}},"8oeDPkfSNvYLdkw8b":{"_id":"8oeDPkfSNvYLdkw8b","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"BwhWpbbExyj37gmAo"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"3HJbyesbyy6fqbBJY","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut" :41.56},{"text":"With section E completed,","startTime":42.38,"finishTime":43.819},{"text":"the assessment now moves into section F,","startTime":44.02,"finishTime":46.259},{"text":"where the primary caregiver's capacity,","startTime":46.54,"finishTime":48.779},{"text":"limitations,","startTime":49.06,"finishTime":49.919},{"text":"and support needs are examined in more detail.","startTime":50.06,"finishTime":52.88}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["BwhWpbbExyj37gmAo","53YJkyidRAdqDTo4m"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Before leaving Section E, the interviewer should check that the information collected here matches the earlier details in Section A and prepares the ground for Section F. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If someone is listed as part of the support team in Section E, that individual should also appear in the caregiver or service‑planning sections if they provide hands‑on support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Likewise, if an individual relies on a family member for transportation or daily tasks, that should be reflected consistently throughout the A CAT. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This cross‑checking step helps identify gaps, resolve contradictions, and ensure the assessment provides a complete and accurate understanding of the individual’s support network. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"With Section E completed, the assessment now moves into Section F, where the primary caregiver’s capacity, limitations, and support needs are examined in more detail.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Before leaving Section E, the interviewer should check that the information collected here matches the earlier details in Section A and prepares the ground for Section F. \nIf someone is listed as part of the support team in Section E, that individual should also appear in the caregiver or service‑planning sections if they provide hands‑on support. \nLikewise, if an individual relies on a family member for transportation or daily tasks, that should be reflected consistently throughout the A CAT. \nThis cross‑checking step helps identify gaps, resolve contradictions, and ensure the assessment provides a complete and accurate understanding of the individual’s support network. \nWith Section E completed, the assessment now moves into Section F, where the primary caregiver’s capacity, limitations, and support needs are examined in more detail.","jobId":"wERkDN2vJjRWCQpk7"}},"AMjDvYdKCy45hFBQ8": ull,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Behavioral‑health concerns in Section M often emerge indirectly. Individuals may not report wandering, impulsive behavior, or difficulty following instructions unless asked with very specific, non‑judgmental prompts. \nThe interviewer should ask whether there have been recent safety concerns or whether reminders are needed to stay on track with daily tasks. \nCaregivers often provide the clearest insight into behavior patterns that affect safety—such as leaving the stove on, misplacing medications, or becoming agitated in certain situations. \nAny behaviors that increase risk must be documented, especially if they connect to environmental concerns from Section L or medication issues from Section B. This ensures the assessment reflects a consistent, integrated picture of the individual’s needs.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"zw9f9buPbqNJyKuBC"}},"CTcy4bHbW2Rhq3L8c":{"_id":"CTcy4bHbW2Rhq3L8c","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"WmZeFqpNSMzJsasYE"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"fBw7xJiWwWtQrfQ5T","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"ZZuCq7tNHq9X2pBWR","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":51.9375,"captions":[{"text":"Employment questions must differentiate between current work,","startTime":0.009,"finishTime":3.509},{"text":"previous work,","startTime":3.769,"finishTime":4.539},{"text":"and future goals.","startTime":4.6899999999999995,"finishTime":5.949},{"text":"Individuals may identify themselves as employed when","startTime":6.21,"finishTime":8.97},{"text":"they have not worked in months,","startTime":8.97,"finishTime":10.27},{"text":"or they may consider occasional tasks or informal","startTime":10.529,"finishTime":13.489},{"text":"help for friends or family as jobs.","startTime":13.489,"finishTime":16.01},{"text":"Asking where they work,","startTime":16.87,"finishTime":18.229},{"text":"how many hours they worked this week,","startTime":18.469,"finishTime":20.27},{"text":"or when they last received a paycheck","startTime":20.549,"finishTime":22.67},{"text":"helps clarify the situation.","startTime":22.829,"finishTime":24.37},{"text":"If the individual is interested in working but is not currently employed,","startTime":25.6,"finishTime":29.52},{"text":"the interviewer should explore the reasons why,","startTime":29.809,"finishTime":32.11},{"text":"whether due to transportation limits,","startTime":32.49,"finishTime":34.4},{"text":"health changes,","startTime":34.709,"finishTime":35.52},{"text":"or lack of support.","startTime":35.77,"finishTime":37},{"text":"Employment information must logically match functional assessments.","startTime":37.79,"finishTime":42.069},{"text":"If the individual reports significant mobility challenges","startTime":42.31,"finishTime":45.75},{"text":"or cognitive limitations in Section C,","startTime":45.75,"finishTime":48.27},{"text":"these must be reflected in the employment narrative as well.","startTime":48.659,"finishTime":51.689}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["WmZeFqpNSMzJsasYE","ZZuCq7tNHq9X2pBWR"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Employment questions must differentiate between current work, previous work, and future goals. Individuals may identify themselves as employed when they have not worked in months, or they may consider occasional tasks or informal help for friends or family as ‘jobs.’ \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Asking where they work, how many hours they worked this week, or when they last received a paycheck helps clarify the situation. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the individual is interested in working but is not currently employed, the interviewer should explore the reasons why—whether due to transportation limits, health changes, or lack of support. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Employment information must logically match functional assessments. If the individual reports significant mobility challenges or cognitive limitations in Section C, these must be reflected in the employment narrative as well.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Employment questions must differentiate between current work, previous work, and future goals. Individuals may identify themselves as employed when they have not worked in months, or they may consider occasional tasks or informal help for friends or family as ‘jobs.’ \nAsking where they work, how many hours they worked this week, or when they last received a paycheck helps clarify the situation. \nIf the individual is interested in working but is not currently employed, the interviewer should explore the reasons why—whether due to transportation limits, health changes, or lack of support. \nEmployment information must logically match functional assessments. If the individual reports significant mobility challenges or cognitive limitations in Section C, these must be reflected in the employment narrative as well.","jobId":"42PGgfPgDqd7q6CRg"}},"EMF3XLgrqRcM7dw6a":{"_id":"EMF3XLgrqRcM7dw6a","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"2FTbzz5gfamQrJ65e"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"R4
