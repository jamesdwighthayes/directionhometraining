es essential context for the medication management findings already recorded in Section B.","jobId":"5yRCuL3XPGeTR9DiP"}},"K3efKkfB8yEi7mkG2":{"_id":"K3efKkfB8yEi7mkG2","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"gBkEtdW55oFNA9Q7r"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"oYm7aFG7AbGtg9RK8","kind":"overlay","type":"rectangle","width":1138,"height":744.4416666666666,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"JkcqZJiB3NnhDr74S","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":48.9875,"captions":[{"text":"To identify current services,","startTime":0.119,"finishTime":2},{"text":"the interviewer should avoid leading with the term services,","startTime":2.289,"finishTime":5.26},{"text":"because individuals may associate that word only with professional agencies.","startTime":5.61,"finishTime":10.09},{"text":"Instead,","startTime":10.899000000000001,"finishTime":11.659},{"text":"asking who assists with meals,","startTime":12.02,"finishTime":13.779},{"text":"cleaning,","startTime":14.01,"finishTime":14.5},{"text":"bathing,","startTime":14.659,"finishTime":15.22},{"text":"or transportation will reveal both paid supports","startTime":15.34,"finishTime":18.34},{"text":"and informal help from family or neighbors.","startTime":18.34,"finishTime":20.979},{"text":"Many individuals forget to mention intermittent services like","startTime":21.899,"finishTime":25.03},{"text":"homemaking or meal delivery unless asked directly.","startTime":25.03,"finishTime":28.379},{"text":"Interviewers should also confirm whether support from an aide is consistent,","startTime":28.709,"finishTime":32.569},{"text":"whether visits occur as scheduled,","startTime":33.15,"finishTime":34.86},{"text":"and whether tasks are fully completed.","startTime":34.869,"finishTime":37.11},{"text":"Documenting the frequency,","startTime":38,"finishTime":39.419},{"text":"provider type and reliability of each support is crucial","startTime":39.799,"finishTime":43.38},{"text":"because these details shape the level of","startTime":43.68,"finishTime":45.72},{"text":"care evaluation and future service planning.","startTime":45.72,"finishTime":48.759}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["gBkEtdW55oFNA9Q7r","JkcqZJiB3NnhDr74S"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To identify current services, the interviewer should avoid leading with the term ‘services,’ because individuals may associate that word only with professional agencies. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Instead, asking who assists with meals, cleaning, bathing, or transportation will reveal both paid supports and informal help from family or neighbors. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals forget to mention intermittent services like homemaking or meal delivery unless asked directly. Interviewers should also confirm whether support from an aide is consistent—whether visits occur as scheduled and whether tasks are fully completed. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Documenting the frequency, provider type, and reliability of each support is crucial because these details shape the Level of Care evaluation and future service planning.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"To identify current services, the interviewer should avoid leading with the term ‘services,’ because individuals may associate that word only with professional agencies. \nInstead, asking who assists with meals, cleaning, bathing, or transportation will reveal both paid supports and informal help from family or neighbors. \nMany individuals forget to mention intermittent services like homemaking or meal delivery unless asked directly. Interviewers should also confirm whether support from an aide is consistent—whether visits occur as scheduled and whether tasks are fully completed. \nDocumenting the frequency, provider type, and reliability of each support is crucial because these details shape the Level of Care evaluation and future service planning.","jobId":"42iWRZw5mz3HNsAzx"}},"Kb2uiSQLNSTeg5Bjm":{"_id":"Kb2uiSQLNSTeg5Bjm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"2GndsFB3qfz8skoRE"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"rxPiAHgZRAqo9JFMq","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"nS9KAw4PvEQZHLwL8","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":51.7625,"captions":[{"text":"When exploring advanced directives,","startTime":0.129,"finishTime":1.99},{"text":"it is important to avoid reading the ACAT","startTime":2.21,"finishTime":4.449},{"text":"wording verbatim.","startTime":4.969,"finishTime":6.05},{"text":"Most people are unfamiliar with terms","startTime":6.369,"finishTime":8.529},{"text":"like advance directive or healthcare directive.","startTime":8.529,"finishTime":11.67},{"text":"Instead,","startTime":11.93,"finishTime":12.568999999999999},{"text":"the interviewer should ask whether the individual","startTime":12.85,"finishTime":15.25},{"text":"has ever completed paperwork that describes the","startTime":15.25,"finishTime":17.77},{"text":"type of medical care they want if they are unable to speak for themselves.","startTime":17.77,"finishTime":21.59},{"text":"If someone says they think they have a living will,","startTime":22.389,"finishTime":25.059},{"text":"follow-up questions can help determine whether the document truly exists.","startTime":25.37,"finishTime":29.53},{"text":"Sometimes individuals recall receiving paperwork in the hospital,","startTime":30.11,"finishTime":33.25},{"text":"but never completed it,","startTime":33.389,"finishTime":34.689},{"text":"or they may have signed something years ago without remembering details.","startTime":34.909,"finishTime":38.29},{"text":"The interviewer should document whatever is known and","startTime":39.159,"finishTime":41.689},{"text":"indicate when copies or verification are still needed.","startTime":41.689,"finishTime":45.15},{"text":"This creates a clear path for follow-up without requiring","startTime":45.409,"finishTime":48.43},{"text":"the individual to locate documents during the interview.","startTime":48.43,"finishTime":51.509}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["2GndsFB3qfz8skoRE","nS9KAw4PvEQZHLwL8"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When exploring advance directives, it is important to avoid reading the A CAT, wording verbatim. Most people are unfamiliar with terms like ‘advance directive’ or ‘health‑care directive.’ Instead, the interviewer should ask whether the individual has ever completed paperwork that describes the type of medical care they want if they are unable to speak for themselves. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If someone says they ‘think’ they have a living will, follow‑up questions can help determine whether the document truly exists. Sometimes individuals recall receiving paperwork in the hospital but never completed it, or they may have signed something years ago without remembering details. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The interviewer should document whatever is known and indicate when copies or verification are still needed. This creates a clear path for follow‑up without requiring the individual to locate documents during the interview.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"When exploring advance directives, it is important to avoid reading the A CAT, wording verbatim. Most people are unfamiliar with terms like ‘advance directive’ or ‘health‑care directive.’ Instead, the interviewer should ask whether the individual has ever completed paperwork that describes the type of medical care they want if they are unable to speak for themselves. \nIf someone says they ‘think’ they have a living will, follow‑up questions can help determine whether the document truly exists. Sometimes individuals recall receiving paperwork in the hospital but never completed it, or they may have signed something years ago without remembering details. \nThe interviewer should document whatever is known and indicate when copies or verification are still needed. This creates a clear path for follow‑up without requiring the individual to locate documents during the interview.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"nf6gdtseSXFuC9nq7"}},"Nyb8SBcLPqsx4sQTY":{"_id":"Nyb8SBcLPqsx4sQTY","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"tWuxt5Bkn2LzT4QEv"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"HvnZdQjbsXKkfpDaR","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"kPRXPhkksX66XqoB9","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.65,"captions":[{"text":"Caregiver burnout can reveal itself subtly,","startTime":0.17,"finishTime":2.63},{"text":"so the interviewer must listen carefully for signs of strain.","startTime":2.809,"finishTime":6.269},{"text":"A caregiver may describe the tasks they perform","startTime":6.53,"finishTime":9.109},{"text":"without mentioning the emotional or physical burden involved.","startTime":9.109,"finishTime":12.229},{"text":"Questions focused on frequency and daily routine help bring clarity.","startTime":13.109,"finishTime":17.42},{"text":"How often are you assisting each day,","startTime":17.719,"finishTime":19.7},{"text":"or are there tasks that have become harder recently?","startTime":19.93,"finishTime":22.94},{"text":"Caregivers who are juggling work,","startTime":23.829,"finishTime":25.579},{"text":"childcare,","startTime":25.87,"finishTime":26.469},{"text":"or care for additional family members may be operating at or near their limit.","startTime":26.6,"finishTime":31.09},{"text":"Documenting these pressures is important because they indicate the stability","startTime":31.469,"finishTime":35.61},{"text":"or instability","startTime":35.79,"finishTime":37.009},{"text":"of the current support arrangement.","startTime":37.189,"finishTime":38.909},{"text":"Interviewers must remain neutral and","startTime":39.729,"finishTime":42.13},{"text":"supportive while gathering this information,","startTime":42.13,"finishTime":44.229},{"text":"noting the caregiver's tone,","startTime":44.569,"finishTime":46.009},{"text":"fatigue,","startTime":46.24,"finishTime":46.93},{"text":"or hesitation as potential indicators of stress.","startTime":47.13,"finishTime":50.509}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["tWuxt5Bkn2LzT4QEv","kPRXPhkksX66XqoB9"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregiver burnout can reveal itself subtly, so the interviewer must listen carefully for signs of strain. A caregiver may describe the tasks they perform without mentioning the emotional or physical burden involved. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Questions focused on frequency and daily routine help bring clarity: ‘How often are you assisting each day?’ or ‘Are there tasks that have become harder recently?’ \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers who are juggling work, childcare, or care for additional family members may be operating at or near their limit. Documenting these pressures is important because they indicate the stability—or instability—of the current support arrangement. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Interviewers must remain neutral and supportive while gathering this information, noting the caregiver’s tone, fatigue, or hesitation as potential indicators of stress.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Caregiver burnout can reveal itself subtly, so the interviewer must listen carefully for signs of strain. A caregiver may describe the tasks they perform without mentioning the emotional or physical burden involved. \nQuestions focused on frequency and daily routine help bring clarity: ‘How often are you assisting each day?’ or ‘Are there tasks that have become harder recently?’ \nCaregivers who are juggling work, childcare, or care for additional family members may be operating at or near their limit. Documenting these pressures is important because they indicate the stability—or instability—of the current support arrangement. \nInterviewers must remain neutral and supportive while gathering this information, noting the caregiver’s tone, fatigue, or hesitation as potential indicators of stress.","jobId":"E7rFcZLevJ2LGcLWB"}},"P4znPTij6caBQHoGn":{"_id":"P4znPTij6caBQHoGn","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"SbSyy89bJBvurtkyp"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"9vbAspuTyqHZu9KAo","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"D7etKnCWd9JyKooTr","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":50.7,"captions":[{"text":"When discussing overall health status,","startTime":0.129,"finishTime":2.289},{"text":"individuals often give brief answers like,","startTime":2.73,"finishTime":4.92},{"text":"I'm fine,","startTime":5.05,"finishTime":5.809},{"text":"or I'm doing OK,","startTime":5.889,"finishTime":7.51},{"text":"even when earlier parts of the assessment indicate emerging concerns.","startTime":7.809,"finishTime":11.63},{"text":"For this reason,","startTime":12.529,"finishTime":13.479},{"text":"the interviewer should ask open-ended questions about recent","startTime":13.649000000000001,"finishTime":16.85},{"text":"changes in how the person feels or functions.","startTime":16.85,"finishTime":19.85},{"text":"It can be helpful to reference specific findings from earlier sections,","startTime":20.659,"finishTime":24.659},{"text":"such as mobility,","startTime":24.67,"finishTime":25.799},{"text":"appetite,","startTime":26.059,"finishTime":26.62},{"text":"or chronic health conditions","startTime":26.7,"finishTime":28.319},{"text":"to encourage a more accurate description.","startTime":28.54,"finishTime":30.659},{"text":"Any new or worsening symptoms should be documented clearly and tied back","startTime":31.52,"finishTime":35.68},{"text":"to functional or medical patterns already identified in sections B and C.","startTime":35.68,"finishTime":40.86},{"text":"Caregiver input can also be valuable here,","startTime":41.319,"finishTime":43.779},{"text":"especially if the caregiver has observed gradual decline","startTime":44.2,"finishTime":47.2},{"text":"or changes that the individual has not recognized.","startTime":47.2,"finishTime":50.4}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["SbSyy89bJBvurtkyp","D7etKnCWd9JyKooTr"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"When discussing overall health status, individuals often give brief answers like ‘I’m fine’ or ‘I’m doing okay,’ even when earlier parts of the assessment indicate emerging concerns. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For this reason, the interviewer should ask open‑ended questions about recent changes in how the person feels or functions. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It can be helpful to reference specific findings from earlier sections—such as mobility, appetite, or chronic health conditions—to encourage a more accurate description. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Any new or worsening symptoms should be documented clearly and tied back to functional or medical patterns already identified in Sections B and C. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregiver input can also be valuable here, especially if the caregiver has observed gradual decline or changes that the individual has not recognized.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"When discussing overall health status, individuals often give brief answers like ‘I’m fine’ or ‘I’m doing okay,’ even when earlier parts of the assessment indicate emerging concerns. \nFor this reason, the interviewer should ask open‑ended questions about recent changes in how the person feels or functions. \nIt can be helpful to reference specific findings from earlier sections—such as mobility, appetite, or chronic health conditions—to encourage a more accurate description. \nAny new or worsening symptoms should be documented clearly and tied back to functional or medical patterns already identified in Sections B and C. \nCaregiver input can also be valuable here, especially if the caregiver has observed gradual decline or changes that the individual has not recognized.","jobId":"3o4s5kZH6fnK5Hpt5"}},"PBnLj6ihrgyshpLdJ":{"_id":"PBnLj6ihrgyshpLdJ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"aRdDgapPq2yp9CEbc"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"tWf6b9QZjFmbSJjbi","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"sobMbbeBx4rnXdtRP","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":47.075,"captions":[{"text":"Section G addresses legal concerns such as advanced directives,","startTime":0.209,"finishTime":3.95},{"text":"do not resuscitate orders and organ donor status.","startTime":4.05,"finishTime":7.199},{"text":"Many individuals are unfamiliar with these terms or may believe","startTime":7.57,"finishTime":11.109},{"text":"they have completed legal paperwork when they have not.","startTime":11.109,"finishTime":13.609},{"text":"Because","startTime":14.399000000000001,"finishTime":14.409},{"text":"of this,","startTime":14.76,"finishTime":15.43},{"text":"the interviewer must approach this section with clarity and patience,","startTime":15.64,"finishTime":19.579},{"text":"using everyday language rather than technical legal phrasing.","startTime":19.84,"finishTime":23.44},{"text":"The goal is not only to document what legal documents exist,","startTime":23.68,"finishTime":27.079},{"text":"but also to understand whether those documents have","startTime":27.28,"finishTime":29.86},{"text":"been shared with caregivers or medical providers.","startTime":29.86,"finishTime":32.639},{"text":"Section G also must align with section E,","startTime":33.659,"finishTime":36.459},{"text":"where legal representatives were identified.","startTime":36.7,"finishTime":39.159},{"text":"Consistency between these sections ensures that the correct people are notified,","startTime":39.54,"finishTime":43.639},{"text":"involved,","startTime":44.13,"finishTime":44.4},{"text":"and authorized to act when needed.","startTime":44.819,"finishTime":46.819}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["aRdDgapPq2yp9CEbc","sobMbbeBx4rnXdtRP"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section G addresses legal concerns such as advance directives, Do Not Resuscitate orders, and organ‑donor status. Many individuals are unfamiliar with these terms or may believe they have completed legal paperwork when they have not. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Because of this, the interviewer must approach this section with clarity and patience, using everyday language rather than technical legal phrasing. The goal is not only to document what legal documents exist, but also to understand whether those documents have been shared with caregivers or medical providers. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section G also must align with Section E, where legal representatives were identified. Consistency between these sections ensures that the correct people are notified, involved, and authorized to act when needed.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section G addresses legal concerns such as advance directives, Do Not Resuscitate orders, and organ‑donor status. Many individuals are unfamiliar with these terms or may believe they have completed legal paperwork when they have not. \nBecause of this, the interviewer must approach this section with clarity and patience, using everyday language rather than technical legal phrasing. The goal is not only to document what legal documents exist, but also to understand whether those documents have been shared with caregivers or medical providers. \nSection G also must align with Section E, where legal representatives were identified. Consistency between these sections ensures that the correct people are notified, involved, and authorized to act when needed.","jobId":"F9mvzowvMJuWsfAZz"}},"PCZ4FAynDwt9NJuE8":{"_id":"PCZ4FAynDwt9NJuE8","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ZteAE28YSMxqifMxS"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"j2wdgTk6aajE8DRGC","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"9PtFHxMrdCudgcZvr","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":55.6625,"captions":[{"text":"In many households,","startTime":0.119,"finishTime":1.279},{"text":"more than one person or agency provides assistance.","startTime":1.45,"finishTime":4.869},{"text":"A daughter may help with bathing on weekends,","startTime":5.139,"finishTime":7.489},{"text":"while an aide handles weekday support.","startTime":7.699,"finishTime":10.109},{"text":"A neighbor may run errands occasionally,","startTime":10.329,"finishTime":12.529},{"text":"and a volunteer driver may provide transportation once a month.","startTime":12.729,"finishTime":16.59},{"text":"Individuals rarely list all of these helpers unless specifically asked,","startTime":17.34,"finishTime":21.579},{"text":"because they often think of support as a single relationship rather than a network.","startTime":21.899,"finishTime":25.799},{"text":"For that reason,","startTime":26.899,"finishTime":27.84},{"text":"the interviewer must explore who helps on which days,","startTime":28.01,"finishTime":31.229},{"text":"how tasks are divided,","startTime":31.53,"finishTime":32.959},{"text":"and whether support is consistent.","startTime":33.09,"finishTime":35.13},{"text":"It is common for caregivers to rotate duties informally,","startTime":35.889,"finishTime":39.08},{"text":"and the reliability of each arrangement can vary.","startTime":39.27,"finishTime":42.229},{"text":"If assistance is inconsistent,","startTime":42.49,"finishTime":44.33},{"text":"irregular,","startTime":44.529,"finishTime":45.29},{"text":"or dependent on someone's availability,","startTime":45.409,"finishTime":47.83},{"text":"this should be documented clearly.","startTime":48.169,"finishTime":50.11},{"text":"These details help determine whether support is","startTime":50.369,"finishTime":52.689},{"text":"stable and whether additional services are needed.","startTime":52.689,"finishTime":55.369}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ZteAE28YSMxqifMxS","9PtFHxMrdCudgcZvr"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In many households, more than one person or agency provides assistance. A daughter may help with bathing on weekends, while an aide handles weekday support. A neighbor may run errands occasionally, and a volunteer driver may provide transportation once a month. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals rarely list all of these helpers unless specifically asked, because they often think of support as a single relationship rather than a network. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For that reason, the interviewer must explore who helps on which days, how tasks are divided, and whether support is consistent. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It is common for caregivers to rotate duties informally, and the reliability of each arrangement can vary. If assistance is inconsistent, irregular, or dependent on someone’s availability, this should be documented clearly. These details help determine whether support is stable and whether additional services are needed.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"In many households, more than one person or agency provides assistance. A daughter may help with bathing on weekends, while an aide handles weekday support. A neighbor may run errands occasionally, and a volunteer driver may provide transportation once a month. \nIndividuals rarely list all of these helpers unless specifically asked, because they often think of support as a single relationship rather than a network. \nFor that reason, the interviewer must explore who helps on which days, how tasks are divided, and whether support is consistent. \nIt is common for caregivers to rotate duties informally, and the reliability of each arrangement can vary. If assistance is inconsistent, irregular, or dependent on someone’s availability, this should be documented clearly. These details help determine whether support is stable and whether additional services are needed.","jobId":"c2a6LFqQNz3CRu7Hi"}},"PKC9DbYnQ4ssf9rZh":{"_id":"PKC9DbYnQ4ssf9rZh","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"igc7tksyY2vcBogaq"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"b6sPjYSwJ2MMmFRmF","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"EMRdRWWqj5yzoYzg5","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":47.4625,"captions":[{"text":"To identify environmental barriers,","startTime":0.129,"finishTime":2.43},{"text":"the interviewer begins with open prompts about areas of","startTime":2.65,"finishTime":5.76},{"text":"the home that may be difficult to navigate,","startTime":5.76,"finishTime":8.01},{"text":"but observation remains the primary tool.","startTime":8.25,"finishTime":10.93},{"text":"Individuals often downplay obstacles,","startTime":11.71,"finishTime":14.149},{"text":"saying they just take their time or move carefully.","startTime":14.39,"finishTime":17.29},{"text":"Because of this,","startTime":17.75,"finishTime":18.42},{"text":"the interviewer should pay close attention to cluttered pathways,","startTime":18.709,"finishTime":22.069},{"text":"loose rugs,","startTime":22.229,"finishTime":23.1},{"text":"poorly lit hallways,","startTime":23.389,"finishTime":24.69},{"text":"or areas where mobility aids cannot fit.","startTime":24.87,"finishTime":27.67},{"text":"Watching how the individual moves through the home,","startTime":28.629,"finishTime":30.86},{"text":"whether they use walls or furniture for balance,","startTime":31.149,"finishTime":33.669},{"text":"provides valuable insight into accessibility issues","startTime":34.15,"finishTime":36.99},{"text":"that may not appear in self-report.","startTime":36.99,"finishTime":39.009},{"text":"These observations help determine whether the home environment supports safe","startTime":39.88,"finishTime":43.56},{"text":"mobility or whether modifications or supports may be needed.","startTime":43.56,"finishTime":47.2}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["igc7tksyY2vcBogaq","EMRdRWWqj5yzoYzg5"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To identify environmental barriers, the interviewer begins with open prompts about areas of the home that may be difficult to navigate, but observation remains the primary tool. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Individuals often downplay obstacles, saying they ‘just take their time’ or ‘move carefully.’ Because of this, the interviewer should pay close attention to cluttered pathways, loose rugs, poorly lit hallways, or areas where mobility aids cannot fit. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Watching how the individual moves through the home—whether they use walls or furniture for balance—provides valuable insight into accessibility issues that may not appear in self‑report. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These observations help determine whether the home environment supports safe mobility or whether modifications or supports may be needed.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"To identify environmental barriers, the interviewer begins with open prompts about areas of the home that may be difficult to navigate, but observation remains the primary tool. \nIndividuals often downplay obstacles, saying they ‘just take their time’ or ‘move carefully.’ Because of this, the interviewer should pay close attention to cluttered pathways, loose rugs, poorly lit hallways, or areas where mobility aids cannot fit. \nWatching how the individual moves through the home—whether they use walls or furniture for balance—provides valuable insight into accessibility issues that may not appear in self‑report. \nThese observations help determine whether the home environment supports safe mobility or whether modifications or supports may be needed.","jobId":"2KzozCpPpCcko3eDF"}},"PkHM5wrsY3S8uKPdv":{"_id":"PkHM5wrsY3S8uKPdv","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"95F4SSYvAoXzTsvS6"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ZDdnu2mD7oL69XQQM","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"73mrbQ39cmkgEXmji","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":58.7125,"captions":[{"text":"Section M begins with mental health screening,","startTime":0.209,"finishTime":2.819},{"text":"and the interviewer must approach these","startTime":3.039,"finishTime":5.369},{"text":"questions gently and without clinical terminology.","startTime":5.369,"finishTime":8.25},{"text":"Many individuals minimize or misunderstand emotional symptoms,","startTime":8.609,"finishTime":12.52},{"text":"so open,","startTime":12.529,"finishTime":13.069},{"text":"plain language questions work best.","startTime":13.489,"finishTime":15.529},{"text":"Rather than asking directly about depression or anxiety,","startTime":16.419,"finishTime":20.079},{"text":"it is more effective to ask how the individual has been feeling lately,","startTime":20.268,"finishTime":24.128},{"text":"whether stress has been difficult to manage,","startTime":24.349,"finishTime":26.768},{"text":"or whether they've stopped doing activities they usually enjoy.","startTime":27.038,"finishTime":30.349},{"text":"As the conversation unfolds,","startTime":31.2,"finishTime":33.029},{"text":"the interviewer should also pay close attention to tone,","startTime":33.25,"finishTime":36.419},{"text":"effect,","startTime":36.77,"finishTime":37.15},{"text":"and nonverbal cues.","startTime":37.29,"finishTime":38.759},{"text":"Moments of tearfulness,","startTime":39.169,"finishTime":40.47},{"text":"irritability,","startTime":40.61,"finishTime":41.549},{"text":"or withdrawal may be more revealing than the individual's words.","startTime":41.61,"finishTime":45.29},{"text":"Caregiver observations are especially important","startTime":46.229,"finishTime":49.049},{"text":"because caregivers often notice emotional or behavioral","startTime":49.349,"finishTime":52.549},{"text":"changes long before the individual recognizes them.","startTime":52.549,"finishTime":55.58},{"text":"Both perspectives should be documented clearly.","startTime":55.95,"finishTime":58.45}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["95F4SSYvAoXzTsvS6","73mrbQ39cmkgEXmji"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section M begins with mental‑health screening, and the interviewer must approach these questions gently and without clinical terminology. Many individuals minimize or misunderstand emotional symptoms, so open, plain‑language questions work best. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Rather than asking directly about ‘depression’ or ‘anxiety,’ it is more effective to ask how the individual has been feeling lately, whether stress has been difficult to manage, or whether they’ve stopped doing activities they usually enjoy. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As the conversation unfolds, the interviewer should also pay close attention to tone, affect, and nonverbal cues. Moments of tearfulness, irritability, or withdrawal may be more revealing than the individual’s words. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregiver observations are especially important, because caregivers often notice emotional or behavioral changes long before the individual recognizes them. Both perspectives should be documented clearly.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Section M begins with mental‑health screening, and the interviewer must approach these questions gently and without clinical terminology. Many individuals minimize or misunderstand emotional symptoms, so open, plain‑language questions work best. \nRather than asking directly about ‘depression’ or ‘anxiety,’ it is more effective to ask how the individual has been feeling lately, whether stress has been difficult to manage, or whether they’ve stopped doing activities they usually enjoy. \nAs the conversation unfolds, the interviewer should also pay close attention to tone, affect, and nonverbal cues. Moments of tearfulness, irritability, or withdrawal may be more revealing than the individual’s words. \nCaregiver observations are especially important, because caregivers often notice emotional or behavioral changes long before the individual recognizes them. Both perspectives should be documented clearly.","jobId":"CgyKF7PY385XwfdEG"}},"Q9LMyLeRPvvQtd3mg":{"_id":"Q9LMyLeRPvvQtd3mg","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"xas54suH2P2FSnSf4"},"dates":{"dateCreated":"2026-03-20T14:57:19.607Z","dateModified":"2026-03-20T14:57:19.607Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"N5b4234EFxSgcSa7f","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"cELMCqcFnyA9cMHxZ","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":51.7,"captions":[{"text":"Section F focuses on the primary caregiver,","startTime":0.209,"finishTime":2.809},{"text":"and it is one of the most important areas for","startTime":3.089,"finishTime":5.929},{"text":"understanding the stability of the individual's daily support system.","startTime":5.929,"finishTime":9.39},{"text":"Many caregivers do not view themselves as caregivers.","startTime":10.319,"finishTime":13.189},{"text":"They may describe what they do simply as helping,","startTime":13.52,"finishTime":15.96},{"text":"so the interviewer must take care to identify who actually provides support","startTime":16.079,"finishTime":20.34},{"text":"and how consistently that support is available.","startTime":20.52,"finishTime":23.059},{"text":"This section requires sensitivity because caregivers may","startTime":23.93,"finishTime":27},{"text":"understate stress or minimize their own needs.","startTime":27,"finishTime":29.87},{"text":"By using calm,","startTime":30.17,"finishTime":31.129},{"text":"open-ended questions,","startTime":31.29,"finishTime":32.439},{"text":"the interviewer can gather the information needed to","startTime":32.729,"finishTime":35.119},{"text":"determine whether the caregiver arrangement is sustainable.","startTime":35.119,"finishTime":38.15},{"text":"Section F must connect back to earlier details in the ACAT,","startTime":39.09,"finishTime":42.479},{"text":"especially who was identified as part of the support team in Section E","startTime":43.09,"finishTime":46.849},{"text":"and who assists with ADLS","startTime":47.009,"finishTime":48.99},{"text":"and IADLS in section C.","startTime":49.159,"finishTime":51.45}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["xas54suH2P2FSnSf4","cELMCqcFnyA9cMHxZ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section F focuses on the primary caregiver, and it is one of the most important areas for understanding the stability of the individual’s daily support system. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many caregivers do not view themselves as caregivers—they may describe what they do simply as ‘helping’—so the interviewer must take care to identify who actually provides support and how consistently that support is available. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This section requires sensitivity because caregivers may under‑state stress or minimize their own needs. By using calm, open‑ended questions, the interviewer can gather the information needed to determine whether the caregiver arrangement is sustainable. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Section F must connect back to earlier details in the A CAT, especially who was identified as part of the support team in Section E and who assists with A D Ls and I A D Ls in Section C.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Section F focuses on the primary caregiver, and it is one of the most important areas for understanding the stability of the individual’s daily support system. \nMany caregivers do not view themselves as caregivers—they may describe what they do simply as ‘helping’—so the interviewer must take care to identify who actually provides support and how consistently that support is available. \nThis section requires sensitivity because caregivers may under‑state stress or minimize their own needs. By using calm, open‑ended questions, the interviewer can gather the information needed to determine whether the caregiver arrangement is sustainable. \nSection F must connect back to earlier details in the A CAT, especially who was identified as part of the support team in Section E and who assists with A D Ls and I A D Ls in Section C.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"HQZ9qTyEccFNhsRev"}},"QELCFQH7Yc6hF3yir":{"_id":"QELCFQH7Yc6hF3yir","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"Hu2mq3kqa9WH4NCRK"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"eQ4Av6cxhqsX5rZYk","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"DaqmuCmKYrxjpYPz2","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":41.975,"captions":[{"text":"Many individuals enjoy being helpful,","startTime":0.17,"finishTime":2.329},{"text":"and some describe themselves as volunteers even","startTime":2.529,"finishTime":5.25},{"text":"when these activities occur rarely or informally.","startTime":5.25,"finishTime":7.929},{"text":"To understand whether the individual is truly volunteering,","startTime":8.818999999999999,"finishTime":12.31},{"text":"the interviewer should ask where the volunteer activity occurs,","startTime":12.51,"finishTime":15.939},{"text":"what tasks they perform,","startTime":16.27,"finishTime":17.85},{"text":"and how often they attend.","startTime":18.11,"finishTime":19.649},{"text":"If the individual expresses interest in volunteering but is not currently active,","startTime":20.75,"finishTime":25.19},{"text":"the interviewer should document both the desire and the barriers,","startTime":25.52,"finishTime":28.95},{"text":"whether related to transportation,","startTime":29.239,"finishTime":31.069},{"text":"health,","startTime":31.36,"finishTime":31.819},{"text":"anxiety,","startTime":32,"finishTime":32.639},{"text":"or scheduling challenges.","startTime":32.799,"finishTime":34.36},{"text":"This information may lead to future referrals,","startTime":35.299,"finishTime":37.819},{"text":"such as transportation services or vocational support programs.","startTime":37.83,"finishTime":41.84}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["Hu2mq3kqa9WH4NCRK","DaqmuCmKYrxjpYPz2"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals enjoy being helpful, and some describe themselves as volunteers even when these activities occur rarely or informally. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To understand whether the individual is truly volunteering, the interviewer should ask where the volunteer activity occurs, what tasks they perform, and how often they attend. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the individual expresses interest in volunteering but is not currently active, the interviewer should document both the desire and the barriers—whether related to transportation, health, anxiety, or scheduling challenges. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This information may lead to future referrals, such as transportation services or vocational support programs.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Many individuals enjoy being helpful, and some describe themselves as volunteers even when these activities occur rarely or informally. \nTo understand whether the individual is truly volunteering, the interviewer should ask where the volunteer activity occurs, what tasks they perform, and how often they attend. \nIf the individual expresses interest in volunteering but is not currently active, the interviewer should document both the desire and the barriers—whether related to transportation, health, anxiety, or scheduling challenges. \nThis information may lead to future referrals, such as transportation services or vocational support programs.","jobId":"vPNvS84PMoH9pvmxM"}},"QkNhsPJpp7ubKTQhQ":{"_id":"QkNhsPJpp7ubKTQhQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"5j92nAAQedg4Xo4Dy"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"6pgrutxCJNo4PmAHQ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"t7oyNsqvMpkFCAv9z","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":47.075,"captions":[{"text":"Many individuals say they are in a program","startTime":0.17,"finishTime":2.63},{"text":"or taking classes","startTime":2.789,"finishTime":4.329},{"text":"when what they mean is that they attended in the past or hope to go again in the future.","startTime":4.61,"finishTime":8.989},{"text":"To clarify their true level of participation,","startTime":9.869,"finishTime":12.619},{"text":"the interviewer should ask where the program is located,","startTime":12.88,"finishTime":15.84},{"text":"how often the individual attends,","startTime":16.12,"finishTime":18.059},{"text":"and when their most recent attendance occurred.","startTime":18.239,"finishTime":20.639},{"text":"If attendance is less than half the time,","startTime":21.479,"finishTime":23.7},{"text":"or if the individual cannot recall when they last participated,","startTime":23.719,"finishTime":27.309},{"text":"the interviewers should document that they are not currently","startTime":27.639,"finishTime":30.159},{"text":"attending even if they express a desire to return.","startTime":30.159,"finishTime":32.74},{"text":"Caregivers can help verify attendance when memory","startTime":33.84,"finishTime":36.759},{"text":"issues or inconsistent schedules are factors.","startTime":36.759,"finishTime":39.389},{"text":"What matters most is documenting the reality of day to day participation,","startTime":39.72,"finishTime":43.63},{"text":"not the individual's intention or aspiration.","startTime":43.959,"finishTime":46.799}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["5j92nAAQedg4Xo4Dy","t7oyNsqvMpkFCAv9z"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Many individuals say they are ‘in a program’ or ‘taking classes,’ when what they mean is that they attended in the past or hope to go again in the future. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To clarify their true level of participation, the interviewer should ask where the program is located, how often the individual attends, and when their most recent attendance occurred. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If attendance is less than half the time or if the individual cannot recall when they last participated, the interviewer should document that they are not currently attending even if they express a desire to return. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Caregivers can help verify attendance when memory issues or inconsistent schedules are factors. What matters most is documenting the reality of day‑to‑day participation, not the individual’s intention or aspiration.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Many individuals say they are ‘in a program’ or ‘taking classes,’ when what they mean is that they attended in the past or hope to go again in the future. \nTo clarify their true level of participation, the interviewer should ask where the program is located, how often the individual attends, and when their most recent attendance occurred. \nIf attendance is less than half the time or if the individual cannot recall when they last participated, the interviewer should document that they are not currently attending even if they express a desire to return. \nCaregivers can help verify attendance when memory issues or inconsistent schedules are factors. What matters most is documenting the reality of day‑to‑day participation, not the individual’s intention or aspiration.","jobId":"n5WEq8iXYRnLS3iAn"}},"SimkRMJWFBf2GZPke":{"_id":"SimkRMJWFBf2GZPke","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"4uDgzLTmu79XFkGqq"},"dates":{"dateCreated":"2026-03-20T14:57:19.606Z","dateModified":"2026-03-20T14:57:19.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Ts3doJrEXGc6nh7KN","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"t
