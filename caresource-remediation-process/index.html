cumentation. Trends are analyzed regularly to identify risks, and findings are reported through internal quality improvement and compliance committees. Documentation is made available for Ohio Department of Medicaid review, and data is used to support continuous improvement and member safety.","voiceCode":"en-US-AriaNeural","language":"en","originalResourceId":"W657iPvaiuBJM2HP4","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AriaNeural\">The CareSource Investigation Team is responsible for ongoing monitoring of all late submissions, root cause analyses, corrective actions, and retraining documentation. Trends are analyzed regularly to identify risks, and findings are reported through internal quality improvement and compliance committees. Documentation is made available for Ohio Department of Medicaid review, and data is used to support continuous improvement and member safety.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The CareSource investigation team is responsible for","startTime":0.009,"finishTime":3.009},{"text":"ongoing monitoring of all late submissions,","startTime":3.009,"finishTime":5.48},{"text":"root cause analyses,","startTime":5.61,"finishTime":7.01},{"text":"corrective actions,","startTime":7.409,"finishTime":8.359},{"text":"and retraining documentation.","startTime":8.568999999999999,"finishTime":10.21},{"text":"Trends are analyzed regularly to identify risks,","startTime":11.109,"finishTime":14.26},{"text":"and findings are reported through internal","startTime":14.43,"finishTime":16.43},{"text":"quality improvement and compliance committees.","startTime":16.43,"finishTime":18.829},{"text":"Documentation is made available for Ohio Depar 2026.mp3","uploadedFileNameExtension":".mp3","duration":42.5625},"dates":{"dateCreated":"2026-04-29T16:55:16.336Z","dateModified":"2026-04-29T16:55:18.324Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"If a second late submission occurs within a rolling three‑month period, or a trend is identified, additional action is required. Another root cause analysis must be completed, but targeted retraining is also mandatory. This retraining focuses on incident definitions, IMS submission timelines, and the impact of late reporting on member safety and regulatory compliance. Retraining must be completed within fourteen business days, and staff must sign a training attestation confirming understanding and accountability. This attestation is retained for ten years and submitted to leadership. Enhanced monitoring then continues for ninety days.","voiceCode":"en-US-AriaNeural","language":"en","originalResourceId":"RDaECFLJJHMLktwoW","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AriaNeural\">If a second late submission occurs within a rolling three‑month period, or a trend is identified, additional action is required. Another root cause analysis must be completed, but targeted retraining is also mandatory. This retraining focuses on incident definitions, IMS submission timelines, and the impact of late reporting on member safety and regulatory compliance. Retraining must be completed within fourteen business days, and staff must sign a training attestation confirming understanding and accountability. This attestation is retained for ten years and submitted to leadership. Enhanced monitoring then continues for ninety days.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"If a 2nd late submission occurs within a rolling 3 month period","startTime":0.009,"finishTime":3.71},{"text":"or a trend is identified,","startTime":3.89,"finishTime":5.369},{"text":"additional action is required.","startTime":5.73,"finishTime":7.289},{"text":"Another root cause analysis must be completed,","startTime":8.119,"finishTime":10.829},{"text":"but targeted retraining is also mandatory.","startTime":11.079,"finishTime":13.659},{"text":"This retraining focuses on incident definitions,","startTime":14.55,"finishTime":17.389},{"text":"IMS submission timelines,","startTime":17.549,"finishTime":19.34},{"text":"and the impact of late reporting on member safety and regulatory compliance.","startTime":19.62,"finishTime":23.75},{"text":"Retraining must be completed within 14 business days,","startTime":24.69,"finishTime":28.03},{"text":"and staff must sign a training","startTime":28.209,"finishTime":29.889},{"text":"attestation confirming understanding and accountability.","startTime":29.889,"finishTime":33.06},{"text":"This attestation is retained for 10 years and submitted to leadership.","startTime":33.959,"finishTime":38.009},{"text":"Enhanced monitoring then continues for 90 days.","startTime":38.86,"finishTime":41.84}]}},"imnTH7cbcQwM3FBtG":{"_id":"imnTH7cbcQwM3FBtG","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":85983,"uploadedFileName":"image.png","height":672,"uploadedFileNameExtension":".png","width":1200},"dates":{"dateCreated":"2026-04-29T17:22:36.537Z","dateModified":"2026-04-29T17:22:36.537Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"quZGR2YDFv5rh6mWR"  within three business days for reportable incidents and provider occurrences. Partially delegated area agencies on aging must email incidents to CareSource using the IMS form on the same business day of discovery for critical and reportable incidents, and by the end of the second business day for provider occurrences. Any IMS outages must be reported immediately to leadership so alternative processes can be used without missing required turnaround times.","voiceCode":"en-US-AriaNeural","language":"en","originalResourceId":"yX8xLEwsxBDc8dRMC","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AriaNeural\">Timely submission into IMS is required for all incident types and varies slightly based on delegation status. Fully delegated area agencies on aging and internal CareSource staff must submit incidents directly into IMS within one business day for critical incidents and within three business days for reportable incidents and provider occurrences. Partially delegated area agencies on aging must email incidents to CareSource using the IMS form on the same business day of discovery for critical and reportable incidents, and by the end of the second business day for provider occurrences. Any IMS outages must be reported immediately to leadership so alternative processes can be used without missing required turnaround times.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Timely submission into IMS is required for all incident","startTime":0.09,"finishTime":3.569},{"text":"types and varies slightly based on delegation status.","startTime":3.569,"finishTime":6.829},{"text":"Fully delegated area agencies on aging and internal care","startTime":7.65,"finishTime":11.21},{" "374i6WeFkZT4h7wyY","tpax7znoJnkxdKkLy"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This remediation process exists because of identified compliance issues related to incident timeliness. On January 30th, 2026, CareSource received a Notice of Non‑Compliance from the Ohio Department of Medicaid for failure to submit critical incidents within one business day of becoming aware of them. As a result, an internal corrective action plan, or CAP, was put into place. A key component of that CAP was creating and approving a formal escalation and remediation process for late incident submissions. This process ensures accountability, standardization, and early intervention when issues occur.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AriaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This remediation process exists because of identified compliance issues related to incident timeliness. On January 30th, 2026, CareSource received a Notice of Non‑Compliance from the Ohio Department of Medicaid for failure to submit critical incidents within one business day of becoming aware of them. As a result, an internal corrective action plan, or CAP, was put into place. A key component of that CAP was creating and approving a formal escalation and remediation process for late incident submissions. This process ensures accountability, standardization, and early intervention when issues occur.","voiceCodeUsed":"en-US-AriaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"85b28sQKvTAbMgFL9"}},"MhmcyhcB8fBdNHgxt":{"_id":"MhmcyhcB8fBdNHgxt","_siteID":"ZoiyEJNGnnXpx9Jbx","data": tartTime":13.81,"finishTime":14.949},{"text":"Both internal and external teams notify the investigation team of late incidents.","startTime":15.949,"finishTime":20.709},{"text":"Once notified,","startTime":21.629,"finishTime":22.61},{"text":"the investigation team flags the incident for formal","startTime":22.86,"finishTime":25.7},{"text":"remediation tracking to ensure follow-through and documentation.","startTime":25.7,"finishTime":29.159}]}},"assets":["KjgZxqH2NQkYEYGbz","374i6WeFkZT4h7wyY","cQxDWgR9pekGBySEB"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Late submissions are identified through CareSource monitoring, audits, and IMS reporting. When a late entry is identified, the responsible staff, supervisors, managers, or delegated entities are notified, typically via email. Both internal and external teams notify the Investigation Team of late incidents. Once notified, the Investigation Team flags the incident for formal remediation tracking to ensure follow‑through and documentation.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AriaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Late submissions are identified through CareSource monitoring, audits, and IMS reporting. When a late entry is identified, the responsible staff, supervisors, managers, or delegated entities are notified, typically via email. Both internal and external teams notify the Investigation Team of late incidents. Once notified, the Investigation Team flags the incident for formal remediation tracking to ensure follow‑through and documentation.","voiceCodeUsed":"en-US-AriaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"8XZmJwKuEPeyP2yaD"}},"PmQcpf7jdR8Egav3K":{"_id":"PmQcpf7jdR8Egav3K","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Definitions – Refresher","upload":"tnmJ3HEmuCeDTQRo2"},"dates":{"dateCreated":"2026-04-29T16:45:15.075Z","dateModified":"2026-04-29T19:58:11.286Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"mkJhP4ALkZXHAh9Rs","kind":"overlay","type":"rectangle","width":1285,"height":721.5355648535565,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"poYa93veMNFuzeFAq","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"background":{"backgroundImage":"374i6WeFkZT4h7wyY","applyBackgroundImageToWholePage":false,"backgroundImageOpacity":100,"backgroundImageScaling":"fill"},"duration":53.9,"captions":[{"text":"Before reviewing the remediation process,","startTime":0.25,"finishTime":2.48},{"text":"it is important to revisit key definitions.","startTime":2.69,"finishTime":5.21},{"text":"A critical incident is a serious member experienced event such as abuse,","startTime":6.07,"finishTime":10.079},{"text":"neglect,","startTime":10.229,"finishTime":10.8},{"text":"exploitation,","startTime":10.96,"finishTime":11.818999999999999},{"text":"misappropriation,","startTime":11.96,"finishTime":13.039},{"text":"unexplained or accidental death,","startTime":13.229,"finishTime":15.14},{"text":"self-harm,","startTime":15.39,"finishTime":15.92},{"text":"missing individuals,","startTime":16.079,"finishTime":17.19},{"text":"or medication issues that result in emergency medical intervention.","startTime":17.44,"finishTime":21.2},{"text":"A reportable incident includes situations that put a member's health or welfare","startTime":22.12,"finishTime":26.319},{"text":"at risk but do not meet the threshold of a critical incident.","startTime":26.319,"finishTime":29.329},{"text":"These may include certain medication issues,","startTime":30.28,"finishTime":32.668},{"text":"caregiver loss,","startTime":32.88,"finishTime":33.869},{"text":"housing crises,","startTime":33.99,"finishTime":35.029},{"text":"or non-emergent suicide attempts.","startTime":35.27,"finishTime":37.279},{"text":"A provider occurrence involves suspected or actual","startTime":38.02,"finishTime":41.479},{"text":"operational or performance issues by a provider,","startTime":41.479,"finishTime":43.869},{"text":"such as eligibility violations,","startTime":44.139,"finishTime":46.049},{"text":"billing errors,","startTime":46.299,"finishTime":47.09},{"text":"or Medicaid fraud","startTime":47.259,"finishTime":48.52},{"text":"that do not meet the definition of an incident under Ohio administrative code rule.","startTime":48.74,"finishTime":53.159}]}},"assets":["tnmJ3HEmuCeDTQRo2","374i6WeFkZT4h7wyY","poYa93veMNFuzeFAq"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Before reviewing the remediation process, it is important to revisit key definitions. A critical incident is a serious member‑experienced event such as abuse, neglect, exploitation, misappropriation, unexplained or accidental death, self‑harm, missing individuals, or medication issues that result in emergency medical intervention. A reportable incident includes situations that put a member’s health or welfare at risk but do not meet the threshold of a critical incident. These may include certain medication issues, caregiver loss, housing crises, or non‑emergent suicide attempts. A provider occurrence involves suspected or actual operational or performance issues by a provider, such as eligibility violations, billing errors, or Medicaid fraud, that do not meet the definition of an incident under Ohio Administrative Code rule.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AriaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Before reviewing the remediation process, it is important to revisit key definitions. A critical incident is a serious member‑experienced event such as abuse, neglect, exploitation, misappropriation, unexplained or accidental death, self‑harm, missing individuals, or medication issues that result in emergency medical intervention. A reportable incident includes situations that put a member’s health or welfare at risk but do not meet the threshold of a critical incident. These may include certain medication issues, caregiver loss, housing crises, or non‑emergent suicide attempts. A provider occurrence involves suspected or actual operational or performance issues by a provider, such as eligibility violations, billing errors, or Medicaid fraud, that do not meet the definition of an incident under Ohio Administrative Code rule.","voiceCodeUsed":"en-US-AriaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"gPREPHkpA4wQ92HEJ"}},"QkeAbHuAupM5nkdid":{"_id":"QkeAbHuAupM5nkdid","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Thank You"},"dates" eOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"23425Q9jYJwXBBXsw","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"background":{"backgroundImage":"374i6WeFkZT4h7wyY","applyBackgroundImageToWholePage":false,"backgroundImageOpacity":100,"backgroundImageScaling":"fill"},"duration":42.5625,"captions":[{"text":"If a 2nd late submission occurs within a rolling 3 month period","startTime":0.009,"finishTime":3.71},{"text":"or a trend is identified,","startTime":3.89,"finishTime":5.369},{"text":"additional action is required.","startTime":5.73,"finishTime":7.289},{"text":"Another root cause analysis must be completed,","startTime":8.119,"finishTime":10.829},{"text":"but targeted retraining is also mandatory.","startTime":11.079,"finishTime":13.659},{"text":"This retraining focuses on incident definitions,","startTime":14.55,"finishTime":17.389},{"text":"IMS submission timelines,","startTime":17.549,"finishTime":19.34},{"text":"and the impact of late reporting on member safety and regulatory compliance.","startTime":19.62,"finishTime":23.75},{"text":"Retraining must be completed within 14 business days,","startTime":24.69,"finishTime":28.03},{"text":"and staff must sign a training","startTime":28.209,"finishTime":29.889},{"text":"attestation confirming understanding and accountability.","startTime":29.889,"finishTime":33.06},{"text":"This attestation is retained for 10 years and submitted to leadership.","startTime":33.959,"finishTime":38.009},{"text":"Enhanced monitoring then continues for 90 days.","startTime":38.86,"finishTime":41.84}]}},"assets":["cRxJ2FLyopvhK5pPZ","374i6WeFkZT4h7wyY","23425Q9jYJwXBBXsw"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If a second late submission occurs within a rolling three‑month period, or a trend is identified, additional action is required. Another root cause analysis must be completed, but targeted retraining is also mandatory. This retraining focuses on incident definitions, IMS submission timelines, and the impact of late reporting on member safety and regulatory compliance. Retraining must be completed within fourteen business days, and staff must sign a training attestation confirming understanding and accountability. This attestation is retained for ten years and submitted to leadership. Enhanced monitoring then continues for ninety days.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AriaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"If a second late submission occurs within a rolling three‑month period, or a trend is identified, additional action is required. Another root cause analysis must be completed, but targeted retraining is also mandatory. This retraining focuses on incident definitions, IMS submission timelines, and the impact of late reporting on member safety and regulatory compliance. Retraining must be completed within fourteen business days, and staff must sign a training attestation confirming understanding and accountability. This attestation is retained for ten years and submitted to leadership. Enhanced monitoring then continues for ninety days.","voiceCodeUsed":"en-US-AriaNeural","featureAdoption":{"isUsingMult
