 at an initial or incomplete explanation. The method is most useful when the questioning continues until a cause is identified that can be directly addressed through action. If the answer leads to something that cannot realistically be corrected, the analysis should return to an earlier step and continue refining the problem.\u003cbreak time=\"0.5s\"/>\u003cbreak time=\"0.5s\"/>\u003cbreak time=\"0.5s\"/>Here is an example of the 5 Whys method.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The 5 wise method is a simple but effective way","startTime":0.009,"finishTime":2.73},{"text":"to move from a symptom to an underlying cause.","startTime":2.73,"finishTime":4.949},{"text":"The process starts with a clearly defined problem statement.","startTime":5.96,"finishTime":8.88},{"text":"From there the question why","startTime":9.829,"finishTime":11.77},{"text":"is asked repeatedly with each response leading to the next question.","startTime":11.89,"finishTime":15.449},{"text":"This helps uncover the factors beneath the surface issue","startTime":16.37,"finishTime":19.139},{"text":"rather than stopping at an initial or incomplete explanation.","startTime":19.139,"finishTime":22.04},{"text":"The method is most useful when the questioning continues until a","startTime":22.87,"finishTime":25.989},{"text":"cause is identified that can be directly addressed through action.","startTime":25.989,"finishTime":28.87},{"text":"If the answer leads to something that cannot realistically be corrected,","startTime":29.659,"finishTime":33.009},{"text":"the analysis should return to an earlier step and continue refining the problem.","startTime":33.22,"finishTime":36.979},{"text":"Here is an example of the 5 wise method.","startTime":39.389,"finishTime":41.529}]}},"9oDoJwkNcgjNhA7ws":{"_id":"9oDoJwkNcgjNhA7ws","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":938304, , the analysis moves past workload and reveals a different issue: there is no system or process in place to track upcoming visits and prompt timely follow-up. That shift is important. It shows how repeated questioning helps move from a broad concern to a cause that is specific and correctable. In this case, the final cause points to a process gap rather than an individual performance issue.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"This example shows how the 5 wise method works in practice.","startTime":0.09,"finishTime":3.65},{"text":"The issue begins with visits not being completed within required time frames.","startTime":4.42,"finishTime":8.46},{"text":"At first,","startTime":9.3,"finishTime":10.09},{"text":"it may appear that caseload volume is the main problem.","startTime":10.149,"finishTime":12.909},{"text":"However,","startTime":13.76,"finishTime":14.31},{"text":"as the questions continue,","startTime":14.439,"finishTime":15.789},{"text":"the analysis moves past workload and reveals a different issue.","startTime":15.96,"finishTime":19.02},{"text":"There is no system or process in place","startTime":19.399,"finishTime":21.399},{"text":"to track upcoming visits and prompt timely follow-up.","startTime":21.399,"finishTime":24.04},{"text":"That shift is important.","startTime":24.87,"finishTime":26.25},{"text":"It shows how repeated questioning helps move from a broad","startTime":27.049,"finishTime":30.129},{"text":"concern to a cause that is specific and correctable.","startTime":30.129,"finishTime":32.549},{"text":"In this case,","startTime":33.319,"finishTime":34.27},{"text":"the final cause points to a process","startTime":34.439,"finishTime":36.319},{"text":"gap rather than an individual performance issue.","startTime":36.319,"finishTime":38.72}]}},"mHN2AtFrsQ89kA7S7":{"_id":"mHN2AtFrsQ89kA7S7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online"," s.\nYou will also be able to distinguish between strong and weak corrective action plans based on clarity and alignment to root causes.","voiceCode":"en-US-MichelleNeural","language":"en","originalResourceId":"sKPseDN46djLGERcr","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-MichelleNeural\">By the end of this training, you will be able to define Corrective Action Plans (or CAPs) and Root Cause Analysis (or RCAs), apply the 5 Whys method, and develop effective CAPs.\u003cbreak time=\"0.5s\"/>You will also be able to distinguish between strong and weak corrective action plans based on clarity and alignment to root causes.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"By the end of this training,","startTime":0.009,"finishTime":1.32},{"text":"you will be able to define corrective action plans","startTime":1.45,"finishTime":4.09},{"text":"or CAPs,","startTime":4.21,"finishTime":5.309},{"text":"and root cause analysis or RCAs,","startTime":5.449,"finishTime":8.119},{"text":"apply the five wise method and develop effective CAPs.","startTime":8.13,"finishTime":11.85},{"text":"You will also be able to distinguish between strong and weak","startTime":13.13,"finishTime":15.939},{"text":"corrective action plans based on clarity and alignment to root causes.","startTime":15.939,"finishTime":19.76}]}},"wiWwZZ6MHGdFYMqPh":{"_id":"wiWwZZ6MHGdFYMqPh","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":108288,"uploadedFileName":"Michelle-en-CorrectiveActionPlanandRootCauseAnalysis-682026.mp3","uploadedFileNameExtension":".mp3","duration":4.4875},"dates":{"dateCreated":"2026-06-08T20:52:31.058Z","dateModified":"2026-06-08T20:52:32.332Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Welcome to the Corrective Action Plan and Root Cause Analysis training.","voiceCode":"en-US-MichelleNeural","language":"en","originalResourceId":"PSJp3hLkwWHcFukya","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-MichelleNeural\">Welcome to the Corrective Action Plan and Root Cause Analysis training.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Welcome to the corrective action plan and root cause analysis training.","startTime":0.119,"finishTime":3.69}]}},"zja7ABQgjpfFf8sHn":{"_id":"zja7ABQgjpfFf8sHn","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1073088,"uploadedFileName":"Michelle-en-RootCauseAnalysisKeyExpectations-682026.mp3","uploadedFileNameExtension":".mp3","duration":44.675},"dates":{"dateCreated":"2026-06-08T21:16:04.277Z","dateModified":"2026-06-08T21:16:06.612Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"An effective Root Cause Analysis stays focused on how and why the issue occurred. It looks for process gaps, system failures, and contributing conditions that can be addressed through corrective action. It also avoids several common mistakes. These include focusing on individuals rather than the process, making assumptions without enough evidence, or stopping the analysis too early and treating a symptom as the root cause. Another important point is that the final identified cause should be something that can actually be corrected. If it cannot be addressed through a change in process, workflow, or oversight, the analysis should continue. This is why RCA should be treated as a process improvement tool rather than a performance management exercise.","voiceCode":"en-US-MichelleNeural","language":"en","originalResourceId":"ob3ap3B2TjmB9jvri","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-MichelleNeural\">An effective Root Cause Analysis stays focused on how and why the issue occurred. It looks for process gaps, system failures, and contributing conditions that can be addressed through corrective action. It also avoids several common mistakes. These include focusing on individuals rather than the process, making assumptions without enough evidence, or stopping the analysis too early and treating a symptom as the root cause. Another important point is that the final identified cause should be something that can actually be corrected. If it cannot be addressed through a change in process, workflow, or oversight, the analysis should continue. This is why RCA should be treated as a process improvement tool rather than a performance management exercise.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"An effective root cause analysis stays focused on how and why the issue occurred.","startTime":0.009,"finishTime":4.429},{"text":"It looks for process gaps,","startTime":5.179,"finishTime":6.82},{"text":"system failures,","startTime":7.01,"finishTime":8.01},{"text":"and contributing conditions that can be addressed through corrective action.","startTime":8.18,"finishTime":11.34},{"text":"It also avoids several common mistakes.","startTime":12.14,"finishTime":14.68},{"text":"These include focusing on individuals rather than the process,","startTime":15.52,"finishTime":18.639},{"text":"making assumptions without enough evidence,","startTime":18.879,"finishTime":20.84},{"text":"or stopping the analysis too early and treating a symptom as the root cause.","startTime":21.04,"finishTime":24.7},{"text":"Another important point is that the final identified cuss","startTime":25.659,"finishTime":28.569},{"text":"should be something that can actually be corrected.","startTime":28.569,"finishTime":30.479},{"text":"If it cannot be addressed through a change in process,","startTime":31.229,"finishTime":33.869},{"text":"workflow,","startTime":34.11,"finishTime":34.669},{"text":"or oversight,","startTime":34.79,"finishTime":35.63},{"text":"the analysis should continue.","startTime":35.83,"finishTime":37.33},{"text":"This is why RCA should be treated as a","startTime":38.22,"finishTime":40.58},{"text":"process improvement tool rather than a performance management exercise.","startTime":40.58,"finishTime":43.939}]}}},"questionsById":{},"resourcesById":{"3Niy23SFgzDWvEjwQ":{"_id":"3Niy23SFgzDWvEjwQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"CAP: Weak vs Strong","upload":"Ctuf2Hmob57KvFXFL"},"dates":{"dateCreated":"2026-06-08T19:21:51.309Z","dateModified":"2026-06-08T21:18:22.633Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"LBZzSJn4RDrqxWsea","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"mHN2AtFrsQ89kA7S7","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":44.4}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["Ctuf2Hmob57KvFXFL","mHN2AtFrsQ89kA7S7"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Once the root cause is identified, the CAP should describe exactly what actions will be taken to address it. This is where the distinction between a weak CAP and a strong CAP becomes important. Weak CAPs often contain general intentions, reminders, or statements that sound responsive but do not clearly define what will change. Strong CAPs are different. They include specific action steps, describe the actual correction or process change, and connect directly to the root cause identified in the analysis. The CAP is not the place for background information, restating the problem, or summarizing the RCA. Its purpose is to document the actions that will correct or mitigate the issue.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Once the root cause is identified, the CAP should describe exactly what actions will be taken to address it. This is where the distinction between a weak CAP and a strong CAP becomes important. Weak CAPs often contain general intentions, reminders, or statements that sound responsive but do not clearly define what will change. Strong CAPs are different. They include specific action steps, describe the actual correction or process change, and connect directly to the root cause identified in the analysis. The CAP is not the place for background information, restating the problem, or summarizing the RCA. Its purpose is to document the actions that will correct or mitigate the issue.","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"thuFwNfPvzwce8sYH"}},"7PfffHq3u92txKLta":{"_id":"7PfffHq3u92txKLta","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Key Takeways","upload":"9sM4nvfQh6iC5fgff"},"dates":{"dateCreated":"2026-06-08T19:22:19.511Z","dateModified":"2026-06-08T21:19:59.230Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"HkdHa26r7haN3ZEXz","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"q8zohR4WragCioCrR","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"durati de","locale":"en","title":"Using the 5 Whys Method","upload":"6qYWLg5DDWRsRdRmG"},"dates":{"dateCreated":"2026-06-08T19:20:46.778Z","dateModified":"2026-06-08T21:15:31.144Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"D5jfkDwEwng2SabSw","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"C3jgMhu77kFDzCAbn","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"qwWXb6Ln3XcYTd5Yg","kind":"overlay","type":"rectangle","width":1280.0000000000002,"height":649.2865779927448,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"BeiCGBhkE7PsNNqLa","isRatioFixed":true,"start":37,"behaviorType":"continue","rotationAngle":0}],"duration":42.4875}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["6qYWLg5DDWRsRdRmG","C3jgMhu77kFDzCAbn","BeiCGBhkE7PsNNqLa"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The 5 Whys method is a simple but effective way to move from a symptom to an underlying cause. The process starts with a clearly defined problem statement. From there, the question “Why?” is asked repeatedly, with each response leading to the next question. This helps uncover the factors beneath the surface issue rather than stopping at an initial or incomplete explanation. The method is most useful when the questioning continues until a cause is identified that can be directly addressed through action. If the answer leads to something that cannot realistically be corrected, the analysis should return to an earlier step and continue refining the problem.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[{\"type\":\"textToSpeechBreak\",\"version\":1,\"duration\":0.5}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Here is an example of the 5 Whys method.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The 5 Whys method is a simple but effective way to move from a symptom to an underlying cause. The process starts with a clearly defined problem statement. From there, the question “Why?” is asked repeatedly, with each response leading to the next question. This helps uncover the factors beneath the surface issue rather than stopping at an initial or incomplete explanation. The method is most useful when the questioning continues until a cause is identified that can be directly addressed through action. If the answer leads to something that cannot realistically be corrected, the analysis should return to an earlier step and continue refining the problem.\n\nHere is an example of the 5 Whys method.\n","featureAdoption":{"isAddingPauses":true,"isUsingMultipleVoices":false,"isAdjustingSpeed":false},"jobId":"rTuKYKhXhHXWeCsyk","voiceCodeUsed":"en-US-MichelleNeural"}},"EmtNsLzKtXfNLCbJ7":{"_id":"EmtNsLzKtXfNLCbJ7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Writing an Effective CAP","upload":"n3gfjJsAXLkvnwhyj"},"dates":{"dateCreated":"2026-06-08T19:22:04.873Z","dateModified":"2026-06-08T21:19:06.563Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"upS42nDraPuecs5Gq","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"WLzWHeThCAgbqFxqF","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":35.325}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["n3gfjJsAXLkvnwhyj","WLzWHeThCAgbqFxqF"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"An effective CAP is clear, direct, and focused on action. Each step should be specific enough that the expected response is easy to understand. The actions should also tie directly back to the identified root cause so that the plan is addressing the actual issue rather than only the symptom. Concise writing is also important. Corrective Action Plans should avoid narrative language, unnecessary explanation, or details that do not support the action itself. A strong CAP is one that clearly states what will be done and how that action addresses the identified issue.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"An effective CAP is clear, direct, and focused on action. Each step should be specific enough that the expected response is easy to understand. The actions should also tie directly back to the identified root cause so that the plan is addressing the actual issue rather than only the symptom. Concise writing is also important. Corrective Action Plans should avoid narrative language, unnecessary explanation, or details that do not support the action itself. A strong CAP is one that clearly states what will be done and how that action addresses the identified issue.","voiceCodeUsed":"en-US-Michell ,\"style\":\"\",\"text\":\"Before beginning a detailed analysis, it can be helpful to reframe the problem. This means shifting from a broad or symptom-based statement to one that better reflects the process issue underneath it. In this example, the initial concern is that case managers are not completing visits on time. That statement describes the outcome, but it does not yet explain what is contributing to it. Reframing encourages a closer look at what may be missing from the current process, what conditions may have been different when the issue did not occur, and what the intended outcome should be. This approach helps define the problem more clearly and creates a stronger starting point for Root Cause Analysis.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Before beginning a detailed analysis, it can be helpful to reframe the problem. This means shifting from a broad or symptom-based statement to one that better reflects the process issue underneath it. In this example, the initial concern is that case managers are not completing visits on time. That statement describes the outcome, but it does not yet explain what is contributing to it. Reframing encourages a closer look at what may be missing from the current process, what conditions may have been different when the issue did not occur, and what the intended outcome should be. This approach helps define the problem more clearly and creates a stronger starting point for Root Cause Analysis.","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"PyC9bBGkmREgYbng6"}},"kMkqAirEDy9WA9Ctu":{"_id":"kMkqAirEDy9WA9Ctu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"CAP Process Overview","upload":"SFiDpR2QBXLtQYWJd"},"dates":{"dateCreated":"2026-06-08T19:20:04.817Z","dateModified":"2026-06-08T21:12:38.715Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"rnKXM4C8F6CtZdmt8","kind":"overlay","type":"rectangle","width":1280,"height":724.5714285714287,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"FQQ8DBuMAfqSFfeZA","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":35.6875}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["SFiDpR2QBXLtQYWJd","FQQ8DBuMAfqSFfeZA"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The corrective action process begins when an issue, unmet metric, or other area of concern is identified. From there, the next step is to understand why the issue occurred rather than responding only to the outcome. This is where Root Cause Analysis is completed and the 5 Whys method is applied. Once the underlying cause is understood, a Corrective Action Plan is developed to address that cause. The final step is to document and track the CAP so that progress and follow-up can be monitored. Each part of this process supports the next, which is why a structured sequence is important.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The corrective action process begins when an issue, unmet metric, or other area of concern is identified. From there, the next step is to understand why the issue occurred rather than responding only to the outcome. This is where Root Cause Analysis is completed and the 5 Whys method is applied. Once the underlying cause is understood, a Corrective Action Plan is developed to address that cause. The final step is to document and track the CAP so that progress and follow-up can be monitored. Each part of this process supports the next, which is why a structured sequence is important.","jobId":"TC3anuXs6oPys3tTK"}},"ob3ap3B2TjmB9jvri":{"_id":"ob3ap3B2TjmB9jvri","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Root Cause Analysis: Key Expectations","upload":"zja7ABQgjpfFf8sHn"},"dates":{"dateCreated":"2026-06-08T19:21:04.430Z","dateModified":"2026-06-08T21:16:06.684Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"R9LeJH6e2TEavdPL9","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"R8hLtwgJEWBisTYQ6","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":44.675}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zja7ABQgjpfFf8sHn","R8hLtwgJEWBisTYQ6"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"An effective Root Cause Analysis stays focused on how and why the issue occurred. It looks for process gaps, system failures, and contributing conditions that can be addressed through corrective action. It also avoids several common mistakes. These include focusing on individuals rather than the process, making assumptions without enough evidence, or stopping the analysis too early and treating a symptom as the root cause. Another important point is that the final identified cause should be something that can actually be corrected. If it cannot be addressed through a change in process, workflow, or oversight, the analysis should continue. This is why RCA should be treated as a process improvement tool rather than a performance management exercise.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"An effective Root Cause Analysis stays focused on how and why the issue occurred. It looks for process gaps, system failures, and contributing conditions that can be addressed through corrective action. It also avoids several common mistakes. These include focusing on individuals rather than the process, making assumptions without enough evidence, or stopping the analysis too early and treating a symptom as the root cause. Another important point is that the final identified cause should be something that can actually be corrected. If it cannot be addressed through a change in process, workflow, or oversight, the analysis should continue. This is why RCA should be treated as a process improvement tool rather than a performance management exercise.","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"mBY8gZSXG6QRnazkY"}},"qgJF28hZRgnyFtmhX":{"_id":"qgJF28hZRgnyFtmhX","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"5 Whys in Action: Example","upload":"gf5mXC9KPfpnYYBZH"},"dates":{"dateCreated":"2026-06-08T19:21:35.484Z","dateModified":"2026-06-08T21:17:42.373Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"KFqEWRyppQCrnkGu6","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"pbFY2GkbmgaiMQbZr","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":39.5}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["gf5mXC9KPfpnYYBZH","pbFY2GkbmgaiMQbZr"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This example shows how the 5 Whys method works in practice. The issue begins with visits not being completed within required timeframes. At first, it may appear that caseload volume is the main problem. However, as the questions continue, the analysis moves past workload and reveals a different issue: there is no system or process in place to track upcoming visits and prompt timely follow-up. That shift is important. It shows how repeated questioning helps move from a broad concern to a cause that is specific and correctable. In this case, the final cause points to a process gap rather than an individual performance issue.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This example shows how the 5 Whys method works in practice. The issue begins with visits not being completed within required timeframes. At first, it may appear that caseload volume is the main problem. However, as the questions continue, the analysis moves past workload and reveals a different issue: there is no system or process in place to track upcoming visits and prompt timely follow-up. That shift is important. It shows how repeated questioning helps move from a broad concern to a cause that is specific and correctable. In this case, the final cause points to a process gap rather than an individual performance issue.","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"XDrMvzYcjZ3jkaMYF"}},"sKPseDN46djLGERcr":{"_id":"sKPseDN46djLGERcr","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Learning Objectives","upload":"txJX9JnGjtC7aB6C9"},"dates":{"dateCreated":"2026-06-08T19:19:47.517Z","dateModified":"2026-06-09T13:24:00.399Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"9iD5k6pqvENgvFkEq","kind":"overlay","type":"rectangle","width":1563,"height":879.1875000000001,"x":-22,"y":-119,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"YQiWNye7o6i9i8Km6","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":20.4625}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["txJX9JnGjtC7aB6C9","YQiWNye7o6i9i8Km6"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"By the end of this training, you will be able to define Corrective Action Plans (or CAPs) and Root Cause Analysis (or RCAs), apply the 5 Whys method, and develop effective CAPs.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"You will also be able to distinguish between strong and weak corrective action plans based on clarity and alignment to root causes.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"By the end of this training, you will be able to define Corrective Action Plans (or CAPs) and Root Cause Analysis (or RCAs), apply the 5 Whys method, and develop effective CAPs.\nYou will also be able to distinguish between strong and weak corrective action plans based on clarity and alignment to root causes.","previewAssetId":"Pz4GkaAHfNcuyMLRY","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"zafekKZ9sXHinHpYE"}},"tEqzcMbyKbrCR99bM":{"_id":"tEqzcMbyKbrCR99bM","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"What is Root Cause Analysis?","upload":"6aQhTGKNMzT3up8Nd"},"dates":{"dateCreated":"2026-06-08T19:20:32.951Z","dateModified":"2026-06-08T21:13:14.713Z"},"users":{"_userCreatorID":"P8bj8BqgzCgCGZYmC","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"umDkqGhH4aFT7Bk2b","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCo
