tential consequences if the issue is not addressed. This ensures that the record accurately reflects both the nature of the risk and the rationale for initiating the H SAP.","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"F3nXyyfc223p7yY6B","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-SteffanNeural\">The development of a Health and Safety Action Plan may also necessitate documentation within the Incident Management System. The Incident Management System is utilized to formally document incidents related to health, safety, and welfare concerns. Standard incident reporting requirements typically require documentation within three business days of becoming aware of an incident. However, the application of this requirement differs slightly in relation to H SAPs. In these cases, documentation is tied to the initiation of the H SAP rather than the initial awareness of a concern, as the issue is often already recognized as an ongoing or chronic risk. Once the H SAP is initiated—generally following discussion with the individual—there is a 30-day timeframe to document the incident within the IMS. In many cases, by the time the HSAP is implemented, sufficient intervention planning has already occurred to support resolution and closure of the incident. The Incident Management System entry, therefore, serves as formal documentation that the concern has been identified and addressed through structured planning. Documentation entered into the Incident Management System should be concise and clearly describe the identified health, safety, or welfare concern, along with the potential consequences if the issue is not addressed. This ensures that the record accurately reflects both the nature of the risk and the rationale for initiating the H SAP.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The development of a health and safety action plan","startTime":0.009,"finishTime":2.75},{"text":"may also necessitate documentation within the incident management systems.","startTime":2.75,"finishTime":6.9399999999999995},{"text":"The incident management system is utilized to","startTime":7.53,"finishTime":9.85},{"text":"formally document incidents related to health,","startTime":9.85,"finishTime":12.189},{"text":"safety,","startTime":12.609,"finishTime":13.17},{"text":"and welfare concerns.","startTime":13.409,"finishTime":14.949},{"text":"Standard incident reporting requirements","startTime":15.449,"finishTime":17.53},{"text":"typically require documentation within 3","startTime":17.53,"finishTime":20.129},{"text":"business days of becoming aware of an incident.","startTime":20.129,"finishTime":23.03},{"text":"However,","startTime":23.53,"finishTime":23.969},{"text":"the application of this requirement differs slightly in relation to HSAPs.","startTime":24.129,"finishTime":28.37},{"text":"In these cases,","startTime":29.02,"finishTime":30.02},{"text":"documentation is tied to the initiation of the HSAP","startTime":30.2,"finishTime":33.619},{"text":"rather than the initial awareness of a concern,","startTime":33.619,"finishTime":35.849},{"text":"as the issue is often already recognized as an ongoing or chronic risk.","startTime":36.31,"finishTime":40.529},{"text":"Once the HSAP is initiated,","startTime":41.069,"finishTime":43.189},{"text":"generally following discussion with the individual,","startTime":43.509,"finishTime":46},{"text":"there is a 30 day time frame to document the incident within the IMS.","startTime":46.229,"finishTime":50},{"text":"In many cases,","startTime":50.63,"finishTime":51.669},{"text":"by the time the HSAP is implemented,","startTime":51.68,"finishTime":54.029},{"text":"sufficient intervention planning has already occurred to","startTime":54.24,"finishTime":57.2},{"text":"support resolution and closure of the incident.","startTime":57.2,"finishTime":60.06},{"text":"The incident management system entry therefore","startTime":60.52,"finishTime":63.34},{"text":"serves as formal documentation that the concern has","startTime":63.56,"finishTime":66.319},{"text":"been identified and addressed through structured planning.","startTime":66.319,"finishTime":69},{"text":"Documentation entered into the incident management system should","startTime":69.599,"finishTime":72.879},{"text":"be concise and clearly describe the identified health,","startTime":72.879,"finishTime":76.139},{"text":"safety,","startTime":76.4,"finishTime":76.949},{"text":"or welfare concern,","startTime":77.349,"finishTime":78.459},{"text":"along with the potential consequences if the issue is not addressed.","startTime":78.72,"finishTime":82.349},{"text":"This ensures that the record accurately reflects both the nature","startTime":82.879,"finishTime":86},{"text":"of the risk and the rationale for initiating the HSAP.","startTime":86,"finishTime":89.239}]}},"CbHY3wSFnLHAzq9mz":{"_id":"CbHY3wSFnLHAzq9mz","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2314368,"uploadedFileName":"Steffan-en-ODM10238SignaturePage-5192026.mp3","uploadedFileNameExtension":".mp3","duration":96.39},"dates":{"dateCreated":"2026-05-19T20:14:08.056Z","dateModified":"2026-05-19T20:14:14.891Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The signature section of the Health and Safety Action Plan includes important elements that document the individual’s level of agreement and the actions taken to ensure informed participation. Within the individual signature s tions, and high-risk behaviors such as smoking while using oxygen. Environmental concerns that interfere with safe and effective service delivery should also be considered, as well as behaviors that disrupt or negatively impact care coordination. Additionally, behaviors or actions by family members, friends, or others within the home environment that hinder service delivery may necessitate an HSAP. Situations in which an individual’s decision-making places them at increased risk for harm should also be addressed through this planning process. These examples illustrate circumstances in which formal documentation and intervention planning are necessary to mitigate risk and support the individual’s health and safety.","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"eyp2ve7dMeHJvtSrw","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-SteffanNeural\">A Health and Safety Action Plan should be considered whenever potential risks to an individual’s health, safety, or overall welfare are identified. While not an exhaustive list, several common scenarios may warrant the development of an HSAP. Examples include chronic medication misuse or abuse, ongoing refusal of waiver services or other medically necessary interventions, and high-risk behaviors such as smoking while using oxygen. Environmental concerns that interfere with safe and effective service delivery should also be considered, as well as behaviors that disrupt or negatively impact care coordination. Additionally, behaviors or actions by family members, friends, or others within the home environment that hinder service delivery may necessitate an HSAP. Situations in which an individual’s decision-making places them at increased risk for harm should also be addressed through this planning process. These examples illustrate circumstances in which formal documentation and intervention planning are necessary to mitigate risk and support the individual’s health and safety.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"A health and safety action plan should be","startTime":0.009,"finishTime":2.3689999999999998},{"text":"considered whenever potential risks to an individual's health,","startTime":2.3689999999999998,"finishTime":5.25},{"text":"safety,","startTime":5.53,"finishTime":6.119},{"text":"or overall welfare are identified.","startTime":6.349,"finishTime":8.609},{"text":"While not an exhaustive list,","startTime":9.09,"finishTime":10.81},{"text":"several common scenarios may warrant the development of an HSAP.","startTime":11.13,"finishTime":15.149},{"text":"Examples include chronic medication misuse or abuse,","startTime":15.85,"finishTime":19.19},{"text":"ongoing refusal of waiver services or other medically necessary interventions,","startTime":19.309,"finishTime":23.889},{"text":"and high risk behaviors such as smoking while using oxygen.","startTime":24.17,"finishTime":27.45},{"text":"Environmental concerns that interfere with safe and","startTime":28.02,"finishTime":30.899},{"text":"effective service delivery should also be considered,","startTime":30.899,"finishTime":33.72},{"text":"as well as behaviors that disrupt or negatively impact care coordination.","startTime":33.9,"finishTime":38.319},{"text":"Additionally,","startTime":38.79,"finishTime":39.5},{"text":"behaviors or actions by family members,","startTime":39.979,"finishTime":42.009},{"text":"friends,","startTime":42.22,"finishTime":42.619},{"text":"or others within the home environment that","startTime":42.819,"finishTime":44.68},{"text":"hinder service delivery may necessitate an HSAP.","startTime":44.68,"finishTime":47.729},{"text":"Situations in which an individual's decision making places them at increased","startTime":48.549,"finishTime":52.459},{"text":"risk for harm should also be addressed through this planning process.","startTime":52.459,"finishTime":55.639},{"text":"These examples illustrate circumstances in which","startTime":56.5,"finishTime":59.06},{"text":"formal documentation and intervention planning are","startTime":59.06,"finishTime":61.939},{"text":"necessary to mitigate risk and support the individual's health and safety.","startTime":61.939,"finishTime":65.459}]}},"GH8tbMv7Bq6ZE9og6":{"_id":"GH8tbMv7Bq6ZE9og6","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2363904,"uploadedFileName":"Steffan-en-AddressingIssuesWithoutHSAPs-5192026.mp3","uploadedFileNameExtension":".mp3","duration":98.46},"dates":{"dateCreated":"2026-05-19T20:15:07.068Z","dateModified":"2026-05-19T20:15:14.448Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The following examples illustrate approaches to addressing potential health and safety concerns without initiating a Health and Safety Action Plan. These interventions emphasize early engagement, problem-solving, and the use of available supports to mitigate risk. For example, if a home health aide has a known allergy to cats, a reasonable accommodation may include requesting that the pet be kept in a separate area of the home during service delivery. In situations where environmental hazards are present, such as a bed bug infestation, coordination with appropriate resources—such as extermination services—can be initiated to resolve the issue. When an individual is utilizing home oxygen therapy, providing education on safe practices within the home environment is an appropriate preventive measure. In cases where an individual exhibits behavior that may escalate or become disruptive, responses should remain calm and non-threatening. Additional support may be sought from supervisors, team members, or subject matter experts, and trauma-informed care approaches should be considered to guide interactions. If an individual’s backup plan becomes unrealistic or unworkable, collaborative efforts should focus on developing a viable alternative that continues to support health and safety needs. These examples demonstrate proactive strategies that can be implemented prior to initiating an H SAP. The goal is to address concerns through supportive interventions and collaboration, reserving the H SAP as a more structured response when initial efforts have not sufficiently mitigated the identified risk. ","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"BKap4F3T7kAP4YAqP","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-SteffanNeural\">The following examples illustrate approaches to addressing potential health and safety concerns without initiating a Health and Safety Action Plan. These interventions emphasize early engagement, problem-solving, and the use of available supports to mitigate risk. For example, if a home health aide has a known allergy to cats, a reasonable accommodation may include requesting that the pet be kept in a separate area of the home during service delivery. In situations where environmental hazards are present, such as a bed bug infestation, coordination with appropriate resources—such as extermination services—can be initiated to resolve the issue. When an individual is utilizing home oxygen therapy, providing education on safe practices within the home environment is an appropriate preventive measure. In cases wher  individual’s acuity level when appropriate, allowing for more frequent check-ins and closer oversight of identified risks. Regular engagement with the individual is essential to assess progress and gather feedback regarding how the plan is functioning in practice. This includes routinely discussing whether the interventions are effective and making necessary updates to the H SAP based on these evaluations. Continuous assessment supports timely identification of any changes in risk level or service needs. Collaboration with all members of the care team is a critical component of the monitoring process. This includes coordination with service providers, natural supports, family members, authorized representatives, and guardians, when applicable. Active involvement of all relevant parties promotes consistency in implementation and enhances the effectiveness of strategies designed to maintain the individual’s health and safety. ","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"jeQYoHyQZX594KYmT","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-SteffanNeural\">Expectations for implementation include consistent and ongoing monitoring of the individual’s status and the effectiveness of the Health and Safety Action Plan. Based on program requirements, consideration should be given to adjusting the individual’s acuity level when appropriate, allowing for more frequent check-ins and closer oversight of identified risks. Regular engagement with the individual is essential to assess progress and gather feedback regarding how the plan is functioning in practice. This includes routinely discussing whether the interventions are effective and making necessary updates to the H SAP based on these eval textToSpeech","textToSpeechData":{"prompt":"The required components generally consist of three primary sections. The first section defines the identified concern. This section clearly explains the issue prompting the development of the Health and Safety Action Plan, including the underlying risk or barrier that necessitates intervention. The second section outlines the potential consequences if the identified concern is not addressed. This portion should provide a detailed description of the possible outcomes, emphasizing the severity of risk. Scenarios should reflect the full range of potential impacts, up to and including hospitalization, placement in a nursing facility, or other significant adverse events. In high-risk situations, such as the use of oxygen in conjunction with smoking, the consequences may include life-threatening outcomes. Clearly articulating these possibilities supports the individual’s understanding of the seriousness of the concern. The third section details the recommended action steps. This section explains the strategies that will be implemented to reduce or eliminate the identified risk and describes how these actions will be carried out. The approach should be individualized to ensure that the plan is effective in addressing the specific needs and circumstances associated with the risk. Additional sections address ongoing monitoring and required signatures. The monitoring section describes how the effectiveness of the action steps will be evaluated over time. The signature section includes acknowledgment from all relevant parties, including the individual, the care manager, and members of the care team when feasible. Securing these signatures supports shared understanding, accountability, and the overall effectiveness of the plan. ","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"e4yLCzEcg4EyoLa9Z","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www spaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Important distinctions must be clearly understood when considering the use of a Health and Safety Action Plan. H SAPs are not mandatory and should not be used as a primary mechanism to threaten disenrollment from waiver services. They are not appropriate in situations where an individual lacks the competency or capacity to address identified behaviors. Additionally, H SAPs should not be developed without the individual’s participation and engagement, nor should the process cause the individual to feel impersonalized or reduced to a case number. The approach must not rely on directing the individual without collaboration, and care must be taken to avoid re-traumatization. H SAPs may be appropriately implemented for a range of behaviors or circumstances that pose a risk to the individual’s health, safety, or welfare. Best practice includes ensuring that the individual understands the purpose of the H SAP and is meaningfully engaged in the process. The individual should feel supported throughout implementation, with the plan developed collaboratively to reflect their input. The perspectives of the individual and their family or support system should be respected and incorporated. The H SAP should align with person-centered planning principles, taking into account the individual’s goals, preferences, and values. It should include appropriate resources, services, and care coordination supports while adhering to trauma-informed care principles to ensure a respectful and supportive approach. ","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"WDbjcG4eFYDp5E2E5","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-St fety. The individual plays a central role in this process, and active participation is essential to the plan’s effectiveness. The content of the H SAP should be fully integrated into the individual’s broader care plan. It is not intended to function as a standalone document but rather as a component embedded within care planning documentation. The H SAP should also be reflected in health-related notes to ensure continuity and alignment across all records. A copy of the completed plan should be provided to the individual to ensure transparency and shared understanding among all involved parties. This practice supports consistency in implementation and reinforces accountability across the care team.","voiceCode":"en-US-SteffanNeural","language":"en","originalResourceId":"DqZyaeCqcuBXmoGCg","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-SteffanNeural\">The sections previously described correspond to the structure of the Health and Safety Action Plan, with the concerns and desired action plan serving as a foundational component. This section functions as formal documentation that the identified risks have been reviewed with the individual. It ensures that the individual has been provided an opportunity to ask questions and fully understand the concerns being addressed. Whenever possible, this review is most effective when conducted in a face-to-face setting. This section also documents the collaborative approach taken to address and mitigate identified risks. It outlines how all parties will work together to implement strategies that support the individual in maintaining health and safety. The individual plays a central role in this process, and active participation is essential to the plan’s effectiveness. Th isk using available interventions and supports. If these efforts have not successfully mitigated the concern and the issue persists, the development of an H SAP is appropriate. The H SAP is not intended to serve as the first line of intervention but rather as a structured response when prior strategies have not achieved the desired outcome. If the identified concern has been effectively resolved through initial interventions, implementation of an H SAP is not necessary. The H SAP should be viewed as a structured tool that supports documentation of ongoing risks and demonstrates efforts to address those risks. Collaboration with supervisors, mentors, or other leadership resources may be beneficial in determining appropriate application and strengthening the effectiveness of the plan.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"A simplified decision making framework supports the determination of","startTime":0.009,"finishTime":3.769},{"text":"when to implement a health and safety action plan.","startTime":3.769,"finishTime":6.71},{"text":"The process begins with identifying whether an","startTime":7.17,"finishTime":9.56},{"text":"ongoing health or safety risk is present.","startTime":9.56,"finishTime":12.289},{"text":"Once a concern has been identified,","startTime":12.81,"finishTime":14.729},{"text":"efforts should focus on working with the individual through","startTime":14.97,"finishTime":17.37},{"text":"the person-centered planning process to provide appropriate services,","startTime":17.37,"finishTime":21.12},{"text":"supports,","startTime":21.45,"finishTime":21.989},{"text":"coaching,","startTime":22.209,"finishTime":22.84},{"text":"and education aimed at resolving the issue.","startTime":23.049,"finishTime":25.45},{"text":"Consideration of an HSAP should occur only after reasonable attempts have","startTime":26.079,"finishTime":30.319},{"text":"been made to address the risk using available interventions and sup ned that the risk is no longer present, the H SAP should be formally concluded. The case record must include documentation of the effective date of termination, along with a clear rationale supporting the decision to end the H SAP. This ensures transparency, accountability, and a complete record of the individual’s progress and risk resolution. \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Revisions to the health and safety action plan should be","startTime":0.009,"finishTime":2.9699999999999998},{"text":"clearly documented when the plan is not demonstrating effective progress.","startTime":2.9699999999999998,"finishTime":7.179},{"text":"In cases of negative progression,","startTime":7.65,"finishTime":9.63},{"text":"an addendum should be completed to formally update the plan.","startTime":9.729,"finishTime":12.989},{"text":"This addendum should be documented within the case record","startTime":13.489,"finishTime":16.37},{"text":"and typically follows the same structure as the original HSAP","startTime":16.37,"finishTime":20.219},{"text":"with a clear designation as an addendum.","startTime":20.61,"finishTime":22.77},{"text":"The updated document should include enhanced or additional interventions","startTime":23.319,"finishTime":27},{"text":"aimed at more effectively mitigating the identified risks.","startTime":27,"finishTime":30.479},{"text":"If it is determined that the risk is no longer present,","startTime":30.879,"finishTime":33.869},{"text":"the HSAP should be formally concluded.","startTime":34.08,"finishTime":36.799},{"text":"The case record must include documentation of the effective date of termination,","startTime":37.159,"finishTime":41.5},{"text":"along with a clear rationale supporting the decision to end the HSAP.","startTime":41.84,"finishTime":45.72},{"text":"This ensures transparency,","startTime":46.459,"finishTime":48.2},{"text":"accountability,","startTime":48.459,"finishTime":49.299},{"text":"a lanning, determine whether HSAP remains warranted using judgment, then develop the HSAP with the individual.&nbsp;\u003c/div>\n","feedbackNegative":"\u003cdiv>\u003cstrong>Incorrect:&nbsp;\u003c/strong>identify risk, provide supports through person-centered planning, determine whether HSAP remains warranted using judgment, then develop the HSAP with the individual.&nbsp;\u003c/div>\n"}},"responses":[{"description":{"html":"\u003cdiv>Potential health and safety risk is identified.\u003c/div>\n","type":"text","resourceWidthPercentage":100},"identifier":"EwAqSopgNN4G6NctB"},{"description":{"html":"\u003cdiv>Care Manager/Care Coordinator/Recovery Manager works with the individual to provide services, supports, coaching, and/or education as part of person-centered planning.\u003c/div>\n","type":"text","resourceWidthPercentage":100},"identifier":"7BazD7FkKrHcog5sX"},{"description":{"html":"\u003cdiv>Determine whether the issue still warrants an HSAP (utilize professional and clinical judgment).\u003c/div>\n","type":"text","resourceWidthPercentage":100},"identifier":"aCFiR9uaS6gTaSwbw"},{"identifier":"CQJpzJCumdSYgEFRk","description":{"type":"text","resourceWidthPercentage":100,"html":"\u003cdiv>HSAP is developed with the individual.\u003c/div>\n"}}],"assets":[],"overlayTemplateIds":[],"fontFamilies":[],"childResources":[]},"B4Jrp5nAPC9ZMd3ii":{"_id":"B4Jrp5nAPC9ZMd3ii","_siteID":"ZoiyEJNGnnXpx9Jbx","workspaceId":"oPYJFRcZXq3TGjd6g","data":{"attributes":{"locale":"en","template":"questionTF","title":{"type":"text","resourceWidthPercentage":100,"html":"\u003cdiv>The Incident Management System (IMS) entry for an HSAP should include a description of the health, safety, or welfare concern and the potential consequences if the issue is not addressed.\u003c/div>\n"}},"options":{"retryUntilSuccess":false,"score":10,"correctResponses":["xzYyQBcSQoM2R8xkG"]},"users":{"_userModifierID":"fMCCj2F5RvKPEqE8F","_userCreatorID":"fMCCj2F5RvKPEqE8F"},"dates":{"dateModified":"2026-05-19T20:38:53.220Z","dateCreated":"2026-05-19T20:38:42.301Z"},"feedback":{"feedbackPositive":"\u003cdiv>\u003cstrong>Correct:\u003c/strong> IMS documentation should clearly and concisely describe the health, safety, or welfare concern along with the potential consequences if the issue is not addressed.\u003c/div>\n","feedbackNegative":"\u003cdiv>\u003cstrong>Incorrect:\u003c/strong> IMS documentation must include a clear description of the concern and potential consequences, ensuring accurate and complete documentation of the risk and rationale for the HSAP\u003c/div>\n"}},"responses":[{"identifier":"xzYyQBcSQoM2R8xkG","description":{"type":"text","html":"True","resourceWidthPercentage":100}},{"identifier":"tdSWdrnnYGv8ewWES","description":{"type":"text","html":"False","resourceWidthPercentage":100}}],"assets":[],"overlayTemplateIds":[],"fontFamilies":[],"childResources":[]},"DCbZineCujCCtbtT4":{"_id":"DCbZineCujCCtbtT4","_siteID":"ZoiyEJNGnnXpx9Jbx","workspaceId":"oPYJFRcZXq3TGjd6g","data":{"attributes":{"locale":"en","template":"questionMC","title":{"type":"text","resourceWidthPercentage":100,"html":"\u003cdiv>According to the training, which statement best describes HSAP documentation as a reportable incident?\u003c/div>\n"}},"options":{"retryUntilSuccess":false,"score":10,"correctResponses":["NLKAwa3WbyR9qkbZH"],"multipleAnswers":false},"users":{"_userModifierID":"fMCCj2F5RvKPEqE8F","_userCreatorID":"fMCCj2F5RvKPEqE8F"},"dates":{"dateModified":"2026-05-19T20:38:11.277Z","dateCreated":"2026-05-19T20:37:25.693Z"},"feedback":{"feedbackPositive":"\u003cdiv>\u003cstrong>Correct:\u003c/strong> The training states that creation or adjustment of an HSAP is a reportable incident for multiple waivers/programs, reported within three business days of developing the HSAP and resolved/closed within 30 days.\u003c/div>\n","feedbackNegative":"\u003cdiv>\u003cstrong>Incorrect:\u003c/strong> The correct answer is A. The training identifies HSAP creation/adjustment as a reportable incident with specified reporting and closure timeframes.\u003c/div>\n"}},"responses":[{"identifier":"NLKAwa3WbyR9qkbZH","description":{"type":"text","html":"\u003cdiv>The creation of or an adjustment to an HSAP is considered a reportable incident; it should be reported within three business days of developing the HSAP and resolved/closed within 30 days.\u003c/div>\n","resourceWidthPercentage":100}},{"identifier":"9rgtZNRssRF4hNLTS","description":{"type":"text","html":"\u003cdiv>HSAPs are never reportable incidents.\u003c/div>\n","resourceWidthPercentage":100}},{"identifier":"KgHmseKpdgyJwT8sF","description":{"type":"text","html":"\u003cdiv>HSAP reporting is required only for PASSPORT and Assisted Living.\u003c/div>\n","resourceWidthPercentage":100}},{"identifier":"cnZ9pWAtazAzyb6G2","description":{"type":"text","html":"\u003cdiv>Incident documentation must always be completed the same day as identification of the concern.\u003c/div>\n","resourceWidthPercentage":100}}],"assets":[],"overlayTemplateIds":[],"fontFamilies":[],"childResources":[]},"YspgyAkBWqN6KyacR":{"_id":"YspgyAkBWqN6KyacR","_siteID":"ZoiyEJNGnnXpx9Jbx","workspaceId":"oPYJFRcZXq3TGjd6g","data":{"attributes":{"locale":"en","template":"questionMC","title":{"type":"text","resourceWidthPercentage":100,"html":"\u003cdiv>Which monitoring expectation is explicitly included in the training?\u003c/div>\n"}},"options":{"retryUntilSuccess":false,"score":10,"correctResponses":["d2s8GBTXHSwWANAFq"],"multipleAnswers":false},"users":{"_userModifierID":"fMCCj2F5RvKPEqE8F","_userCreatorID":"fMCCj2F5RvKPEqE8F"},"dates":{"dateModified":"2026-05-19T20:37:19.327Z","dateCreated":"2026-05-19T20:36:44.454Z"},"feedback":{"feedbackPositive":"\u003cdiv>\u003cstrong>Correct:\u003c/strong> Monitoring requires documented contact reflecting intervention effectiveness and progress toward HSAP goals, and the care plan/plan of care must reflect current HSAP status.\u003c/div>\n","feedbackNegative":"\u003cdiv>\u003cstrong>Incorrect:\u003c/stro
