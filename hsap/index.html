","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"Gwz3vuFaKatAXP95i","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":98.46,"captions":[{"text":"The following examples illustrate approaches to addressing potential health and","startTime":0.009,"finishTime":4.21},{"text":"safety concerns without initiating a health and safety action plan.","startTime":4.21,"finishTime":8.109},{"text":"These interventions emphasize early engagement,","startTime":8.568999999999999,"finishTime":10.699},{"text":"problem solving,","startTime":11.409,"finishTime":12.329},{"text":"and the use of available supports to mitigate risk.","startTime":12.489,"finishTime":15.43},{"text":"For example,","startTime":15.93,"finishTime":16.76},{"text":"if a home health aide has a known allergy to cats,","startTime":16.969,"finishTime":19.87},{"text":"a reasonable accommodation may include requesting that the pet be kept","startTime":20.049,"finishTime":23.7},{"text":"in a separate area of the home during service delivery.","startTime":23.7,"finishTime":26.77},{"text":"In situations where environmental hazards are present,","startTime":27.28,"finishTime":30.28},{"text":"such as a bedbug infestation,","startTime":30.579,"finishTime":32.43},{"text":"coordination with appropriate resources","startTime":32.689,"finishTime":35.159},{"text":"such as extermination services","startTime":35.31,"finishTime":37.319},{"text":"can be initiated to resolve the issue.","startTime":37.56,"finishTime":39.77},{"text":"When an individual is utilizing home oxygen therapy,","startTime":40.279,"finishTime":43.31},{"text":"providing education on safe practices within the","startTime":43.599,"finishTime":46.279},{"text":"home environment is an appropriate preventive measure.","startTime":46.279,"finishTime":49.06},{"text":"In cases where an individual exhibits behavior","startTime":49.63,"finishTime":52.27},{"text":"that may escalate or become disruptive,","startTime":52.27,"finishTime":54.47},{"text":"responses should remain calm and non-threatening.","startTime":54.909,"finishTime":57.349},{"text":"Additional support may be sought from supervisors,","startTime":57.83,"finishTime":60.619},{"text":"team members,","startTime":60.83,"finishTime":61.659},{"text":"or subject matter experts,","startTime":61.95,"finishTime":63.65},{"text":"and trauma informed care approaches should be considered to guide interactions.","startTime":63.79,"finishTime":67.849},{"text":"If an individual's backup plan becomes unrealistic or unworkable,","startTime":68.309,"finishTime":72.349},{"text":"collaborative efforts should focus on developing a viable alternative","startTime":72.589,"finishTime":76.23},{"text":"that continues to support health and safety needs.","startTime":76.23,"finishTime":79.129},{"text":"These examples demonstrate proactive strategies that can","startTime":79.8,"finishTime":82.639},{"text":"be implemented prior to initiating an HSAP.","startTime":82.639,"finishTime":85.68},{"text":"The goal is to address concerns","startTime":86.239,"finishTime":87.879},{"text":"through supportive interventions and collaboration,","startTime":87.879,"finishTime":90.36},{"text":"reserving the HSAP as a more structured response when","startTime":90.639,"finishTime":93.919},{"text":"initial efforts have not sufficiently mitigated the identified risk.","startTime":93.919,"finishTime":97.739}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["GH8tbMv7Bq6ZE9og6","Gwz3vuFaKatAXP95i"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The following examples illustrate approaches to addressing potential health and safety concerns without initiating a Health and Safety Action Plan. These interventions emphasize early engagement, problem-solving, and the use of available supports to mitigate risk. For example, if a home health aide has a known allergy to cats, a reasonable accommodation may include requesting that the pet be kept in a separate area of the home during service delivery. In situations where environmental hazards are present, such as a bed bug infestation, coordination with appropriate resources—such as extermination services—can be initiated to resolve the issue. When an individual is utilizing home oxygen therapy, providing education on safe practices within the home environment is an appropriate preventive measure. In cases where an individual exhibits behavior that may escalate or become disruptive, responses should remain calm and non-threatening. Additional support may be sought from supervisors, team members, or subject matter experts, and trauma-informed care approaches should be considered to guide interactions. If an individual’s backup plan becomes unrealistic or unworkable, collaborative efforts should focus on developing a viable alternative that continues to support health and safety needs. These examples demonstrate proactive strategies that can be implemented prior to initiating an H SAP. The goal is to address concerns through supportive interventions and collaboration, reserving the H SAP as a more structured response when initial efforts have not sufficiently mitigated the identified risk. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The following examples illustrate approaches to addressing potential health and safety concerns without initiating a Health and Safety Action Plan. These interventions emphasize early engagement, problem-solving, and the use of available supports to mitigate risk. For example, if a home health aide has a known allergy to cats, a reasonable accommodation may include requesting that the pet be kept in a separate area of the home during service delivery. In situations where environmental hazards are present, such as a bed bug infestation, coordination with appropriate resources—such as extermination services—can be initiated to resolve the issue. When an individual is utilizing home oxygen therapy, providing education on safe practices within the home environment is an appropriate preventive measure. In cases where an individual exhibits behavior that may escalate or become disruptive, responses should remain calm and non-threatening. Additional support may be sought from supervisors, team members, or subject matter experts, and trauma-informed care approaches should be considered to guide interactions. If an individual’s backup plan becomes unrealistic or unworkable, collaborative efforts should focus on developing a viable alternative that continues to support health and safety needs. These examples demonstrate proactive strategies that can be implemented prior to initiating an H SAP. The goal is to address concerns through supportive interventions and collaboration, reserving the H SAP as a more structured response when initial efforts have not sufficiently mitigated the identified risk. ","jobId":"3cD5HpHNWmcpqH7MM"}},"DqZyaeCqcuBXmoGCg":{"_id":"DqZyaeCqcuBXmoGCg","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"XXuoy3NdPP49JPecn"},"dates":{"dateCreated":"2026-05-19T19:24:51.209Z","dateModified":"2026-05-19T20:19:10.389Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"TGRTJQWSMyr4Wa8jJ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"7CQNRwgmptuzeFdet","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":86.49,"captions":[{"text":"The sections previously described correspond to the","startTime":0.009,"finishTime":2.849},{"text":"structure of the health and safety action plan","startTime":2.849,"finishTime":5.21},{"text":"with the concerns and desired action plan serving as a foundational component.","startTime":5.53,"finishTime":10.189},{"text":"This section functions as formal documentation that the","startTime":10.689,"finishTime":13.568999999999999},{"text":"identified risks have been reviewed with the individual.","startTime":13.568999999999999,"finishTime":16.43},{"text":"It ensures that the individual has been provided an opportunity","startTime":16.889,"finishTime":20.149},{"text":"to ask questions and fully understand the concerns being addressed","startTime":20.149,"finishTime":24.069},{"text":"whenever possible.","startTime":24.489,"finishTime":25.61},{"text":"This review is most effective when conducted in a face to face setting.","startTime":25.77,"finishTime":29.2},{"text":"This section also documents the collaborative approach","startTime":29.84,"finishTime":32.759},{"text":"taken to address and mitigate identified risks.","startTime":32.759,"finishTime":35.74},{"text":"It outlines how all parties will work together to implement","startTime":36.24,"finishTime":39},{"text":"strategies that support the individual in maintaining health and safety.","startTime":39,"finishTime":42.959},{"text":"The individual plays a central role in this process,","startTime":43.36,"finishTime":46.22},{"text":"and active participation is essential to the plan's effectiveness.","startTime":46.439,"finishTime":49.9},{"text":"The content of the HSAP should be fully","startTime":50.5,"finishTime":52.939},{"text":"integrated into the individual's broader care plan.","startTime":52.939,"finishTime":55.84},{"text":"It is not intended to function as a standalone document,","startTime":56.33,"finishTime":59.38},{"text":"but rather as a component embedded within care planning documentation.","startTime":59.459,"finishTime":63.319},{"text":"The HSAP should also be reflected in health-related notes","startTime":63.779,"finishTime":67.379},{"text":"to ensure continuity and alignment across all records.","startTime":67.379,"finishTime":71},{"text":"A copy of the completed plan should","startTime":71.379,"finishTime":73.22},{"text":"be provided to the individual to ensure transparency","startTime":73.22,"finishTime":76.319},{"text":"and shared understanding among all involved parties.","startTime":76.5,"finishTime":79.55},{"text":"This practice supports consistency in implementation and","startTime":80.19,"finishTime":83.139},{"text":"reinforces accountability across the care team.","startTime":83.139,"finishTime":85.75}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["XXuoy3NdPP49JPecn","7CQNRwgmptuzeFdet"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The sections previously described correspond to the structure of the Health and Safety Action Plan, with the concerns and desired action plan serving as a foundational component. This section functions as formal documentation that the identified risks have been reviewed with the individual. It ensures that the individual has been provided an opportunity to ask questions and fully understand the concerns being addressed. Whenever possible, this review is most effective when conducted in a face-to-face setting. This section also documents the collaborative approach taken to address and mitigate identified risks. It outlines how all parties will work together to implement strategies that support the individual in maintaining health and safety. The individual plays a central role in this process, and active participation is essential to the plan’s effectiveness. The content of the H SAP should be fully integrated into the individual’s broader care plan. It is not intended to function as a standalone document but rather as a component embedded within care planning documentation. The H SAP should also be reflected in health-related notes to ensure continuity and alignment across all records. A copy of the completed plan should be provided to the individual to ensure transparency and shared understanding among all involved parties. This practice supports consistency in implementation and reinforces accountability across the care team.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The sections previously described correspond to the structure of the Health and Safety Action Plan, with the concerns and desired action plan serving as a foundational component. This section functions as formal documentation that the identified risks have been reviewed with the individual. It ensures that the individual has been provided an opportunity to ask questions and fully understand the concerns being addressed. Whenever possible, this review is most effective when conducted in a face-to-face setting. This section also documents the collaborative approach taken to address and mitigate identified risks. It outlines how all parties will work together to implement strategies that support the individual in maintaining health and safety. The individual plays a central role in this process, and active participation is essential to the plan’s effectiveness. The content of the H SAP should be fully integrated into the individual’s broader care plan. It is not intended to function as a standalone document but rather as a component embedded within care planning documentation. The H SAP should also be reflected in health-related notes to ensure continuity and alignment across all records. A copy of the completed plan should be provided to the individual to ensure transparency and shared understanding among all involved parties. This practice supports consistency in implementation and reinforces accountability across the care team.","jobId":"8pB8kXok8u7SKMzSM"}},"F3nXyyfc223p7yY6B":{"_id":"F3nXyyfc223p7yY6B","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"CJvNserct4FquEfce"},"dates":{"dateCreated":"2026-05-19T19:26:18.988Z","dateModified":"2026-05-19T20:24:22.463Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ckJubDdAakhNDnwJE","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"oWmN7B3TjEtwzsHYo","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"tTe4NeZN9qq4afvo2","kind":"overlay","type":"rectangle","width":615,"height":150,"x":17,"y":562,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0,"clickAction":{"type":"openWebsite","openWebsite":"https://codes.ohio.gov/ohio-administrative-code/rule-5160-44-05"},"customStyle":{"border":{"size":0,"color":"koantic(accent6, 0, 1)","left":true,"top":true,"bottom":true,"right":true},"fill":{"color":"transparent","type":"color"},"fontColor":"koantic(dark1, 0, 1)","title":"blank","verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}}}],"duration":90.1225,"captions":[{"text":"The development of a health and safety action plan","startTime":0.009,"finishTime":2.75},{"text":"may also necessitate documentation within the incident management systems.","startTime":2.75,"finishTime":6.9399999999999995},{"text":"The incident management system is utilized to","startTime":7.53,"finishTime":9.85},{"text":"formally document incidents related to health,","startTime":9.85,"finishTime":12.189},{"text":"safety,","startTime":12.609,"finishTime":13.17},{"text":"and welfare concerns.","startTime":13.409,"finishTime":14.949},{"text":"Standard incident reporting requirements","startTime":15.449,"finishTime":17.53},{"text":"typically require documentation within 3","startTime":17.53,"finishTime":20.129},{"text":"business days of becoming aware of an incident.","startTime":20.129,"finishTime":23.03},{"text":"However,","startTime":23.53,"finishTime":23.969},{"text":"the application of this requirement differs slightly in relation to HSAPs.","startTime":24.129,"finishTime":28.37},{"text":"In these cases,","startTime":29.02,"finishTime":30.02},{"text":"documentation is tied to the initiation of the HSAP","startTime":30.2,"finishTime":33.619},{"text":"rather than the initial awareness of a concern,","startTime":33.619,"finishTime":35.849},{"text":"as the issue is often already recognized as an ongoing or chronic risk.","startTime":36.31,"finishTime":40.529},{"text":"Once the HSAP is initiated,","startTime":41.069,"finishTime":43.189},{"text":"generally following discussion with the individual,","startTime":43.509,"finishTime":46},{"text":"there is a 30 day time frame to document the incident within the IMS.","startTime":46.229,"finishTime":50},{"text":"In many cases,","startTime":50.63,"finishTime":51.669},{"text":"by the time the HSAP is implemented,","startTime":51.68,"finishTime":54.029},{"text":"sufficient intervention planning has already occurred to","startTime":54.24,"finishTime":57.2},{"text":"support resolution and closure of the incident.","startTime":57.2,"finishTime":60.06},{"text":"The incident management system entry therefore","startTime":60.52,"finishTime":63.34},{"text":"serves as formal documentation that the concern has","startTime":63.56,"finishTime":66.319},{"text":"been identified and addressed through structured planning.","startTime":66.319,"finishTime":69},{"text":"Documentation entered into the incident management system should","startTime":69.599,"finishTime":72.879},{"text":"be concise and clearly describe the identified health,","startTime":72.879,"finishTime":76.139},{"text":"safety,","startTime":76.4,"finishTime":76.949},{"text":"or welfare concern,","startTime":77.349,"finishTime":78.459},{"text":"along with the potential consequences if the issue is not addressed.","startTime":78.72,"finishTime":82.349},{"text":"This ensures that the record accurately reflects both the nature","startTime":82.879,"finishTime":86},{"text":"of the risk and the rationale for initiating the HSAP.","startTime":86,"finishTime":89.239}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["CJvNserct4FquEfce","oWmN7B3TjEtwzsHYo"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The development of a Health and Safety Action Plan may also necessitate documentation within the Incident Management System. The Incident Management System is utilized to formally document incidents related to health, safety, and welfare concerns. Standard incident reporting requirements typically require documentation within three business days of becoming aware of an incident. However, the application of this requirement differs slightly in relation to H SAPs. In these cases, documentation is tied to the initiation of the H SAP rather than the initial awareness of a concern, as the issue is often already recognized as an ongoing or chronic risk. Once the H SAP is initiated—generally following discussion with the individual—there is a 30-day timeframe to document the incident within the IMS. In many cases, by the time the HSAP is implemented, sufficient intervention planning has already occurred to support resolution and closure of the incident. The Incident Management System entry, therefore, serves as formal documentation that the concern has been identified and addressed through structured planning. Documentation entered into the Incident Management System should be concise and clearly describe the identified health, safety, or welfare concern, along with the potential consequences if the issue is not addressed. This ensures that the record accurately reflects both the nature of the risk and the rationale for initiating the H SAP.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The development of a Health and Safety Action Plan may also necessitate documentation within the Incident Management System. The Incident Management System is utilized to formally document incidents related to health, safety, and welfare concerns. Standard incident reporting requirements typically require documentation within three business days of becoming aware of an incident. However, the application of this requirement differs slightly in relation to H SAPs. In these cases, documentation is tied to the initiation of the H SAP rather than the initial awareness of a concern, as the issue is often already recognized as an ongoing or chronic risk. Once the H SAP is initiated—generally following discussion with the individual—there is a 30-day timeframe to document the incident within the IMS. In many cases, by the time the HSAP is implemented, sufficient intervention planning has already occurred to support resolution and closure of the incident. The Incident Management System entry, therefore, serves as formal documentation that the concern has been identified and addressed through structured planning. Documentation entered into the Incident Management System should be concise and clearly describe the identified health, safety, or welfare concern, along with the potential consequences if the issue is not addressed. This ensures that the record accurately reflects both the nature of the risk and the rationale for initiating the H SAP.","jobId":"A8SycazWgbTj2Hr7r"}},"GRa2vToxhPQwXHeQP":{"_id":"GRa2vToxhPQwXHeQP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"CbHY3wSFnLHAzq9mz"},"dates":{"dateCreated":"2026-05-19T19:25:49.513Z","dateModified":"2026-05-19T20:23:36.304Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"WQiguGjsaQqRa3v3g","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"jmXj8cthtbEPj8W7Y","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"EBx7i4ayAtHRAwbwD","kind":"overlay","type":"rectangle","width":444,"height":87,"x":9,"y":622,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0,"clickAction":{"type":"openWebsite","openWebsite":"https://dam.assets.ohio.gov/image/upload/medicaid.ohio.gov/Resources/Publications/Forms/ODM10238fillx.pdf"},"customStyle":{"border":{"size":0,"color":"koantic(accent6, 0, 1)","left":true,"top":true,"bottom":true,"right":true},"fill":{"color":"transparent","type":"color"},"fontColor":"koantic(dark1, 0, 1)","title":"blank","verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}}}],"duration":96.39,"captions":[{"text":"The signature section of the health and safety action plan","startTime":0.009,"finishTime":3.089},{"text":"includes important elements that document the individual's level of agreement","startTime":3.089,"finishTime":7.039},{"text":"and the actions taken to ensure informed participation.","startTime":7.21,"finishTime":10.55},{"text":"Within the individual signature section,","startTime":10.97,"finishTime":12.97},{"text":"two checkbox options are provided.","startTime":13.22,"finishTime":15.289},{"text":"These options reflect that the individual may choose to agree with all","startTime":15.81,"finishTime":19.489},{"text":"recommendations or may decline some or all of the proposed interventions.","startTime":19.489,"finishTime":23.29},{"text":"The presence of these options reinforces","startTime":23.889,"finishTime":26.129},{"text":"the individual's right to make informed decisions","startTime":26.129,"finishTime":28.809},{"text":"even when those decisions involve accepting potential risk.","startTime":29.01,"finishTime":32.549},{"text":"The staff attestation section also includes two checkbox options.","startTime":33.049,"finishTime":37.139},{"text":"The primary selection indicates that all identified health and safety","startTime":37.689,"finishTime":41.77},{"text":"concerns have been fully reviewed and explained to the individual.","startTime":41.77,"finishTime":44.95},{"text":"This documentation is critical","startTime":45.45,"finishTime":47.389},{"text":"as it demonstrates that the individual has been informed","startTime":47.5,"finishTime":50.25},{"text":"of the risks and implications associated with the situation.","startTime":50.25,"finishTime":53.459},{"text":"In cases where full engagement is not achieved,","startTime":54.04,"finishTime":56.919},{"text":"such as when the individual refuses to participate","startTime":57.25,"finishTime":60.08},{"text":"or is unwilling to engage in discussion,","startTime":60.08,"finishTime":62.319},{"text":"the secondary check box should be selected.","startTime":62.56,"finishTime":65.059},{"text":"This indicates that an effort was made to inform the individual,","startTime":65.51,"finishTime":68.8},{"text":"even if full understanding or agreement could not be confirmed.","startTime":68.959,"finishTime":72.58},{"text":"Ongoing engagement should continue","startTime":73.08,"finishTime":75.05},{"text":"with the goal of revisiting the discussion and obtaining","startTime":75.279,"finishTime":77.8},{"text":"a signed and updated form if progress is made.","startTime":77.8,"finishTime":80.599},{"text":"All completed HSAP forms must be uploaded","startTime":81.19,"finishTime":84.23},{"text":"to maintain an accurate and complete record.","startTime":84.23,"finishTime":86.97},{"text":"A copy of the document should also","startTime":87.43,"finishTime":89.269},{"text":"be provided to the individual to ensure transparency","startTime":89.269,"finishTime":92.41},{"text":"and shared understanding among all involved parties.","startTime":92.589,"finishTime":95.61}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["CbHY3wSFnLHAzq9mz","jmXj8cthtbEPj8W7Y"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"RAbZEzTXqBaKNiqZN","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The signature section of the Health and Safety Action Plan includes important elements that document the individual’s level of agreement and the actions taken to ensure informed participation. Within the individual signature section, two checkbox options are provided. These options reflect that the individual may choose to agree with all recommendations or may decline some or all of the proposed interventions. The presence of these options reinforces the individual’s right to make informed decisions, even when those decisions involve accepting potential risk. The staff attestation section also includes two checkbox options. The primary selection indicates that all identified health and safety concerns have been fully reviewed and explained to the individual. This documentation is critical, as it demonstrates that the individual has been informed of the risks and implications associated with the situation. In cases where full engagement is not achieved—such as when the individual refuses to participate or is unwilling to engage in discussion—the secondary checkbox should be selected. This indicates that an effort was made to inform the individual, even if full understanding or agreement could not be confirmed. Ongoing engagement should continue, with the goal of revisiting the discussion and obtaining a signed and updated form if progress is made. All completed H SAP forms must be uploaded to maintain an accurate and complete record. A copy of the document should also be provided to the individual to ensure transparency and shared understanding among all involved parties. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The signature section of the Health and Safety Action Plan includes important elements that document the individual’s level of agreement and the actions taken to ensure informed participation. Within the individual signature section, two checkbox options are provided. These options reflect that the individual may choose to agree with all recommendations or may decline some or all of the proposed interventions. The presence of these options reinforces the individual’s right to make informed decisions, even when those decisions involve accepting potential risk. The staff attestation section also includes two checkbox options. The primary selection indicates that all identified health and safety concerns have been fully reviewed and explained to the individual. This documentation is critical, as it demonstrates that the individual has been informed of the risks and implications associated with the situation. In cases where full engagement is not achieved—such as when the individual refuses to participate or is unwilling to engage in discussion—the secondary checkbox should be selected. This indicates that an effort was made to inform the individual, even if full understanding or agreement could not be confirmed. Ongoing engagement should continue, with the goal of revisiting the discussion and obtaining a signed and updated form if progress is made. All completed H SAP forms must be uploaded to maintain an accurate and complete record. A copy of the document should also be provided to the individual to ensure transparency and shared understanding among all involved parties. ","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"HyxGK3zn69bgXv9f8":{"_id":"HyxGK3zn69bgXv9f8","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"EmBgGeuzpLWdus3Ac"},"dates":{"dateCreated":"2026-05-19T19:24:18.609Z","dateModified":"2026-05-19T20:19:01.192Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"y6W8L8HX5jJ6LeieZ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"ZFqAWB4KjzKFxtDzo","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":15.34,"captions":[{"text":"There are many reasons to use an HSAP,","startTime":0.079,"finishTime":2.5},{"text":"and this is a tool that we use in all of our programs","startTime":2.73,"finishTime":5.63},{"text":"which are listed here.","startTime":5.769,"finishTime":7.03},{"text":"The Ohio Rise program is not with all area agencies on aging in Ohio,","startTime":7.449,"finishTime":11.97},{"text":"but you will see it listed on some of these slides.","startTime":12.13,"finishTime":14.529}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["EmBgGeuzpLWdus3Ac","ZFqAWB4KjzKFxtDzo"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"There are many reasons to use an H SAP, and this is a tool that we use in all of our programs, which are listed here. The Ohio Rise program is not with all area agencies on aging in Ohio but you will see it listed on some of these slides.  \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"There are many reasons to use an H SAP, and this is a tool that we use in all of our programs, which are listed here. The Ohio Rise program is not with all area agencies on aging in Ohio but you will see it listed on some of these slides.  ","jobId":"q8L5ZKNEKdXtNYGq7"}},"JnTpZ82Sv2DBxMRDj":{"_id":"JnTpZ82Sv2DBxMRDj","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ZQts4fLJiRPLqAF6d"},"dates":{"dateCreated":"2026-05-19T19:25:19.409Z","dateModified":"2026-05-19T20:19:19.722Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"GECfuNHB9AP2yLDCs","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"vRJBw748nXj6FMmeT","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":79.335,"captions":[{"text":"Ongoing review of the health and safety action plan should","startTime":0.009,"finishTime":2.9699999999999998},{"text":"occur through a combination of face to face visits,","startTime":2.9699999999999998,"finishTime":5.559},{"text":"telephone contact,","startTime":5.769,"finishTime":6.909},{"text":"and adherence to program specific requirements,","startTime":7.289,"finishTime":10},{"text":"while also incorporating coordination with service providers.","startTime":10.289,"finishTime":13.869},{"text":"All contact with the individual must be documented in the case record.","startTime":14.289,"finishTime":18.209},{"text":"Documentation should clearly reflect discussions regarding","startTime":18.69,"finishTime":21.729},{"text":"the effectiveness of the HSAP,","startTime":21.729,"finishTime":23.75},{"text":"including progress toward established goals.","startTime":24.25,"finishTime":26.569},{"text":"Updates to the care plan and service plan should be completed as","startTime":27.18,"finishTime":30.739},{"text":"necessary to ensure alignment with the individual's current needs and risk level.","startTime":30.739,"finishTime":34.74},{"text":"Progress should be explicitly evaluated and","startTime":35.18,"finishTime":37.5},{"text":"documented as either positive or negative.","startTime":37.5,"finishTime":40.319},{"text":"When progress is positive,","startTime":40.74,"finishTime":42.279},{"text":"this should be clearly noted,","startTime":42.439,"finishTime":43.95},{"text":"with the ultimate goal of resolving the identified","startTime":44.139,"finishTime":46.659},{"text":"risk and discontinuing the HSAP when appropriate.","startTime":46.659,"finishTime":49.84},{"text":"When progress is negative,","startTime":50.299,"finishTime":51.729},{"text":"the plan should be reassessed and strengthened.","startTime":51.939,"finishTime":54.099},{"text":"This may include revising action steps and engaging the individual","startTime":54.779,"finishTime":58.34},{"text":"in discussions to identify modifications that will improve effectiveness.","startTime":58.34,"finishTime":62.5},{"text":"Status updates should be consistently recorded within","startTime":63.06,"finishTime":65.819},{"text":"the care plan and case notes.","startTime":65.819,"finishTime":67.75},{"text":"These updates should be informed by the individual's self-report","startTime":68.26,"finishTime":71.339},{"text":"as well as input from all involved parties,","startTime":71.339,"finishTime":73.839},{"text":"ensuring a comprehensive and accurate assessment","startTime":74.019,"finishTime":76.559},{"text":"of the plan's ongoing effectiveness.","startTime":76.559,"finishTime":78.54}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ZQts4fLJiRPLqAF6d","vRJBw748nXj6FMmeT"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Ongoing review of the Health and Safety Action Plan should occur through a combination of face-to-face visits, telephone contact, and adherence to program-specific requirements, while also incorporating coordination with service providers. All contact with the individual must be documented in the case record. Documentation should clearly reflect discussions regarding the effectiveness of the H SAP, including progress toward established goals. Updates to the care plan and service plan should be completed as necessary to ensure alignment with the individual’s current needs and risk level. Progress should be explicitly evaluated and documented as either positive or negative. When progress is positive, this should be clearly noted, with the ultimate goal of resolving the identified risk and discontinuing the HSAP when appropriate. When progress is negative, the plan should be reassessed and strengthened. This may include revising action steps and engaging the individual in discussions to identify modifications that will improve effectiveness. Status updates should be consistently recorded within the care plan and case notes. These updates should be informed by the individual’s self-report as well as input from all involved parties, ensuring a comprehensive and accurate assessment of the plan’s ongoing effectiveness.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Ongoing review of the Health and Safety Action Plan should occur through a combination of face-to-face visits, telephone contact, and adherence to program-specific requirements, while also incorporating coordination with service providers. All contact with the individual must be documented in the case record. Documentation should clearly reflect discussions regarding the effectiveness of the H SAP, including progress toward established goals. Updates to the care plan and service plan should be completed as necessary to ensure alignment with the individual’s current needs and risk level. Progress should be explicitly evaluated and documented as either positive or negative. When progress is positive, this should be clearly noted, with the ultimate goal of resolving the identified risk and discontinuing the HSAP when appropriate. When progress is negative, the plan should be reassessed and strengthened. This may include revising action steps and engaging the individual in discussions to identify modifications that will improve effectiveness. Status updates should be consistently recorded within the care plan and case notes. These updates should be informed by the individual’s self-report as well as input from all involved parties, ensuring a comprehensive and accurate assessment of the plan’s ongoing effectiveness.","jobId":"BgRTDQSQSTkbwy43t"}},"LewzgGotBSPW3JLmQ":{"_id":"LewzgGotBSPW3JLmQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"cdWZzj3FRPx2GnA9J"},"dates":{"dateCreated":"2026-05-19T19:25:55.387Z","dateModified":"2026-05-19T20:19:42.713Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"G7JidkThgnAcyMkbJ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"P8g8fLiz3nyBeDmbX","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":80.4325,"captions":[{"text":"A simplified decision making framework supports the determination of","startTime":0.009,"finishTime":3.769},{"text":"when to implement a health and safety action plan.","startTime":3.769,"finishTime":6.71},{"text":"The process begins with identifying whether an","startTime":7.17,"finishTime":9.56},{"text":"ongoing health or safety risk is present.","startTime":9.56,"finishTime":12.289},{"text":"Once a concern has been identified,","startTime":12.81,"finishTime":14.729},{"text":"efforts should focus on working with the individual through","startTime":14.97,"finishTime":17.37},{"text":"the person-centered planning process to provide appropriate services,","startTime":17.37,"finishTime":21.12},{"text":"supports,","startTime":21.45,"finishTime":21.989},{"text":"coaching,","startTime":22.209,"finishTime":22.84},{"text":"and education aimed at resolving the issue.","startTime":23.049,"finishTime":25.45},{"text":"Consideration of an HSAP should occur only after reasonable attempts have","startTime":26.079,"finishTime":30.319},{"text":"been made to address the risk using available interventions and supports.","startTime":30.319,"finishTime":34.58},{"text":"If these efforts have not successfully mitigated the concern,","startTime":35.04,"finishTime":38},{"text":"and the issue persists.","startTime":38.08,"finishTime":39.389},{"text":"The development of an HSAP is appropriate.","startTime":39.599,"finishTime":42.52},{"text":"The HSAP is not intended to serve as the first line of intervention,","startTime":43.04,"finishTime":47.029},{"text":"but rather as a structured response when prior","startTime":47.119,"finishTime":49.439},{"text":"strategies have not achieved the desired outcome.","startTime":49.439,"finishTime":51.959},{"text":"If the identified concern has been","startTime":52.56,"finishTime":54.599},{"text":"effectively resolved through initial interventions,","startTime":54.599,"finishTime":57.02},{"text":"implementation of an HSAP is not necessary.","startTime":57.24,"finishTime":60.569},{"text":"The HSAP should be viewed as a structured tool that supports","startTime":61.08,"finishTime":64.48},{"text":"documentation of ongoing risks and demonstrates efforts to address those risks.","startTime":64.48,"finishTime":69.18},{"text":"Collaboration with supervisors,","startTime":69.639,"finishTime":71.47},{"text":"mentors,","startTime":71.599,"finishTime":72.459},{"text":"or other leadership resources may be beneficial in determining","startTime":72.699,"finishTime":76.04},{"text":"appropriate application and strengthening the effectiveness of the plan.","startTime":76.04,"finishTime":79.669}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["cdWZzj3FRPx2GnA9J","P8g8fLiz3nyBeDmbX"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A simplified decision-making framework supports the determination of when to implement a Health and Safety Action Plan. The process begins with identifying whether an ongoing health or safety risk is present. Once a concern has been identified, efforts should focus on working with the individual through the person-centered planning process to provide appropriate services, supports, coaching, and education aimed at resolving the issue. Consideration of an H SAP should occur only after reasonable attempts have been made to address the risk using available interventions and supports. If these efforts have not successfully mitigated the concern and the issue persists, the development of an H SAP is appropriate. The H SAP is not intended to serve as the first line of intervention but rather as a structured response when prior strategies have not achieved the desired outcome. If the identified concern has been effectively resolved through initial interventions, implementation of an H SAP is not necessary. The H SAP should be viewed as a structured tool that supports documentation of ongoing risks and demonstrates efforts to address those risks. Collaboration with supervisors, mentors, or other leadership resources may be beneficial in determining appropriate application and strengthening the effectiveness of the plan.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"A simplified decision-making framework supports the determination of when to implement a Health and Safety Action Plan. The process begins with identifying whether an ongoing health or safety risk is present. Once a concern has been identified, efforts should focus on working with the individual through the person-centered planning process to provide appropriate services, supports, coaching, and education aimed at resolving the issue. Consideration of an H SAP should occur only after reasonable attempts have been made to address the risk using available interventions and supports. If these efforts have not successfully mitigated the concern and the issue persists, the development of an H SAP is appropriate. The H SAP is not intended to serve as the first line of intervention but rather as a structured response when prior strategies have not achieved the desired outcome. If the identified concern has been effectively resolved through initial interventions, implementation of an H SAP is not necessary. The H SAP should be viewed as a structured tool that supports documentation of ongoing risks and demonstrates efforts to address those risks. Collaboration with supervisors, mentors, or other leadership resources may be beneficial in determining appropriate application and strengthening the effectiveness of the plan.","jobId":"uJRKEi6CNCdgsDjKk"}},"WDbjcG4eFYDp5E2E5":{"_id":"WDbjcG4eFYDp5E2E5","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"TJxmjf9ejbquvoCyy"},"dates":{"dateCreated":"2026-05-19T19:26:06.933Z","dateModified":"2026-05-19T20:19:50.909Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"7KQshcBmE9aicpiAh","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"L8fTNp8eTefu3gC6T","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":91.2625,"captions":[{"text":"Important distinctions must be clearly understood when considering the","startTime":0.009,"finishTime":3.529},{"text":"use of a health and safety action plan.","startTime":3.529,"finishTime":6.07},{"text":"HSAPs are not mandatory and should not be used as","startTime":6.539,"finishTime":9.77},{"text":"a primary mechanism to threaten disenrollment from waiver services.","startTime":9.77,"finishTime":13.56},{"text":"They are not appropriate in situations where an individual","startTime":13.979,"finishTime":16.649},{"text":"lacks the competency or capacity to address identified behaviors.","startTime":16.649,"finishTime":20.649},{"text":"Additionally,","startTime":21.219,"finishTime":21.94},{"text":"HSAP should not be developed without","startTime":22.139,"finishTime":24.42},{"text":"the individual's participation and engagement,","startTime":24.42,"finishTime":27.01},{"text":"nor should the process cause the individual to","startTime":27.299,"finishTime":29.809},{"text":"feel impersonalized or reduced to a case number.","startTime":29.809,"finishTime":32.418},{"text":"The approach must not rely on directing the individual without collaboration,","startTime":32.939,"finishTime":36.939},{"text":"and care must be taken to avoid re-traumatization.","startTime":37.099,"finishTime":40.08},{"text":"Each essay piece may be appropriately implemented for a range of","startTime":40.54,"finishTime":43.86},{"text":"behaviors or circumstances that pose a risk to the individual's health,","startTime":43.86,"finishTime":47.4},{"text":"safety,","startTime":47.819,"finishTime":48.259},{"text":"or welfare.","startTime":48.689,"finishTime":49.22},{"text":"Best practice includes ensuring that the individual understands the purpose","startTime":49.83,"finishTime":53.59},{"text":"of the HSAP and is meaningfully engaged in the process.","startTime":53.59,"finishTime":57.33},{"text":"The individuals should feel supported throughout implementation","startTime":57.79,"finishTime":61.029},{"text":"with the plan developed collaboratively to reflect their input.","startTime":61.229,"finishTime":64.489},{"text":"The perspectives of the individual and their family","startTime":64.949,"finishTime":67.629},{"text":"or support system should be respected and incorporated.","startTime":67.629,"finishTime":70.989},{"text":"The HSAP should align with person-centered planning principles,","startTime":71.48,"finishTime":75.309},{"text":"taking into account the individual's goals,","startTime":75.559,"finishTime":77.87},{"text":"preferences,","startTime":78.129,"finishTime":78.79},{"text":"and values.","startTime":78.919,"finishTime":79.98},{"text":"It should include appropriate resources,","startTime":80.4,"finishTime":82.55},{"text":"services,","startTime":82.879,"finishTime":83.58},{"text":"and care coordination supports while adhering to trauma informed","startTime":83.72,"finishTime":87.16},{"text":"care principles to ensure a respectful and supportive approach.","startTime":87.16,"finishTime":90.54}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["TJxmjf9ejbquvoCyy","L8fTNp8eTefu3gC6T"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Important distinctions must be clearly understood when considering the use of a Health and Safety Action Plan. H SAPs are not mandatory and should not be used as a primary mechanism to threaten disenrollment from waiver services. They are not appropriate in situations where an individual lacks the competency or capacity to address identified behaviors. Additionally, H SAPs should not be developed without the individual’s participation and engagement, nor should the process cause the individual to feel impersonalized or reduced to a case number. The approach must not rely on directing the individual without collaboration, and care must be taken to avoid re-traumatization. H SAPs may be appropriately implemented for a range of behaviors or circumstances that pose a risk to the individual’s health, safety, or welfare. Best practice includes ensuring that the individual understands the purpose of the H SAP and is meaningfully engaged in the process. The individual should feel supported throughout implementation, with the plan developed collaboratively to reflect their input. The perspectives of the individual and their family or support system should be respected and incorporated. The H SAP should align with person-centered planning principles, taking into account the individual’s goals, preferences, and values. It should include appropriate resources, services, and care coordination supports while adhering to trauma-informed care principles to ensure a respectful and supportive approach. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Important distinctions must be clearly understood when considering the use of a Health and Safety Action Plan. H SAPs are not mandatory and should not be used as a primary mechanism to threaten disenrollment from waiver services. They are not appropriate in situations where an individual lacks the competency or capacity to address identified behaviors. Additionally, H SAPs should not be developed without the individual’s participation and engagement, nor should the process cause the individual to feel impersonalized or reduced to a case number. The approach must not rely on directing the individual without collaboration, and care must be taken to avoid re-traumatization. H SAPs may be appropriately implemented for a range of behaviors or circumstances that pose a risk to the individual’s health, safety, or welfare. Best practice includes ensuring that the individual understands the purpose of the H SAP and is meaningfully engaged in the process. The individual should feel supported throughout implementation, with the plan developed collaboratively to reflect their input. The perspectives of the individual and their family or support system should be respected and incorporated. The H SAP should align with person-centered planning principles, taking into account the individual’s goals, preferences, and values. It should include appropriate resources, services, and care coordination supports while adhering to trauma-informed care principles to ensure a respectful and supportive approach. ","jobId":"Jt5688cFMkM73Yxvr"}},"bGkAFrpiW8Njuhmkn":{"_id":"bGkAFrpiW8Njuhmkn","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"PhSWyFoGZyx3wwP8r"},"dates":{"dateCreated":"2026-05-19T19:25:36.035Z","dateModified":"2026-05-19T20:23:20.185Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"X7tYkD5GE2adiMFX3","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"QG7cECcWGTvp8QsBd","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"iy555GCwPz3yZWe4v","kind":"overlay","type":"rectangle","width":444,"height":87,"x":9,"y":622,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0,"clickAction":{"type":"openWebsite","openWebsite":"https://dam.assets.ohio.gov/image/upload/medicaid.ohio.gov/Resources/Publications/Forms/ODM10238fillx.pdf"},"customStyle":{"border":{"size":0,"color":"koantic(accent6, 0, 1)","left":true,"top":true,"bottom":true,"right":true},"fill":{"color":"transparent","type":"color"},"fontColor":"koantic(dark1, 0, 1)","title":"blank","verticalAlignment":"middle","type":"rectangle"," lable through program-specific resources, with links often provided within supporting materials or guidance documents. Regardless of access method, the same standardized form is used across all programs to promote uniform documentation and implementation practices. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The Health and Safety Action Plan utilizes a standardized form across all waiver programs, ensuring consistency and ease of use. The structure of the form reflects the three core sections previously described: \nIdentification of the health and safety concern \nDescription of the potential consequences if the concern is not addressed \nDevelopment of action steps to mitigate or eliminate the identified risk \nThe action steps section is the primary area in which interventions are developed, modified, or strengthened based on the individual’s needs and level of risk. Access to the H SAP form is typically available through program-specific resources, with links often provided within supporting materials or guidance documents. Regardless of access method, the same standardized form is used across all programs to promote uniform documentation and implementation practices. ","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"onizKfR5uCyMudKxZ"}},"e4yLCzEcg4EyoLa9Z":{"_id":"e4yLCzEcg4EyoLa9Z","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"RxnbuDwuWB6brpSWA"},"dates":{"dateCreated":"2026-05-19T19:24:31.165Z","dateModified":"2026-05-19T20:19:04.009Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"E22EYvp9zpd9ECDTy","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"uNHHR6KtG6S24iByB","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":104.385,"captions":[{"text":"The required components generally consist of three primary sections.","startTime":0.009,"finishTime":4.11},{"text":"The first section defines the identified concern.","startTime":4.489,"finishTime":7.429},{"text":"This section clearly explains the issue prompting the","startTime":7.889,"finishTime":10.529},{"text":"development of the health and safety action plan,","startTime":10.529,"finishTime":12.989},{"text":"including the underlying risk or barrier that necessitates intervention.","startTime":13.369,"finishTime":17.35},{"text":"The second section outlines the potential consequences","startTime":17.809,"finishTime":20.61},{"text":"if the identified concern is not addressed.","startTime":20.61,"finishTime":23.069},{"text":"This portion should provide a detailed description of","startTime":23.739,"finishTime":26.42},{"text":"the possible outcomes emphasizing the severity of risk.","startTime":26.42,"finishTime":30.12},{"text":"Scenarios should reflect the full range of","startTime":30.659,"finishTime":32.9},{"text":"potential impacts up to and including hospitalization,","startTime":32.9,"finishTime":36.209},{"text":"placement in a nursing facility,","startTime":36.5,"finishTime":38.52},{"text":"or other significant adverse events","startTime":38.779,"finishTime":41.08},{"text":"in high risk situations","startTime":41.459,"finishTime":43.09},{"text":"such as the use of oxygen in conjunction with smoking.","startTime":43.259,"finishTime":46.22},{"text":"The consequences may include life threatening outcomes.","startTime":46.459,"finishTime":49.4},{"text":"Clearly articulating these possibilities supports the individual's","startTime":49.959,"finishTime":53.959},{"text":"understanding of the seriousness of the concern.","startTime":53.959,"finishTime":56.209},{"text":"The third section details the recommended action steps.","startTime":56.68,"finishTime":59.86},{"text":"This section explains the strategies that","startTime":60.319,"finishTime":62.279},{"text":"will be implemented to reduce or eliminate","startTime":62.279,"finishTime":64.519},{"text":"the identified risk and describes how these actions will be carried out.","startTime":64.519,"finishTime":68.5},{"text":"The approach should be individualized to ensure that the plan is effective","startTime":68.959,"finishTime":72.379},{"text":"in addressing the specific needs and circumstances associated with the risk.","startTime":72.379,"finishTime":76.54},{"text":"Additional sections address ongoing monitoring and required signatures.","startTime":77.05,"finishTime":81.4},{"text":"The monitoring section describes how the effectiveness of","startTime":81.849,"finishTime":84.529},{"text":"the action steps will be evaluated over time.","startTime":84.529,"finishTime":87.309},{"text":"The signature section includes acknowledgement from all relevant parties,","startTime":87.809,"finishTime":91.55},{"text":"including the individual,","startTime":91.93,"finishTime":92.91},{"text":"the care manager,","startTime":93.29,"finishTime":94.199},{"text":"and members of the care team when feasible.","startTime":94.33,"finishTime":96.589},{"text":"Securing these signatures supports shared understanding,","startTime":97.169,"finishTime":99.989},{"text":"accountability,","startTime":100.25,"finishTime":101.25},{"text":"and the overall effectiveness of the plan.","startTime":101.41,"finishTime":103.61}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["RxnbuDwuWB6brpSWA","uNHHR6KtG6S24iByB"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The required components generally consist of three primary sections. The first section defines the identified concern. This section clearly explains the issue prompting the development of the Health and Safety Action Plan, including the underlying risk or barrier that necessitates intervention. The second section outlines the potential consequences if the identified concern is not addressed. This portion should provide a detailed description of the possible outcomes, emphasizing the severity of risk. Scenarios should reflect the full range of potential impacts, up to and including hospitalization, placement in a nursing facility, or other significant adverse events. In high-risk situations, such as the use of oxygen in conjunction with smoking, the consequences may include life-threatening outcomes. Clearly articulating these possibilities supports the individual’s understanding of the seriousness of the concern. The third section details the recommended action steps. This section explains the strategies that will be implemented to reduce or eliminate the identified risk and describes how these actions will be carried out. The approach should be individualized to ensure that the plan is effective in addressing the specific needs and circumstances associated with the risk. Additional sections address ongoing monitoring and required signatures. The monitoring section describes how the effectiveness of the action steps will be evaluated over time. The signature section includes acknowledgment from all relevant parties, including the individual, the care manager, and members of the care team when feasible. Securing these signatures supports shared understanding, accountability, and the overall effectiveness of the plan. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"The required components generally consist of three primary sections. The first section defines the identified concern. This section clearly explains the issue prompting the development of the Health and Safety Action Plan, including the underlying risk or barrier that necessitates intervention. The second section outlines the potential consequences if the identified concern is not addressed. This portion should provide a detailed description of the possible outcomes, emphasizing the severity of risk. Scenarios should reflect the full range of potential impacts, up to and including hospitalization, placement in a nursing facility, or other significant adverse events. In high-risk situations, such as the use of oxygen in conjunction with smoking, the consequences may include life-threatening outcomes. Clearly articulating these possibilities supports the individual’s understanding of the seriousness of the concern. The third section details the recommended action steps. This section explains the strategies that will be implemented to reduce or eliminate the identified risk and describes how these actions will be carried out. The approach should be individualized to ensure that the plan is effective in addressing the specific needs and circumstances associated with the risk. Additional sections address ongoing monitoring and required signatures. The monitoring section describes how the effectiveness of the action steps will be evaluated over time. The signature section includes acknowledgment from all relevant parties, including the individual, the care manager, and members of the care team when feasible. Securing these signatures supports shared understanding, accountability, and the overall effectiveness of the plan. ","jobId":"vevJAPJQQREGGxn3e"}},"eke974pHdnEyFuQZv":{"_id":"eke974pHdnEyFuQZv","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"en9uLnWP4BKkuPFZm"},"dates":{"dateCreated":"2026-05-19T19:26:13.892Z","dateModified":"2026-05-19T20:24:15.995Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"WyBRQyJpGRawBPMic","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"8o496CkSgNkCtb5qE","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"QXEhXfDwhpmzWujb9","kind":"overlay","type":"rectangle","width":615,"height":150,"x":17,"y":562, 609},{"text":"While not an exhaustive list,","startTime":9.09,"finishTime":10.81},{"text":"several common scenarios may warrant the development of an HSAP.","startTime":11.13,"finishTime":15.149},{"text":"Examples include chronic medication misuse or abuse,","startTime":15.85,"finishTime":19.19},{"text":"ongoing refusal of waiver services or other medically necessary interventions,","startTime":19.309,"finishTime":23.889},{"text":"and high risk behaviors such as smoking while using oxygen.","startTime":24.17,"finishTime":27.45},{"text":"Environmental concerns that interfere with safe and","startTime":28.02,"finishTime":30.899},{"text":"effective service delivery should also be considered,","startTime":30.899,"finishTime":33.72},{"text":"as well as behaviors that disrupt or negatively impact care coordination.","startTime":33.9,"finishTime":38.319},{"text":"Additionally,","startTime":38.79,"finishTime":39.5},{"text":"behaviors or actions by family members,","startTime":39.979,"finishTime":42.009},{"text":"friends,","startTime":42.22,"finishTime":42.619},{"text":"or others within the home environment that","startTime":42.819,"finishTime":44.68},{"text":"hinder service delivery may necessitate an HSAP.","startTime":44.68,"finishTime":47.729},{"text":"Situations in which an individual's decision making places them at increased","startTime":48.549,"finishTime":52.459},{"text":"risk for harm should also be addressed through this planning process.","startTime":52.459,"finishTime":55.639},{"text":"These examples illustrate circumstances in which","startTime":56.5,"finishTime":59.06},{"text":"formal documentation and intervention planning are","startTime":59.06,"finishTime":61.939},{"text":"necessary to mitigate risk and support the individual's health and safety.","startTime":61.939,"finishTime":65.459}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["G3TEHy9tsvDJ4K9bF","oDv9wJYEFQaAHGP7a"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A Health and Safety Action Plan should be considered whenever potential risks to an individual’s health, safety, or overall welfare are identified. While not an exhaustive list, several common scenarios may warrant the development of an HSAP. Examples include chronic medication misuse or abuse, ongoing refusal of waiver services or other medically necessary interventions, and high-risk behaviors such as smoking while using oxygen. Environmental concerns that interfere with safe and effective service delivery should also be considered, as well as behaviors that disrupt or negatively impact care coordination. Additionally, behaviors or actions by family members, friends, or others within the home environment that hinder service delivery may necessitate an HSAP. Situations in which an individual’s decision-making places them at increased risk for harm should also be addressed through this planning process. These examples illustrate circumstances in which formal documentation and intervention planning are necessary to mitigate risk and support the individual’s health and safety.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-SteffanNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-SteffanNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"A Health and Safety Action Plan should be considered whenever potential risks to an individual’s health, safety, or overall welfare are identified. While not an exhaustive list, several common scenarios may warrant the development of an HSAP. Examples include chronic medication misuse or abuse, ongoing refu
