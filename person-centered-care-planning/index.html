sees the member actively involved in the process","startTime":35.52,"finishTime":39.159},{"text":"of changing the way they manage their medical condition or illness.","startTime":39.159,"finishTime":42.38},{"text":"Finally,","startTime":43.86,"finishTime":44.439},{"text":"the maintenance stage is where the member","startTime":44.619,"finishTime":46.34},{"text":"has successfully made changes in the management","startTime":46.34,"finishTime":48.599},{"text":"of their medical condition or illness and continually works to prevent a relapse.","startTime":48.599,"finishTime":52.72},{"text":"The maintenance stage begins when the change","startTime":53.56,"finishTime":55.74},{"text":"is sustained for greater than 6 months.","startTime":55.74,"finishTime":57.979},{"text":"A relapse may occur at any stage where a change is not sustained over time.","startTime":59.27,"finishTime":63.65},{"text":"Relapses are a natural part of the change process.","startTime":64.509,"finishTime":67.429},{"text":"Waiver service coordinator can intervene to focus","startTime":68.4,"finishTime":71.04},{"text":"members on their motivation to change,","startTime":71.04,"finishTime":73.019},{"text":"encourage their plans,","startTime":73.23,"finishTime":74.54},{"text":"support their behavior change,","startTime":74.919,"finishTime":76.269},{"text":"and prevent relapse.","startTime":76.44,"finishTime":77.639}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["sHvX9cS2NQ2iQsu8F","LE2i6SmcC2LPx8JDT"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"There are five steps in the stages of change model. \",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In the first step precontemplation, the Member is not thinking about changing the way they manage their medical condition or illness and is not making any changes.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In contemplation the member is seriously thinking about changing the way they manage their medical condition or illness but has not made a commitment.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In the preparation stage, the member reports small changes in the way they manage their medical condition or illness. This stage is the decision making stage and involves plans to begin a new behavior.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The action stage sees the member actively involved in the process of changing the way they manage their medical condition or illness.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Finally, the maintenance stage is where the member has successfully made changes in the management of their medical condition or illness and continually works to prevent a relapse. The maintenance stage begins when the change is sustained for greater than six months.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A relapse may occur at any stage where a change is not sustained over time. Relapses are a natural part of the change process. Waiver service coordinator can intervene to focus members on their motivation to change, encourage their plans, support their behavior change, and prevent relapse.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"There are five steps in the stages of change model. \nIn the first step precontemplation, the Member is not thinking about changing the way they manage their medical condition or illness and is not making any changes.\nIn contemplation the member is seriously thinking about changing the way they manage their medical condition or illness but has not made a commitment.\nIn the preparation stage, the member reports small changes in the way they manage their medical condition or illness. This stage is the decision making stage and involves plans to begin a new behavior.\nThe action stage sees the member actively involved in the process of changing the way they manage their medical condition or illness.\nFinally, the maintenance stage is where the member has successfully made changes in the management of their medical condition or illness and continually works to prevent a relapse. The maintenance stage begins when the change is sustained for greater than six months.\nA relapse may occur at any stage where a change is not sustained over time. Relapses are a natural part of the change process. Waiver service coordinator can intervene to focus members on their motivation to change, encourage their plans, support their behavior change, and prevent relapse.","jobId":"uWr6aP7mEKGqBvzCF","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"5Tn5B8sCAuCyYQ3bH":{"_id":"5Tn5B8sCAuCyYQ3bH","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Signature Requirements","upload":"mEK976zWT7NrC8QZX"},"dates":{"dateCreated":"2026-04-14T22:01:23.323Z","dateModified":"2026-04-17T14:14:12.590Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"r6cMt4FKov7LN7csL","kind":"overlay","type":"rectangle","width":1332,"height":749.2499999999999,"x":-31,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"EexmhEXRCxds7zWCJ","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":60.525,"captions":[{"text":"The individual's signature or the signature of their authorized representative","startTime":0.079,"finishTime":4.349},{"text":"is required at key decision points,","startTime":4.489,"finishTime":6.559},{"text":"not just once.","startTime":6.809,"finishTime":7.769},{"text":"A signature is required when the plan is first developed,","startTime":8.649000000000001,"finishTime":11.609},{"text":"when it is updated,","startTime":11.818999999999999,"finishTime":12.85},{"text":"and when new services are added or existing services","startTime":13.06,"finishTime":15.939},{"text":"are changed in a way that's expected to continue.","startTime":15.939,"finishTime":18.45},{"text":"This requirement protects the individual by confirming they understand the plan","startTime":19.34,"finishTime":23.299},{"text":"and had the opportunity to participate in decisions about their care.","startTime":23.299,"finishTime":26.84},{"text":"It also protects providers and case management agencies by documenting","startTime":27.61,"finishTime":31.649},{"text":"that services were authorized with the individual's knowledge and agreement.","startTime":31.649,"finishTime":35.25},{"text":"Signatures don't have to look the same for everyone.","startTime":36.169,"finishTime":38.689},{"text":"Some individuals may sign their name,","startTime":39.639,"finishTime":41.639},{"text":"some may use a mark or initials,","startTime":41.919,"finishTime":43.709},{"text":"and some may require accommodations.","startTime":43.919,"finishTime":46.04},{"text":"What matters is that the method used is appropriate and clearly documented.","startTime":46.97,"finishTime":50.889},{"text":"Without this documentation,","startTime":51.77,"finishTime":53.36},{"text":"the plan may not meet person-centered or compliance expectations,","startTime":53.529,"finishTime":57.139},{"text":"even if the services themselves are appropriate.","startTime":57.33,"finishTime":59.759}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["mEK976zWT7NrC8QZX","EexmhEXRCxds7zWCJ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The individual’s signature, or the signature of their authorized representative, is required at key decision points, not just once. A signature is required when the plan is first developed, when it is updated, and when new services are added or existing services are changed in a way that’s expected to continue. This requirement protects the individual by confirming they understand the plan and had the opportunity to participate in decisions about their care. It also protects providers and case management agencies by documenting that services were authorized with the individual’s knowledge and agreement. Signatures don’t have to look the same for everyone. Some individuals may sign their name, some may use a mark or initials, and some may require accommodations. What matters is that the method used is appropriate and clearly documented. Without this documentation, the plan may not meet person‑centered or compliance expectations, even if the services themselves are appropriate.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The individual’s signature, or the signature of their authorized representative, is required at key decision points, not just once. A signature is required when the plan is first developed, when it is updated, and when new services are added or existing services are changed in a way that’s expected to continue. This requirement protects the individual by confirming they understand the plan and had the opportunity to participate in decisions about their care. It also protects providers and case management agencies by documenting that services were authorized with the individual’s knowledge and agreement. Signatures don’t have to look the same for everyone. Some individuals may sign their name, some may use a mark or initials, and some may require accommodations. What matters is that the method used is appropriate and clearly documented. Without this documentation, the plan may not meet person‑centered or compliance expectations, even if the services themselves are appropriate.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"mvbJzxF4DvEbQjDTN"}},"5zAfPDDKt8z9v5iMa":{"_id":"5zAfPDDKt8z9v5iMa","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Knowledge Check 3"},"dates":{"dateCreated":"2026-04-17T15:10:09.455Z","dateModified":"2026-04-17T15:10:19.511Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true,"questions":["nduBCJXKdLkbZywcr"]},"video":{"autoPlay":true,"overlays":[{"identifier":"bvRKzcmePKaQtyhKf","kind":"overlay","type":"questionTF","width":1152,"height":648,"x":64,"y":36,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":5,"topRight":5,"bottomLeft":5,"bottomRight":5},"fill":{"type":"color","color":"koantic(light1, 0, 1)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":16},"shadow":{"angle":270,"distance":0,"blur":12,"color":"rgba(0, 0, 0, 0.53)"}},"questionId":"nduBCJXKdLkbZywcr","start":0,"behaviorType":"pause"}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":[],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[]},"67RgbaehH8jAKqp7G":{"_id":"67RgbaehH8jAKqp7G","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 24","upload":"STmCnHjuC24JMraaH"},"dates":{"dateCreated":"2025-05-20T16:37:04.981Z","dateModified":"2026-04-17T14:19:54.082Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"BEJbzbBrWkeF2CfZs","kind":"overlay","htmlContent":"\u003cdiv>\u003cspan style=\"color:rgba(25, 144, 179, 1)\">SMART Goal Examples\u003c/span>\u003c/div>\n","height":62,"width":687,"y":1,"x":33,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":-0.6660000085830688,"textAlignment":"left","verticalAlignment":"top","font":{"size":35.31745910644531,"bold":true,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"transparent"},"padding":{"bottom":0,"top":0,"left":0,"right":0},"fontColor":"rgba(25, 144, 179, 1)"}},{"identifier":"JRDiK489kiQWJHQFF","kind":"overlay","type":"rectangle","width":1199,"height":61.00000000000001,"x":41,"y":360,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.5,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":14}},"start":0,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Member Goal:\u003c/strong>\u003cbr />\n\u003cem>&ldquo;I want to be able to walk outside again like I used to, without my pain getting in the way.&rdquo;\u003c/em>\u003c/div>\n\n\u003cdiv>\u003cstrong>SMART Goal Breakdown:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>S &ndash; Specific:\u003c/strong>\u003cbr />\n\tMary wants to increase her walking activity but is currently limited by pain.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>M &ndash; Measurable:\u003c/strong>\u003cbr />\n\tMary reports a current pain level of 6&ndash;7. The goal is to reduce it to 3&ndash;4 on the pain scale.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>A &ndash; Attainable (Action Steps):\u003c/strong>\u003c/div>\n\n\t\u003cul>\n\t\t\u003cli>Take prescribed and OTC medications as directed by her PCP.\u003c/li>\n\t\t\u003cli>Use heat/ice therapy as needed.\u003c/li>\n\t\t\u003cli>Take short walks with her aide, using her walker to build stamina.\u003c/li>\n\t\t\u003cli>Rest frequently and avoid overexertion.\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>R &ndash; Relevant:\u003c/strong>\u003cbr />\n\tWalking outdoors is important to Mary&rsquo;s sense of independence and emotional well-being.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>T &ndash; Time-Bound:\u003c/strong>\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>Mary will see improvement in pain level and increased activity in 6 months. &nbsp;Progression and self management toward above goal will be monitored.&nbsp;\u003c/div>\n\t\u003c/li>\n\u003c/ul>\n\n\u003cdiv>\u003cstrong>Support Team Involvement:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\u003cstrong>PCP:\u003c/strong>&nbsp;Manages pain treatment plan and medication.\u003c/li>\n\t\u003cli>\u003cstrong>Aide:\u003c/strong>&nbsp;Assists with walking and monitors for signs of overexertion.\u003c/li>\n\t\u003cli>\u003cstrong>Care Coordinator:\u003c/strong>&nbsp;Tracks progress, adjusts plan as needed, and ensures supports are in place.\u003c/li>\n\t\u003cli>\u003cstrong>Family:\u003c/strong>&nbsp;Encouraged to support Mary&rsquo;s pacing and celebrate milestones.\u003c/li>\n\u003c/ul>\n","rotationAngle":0,"duration":67},{"identifier":"Q595B9z9EmhenXasq","kind":"overlay","type":"rectangle","width":1205,"height":61.00000000000001,"x":37,"y":376,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.5,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":15}},"start":67.3,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Member Goal:\u003c/strong>\u003cbr />\n\u003cem>&ldquo;I want to feel less isolated and talk to someone outside my home at least once a week.&rdquo;\u003c/em>\u003c/div>\n\n\u003cdiv>\u003cstrong>SMART Goal Breakdown:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>S &ndash; Specific:\u003c/strong>\u003cbr />\n\tThe member wants to increase social interaction by connecting with others weekly.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>M &ndash; Measurable:\u003c/strong>\u003cbr />\n\tThe goal is to have one meaningful conversation per week with someone outside the home.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>A &ndash; Attainable (Action Steps):\u003c/strong>\u003c/div>\n\n\t\u003cul>\n\t\t\u003cli>Schedule weekly phone calls with a friend or family member.\u003c/li>\n\t\t\u003cli>Attend a local senior center&rsquo;s coffee hour every other week.\u003c/li>\n\t\t\u003cli>Ask the care coordinator to help identify a peer support group or community activity.\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>R &ndash; Relevant:\u003c/strong>\u003cbr />\n\tThe member has expressed feeling lonely and wants to build more social connection.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>T &ndash; Time-Bound:\u003c/strong>\u003cbr />\n\tGoal will be reviewed in 60 days to assess consistency and impact on well-being.\u003c/div>\n\t\u003c/li>\n\u003c/ul>\n\n\u003cdiv>\u003cstrong>Support Team Involvement:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\u003cstrong>Care Coordinator:\u003c/strong>&nbsp;Helps identify local resources and checks in on progress.\u003c/li>\n\t\u003cli>\u003cstrong>Family/Friends:\u003c/strong>&nbsp;Encouraged to schedule regular calls or visits.\u003c/li>\n\t\u003cli>\u003cstrong>Community Programs:\u003c/strong>&nbsp;Provide structured opportunities for social engagement.\u003c/li>\n\u003c/ul>\n","rotationAngle":0,"duration":48.7},{"identifier":"vvhfJ7nociwmXt4an","kind":"overlay","type":"rectangle","width":1215,"height":61.00000000000001,"x":26,"y":370,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.5,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":15}},"start":116.5,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Member Goal:\u003c/strong>\u003cbr />\n\u003cem>&ldquo;I want to eat healthier meals so I can feel more energetic and manage my diabetes better.&rdquo;\u003c/em>\u003c/div>\n\n\u003cdiv>\u003cstrong>SMART Goal Breakdown:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>S &ndash; Specific:\u003c/strong>\u003cbr />\n\tThe member wants to improve their diet to support energy levels and diabetes management.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>M &ndash; Measurable:\u003c/strong>\u003cbr />\n\tThe goal is to prepare and eat at least four home-cooked meals per week that follow their diabetes meal plan.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>A &ndash; Attainable (Action Steps):\u003c/strong>\u003c/div>\n\n\t\u003cul>\n\t\t\u003cli>Meet with a dietitian to review a simple meal plan.\u003c/li>\n\t\t\u003cli>Create a weekly grocery list with support from a family member or aide.\u003c/li>\n\t\t\u003cli>Prepare meals in advance with help as needed.\u003c/li>\n\t\t\u003cli>Track meals in a food journal or app.\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>R &ndash; Relevant:\u003c/strong>\u003cbr />\n\tThe goal supports the member&rsquo;s health and aligns with their desire to feel more in control of their condition.\u003c/div>\n\t\u003c/li>\n\t\u003cli>\n\t\u003cdiv>\u003cstrong>T &ndash; Time-Bound:\u003c/strong>\u003cbr />\n\tGoal will be reviewed in 30 days to assess consistency and adjust supports if needed.\u003c/div>\n\t\u003c/li>\n\u003c/ul>\n\n\u003cdiv>\u003cstrong>Support Team Involvement:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\u003cstrong>Dietitian:\u003c/strong>&nbsp;Provides meal planning guidance.\u003c/li>\n\t\u003cli>\u003cstrong>Family/Aide:\u003c/strong>&nbsp;Assists with shopping and meal prep.\u003c/li>\n\t\u003cli>\u003cstrong>Care Coordinator:\u003c/strong>&nbsp;Monitors progress and helps troubleshoot barriers.\u003c/li>\n\u003c/ul>\n","rotationAngle":0}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":179.0875,"captions":[{"text":"Here's a smart goal example for Mary,","startTime":0.019,"finishTime":2.24},{"text":"a fictional member who wants to walk outside again like she used to.","startTime":2.4,"finishTime":5.84},{"text":"Her pain has been a barrier,","startTime":6.71,"finishTime":8.18},{"text":"so the care plan focuses on reducing her","startTime":8.35,"finishTime":10.63},{"text":"pain level and gradually increasing her stamina.","startTime":10.63,"finishTime":13.149},{"text":"The goal is specific and measurable.","startTime":14.47,"finishTime":16.45},{"text":"Mary wants to reduce her pain from a 6 to 7 to a 3 to 4.","startTime":16.7,"finishTime":20.5},{"text":"It's attainable through a combination of medication,","startTime":21.28,"finishTime":23.94},{"text":"physical activity with support,","startTime":24.229,"finishTime":25.899},{"text":"and pacing strategies.","startTime":26.03,"finishTime":27.459},{"text":"This goal is relevant to Mary's personal values.","startTime":28.87,"finishTime":31.75},{"text":"Being outdoors helps her feel independent and emotionally well.","startTime":31.909,"finishTime":35.22},{"text":"The timeline is realistic with progress reviewed every","startTime":36.06,"finishTime":39.29},{"text":"60 days over a 6 month period.","startTime":39.29,"finishTime":41.52},{"text":"Importantly,","startTime":43,"finishTime":43.86},{"text":"this goal is supported by a team.","startTime":44.069,"finishTime":45.979},{"text":"Her PCP manages her treatment,","startTime":46.189,"finishTime":48.22},{"text":"her aid helps with walking,","startTime":48.43,"finishTime":49.86},{"text":"and her care coordinator ensures the plan stays on track.","startTime":49.99,"finishTime":53.15},{"text":"Family members are also encouraged to support and celebrate her progress.","startTime":54.099,"finishTime":58.049},{"text":"This example shows how a smart goal can","startTime":59.549,"finishTime":61.79},{"text":"be both clinically sound and deeply personal,","startTime":61.79,"finishTime":64.26},{"text":"centered on what matters most to the member.","startTime":64.55,"finishTime":66.58},{"text":"This next smart goal focuses on improving social connection,","startTime":67.94,"finishTime":71.29},{"text":"which is a key part of emotional well-being.","startTime":71.5,"finishTime":73.62},{"text":"The member has shared that they often feel isolated and would like","startTime":74.47,"finishTime":77.65},{"text":"to talk to someone outside their home at least once a week.","startTime":77.65,"finishTime":80.519},{"text":"The goal is specific and measurable,","startTime":81.819,"finishTime":83.839},{"text":"one meaningful interaction per week.","startTime":84.05,"finishTime":86.019},{"text":"It's attainable through a mix of phone calls,","startTime":86.819,"finishTime":89.29},{"text":"community events,","startTime":89.569,"finishTime":90.489},{"text":"and support from the care team.","startTime":90.61,"finishTime":92.18},{"text":"It's also highly relevant to the members' emotional health and sense of belonging.","startTime":93.47,"finishTime":97.58},{"text":"The goal will be reviewed in 60 days to see","startTime":98.44,"finishTime":100.86},{"text":"how it's going and whether any adjustments are needed.","startTime":100.86,"finishTime":103.26},{"text":"This example shows how person centered care","startTime":104.68,"finishTime":107},{"text":"planning can support not just physical health,","startTime":107,"finishTime":109.309},{"text":"but also emotional and social needs by involving the members","startTime":109.559,"finishTime":113.16},{"text":"support network and building on what matters most to them.","startTime":113.16,"finishTime":115.79},{"text":"A final smart goal example focuses on nutrition and self-management.","startTime":117.15,"finishTime":121.3},{"text":"The member wants to feel more energetic and","startTime":122.15,"finishTime":124.419},{"text":"better manage their diabetes by eating healthier meals.","startTime":124.419,"finishTime":127.54},{"text":"The goal is specific and measurable,","startTime":128.83,"finishTime":130.85},{"text":"preparing and eating 4 home cooked meals per week.","startTime":131.059,"finishTime":133.85},{"text":"It's attainable with support from a dietitian,","startTime":134.589,"finishTime":137.07},{"text":"family,","startTime":137.38,"finishTime":137.85},{"text":"or an aid,","startTime":137.979,"finishTime":138.699},{"text":"and it's highly relevant to the members' health and personal goals.","startTime":138.899,"finishTime":142.1},{"text":"The care plan includes clear action steps and a 30 day","startTime":143.399,"finishTime":146.86},{"text":"review period to ensure the member is supported and making progress.","startTime":146.86,"finishTime":150.289},{"text":"This example highlights how smart goals can empower members to","startTime":151.74,"finishTime":155.139},{"text":"take control of their health in ways that are realistic,","startTime":155.139,"finishTime":157.699},{"text":"meaningful,","startTime":157.94,"finishTime":158.529},{"text":"and supported by their care team.","startTime":158.58,"finishTime":160.259},{"text":"Each smart goal we help develop is more than a task,","startTime":161.639,"finishTime":164.61},{"text":"it's a reflection of what matters most to the member.","startTime":164.839,"finishTime":167.24},{"text":"By grounding goals and their values,","startTime":168.039,"finishTime":170.089},{"text":"supporting them with realistic steps and involving the right people,","startTime":170.429,"finishTime":173.82},{"text":"we ensure care planning is not only person centered but truly person led.","startTime":174.029,"finishTime":178.309}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["STmCnHjuC24JMraaH"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Here’s a SMART goal example for Mary, a fictional member who wants to walk outside again like she used to. Her pain has been a barrier, so the care plan focuses on reducing her pain level and gradually increasing her stamina.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The goal is specific and measurable—Mary wants to reduce her pain from a 6–7 to a 3–4. It’s attainable through a combination of medication, physical activity with support, and pacing strategies.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This goal is relevant to Mary’s personal values—being outdoors helps her feel independent and emotionally well. The timeline is realistic, with progress reviewed every 60 days over a 6-month period.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Importantly, this goal is supported by a team: her PCP manages her treatment, her aide helps with walking, and her care coordinator ensures the plan stays on track. Family members are also encouraged to support and celebrate her progress.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This example shows how a SMART goal can be both clinically sound and deeply personal—centered on what matters most to the member.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This next SMART goal focuses on improving social connection, which is a key part of emotional well-being. The member has shared that they often feel isolated and would like to talk to someone outside their home at least once a week.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The goal is specific and measurable—one meaningful interaction per week. It’s attainable through a mix of phone calls, community events, and support from the care team.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It’s also highly relevant to the member’s emotional health and sense of belonging. The goal will be reviewed in 60 days to see how it’s going and whether any adjustments are needed.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This example shows how person-centered care planning can support not just physical health, but also emotional and social needs—by involving the member’s support network and building on what matters most to them.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A final SMART goal example focuses on nutrition and self-management. The member wants to feel more energetic and better manage their diabetes by eating healthier meals.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The goal is specific and measurable—preparing and eating four home-cooked meals per week. It’s attainable with support from a dietitian, family, or an aide, and it’s highly relevant to the member’s health and personal goals.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The care plan includes clear action steps and a 30-day review period to ensure the member is supported and making progress.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This example highlights how SMART goals can empower members to take control of their health in ways that are realistic, meaningful, and supported by their care team.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Each SMART goal we help develop is more than a task—it’s a reflection of what matters most to the member. By grounding goals in their values, supporting them with realistic steps, and involving the right people, we ensure care planning is not only person-centered, but truly person-led.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Here’s a SMART goal example for Mary, a fictional member who wants to walk outside again like she used to. Her pain has been a barrier, so the care plan focuses on reducing her pain level and gradually increasing her stamina.\nThe goal is specific and measurable—Mary wants to reduce her pain from a 6–7 to a 3–4. It’s attainable through a combination of medication, physical activity with support, and pacing strategies.\nThis goal is relevant to Mary’s personal values—being outdoors helps her feel independent and emotionally well. The timeline is realistic, with progress reviewed every 60 days over a 6-month period.\nImportantly, this goal is supported by a team: her PCP manages her treatment, her aide helps with walking, and her care coordinator ensures the plan stays on track. Family members are also encouraged to support and celebrate her progress.\nThis example shows how a SMART goal can be both clinically sound and deeply personal—centered on what matters most to the member.\n\nThis next SMART goal focuses on improving social connection, which is a key part of emotional well-being. The member has shared that they often feel isolated and would like to talk to someone outside their home at least once a week.\nThe goal is specific and measurable—one meaningful interaction per week. It’s attainable through a mix of phone calls, community events, and support from the care team.\nIt’s also highly relevant to the member’s emotional health and sense of belonging. The goal will be reviewed in 60 days to see how it’s going and whether any adjustments are needed.\nThis example shows how person-centered care planning can support not just physical health, but also emotional and social needs—by involving the member’s support network and building on what matters most to them.\n\nA final SMART goal example focuses on nutrition and self-management. The member wants to feel more energetic and better manage their diabetes by eating healthier meals.\nThe goal is specific and measurable—preparing and eating four home-cooked meals per week. It’s attainable with support from a dietitian, family, or an aide, and it’s highly relevant to the member’s health and personal goals.\nThe care plan includes clear action steps and a 30-day review period to ensure the member is supported and making progress.\nThis example highlights how SMART goals can empower members to take control of their health in ways that are realistic, meaningful, and supported by their care team.\n\nEach SMART goal we help develop is more than a task—it’s a reflection of what matters most to the member. By grounding goals in their values, supporting them with realistic steps, and involving the right people, we ensure care planning is not only person-centered, but truly person-led.","jobId":"RsfnAeM8bfcaxdjsM","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"6peEJHZD7w7NYDvaa":{"_id":"6peEJHZD7w7NYDvaa","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ev4P3jBR6XEGsnGBL"},"dates":{"dateCreated":"2026-04-14T19:56:09.765Z","dateModified":"2026-04-17T14:14:08.624Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"YkP4w8oTDrzZfKjjy","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"sM9yCsvFyCoPEwrZf","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"uq5v9PRKahJSNHP6M","kind":"overlay","type":"rectangle","width":150,"height":56,"x":1130,"y":664,"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 1)"},"fontColor":"koantic(light1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":51.2,"captions":[{"text":"Before moving any further into goals,","startTime":0.25,"finishTime":2.2},{"text":"motivational interviewing,","startTime":2.349,"finishTime":3.69},{"text":"or service planning,","startTime":3.809,"finishTime":4.88},{"text":"something to be aware of that often gets overlooked is signatures.","startTime":5.19,"finishTime":8.319},{"text":"Person-centered care planning is not just a","startTime":9.18,"finishTime":11.619},{"text":"discussion or documentation in a system,","startTime":11.619,"finishTime":13.89},{"text":"it involves a service plan which is a formal agreement.","startTime":14.09,"finishTime":16.86},{"text":"The person-centered service plan captures what is important to","startTime":17.7,"finishTime":20.819},{"text":"the individual and what is important for the individual,","startTime":20.819,"finishTime":23.37},{"text":"but it only becomes actionable once it is agreed upon.","startTime":23.61,"finishTime":26.2},{"text":"Signatures are how this agreement is documented.","startTime":27.25,"finishTime":29.93},{"text":"They show that the individual understands the plan,","startTime":30.78,"finishTime":33.34},{"text":"agrees with the services being authorized,","startTime":33.7,"finishTime":35.799},{"text":"and that providers understand their role in delivering those services.","startTime":35.979,"finishTime":39.459},{"text":"When signatures are missing,","startTime":40.34,"finishTime":41.819},{"text":"the plan may look complete,","startTime":42.02,"finishTime":43.279},{"text":"but from a compliance standpoint,","startTime":43.38,"finishTime":45.119},{"text":"it is not,","startTime":45.259,"finishTime":45.93},{"text":"and that creates real audit and repayment risk,","startTime":46.099,"finishTime":48.61},{"text":"not just paperwork issues.","startTime":48.86,"finishTime":50.38}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ev4P3jBR6XEGsnGBL","sM9yCsvFyCoPEwrZf"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Before moving any further into goals, motivational interviewing, or service planning, something to be aware of that often gets overlooked is signatures. Person Centered Care Planning is not just a discussion, or documentation in a system, it involves a Service Plan which is a formal agreement. The Person Centered Service Plan captures what is important to the individual and what is important for the individual, but it only becomes actionable once it is agreed upon. Signatures are how this agreement is documented. They show that the individual understands the plan, agrees with the services being authorized, and that providers understand their role in delivering those services. When signatures are missing, the plan may look complete but from a compliance standpoint, it is not, and that creates real audit and repayment risk, not just paperwork issues.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Before moving any further into goals, motivational interviewing, or service planning, something to be aware of that often gets overlooked is signatures. Person Centered Care Planning is not just a discussion, or documentation in a system, it involves a Service Plan which is a formal agreement. The Person Centered Service Plan captures what is important to the individual and what is important for the individual, but it only becomes actionable once it is agreed upon. Signatures are how this agreement is documented. They show that the individual understands the plan, agrees with the services being authorized, and that providers understand their role in delivering those services. When signatures are missing, the plan may look complete but from a compliance standpoint, it is not, and that creates real audit and repayment risk, not just paperwork issues.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"Fsud85DCpBwyPYKBj"}},"6zJTkFWxQF77KRvzZ":{"_id":"6zJTkFWxQF77KRvzZ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Knowledge Check 33"},"dates":{"dateCreated":"2025-05-28T15:12:55.006Z","dateModified":"2025-05-29T19:19:12.245Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true,"questions":["dkbytkbhPRLPqEDx2"]},"video":{"autoPlay":true,"overlays":[{"identifier":"b3SLx76jHiuksJNze","kind":"overlay","type":"questionMatchText","width":1152,"height":700,"x":64,"y":7,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":5,"topRight":5,"bottomLeft":5,"bottomRight":5},"fill":{"type":"color","color":"koantic(light1, 0, 1)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":16},"shadow":{"angle":270,"distance":0,"blur":12,"color":"rgba(0, 0, 0, 0.53)"}},"questionId":"dkbytkbhPRLPqEDx2","start":0,"behaviorType":"pause","rotationAngle":0}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":[],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[]},"7oYG4Zhj8hD4HKcLL":{"_id":"7oYG4Zhj8hD4HKcLL","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Care Coordinator Checklist","upload":"zPvmYvg5uxXXLsfpJ"},"dates":{"dateCreated":"2025-06-06T15:53:12.188Z","dateModif tTime":16.318,"finishTime":18.729},{"text":"Care coordinators play a key role in","startTime":19.569,"finishTime":22.01},{"text":"helping members understand what advanced directives are,","startTime":22.01,"finishTime":24.879},{"text":"why they matter,","startTime":25.09,"finishTime":25.85},{"text":"and how they can protect their rights.","startTime":26.049,"finishTime":27.729},{"text":"Care coordinators should provide clear explanations and offer","startTime":28.659,"finishTime":32.06},{"text":"resources to help members make informed decisions.","startTime":32.06,"finishTime":34.659},{"text":"Next,","startTime":36.08,"finishTime":36.479},{"text":"we need to document and disseminate.","startTime":36.7,"finishTime":38.59},{"text":"If a member has completed advanced directive documents,","startTime":39.439,"finishTime":42.479},{"text":"care coordinators must ensure the most current versions are on file.","startTime":42.639,"finishTime":46.09},{"text":"With the member's permission,","startTime":47.02,"finishTime":48.259},{"text":"care coordinators may also share these documents with","startTime":48.54,"finishTime":51.259},{"text":"provider offices or upload them to electronic portals.","startTime":51.259,"finishTime":54.38},{"text":"This helps ensure that members' wishes are honored in any care setting.","startTime":55.319,"finishTime":58.84},{"text":"Finally,","startTime":60.24,"finishTime":60.77},{"text":"care coordinators must support regular review and revision.","startTime":61.08,"finishTime":64.269},{"text":"Advanced directives should be revisited regularly,","startTime":65.059,"finishTime":67.9},{"text":"especially after major health changes or serious medical events.","startTime":68.209,"finishTime":71.849},{"text":"Care coordinators should also help","startTime":72.76,"finishTime":74.48},{"text":"members reassess their chosen healthcare proxy","startTime":74.48,"finishTime":76.93},{"text":"or guardian to ensure that person is still available and appropriate.","startTime":76.93,"finishTime":80.48},{"text":"For additional tools and resources,","startTime":81.9,"finishTime":84.019},{"text":"visit the Advanced directives toolkit provided by","startTime":84.18,"finishTime":86.819},{"text":"pro seniors at the web address below.","startTime":86.819,"finishTime":88.849}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["zPvmYvg5uxXXLsfpJ","yWdx3CpvRSDvYnPAs"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A practical checklist for care coordinators to follow when supporting members with advance directives. These steps help ensure that members’ rights, preferences, and safety are respected—especially during times when they may not be able to speak for themselves.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The first step is to Inform and Educate. Care coordinators, play a key role in helping members understand what advance directives are, why they matter, and how they can protect their rights. Care coordinators should provide clear explanations and offer resources to help members make informed decisions.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Next, we need to Document and Disseminate. If a member has completed advance directive documents, Care Coordinators must ensure the most current versions are on file. With the member’s permission, Care Coordinators may also share these documents with provider offices or upload them to electronic portals. This helps ensure that member's wishes are honored in any care setting.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Finally, Care Coordinators must support Regular Review and Revision. Advance directives should be revisited regularly—especially after major health changes or serious medical events. Care Coordinators should also help members reassess their chosen healthcare proxy or guardian to ensure that person is still available and appropriate.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For additional tools and resources, visit the Advance Directives Toolkit provided by Pro Seniors at the web address below.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"A practical checklist for care coordinators to follow when supporting members with advance directives. These steps help ensure that members’ rights, preferences, and safety are respected—especially during times when they may not be able to speak for themselves.\nThe first step is to Inform and Educate. Care coordinators, play a key role in helping members understand what advance directives are, why they matter, and how they can protect their rights. Care coordinators should provide clear explanations and offer resources to help members make informed decisions.\nNext, we need to Document and Disseminate. If a member has completed advance directive documents, Care Coordinators must ensure the most current versions are on file. With the member’s permission, Care Coordinators may also share these documents with provider offices or upload them to electronic portals. This helps ensure that member's wishes are honored in any care setting.\nFinally, Care Coordinators must support Regular Review and Revision. Advance directives should be revisited regularly—especially after major health changes or serious medical events. Care Coordinators should also help members reassess their chosen healthcare proxy or guardian to ensure that person is still available and appropriate.\nFor additional tools and resources, visit the Advance Directives Toolkit provided by Pro Seniors at the web address below.","jobId":"DdeXxFht6BT7mySXe","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"84JWn3dbW3pYqd5yZ":{"_id":"84JWn3dbW3pYqd5yZ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Stages of Change Video"},"dates":{"dateCreated":"2025-07-18T19:14:38.829Z","dateModified":"2026-02-18T20:29:03.301Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"P8bj8BqgzCgCGZYmC"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"AHGHQQyBcZdr8neC3","kind":"overlay","htmlContent":"\u003cdiv>\u003cspan style=\"color:rgba(25, 144, 179, 1)\">Stages of Change Video\u003c/span>\u003c/div>\n","height":62,"width":1067,"y":8,"x":33,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","li \"color:rgba(39, 37, 37, 1)\">Example: Let&#39;s say Maria has a goal to walk 30 minutes each day. A good progression note would look like this:\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>Maria reports walking 10 minutes daily, an increase from her previous 5-minute walks. She attributes this progress to using a timer and walking with a neighbor. Maria would like to increase her walking time gradually. Her goal is to get to 30 minutes each day. Discussed pacing and celebrating small wins. Goal will be reviewed again in 60 days.\u003c/div>\n","height":56,"width":1157,"y":582,"x":61,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":-0.3,"textAlignment":"left","verticalAlignment":"top","font":{"size":12.30158805847168,"bold":false,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"transparent"},"padding":{"bottom":0,"top":0,"left":0,"right":0},"fontColor":"rgba(39, 37, 37, 1)"}}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":41.55,"captions":[{"text":"Progression notes are written at all required visits","startTime":0.119,"finishTime":2.759},{"text":"or as directed by the MyCare Ohio plan.","startTime":2.759,"finishTime":5.199},{"text":"The purpose is to describe the progress the","startTime":6.059,"finishTime":8.25},{"text":"member is making towards meeting their goal.","startTime":8.25,"finishTime":10.409},{"text":"This note must refer to the measurement.","startTime":11.189,"finishTime":13.199},{"text":"Document reason the goal will be extended if applicable,","startTime":13.449,"finishTime":16.129},{"text":"and how long before the goal will be reviewed again per program guidelines.","startTime":16.17,"finishTime":19.969}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["LMym8vHf6waGrQ3xr"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":["45hKJtBKsyiCkZh4p"],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Progression notes are completed at each required visit or as directed by the MyCare Ohio Plan. These notes are essential for tracking how the member is progressing toward their SMART goals.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The note should clearly reference the measurement identified in the goal, describe the member’s current status, and document any updates to action steps based on the member’s experience.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"If the goal is being extended, include the reason and specify when it will be reviewed again, in line with program guidelines.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For example, if a member has increased their daily walking time and wants to continue building on that progress, the note should reflect that growth and the plan for next steps.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Progression notes are completed at each required visit or as directed by the MyCare Ohio Plan. These notes are essential for tracking how the member is progressing toward their SMART goals.\nThe note should clearly reference the measurement identified in the goal, describe the member’s current status, and document any updates to action steps based on the member’s experience.\nIf the goal is being extended, include the reason and specify when it will be reviewed again, in line with program guidelines.\nFor example, if a member has increased their daily walking time and wants to continue building on that progress, the note should reflect that growth and the plan for next steps.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"w9aSqQSs9zXwcboMg"}},"9nFJcFceRecWJ2GGM":{"_id":"9nFJcFceRecWJ2GGM","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Audit Reviewer's Perspective","upload":"x8YfG4ueCneiuJJt4"},"dates":{"dateCreated":"2026-04-15T14:58:19.265Z","dateModified":"2026-04-17T14:14:40.799Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"5abm8tLM4EJrojzzL","kind":"overlay","type":"rectangle","width":1338,"height":752.6250000000001,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"4HEuPecGDX72fG59c","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":63.3,"captions":[{"text":"A useful perspective is to take a look at","startTime":0.009,"finishTime":2.21},{"text":"the person-centered service plan through an audit reviewer's lens.","startTime":2.21,"finishTime":5.51},{"text":"Reviewers are not trying to interpret intent,","startTime":6.389,"finishTime":8.909},{"text":"guess meanings,","startTime":9.149,"finishTime":9.939},{"text":"or fill in gaps.","startTime":10.38,"finishTime":11.39},{"text":"They look at what is documented and only what is documented.","startTime":12.27,"finishTime":15.35},{"text":"Reviewers consistently focus on 3 questions.","startTime":16.25,"finishTime":19.229},{"text":"First","startTime":20.209,"finishTime":20.809},{"text":"were the services authorized.","startTime":21,"finishTime":22.629},{"text":"Second,","startTime":23.61,"finishTime":24.19},{"text":"are those services supported by clearly documented needs,","startTime":24.409,"finishTime":27.479},{"text":"risks,","startTime":27.69,"finishTime":28.12},{"text":"or goals in the care plan?","startTime":28.29,"finishTime":29.729},{"text":"And third,","startTime":30.52,"finishTime":31.2},{"text":"do the care plan and service plan tell the same story?","startTime":31.44,"finishTime":34.299},{"text":"If information is missing,","startTime":35.08,"finishTime":36.669},{"text":"inconsistent,","startTime":36.799,"finishTime":37.72},{"text":"or unclear,","startTime":37.799,"finishTime":38.669},{"text":"reviewers don't assume it exists somewhere else.","startTime":39.08,"finishTime":41.419},{"text":"They rely on what's in front of them.","startTime":42.34,"finishTime":44.099},{"text":"This doesn't mean providers or case managers were wrong,","startTime":44.99,"finishTime":47.79},{"text":"it means the documentation didn't clearly support what occurred.","startTime":47.869,"finishTime":51.13},{"text":"Writing with the reviewer in mind doesn't make planning less person-centered.","startTime":51.979,"finishTime":55.729},{"text":"It actually protects the individual,","startTime":56.49,"finishTime":58.31},{"text":"the provider,","startTime":58.65,"finishTime":59.31},{"text":"and the system by making decisions clear and defensible.","startTime":59.49,"finishTime":62.569}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["x8YfG4ueCneiuJJt4","4HEuPecGDX72fG59c"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A useful perspective is to take a look at the Person‑Centered Service Plan through an audit reviewer’s lens. Reviewers are not trying to interpret intent, guess meanings, or fill in gaps. They look at what is documented and only what is documented. Reviewers consistently focus on three questions. First: were the services authorized? Second: are those services supported by clearly documented needs, risks, or goals in the Care Plan? And third, do the Care Plan and Service Plan tell the same story? If information is missing, inconsistent, or unclear, reviewers don’t assume it exists somewhere else. They rely on what’s in front of them. This doesn’t mean providers or case managers were wrong it means the documentation didn’t clearly support what occurred. Writing with the reviewer in mind doesn’t make planning less person centered. It actually protects the individual, the provider, and the system by making decisions clear and defensible.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"A useful perspective is to take a look at the Person‑Centered Service Plan through an audit reviewer’s lens. Reviewers are not trying to interpret intent, guess meanings, or fill in gaps. They look at what is documented and only what is documented. Reviewers consistently focus on three questions. First: were the services authorized? Second: are those services supported by clearly documented needs, risks, or goals in the Care Plan? And third, do the Care Plan and Service Plan tell the same story? If information is missing, inconsistent, or unclear, reviewers don’t assume it exists somewhere else. They rely on what’s in front of them. This doesn’t mean providers or case managers were wrong it means the documentation didn’t clearly support what occurred. Writing with the reviewer in mind doesn’t make planning less person centered. It actually protects the individual, the provider, and the system by making decisions clear and defensible.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"2uRsGpjNHTzwR7GxW"}},"A94gFNHkoCgEpdcD6":{"_id":"A94gFNHkoCgEpdcD6","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Section 4","upload":"L4ybANp5XR5585YCo"},"dates":{"dateCreated":"2026-04-17T14:37:15.748Z","dateModified":"2026-04-17T15:03:16.406Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"r42cD4yZPxXTwDeZQ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlign t":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"b6wdmpzRTMPmKvgSm","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":66.1625,"captions":[{"text":"Private duty nursing or PDN","startTime":0.009,"finishTime":2.46},{"text":"is a special topic for how it fits into the person-centered service plan.","startTime":2.65,"finishTime":6.269},{"text":"Private duty nursing is a state planned service,","startTime":7.219,"finishTime":9.949},{"text":"and because of that,","startTime":10.13,"finishTime":11.13},{"text":"it's easy to assume it sits outside of person-centered planning.","startTime":11.289,"finishTime":14.649000000000001},{"text":"But that assumption can create risk.","startTime":15.449,"finishTime":17.459},{"text":"Even though private duty nursing is authorized through the state plan,","startTime":18.28,"finishTime":21.84},{"text":"it still must be reflected in the person-centered service plan.","startTime":22,"finishTime":25.19},{"text":"The care plan should explain why private duty nursing is needed,","startTime":26.04,"finishTime":29.25},{"text":"what medical or functional needs it supports,","startTime":29.329,"finishTime":31.53},{"text":"and how it helps maintain health and safety.","startTime":31.569,"finishTime":33.83},{"text":"The service plan must then clearly show that","startTime":34.639,"finishTime":37.119},{"text":"private duty nursing is an authorized service,","startTime":37.119,"finishTime":39.639},{"text":"who is providing it,","startTime":39.919,"finishTime":40.959},{"text":"how often,","startTime":41.159,"finishTime":41.9},{"text":"and during what time period.","startTime":41.959,"finishTime":43.459},{"text":"When private duty nursing is provided but","startTime":44.47,"finishTime":46.669},{"text":"not documented in the person-centered service plan,","startTime":46.669,"finishTime":49.299},{"text":"those services can later be viewed as unauthorized during audits","startTime":49.549,"finishTime":52.79},{"text":"even if the nursing care itself was appropriate and necessary.","startTime":52.79,"finishTime":55.689},{"text":"Including private duty nursing in the person centered service plan","startTime":56.689,"finishTime":60.369},{"text":"ensures that all services supporting the individual are visible,","startTime":60.369,"finishTime":63.439},{"text":"coordinated,","startTime":63.65,"finishTime":64.379},{"text":"and defensible.","startTime":64.489,"finishTime":65.43}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["oWxYoh3mMj6xmbXp2","b6wdmpzRTMPmKvgSm"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Private Duty Nursing, or PDN, is special topic for how it fits into the Person‑Centered Service Plan. Private Duty Nursing is a state plan service, and because of that, it’s easy to assume it sits outside of person‑centered planning. But that assumption can create risk. Even though Private Duty Nursing is authorized through the state plan, it still must be reflected in the Person Centered Service Plan. The Care Plan should explain why private duty nursing is needed what medical or functional needs it supports and how it helps maintain health and safety. The Service Plan must then clearly show that Private Duty Nursing is an authorized service: who is providing it, how often, and during what time period. When Private Duty Nursing is provided but not documented in the Person Centered Service Plan, those services can later be viewed as unauthorized during audits even if the nursing care itself was appropriate and necessary. Including Private Duty Nursing in the Person Centered Service Plan ensures that all services supporting the individual are visible, coordinated, and defensible.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Private Duty Nursing, or PDN, is special topic for how it fits into the Person‑Centered Service Plan. Private Duty Nursing is a state plan service, and because of that, it’s easy to assume it sits outside of person‑centered planning. But that assumption can create risk. Even though Private Duty Nursing is authorized through the state plan, it still must be reflected in the Person Centered Service Plan. The Care Plan should explain why private duty nursing is needed what medical or functional needs it supports and how it helps maintain health and safety. The Service Plan must then clearly show that Private Duty Nursing is an authorized service: who is providing it, how often, and during what time period. When Private Duty Nursing is provided but not documented in the Person Centered Service Plan, those services can later be viewed as unauthorized during audits even if the nursing care itself was appropriate and necessary. Including Private Duty Nursing in the Person Centered Service Plan ensures that all services supporting the individual are visible, coordinated, and defensible.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"4rtWr5NgyN8gi5wGC"}},"Bj3TCihevYW2BJjFu":{"_id":"Bj3TCihevYW2BJjFu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 5","upload":"oRJoHGEuFACopqitz"},"dates":{"dateCreated":"2025-05-20T16:37:03.054Z","dateModified":"2026-04-17T14:31:35.481Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"dJ6upfWYjK8bxBxB4","kind":"overlay","height":720,"width":528,"y":0,"x":752,"flipHorizontal":false,"flipVertical":false,"type":"svgShape",
