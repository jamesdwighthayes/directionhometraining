":"continue","rotationAngle":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":-0.3240000128746033,"textAlignment":"left","verticalAlignment":"top","font":{"size":13,"bold":false,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"transparent"},"padding":{"bottom":0,"top":0,"left":0,"right":0},"fontColor":"rgba(39, 37, 37, 1)","textHeading":"normal"}},{"identifier":"keBZAgadxotas47eA","kind":"overlay","htmlContent":"\u003cul>\n\t\u003cli>\u003cstrong>\u003cspan style=\"color:rgba(39, 37, 37, 1)\">Aligned:\u003c/span>\u003c/strong>\u003cspan style=\"color:rgba(39, 37, 37, 1)\"> Coordinates effectively with available services and supports.\u003c/span>\u003c/li>\n\u003c/ul>\n","height":31,"width":667,"y":622,"x":67,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":-0.3240000128746033,"textAlignment":"left","verticalAlignment":"top","font":{"size":13,"bold":false,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"transparent"},"padding":{"bottom":0,"top":0,"left":0,"right":0},"fontColor":"rgba(39, 37, 37, 1)","textHeading":"normal"}}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":70.1625,"captions":[{"text":"Person-centered care plans are individualized,","startTime":0.09,"finishTime":2.509},{"text":"not cookie cutter.","startTime":2.849,"finishTime":3.89},{"text":"We want to examine the specific needs of the member and","startTime":4.73,"finishTime":7.42},{"text":"identify what barriers they might have toward meeting the goal.","startTime":7.42,"finishTime":10.52},{"text":"NCQA requires the identification of at least one barrier.","startTime":11.35,"finishTime":15.13},{"text":"That barrier could be a functional limitation,","startTime":16.01,"finishTime":18.36},{"text":"communication,","startTime":18.489,"finishTime":19.329},{"text":"or cultural barrier,","startTime":19.45,"finishTime":20.69},{"text":"or a barrier based on poor decision making.","startTime":20.819,"finishTime":23.29},{"text":"Look at what are barriers for the member in relationship to their whole care plan,","startTime":24.17,"finishTime":27.879},{"text":"not just limited to one specific goal.","startTime":27.969,"finishTime":30.18},{"text":"The same is true with identifying strengths.","startTime":30.95,"finishTime":33.49},{"text":"Everyone comes to our programs with certain strengths they have","startTime":34.4,"finishTime":37.209},{"text":"used to navigate their life up to this point.","startTime":37.209,"finishTime":39.49},{"text":"By helping members identify and build on these strengths,","startTime":40.38,"finishTime":43.33},{"text":"we empower them to shape meaningful goals and take ownership of their care journey.","startTime":43.54,"finishTime":47.72},{"text":"Care plan goals are driven by the member and may or may not be medical in nature,","startTime":48.639,"finishTime":52.88},{"text":"but whatever the goal,","startTime":52.99,"finishTime":53.83},{"text":"it must be agreed to by the member.","startTime":53.84,"finishTime":55.56},{"text":"It is important to involve the member's chosen support team","startTime":56.33,"finishTime":59.389},{"text":"to the extent possible and with permission from the member.","startTime":59.389,"finishTime":62.069},{"text":"For goals met with the use of waiver services,","startTime":62.979,"finishTime":65.26},{"text":"it is important that the person-centered care plan and waiver service plan align.","startTime":65.319,"finishTime":69.419}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["oRJoHGEuFACopqitz","aLMW6WZbvctd92pTA"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Person Centered Care Plans are individualized, not cookie cutter. We want to examine the specific needs of the member and identify what barriers they might have toward meeting the goal. NCQA requires the identification of at least one barrier. That barrier could be a functional limitation, communication or cultural barrier, or a barrier based on poor decision making. Look at what are barriers for the member in relationship to their whole care plan not just limited to one specific goal. The same is true with identifying strengths. Everyone comes to our programs with certain strengths they have used to navigate their life up to this point. By helping members identify and build on these strengths, we empower them to shape meaningful goals and take ownership of their care journey. Care Plan goals are driven by the member and may or may not be medical in nature but whatever the goal it must be agreed to by the member. ​​It is important to involve the member’s chosen support team to the extent possible and with permission from the member.​​ For goals met with the use of waiver services it is important that the Person-Centered Care Plan and Waiver Service Plan align. ​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Person Centered Care Plans are individualized, not cookie cutter. We want to examine the specific needs of the member and identify what barriers they might have toward meeting the goal. NCQA requires the identification of at least one barrier. That barrier could be a functional limitation, communication or cultural barrier, or a barrier based on poor decision making. Look at what are barriers for the member in relationship to their whole care plan not just limited to one specific goal. The same is true with identifying strengths. Everyone comes to our programs with certain strengths they have used to navigate their life up to this point. By helping members identify and build on these strengths, we empower them to shape meaningful goals and take ownership of their care journey. Care Plan goals are driven by the member and may or may not be medical in nature but whatever the goal it must be agreed to by the member. ​​It is important to involve the member’s chosen support team to the extent possible and with permission from the member.​​ For goals met with the use of waiver services it is important that the Person-Centered Care Plan and Waiver Service Plan align. ​​","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"DQhgRAvk4sAbads3D"}},"BmyLEBYmwuBEL3cuT":{"_id":"BmyLEBYmwuBEL3cuT","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 8","upload":"vS6WZane6g45qGF9f"},"dates":{"dateCreated":"2025-05-20T16:37:03.382Z","dateModified":"2026-04-17T14:15:14.807Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"nLTkepitiuQPP6bie","kind":"overlay","htmlContent":"\u003cdiv>\u003cspan style=\"color:rgba(25, 144, 179, 1)\">Things to Consider in Care Plan Development\u003c/span>\u003c/div>\n","height":62,"width":1197,"y":144,"x":69,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle In","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":58,"behaviorType":"continue","rotationAngle":0,"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"left","border":{"top":true,"right":true,"bottom":true,"left":true,"color":"koantic(dark1, 0, 1)","size":0},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(accent3, 0, 1)","opacity":25},"fontColor":"koantic(dark1, 0, 1)","padding":{"top":0,"right":0,"bottom":0,"left":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"htmlContent":"\u003cdiv>Care planning meetings should be timely and held at times and locations that are convenient for the member\u003c/div>\n"}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":71.65,"captions":[{"text":"As we develop care plans with members,","startTime":0.079,"finishTime":2.319},{"text":"these are key areas that often lead to meaningful,","startTime":2.48,"finishTime":5.11},{"text":"person-centered goals.","startTime":5.28,"finishTime":6.639},{"text":"First,","startTime":8.069,"finishTime":8.539},{"text":"we consider communication and cultural factors.","startTime":8.71,"finishTime":11.39},{"text":"Understanding a member's language preferences,","startTime":11.729,"finishTime":13.909},{"text":"cultural background,","startTime":14.029,"finishTime":15.22},{"text":"and how they prefer to communicate can significantly","startTime":15.43,"finishTime":18.149},{"text":"impact how care is delivered and received.","startTime":18.149,"finishTime":20.219},{"text":"Next,","startTime":21.68,"finishTime":22.19},{"text":"we look at personal preferences and support networks.","startTime":22.36,"finishTime":25.159},{"text":"This includes who the member wants involved in their care,","startTime":26.069,"finishTime":28.7},{"text":"where they prefer to live,","startTime":28.87,"finishTime":30.059},{"text":"and how they want to make decisions.","startTime":30.19,"finishTime":31.95},{"text":"We also assess health and well-being,","startTime":33.29,"finishTime":35.5},{"text":"including both physical and behavioral health needs.","startTime":35.869,"finishTime":38.47},{"text":"This is where advanced care planning becomes especially important,","startTime":39.25,"finishTime":42.709},{"text":"ensuring we understand and document the members' wishes for future care.","startTime":42.959,"finishTime":46.75},{"text":"Finally,","startTime":48.13,"finishTime":48.77},{"text":"we explore life enrichment.","startTime":48.97,"finishTime":50.68},{"text":"What brings meaning and joy to the member's life,","startTime":50.889,"finishTime":53.319},{"text":"such as community involvement,","startTime":53.569,"finishTime":55.159},{"text":"work,","startTime":55.369,"finishTime":55.84},{"text":"volunteering,","startTime":55.97,"finishTime":56.799},{"text":"or learning opportunities.","startTime":56.93,"finishTime":58.4},{"text":"It's important to remember that care planning meetings should be timely and","startTime":59.7,"finishTime":63.09},{"text":"held at times and locations that are convenient for the member.","startTime":63.09,"finishTime":66.16},{"text":"This supports true person centered engagement and respects their autonomy.","startTime":67.04,"finishTime":70.839}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["vS6WZane6g45qGF9f","TpCAJ5Z9PrwXNTZQR","eWzukbgZ8EknyFjFu","Le5e2ZAH4kjsuHfMc","ahy6SKvCSDimCRzGX"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":["45hKJtBKsyiCkZh4p"],"voiceOver":{"jobId":"ueCa2miyhqQfytnzH","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"\\\"As we develop care plans with members, these are key areas that often lead to meaningful, person-centered goals.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"First, we consider communication and cultural factors—understanding a member’s language preferences, cultural background, and how they prefer to communicate can significantly impact how care is delivered and received.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Next, we look at personal preferences and support networks. This includes who the member wants involved in their care, where they prefer to live, and how they want to make decisions.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"We also assess health and wellbeing, including both physical and behavioral health needs. This is where Advance Care Planning becomes especially important—ensuring we understand and document the member’s wishes for future care.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Finally, we explore life enrichment—what brings meaning and joy to the member’s life, such as community involvement, work, volunteering, or learning opportunities.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"It’s important to remember that care planning meetings should be timely and held at times and locations that are convenient for the member. This supports true person-centered engagement and respects their autonomy.\\\"\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"\"As we develop care plans with members, these are key areas that often lead to meaningful, person-centered goals.\nFirst, we consider communication and cultural factors—understanding a member’s language preferences, cultural background, and how they prefer to communicate can significantly impact how care is delivered and received.\nNext, we look at personal preferences and support networks. This includes who the member wants involved in their care, where they prefer to live, and how they want to make decisions.\nWe also assess health and wellbeing, including both physical and behavioral health needs. This is where Advance Care Planning becomes especially important—ensuring we understand and document the member’s wishes for future care.\nFinally, we explore life enrichment—what brings meaning and joy to the member’s life, such as community involvement, work, volunteering, or learning opportunities.\nIt’s important to remember that care planning meetings should be timely and held at times and locations that are convenient for the member. This supports true person-centered engagement and respects their autonomy.\"","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"Bv9B5aeL478YZG8QW":{"_id":"Bv9B5aeL478YZG8QW","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{" {"text":"In audit situations,","startTime":21.209,"finishTime":22.68},{"text":"reviewers look for alignment between the services delivered,","startTime":23.09,"finishTime":25.77},{"text":"what appears on the person-centered service plan,","startTime":26.049,"finishTime":28.409},{"text":"and the documentation supporting authorization and agreement.","startTime":28.61,"finishTime":31.729},{"text":"The goal here isn't to penalize providers,","startTime":32.59,"finishTime":34.95},{"text":"it's to protect everyone involved.","startTime":34.99,"finishTime":36.849},{"text":"Clear follow-up,","startTime":37.659,"finishTime":38.659},{"text":"documentation of outreach,","startTime":38.849,"finishTime":40.34},{"text":"and timely resolution help prevent payment issues","startTime":40.5,"finishTime":43.22},{"text":"and ensure services are properly supported.","startTime":43.22,"finishTime":45.58}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["EsXpN6t4SNqwcyzCL","caBPgZ7x8mombRnMM"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Provider signatures don’t just need to be requested; they need to be tracked. If a signature hasn’t been returned, follow‑up is required, and that follow‑up must be documented. When providers deliver services without a signed service plan, those services may later be viewed as unauthorized even if the services were appropriate and necessary. In audit situations, reviewers look for alignment between the services delivered, what appears on the Person‑Centered Service Plan, and the documentation supporting authorization and agreement. The goal here isn’t to penalize providers it’s to protect everyone involved. Clear follow‑up, documentation of outreach, and timely resolution help prevent payment issues and ensure services are properly supported.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Provider signatures don’t just need to be requested; they need to be tracked. If a signature hasn’t been returned, follow‑up is required, and that follow‑up must be documented. When providers deliver services without a signed service plan, those services may later be viewed as unauthorized even if the services were appropriate and necessary. In audit situations, reviewers look for alignment between the services delivered, what appears on the Person‑Centered Service Plan, and the documentation supporting authorization and agreement. The goal here isn’t to penalize providers it’s to protect everyone involved. Clear follow‑up, documentation of outreach, and timely resolution help prevent payment issues and ensure services are properly supported.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"SMzB4JQ5og8bWXwNh"}},"DvJHPB6fGQwvwMTy7":{"_id":"DvJHPB6fGQwvwMTy7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 23","upload":"2qdzXZBtTsJucWLrt"},"dates":{"dateCreated":"2025-05-20T16:37:04.979Z","dateModified":"2026-04-17T14:19:43.753Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"BKXszbgDQCxAnvazg","kind":"overlay","height":720,"width":528,"y":0,"x":752,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":1,"textAlignment":"center","verticalAlignment":"middle","font":{"size":12,"bold":false,"italic":false,"underline":false}, (25, 144, 179, 1)"}},{"identifier":"DW4uNQe5dewoAX8pZ","kind":"overlay","htmlContent":"\u003cdiv>\u003cspan style=\"color:rgba(25, 144, 179, 1)\">When does the member want to complete their goal?\u003c/span>\u003c/div>\n","height":99,"width":661,"y":124,"x":44,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":-0.5339999914169311,"textAlignment":"left","verticalAlignment":"top","font":{"size":28.174604688371932,"bold":true,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"transparent"},"padding":{"bottom":0,"top":0,"left":0,"right":0},"fontColor":"rgba(25, 144, 179, 1)"}},{"identifier":"e2aCKf92Hhi7oPkRC","kind":"overlay","type":"rectangle","width":702,"height":463,"x":54,"y":180,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"start":29,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Time-Bound or Time-Based\u003c/strong>\u003cbr />\nGoals should include a clear timeframe for completion or review.\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cstrong>Example:\u003c/strong>\u003cbr />\n&ldquo;Member will have hand controls installed in the next 6 months so they can drive themself to appointments&rdquo;\u003c/div>\n","rotationAngle":0}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":78.5125,"captions":[{"text":"The T in smart stands for time-bound or time-based.","startTime":0.09,"finishTime":3.759},{"text":"This","startTime":4.579,"finishTime":4.59},{"text":"means the goal includes a specific time frame","startTime":4.969,"finishTime":7.449},{"text":"for when it should be completed or reviewed.","startTime":7.449,"finishTime":9.409},{"text":"The member may not meet the goal by this target,","startTime":10.26,"finishTime":12.68},{"text":"but it can continue to be worked on and will be noted in the progression note.","startTime":12.869,"finishTime":16.409},{"text":"Noting down progression toward the goal in the T","startTime":17.329,"finishTime":19.59},{"text":"section of a smart goal is important because progress made","startTime":19.59,"finishTime":22.729},{"text":"toward goals in a member's self-management of progress towards","startTime":22.729,"finishTime":25.729},{"text":"goals is often required health plans to be monitored.","startTime":25.729,"finishTime":28.45},{"text":"In this example,","startTime":29.79,"finishTime":30.879},{"text":"a specific goal is that the member desires hand controls installed","startTime":31.01,"finishTime":34.65},{"text":"in his vehicle so he can drive himself to appointments.","startTime":34.65,"finishTime":37.409},{"text":"The tea or time-bound portion of this same goal is that the","startTime":38.729,"finishTime":41.759},{"text":"member will have hand controls installed in the next 6 months.","startTime":41.759,"finishTime":44.869},{"text":"Progression and self-management toward the above goal will be monitored.","startTime":45.79,"finishTime":49.31},{"text":"The waiver service coordinator will instruct the member on criteria for","startTime":50.18,"finishTime":53.81},{"text":"vehicle modification and assist in obtaining","startTime":53.81,"finishTime":56.209},{"text":"the necessary documentation for approval.","startTime":56.209,"finishTime":58.56},{"text":"This 6 month time frame helps the care team coordinate with vendors,","startTime":59.99,"finishTime":63.669},{"text":"track progress,","startTime":63.869,"finishTime":64.779},{"text":"and ensure timely follow up.","startTime":64.949,"finishTime":66.51},{"text":"Without a time frame,","startTime":67.919,"finishTime":69.089},{"text":"goals can lose momentum or fall through the cracks.","startTime":69.309,"finishTime":72.04},{"text":"A clear deadline keeps everyone accountable and","startTime":72.849,"finishTime":75.33},{"text":"helps the members stay focused and motivated.","startTime":75.33,"finishTime":77.569}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["2qdzXZBtTsJucWLrt","BiBFnGzTym2f2M8qf"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The “T” in SMART stands for Time Bound or Time Based. This means the goal includes a specific timeframe for when it should be completed or reviewed. The member may not meet the goal by this target, but it can continue to be worked on and will be noted in the progression note. Noting down progression toward the goal in the t section of a smart goal is important because progress made toward goals and a member's self management of progress towards goals is often required by health plans to be monitored. \",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"In this example, a specific goal is that the Member desires hand controls installed in his vehicle so he can drive himself to appointments.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The T or time bound portion of this same goal is that the Member will have hand controls installed in the next 6 months.  Progression and self management toward the above goal will be monitored. The waiver service coordinator will instruct the member on criteria for vehicle modification and assist in obtaining the necessary documentation for approval.  \",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This six month timeframe helps the care team coordinate with vendors, track progress, and ensure timely follow-up.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Without a timeframe, goals can lose momentum or fall through the cracks. A clear deadline keeps everyone accountable and helps the member stay focused and motivated.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The “T” in SMART stands for Time Bound or Time Based. This means the goal includes a specific timeframe for when it should be completed or reviewed. The member may not meet the goal by this target, but it can continue to be worked on and will be noted in the progression note. Noting down progression toward the goal in the t section of a smart goal is important because progress made toward goals and a member's self management of progress towards goals is often required by health plans to be monitored. \nIn this example, a specific goal is that the Member desires hand controls installed in his vehicle so he can drive himself to appointments.\nThe T or time bound portion of this same goal is that the Member will have hand controls installed in the next 6 months.  Progression and self management toward the above goal will be monitored. The waiver service coordinator will instruct the member on criteria for vehicle modification and assist in obtaining the necessary documentation for approval.  \nThis six month timeframe helps the care team coordinate with vendors, track progress, and ensure timely follow-up.\nWithout a timeframe, goals can lose momentum or fall through the cracks. A clear deadline keeps everyone accountable and helps the member stay focused and motivated.","jobId":"rNvLHSeDowLCQFiwt","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"EuxbabBArDhSM4hdC":{"_id":"EuxbabBArDhSM4hdC","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Section 2","upload":"ffx6w83naig8FhH6o"},"dates":{"dateCreated":"2026-04-17T14:26:22.889Z","dateModified":"2026-04-17T15:00:58.901Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"sg5v4KWwnWTAkcHHm","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeigh me":36.669},{"text":"but only under specific conditions.","startTime":36.88,"finishTime":38.88},{"text":"This authority becomes effective only when a physician determines that the","startTime":40.299,"finishTime":44.06},{"text":"individual no longer has the capacity to make informed healthcare decisions.","startTime":44.06,"finishTime":47.86},{"text":"Until that point,","startTime":48.83,"finishTime":49.86},{"text":"the individual retains full control over their medical choices.","startTime":49.99,"finishTime":53.43},{"text":"As care coordinators,","startTime":54.81,"finishTime":56.159},{"text":"it is essential to help members understand the purpose and limitations","startTime":56.33,"finishTime":59.77},{"text":"of setting up durable power of attorney for health care,","startTime":59.77,"finishTime":62.52},{"text":"ensure that if established,","startTime":62.93,"finishTime":63.97},{"text":"it reflects members' wishes and is kept up to date.","startTime":63.979,"finishTime":66.8}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["63E95HRQ98Qy93mYk","552LG2o9SJpvpZBTW"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Among the documents and rights to secure for advanced care planning, Durable Power of Attorney for Health Care is a critical component of advance care planning.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A printed durable power of attorney for health care allows an adult to legally authorize another individual, often a trusted family member or friend, to make healthcare decisions on their behalf. This is especially important in situations where the individual becomes unable to make informed decisions for themselves.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The person designated in this document is called the attorney in fact. They are empowered to make most healthcare decisions for the individual, but only under specific conditions.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This authority becomes effective only when a physician determines that the individual no longer has the capacity to make informed healthcare decisions. Until that point, the individual retains full control over their medical choices.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As care coordinators, it is essential to help members understand the purpose and limitations of setting up Durable Power of Attorney for Health Care, ensure that if established it reflects member's wishes, and is kept up to date.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Among the documents and rights to secure for advanced care planning, Durable Power of Attorney for Health Care is a critical component of advance care planning.\nA printed durable power of attorney for health care allows an adult to legally authorize another individual, often a trusted family member or friend, to make healthcare decisions on their behalf. This is especially important in situations where the individual becomes unable to make informed decisions for themselves.\nThe person designated in this document is called the attorney in fact. They are empowered to make most healthcare decisions for the individual, but only under specific conditions.\nThis authority becomes effective only when a physician determines that the individual no longer has the capacity to make informed healthcare decisions. Until that point, the individual retains full control over their medical choices.\nAs care coordinators, it is essential to help members understand the purpose and limitations of setting up Durable Power of Attorney for Health Care, ensure that if established it reflects member's wishes, and is kept up to date.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"x6zwZRLCw8xsNropv"}},"H3AQWYx6tqZGn9Qez":{"_id":"H3AQWYx6tqZGn9Qez","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"EHvGzKGRaZBt5KZTD"},"dates":{"dateCreated":"2026-04-15T13:13:32.498Z","dateModified":"2026-04-17T14:14:20.016Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"eKXCuwfdYXmAN3QHr","kind":"overlay","type":"rectangle","width":1329,"height":747.5625,"x":-40,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"9gJaQFNSnaFvWEziM","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":53.5875}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["EHvGzKGRaZBt5KZTD","9gJaQFNSnaFvWEziM"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Providers are required to sign the Person‑Centered Service Plan when a new service is authorized, when an existing service is changed in a way that’s expected to continue, or when a new service plan is issued. A provider’s signature tells us two very important things: first, that they are aware of what services are authorized; and second, that they agree to deliver those services as outlined in the plan. It’s important to note that not every provider must sign for every change. Only the provider impacted by the change is required to sign. This helps keep the process focused and manageable. Provider signatures can be collected in a variety of ways in person, electronically, or by mail depending on what works best operationally. Without a provider signature, a service may appear authorized, but from an audit perspective, it may not be fully supported.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Providers are required to sign the Person‑Centered Service Plan when a new service is authorized, when :\"Case notes should tell a simple, complete story. They should show when the provider received the Person‑Centered Service Plan, how it was sent, and what timeline was given to return the signature. If the signature isn’t returned right away, follow‑up attempts need to be documented including the date, how the provider was contacted, and whether there was a response. From an audit perspective, reviewers aren’t just looking for the final signature. They’re looking for evidence that reasonable and timely efforts were made to obtain agreement. Clear documentation shows that services were coordinated intentionally, not assumed, and that risk was actively managed.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Case notes should tell a simple, complete story. They should show when the provider received the Person‑Centered Service Plan, how it was sent, and what timeline was given to return the signature. If the signature isn’t returned right away, follow‑up attempts need to be documented including the date, how the provider was contacted, and whether there was a response. From an audit perspective, reviewers aren’t just looking for the final signature. They’re looking for evidence that reasonable and timely efforts were made to obtain agreement. Clear documentation shows that services were coordinated intentionally, not assumed, and that risk was actively managed.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"6SouB66chBBSqRF7J"}},"KLF6gZxmy67qACQ2a":{"_id":"KLF6gZxmy67qACQ2a","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 2","upload":"8bjvuTif9FX5cBw2R"},"dates":{"dateCreated":" "duration":500},"customStyle":{"font":{"size":20,"bold":false,"underline":false,"italic":false},"fontColor":"koantic(dark1, 0, 1)","textAlignment":"left","type":"rectangle","border":{"size":0,"color":"#000000","left":true,"right":true,"top":true,"bottom":true},"padding":{"top":0,"bottom":0,"left":0,"right":0},"lineHeight":1.2,"title":"Body Text","fill":{"type":"color","color":"rgba(255,255,255,0)"},"roundedCorners":{"bottomLeft":0,"bottomRight":0,"topLeft":0,"topRight":0}},"htmlContent":"\u003cdiv>\u003cstrong>Clarify the SMART Framework\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>Collaboratively shape the goal to be:\n\t\u003cul>\n\t\t\u003cli>\u003cstrong>Measurable\u003c/strong>&nbsp;(How will we know it&rsquo;s happening?)\u003c/li>\n\t\t\u003cli>\u003cstrong>Attainable\u003c/strong>&nbsp;(Is it realistic given current supports?)\u003c/li>\n\t\t\u003cli>\u003cstrong>Relevant \u003c/strong>(Important to member)\u003c/li>\n\t\t\u003cli>\u003cstrong>Time-Bound\u003c/strong>&nbsp;(When will we review or expect progress?)\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\u003c/ul>\n","start":17.7,"behaviorType":"continue","rotationAngle":0,"duration":9.3},{"identifier":"ZbvJxjBT69xotawB3","kind":"overlay","type":"rectangle","width":725,"height":327,"x":451,"y":291,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"start":27.8,"behaviorType":"continue","htmlContent":"\u003cdiv>&nbsp;\u003cstrong>Identify and Coordinate Supports\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>Determine what formal and informal supports are needed (e.g., aides, family, providers).\u003c/li>\n\t\u003cli>Make referrals or coordinate services (e.g., home modifications, transportation, therapy).\u003c/li>\n\t\u003cli>Ensure the member understands who is doing what and when.\u003c/li>\n\u003c/ul>\n","rotationAngle":0,"duration":10.2},{"identifier":"RcneZ2cXBMw2xvSwk","kind":"overlay","type":"rectangle","width":513,"height":209,"x":503,"y":338,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"font":{"size":20,"bold":false,"underline":false,"italic":false},"fontColor":"koantic(dark1, 0, 1)","textAlignment":"left","type":"rectangle","border":{"size":0,"color":"#000000","left":true,"right":true,"top":true,"bottom":true},"padding":{"top":0,"bottom":0,"left":0,"right":0},"lineHeight":1.2,"title":"Body Text","fill":{"type":"color","color":"rgba(255,255,255,0)"},"roundedCorners":{"bottomLeft":0,"bottomRight":0,"topLeft":0,"topRight":0}},"htmlContent":"\u003cdiv>\u003cstrong>Break the Goal into Action Steps\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>Help the member outline small, manageable steps.\u003c/li>\n\t\u003cli>Document these steps clearly in the care plan.\u003c/li>\n\u003c/ul>\n","start":38.1,"behaviorType":"continue","rotationAngle":0,"duration":8.899999999999999},{"identifier":"c4w8ZmjNacepJucGA","kind":"overlay","type":"rectangle","width":660,"height":138,"x":466,"y":333,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"font":{"size":20,"bold":false,"underline":false,"italic":false},"fontColor":"koantic(dark1, 0, 1)","textAlignment":"left","type":"rectangle","border":{"size":0,"color":"#000000","left":true,"right":true,"top":true,"bottom":true},"padding":{"top":0,"bottom":0,"left":0,"right":0},"lineHeight":1.2,"title":"Body Text","fill":{"type":"color","color":"rgba(255,255,255,0)"},"roundedCorners":{"bottomLeft":0,"bottomRight":0,"topLeft":0,"topRight":0}},"htmlContent":"\u003cdiv>\u003cstrong>Monitor Progress and Adjust as Needed\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>Check in regularly (per program guidelines or more often if needed).\u003c/li>\n\t\u003cli>Celebrate progress and problem-solve barriers.\u003c/li>\n\t\u003cli>Update the goal or action steps if the member&rsquo;s needs or circumstances change.\u003c/li>\n\u003c/ul>\n","start":48,"behaviorType":"continue","rotationAngle":0,"duration":8},{"identifier":"L8S3SnC4WJtm4JAGG","kind":"overlay","type":"rectangle","width":666,"height":107,"x":483,"y":320,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"font":{"size":20,"bold":false,"underline":false,"italic":false},"fontColor":"koantic(dark1, 0, 1)","textAlignment":"left","type":"rectangle","border":{"size":0,"color":"#000000","left":true,"right":true,"top":true,"bottom":true},"padding":{"top":0,"bottom":0,"left":0,"right":0},"lineHeight":1.2,"title":"Body Text","fill":{"type":"color","color":"rgba(255,255,255,0)"},"roundedCorners":{"bottomLeft":0,"bottomRight":0,"topLeft":0,"topRight":0}},"htmlContent":"\u003cdiv>\u003cstrong>Document Clearly and Consistently\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>Use progression notes to track measurable outcomes and member feedback.\u003c/li>\n\t\u003cli>Note any changes in supports, timelines, or goal direction.\u003c/li>\n\t\u003cli>Ensure documentation reflects the member&rsquo;s voice and choices.\u003c/li>\n\u003c/ul>\n","start":57,"behaviorType":"continue","rotationAngle":0}],"duration":74.8125,"captions":[{"text":"As care coordinators,","startTime":0.029,"finishTime":1.429},{"text":"your role is essential in helping members not only set smart goals,","startTime":1.5590000000000002,"finishTime":5.519},{"text":"but actually achieve them.","startTime":5.559,"finishTime":6.829},{"text":"First,","startTime":8.269,"finishTime":8.779},{"text":"start by exploring what matters most to the member.","startTime":9.029,"finishTime":11.579},{"text":"Use open-ended questions to help them define a","startTime":12.5,"finishTime":14.859},{"text":"goal that's meaningful and specific to their life.","startTime":14.859,"finishTime":17.409},{"text":"Then","startTime":18.799,"finishTime":19.229},{"text":"work together to shape the goal using the smart framework,","startTime":19.37,"finishTime":22.469},{"text":"making sure it's measurable,","startTime":22.68,"finishTime":24.069},{"text":"attainable,","startTime":24.219,"finishTime":24.909},{"text":"relevant,","startTime":25.04,"finishTime":25.61},{"text":"and time bound.","startTime":25.75,"finishTime":26.68},{"text":"Once the goal is defined,","startTime":28.09,"finishTime":29.559},{"text":"identify what supports are needed.","startTime":29.69,"finishTime":31.61},{"text":"This could include formal services,","startTime":32.539,"finishTime":34.569},{"text":"informal caregivers,","startTime":34.659,"finishTime":35.848},{"text":"or community resources.","startTime":35.979,"finishTime":37.458},{"text":"Break the goal into small manageable action steps.","startTime":38.869,"finishTime":42.069},{"text":"Assign responsibilities so the member knows what to expect.","startTime":42.99,"finishTime":46.259},{"text":"Monitor progress regularly.","startTime":47.74,"finishTime":49.389},{"text":"Celebrate wins,","startTime":50.209,"finishTime":51.479},{"text":"troubleshoot barriers,","startTime":51.68,"finishTime":52.83},{"text":"and adjust the plan if the members needs change.","startTime":52.909,"finishTime":55.479},{"text":"And finally","startTime":56.81,"finishTime":57.709},{"text":"document everything clearly.","startTime":57.919,"finishTime":59.43},{"text":"Your notes should reflect the member's voice,","startTime":60.33,"finishTime":62.4},{"text":"the supports in place,","startTime":62.569,"finishTime":63.84},{"text":"and how the plan is evolving over time.","startTime":64.05,"finishTime":66.18},{"text":"These steps ensure that smart goals are not just written down","startTime":67.569,"finishTime":70.839},{"text":"but lived out in a way that's empowering and person centered.","startTime":71.04,"finishTime":74.01}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["yLh7wgzfoyCpPRYGA","Xa6oWThtWNRRxdWou"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As care coordinators, your role is essential in helping members not only set SMART goals—but actually achieve them.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"First, start by exploring what matters most to the member. Use open-ended questions to help them define a goal that’s meaningful and specific to their life.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Then, work together to shape the goal using the SMART framework—making sure it’s measurable, attainable, relevant, and time-bound.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Once the goal is defined, identify what supports are needed. This could include formal services, infor kes a whole person,","startTime":0.119,"finishTime":1.83},{"text":"person centered approach to supporting members.","startTime":2.069,"finishTime":4.44},{"text":"It's a collaborative process where the member leads the way,","startTime":5.21,"finishTime":8.148},{"text":"choosing who they want to be involved,","startTime":8.359,"finishTime":10.109},{"text":"whether that's family,","startTime":10.239,"finishTime":11.199},{"text":"friends,","startTime":11.5,"finishTime":11.989},{"text":"or professionals.","startTime":12.119,"finishTime":13.159},{"text":"The plan builds on the members' strengths and identifies areas of","startTime":14.46,"finishTime":18.129},{"text":"opportunity to help them move toward what matters most to them.","startTime":18.129,"finishTime":20.879},{"text":"Both formal services and informal supports are considered","startTime":21.78,"finishTime":24.819},{"text":"to create a well rounded support system.","startTime":24.819,"finishTime":26.889},{"text":"The care coordinator works with the member to","startTime":28.209,"finishTime":30.28},{"text":"monitor progress and make adjustments as needed,","startTime":30.28,"finishTime":32.909},{"text":"ensuring the plan remains relevant and effective","startTime":33.119,"finishTime":35.88},{"text":"until the member's goal is achieved.","startTime":35.88,"finishTime":37.61}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["Xuv6iMpopZbGiD3FY","DuwudCsoPacnYPKbh","sDiaBYGBqcKQYbPBR","iJYXZ98XuuBoi46yL","arHHDFbz68ai6cwAX","gdGK2k7afA8yLy8Z9","enhHWLfRkaeMdM9Qn"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Care planning takes a whole-person, person-centered approach to supporting members. It’s a collaborative process where the member leads the way—choosing who they want to be involved, whether that’s family, friends, or professionals.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The plan builds on the member’s strengths and identifies areas of opportunity to help them move toward what matters most to them. Both formal services and informal supports are considered to create a well-rounded support system.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The Care Coordinator works with the member to monitor progress and make adjustments as needed, ensuring the plan remains relevant and effective until the member’s goal is achieved.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Care planning takes a whole-person, person-centered approach to supporting members. It’s a collaborative process where the member leads the way—choosing who they want to be involved, whether that’s family, friends, or professionals.\nThe plan builds on the member’s strengths and identifies areas of opportunity to help them move toward what matters most to them. Both formal services and informal supports are considered to create a well-rounded support system.\nThe Care Coordinator works with the member to monitor progress and make adjustments as needed, ensuring the plan remains relevant and effective until the member’s goal is achieved.","jobId":"cibFAAse38NsJjSTA","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"Tki9nz4js2emAZkYW":{"_id":"Tki9nz4js2emAZkYW","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"When Signatures Aren't Required","upload":"6WPDb9MCco9utjurf"},"dates":{"dateCreated":"2026-04-14T22:07:06.081Z","dateModified":"2026-04-17T14:14:16.318Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"FvAZmahCTzsDCHAwF","kind":"overlay","type":"rectangle","width":1290,"height":754.8035714285713,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"GdxugpBPgWZfPXNdA","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":54.25,"captions":[{"text":"Not every service change triggers a new signature.","startTime":0.129,"finishTime":2.8289999999999997},{"text":"Temporary or short-term adjustments,","startTime":3.7,"finishTime":5.579},{"text":"especially those made to address immediate health or safety needs,","startTime":5.78,"finishTime":8.899000000000001},{"text":"do not require a new signature.","startTime":8.979,"finishTime":10.68},{"text":"A common example is a short-term increase in","startTime":11.539,"finishTime":14.109},{"text":"services after a hospitalization or nursing facility stay.","startTime":14.109,"finishTime":17.69},{"text":"These changes are made to stabilize the individual,","startTime":18.59,"finishTime":21.319},{"text":"prevent service gaps,","startTime":21.52,"finishTime":22.709},{"text":"and support recovery.","startTime":22.84,"finishTime":24.079},{"text":"What does matter is documentation.","startTime":24.92,"finishTime":26.84},{"text":"Even when a signature isn't required,","startTime":27.7,"finishTime":29.649},{"text":"the reason for the change must be clearly documented","startTime":29.86,"finishTime":32.418},{"text":"in case notes and reflected accurately in service records.","startTime":32.418,"finishTime":35.74},{"text":"The key question to ask is this","startTime":36.65,"finishTime":38.59},{"text":"Is this a temporary adjustment,","startTime":38.74,"finishTime":40.52},{"text":"or is this a change that is expected to continue?","startTime":40.659,"finishTime":43.139},{"text":"If it's expected to continue,","startTime":43.86,"finishTime":45.569},{"text":"a signature is required.","startTime":45.729,"finishTime":47.27},{"text":"If it's temporary and time limited,","startTime":48.009,"finishTime":49.889},{"text":"documentation,","startTime":50.13,"finishTime":51.08},{"text":"not a signature,","startTime":51.33,"finishTime":52.229},{"text":"is the requirement.","startTime":52.419,"finishTime":53.45}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["6WPDb9MCco9utjurf","GdxugpBPgWZfPXNdA"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Not every service change triggers a new signature. Temporary or short‑term adjustments especially those made to address immediate health or safety needs do not require a new signature. A common example is a short‑term increase in services after a hospitalization or nursing facility stay. These changes are made to stabilize the individual, prevent service gaps, and support recovery. What does matter is documentation. Even when a signature isn’t required, the reason for the change must be clearly documented in case notes and reflected accurately in service records. The key question to ask is this: Is this a temporary adjustment, or is this a change that is expected to continue? If it’s expected to continue, a signature is required. If it’s temporary and time‑limited, documentation, not a signature, is the requirement.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Not every service change triggers a new signature. Temporary or short‑term adjustments especially those made to address immediate health or safety needs do not require a new signature. A common example is a short‑term increase in services after a hospitalization or nursing facility stay. These changes are made to stabilize the individual, prevent service gaps, and support recovery. What does matter is documentation. Even when a signature isn’t required, the reason for the change must be clearly documented in case notes and reflected accurately in service records. The key question to ask is this: Is this a temporary adjustment, or is this a change that is expected to continue? If it’s expected to continue, a signature is required. If it’s temporary and time‑limited, documentation, not a signature, is the requirement.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"KvTLyZXYD5QsdpiaA"}},"WBvTimcv4fimrzzfb":{"_id":"WBvTimcv4fimrzzfb","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 20","upload":"a338DCyL76Pajdgth"},"dates":{"dateCreated":"2025-05-20T16:37:04.581Z","dateModified":"2026-04-17T14:19:31.084Z"}, e progress. Measurable goals also help us adjust supports if the member is struggling or ready to take on more.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"Xf9QdcCKjYA92XeQN"}},"WJBWP34hYHwuMsLaF":{"_id":"WJBWP34hYHwuMsLaF","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"PDN Preventing Common Risks","upload":"SGD5ttpGPkP69mJMr"},"dates":{"dateCreated":"2026-04-15T16:25:15.126Z","dateModified":"2026-04-17T14:14:50.554Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"HKnXMjGh5SoAfYibc","kind":"overlay","type":"rectangle","width":1215,"height":763.7142857142858,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"TCAgT2nzsAx4W9pso","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":61.65,"captions":[{"text":"Private duty nursing is one of the","startTime":0.079,"finishTime":1.8090000000000002},{"text":"services most frequently associated with documentation risk,","startTime":1.8090000000000002,"finishTime":5.09},{"text":"not because it's uncommon,","startTime":5.17,"finishTime":6.57},{"text":"but because it often spans multiple systems and pairs.","startTime":6.769,"finishTime":9.77},{"text":"The most common issues involve private duty nursing services being","startTime":10.609,"finishTime":14.329},{"text":"delivered without being fully reflected in the person-centered service plan,","startTime":14.329,"finishTime":17.889},{"text":"hours drifting beyond what's documented or updates being","startTime":18.09,"finishTime":21.37},{"text":"made in one place but not another.","startTime":21.37,"finishTime":23.25},{"text":"These situations don't typically start as compliance problems,","startTime":24.17,"finishTime":27.61},{"text":"they start as communication gaps.","startTime":27.819,"finishTime":29.78},{"text":"Risk prevention is straightforward.","startTime":30.67,"finishTime":32.529},{"text":"Make sure private duty nursing is always supported in the care plan,","startTime":33.4,"finishTime":36.84},{"text":"authorized in the service plan,","startTime":37,"finishTime":38.65},{"text":"and kept up to date when changes are expected to continue.","startTime":38.88,"finishTime":41.9},{"text":"When coordination is documented and plans are aligned,","startTime":42.74,"finishTime":45.689},{"text":"private duty nursing becomes just another","startTime":45.979,"finishTime":48.139},{"text":"service that supports the individual's ability to","startTime":48.139,"finishTime":50.54},{"text":"live safely in their chosen setting and not a source of audit concern.","startTime":50.54,"finishTime":54.119},{"text":"Remember that every service,","startTime":54.939,"finishTime":56.52},{"text":"no matter who pays for it,","startTime":56.669,"finishTime":58.009},{"text":"must fit clearly within the person-centered plan.","startTime":58.29,"finishTime":60.9}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["SGD5ttpGPkP69mJMr","TCAgT2nzsAx4W9pso"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Private Duty Nursing is one of the services most frequently associated with documentation risk not because it’s uncommon, but because it often spans multiple systems and payers. The most common issues involve Private Duty Nursing services being delivered without being fully reflected in the Person centered service plan, hours drifting beyond what’s documented, or updates being made in one place but not another. These situations don’t typically start as compliance problems, they start as communication gaps. Risk prevention is straightforward. Make sure Private Duty Nursing is always supported in the Care Plan, authorized in the Service Plan, and kept up to date when changes are expected to continue. When coordination is documented and plans are aligned, Private Duty Nursing becomes just another service that supports the individual’s ability to live safely in their chosen setting and not a source of audit concern. Remeber that every service, no matter who pays for it, must fit clearly within the person‑centered plan.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Private Duty Nursing is one of the services most frequently associated with documentation risk not because it’s uncommon, but because it often spans multiple systems and payers. The most common issues involve Private Duty Nursing services being delivered without being fully reflected in the Person centered service plan, hours drifting beyond what’s documented, or updates being made in one place but not another. These situations don’t typically start as compliance problems, they start as communication gaps. Risk prevention is straightforward. Make sure Private Duty Nursing is always supported in the Care Plan, authorized in the Service Plan, and kept up to date when changes are expected to continue. When coordination is documented and plans a
