r example “Measurable” means we can track progress toward the goal. Without a way to measure, we can’t know if the member is moving forward.\u003cbreak time=\"0.5s\"/>In this case, the member’s goal includes a frequency—twice a week. That gives us a clear benchmark to monitor and celebrate progress. Measurable goals also help us adjust supports if the member is struggling or ready to take on more.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Goals must be measurable.","startTime":0.119,"finishTime":1.5590000000000002},{"text":"Sometimes you must think outside the box to find the measurement.","startTime":2.7199999999999998,"finishTime":6.03},{"text":"It may not be as simple as a specific number like a blood pressure reading.","startTime":6.849,"finishTime":10.75},{"text":"It may be about increasing or decreasing services.","startTime":11.568999999999999,"finishTime":14.59},{"text":"For example,","startTime":15.5,"finishTime":16.37},{"text":"measurable means we can track progress toward the goal.","startTime":16.459,"finishTime":19.299},{"text":"Without a way to measure,","startTime":20.229,"finishTime":21.42},{"text":"we can't know if the member is moving forward.","startTime":21.59,"finishTime":23.86},{"text":"In this case,","startTime":25.149,"finishTime":26.069},{"text":"the member's goal includes a frequency twice a week.","startTime":26.239,"finishTime":29.469},{"text":"That gives us a clear benchmark to monitor and celebrate progress.","startTime":30.34,"finishTime":33.97},{"text":"Measurable goals also help us adjust supports if the","startTime":34.919,"finishTime":37.68},{"text":"member is struggling or ready to take on more.","startTime":37.68,"finishTime":39.99}]}},"aLMW6WZbvctd92pTA":{"_id":"aLMW6WZbvctd92pTA","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"PwkBZST96scH7xpPR","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":792,"height":1080},"dates":{"dateCreated":"2025-05-20T16:37:03.053Z","dateModified":"2025-05-20T16:37:03.053Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"af7a7m4XDG6mqEMhd":{"_id":"af7a7m4XDG6mqEMhd","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":730944,"uploadedFileName":"Eric-en-S-Specific-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":30.425},"dates":{"dateCreated":"2025-06-06T17:13:02.011Z","dateModified":"2025-06-06T17:13:03.751Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The “S” in SMART stands for Specific. A goal should be clear and focused, not vague or general.\nIn this example, the member doesn’t just say “I want to walk more.” Instead, she says, “I want to walk to the park with my granddaughter again.” This tells us what she wants to do, who it involves, and why it’s meaningful.\nSpecificity helps the care team understand the member’s motivation and tailor supports accordingly.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"ktNqb63dbX9A9b5FP","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">The “S” in SMART stands for Specific. A goal should be clear and focused, not vague or general.\u003cbreak time=\"0.5s\"/>In this example, the member doesn’t just say “I want to walk more.” Instead, she says, “I want to walk to the park with my granddaughter again.” This tells us what she wants to do, who it involves, and why it’s meaningful.\u003cbreak time=\"0.5s\"/>Specificity helps the care team understand the member’s motivation and tailor supports accordingly.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The S in smart stands for specific.","startTime":0.09,"finishTime":2.789},{"text":"A goal should be clear and focused,","startTime":3.64,"finishTime":5.639},{"text":"not vague or general.","startTime":5.88,"finishTime":7.19},{"text":"In this example,","startTime":8.489,"finishTime":9.6},{"text":"the member doesn't just say,","startTime":9.789,"finishTime":11.26},{"text":"I want to walk more.","startTime":11.39,"finishTime":12.579},{"text":"Instead,","startTime":13.39,"finishTime":14.069},{"text":"she says,","startTime":14.359,"finishTime":14.949},{"text":"I want to walk to the park with my granddaughter again.","startTime":15.119,"finishTime":17.75},{"text":"This tells us what she wants to do,","startTime":18.62,"finishTime":20.45},{"text":"who it involves,","startTime":20.62,"finishTime":21.579},{"text":"and why it's meaningful.","startTime":21.7,"finishTime":23.02},{"text":"Specificity helps the care team understand the","startTime":24.389,"finishTime":26.909},{"text":"member's motivation and tailor supports accordingly.","startTime":26.909,"finishTime":29.6}]}},"ahy6SKvCSDimCRzGX":{"_id":"ahy6SKvCSDimCRzGX","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":39543,"uploadedFileName":"networking.png","height":512,"uploadedFileNameExtension":".png","width":512},"dates":{"dateCreated":"2025-06-06T15:28:57.947Z","dateModified":"2025-06-06T15:28:57.947Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"tH46wM9uL74YKzTEx","thumbnail":"ZqTxENrkYLxYkrRjo"},"arHHDFbz68ai6cwAX":{"_id":"arHHDFbz68ai6cwAX","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"d89JTDCy8zTpMqSHh","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":117,"height":140},"dates":{"dateCreated":"2025-05-20T16:37:05.975Z","dateModified":"2025-05-20T16:37:05.975Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"ay3TzQoRbYQJ4ZFdR":{"_id":"ay3TzQoRbYQJ4ZFdR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1282176,"uploadedFileName":"Eric-en-WhyPlanAlignmentMatters-4152026.mp3","uploadedFileNameExtension":".mp3","duration":53.3875},"dates":{"dateCreated":"2026-04-15T14:57:37.422Z","dateModified":"2026-04-15T14:57:39.606Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Understanding the difference between the Care Plan and the Service Plan is important but understanding how they work together is critical. Every service listed on the Service Plan should be clearly supported by the Care Plan. That means there should be a documented need, risk, goal, or preference that explains why that service exists. When services appear on a Service Plan without corresponding support in the Care Plan, it creates risk. To an auditor, it may look like the service was authorized without a person‑centered or needs‑based rationale. Alignment shows that services weren’t chosen at random they were selected intentionally to support what matters most to the individual while addressing identified needs. Strong alignment protects the individual by ensuring services are appropriate, and it protects providers and case managers by clearly demonstrating authorization and intent.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"fwWo6xYWcYqCaZZsG","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Understanding the difference between the Care Plan and the Service Plan is important but understanding how they work together is critical. Every service listed on the Service Plan should be clearly supported by the Care Plan. That means there should be a documented need, risk, goal, or preference that explains why that service exists. When services appear on a Service Plan without corresponding support in the Care Plan, it creates risk. To an auditor, it may look like the service was authorized without a person‑centered or needs‑based rationale. Alignment shows that services weren’t chosen at random they were selected intentionally to support what matters most to the individual while addressing identified needs. Strong alignment protects the individual by ensuring services are appropriate, and it protects providers and case managers by clearly demonstrating authorization and intent.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Understanding the difference between the care plan","startTime":0.09,"finishTime":2.41},{"text":"and the service plan is important,","startTime":2.41,"finishTime":4.01},{"text":"but understanding how they work together is critical.","startTime":4.13,"finishTime":6.67},{"text":"Every service listed on the service plan should","startTime":7.519,"finishTime":9.789},{"text":"be clearly supported by the care plan.","startTime":9.789,"finishTime":11.84},{"text":"That means there should be a documented need,","startTime":12.71,"finishTime":14.869},{"text":"risk,","startTime":15.069,"finishTime":15.47},{"text":"goal,","startTime":15.75,"finishTime":16.068},{"text":"or preference that explains why that service exists.","startTime":16.239,"finishTime":19.149},{"text":"When services appear on a service plan","startTime":20.049,"finishTime":22.379},{"text":"without corresponding support in the care plan,","startTime":22.379,"finishTime":24.7},{"text":"it creates risk.","startTime":24.86,"finishTime":26.02},{"text":"To an auditor,","startTime":26.829,"finishTime":27.739},{"text":"it may look like the service was","startTime":27.879,"finishTime":29.399},{"text":"authorized without a person-centered or needs-based rationale.","startTime":29.399,"finishTime":32.729},{"text":"Alignment shows that services weren't chosen at random,","startTime":33.61,"finishTime":36.45},{"text":"they were selected intentionally to support what matters","startTime":36.529,"finishTime":39.25},{"text":"most to the individual while addressing identified needs.","startTime":39.25,"finishTime":42.169},{"text":"Strong alignment protects the individual by ensuring services are appropriate,","startTime":43.099,"finishTime":47.33},{"text":"and it protects providers and case managers","startTime":47.509,"finishTime":49.79},{"text":"by clearly demonstrating authorization and intent.","startTime":49.79,"finishTime":52.549}]}},"b6wd9Xba4wpdkeCva":{"_id":"b6wd9Xba4wpdkeCva","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"video","mimetype":"video/mp4","status":"online","fileSizeInBytes":18091637,"uploadedFileName":"Spirit of Motivational Interviewing - Bill Matulich (720p, h264).mp4","duration":372.58263,"uploadedFileNameExtension":".mp4"},"dates":{"dateCreated":"2025-08-18T19:16:57.804Z","dateModified":"2025-08-18T19:16:57.804Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"ojKS7ur2uB3PttYrx","thumbnail":"R76kC2wK6JDc8Xy9M","videoSD":"KmvyekqDXNsDgTaaM","captionData":{"status":"success","captions":[{"text":"Hello again.","startTime":2.559,"finishTime":3.13},{"text":"This is Doctor Bill Mulli with my dog Spot.","startTime":3.21,"finishTime":5.8},{"text":"Welcome.","startTime":5.929,"finishTime":6.44},{"text":"Today's lesson is about the spirit of motivational interviewing.","startTime":6.9,"finishTime":10.039},{"text":"There are two important pieces to the practice of MI.","startTime":10.779,"finishTime":13.92},{"text":"One piece includes all the techniques and strategies","startTime":14.25,"finishTime":16.87},{"text":"and tools that are used in motivational interviewing,","startTime":16.87,"finishTime":19.399},{"text":"and the other,","startTime":19.569,"finishTime":20.159},{"text":"perhaps more important piece for the ethical practice of MI is called Spirit.","startTime":20.45,"finishTime":24.299},{"text":"Miller and Ronnick say that doing MI without consideration of the","startTime":24.889,"finishTime":28.01},{"text":"spirit is like trying to sing a song without any music.","startTime":28.01,"finishTime":30.84},{"text":"Spirit guides the practice of motivational interviewing like a","startTime":31.45,"finishTime":34.569},{"text":"steering wheel guides the motion of a car,","startTime":34.569,"finishTime":36.68},{"text":"or tracks guide the direction of a train.","startTime":36.93,"finishTime":38.889},{"text":"Without this philosophy and perspective,","startTime":39.38,"finishTime":41.61},{"text":"MI is just a collection of tools with which to manipulate","startTime":41.86,"finishTime":44.9},{"text":"clients to do what they may not really want to do.","startTime":44.9,"finishTime":47.58},{"text":"The spirit of motivational interviewing is also the foundation","startTime":47.939,"finishTime":51.02},{"text":"upon which the practice of MI is built.","startTime":51.02,"finishTime":53.369},{"text":"It's like the roots of a plant,","startTime":53.74,"finishTime":55.279},{"text":"both supporting and nourishing the practice of MI.","startTime":55.38,"finishTime":58.34},{"text":"MI spirit is summed up in four important words partnership,","startTime":59.33,"finishTime":63.139},{"text":"acceptance,","startTime":63.409,"finishTime":64},{"text":"compassion,","startTime":64.16,"finishTime":64.769},{"text":"and evocation.","startTime":64.809,"finishTime":66.04},{"text":"We'll take these one at a time.","startTime":66.29,"finishTime":67.72},{"text":"Partnership describes the nature of the","startTime":68.01,"finishTime":70.209},{"text":"relationship between client and clinician.","startTime":70.209,"finishTime":72.559},{"text":"The clinician brings expertise by way of education,","startTime":72.97,"finishTime":75.489},{"text":"training,","startTime":75.65,"finishTime":76.01},{"text":"and experience,","startTime":76.089,"finishTime":77.04},{"text":"while the client knows herself better than anyone.","startTime":77.209,"finishTime":79.47},{"text":"So a partnership of these two experts working together to","startTime":79.809,"finishTime":82.809},{"text":"achieve a common goal is honored in motivational interviewing.","startTime":82.809,"finishTime":86.33},{"text":"The opposite of partnership is a relationship in which the","startTime":86.94,"finishTime":89.55},{"text":"clinician believes he is the only expert in the room,","startTime":89.55,"finishTime":92.08},{"text":"knows what the client needs to do,","startTime":92.519,"finishTime":94.239},{"text":"and tries to convince her in some way to change.","startTime":94.44,"finishTime":96.919},{"text":"This might be called a paternalistic relationship.","startTime":97.209,"finishTime":100.239},{"text":"In a partnership,","startTime":100.949,"finishTime":101.809},{"text":"the clinician and client work together as equals.","startTime":101.9,"finishTime":104.699},{"text":"Motivational interviewing is done with and for a client.","startTime":104.86,"finishTime":107.809},{"text":"The clinician expresses interest and support,","startTime":108.059,"finishTime":110.65},{"text":"and the clinician is a companion and witness to change.","startTime":110.879,"finishTime":114.209},{"text":"In a paternalistic relationship.","startTime":114.62,"finishTime":116.209},{"text":"On the other hand,","startTime":116.26,"finishTime":117.129},{"text":"the client is a passive recipient of the clinician's expertise.","startTime":117.419,"finishTime":121.209},{"text":"MI techniques are done on or to a client.","startTime":121.66,"finishTime":124.86},{"text":"The clinician tries to persuade and argue.","startTime":125.22,"finishTime":127.779},{"text":"And the clinician is the expert who directs and is responsible for change.","startTime":128.11,"finishTime":132.149},{"text":"Acceptance is the second word to","startTime":132.949,"finishTime":134.86},{"text":"describe the spirit of motivational interviewing.","startTime":134.86,"finishTime":136.979},{"text":"It's a related concept that refers to the clinician's","startTime":137.059,"finishTime":139.789},{"text":"deep appreciation for the client and her worldview.","startTime":139.789,"finishTime":142.929},{"text":"Acceptance includes four components.","startTime":143.5,"finishTime":146.419},{"text":"These are absolute worth,","startTime":146.58,"finishTime":148.25},{"text":"accurate empathy,","startTime":148.619,"finishTime":149.929},{"text":"autonomy,","startTime":150.259,"finishTime":150.779},{"text":"support,","startTime":150.979,"finishTime":151.449},{"text":"and affirmation.","startTime":151.66,"finishTime":152.74},{"text":"Absolute worth refers to the profound acceptance of the","startTime":153.57,"finishTime":156.639},{"text":"inherent worth and potential of every human being.","startTime":156.639,"finishTime":159.72},{"text":"The opposite would be an attitude of judgment.","startTime":160.199,"finishTime":163.089},{"text":"Accurate empathy refers to the clinician's effort","startTime":163.399,"finishTime":166.559},{"text":"to understand the world from the client's","startTime":166.559,"finishTime":168.36},{"text":"point of view versus trying to impose his point of view onto the client.","startTime":168.36,"finishTime":172.25},{"text":"Without accurate empathy,","startTime":172.679,"finishTime":173.8},{"text":"engaging the client in an effective partnership and tailoring a","startTime":173.869,"finishTime":177.44},{"text":"change plan to individual client needs is difficult at best.","startTime":177.44,"finishTime":180.99},{"text":"Autonomy support acknowledges that everyone has an irrevocable","startTime":181.839,"finishTime":185.429},{"text":"right and basic psychological need for self-determination.","startTime":185.429,"finishTime":189.399},{"text":"The clinician actively acknowledges and protects","startTime":189.75,"finishTime":192.63},{"text":"this right in motivational interviewing.","startTime":192.63,"finishTime":194.639},{"text":"The opposite would be the clinician trying to decide for the client,","startTime":195.029,"finishTime":198.309},{"text":"making the client change,","startTime":198.72,"finishTime":200.059},{"text":"or trying to coerce and control the client.","startTime":200.27,"finishTime":202.71},{"text":"Affirmation,","startTime":203.55,"finishTime":204.46},{"text":"the fourth concept of acceptance,","startTime":204.74,"finishTime":207.25},{"text":"refers to the clinician's efforts to seek and","startTime":207.5,"finishTime":209.699},{"text":"acknowledge the client's positive characteristics and efforts.","startTime":209.699,"finishTime":213.24},{"text":"The opposite would be to look for what is wrong and try to fix it.","startTime":213.38,"finishTime":216.25},{"text":"Together,","startTime":216.899,"finishTime":217.44},{"text":"the concepts of absolute worth,","startTime":217.449,"finishTime":219.309},{"text":"accurate empathy,","startTime":219.399,"finishTime":220.199},{"text":"autonomy,","startTime":220.32,"finishTime":220.759},{"text":"support,","startTime":220.96,"finishTime":221.169},{"text":"and affirmation","startTime":221.24,"finishTime":222.11},{"text":"describe what is meant by the word acceptance in MI as part of the spirit of MI.","startTime":222.44,"finishTime":227},{"text":"Compassion,","startTime":228.059,"finishTime":228.699},{"text":"the third word used to describe the spirit of motivational interviewing,","startTime":228.82,"finishTime":232.66},{"text":"guides the clinician to prioritize the needs and welfare","startTime":232.899,"finishTime":236.029},{"text":"of the client above that of the clinician.","startTime":236.029,"finishTime":237.929},{"text":"The opposite would be clinician self-interest and maybe even exploitation.","startTime":238.259,"finishTime":242.57},{"text":"Compassion is the foundation of a trusting relationship.","startTime":242.979,"finishTime":245.86},{"text":"Evoking the fourth word in the description of the spirit of MI","startTime":246.949,"finishTime":250.809},{"text":"reminds MI clinicians that the client has strengths,","startTime":251.259,"finishTime":254.32},{"text":"resources,","startTime":254.619,"finishTime":255.179},{"text":"thoughts,","startTime":255.339,"finishTime":255.759},{"text":"ideas,","startTime":256.059,"finishTime":256.57},{"text":"solutions,","startTime":256.899,"finishTime":257.45},{"text":"motivation,","startTime":257.54,"finishTime":258.279},{"text":"expertise,","startTime":258.42,"finishTime":259.19},{"text":"wisdom,","startTime":259.32,"finishTime":259.839},{"text":"and experience that can be tapped in the service of healthy behavior change.","startTime":259.899,"finishTime":264.2},{"text":"The opposite is the deficit view that the client","startTime":264.589,"finishTime":267.14},{"text":"is missing something that the clinician needs to provide.","startTime":267.14,"finishTime":269.94},{"text":"The overall spirit of MI guides the clinician how to proceed","startTime":270.89,"finishTime":274.359},{"text":"in the effort to help clients make healthy behavior change.","startTime":274.359,"finishTime":277.589},{"text":"It provides the ethical guidelines and the underlying philosophy,","startTime":277.88,"finishTime":281.35},{"text":"mindset,","startTime":281.839,"finishTime":282.47},{"text":"and heart set,","startTime":282.559,"finishTime":283.35},{"text":"as Miller and Rolnick would say,","startTime":283.44,"finishTime":284.91},{"text":"that guides the clinician in the effective application","startTime":285.16,"finishTime":287.6},{"text":"of the powerful tools and techniques of MI.","startTime":287.6,"finishTime":290.1},{"text":"Without spirit,","startTime":290.6,"finishTime":291.359},{"text":"motivational interviewing becomes hocus pocus designed to","startTime":291.6,"finishTime":294.359},{"text":"trick people rather than help them.","startTime":294.359,"finishTime":296},{"text":"Clinicians vary in their expression of the spirit of motivational interviewing.","startTime":296.869,"finishTime":301.01},{"text":"Some seem to be born with it,","startTime":301.339,"finishTime":302.739},{"text":"like the famous neurologist Oliver Sacks,","startTime":302.799,"finishTime":305.299},{"text":"who wrote,","startTime":305.42,"finishTime":306.209},{"text":"I find every patient I see everywhere vividly alive,","startTime":306.459,"finishTime":309.82},{"text":"interesting,","startTime":310.329,"finishTime":310.54},{"text":"and rewarding.","startTime":310.579,"finishTime":311.649},{"text":"I have never seen a patient who didn't teach me something new","startTime":311.859,"finishTime":315.01},{"text":"or stir in me new feelings and new trains of thought.","startTime":315.299,"finishTime":318.14},{"text":"The spirit can be learned by practicing MI with an open mind and a sense of curiosity,","startTime":319.019,"finishTime":323.72},{"text":"drawing the clinician closer to Dr.","startTime":324.089,"finishTime":325.839},{"text":"Sacks's perspective.","startTime":326.01,"finishTime":327.079},{"text":"So the first step in using MI with a client is really to keep the spirit in mind.","startTime":328.049,"finishTime":332.2},{"text":"Clients are very important,","startTime":332.32,"finishTime":333.6},{"text":"unique,","startTime":333.72,"finishTime":334.04},{"text":"and worthwhile persons.","startTime":334.049,"finishTime":335.44},{"text":"Clinicians and clients work together to find","startTime":335.559,"finishTime":338.239},{"text":"solutions to whatever problems are presented.","startTime":338.239,"finishTime":340.489},{"text":"Clients' strengths and expertise are respected,","startTime":340.799,"finishTime":343.47},{"text":"and the clinician puts the client's needs ahead of her own.","startTime":343.76,"finishTime":346.75},{"text":"Clinicians recognize that the client has wisdom,","startTime":347,"finishTime":349.649},{"text":"knowledge,","startTime":349.76,"finishTime":350.04},{"text":"and motivation","startTime":350.119,"finishTime":350.95},{"text":"already without having to instill any.","startTime":351.359,"finishTime":353.839},{"text":"And that it is ultimately the client's decision to change","startTime":354.14,"finishTime":357.369},{"text":"or not to change his or her own behavior.","startTime":357.369,"finishTime":359.929},{"text":"That ends the short session on MI Spirit.","startTime":361.029,"finishTime":363.5},{"text":"I hope it was helpful.","startTime":363.63,"finishTime":364.739},{"text":"Thank you for tuning in.","startTime":365.029,"finishTime":366.579},{"text":"Spot and I will look forward to our next meeting.","startTime":366.95,"finishTime":369.309}]}},"b6wdmpzRTMPmKvgSm":{"_id":"b6wdmpzRTMPmKvgSm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1198372,"uploadedFileName":"Private-Duty-Nursing-PDN-in-the-PCSP.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-15T16:15:33.397Z","dateModified":"2026-04-15T16:15:33.397Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"8mznwG6e9e4kbLSTY","thumbnail":"5nSH95rAs5Habejmd"},"bjFJj75jFdxZw2257":{"_id":"bjFJj75jFdxZw2257","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":15878,"uploadedFileName":"Untitled drawing (9).jpg","height":315,"uploadedFileNameExtension":".jpg","width":216},"dates":{"dateCreated":"2025-06-18T13:46:26.413Z","dateModified":"2025-06-18T13:46:26.413Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"EZRjP8gNpCvSPffdc","thumbnail":"c3G4LoFhRpLjE7pc7"},"cQfuE5imMqH5vZqhF":{"_id":"cQfuE5imMqH5vZqhF","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1013760,"uploadedFileName":"Eric-en-Prioritizing Goals-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":42.2125},"dates":{"dateCreated":"2025-06-06T16:28:18.289Z","dateModified":"2025-06-06T16:28:21.098Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Once SMART goals are developed, the next step is to support the member in prioritizing them. This process should reflect what the member feels is most important in their life right now—not what the Care Coordinator believes is most urgent.\nHigh-priority goals typically address immediate needs or daily barriers to wellbeing. Medium-priority goals may focus on stability or improvement in quality of life. Low-priority goals are often longer-term aspirations that still matter to the member.\nA Care Coordinator's role is to help the member explore what matters most to them and why, and to guide the conversation so they can confidently set the pace and focus of their care plan.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"WZx9gHAkQaXhHsE8X","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Once SMART goals are developed, the next step is to support the member in prioritizing them. This process should reflect what the member feels is most important in their life right now—not what the Care Coordinator believes is most urgent.\u003cbreak time=\"0.5s\"/>High-priority goals typically address immediate needs or daily barriers to wellbeing. Medium-priority goals may focus on stability or improvement in quality of life. Low-priority goals are often longer-term aspirations that still matter to the member.\u003cbreak time=\"0.5s\"/>A Care Coordinator's role is to help the member explore what matters most to them and why, and to guide the conversation so they can confidently set the pace and focus of their care plan.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Once smart goals are developed,","startTime":0.119,"finishTime":1.7890000000000001},{"text":"the next step is to support the member in prioritizing them.","startTime":1.95,"finishTime":5.11},{"text":"This process should reflect what the member feels","startTime":5.88,"finishTime":8.34},{"text":"is most important in their life right now,","startTime":8.34,"finishTime":10.409},{"text":"not what the care coordinator believes is most urgent.","startTime":10.659,"finishTime":13.329},{"text":"High priority goals typically address immediate","startTime":14.76,"finishTime":17.28},{"text":"needs or daily barriers to well-being.","startTime":17.28,"finishTime":19.399},{"text":"Medium priority goals may focus on stability or improvement in quality of life.","startTime":20.34,"finishTime":25.01},{"text":"Low priority goals are often longer term","startTime":25.959,"finishTime":28.159},{"text":"aspirations that still matter to the member.","startTime":28.159,"finishTime":30.399},{"text":"A care coordinator's role is to help the","startTime":31.75,"finishTime":33.84},{"text":"member explore what matters most to them and why","startTime":33.84,"finishTime":36.43},{"text":"and to guide the conversation so they can confidently","startTime":36.639,"finishTime":39.2},{"text":"set the pace and focus of their care plan.","startTime":39.2,"finishTime":41.43}]}},"cW742xdaSePifuJq4":{"_id":"cW742xdaSePifuJq4","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":3998434,"uploadedFileName":"photo-1530451918823-b2c35b34f7e6.jpg","height":1120,"uploadedFileNameExtension":".jpg","width":1680},"dates":{"dateCreated":"2025-06-04T14:13:25.275Z","dateModified":"2025-06-04T14:13:25.275Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"v9oTtTB3eP6mxRsDx","thumbnail":"DKz8D5XY6sC2ixkLn"},"caBPgZ7x8mombRnMM":{"_id":"caBPgZ7x8mombRnMM","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1765145,"uploadedFileName":"Provider-Signatures-Delays-FollowUp-and-Risk (1).png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-15T13:31:51.375Z","dateModified":"2026-04-15T13:31:51.375Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"WruX2wELhXgXddJkC","thumbnail":"2wnFhoYZHAF5jN2QF"},"eWzukbgZ8EknyFjFu":{"_id":"eWzukbgZ8EknyFjFu","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"pGyHdkRdKpXM6aL5J","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":45,"height":56},"dates":{"dateCreated":"2025-05-20T16:37:03.349Z","dateModified":"2025-05-20T16:37:03.349Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"enhHWLfRkaeMdM9Qn":{"_id":"enhHWLfRkaeMdM9Qn","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"yg37bHFpawrEk7jfy","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":117,"height":140},"dates":{"dateCreated":"2025-05-20T16:37:06.116Z","dateModified":"2025-05-20T16:37:06.116Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"ev4P3jBR6XEGsnGBL":{"_id":"ev4P3jBR6XEGsnGBL","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1229760,"uploadedFileName":"Eric-en-Blank-4142026.mp3","uploadedFileNameExtension":".mp3","duration":51.2},"dates":{"dateCreated":"2026-04-14T20:10:16.676Z","dateModified":"2026-04-14T20:10:21.423Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Before moving any further into goals, motivational interviewing, or service planning, something to be aware of that often gets overlooked is signatures. Person Centered Care Planning is not just a discussion, or documentation in a system, it involves a Service Plan which is a formal agreement. The Person Centered Service Plan captures what is important to the individual and what is important for the individual, but it only becomes actionable once it is agreed upon. Signatures are how this agreement is documented. They show that the individual understands the plan, agrees with the services being authorized, and that providers understand their role in delivering those services. When signatures are missing, the plan may look complete but from a compliance standpoint, it is not, and that creates real audit and repayment risk, not just paperwork issues.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"6peEJHZD7w7NYDvaa","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Before moving any further into goals, motivational interviewing, or service planning, something to be aware of that often gets overlooked is signatures. Person Centered Care Planning is not just a discussion, or documentation in a system, it involves a Service Plan which is a formal agreement. The Person Centered Service Plan captures what is important to the individual and what is important for the individual, but it only becomes actionable once it is agreed upon. Signatures are how this agreement is documented. They show that the individual understands the plan, agrees with the services being authorized, and that providers understand their role in delivering those services. When signatures are missing, the plan may look complete but from a compliance standpoint, it is not, and that creates real audit and repayment risk, not just paperwork issues.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Before moving any further into goals,","startTime":0.25,"finishTime":2.2},{"text":"motivational interviewing,","startTime":2.349,"finishTime":3.69},{"text":"or service planning,","startTime":3.809,"finishTime":4.88},{"text":"something to be aware of that often gets overlooked is signatures.","startTime":5.19,"finishTime":8.319},{"text":"Person-centered care planning is not just a","startTime":9.18,"finishTime":11.619},{"text":"discussion or documentation in a system,","startTime":11.619,"finishTime":13.89},{"text":"it involves a service plan which is a formal agreement.","startTime":14.09,"finishTime":16.86},{"text":"The person-centered service plan captures what is important to","startTime":17.7,"finishTime":20.819},{"text":"the individual and what is important for the individual,","startTime":20.819,"finishTime":23.37},{"text":"but it only becomes actionable once it is agreed upon.","startTime":23.61,"finishTime":26.2},{"text":"Signatures are how this agreement is documented.","startTime":27.25,"finishTime":29.93},{"text":"They show that the individual understands the plan,","startTime":30.78,"finishTime":33.34},{"text":"agrees with the services being authorized,","startTime":33.7,"finishTime":35.799},{"text":"and that providers understand their role in delivering those services.","startTime":35.979,"finishTime":39.459},{"text":"When signatures are missing,","startTime":40.34,"finishTime":41.819},{"text":"the plan may look complete,","startTime":42.02,"finishTime":43.279},{"text":"but from a compliance standpoint,","startTime":43.38,"finishTime":45.119},{"text":"it is not,","startTime":45.259,"finishTime":45.93},{"text":"and that creates real audit and repayment risk,","startTime":46.099,"finishTime":48.61},{"text":"not just paperwork issues.","startTime":48.86,"finishTime":50.38}]}},"ffx6w83naig8FhH6o":{"_id":"ffx6w83naig8FhH6o","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":128448,"uploadedFileName":"Eric-en-Section2-4172026.mp3","uploadedFileNameExtension":".mp3","duration":5.325},"dates":{"dateCreated":"2026-04-17T14:36:48.895Z","dateModified":"2026-04-17T14:36:50.179Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section two examines one half of a person centered plan which is the care plan.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"EuxbabBArDhSM4hdC","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Section two examines one half of a person centered plan which is the care plan.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Section 2 examines one half of a person-centered plan,","startTime":0.209,"finishTime":3.359},{"text":"which is the care plan.","startTime":3.41,"finishTime":4.53}]}},"gdGK2k7afA8yLy8Z9":{"_id":"gdGK2k7afA8yLy8Z9","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"uZ9NnXyG5e6P86TZj","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":117,"height":140},"dates":{"dateCreated":"2025-05-20T16:37:06.025Z","dateModified":"2025-05-20T16:37:06.025Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"hNXXkf37a3zPtuNEZ":{"_id":"hNXXkf37a3zPtuNEZ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":972288,"uploadedFileName":"Eric-en-DocumentingSignatures-4152026.mp3","uploadedFileNameExtension":".mp3","duration":40.4875},"dates":{"dateCreated":"2026-04-15T13:51:18.512Z","dateModified":"2026-04-15T13:51:22.638Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Case notes should tell a simple, complete story. They should show when the provider received the Person‑Centered Service Plan, how it was sent, and what timeline was given to return the signature. If the signature isn’t returned right away, follow‑up attempts need to be documented including the date, how the provider was contacted, and whether there was a response. From an audit perspective, reviewers aren’t just looking for the final signature. They’re looking for evidence that reasonable and timely efforts were made to obtain agreement. Clear documentation shows that services were coordinated intentionally, not assumed, and that risk was actively managed.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"Hg3M9hkbXZgcFSfc3","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Case notes should tell a simple, complete story. They should show when the provider received the Person‑Centered Service Plan, how it was sent, and what timeline was given to return the signature. If the signature isn’t returned right away, follow‑up attempts need to be documented including the date, how the provider was contacted, and whether there was a response. From an audit perspective, reviewers aren’t just looking for the final signature. They’re looking for evidence that reasonable and timely efforts were made to obtain agreement. Clear documentation shows that services were coordinated intentionally, not assumed, and that risk was actively managed.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Case notes should tell a simple,","startTime":0.129,"finishTime":1.8090000000000002},{"text":"complete story.","startTime":2.22,"finishTime":3.049},{"text":"They should show when the provider received the person-centered service plan,","startTime":3.91,"finishTime":7.369},{"text":"how it was sent,","startTime":7.75,"finishTime":8.59},{"text":"and what timeline was given to return the signature.","startTime":8.829,"finishTime":11.409},{"text":"If the signature isn't returned right away,","startTime":12.159,"finishTime":14.42},{"text":"follow-up attempts need to be documented,","startTime":14.829,"finishTime":16.7},{"text":"including the date,","startTime":16.92,"finishTime":17.719},{"text":"how the provider was contacted,","startTime":18,"finishTime":19.68},{"text":"and whether there was a response.","startTime":19.84,"finishTime":21.18},{"text":"From an audit perspective,","startTime":22.299,"finishTime":23.729},{"text":"reviewers aren't just looking for the final signature.","startTime":24.11,"finishTime":26.62},{"text":"They're looking for evidence that reasonable and","startTime":27.409,"finishTime":29.61},{"text":"timely efforts were made to obtain agreement.","startTime":29.61,"finishTime":31.809},{"text":"Clear documentation shows that services were coordinated intentionally,","startTime":32.689,"finishTime":36.61},{"text":"not assumed,","startTime":36.81,"finishTime":37.56},{"text":"and that risk was actively managed.","startTime":37.759,"finishTime":39.709}]}},"hebj3Bmuotv4KZPte":{"_id":"hebj3Bmuotv4KZPte","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":65869,"uploadedFileName":"image.png","h sSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"TBCbLv79jir7fNR5r","thumbnail":"YynusB9Sr9R4yreFt"},"jaWJCSGzA5goAHYBD":{"_id":"jaWJCSGzA5goAHYBD","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1146887,"uploadedFileName":"PCSP-Best-Practices-Putting-It-All-Together.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-15T16:29:57.048Z","dateModified":"2026-04-15T16:29:57.048Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"MHo7n4hc8ga6xkHgJ","thumbnail":"Mu277Sy6FNTn7XDq3"},"jxKuje66YyjvhHkAR":{"_id":"jxKuje66YyjvhHkAR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"video","mimetype":"video/mp4","status":"online","fileSizeInBytes":17958445,"uploadedFileName":"yt_0aa9ea95f28e41eaa4919cc97eacb0ab.mp4","uploadedFileNameExtension":".mp4","duration":335.081},"dates":{"dateCreated":"2025-12-22T20:08:59.064Z","dateModified":"2025-12-22T20:08:59.064Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"ojcC26tmfPAYjbK5Y","captionData":{"status":"success","captions":[{"text":"Hello,","startTime":6.44,"finishTime":6.76},{"text":"I'm Doctor Margie Harbrecht,","startTime":6.84,"finishTime":8.229},{"text":"Medical executive director of the Colorado Clinical Guidelines Collaborative.","startTime":8.359,"finishTime":12.18},{"text":"Changing behavior is one of the most difficult things to do,","startTime":12.76,"finishTime":15.56},{"text":"whether it's for ourselves or our patients.","startTime":15.72,"finishTime":18.219},{"text":"In this brief video,","startTime":18.639,"finishTime":19.94},{"text":"we will demonstrate a few motivational interviewing","startTime":20.12,"finishTime":22.6},{"text":"techniques to make your job a little easier","startTime":22.6,"finishTime":25.079},{"text":"by helping find a focus to engage patients","startTime":25.28,"finishTime":28.12},{"text":"in becoming healthier.","startTime":28.36,"finishTime":29.559},{"text":"The goal is not only to activate patients to make a needed change,","startTime":30,"finishTime":33.63},{"text":"but to help them sustain that","startTime":33.97,"finishTime":35.529},{"text":"change through learned self-motivational techniques.","startTime":35.529,"finishTime":38.439},{"text":"Hi John,","startTime":39.889,"finishTime":40.33},{"text":"nice to see you again.","startTime":40.409,"finishTime":41.049},{"text":"So tell me,","startTime":41.169,"finishTime":41.849},{"text":"how are things going?","startTime":41.9,"finishTime":42.61},{"text":"Well,","startTime":42.93,"finishTime":43.049},{"text":"doc,","startTime":43.169,"finishTime":43.409},{"text":"I know you told me that I need to lose weight.","startTime":43.529,"finishTime":45.25},{"text":"And even though the scale didn't show it today,","startTime":46.34,"finishTime":48.599},{"text":"I was able to lose about 5 pounds,","startTime":49.02,"finishTime":50.919},{"text":"but then I gained it right back.","startTime":51.34,"finishTime":52.639},{"text":"Well,","startTime":52.86,"finishTime":52.939},{"text":"I appreciate you bringing your weight to the forefront.","startTime":53.02,"finishTime":55.009},{"text":"Do you mind if we explore this issue further?","startTime":55.25,"finishTime":57.33},{"text":"No,","startTime":57.659,"finishTime":57.74},{"text":"by all means,","startTime":57.819,"finishTime":58.369},{"text":"I know we have to discuss it.","startTime":58.419,"finishTime":59.84},{"text":"All right,","startTime":60.18,"finishTime":60.68},{"text":"well,","startTime":61.259,"finishTime":61.38},{"text":"it sounds like you've been struggling with your weight recently,","startTime":61.409,"finishTime":63.9},{"text":"and I understand how difficult it is to lose","startTime":63.97,"finishTime":66.339},{"text":"the weight and then have it come back again.","startTime":66.339,"finishTime":67.959},{"text":"So tell me what you did to lose that initial 5 pounds.","startTime":68.44,"finishTime":71.059},{"text":"I started watching what I ate and I ate less.","startTime":71.4,"finishTime":73.819},{"text":"I've been eating more fruits and vegetables.","startTime":74,"finishTime":76.019},{"text":"I've also been walking more.","startTime":76.4,"finishTime":77.839},{"text":"I'm walking up to 20 minutes a day now.","startTime":78,"finishTime":80.05},{"text":"I saw the weight come slowly off,","startTime":81.669,"finishTime":83.97},{"text":"and I felt better,","startTime":84.54,"finishTime":85.489},{"text":"but then when I watched it come back on again,","startTime":85.669,"finishTime":88.139},{"text":"I gave up.","startTime":88.389,"finishTime":89.29},{"text":"But you did have some success.","startTime":89.669,"finishTime":90.93},{"text":"Tell me how you felt when you lost the weight.","startTime":91.589,"finishTime":93.19},{"text":"I felt great and I felt really proud of myself.","startTime":93.51,"finishTime":95.589},{"text":"I thought that this was something that I could do.","startTime":95.709,"finishTime":97.569},{"text":"OK,","startTime":98.029,"finishTime":98.23},{"text":"well,","startTime":98.349,"finishTime":98.449},{"text":"it sounds like you realized that when you lost the weight,","startTime":98.47,"finishTime":101.019},{"text":"you felt better","startTime":101.059,"finishTime":101.73},{"text":"and that it's going to affect your overall health.","startTime":102.269,"finishTime":103.97},{"text":"So tell me what you think changed","startTime":104.349,"finishTime":106.29},{"text":"that caused you to gain the weight back.","startTime":106.51,"finishTime":108.37},{"text":"Well,","startTime":109.839,"finishTime":109.959},{"text":"I think it's because I've been eating more fruits and vegetables.","startTime":110.01,"finishTime":113.239},{"text":"That's,","startTime":113.4,"finishTime":113.68},{"text":"that's it.","startTime":113.72,"finishTime":114.339},{"text":"And how many servings of fruits and vegetables on average per day would you have?","startTime":114.76,"finishTime":118.05},{"text":"To be honest,","startTime":118.4,"finishTime":119},{"text":"I have","startTime":119.089,"finishTime":119.819},{"text":"454 to 6 glasses of orange juice a day,","startTime":120,"finishTime":123.22},{"text":"um.","startTime":123.639,"finishTime":124.029},{"text":"I have fruit for lunch and breakfast.","startTime":124.98,"finishTime":127.01},{"text":"I have uh.","startTime":127.43,"finishTime":128.55},{"text":"Usually","startTime":129.497,"finishTime":130.199},{"text":"1 to 2 servings of a vegetable","startTime":130.699,"finishTime":132.798},{"text":"like lettuce or broccoli with dinner.","startTime":133.619,"finishTime":135.339},{"text":"John,","startTime":136.24,"finishTime":136.399},{"text":"it's very important that you recognize that","startTime":136.47,"finishTime":138.699},{"text":"some fruits,","startTime":139,"finishTime":139.559},{"text":"but especially fruit juice,","startTime":139.639,"finishTime":140.759},{"text":"can contain a huge amount of calories.","startTime":140.88,"finishTime":142.82},{"text":"Did you know that","startTime":143.16,"finishTime":143.979},{"text":"a glass of orange juice has almost as many calories as a can of cola?","startTime":144.199,"finishTime":147.839},{"text":"No,","startTime":148.119,"finishTime":148.24},{"text":"I didn't know.","startTime":148.32,"finishTime":149.089},{"text":"Um,","startTime":149.669,"finishTime":149.679},{"text":"but doesn't the food pyramid classify","startTime":150,"finishTime":153.05},{"text":"fruit juice as a","startTime":153.38,"finishTime":154.32},{"text":"You're absolutely right,","startTime":155.66,"finishTime":156.85},{"text":"but keep in mind that the food pyramid is","startTime":156.97,"finishTime":159.11},{"text":"to be used as a guideline only.","startTime":159.369,"finishTime":161.11},{"text":"When it comes to nutrition,","startTime":161.33,"finishTime":162.21},{"text":"we have to have a more personalized approach.","startTime":162.289,"finishTime":164.27},{"text":"So I have a hunch,","startTime":164.729,"finishTime":165.449},{"text":"and that is","startTime":165.529,"finishTime":166.309},{"text":"the excess fruit","startTime":166.41,"finishTime":167.669},{"text":"that you are consuming","startTime":168.21,"finishTime":169.55},{"text":"probably caused your weight rebound.","startTime":170.089,"finishTime":171.88},{"text":"What's your impression?","startTime":172.089,"finishTime":173.02},{"text":"Well,","startTime":173.49,"finishTime":173.57},{"text":"this changes quite a bit.","startTime":173.61,"finishTime":174.77},{"text":"I mean,","startTime":174.889,"finishTime":175.05},{"text":"here I'm thinking that my fruit intake is","startTime":175.089,"finishTime":177.19},{"text":"making me healthier and it actually it's making me fatter.","startTime":177.57,"finishTime":179.94},{"text":"Indeed,","startTime":180.49,"finishTime":181.009},{"text":"let me ask you something.","startTime":181.139,"finishTime":182.009},{"text":"Knowing what you know now,","startTime":182.679,"finishTime":184.029},{"text":"how important is it to you","startTime":184.33,"finishTime":186.19},{"text":"to lose the weight","startTime":186.529,"finishTime":187.869},{"text":"by","startTime":188.059,"finishTime":188.589},{"text":"decreasing the amount of juice that you're currently taking in?","startTime":188.71,"finishTime":190.88},{"text":"Obviously I need to cut back on the fruit juice,","startTime":191.25,"finishTime":193.25},{"text":"but boy do I love that OJ.","startTime":193.36,"finishTime":194.63},{"text":"I understand.","startTime":195.369,"finishTime":196.089},{"text":"Let me ask you this.","startTime":196.369,"finishTime":197.47},{"text":"On a scale from 0 to 10,","startTime":197.809,"finishTime":199.49},{"text":"0 meaning that there's no way you can do it,","startTime":199.57,"finishTime":201.71},{"text":"and 10 meaning that you're 100% confident that you can do it.","startTime":202.369,"finishTime":205.77},{"text":"How confident are you that you'll be able to","startTime":206.679,"finishTime":208.94},{"text":"reduce the amount of juice you're currently taking in?","startTime":209.32,"finishTime":211.339},{"text":"Um,","startTime":211.759,"finishTime":212.05},{"text":"6 or 7.","startTime":212.44,"finishTime":213.479},{"text":"All right,","startTime":213.839,"finishTime":214},{"text":"so you're not a 0.","startTime":214.059,"finishTime":214.899},{"text":"So that tells me that you've got some confidence that this is doable,","startTime":215.66,"finishTime":218.429},{"text":"this is something you certainly can do.","startTime":218.47,"finishTime":220.21},{"text":"Why are you not a 0?","startTime":220.75,"finishTime":221.919},{"text":"I guess it's because I know that I need to do it to lose the weight.","startTime":222.149,"finishTime":225.27},{"text":"So you realize","startTime":225.47,"finishTime":226.649},{"text":"again that","startTime":226.99,"finishTime":227.809},{"text":"if you decrease the amount of juice you're taking in,","startTime":228.229,"finishTime":230.449},{"text":"you're going to decrease your weight,","startTime":230.789,"finishTime":232.029},{"text":"you're going to feel better,","startTime":232.19,"finishTime":233.22},{"text":"and you're going to impact your health positively.","startTime":233.55,"finishTime":235.85},{"text":"Yes,","startTime":236.61,"finishTime":236.759},{"text":"but you're also not a 10,","startTime":237.229,"finishTime":238.529},{"text":"and that tells me","startTime":238.779,"finishTime":239.61},{"text":"that","startTime":239.99,"finishTime":240.41},{"text":"there may be some obstacles to your success.","startTime":240.77,"finishTime":242.71},{"text":"What would it take for you to be a 10 or even an 8 or 9?","startTime":243.279,"finishTime":245.889},{"text":"Getting the fruit juice out of the house,","startTime":246.869,"finishTime":248.71},{"text":"cause I know if it's there,","startTime":248.789,"finishTime":249.669},{"text":"I'll drink it.","startTime":249.71,"finishTime":250.35},{"text":"My wife does the shopping for us,","startTime":251.289,"finishTime":252.729},{"text":"so","startTime":252.809,"finishTime":253.229},{"text":"maybe if I ask her not to get the juice,","startTime":253.649,"finishTime":255.529},{"text":"that would solve it.","startTime":255.639,"finishTime":256.369},{"text":"OK.","startTime":257.559,"finishTime":258.23},{"text":"Now,","startTime":258.809,"finishTime":259.01},{"text":"if the juice was still there,","startTime":259.13,"finishTime":261.399},{"text":"can you think of anything else you could do?","startTime":261.608,"finishTime":263.38},{"text":"I suppose I could replace it with,","startTime":264.799,"finishTime":267.04},{"text":"um,","startTime":267.049,"finishTime":267.39},{"text":"a low calorie drink or drink more water.","startTime":267.45,"finishTime":270.73},{"text":"Excellent.","startTime":271.39,"finishTime":271.97},{"text":"John,","startTime":272.51,"finishTime":272.709},{"text":"I get the impression","startTime":272.82,"finishTime":274.049},{"text":"that you want to stay on course","startTime":274.47,"finishTime":276.01},{"text":"with","startTime":276.369,"finishTime":276.85},{"text":"weight reduction,","startTime":277.029,"finishTime":277.769},{"text":"and the best way to do this will be","startTime":277.859,"finishTime":279.589},{"text":"to decrease the amount of juice that you're currently","startTime":279.589,"finishTime":282.489},{"text":"taking in.","startTime":282.75,"finishTime":283.41},{"text":"So,","startTime":283.869,"finishTime":283.98},{"text":"if I saw you in two weeks,","startTime":283.989,"finishTime":285.48},{"text":"And I asked you","startTime":286.2,"finishTime":287.609},{"text":"how much juice you're you're drinking","startTime":287.769,"finishTime":289.63},{"text":"and","startTime":290.01,"finishTime":290.67},{"text":"how you did it.","startTime":290.97,"finishTime":291.649},{"text":"What would you tell me?","startTime":292.529,"finishTime":293.369},{"text":"I'd say I didn't have any,","startTime":293.73,"finishTime":295.13},{"text":"and I substituted it with","startTime":295.17,"finishTime":297.23},{"text":"Sugar free drinks.","startTime":298.089,"finishTime":299.19},{"text":"Excellent.","startTime":299.769,"finishTime":300.369},{"text":"Well,","startTime":300.69,"finishTime":300.769},{"text":"it sounds like you have a plan.","startTime":300.809,"finishTime":302.17},{"text":"Same scale,","startTime":303.859,"finishTime":304.709},{"text":"0 to 10.","startTime":305.059,"finishTime":305.779},{"text":"How confident are you that","startTime":305.899,"finishTime":307.359},{"text":"you can","startTime":307.54,"finishTime":308.239},{"text":"make this happen?","startTime":309.179,"finishTime":309.88},{"text":"10.","startTime":310.019,"finishTime":310.38},{"text":"I agree.","startTime":311.29,"finishTime":312.029},{"text":"All right.","startTime":312.559,"finishTime":313.04},{"text":"Well,","startTime":313.25,"finishTime":313.329},{"text":"you,","startTime":313.41,"finishTime":313.489},{"text":"you know what,","startTime":313.57,"finishTime":313.929},{"text":"I'm not going to start any","startTime":314.01,"finishTime":315.39},{"text":"medications today.","startTime":316.079,"finishTime":316.709},{"text":"Your labs were a little bit off,","startTime":317.049,"finishTime":318.6},{"text":"but I think we can handle this from a purely lifestyle standpoint.","startTime":318.89,"finishTime":322.01},{"text":"What do you think?","startTime":322.17,"finishTime":322.829},{"text":"Great.","startTime":323.51,"finishTime":323.649},{"text":"Sounds good to me.","startTime":323.769,"finishTime":324.41},{"text":"Excellent.","startTime":324.48,"finishTime":324.809},{"text":"I'll see you in two weeks.","startTime":324.89,"finishTime":325.809}]},"thumbnail":"j9SSTFthTZxdWCXh5","videoSD":"fQnziQwn5aHyjj8yS"},"mEK976zWT7NrC8QZX":{"_id":"mEK976zWT7NrC8QZX","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1453248,"uploadedFileName":"Eric-en-SignatureRequirements-4142026.mp3","uploadedFileNameExtension":".mp3","duration":60.525},"dates":{"dateCreated":"2026-04-14T22:03:24.521Z","dateModified":"2026-04-14T22:03:26.962Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The individual’s signature, or the signature of their authorized representative, is required at key decision points, not just once. A signature is required when the plan is first developed, when it is updated, and when new services are added or existing services are changed in a way that’s expected to continue. This requirement protects the individual by confirming they understand the plan and had the opportunity to participate in decisions about their care. It also protects providers and case management agencies by documenting that services were authorized with the individual’s knowledge and agreement. Signatures don’t have to look the same for everyone. Some individuals may sign their name, some may use a mark or initials, and some may require accommodations. What matters is that the method used is appropriate and clearly documented. Without this documentation, the plan may not meet person‑centered or compliance expectations, even if the services themselves are appropriate.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"5Tn5B8sCAuCyYQ3bH","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">The individual’s signature, or the signature of their authorized representative, is required at key decision points, not just once. A signature is required when the plan is first developed, when it is updated, and when new services are added or existing services are changed in a way that’s expected to continue. This requirement protects the individual by confirming they understand the plan and had the opportunity to participate in decisions about their care. It also protects providers and case management agencies by documenting that services were authorized with the individual’s knowledge and agreement. Signatures don’t have to look the same for everyone. Some individuals may sign their name, some may use a mark or initials, and some may require accommodations. What matters is that the method used is appropriate and clearly documented. Without this documentation, the plan may not meet person‑centered or compliance expectations, even if the services themselves are appropriate.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The individual's signature or the signature of their authorized representative","startTime":0.079,"finishTime":4.349},{"text":"is required at key decision points,","startTime":4.489,"finishTime":6.559},{"text":"not just once.","startTime":6.809,"finishTime":7.769},{"text":"A signature is required when the plan is first developed,","startTime":8.649000000000001,"finishTime":11.609},{"text":"when it is updated,","startTime":11.818999999999999,"finishTime":12.85},{"text":"and when new services are added or existing services","startTime":13.06,"finishTime":15.939},{"text":"are changed in a way that's expected to continue.","startTime":15.939,"finishTime":18.45},{"text":"This requirement protects the individual by confirming they understand the plan","startTime":19.34,"finishTime":23.299},{"text":"and had the opportunity to participate in decisions about their care.","startTime":23.299,"finishTime":26.84},{"text":"It also protects providers and case management agencies by documenting","startTime":27.61,"finishTime":31.649},{"text":"that services were authorized with the individual's knowledge and agreement.","startTime":31.649,"finishTime":35.25},{"text":"Signatures don't have to look the same for everyone.","startTime":36.169,"finishTime":38.689},{"text":"Some individuals may sign their name,","startTime":39.639,"finishTime":41.639},{"text":"some may use a mark or initials,","startTime":41.919,"finishTime":43.709},{"text":"and some may require accommodations.","startTime":43.919,"finishTime":46.04},{"text":"What matters is that the method used is appropriate and clearly documented.","startTime":46.97,"finishTime":50.889},{"text":"Without this documentation,","startTime":51.77,"finishTime":53.36},{"text":"the plan may not meet person-centered or compliance expectations,","startTime":53.529,"finishTime":57.139},{"text":"even if the services themselves are appropriate.","startTime":57.33,"finishTime":59.759}]}},"n7jHrxyKCvdmT4C2Y":{"_id":"n7jHrxyKCvdmT4C2Y","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"hmoEW4p8RoaGLAgWG","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":792,"height":1080},"dates":{"dateCreated":"2025-05-20T16:37:03.171Z","dateModified":"2025-05-20T16:37:03.171Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"o54c5cQqLPu49Bpae":{"_id":"o54c5cQqLPu49Bpae","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1525138,"uploadedFileName":"Why-Care-Plan-and-Service-Plan-Alignment-Matters.png","heig l or unable to communicate.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Advanced care planning involves discussing and","startTime":0.009,"finishTime":2.519},{"text":"preparing for future medical decisions,","startTime":2.519,"finishTime":4.719},{"text":"including creating legal documents known as advanced","startTime":5.079,"finishTime":7.639},{"text":"directives to ensure medical treatment aligns with","startTime":7.639,"finishTime":10.399000000000001},{"text":"an individual's values and preferences if they","startTime":10.399000000000001,"finishTime":12.84},{"text":"become seriously ill or unable to communicate.","startTime":12.84,"finishTime":15.52}]}},"oRJoHGEuFACopqitz":{"_id":"oRJoHGEuFACopqitz","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1684800,"uploadedFileName":"Eric-en-PersonCenteredCarePlan-4152026.mp3","uploadedFileNameExtension":".mp3","duration":70.1625},"dates":{"dateCreated":"2026-04-15T16:20:37.629Z","dateModified":"2026-04-15T16:20:39.472Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Person Centered Care Plans are individualized, not cookie cutter. We want to examine the specific needs of the member and identify what barriers they might have toward meeting the goal. NCQA requires the identification of at least one barrier. That barrier could be a functional limitation, communication or cultural barrier, or a barrier based on poor decision making. Look at what are barriers for the member in relationship to their whole care plan not just limited to one specific goal. The same is true with identifying strengths. Everyone comes to our programs with certain strengths they have used to navigate their life up to this point. By helping members identify and build on these strengths, we empower them to shape meaningful goals and take ownership of their care journey. Care Plan goals are driven by the member and may or may not be medical in nature but whatever the goal it must be agreed to by the member. ​​It is important to involve the member’s chosen support team to the extent possible and with permission from the member.​​ For goals met with the use of waiver services it is important that the Person-Centered Care Plan and Waiver Service Plan align. ​​","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"Bj3TCihevYW2BJjFu","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Person Centered Care Plans are individualized, not cookie cutter. We want to examine the specific needs of the member and identify what barriers they might have toward meeting the goal. NCQA requires the identification of at least one barrier. That barrier could be a functional limitation, communication or cultural barrier, or a barrier based on poor decision making. Look at what are barriers for the member in relationship to their whole care plan not just limited to one specific goal. The same is true with identifying strengths. Everyone comes to our programs with certain strengths they have used to navigate their life up to this point. By helping members identify and build on these strengths, we empower them to shape meaningful goals and take ownership of their care journey. Care Plan goals are driven by the member and may or may not be medical in nature but whatever the goal it must be agreed to by the member. ​​It is important to involve the member’s chosen support team to the extent possible and with permission from the member.​​ For goals met with the use of waiver services it is important that the Person-Centered Care Plan and Waiver Service Plan align. ​​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Person-centered care plans are individualized,","startTime":0.09,"finishTime":2.509},{"text":"not cookie cutter.","startTime":2.849,"finishTime":3.89},{"text":"We want to examine the specific needs of the member and","startTime":4.73,"finishTime":7.42},{"text":"identify what barriers they might have toward meeting the goal.","startTime":7.42,"finishTime":10.52},{"text":"NCQA requires the identification of at least one barrier.","startTime":11.35,"finishTime":15.13},{"text":"That barrier could be a functional limitation,","startTime":16.01,"finishTime":18.36},{"text":"communication,","startTime":18.489,"finishTime":19.329},{"text":"or cultural barrier,","startTime":19.45,"finishTime":20.69},{"text":"or a barrier based on poor decision making.","startTime":20.819,"finishTime":23.29},{"text":"Look at what are barriers for the member in relationship to their whole care plan,","startTime":24.17,"finishTime":27.879},{"text":"not just limited to one specific goal.","startTime":27.969,"finishTime":30.18},{"text":"The same is true with identifying strengths.","startTime":30.95,"finishTime":33.49},{"text":"Everyone comes to our programs with certain strengths they have","startTime":34.4,"finishTime":37.209},{"text":"used to navigate their life up to this point.","startTime":37.209,"finishTime":39.49},{"text":"By helping members identify and build on these strengths,","startTime":40.38,"finishTime":43.33},{"text":"we empower them to shape meaningful goals and take ownership of their care journey.","startTime":43.54,"finishTime":47.72},{"text":"Care plan goals are driven by the member and may or may not be medical in nature,","startTime":48.639,"finishTime":52.88},{"text":"but whatever the goal,","startTime":52.99,"finishTime":53.83},{"text":"it must be agreed to by the member.","startTime":53.84,"finishTime":55.56},{"text":"It is important to involve the member's chosen support team","startTime":56.33,"finishTime":59.389},{"text":"to the extent possible and with permission from the member.","startTime":59.389,"finishTime":62.069},{"text":"For goals met with the use of waiver services,","startTime":62.979,"finishTime":65.26},{"text":"it is important that the person-centered care plan and waiver service plan align.","startTime":65.319,"finishTime":69.419}]}},"oWxYoh3mMj6xmbXp2":{"_id":"oWxYoh3mMj6xmbXp2","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1588608,"uploadedFileName":"Eric-en-PrivateDutyNursinginthePCSP-4152026.mp3","uploadedFileNameExtension":".mp3","duration":66.1625},"dates":{"dateCreated":"2026-04-15T16:18:28.314Z","dateModified":"2026-04-15T16:18:30.425Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Private Duty Nursing, or PDN, is special topic for how it fits into the Person‑Centered Service Plan. Private Duty Nursing is a state plan service, and because of that, it’s easy to assume it sits outside of person‑centered planning. But that assumption can create risk. Even though Private Duty Nursing is authorized through the state plan, it still must be reflected in the Person Centered Service Plan. The Care Plan should explain why private duty nursing is needed what medical or functional needs it supports and how it helps maintain health and safety. The Service Plan must then clearly show that Private Duty Nursing is an authorized service: who is providing it, how often, and during what time period. When Private Duty Nursing is provided but not documented in the Person Centered Service Plan, those services can later be viewed as unauthorized during audits even if the nursing care itself was appropriate and necessary. Including Private Duty Nursing in the Person Centered Service Plan ensures that all services supporting the individual are visible, coordinated, and defensible.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"BHXKTNEaLC7poXwYd","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Private Duty Nursing, or PDN, is special topic for how it fits into the Person‑Centered Service Plan. Private Duty Nursing is a state plan service, and because of that, it’s easy to assume it sits outside of person‑centered planning. But that assumption can create risk. Even though Private Duty Nursing is authorized through the state plan, it still must be reflected in the Person Centered Service Plan. The Care Plan should explain why private duty nursing is needed what medical or functional needs it supports and how it helps maintain health and safety. The Service Plan must then clearly show that Private Duty Nursing is an authorized service: who is providing it, how often, and during what time period. When Private Duty Nursing is provided but not documented in the Person Centered Service Plan, those services can later be viewed as unauthorized during audits even if the nursing care itself was appropriate and necessary. Including Private Duty Nursing in the Person Centered Service Plan ensures that all services supporting the individual are visible, coordinated, and defensible.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Private duty nursing or PDN","startTime":0.009,"finishTime":2.46},{"text":"is a special topic for how it fits into the person-centered service plan.","startTime":2.65,"finishTime":6.269},{"text":"Private duty nursing is a state planned service,","startTime":7.219,"finishTime":9.949},{"text":"and because of that,","startTime":10.13,"finishTime":11.13},{"text":"it's easy to assume it sits outside of person-centered planning.","startTime":11.289,"finishTime":14.649000000000001},{"text":"But that assumption can create risk.","startTime":15.449,"finishTime":17.459},{"text":"Even though private duty nursing is authorized through the state plan,","startTime":18.28,"finishTime":21.84},{"text":"it still must be reflected in the person-centered service plan.","startTime":22,"finishTime":25.19},{"text":"The care plan should explain why private duty nursing is needed,","startTime":26.04,"finishTime":29.25},{"text":"what medical or functional needs it supports,","startTime":29.329,"finishTime":31.53},{"text":"and how it helps maintain health and safety.","startTime":31.569,"finishTime":33.83},{"text":"The service plan must then clearly show that","startTime":34.639,"finishTime":37.119},{"text":"private duty nursing is an authorized service,","startTime":37.119,"finishTime":39.639},{"text":"who is providing it,","startTime":39.919,"finishTime":40.959},{"text":"how often,","startTime":41.159,"finishTime":41.9},{"text":"and during what time period.","startTime":41.959,"finishTime":43.459},{"text":"When private duty nursing is provided but","startTime":44.47,"finishTime":46.669},{"text":"not documented in the person-centered service plan,","startTime":46.669,"finishTime":49.299},{"text":"those services can later be viewed as unauthorized during audits","startTime":49.549,"finishTime":52.79},{"text":"even if the nursing care itself was appropriate and necessary.","startTime":52.79,"finishTime":55.689},{"text":"Including private duty nursing in the person centered service plan","startTime":56.689,"finishTime":60.369},{"text":"ensures that all services supporting the individual are visible,","startTime":60.369,"finishTime":63.439},{"text":"coordinated,","startTime":63.65,"finishTime":64.379},{"text":"and defensible.","startTime":64.489,"finishTime":65.43}]}},"p7FmE3x22gzF9ufAQ":{"_id":"p7FmE3x22gzF9ufAQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":34583,"uploadedFileName":"Constructing-a-Care-Plan.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-17T14:27:24.380Z","dateModified":"2026-04-17T14:27:24.380Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"Bm4hsAcHFhcxNHw4G","thumbnail":"TGD33SjS6ya2PB2K5"},"qrNYhw5muaQhFyEie":{"_id":"qrNYhw5muaQhFyEie","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"Y4ui3ZHqB7jTdmddP","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":1422,"height":795},"dates":{"dateCreated":"2025-05-20T16:37:02.917Z","dateModified":"2025-05-20T16:37:02.917Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"rZ89rvnH4aewY3DsR":{"_id":"rZ89rvnH4aewY3DsR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":96768,"uploadedFileName":"Eric-en-Section1-4172026.mp3","uploadedFileNameExtension":".mp3","duration":4},"dates":{"dateCreated":"2026-04-17T14:35:05.592Z","dateModified":"2026-04-17T14:35:06.878Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Section one looks at what person centered care plans are.","voiceCode":"en-US-EricNeural","language":"en"
