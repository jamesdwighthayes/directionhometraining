 member has successfully made changes in the management of their medical condition or illness and continually works to prevent a relapse. The maintenance stage begins when the change is sustained for greater than six months.\nA relapse may occur at any stage where a change is not sustained over time. Relapses are a natural part of the change process. Waiver service coordinator can intervene to focus members on their motivation to change, encourage their plans, support their behavior change, and prevent relapse.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"53WH4wuLTu7wZyNPR","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">There are five steps in the stages of change model. \u003cbreak time=\"0.5s\"/>In the first step precontemplation, the Member is not thinking about changing the way they manage their medical condition or illness and is not making any changes.\u003cbreak time=\"0.5s\"/>In contemplation the member is seriously thinking about changing the way they manage their medical condition or illness but has not made a commitment.\u003cbreak time=\"0.5s\"/>In the preparation stage, the member reports small changes in the way they manage their medical condition or illness. This stage is the decision making stage and involves plans to begin a new behavior.\u003cbreak time=\"0.5s\"/>The action stage sees the member actively involved in the process of changing the way they manage their medical condition or illness.\u003cbreak time=\"0.5s\"/>Finally, the maintenance stage is where the member has successfully made changes in the management of their medical condition or illness and continually works to prevent a relapse. The maintenance stage begins when the change is sustained for greater than six months.\u003cbreak time=\"0.5s\"/>A relapse may occur at any stage where a change is not sustained over time. Relapses are a natural part of the change process. Waiver service coordinator can intervene to focus members on their motivation to change, encourage their plans, support their behavior change, and prevent relapse.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"There are 5 steps in the stages of change model.","startTime":0.129,"finishTime":2.95},{"text":"In the first step pre-contemplation,","startTime":4.199,"finishTime":6.19},{"text":"the member is not thinking about changing the way they manage","startTime":6.36,"finishTime":9.159},{"text":"their medical condition or illness and is not making any changes.","startTime":9.159,"finishTime":12.64},{"text":"In contemplation,","startTime":13.949,"finishTime":14.899000000000001},{"text":"the member is seriously thinking about changing the","startTime":14.949,"finishTime":17.34},{"text":"way they manage their medical condition or illness,","startTime":17.34,"finishTime":19.75},{"text":"but has not made a commitment.","startTime":19.829,"finishTime":21.229},{"text":"In the preparation stage,","startTime":22.52,"finishTime":23.979},{"text":"the member reports small changes in the way","startTime":24.28,"finishTime":26.399},{"text":"they manage their medical condition or illness.","startTime":26.399,"finishTime":28.799},{"text":"This stage is the decision making stage and involves plans to begin a new behavior.","startTime":29.739,"finishTime":34.24},{"text":"The action stage sees the member actively involved in the process","startTime":35.52,"finishTime":39.159},{"text":"of changing the way they manage their medical condition or illness.","startTime":39.159,"finishTime":42.38},{"text":"Finally,","startTime":43.86,"finishTime":44.439},{"text":"the maintenance stage is where the member","startTime":44.619,"finishTime":46.34},{"text":"has successfully made changes in the management","startTime":46.34,"finishTime":48.599},{"text":"of their medical condition or illness and continually works to prevent a relapse.","startTime":48.599,"finishTime":52.72},{"text":"The maintenance stage begins when the change","startTime":53.56,"finishTime":55.74},{"text":"is sustained for greater than 6 months.","startTime":55.74,"finishTime":57.979},{"text":"A relapse may occur at any stage where a change is not sustained over time.","startTime":59.27,"finishTime":63.65},{"text":"Relapses are a natural part of the change process.","startTime":64.509,"finishTime":67.429},{"text":"Waiver service coordinator can intervene to focus","startTime":68.4,"finishTime":71.04},{"text":"members on their motivation to change,","startTime":71.04,"finishTime":73.019},{"text":"encourage their plans,","startTime":73.23,"finishTime":74.54},{"text":"support their behavior change,","startTime":74.919,"finishTime":76.269},{"text":"and prevent relapse.","startTime":76.44,"finishTime":77.639}]}},"sM9yCsvFyCoPEwrZf":{"_id":"sM9yCsvFyCoPEwrZf","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1883610,"uploadedFileName":"PersonCentered-Service-Plan-PCSP-Signatures-Agreement-Consent-and-Accountability.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-14T20:03:01.090Z","dateModified":"2026-04-14T20:03:01.090Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"iZ8CoauLRge2DLsdY","thumbnail":"ApA33yXiY2LFRa4Bj"},"t9tmjdoceYwNMNhBr":{"_id":"t9tmjdoceYwNMNhBr","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":362304,"uploadedFileName":"Eric-en-Definitions-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":15.0625},"date uiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"bDRwd5sq8NiBSpJES","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":1680,"height":358},"dates":{"dateCreated":"2025-05-20T16:37:04.691Z","dateModified":"2025-05-20T16:37:04.691Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"toNKqZC8G2HSpBGMo":{"_id":"toNKqZC8G2HSpBGMo","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1222272,"uploadedFileName":"Eric-en-CarePlanvsServicePlan-4152026.mp3","uploadedFileNameExtension":".mp3","duration":50.8875},"dates":{"dateCreated":"2026-04-15T16:19:35.682Z","dateModified":"2026-04-15T16:19:37.717Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The Person Centered Service Plan is not a single document it’s made up of two connected parts: the Care Plan and the Service Plan. The Care Plan tells the story. It describes the individual’s needs, goals, risks, preferences, supports, and what is important to them. It includes formal services, informal supports, and community resources. The Service Plan is where authorization happens. It lists the services that are approved, who provides them, how often they’re delivered, and what funding source pays for them. Together, these pieces answer two critical questions: what matters to the person — and how services are authorized to support that. When both pieces are aligned, the Person Centered Service Plan clearly shows person‑centered decision‑making and compliance.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"vw9AwfhiCYr8XWLbi","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">The Person Centered Service Plan is not a single document it’s made up of two connected parts: the Care Plan and the Service Plan. The Care Plan tells the story. It describes the individual’s needs, goals, risks, preferences, supports, and what is important to them. It includes formal services, informal supports, and community resources. The Service Plan is where authorization happens. It lists the services that are approved, who provides them, how often they’re delivered, and what funding source pays for them. Together, these pieces answer two critical questions: what matters to the person — and how services are authorized to support that. When both pieces are aligned, the Person Centered Service Plan clearly shows person‑centered decision‑making and compliance.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The person-centered service plan is not a single document,","startTime":0.05,"finishTime":3.009},{"text":"it's made up of two connected parts,","startTime":3.089,"finishTime":4.969},{"text":"the care plan and the service plan.","startTime":5.21,"finishTime":7.09},{"text":"The care plan tells the story.","startTime":7.889,"finishTime":9.77},{"text":"It describes the individual's needs,","startTime":10.539,"finishTime":12.579},{"text":"goals,","startTime":12.818999999999999,"finishTime":13.26},{"text":"risks,","startTime":13.449,"finishTime":13.89},{"text":"preferences,","startTime":14.1,"finishTime":14.81},{"text":"supports,","startTime":15.26,"finishTime":15.659},{"text":"and what is important to them.","startTime":15.859,"finishTime":17.34},{"text":"It includes formal services,","startTime":18.1,"finishTime":19.86},{"text":"informal supports,","startTime":20.02,"finishTime":21.17},{"text":"and community resources.","startTime":21.329,"finishTime":22.819},{"text":"The service plan is where authorization happens.","startTime":23.649,"finishTime":26.329},{"text":"It lists the services that are approved,","startTime":27.149,"finishTime":29.35},{"text":"who provides them,","startTime":29.549,"finishTime":30.469},{"text":"how often they're delivered,","startTime":30.709,"finishTime":31.899},{"text":"and what funding source pays for them.","startTime":32.11,"finishTime":33.99},{"text":"Together,","startTime":34.849,"finishTime":35.349},{"text":"these pieces answer two critical questions","startTime":35.61,"finishTime":38.15},{"text":"what matters to the person","startTime":38.34,"finishTime":39.59},{"text":"and how services are authorized to support that?","startTime":39.939,"finishTime":42.529},{"text":"When both pieces are aligned,","startTime":43.389,"finishTime":45.02},{"text":"the person-centered service plan clearly shows","startTime":45.189,"finishTime":47.669},{"text":"person-centered decision making and compliance.","startTime":47.669,"finishTime":50.069}]}},"vPsQ4GczgjXfnPFvk":{"_id":"vPsQ4GczgjXfnPFvk","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1596672,"uploadedFileName":"Eric-en-Starting the Conversation-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":66.5},"dates":{"dateCreated":"2025-06-06T18:59:24.149Z","dateModified":"2025-06-06T18:59:27.134Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Starting an advanced care planning conversation can feel overwhelming, but it's an important step in ensuring member's wishes are honored. Here’s how to begin:​​\nReflect on their Values – Have members Consider what matters most to them regarding medical care. Do they prioritize comfort, longevity, or specific treatments?​​\nTalk to Loved Ones – Have members share their thoughts with family, close friends, or a healthcare provider. Having open conversations can help them understand their preferences.​​\nChoose a Healthcare Proxy – Have member select someone they trust to make medical decisions on their behalf should members be unable to communicate.​​\nDocument Wishes – Guide members to create advance directives like a living will or a durable power of attorney for health care. These legal documents clarify member preferences.​​\nReview and Update – Member wishes may change over time, so it's good to revisit their plan periodically.​​\nCare Coordinator should offer resources to members on Advanced Care Planning​ ​","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"xPedLZpmx8CdBuecD","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Starting an advanced care planning conversation can feel overwhelming, but it's an important step in ensuring member's wishes are honored. Here’s how to begin:​​\u003cbreak time=\"0.5s\"/>Reflect on their Values – Have members Consider what matters most to them regarding medical care. Do they prioritize comfort, longevity, or specific treatments?​​\u003cbreak time=\"0.5s\"/>Talk to Loved Ones – Have members share their thoughts with family, close friends, or a healthcare provider. Having open conversations can help them understand their preferences.​​\u003cbreak time=\"0.5s\"/>Choose a Healthcare Proxy – Have member select someone they trust to make medical decisions on their behalf should members be unable to communicate.​​\u003cbreak time=\"0.5s\"/>Document Wishes – Guide members to create advance directives like a living will or a durable power of attorney for health care. These legal documents clarify member preferences.​​\u003cbreak time=\"0.5s\"/>Review and Update – Member wishes may change over time, so it's good to revisit their plan periodically.​​\u003cbreak time=\"0.5s\"/>Care Coordinator should offer resources to members on Advanced Care Planning​ ​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Starting an advanced care planning conversation can feel overwhelming,","startTime":0.159,"finishTime":3.8289999999999997},{"text":"but it's an important step in ensuring members' wishes are honored.","startTime":4.038,"finishTime":7.159},{"text":"Here's how to begin.","startTime":8.1,"finishTime":9.329},{"text":"Reflect on their values.","startTime":9.85,"finishTime":11.14},{"text":"Have members consider what matters most to them regarding medical care.","startTime":11.26,"finishTime":14.85},{"text":"Do they prioritize comfort,","startTime":15.649000000000001,"finishTime":17.34},{"text":"longevity,","startTime":17.54,"finishTime":18.159},{"text":"or specific treatments?","startTime":18.299,"finishTime":19.7},{"text":"Talk to loved ones,","startTime":21.1,"finishTime":22.379},{"text":"have members share their thoughts with family,","startTime":22.51,"finishTime":24.729},{"text":"close friends,","startTime":24.94,"finishTime":25.729},{"text":"or a healthcare provider.","startTime":25.899,"finishTime":27.29},{"text":"Having open conversations can help them understand their preferences.","startTime":28.2,"finishTime":31.719},{"text":"Choose a healthcare proxy.","startTime":33.029,"finishTime":34.639},{"text":"Have members select someone they trust to make medical decisions","startTime":34.849,"finishTime":37.849},{"text":"on their behalf should members be unable to communicate.","startTime":37.849,"finishTime":40.56},{"text":"Document wishes guide members to create advanced directives like a living","startTime":41.93,"finishTime":45.93},{"text":"will or a durable power of attorney for health care.","startTime":45.93,"finishTime":48.72},{"text":"These legal documents clarify member preferences.","startTime":49.639,"finishTime":52.599},{"text":"Review and update","startTime":54.06,"finishTime":55.29},{"text":"member wishes may change over time,","startTime":55.54,"finishTime":57.529},{"text":"so it's good to revisit their plan periodically.","startTime":57.779,"finishTime":60.259},{"text":"Care coordinators should offer resources to members on advanced care planning.","startTime":61.689,"finishTime":65.69}]}},"vS6WZane6g45qGF9f":{"_id":"vS6WZane6g45qGF9f","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1720512,"uploadedFileName":"Eric-en-Care Plan Development-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":71.65},"dates":{"dateCreated":"2025-06-06T15:30:10.353Z","dateModified":"2025-06-06T15:30:13.378Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"\"As we develop care plans with members, these are key areas that often lead to meaningful, person-centered goals.\nFirst, we consider communication and cultural factors—understanding a member’s language preferences, cultural background, and how they prefer to communicate can significantly impact how care is delivered and received.\nNext, we look at personal preferences and support networks. This includes who the member wants involved in their care, where they prefer to live, and how they want to make decisions.\nWe also assess health and wellbeing, including both physical and behavioral health needs. This is where Advance Care Planning becomes especially important—ensuring we understand and document the member’s wishes for future care.\nFinally, we explore life enrichment—what brings meaning and joy to the member’s life, such as community involvement, work, volunteering, or learning opportunities.\nIt’s important to remember that care planning meetings should be timely and held at times and locations that are convenient for the member. This supports true person-centered engagement and respects their autonomy.\"","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"BmyLEBYmwuBEL3cuT","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">\"As we develop care plans with members, these are key areas that often lead to meaningful, person-centered goals.\u003cbreak time=\"0.5s\"/>First, we consider communication and cultural factors—understanding a member’s language preferences, cultural background, and how they prefer to communicate can significantly impact how care is delivered and received.\u003cbreak time=\"0.5s\"/>Next, we look at personal preferences and support networks. This includes who the member wants involved in their care, where they prefer to live, and how they want to make decisions.\u003cbreak time=\"0.5s\"/>We also assess health and wellbeing, including both physical and behavioral health needs. This is where Advance Care Planning becomes especially important—ensuring we understand and document the member’s wishes for future care.\u003cbreak time=\"0.5s\"/>Finally, we explore life enrichment—what brings meaning and joy to the member’s life, such as community involvement, work, volunteering, or learning opportunities.\u003cbreak time=\"0.5s\"/>It’s important to remember that care planning meetings should be timely and held at times and locations that are convenient for the member. This supports true person-centered engagement ment,","startTime":53.569,"finishTime":55.159},{"text":"work,","startTime":55.369,"finishTime":55.84},{"text":"volunteering,","startTime":55.97,"finishTime":56.799},{"text":"or learning opportunities.","startTime":56.93,"finishTime":58.4},{"text":"It's important to remember that care planning meetings should be timely and","startTime":59.7,"finishTime":63.09},{"text":"held at times and locations that are convenient for the member.","startTime":63.09,"finishTime":66.16},{"text":"This supports true person centered engagement and respects their autonomy.","startTime":67.04,"finishTime":70.839}]}},"wGh4G6h3q8QAXnjCY":{"_id":"wGh4G6h3q8QAXnjCY","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":45196,"uploadedFileName":"Foundations-of-Person-Centered-Care-Planning.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-16T12:56:29.487Z","dateModified":"2026-04-16T12:56:29.487Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"jxyuzuYjrg8j82CBg","thumbnail":"ieiEKxEdp4idWXPgh"},"x2PAufRE7yFSqmR7e":{"_id":"x2PAufRE7yFSqmR7e","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":434304,"uploadedFileName":"Eric-en-SMART Goal Conversation Starters-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":18.0625},"dates":{"dateCreated":"2025-06-06T19:02:37.798Z","dateModified":"2025-06-06T19:02:39.401Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Many times, it is difficult to create goals with members. There are many things that can provide barriers to goal conversations including language, educational level or just the fact they have never set a goal before to name a few. Here are some ideas of how to get the conversation started.​​","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"zm5sqYkdmJKRTifcQ","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Many times, it is difficult to create goals with members. There are many things that can provide barriers to goal conversations including language, educational level or just the fact they have never set a goal before to name a few. Here are some ideas of how to get the conversation started.​​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Many times it is difficult to create goals with members.","startTime":0.129,"finishTime":3.64},{"text":"There are many things that can provide barriers to goal conversations,","startTime":4.44,"finishTime":8.09},{"text":"including language,","startTime":8.109,"finishTime":8.939},{"text":"educational level,","startTime":9.35,"finishTime":10.119},{"text":"or just the fact they have never set a goal before to name a few.","startTime":10.229,"finishTime":13.47},{"text":"Here are some ideas of how to get the conversation started.","startTime":14.38,"finishTime":17.239}]}},"x8YfG4ueCneiuJJt4":{"_id":"x8YfG4ueCneiuJJt4","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1520064,"uploadedFileName":"Eric-en-AuditReviewersPerspective-4152026.mp3","uploadedFileNameExtension":".mp3","duration":63.3},"dates":{"dateCreated":"2026-04-15T15:10:41.560Z","dateModified":"2026-04-15T15:10:45.571Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"A useful perspective is to take a look at the Person‑Centered Service Plan through an audit reviewer’s lens. Reviewers are not trying to interpret intent, guess meanings, or fill in gaps. They look at what is documented and only what is documented. Reviewers consistently focus on three questions. First: were the services authorized? Second: are those services supported by clearly documented needs, risks, or goals in the Care Plan? And third, do the Care Plan and Service Plan tell the same story? If information is missing, inconsistent, or unclear, reviewers don’t assume it exists somewhere else. They rely on what’s in front of them. This doesn’t mean providers or case managers were wrong it means the documentation didn’t clearly support what occurred. Writing with the reviewer in mind doesn’t make planning less person centered. It actually protects the individual, the provider, and the system by making decisions clear and defensible.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"9nFJcFceRecWJ2GGM","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">A useful perspective is to take a look at the Person‑Centered Service Plan through an audit reviewer’s lens. Reviewers are not trying to interpret intent, guess meanings, or fill in gaps. They look at what is documented and only what is documented. Reviewers consistently focus on three questions. First: were the services authorized? Second: are those services supported by clearly documented needs, risks, or goals in the Care Plan? And third, do the Care Plan and  the Waiver Service Coordinator to understand where the member is in the Stages of Change Model. Also known as the transtheoretical model, the stages of change model allows the waiver service coordinator to guide members through the stages until their desired change is achieved.\nWe will review the five steps in the stages of change model, Precontemplation, contemplation, preparation, action, and maintenance.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"iodMionASRnX63ZAQ","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">The use of Motivational Interviewing allows the Waiver Service Coordinator to understand where the member is in the Stages of Change Model. Also known as the transtheoretical model, the stages of change model allows the waiver service coordinator to guide members through the stages until their desired change is achieved.\u003cbreak time=\"0.5s\"/>We will review the five steps in the stages of change model, Precontemplation, contemplation, preparation, action, and maintenance.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The use of motivational interviewing allows the waiver service coordinator to","startTime":0.029,"finishTime":4.28},{"text":"understand where the member is in the stages of change model.","startTime":4.28,"finishTime":6.909},{"text":"Also known as the trans theoretical model,","startTime":7.84,"finishTime":10.069},{"text":"the stages of change model allows the waiver service coordinator to","startTime":10.27,"finishTime":13.72},{"text":"guide members through the stages until their desired change is achieved.","startTime":13.72,"finishTime":17.36},{"text":"We will review the 5 steps in the stages of change model,","startTime":18.69,"finishTime":22.02},{"text":"pre-contemplation,","startTime":22.19,"finishTime":23.299},{"text":"contemplation,","startTime":23.51,"finishTime":24.389},{"text":"preparation,","startTime":24.51,"finishTime":25.34},{"text":"action,","startTime":25.469,"finishTime":26.01},{"text":"and maintenance.","startTime":26.11,"finishTime":26.94}]}},"yLh7wgzfoyCpPRYGA":{"_id":"yLh7wgzfoyCpPRYGA","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1796544,"uploadedFileName":"Eric-en-Care Coordinator Steps for SMART-6/18/2025.mp3","uploadedFileNameExtension":".mp3","duration":74.8125},"dates":{"dateCreated":"2025-06-18T16:05:59.037Z","dateModified":"2025-06-18T16:06:01.417Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"As care coordinators, your role is essential in helping members not only set SMART goals—but actually achieve them.\nFirst, start by exploring what matters most to the member. Use open-ended questions to help them define a goal that’s meaningful and specific to their life.\nThen, work together to shape the goal using the SMART framework—making sure it’s measurable, attainable, relevant, and time-bound.\nOnce the goal is defined, identify what supports are needed. This could include formal services, informal caregivers, or community resources.\nBreak the goal into small, manageable action steps. Assign responsibilities so the member knows what to expect.\nMonitor progress regularly. Celebrate wins, troubleshoot barriers, and adjust the plan if the member’s needs change.\nAnd finally, document everything clearly. Your notes should reflect the member’s voice, the supports in place, and how the plan is evolving over time.\nThese steps ensure that SMART goals are not just written down—but lived out in a way that’s empowering and person-centered.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"Kg2dtE6gz8HHzqfmT","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">As care coordinators, your role is essential in helping members not only set SMART goals—but actually achieve them.\u003cbreak time=\"0.5s\"/>First, start by exploring what matters most to the member. Use open-ended questions to help them define a goal that’s meaningful and specific to their life.\u003cbreak time=\"0.5s\"/>Then, work together to shape the goal using the SMART framework—making sure it’s measurable, attainable, relevant, and time-bound.\u003cbreak time=\"0.5s\"/>Once the goal is defined, identify what supports are needed. This could include formal services, informal caregivers, or community resources.\u003cbreak time=\"0.5s\"/>Break the goal into small, manageable action steps. Assign responsibilities so the member knows what to expect.\u003cbreak time=\"0.5s\"/>Monitor progress regularly. Celebrate wins, troubleshoot barriers, and adjust the plan if the member’s needs change.\u003cbreak time=\"0.5s\"/>And finally, document everything clearly. Your notes should reflect the member’s voice, the supports in place, and how the plan is evolving over time.\u003cbreak time=\"0.5s\"/>These steps ensure that SMART goals are not just written down—but lived out in a way that’s empowering and person-centered.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"As care coordinators,","startTime":0.029,"finishTime":1.429},{"text":"your role is essential in helping members not only set smart goals,","startTime":1.5590000000000002,"finishTime":5.5 ime=\"0.5s\"/>Finally, Care Coordinators must support Regular Review and Revision. Advance directives should be revisited regularly—especially after major health changes or serious medical events. Care Coordinators should also help members reassess their chosen healthcare proxy or guardian to ensure that person is still available and appropriate.\u003cbreak time=\"0.5s\"/>For additional tools and resources, visit the Advance Directives Toolkit provided by Pro Seniors at the web address below.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"A practical checklist for care coordinators to","startTime":0.029,"finishTime":2.64},{"text":"follow when supporting members with advanced directives.","startTime":2.64,"finishTime":5.36},{"text":"These steps help ensure that members' rights,","startTime":6.26,"finishTime":8.659},{"text":"preferences,","startTime":8.779,"finishTime":9.568999999999999},{"text":"and safety are respected,","startTime":9.699,"finishTime":11.21},{"text":"especially during times when they may not be able to speak for themselves.","startTime":11.568999999999999,"finishTime":14.97},{"text":"The first step is to inform and educate.","startTime":16.318,"finishTime":18.729},{"text":"Care coordinators play a key role in","startTime":19.569,"finishTime":22.01},{"text":"helping members understand what advanced directives are,","startTime":22.01,"finishTime":24.879},{"text":"why they matter,","startTime":25.09,"finishTime":25.85},{"text":"and how they can protect their rights.","startTime":26.049,"finishTime":27.729},{"text":"Care coordinators should provide clear explanations and offer","startTime":28.659,"finishTime":32.06},{"text":"resources to help members make informed decisions.","startTime":32.06,"finishTime":34.659},{"text":"Next,","startTime":36.08,"finishTime":36.479},{"text":"we need to document and disseminate.","startTime":36.7,"finishTime":38.59},{"text":"If a member has completed advanced directive do
