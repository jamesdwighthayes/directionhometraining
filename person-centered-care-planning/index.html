ght":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":16}},"start":42.5,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Member Statement:\u003c/strong>\u003cbr />\n\u003cem>&ldquo;I get depressed and miss working. &nbsp;I know I have limitations but I would like to try to do something&rdquo;\u003c/em>\u003c/div>\n\n\u003cdiv>\u003cstrong>SMART Goal:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\u003cstrong>Specific:\u003c/strong>&nbsp;Member wants to try to find a job she could do a few hours a week outside the home but not lose waiver services.&nbsp;\u003c/li>\n\t\u003cli>\u003cstrong>Measurable:\u003c/strong>&nbsp;Member will work 10-15 hours per week at a job suitable to her abilities.\u003c/li>\n\t\u003cli>\u003cstrong>Attainable:\u003c/strong>&nbsp;\n\t\u003cul>\n\t\t\u003cli>Member will make a list of employable skills i.e. typing, customer service\u003c/li>\n\t\t\u003cli>Member will make a list of limitations i.e. limited standing\u003c/li>\n\t\t\u003cli>Member will utilize Adult Job employment services at Job and Family Services &nbsp;with assistance from Care Coordinator\u003c/li>\n\t\t\u003cli>Member will apply for jobs meeting their skill set and go for interviews\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\t\u003cli>\u003cstrong>Relevant:\u003c/strong>&nbsp;Member gets depressed and misses working. She wants to get out of the house.\u003c/li>\n\t\u003cli>\u003cstrong>Time-Bound:\u003c/strong>&nbsp;Will have a job of her choosing in the next 6 months. Progression and self management toward above goal will be monitored.\u003c/li>\n\u003c/ul>\n\n\u003cdiv>\u003cstrong>Action Steps:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>Update resume with help from a local job center by next Friday.\u003c/li>\n\t\u003cli>Search for job openings online and in community spaces.\u003c/li>\n\t\u003cli>Submit one application per week for the next three weeks.\u003c/li>\n\u003c/ul>\n","rotationAngle":0,"duration":37.5},{"identifier":"gYZQAtGTz2i2mFxaE","kind":"overlay","type":"rectangle","width":1159,"height":692,"x":61,"y":16,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.5,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"start":81.4,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Member Statement:\u003c/strong>\u003cbr />\n\u003cem>&ldquo;I&#39;d like to be able to attend my granddaughter&#39;s wedding in February&rdquo;\u003c/em>\u003c/div>\n\n\u003cdiv>\u003cstrong>SMART Goal:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\u003cstrong>Specific:\u003c/strong>&nbsp;Sally wants to attend her grand-daughter&#39;s wedding in February.\u003c/li>\n\t\u003cli>\u003cstrong>Measurable:\u003c/strong>&nbsp;Sally will attend her grand-daughter&#39;s wedding.\u003c/li>\n\t\u003cli>\u003cstrong>Attainable:\u003c/strong>&nbsp;\n\t\u003cul>\n\t\t\u003cli>Sally will start walking everyday with her aide in the hallways of her building.\u003c/li>\n\t\t\u003cli>Sally will go to the exercise class offered in the building weekly.\u003c/li>\n\t\t\u003cli>Sally will discuss with her doctor her goal and be assessed for the need for physical therapy.\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\t\u003cli>\u003cstrong>Relevant:\u003c/strong>&nbsp;&quot;My grand-daughter is so important to me and I really want to be at her wedding&quot;.\u003c/li>\n\t\u003cli>\u003cstrong>Time-Bound:\u003c/strong>&nbsp;Goal will be met in 6 months. Progression and self management toward above goal will be monitored.\u003c/li>\n\u003c/ul>\n","rotationAngle":0,"duration":32.599999999999994},{"identifier":"ATqDBgtoaNgABYQ92","kind":"overlay","type":"rectangle","width":1102,"height":667,"x":89,"y":18,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.5,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"start":114.8,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>SMART Goal:\u003c/strong>\u003cbr />\n\u003cem>&ldquo;I want to prepare my own breakfast three times a week for the next two months to increase my independence at home.&rdquo;\u003c/em>\u003c/div>\n\n\u003cdiv>\u003cstrong>Why It&rsquo;s SMART:\u003c/strong>\u003c/div>\n\n\u003cul>\n\t\u003cli>\u003cstrong>Specific:\u003c/strong>&nbsp;Preparing breakfast independently.\u003c/li>\n\t\u003cli>\u003cstrong>Measurable:\u003c/strong>&nbsp;Three times per week.\u003c/li>\n\t\u003cli>\u003cstrong>Attainable:\u003c/strong>&nbsp;Member has access to a kitchen and basic cooking skills.\n\t\u003cul>\n\t\t\u003cli>\n\t\t\u003cdiv>\u003cstrong>Action Steps:\u003c/strong>\u003c/div>\n\n\t\t\u003cul>\n\t\t\t\u003cli>Identify three simple breakfast meals the member enjoys and can prepare.\u003c/li>\n\t\t\t\u003cli>Create a grocery list and shop weekly with support if needed.\u003c/li>\n\t\t\t\u003cli>Set reminders or use a visual checklist to support consistency.\u003c/li>\n\t\t\u003c/ul>\n\t\t\u003c/li>\n\t\u003c/ul>\n\t\u003c/li>\n\t\u003cli>\u003cstrong>Relevant:\u003c/strong>&nbsp;Supports the member&rsquo;s goal of living more independently.\u003c/li>\n\t\u003cli>\u003cstrong>Time-Bound:\u003c/strong>&nbsp;Goal is set for a two-month period.\u003c/li>\n\u003c/ul>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cul>\n\u003c/ul>\n","rotationAngle":0},{"identifier":"3BzparAbkZSwQX5aY","kind":"overlay","type":"rectangle","width":485,"height":727.5000000000001,"x":790,"y":-8,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"K2LH2PrL7BcbsEgFu","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":1.4210854715202004e-14,"positionY":0,"width":99.99999999999997,"height":100},"duration":42}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":167.0625,"captions":[{"text":"Smart goals in a person centered care plan don't","startTime":0.159,"finishTime":2.68},{"text":"have to be limited to health or diagnosis-related outcomes.","startTime":2.68,"finishTime":5.88},{"text":"Members may have goals that reflect their desire for connection,","startTime":6.829,"finishTime":9.979},{"text":"independence,","startTime":10.189,"finishTime":11.02},{"text":"learning,","startTime":11.229,"finishTime":11.63},{"text":"or contributing to their community.","startTime":11.789,"finishTime":13.43},{"text":"For example,","startTime":14.84,"finishTime":15.64},{"text":"a member might want to volunteer at a local food pantry,","startTime":15.8,"finishTime":18.829},{"text":"apply for part-time work,","startTime":19.079,"finishTime":20.51},{"text":"or learn to use technology to stay in touch with family.","startTime":20.68,"finishTime":23.76},{"text":"These goals are just as meaningful and should","startTime":24.68,"finishTime":26.799},{"text":"be supported with the same care and structure.","startTime":26.799,"finishTime":29.11},{"text":"As always,","startTime":30.5,"finishTime":31.409},{"text":"ensure each goal is specific,","startTime":31.78,"finishTime":33.49},{"text":"measurable,","startTime":33.74,"finishTime":34.33},{"text":"attainable,","startTime":34.459,"finishTime":35.169},{"text":"relevant,","startTime":35.299,"finishTime":35.9},{"text":"and time-based.","startTime":35.939,"finishTime":36.979},{"text":"And most importantly,","startTime":37.84,"finishTime":39.139},{"text":"that it reflects what the member wants to achieve.","startTime":39.349,"finishTime":41.72},{"text":"This","startTime":43,"finishTime":43.009},{"text":"is an example of a smart goal focused on employment.","startTime":43.229,"finishTime":46.299},{"text":"The member has expressed a desire to return to work in a","startTime":47.15,"finishTime":50.02},{"text":"part-time role that fits their skills and is close to home.","startTime":50.02,"finishTime":53.049},{"text":"The goal is clearly defined,","startTime":54.36,"finishTime":56.09},{"text":"measurable,","startTime":56.31,"finishTime":56.9},{"text":"and realistic based on the member's current situation.","startTime":57.029,"finishTime":59.83},{"text":"It also includes a specific time frame","startTime":60.669,"finishTime":63.09},{"text":"which helps both the member and care team track progress.","startTime":63.259,"finishTime":66.169},{"text":"The action steps break the goal into manageable tasks","startTime":67.529,"finishTime":70.739},{"text":"such as updating a resume and submitting applications weekly.","startTime":70.83,"finishTime":74.11},{"text":"This structure supports the member's autonomy while","startTime":74.94,"finishTime":77.54},{"text":"ensuring the goal remains achievable and meaningful.","startTime":77.54,"finishTime":80.3},{"text":"Another smart goal example shown here focuses on volunteering,","startTime":81.61,"finishTime":85.319},{"text":"which is a meaningful way for many members","startTime":85.519,"finishTime":87.44},{"text":"to stay active and connected to their community.","startTime":87.44,"finishTime":89.79},{"text":"In this case,","startTime":91.11,"finishTime":92.029},{"text":"the member wants to volunteer at a local food pantry twice a month.","startTime":92.199,"finishTime":95.91},{"text":"The goal is clearly defined,","startTime":96.739,"finishTime":98.4},{"text":"realistic,","startTime":98.61,"finishTime":99.319},{"text":"and time-bound,","startTime":99.41,"finishTime":100.36},{"text":"making it easy to track and support.","startTime":100.569,"finishTime":102.529},{"text":"The action steps help break the goal","startTime":103.83,"finishTime":105.769},{"text":"into manageable tasks like confirming opportunities,","startTime":105.769,"finishTime":109.08},{"text":"scheduling shifts,","startTime":109.209,"finishTime":110.129},{"text":"and arranging transportation","startTime":110.279,"finishTime":111.9},{"text":"so the member feels confident and supported in achieving it.","startTime":112.169,"finishTime":115.05},{"text":"A final smart goal example focuses on building independence in daily living.","startTime":116.43,"finishTime":120.949},{"text":"The member wants to prepare their own breakfast 3 times a week,","startTime":121.779,"finishTime":125.12},{"text":"which supports their broader goal of living more independently at home.","startTime":125.33,"finishTime":128.8},{"text":"The goal is realistic and clearly defined with","startTime":130.1,"finishTime":132.85},{"text":"a specific time frame and measurable outcome.","startTime":132.85,"finishTime":135.289},{"text":"It also reflects the members' personal values and desire for self-sufficiency.","startTime":136.089,"finishTime":140.539},{"text":"Action steps like identifying meals,","startTime":141.97,"finishTime":144.24},{"text":"shopping with support,","startTime":144.49,"finishTime":145.559},{"text":"and using reminders help break the goal into manageable parts,","startTime":145.729,"finishTime":149.05},{"text":"making it easier for the member to succeed and feel empowered.","startTime":149.21,"finishTime":152.369},{"text":"These examples demonstrate how smart goals in a person centered care plan","startTime":153.789,"finishTime":157.669},{"text":"don't have to be limited to health or diagnosis related outcomes,","startTime":157.669,"finishTime":160.75},{"text":"so consider smart goals for members that foster connection,","startTime":160.83,"finishTime":163.899},{"text":"independence,","startTime":164.07,"finishTime":164.83},{"text":"learning,","startTime":165.07,"finishTime":165.5},{"text":"and or contributing to their community.","startTime":165.589,"finishTime":167.47}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["YnTcwTbgGhfoPbCQd","K2LH2PrL7BcbsEgFu"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes. Members may have goals that reflect their desire for connection, independence, learning, or contributing to their community.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"For example, a member might want to volunteer at a local food pantry, apply for part-time work, or learn to use technology to stay in touch with family. These goals are just as meaningful and should be supported with the same care and structure.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As always, ensure each goal is Specific, Measurable, Attainable, Relevant, and Time-Based. and most importantly, that it reflects what the member wants to achieve.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This is an example of a SMART goal focused on employment. The member has expressed a desire to return to work in a part-time role that fits their skills and is close to home.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The goal is clearly defined, measurable, and realistic based on the member’s current situation. It also includes a specific timeframe, which helps both the member and care team track progress.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The action steps break the goal into manageable tasks, such as updating a resume and submitting applications weekly. This structure supports the member’s autonomy while ensuring the goal remains achievable and meaningful.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Another SMART goal example shown here focuses on a meaningful personal goal. Sally wants to attend her granddaughter’s wedding, and this desire motivates her to improve her mobility and strength. The goal is specific, measurable, and time-bound, and it reflects what truly matters to her. The Attainable section breaks down actionable steps Sally can take to achieve this goal and the Time Bound section specifically includes the statement Progression and self management toward above goal will be monitored. This statement is required by some health plans\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A final SMART goal example focuses on building independence in daily living. The member wants to prepare their own breakfast three times a week, which supports their broader goal of living more independently at home.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The goal is realistic and clearly defined, with a specific timeframe and measurable outcome. It also reflects the member’s personal values and desire for self-sufficiency.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Action steps like identifying meals, shopping with support, and using reminders help break the goal into manageable parts, making it easier for the member to succeed and feel empowered.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"These example demonstrate how SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes so consider smart goals for members that foster connection, independence, learning, and or contributing to their community.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes. Members may have goals that reflect their desire for connection, independence, learning, or contributing to their community.\nFor example, a member might want to volunteer at a local food pantry, apply for part-time work, or learn to use technology to stay in touch with family. These goals are just as meaningful and should be supported with the same care and structure.\nAs always, ensure each goal is Specific, Measurable, Attainable, Relevant, and Time-Based. and most importantly, that it reflects what the member wants to achieve.\n\nThis is an example of a SMART goal focused on employment. The member has expressed a desire to return to work in a part-time role that fits their skills and is close to home.\nThe goal is clearly defined, measurable, and realistic based on the member’s current situation. It also includes a specific timeframe, which helps both the member and care team track progress.\nThe action steps break the goal into manageable tasks, such as updating a resume and submitting applications weekly. This structure supports the member’s autonomy while ensuring the goal remains achievable and meaningful.\n\nAnother SMART goal example shown here focuses on a meaningful personal goal. Sally wants to attend her granddaughter’s wedding, and this desire motivates her to improve her mobility and strength. The goal is specific, measurable, and time-bound, and it reflects what truly matters to her. The Attainable section breaks down actionable steps Sally can take to achieve this goal and the Time Bound section specifically includes the statement Progression and self management toward above goal will be monitored. This statement is required by some health plans\n\nA final SMART goal example focuses on building independence in daily living. The member wants to prepare their own breakfast three times a week, which supports their broader goal of living more independently at home.\nThe goal is realistic and clearly defined, with a specific timeframe and measurable outcome. It also reflects the member’s personal values and desire for self-sufficiency.\nAction steps like identifying meals, shopping with support, and using reminders help break the goal into manageable parts, making it easier for the member to succeed and feel empowered.\n\nThese example demonstrate how SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes so consider smart goals for members that foster connection, independence, learning, and or contributing to their community.","jobId":"fqWNofLSXQ7xGcYu4","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"ZdDn49ZimtWwiLM9o":{"_id":"ZdDn49ZimtWwiLM9o","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"PCSP Best Practices","upload":"XztZqrzALDkccRhTc"},"dates":{"dateCreated":"2026-04-15T16:28:39.539Z","dateModified":"2026-04-17T14:14:54.553Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"vkJeKSoAqEMfQF3kF","kind":"overlay","type":"rectangle","width":1340,"height":753.75,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"jaWJCSGzA5goAHYBD","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":59.075,"captions":[{"text":"To conclude person-centered service planning with some best practices,","startTime":0.05,"finishTime":3.799},{"text":"person-centered service planning starts with what","startTime":4.09,"finishTime":6.329},{"text":"matters most to the individual,","startTime":6.329,"finishTime":7.789},{"text":"their goals,","startTime":7.809,"finishTime":8.479},{"text":"preferences,","startTime":8.729,"finishTime":9.399000000000001},{"text":"strengths,","startTime":9.77,"finishTime":10.159},{"text":"and needs.","startTime":10.289,"finishTime":11.05},{"text":"But it doesn't end there.","startTime":11.88,"finishTime":13.17},{"text":"The care plan explains the why.","startTime":13.939,"finishTime":16.1},{"text":"Why services are needed and how they support the individual.","startTime":16.969,"finishTime":20.069},{"text":"The service plan explains the what?","startTime":20.899,"finishTime":23.079},{"text":"What services are authorized,","startTime":23.92,"finishTime":25.78},{"text":"by whom and how often?","startTime":25.899,"finishTime":27.639},{"text":"Required signatures confirm agreement and understanding,","startTime":28.469,"finishTime":31.549},{"text":"and accurate documentation ties it all together into one clear,","startTime":31.709,"finishTime":35.169},{"text":"consistent story.","startTime":35.47,"finishTime":36.549},{"text":"When these elements align,","startTime":37.4,"finishTime":38.79},{"text":"the person-centered service plan reflects person-centered","startTime":39,"finishTime":42.159},{"text":"decision making and meets compliance expectations.","startTime":42.159,"finishTime":44.74},{"text":"As we move into smart goals and care plan examples,","startTime":45.639,"finishTime":48.709},{"text":"keep this checklist in mind.","startTime":48.959,"finishTime":50.52},{"text":"If every service,","startTime":51.38,"finishTime":52.459},{"text":"goal,","startTime":52.709,"finishTime":53.18},{"text":"and authorization fits within this framework,","startTime":53.189,"finishTime":55.75},{"text":"the plan is both meaningful and defensible.","startTime":55.93,"finishTime":58.33}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["XztZqrzALDkccRhTc","jaWJCSGzA5goAHYBD"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To conclude Person Centered Service Planning with some best practices, Person‑Centered Service Planning starts with what matters most to the individual their goals, preferences, strengths, and needs. But it doesn’t end there. The Care Plan explains the ‘why’. Why services are needed and how they support the individual. The Service Plan explains the ‘what’. What services are authorized, by whom, and how often. Required signatures confirm agreement and understanding, and accurate documentation ties it all together into one clear, consistent story. When these elements align, the Person Centered Service Plan reflects person‑centered decision‑making and meets compliance expectations. As we move into SMART goals and care plan examples, keep this checklist in mind. If every service, goal, and authorization fits within this framework, the plan is both meaningful and defensible.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"To conclude Person Centered Service Planning with some best practices, Person‑Centered Service Planning starts with what matters most to the individual their goals, preferences, strengths, and needs. But it doesn’t end there. The Care Plan explains the ‘why’. Why services are needed and how they support the individual. The Service Plan explains the ‘what’. What services are authorized, by whom, and how often. Required signatures confirm agreeme ottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"start":21,"behaviorType":"continue","htmlContent":"\u003cdiv>\u003cstrong>Attainable\u003c/strong>\u003cbr />\nGoals should be realistic based on the member&rsquo;s current abilities and supports.\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cstrong>Example:\u003c/strong>\u003cbr />\n&ldquo;I will start by walking to the mailbox with my walker three times a week.&rdquo;\u003c/div>\n","rotationAngle":0}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":47.5875,"captions":[{"text":"Attainable goals are realistic and achievable.","startTime":0.119,"finishTime":2.75},{"text":"They should stretch the member just enough to grow,","startTime":3.569,"finishTime":5.96},{"text":"but not so much that they feel overwhelmed or discouraged.","startTime":6.17,"finishTime":9.319},{"text":"These are practical steps the member themselves can take.","startTime":10.25,"finishTime":13.119},{"text":"For example,","startTime":14.09,"finishTime":14.88},{"text":"walk to the elevator daily,","startTime":15.09,"finishTime":16.53},{"text":"eat 2 small meals and 1 snack per day.","startTime":16.77,"finishTime":19.36},{"text":"Take blood pressure and write on a log for the doctor.","startTime":19.61,"finishTime":22.36},{"text":"In this example,","startTime":23.19,"finishTime":24.309},{"text":"the member wants to walk to the park,","startTime":24.489,"finishTime":26.36},{"text":"but she's starting with a smaller step,","startTime":26.569,"finishTime":28.52},{"text":"walking to the mailbox.","startTime":28.77,"finishTime":30.049},{"text":"This builds confidence and stamina while keeping the long-term goal in sight.","startTime":31.03,"finishTime":34.99},{"text":"Care coordinators play a key role in helping","startTime":36.409,"finishTime":38.81},{"text":"members break big goals into manageable steps.","startTime":38.81,"finishTime":41.49},{"text":"It is important to note that these are steps the member takes,","startTime":42.279,"finishTime":45.34},{"text":"not the care coordinator.","startTime":45.509,"finishTime":46.819}],"needToCompleteSlideForPageCompletion":true,"disableForwardSeeking":true}},"assets":["6NypcHf7f5N5xoa3a","tXW76T9pijpEW9t3C"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Attainable goals are realistic and achievable. They should stretch the member just enough to grow, but not so much that they feel overwhelmed or discouraged. These are practical steps the member themselves can take.  For example, walk to the elevator daily, eat 2 small meals and 1 snack per day, take blood pressure and write on a log for the doctor. In this example, the member wants to walk to the park—but she’s starting with a smaller step: walking to the mailbox. This builds confidence and stamina while keeping the long-term goal in sight.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Care coordinators play a key role in helping members break big goals into manageable steps.  It is important to note that these are steps the member takes, not the care coordinator.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Attainable goals are realistic and achievable. They should stretch the member just enough to grow, but not so much that they feel overwhelmed or discouraged. These are practical steps the member themselves can take.  For example, walk to the elevator daily, eat 2 small meals and 1 snack per day, take blood pressure and write on a log for the doctor. In this example, the member wants to walk to the park—but she’s starting with a smaller step: walking to the mailbox. This builds confidence and stamina while keeping the long-term goal in sight.\nCare coordinators play a key role in helping members break big goals into manageable steps.  It is important to note that these are steps the member takes, not the care coordinator.","jobId":"qag55kWy2N7pFitBj","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"fwWo6xYWcYqCaZZsG":{"_id":"fwWo6xYWcYqCaZZsG","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"ay3TzQoRbYQJ4ZFdR"},"dates":{"dateCreated":"2026-04-15T14:56:11.164Z","dateModified":"2026-04-17T14:14:37.536Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"hQmu7u7kefYpDBGNA","kind":"overlay","type":"rectangle","width":1341,"height":754.3125,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"o t.","startTime":49.79,"finishTime":52.549}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ay3TzQoRbYQJ4ZFdR","o54c5cQqLPu49Bpae"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Understanding the difference between the Care Plan and the Service Plan is important but understanding how they work together is critical. Every service listed on the Service Plan should be clearly supported by the Care Plan. That means there should be a documented need, risk, goal, or preference that explains why that service exists. When services appear on a Service Plan without corresponding support in the Care Plan, it creates risk. To an auditor, it may look like the service was authorized without a person‑centered or needs‑based rationale. Alignment shows that services weren’t chosen at random they were selected intentionally to support what matters most to the individual while addressing identified needs. Strong alignment protects the individual by ensuring services are appropriate, and it protects providers and case managers by clearly demonstrating authorization and intent.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Understanding the difference between the Care Plan and the Service Plan is important but understanding how they work together is critical. Every service listed on the Service Plan should be clearly supported by the Care Plan. That means there should be a documented need, risk, goal, or preference that explains why that service exists. When services appear on a Service Plan without corresponding support in the Care Plan, it creates risk. To an auditor, it may look like the service was authorized without a person‑centered or needs‑based rationale. Alignment shows that services weren’t chosen at random they were selected intentionally to support what matters most to the individual while addressing identified needs. Strong alignment protects the individual by ensuring services are appropriate, and it protects providers and case managers by clearly demonstrating authorization and intent.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"6btfkoJpEuNJLKaKo"}},"goyQNEQntMhyTx5Yg":{"_id":"goyQNEQntMhyTx5Yg","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Conclusion","upload":"yaYH3L2X8FCcYKvNo"},"dates":{"dateCreated":"2025-05-27T22:28:32.013Z","dateModified":"2026-04-17T15:04:18.163Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"EhXHr8XaPvknS2uEa","kind":"overlay","type":"rectangle","width":1282,"height":721.125,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"XEgqwv5EjmAgRYapx","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":0,"positionY":0,"width":100,"height":100}}],"duration":36.425,"captions":[{"text":"In this lesson,","sta "textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The O A R S framework​​ also known as oars, is comprised of Open questions, Affirmation of strengths, Reflections, and Summarizing.\nOpen questions draw out and explore the person’s experiences, perspectives, and ideas. Evocative questions guide the client to reflect on how change may be meaningful or possible. Information is often offered within a structure of open questions (Elicit-Provide-Elicit) that first explores what the person already knows, then seeks permission to offer what the practitioner knows and then explores the person’s response.​​\nAffirmation of strengths, efforts, and past successes help to build the person’s hope and confidence in their ability to change.​​\nReflections are based on careful listening and trying to understand what the person is saying, by repeating, rephrasing or offering a deeper guess about what the person is trying to communicate. This is a foundational skill of MI and how we express empathy. ​​\nSummarizing ensures shared understanding and reinforces key points made by the client.​​","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"r2m4XwzPMiMwAdwpA":{"_id":"r2m4XwzPMiMwAdwpA","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 4","upload":"JdZarWC47wCW62dDD"},"dates":{"dateCreated":"2025-05-20T16:37:02.918Z","dateModified":"2026-04-17T14:10:59.321Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"EPps5dRBNxpSXueGQ","kind":"overlay","height":56,"width":447,"y":49,"x":63,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,  framework of person centered care,","startTime":0.019,"finishTime":3.67},{"text":"a model that places the individual at the heart of every healthcare decision.","startTime":3.839,"finishTime":7.55},{"text":"The waiver service coordinator's role is essential in making this model a reality.","startTime":8.39,"finishTime":12.81},{"text":"At the center of the diagram is the person,","startTime":14.199,"finishTime":16.43},{"text":"the member,","startTime":16.6,"finishTime":17.229},{"text":"not the patient,","startTime":17.44,"finishTime":18.239},{"text":"not the diagnosis,","startTime":18.549,"finishTime":19.69},{"text":"but the individual with unique needs,","startTime":19.92,"finishTime":21.87},{"text":"values,","startTime":22.02,"finishTime":22.67},{"text":"and goals.","startTime":22.76,"finishTime":23.559},{"text":"Surrounding them are the key partners in care nurses,","startTime":24.45,"finishTime":27.489},{"text":"doctors,","startTime":27.729,"finishTime":28.37},{"text":"pharmacists,","startTime":28.489,"finishTime":29.409},{"text":"personal care aides,","startTime":29.549,"finishTime":30.77},{"text":"family members,","startTime":30.959,"finishTime":31.85},{"text":"and the broader community.","startTime":31.92,"finishTime":33.25},{"text":"These are the people care coordinators help coordinate and align","startTime":34.169,"finishTime":37.33},{"text":"to ensure care is truly centered on the individual.","startTime":37.33,"finishTime":40.159},{"text":"The outer ring highlights the principles that guide a care coordinators' work.","startTime":41.49,"finishTime":45.74},{"text":"Full transparency,","startTime":46.11,"finishTime":47.419},{"text":"keep individuals informed and involved in their care.","startTime":47.669,"finishTime":50.369},{"text":"Shared goal setting,","startTime":51.84,"finishTime":52.99},{"text":"collaborate with the person and their support","startTime":53.2,"finishTime":55.27},{"text":"network to define what success looks like.","startTime":55.27,"finishTime":57.47},{"text":"Mission and values aligned with patient goals ensure that","startTime":58.939,"finishTime":62.38},{"text":"care plans reflect what matters most to the person.","startTime":62.38,"finishTime":64.97},{"text":"Understanding individual preferences go beyond clinical needs.","startTime":66.37,"finishTime":70.419},{"text":"Learn about cultural,","startTime":70.599,"finishTime":71.76},{"text":"social,","startTime":72.01,"finishTime":72.559},{"text":"and emotional factors.","startTime":72.69,"finishTime":74.05},{"text":"Health equity,","startTime":75.419,"finishTime":76.29},{"text":"identify and address barriers to care,","startTime":76.459,"finishTime":78.769},{"text":"especially for underserved populations.","startTime":79.18,"finishTime":81.3},{"text":"Collaborated and coordinated care facilitate communication across","startTime":82.73,"finishTime":86.769},{"text":"providers and services to avoid fragmentation.","startTime":86.769,"finishTime":89.529},{"text":"Notice a specific callout,","startTime":91.019,"finishTime":92.61},{"text":"family viewpoints respected and valued.","startTime":92.879,"finishTime":95.05},{"text":"This is a reminder that families are not just visitors,","startTime":95.889,"finishTime":98.849},{"text":"they're partners in care.","startTime":99.059,"finishTime":100.37},{"text":"As waiver service coordinators,","startTime":101.72,"finishTime":103.589},{"text":"you are the bridge between systems and members.","startTime":103.72,"finishTime":106.16},{"text":"Your ability to listen,","startTime":107.099,"finishTime":108.37},{"text":"advocate,","startTime":108.5,"finishTime":109.209},{"text":"and coordinate is what transforms this model from a diagram","startTime":109.26,"finishTime":112.379},{"text":"into a lived experience for the individuals we serve.","startTime":112.379,"finishTime":115.169},{"text":"Person centered care isn't just a philosophy,","startTime":116.019,"finishTime":118.569},{"text":"it's a practice,","startTime":118.819,"finishTime":119.73},{"text":"and waiver service coordinators are a vital component of making it happen.","startTime":119.93,"finishTime":123.589}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["JdZarWC47wCW62dDD","qrNYhw5muaQhFyEie","zvMNwhGq7ycrJweNc"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":["45hKJtBKsyiCkZh4p"],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This graphic illustrates the core framework of Person-Centered Care—a model that places the individual at the heart of every healthcare decision. The waiver service coordinator's  role is essential in making this model a reality.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"At the center of the diagram is The Person, the member—not the patient, not the diagnosis, but the individual with unique needs, values, and goals. Surrounding them are the key partners in care: nurses, doctors, pharmacists, personal care aides, family members, and the broader community. These are the people care coordinators help coordinate and align to ensure care is truly centered on the individual.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The outer ring highlights the principles that guide a care coordinators's work:\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Full Transparency: Keep individuals informed and involved in their care.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Shared Goal Setting: Collaborate with the person and their support network to define what success looks like.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Mission and Values Aligned with Patient Goals: Ensure that care plans reflect what matters most to the person.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Understanding Individual Preferences: Go beyond clinical needs—learn about cultural, social, and emotional factors.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Health Equity: Identify and address barriers to care, especially for underserved populations.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Collaborated and Coordinated Care: Facilitate communication across providers and services to avoid fragmentation.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Notice a specific callout: ‘Family Viewpoints Respected and Valued.’ This is a reminder that families are not just visitors—they’re partners in care.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As waiver service coordinators, you are the bridge between systems and members. Your ability to listen, advocate, and coordinate is what transforms this model from a diagram into a lived experience for the individuals we serve. Person-Centered Care isn’t just a philosophy—it’s a practice, and waiver service coordinators are a vital component of making it happen.”\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This graphic illustrates the core framework of Person-Centered Care—a model that places the individual at the heart of every healthcare decision. The waiver service coordinator's  role is essential in making this model a reality.\nAt the center of the diagram is The Person, the member—not the patient, not the diagnosis, but the individual with unique needs, values, and goals. Surrounding them are the key partners in care: nurses, doctors, pharmacists, personal care aides, family members, and the broader community. These are the people care coordinators help coordinate and align to ensure care is truly centered on the individual.\nThe outer ring highlights the principles that guide a care coordinators's work:\nFull Transparency: Keep individuals informed and involved in their care.\nShared Goal Setting: Collaborate with the person and their support network to define what success looks like.\nMission and Values Aligned with Patient Goals: Ensure that care plans reflect what matters most to the person.\nUnderstanding Individual Preferences: Go beyond clinical needs—learn about cultural, social, and emotional factors.\nHealth Equity: Identify and address barriers to care, especially for underserved populations.\nCollaborated and Coordinated Care: Facilitate communication across providers and services to avoid fragmentation.\nNotice a specific callout: ‘Family Viewpoints Respected and Valued.’ This is a reminder that families are not just visitors—they’re partners in care.\nAs waiver service coordinators, you are the bridge between systems and members. Your ability to listen, advocate, and coordinate is what transforms this model from a diagram into a lived experience for the individuals we serve. Person-Centered Care isn’t just a philosophy—it’s a practice, and waiver service coordinators are a vital component of making it happen.”","jobId":"HxkMhT2FDzTkmApf9","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"t69Jr97aA3nGAEMaA":{"_id":"t69Jr97aA3nGAEMaA","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Common PCSP Documentation Pitfalls","upload":"KfJGjiLNoTjDc3XYP"},"dates":{"dateCreated":"2026-04-15T16:06:40.305Z","dateModified":"2026-04-17T14:14:43.783Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"xHam7ZwjkdkWqSAoy","kind":"overlay","type":"rectangle","width":1280,"height":757.3333333333339,"x":0,"y":0,"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"GTQjQWxN5RW8KaunJ","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":64.8125,"captions":[{"text":"There are several common documentation pitfalls","startTime":0.119,"finishTime":2.65},{"text":"with the person-centered service plan.","startTime":2.65,"finishTime":4.57},{"text":"One of the biggest issues is services showing up on","startTime":5.46,"finishTime":8.02},{"text":"a service plan without clear support in the care plan.","startTime":8.02,"finishTime":10.979},{"text":"When that happens,","startTime":11.818999999999999,"finishTime":12.81},{"text":"reviewers can't see why the service exists.","startTime":13.18,"finishTime":15.56},{"text":"Another common issue is misalignment where the care plan focuses on one","startTime":16.458,"finishTime":20.349},{"text":"set of priorities and the service plan reflects something else entirely.","startTime":20.349,"finishTime":24.009},{"text":"Missing or outdated signatures are another frequent finding.","startTime":24.909,"finishTime":28.229},{"text":"Often the service itself was appropriate,","startTime":29.079,"finishTime":31.28},{"text":"but the documentation didn't reflect timely agreement.","startTime":31.44,"finishTime":34.24},{"text":"Vague language can also create problems.","startTime":35.139,"finishTime":37.58},{"text":"Statements that don't explain the reason behind a","startTime":38.599,"finishTime":40.919},{"text":"service leave too much up to interpretation.","startTime":40.919,"finishTime":43.2},{"text":"The solution isn't more documentation,","startTime":44.02,"finishTime":46.29},{"text":"it's clearer documentation.","startTime":46.5,"finishTime":48.02},{"text":"Before finalizing a plan,","startTime":49.08,"finishTime":50.5},{"text":"pause and ask if someone unfamiliar with this case read this,","startTime":50.72,"finishTime":54.549},{"text":"would they understand what matters to the individual and why each service is here.","startTime":54.799,"finishTime":58.779},{"text":"Avoiding these pitfalls makes person-centered","startTime":59.659,"finishTime":62.47},{"text":"decisions visible and defensible.","startTime":62.47,"finishTime":64.089}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["KfJGjiLNoTjDc3XYP","GTQjQWxN5RW8KaunJ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"cdKup66WJdhPGBcit","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"There are several common documentation pitfalls with the Person Centered Service Plan. One of the biggest issues is services showing up on a service plan without clear support in the care plan. When that happens, reviewers can’t see why the service exists. Another common issue is misalignment where the care plan focuses on one set of priorities and the service plan reflects something else entirely. Missing or outdated signatures are another frequent finding. Often the service itself was appropriate, but the documentation didn’t reflect timely agreement. Vague language can also create problems. Statements that don’t explain the reason behind a service leave too much up to interpretation. The solution isn’t more documentation, it’s clearer documentation. Before finalizing a plan, pause and ask, If someone unfamiliar with this case read this, would they understand what matters to the individual and why each service is here? Avoiding these pitfalls makes person centered decisions visible and defensible.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"There are several common documentation pitfalls with the Person Centered Service Plan. One of the biggest issues is services showing up on a service plan without clear support in the care plan. When that happens, reviewers can’t see why the service exists. Another common issue is misalignment where the care plan focuses on one set of priorities and the service plan reflects something else entirely. Missing or outdated signatures are another frequent finding. Often the service itself was appropriate, but the documentation didn’t reflect timely agreement. Vague language can also create problems. Statements that don’t explain the reason behind a service leave too much up to interpretation. The solution isn’t more documentation, it’s clearer documentation. Before finalizing a plan, pause and ask, If someone unfamiliar with this case read this, would they understand what matters to the individual and why each service is here? Avoiding these pitfalls makes person centered decisions visible and defensible.","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"tiQM7xW93wCkvBKmu":{"_id":"tiQM7xW93wCkvBKmu","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 14","upload":"THCTdnb6YdDKghohx"},"dates":{"dateCreated":"2025-05-20T16:37:04.005Z","dateModified":"2026-04-17T14:16:20.911Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5 o not only understand these documents but also help members","startTime":84.989,"finishTime":88.91},{"text":"explore and document their preferences in a timely and respectful manner.","startTime":88.91,"finishTime":92.58},{"text":"These conversations should happen at a time and place","startTime":93.5,"finishTime":96.139},{"text":"that is convenient and comfortable for the member.","startTime":96.139,"finishTime":98.29}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["Tc7Ln4j36jNHyKtFb","Zgguv45TbLmaXH8K3","isMEhDtaPByhCYbEz","bjFJj75jFdxZw2257"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"There are four common types of advance directive documents we should be familiar with:\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"First, the Healthcare Power of Attorney. This document allows a person to appoint someone they trust to make healthcare decisions on their behalf if they become incapacitated. In Ohio, this is governed by Ohio Revised Code 13 37 12.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Second, the Living Will. This is a notarized or witnessed document that outlines a person’s wishes regarding life-sustaining treatment. It becomes effective when the individual is terminally ill or permanently unconscious, and is regulated under Ohio Administrative Code 37 01 62.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Third, Organ Donor Registration. This can be completed at the BMV or through national databases and indicates a person’s decision to donate organs, tissues, or eyes after death. This is covered under Ohio Administrative Code 45 01 1 1 36.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"And finally, Do Not Resuscitate Orders, or DNRs. These are medical orders signed by a physician or advanced practice provider that instruct healthcare professionals not to perform CPR or other life-sustaining measures. These are also governed by Ohio Administrative Code 37 01 62.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"As care coordinators, it’s important to not only understand these documents but also help members explore and document their preferences in a timely and respectful manner. These conversations should happen at a time and place that is convenient and comfortable for the member.\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"There are four common types of advance directive documents we should be familiar with:\nFirst, the Healthcare Power of Attorney. This document allows a person to appoint someone they trust to make healthcare decisions on their behalf if they become incapacitated. In Ohio, this is governed by Ohio Revised Code 13 37 12.\nSecond, the Living Will. This is a notarized or witnessed document that outlines a person’s wishes regarding life-sustaining treatment. It becomes effective when the individual is terminally ill or permanently unconscious, and is regulated under Ohio Administrative Code 37 01 62.\nThird, Organ Donor Registration. This can be completed at the BMV or through national databases and indicates a person’s decision to donate organs, tissues, or eyes after death. This is covered under Ohio Administrative Code 45 01 1 1 36.\nAnd finally, Do Not Resuscitate Orders, or DNRs. These are medical orders signed by a physician or advanced practice provider that instruct healthcare professionals not to perform CPR or other life-sustaining measures. These are also governed by Ohio Administrative Code 37 01 62.\nAs care coordinators, it’s important to not only understand these documents but also help members explore and document their preferences in a timely and respectful manner. These conversations should happen at a time and place that is convenient and comfortable for the member.","jobId":"bMkF8qJTdxywpGr2E","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"xPedLZpmx8CdBuecD":{"_id":"xPedLZpmx8CdBuecD","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 10","upload":"vPsQ4GczgjXfnPFvk"},"dates":{"dateCreated":"2025-05-20T16:37:03.685Z","dateModified":"2026-04-17T14:16:03.486Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"4petb4oWnfqoPQi3D","kind":"overlay","height":720,"width":528,"y":0,"x":0,"fl angle","lineHeight":-0.34199999570846557,"textAlignment":"center","verticalAlignment":"top","font":{"size":13.888889040265765,"bold":false,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"koantic(accent5, 1, 1)"},"padding":{"bottom":0,"top":0,"left":0,"right":0},"fontColor":"rgba(39, 37, 37, 1)"}}],"background":{"backgroundColor":"rgba(255, 255, 255, 1)","backgroundImageOpacity":100},"duration":66.5,"captions":[{"text":"Starting an advanced care planning conversation can feel overwhelming,","startTime":0.159,"finishTime":3.8289999999999997},{"text":"but it's an important step in ensuring members' wishes are honored.","startTime":4.038,"finishTime":7.159},{"text":"Here's how to begin.","startTime":8.1,"finishTime":9.35},{"text":"Have members reflect on their values.","startTime":9.739,"finishTime":11.739},{"text":"Have members consider what matters most to them regarding medical care.","startTime":11.88,"finishTime":15.449},{"text":"Do they prioritize comfort,","startTime":16.248,"finishTime":17.948},{"text":"longevity,","startTime":18.138,"finishTime":18.759},{"text":"or specific treatments?","startTime":18.899,"finishTime":20.298},{"text":"Have members talked to loved ones,","startTime":21.68,"finishTime":23.6},{"text":"have members shared their thoughts with family,","startTime":23.719,"finishTime":25.87},{"text":"close friends,","startTime":26.12,"finishTime":26.87},{"text":"or a healthcare provider.","startTime":27.079,"finishTime":28.43},{"text":"Having open conversations can help them understand their preferences.","startTime":29.35,"finishTime":32.869},{"text":"Have members choose a healthcare proxy?","startTime":34.299,"finishTime":36.409},{"text":"Have members select someone they trust to make medical decisions","startTime":36.58,"finishTime":39.619},{"text":"on their behalf should members be unable to communicate.","startTime":39.619,"finishTime":42.25},{"text":"Have members document their wishes,","startTime":43.669,"finishTime":45.5},{"text":"guide members to create advanced directives like a living will","startTime":45.75,"finishTime":48.709},{"text":"or a durable power of attorney for health care.","startTime":48.709,"finishTime":51.18},{"text":"These legal documents clarify member preferences.","startTime":52.08,"finishTime":55.04},{"text":"Review and update","startTime":56.459,"finishTime":57.729},{"text":"member wishes may change over time,","startTime":57.979,"finishTime":60.009},{"text":"so it's good to revisit their plan periodically.","startTime":60.22,"finishTime":62.7},{"text":"Care coordinators should offer resources to members on advanced care planning.","startTime":64.129,"finishTime":68.129}],"disableForwardSeeking":true,"needToCompleteSlideForPageCompletion":true}},"assets":["vPsQ4GczgjXfnPFvk","RTZdTEqJiGXdRHG7E"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Starting an advanced care planning conversation can feel overwhelming, but it's an important step in ensuring member's wishes are honored. Here’s how to begin:​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Reflect on their Values – Have members Consider what matters most to them regarding medical care. Do they prioritize comfort, longevity, or specific treatments?​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Talk to Loved Ones – Have members share their thoughts with family, close friends, or a healthcare provider. Having open conversations can help them understand their preferences.​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Choose a Healthcare Proxy – Have member select someone they trust to make medical decisions on their behalf should members be unable to communicate.​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Document Wishes – Guide members to create advance directives like a living will or a durable power of attorney for health care. These legal documents clarify member preferences.​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Review and Update – Member wishes may change over time, so it's good to revisit their plan periodically.​​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Care Coordinator should offer resources to members on Advanced Care Planning​ ​\",\"type\":\"text\",\"version\":1}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-EricNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Starting an advanced care planning conversation can feel overwhelming, but it's an important step in ensuring member's wishes are honored. Here’s how to begin:​​\nReflect on their Values – Have members Consider what matters most to them regarding medical care. Do they prioritize comfort, longevity, or specific treatments?​​\nTalk to Loved Ones – Have members share their thoughts with family, close friends, or a healthcare provider. Having open conversations can help them understand their preferences.​​\nChoose a Healthcare Proxy – Have member select someone they trust to make medical decisions on their behalf should members be unable to communicate.​​\nDocument Wishes – Guide members to create advance directives like a living will or a durable power of attorney for health care. These legal documents clarify member preferences.​​\nReview and Update – Member wishes may change over time, so it's good to revisit their plan periodically.​​\nCare Coordinator should offer resources to members on Advanced Care Planning​ ​","jobId":"Yu2iRsbi7gh7XKYJt","voiceCodeUsed":"en-US-EricNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"zXP4GP5N6nz5pdidk":{"_id":"zXP4GP5N6nz5pdidk","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Slide 9","upload":"oQok5xhNrMZ4fP4Na"},"dates":{"dateCreated":"2025-05-20T16:37:03.507Z","dateModified":"2026-04-17T14:15:18.828Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"6Qfo5JG35zCvnnQnE","kind":"overlay","height":273,"width":1280,"y":0,"x":0,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":
