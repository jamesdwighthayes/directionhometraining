d to make most healthcare decisions for the individual, but only under specific conditions.\nThis authority becomes effective only when a physician determines that the individual no longer has the capacity to make informed healthcare decisions. Until that point, the individual retains full control over their medical choices.\nAs care coordinators, it is essential to help members understand the purpose and limitations of setting up Durable Power of Attorney for Health Care, ensure that if established it reflects member's wishes, and is kept up to date.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"FajM84K8CCQdCgrDj","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Among the documents and rights to secure for advanced care planning, Durable Power of Attorney for Health Care is a critical component of advance care planning.\u003cbreak time=\"0.5s\"/>A printed durable power of attorney for health care allows an adult to legally authorize another individual, often a trusted family member or friend, to make healthcare decisions on their behalf. This is especially important in situations where the individual becomes unable to make informed decisions for themselves.\u003cbreak time=\"0.5s\"/>The person designated in this document is called the attorney in fact. They are empowered to make most healthcare decisions for the individual, but only under specific conditions.\u003cbreak time=\"0.5s\"/>This authority becomes effective only when a physician determines that the individual no longer has the capacity to make informed healthcare decisions. Until that point, the individual retains full control over their medical choices.\u003cbreak time=\"0.5s\"/>As care coordinators, it is essential to help members understand the purpose and limitations of setting up Durable Power of Attorney for Health Care, ensure that if established it reflects member's wishes, and is kept up to date.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Among the documents and rights to secure for advanced care planning,","startTime":0.009,"finishTime":3.569},{"text":"durable power of attorney for health care is","startTime":3.759,"finishTime":5.92},{"text":"a critical component of advanced care planning.","startTime":5.92,"finishTime":8.289},{"text":"A printed durable power of attorney for healthcare","startTime":9.619,"finishTime":12.35},{"text":"allows an adult to legally authorize another individual,","startTime":12.35,"finishTime":15.3},{"text":"often a trusted family member or friend,","startTime":15.51,"finishTime":17.7},{"text":"to make healthcare decisions on their behalf.","startTime":17.95,"finishTime":20.139},{"text":"This is especially important in situations where the individual","startTime":20.979,"finishTime":24.479},{"text":"becomes unable to make informed decisions for themselves.","startTime":24.479,"finishTime":27.309},{"text":"The person designated in this document is called the attorney in fact.","startTime":28.67,"finishTime":32.299},{"text":"They are empowered to make most healthcare decisions for the individual,","startTime":33.159,"finishTime":36.669},{"text":"but only under specific conditions.","startTime":36.88,"finishTime":38.88},{"text":"This authority becomes effective only when a physician determines that the","startTime":40.299,"finishTime":44.06},{"text":"individual no longer has the capacity to make informed healthcare decisions.","startTime":44.06,"finishTime":47.86},{"text":"Until that point,","startTime":48.83,"finishTime":49.86},{"text":"the individual retains full control over their medical choices.","startTime":49.99,"finishTime":53.43},{"text":"As care coordinators,","startTime":54.81  need to be tracked. If a signature hasn’t been returned, follow‑up is required, and that follow‑up must be documented. When providers deliver services without a signed service plan, those services may later be viewed as unauthorized even if the services were appropriate and necessary. In audit situations, reviewers look for alignment between the services delivered, what appears on the Person‑Centered Service Plan, and the documentation supporting authorization and agreement. The goal here isn’t to penalize providers it’s to protect everyone involved. Clear follow‑up, documentation of outreach, and timely resolution help prevent payment issues and ensure services are properly supported.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Provider signatures don't just need to be requested,","startTime":0.079,"finishTime":2.8689999999999998},{"text":"they need to be tracked.","startTime":3.009,"finishTime":4.21},{"text":"If a signature hasn't been returned,","startTime":4.969,"finishTime":6.96},{"text":"follow-up is required,","startTime":7.13,"finishTime":8.319},{"text":"and that follow-up must be documented.","startTime":8.529,"finishTime":10.529},{"text":"When providers deliver services without a signed service plan,","startTime":11.38,"finishTime":14.77},{"text":"those services may later be viewed as unauthorized","startTime":15.02,"finishTime":17.7},{"text":"even if the services were appropriate and necessary.","startTime":17.7,"finishTime":20.239},{"text":"In audit situations,","startTime":21.209,"finishTime":22.68},{"text":"reviewers look for alignment between the services delivered,","startTime":23.09,"finishTime":25.77},{"text":"what appears on the person-centered service plan,","startTime":26.049,"finishTime":28.409},{"text":"and the documentation supporting authorization and agreement.","startTime":28.61,"finishTime":31.729},{"text":"The goal here isn't to penalize providers,","startTime":32.59,"finishTime":34.95},{"text":"it's to protect everyone involved.","startTime":34.99,"finishTime":36.849},{"text":"Clear follow-up,","startTime":37.659,"finishTime":38.659},{"text":"documentation of outreach,","startTime":38.849,"finishTime":40.34},{"text":"and timely resolution help prevent payment issues","startTime":40.5,"finishTime":43.22},{"text":"and ensure services are properly supported.","startTime":43.22,"finishTime":45.58}]}},"GTQjQWxN5RW8KaunJ":{"_id":"GTQjQWxN5RW8KaunJ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1046171,"uploadedFileName":"Common-PCSP-Documentation-Pitfalls-and-How-to-Avoid-Them.png","height":994,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-15T16:08:49.291Z","dateModified":"2026-04-15T16:08:49.291Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"AvC4nXavdpz5DuAeg","thumbnail":"rdnEHAPPcex3FR6Ry"},"GdxugpBPgWZfPXNdA":{"_id":"GdxugpBPgWZfPXNdA","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1794603,"uploadedFileName":"When-Individual-Signatures-Are-Not-Required.png","height":983,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-14T22:07:20.333Z","dateModified":"2026-04-14T22:07:20.333Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"SGMAyqNzu2ndsmt8P","thumbnail":"wgq8458TKFr592utL"},"JdZarWC47wCW62dDD":{"_id":"JdZarWC47wCW62dDD","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2985984,"uploadedFileName":"Eric-en-Person-CenteredCare-7182025.mp3","uploadedFileNameExtension":".mp3","duration":124.375},"dates":{"dateCreated":"2025-07-18T19:27:56.944Z","dateModified":"2025-07-18T19:27:59.477Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"This graphic illustrates the core framework of Person-Centered Care—a model that places the individual at the heart of every healthcare decision. The waiver service coordinator's  role is essential in making this model a reality.\nAt the center of the diagram is The Person, the member—not the patient, not the diagnosis, but the individual with unique needs, values, and goals. Surrounding them are the key partners in care: nurses, doctors, pharmacists, personal care aides, family members, and the broader community. These are the people care coordinators help coordinate and align to ensure care is truly centered on the individual.\nThe outer ring highlights the principles that guide a care coordinators's work:\nFull Transparency: Keep individuals informed and involved in their care.\nShared Goal Setting: Collaborate with the person and their support network to define what success looks like.\nMission and Values Aligned with Patient Goals: Ensure that care plans reflect what matters most to the person.\nUnderstanding Individual Preferences: Go beyond clinical needs—learn about cultural, social, and emotional factors.\nHealth Equity: Identify and address barriers to care, especially for underserved populations.\nCollaborated and Coordinated Care: Facilitate communication across providers and services to avoid fragmentation.\nNotice a specific callout: ‘Family Viewpoints Respected and Valued.’ This is a reminder that families are not just visitors—they’re partners in care.\nAs waiver service coordinators, you are the bridge between systems and members. Your ability to listen, advocate, and coordinate is what transforms this model from a diagram into a lived experience for the individuals we serve. Person-Centered Care isn’t just a philosophy—it’s a practice, and waiver service coordinators are a vital component of making it happen.”","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"r2m4XwzPMiMwAdwpA","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">This graphic illustrates the core framework of Person-Centered Care—a model that places the individual at the heart of every healthcare decision. The waiver service coordinator's  role is essential in making this model a reality.\u003cbreak time=\"0.5s\"/>At the center of the diagram is The Person, the member—not the patient, not the diagnosis, but the individual with unique needs, values, and goals. Surrounding them are the key partners in care: nurses, doctors, pharmacists, personal care aides, family members, and the broader community. These are the people care coordinators help coordinate and align to ensure care is truly centered on the individual.\u003cbreak time=\"0.5s\"/>The outer ring highlights the principles that guide a care coordinators's work:\u003cbreak time=\"0.5s\"/>Full Transparency: Keep individuals informed and involved in their care.\u003cbreak time=\"0.5s\"/>Shared Goal Setting: Collaborate with the person and their support network to define what success looks like.\u003cbreak time=\"0.5s\"/>Mission and Values Aligned with Patient Goals: Ensure that care plans reflect what matters most to the person.\u003cbreak time=\"0.5s\"/>Understanding Individual Preferences: Go beyond clinical needs—learn about cultural, social, and emotional factors.\u003cbreak time=\"0.5s\"/>Health Equity: Identify and address barriers to care, especially for underserved populations.\u003cbreak time=\"0.5s\"/>Collaborated and Coordinated Care: Facilitate communication across providers and services to avoid fragmentation.\u003cbreak time=\"0.5s\"/>Notice a specific callout: ‘Family Viewpoints Respected and Valued.’ This is a reminder that families are not just visitors—they’re partners in care.\u003cbreak time=\"0.5s\"/>As waiver service coordinators, you are the bridge between systems and members. Your ability to listen, advocate, and coordinate is what transforms this model from a diagram into a lived experience for the individuals we serve. Person-Centered Care isn’t just a philosophy—it’s a practice, and waiver service coordinators are a vital component of making it happen.”\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"This graphic illustrates the core framework of person centered care,","startTime":0.019,"finishTime":3.67},{"text":"a model that places the individual at the heart of every healthcare decision.","startTime":3.839,"finishTime":7.55},{"text":"The waiver service coordinator's role is essential in making this model a reality.","startTime":8.39,"finishTime":12.81},{"text":"At the center of the diagram is the person,","startTime":14.199,"finishTime":16.43},{"text":"the member,","startTime":16.6,"finishTime":17.229},{"text":"not the patient,","startTime":17.44,"finishTime":18.239},{"text":"not the diagnosis,","startTime":18.549,"finishTime":19.69},{"text":"but the individual with unique needs,","startTime":19.92,"finishTime":21.87},{"text":"values,","startTime":22.02,"finishTime":22.67},{"text":"and goals.","startTime":22.76,"finishTime":23.559},{"text":"Surrounding them are the key partners in care nurses,","startTime":24.45,"finishTime":27.489},{"text":"doctors,","startTime":27.729,"finishTime":28.37},{"text":"pharmacists,","startTime":28.489,"finishTime":29.409},{"text":"personal care aides,","startTime":29.549,"finishTime":30.77},{"text":"family members,","startTime": ural\">Motivational Interviewing is a way of conversing with a member about their desire or lack of desire to make a change in their lifestyle. ​​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Motivational interviewing is a way of conversing with a member about their","startTime":0.159,"finishTime":3.559},{"text":"desire or lack of desire to make a change in their lifestyle.","startTime":3.559,"finishTime":6.929}]}},"KbJF7FoB9wu6NtzCC":{"_id":"KbJF7FoB9wu6NtzCC","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"gaRPS6QBMoEjBBeD4","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":792,"height":1080},"dates":{"dateCreated":"2025-05-20T16:37:04.581Z","dateModified":"2025-05-20T16:37:04.581Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"KcbvYsAdjQWgy8taR":{"_id":"KcbvYsAdjQWgy8taR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":343587,"uploadedFileName":"Understanding-the-PCSP-Care-Plan-vs-Service-Plan.png","height":1026,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-15T14:11:45.811Z","dateModified":"2026-04-15T14:11:45.811Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"ujCzyJGzXDTH7uPAW","thumbnail":"PvXh4yKkxRDgmGqqQ"},"KfJGjiLNoTjDc3XYP":{"_id":"KfJGjiLNoTjDc3XYP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1556352,"uploadedFileName":"Eric-en-PCSPDocumentationPitfalls-4152026.mp3","uploadedFileNameExtension":".mp3","duration":64.8125},"dates":{"dateCreated":"2026-04-15T16:18:51.781Z","dateModified":"2026-04-15T16:18:54.261Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"There are several common documentation pitfalls with the Person Centered Service Plan. One of the biggest issues is services showing up on a service plan without clear support in the care plan. When that happens, reviewers can’t see why the service exists. Another common issue is misalignment where the care plan focuses on one set of priorities and the service plan reflects something else entirely. Missing or outdated signatures are another frequent finding. Often the service itself was appropriate, but the documentation didn’t reflect timely agreement. Vague language can also create problems. Statements that don’t explain the reason behind a service leave too much up to interpretation. The solution isn’t more documentation, it’s clearer documentation. Before finalizing a plan, pause and ask, If someone unfamiliar with this case read this, would they understand what matters to the individual and why each service is here? Avoiding these pitfalls makes person centered decisions visible and defensible.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"t69Jr97aA3nGAEMaA","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">There are several common documentation pitfalls with the Person Centered Service Plan. One of the biggest issues is services showing up on a service plan without clear support in the care plan. When that happens, reviewers can’t see why the service exists. Another common issue is misalignment where the care plan focuses on one set of priorities and the service plan reflects something else entirely. Missing or outdated signatures are another frequent finding. Often the service itself was appropriate, but the documentation didn’t reflect timely agreement. Vague language can also create problems. Statements that don’t explain the reason behind a service leave too much up to interpretation. The solution isn’t more documentation, it’s clearer documentation. Before finalizing a plan, pause and ask, If someone unfamiliar with this case read this, would they understand what matters to the individual and why each service is here? Avoiding these pitfalls makes person centered decisions visible and defensible.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"There are several common documentation pitfalls","startTime":0.119,"finishTime":2.65},{"text":"with the person-centered service plan.","startTime":2.65,"finishTime":4.57},{"text":"One of the biggest issues is services showing up on","startTime":5.46,"finishTime":8.02},{"text":"a service plan without clear support in the care plan.","startTime":8.02,"finishTime":10.979},{"text":"When that happens,","startTime":11.818999999999999,"finishTime":12.81},{"text":"reviewers can't see why the service exists.","startTime":13.18,"finishTime":15.56},{"text":"Another common issue is misalignment where the care plan focuses on one","startTime":16.458,"finishTime":20.349},{"text":"set of priorities and the service plan reflects something else entirely.","startTime":20.349,"finishTime":24.009},{"text":"Missing or outdated signatures are another frequent finding.","startTime":24.909,"finishTime":28.229},{"text":"Often the service itself was appropriate,","startTime":29.079,"finishTime":31.28},{"text":"but the documentation didn't reflect timely agreement.","startTime":31.44,"finishTime":34.24},{"text":"Vague language can also create problems.","startTime":35.139,"finishTime":37.58},{"text":"Statements that don't explain the reason behind a","startTime":38.599,"finishTime":40.919},{"text":"service leave too much up to interpretation.","startTime":40.919,"finishTime":43.2},{"text":"The solution isn't more documentation,","startTime":44.02,"finishTime":46.29},{"text":"it's clearer documentation.","startTime":46.5,"finishTime":48.02},{"text":"Before finalizing a plan,","startTime":49.08,"finishTime":50.5},{"text":"pause and ask if someone unfamiliar with this case read this,","startTime":50.72,"finishTime":54.549},{"text":"would they understand what matters to the individual and why each service is here.","startTime":54.799,"finishTime":58.779},{"text":"Avoiding these pitfalls makes person-centered","startTime":59.659,"finishTime":62.47},{"text":"decisions visible and defensible.","startTime":62.47,"finishTime":64.089}]}},"KkZf3S8HiJLnB8ZY4":{"_id":"KkZf3S8HiJLnB8ZY4","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"qWrPuAwomJn8DYS5g","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":89,"height":89},"dates":{"dateCreated":"2025-05-20T16:37:03.898Z","dateModified":"2025-05-20T16:37:03.898Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"L4ybANp5XR5585YCo":{"_id":"L4ybANp5XR5585YCo","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":129024,"uploadedFileName":"Eric-en-Section4-4172026.mp3","uploadedFileNameExtension":".mp3","duration":5.3375},"dates":{"dateCreated":"2026-04-17T14:45:13.523Z","dateModified":"2026-04-17T14:45:15.332Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","s  most frequently associated with documentation risk not because it’s uncommon, but because it often spans multiple systems and payers. The most common issues involve Private Duty Nursing services being delivered without being fully reflected in the Person centered service plan, hours drifting beyond what’s documented, or updates being made in one place but not another. These situations don’t typically start as compliance problems, they start as communication gaps. Risk prevention is straightforward. Make sure Private Duty Nursing is always supported in the Care Plan, authorized in the Service Plan, and kept up to date when changes are expected to continue. When coordination is documented and plans are aligned, Private Duty Nursing becomes just another service that supports the individual’s ability to live safely in their chosen setting and not a source of audit concern. Remeber that every service, no matter who pays for it, must fit clearly within the person‑centered plan.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"WJBWP34hYHwuMsLaF","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Private Duty Nursing is one of the services most frequently associated with documentation risk not because it’s uncommon, but because it often spans multiple systems and payers. The most common issues involve Private Duty Nursing services being delivered without being fully reflected in the Person centered service plan, hours drifting beyond what’s documented, or updates being made in one place but not another. These situations don’t typically start as compliance problems, they start as communication gaps. Risk prevention is straightforward. Make sure Private Duty Nursing is always supported in the Care Plan, authorized in the Service Plan, and kept up to date when changes are expected to continue. When coordination is documented and plans are aligned, Private Duty Nursing becomes just another service that supports the individual’s ability to live safely in their chosen setting and not a source of audit concern. Remeber that every service, no matter who pays for it, must fit clearly within the person‑centered plan.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Private duty nursing is one of the","startTime":0.079,"finishTime":1.8090000000000002},{"text":"services most frequently associated with documentation risk,","startTime":1.8090000000000002,"finishTime":5.09},{"text":"not because it's uncommon,","startTime":5.17,"finishTime":6.57},{"text":"but because it often spans multiple systems and pairs.","startTime":6.769,"finishTime":9.77},{"text":"The most common issues involve private duty nursing services being","startTime":10.609,"finishTime":14.329},{"text":"delivered without being fully reflected in the person-centered service plan,","startTime":14.329,"finishTime":17.889},{"text":"hours drifting beyond what's documented or updates being","startTime":18.09,"finishTime":21.37},{"text":"made in one place but not another.","startTime":21.37,"finishTime":23.25},{"text":"These situations don't typically start as compliance problems,","startTime":24.17,"finishTime":27.61},{"text":"they start as communication gaps.","startTime":27.819,"finishTime":29.78},{"text":"Risk prevention is straightforward.","startTime":30.67,"finishTime":32.529},{"text":"Make sure private duty nursing is always supported in the care plan,","startTime":33.4,"finishTime":36.84},{"text":"authorized in the service plan,","startTime":37,"finishTime":38.65},{"text":"and kept up to date when changes are expected to continue.","startTime":38.88,"finishTime":41.9},{"text":"When coordination is documented and plans are aligned,","startTime":42.74,"finishTime":45.689},{"text":"private duty nursing becomes just another","startTime":45.979,"finishTime":48.139},{"text":"service that supports the individual's ability to","startTime":48.139,"finishTime":50.54},{"text":"live safely in their chosen setting and not a source of audit concern.","startTime":50.54,"finishTime":54.119},{"text":"Remember that every service,","startTime":54.939,"finishTime":56.52},{"text":"no matter who pays for it,","startTime":56.669,"finishTime":58.009},{"text":"must fit clearly within the person-centered plan.","startTime":58.29,"finishTime":60.9}]}},"STmCnHjuC24JMraaH":{"_id":"STmCnHjuC24JMraaH","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":4298688,"uploadedFileName":"Eric-en-SMART goal examples-6/6/2025.mp3","uploadedFileNameExtension":".mp3","duration":179.0875},"dates":{"dateCreated":"2025-06-06T17:06:42.244Z","dateModified":"2025-06-06T17:06:45.862Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Here’s a SMART goal example for Mary, a fictional member who wants to walk outside again like she used to. Her pain has been a barrier, so the care plan focuses on reducing her pain level and gradually increasing her stamina.\nThe goal is specific and measurable—Mary wants to reduce her pain from a 6–7 to a 3–4. It’s attainable through a combination of medication, physical activity with support, and pacing strategies.\nThis goal is relevant to Mary’s personal values—being outdoors helps her feel independent and emotionally well. The timeline is realistic, with progress reviewed every 60 days over a 6-month period.\nImportantly, this goal is supported by a team: her PCP manages her treatment, her aide helps with walking, and her care coordinator ensures the plan stays on track. Family members are also encouraged to support and celebrate her progress.\nThis example shows how a SMART goal can be both clinically sound and deeply personal—centered on what matters most to the member.\n\nThis next SMART goal focuses on improving social connection, which is a key part of emotional well-being. The member has shared that they often feel isolated and would like to talk to someone outside their home at least once a week.\nThe goal is specific and measurable—one meaningful interaction per week. It’s attainable through a mix of phone calls, community events, and support from the care team.\nIt’s also highly relevant to the member’s emotional health and sense of belonging. The goal will be reviewed in 60 days to see how it’s going and whether any adjustments are needed.\nThis example shows how person-centered care planning can support not just physical health, but also emotional and social needs—by involving the member’s support network and building on what matters most to them.\n\nA final SMART goal example focuses on nutrition and self-management. The member wants to feel more energetic and better manage their diabetes by eating healthier meals.\nThe goal is specific and measurable—preparing and eating four home-cooked meals per week. It’s attainable with support from a dietitian, family, or an aide, and it’s highly relevant to the member’s health and personal goals.\nThe care plan includes clear action steps and a 30-day review period to ensure the member is supported and making progress.\nThis example highlights how SMART goals can empower members to take control of their health in ways that are realistic, meaningful, and supported by their care team.\n\nEach SMART goal we help develop is more than a task—it’s a reflection of what matters most to the member. By grounding goals in their values, supporting them with realistic steps, and involving the right people, we ensure care planning is not only person-centered, but truly person-led.","voiceCode it's highly relevant to the members' health and personal goals.","startTime":138.899,"finishTime":142.1},{"text":"The care plan includes clear action steps and a 30 day","startTime":143.399,"finishTime":146.86},{"text":"review period to ensure the member is supported and making progress.","startTime":146.86,"finishTime":150.289},{"text":"This example highlights how smart goals can empower members to","startTime":151.74,"finishTime":155.139},{"text":"take control of their health in ways that are realistic,","startTime":155.139,"finishTime":157.699},{"text":"meaningful,","startTime":157.94,"finishTime":158.529},{"text":"and supported by their care team.","startTime":158.58,"finishTime":160.259},{"text":"Each smart goal we help develop is more than a task,","startTime":161.639,"finishTime":164.61},{"text":"it's a reflection of what matters most to the member.","startTime":164.839,"finishTime":167.24},{"text":"By grounding goals and their values,","startTime":168.039,"finishTime":170.089},{"text":"supporting them with realistic steps and involving the right people,","startTime":170.429,"finishTime":173.82},{"text":"we ensure care planning is not only person centered but truly person led.","startTime":174.029,"finishTime":178.309}]}},"TCAgT2nzsAx4W9pso":{"_id":"TCAgT2nzsAx4W9pso","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":999979,"uploadedFileName":"Private-Duty-Nursing-PDN-Common-Risks-and-How-to-Prevent-Them.png","height":1056,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-04-15T16:25:28.471Z","dateModified":"2026-04-15T16:25:28.471Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"MLH7ygB5zJLZxain3","thumbnail":"uAPrNu9sndmwBiLc4"},"TFF6rRKC8ZwYa8G9J":{"_id":"TFF6rRKC8ZwYa8G9J","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"video","mimetype":"video/mp4","status":"online","fileSizeInBytes":14245227,"uploadedFileName":"yt_612b88acc61f4a3facb06042d720edb3.mp4","duration":290.441,"uploadedFileNameExtension":".mp4"},"dates":{"dateCreated":"2025-12-22T20:13:49.835Z","dateModified":"2025-12-22T20:13:49.835Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"CJ8EDYB6T7hjoCmgB","thumbnail":"vAZA2Eu3roE9WcPsv","videoSD":"XEDgx3pjWGXGbY2nt","captionData":{"status":"success","captions":[{"text":"I'm Doctor Wendy Guests here to explain how","startTime":0.629,"finishTime":3.4699999999999998},{"text":"using behavioral science can change your life.","startTime":3.4699999999999998,"finishTime":6.489},{"text":"Have you ever really wanted to change something in your life,","startTime":8.25,"finishTime":11.159},{"text":"but it didn't work out the way you planned.","startTime":11.449,"finishTime":13.67},{"text":"Maybe you wanted to eat healthier","startTime":14.09,"finishTime":15.869},{"text":"or exercise more often,","startTime":16.01,"finishTime":17.729},{"text":"or get rid of a bad habit.","startTime":17.889,"finishTime":19.37},{"text":"You made some goals,","startTime":20.1,"finishTime":21.37},{"text":"you tried to change,","startTime":21.42,"finishTime":22.729},{"text":"but in the end you were not successful,","startTime":22.979,"finishTime":25.399},{"text":"and you felt frustrated and stressed out.","startTime":25.469,"finishTime":28.299},{"text":"Well,","startTime":28.579,"finishTime":28.979},{"text":"here's some good news.","startTime":29.219,"finishTime":30.68},{"text":"The science of behavior change can help you succeed in changing your behavior","startTime":30.899,"finishTime":36.24},{"text":"and as a result,","startTime":36.459,"finishTime":37.56},{"text":"have a better life.","startTime":37.7,"finishTime":38.88},{"text":"Behavioral scientists","startTime":40.75,"finishTime":42.409},{"text":"have found that people who go through a particular process to","startTime":42.549,"finishTime":45.549},{"text":"make a behavior change are more successful than those who don't.","startTime":45.549,"finishTime":49.619},{"text":"That process is called the trans-theoretical model","startTime":50.029,"finishTime":53.209},{"text":"or simply","startTime":53.389,"finishTime":54.25},{"text":"the stages of change.","startTime":54.389,"finishTime":55.93},{"text":"Let's learn about these stages to help you succeed","startTime":56.31,"finishTime":58.99},{"text":"in making a positive change in your life.","startTime":58.99,"finishTime":61.409},{"text":"Meet Isabella.","startTime":63.06,"finishTime":64.26},{"text":"She has a challenging job and often feels tired and run down.","startTime":64.58,"finishTime":68.129},{"text":"One day her friend asks if she'd like to join a fitness walking group,","startTime":68.5,"finishTime":72.25},{"text":"but Isabella doesn't see the purpose and explains that her schedule is too busy.","startTime":72.54,"finishTime":77.919},{"text":"Isabella is in stage one of the trans-theoretical model,","startTime":78.22,"finishTime":81.779},{"text":"the pre-contemplation stage.","startTime":82.099,"finishTime":83.919},{"text":"For her to move out of this stage,","startTime":84.459,"finishTime":85.919},{"text":"something has to happen,","startTime":86.339,"finishTime":87.9},{"text":"something that makes her think.","startTime":88.18,"finishTime":89.519},{"text":"One day Isabella reads an article that helps","startTime":91.29,"finishTime":93.849},{"text":"her realize some of her habits really aren't healthy","startTime":93.849,"finishTime":96.91},{"text":"and could lead to serious problems later in life.","startTime":97.33,"finishTime":100.3},{"text":"She begins to consider the pros and cons of making a lifestyle change.","startTime":100.699,"finishTime":104.769},{"text":"Now when her friend asks about walking,","startTime":105.709,"finishTime":108.099},{"text":"Isabella says","startTime":108.419,"finishTime":109.65},{"text":"she'll think about it.","startTime":109.83,"finishTime":110.86},{"text":"Isabella is now in stage 2,","startTime":111.11,"finishTime":113.349},{"text":"the contemplation stage.","startTime":113.55,"finishTime":115.169},{"text":"As Isabella contemplates further,","startTime":116.51,"finishTime":118.629},{"text":"she starts to talk to her friends and colleagues about how","startTime":118.879,"finishTime":122.239},{"text":"she might fit a regular walking program into her busy schedule.","startTime":122.239,"finishTime":125.94},{"text":"She also researches what she might need for walking,","startTime":126.319,"finishTime":129.24},{"text":"as well as the benefits she can expect,","startTime":129.479,"finishTime":131.82},{"text":"such as better health,","startTime":132.32,"finishTime":133.8},{"text":"more energy,","startTime":134.16,"finishTime":135.11},{"text":"and increased endurance.","startTime":135.279,"finishTime":136.94},{"text":"Isabella is emotionally and mentally preparing herself to change her lifestyle","startTime":138.47,"finishTime":144.059},{"text":"by increasing her self-efficacy","startTime":144.16,"finishTime":146.5},{"text":"and building her determination toward adopting this new behavior.","startTime":146.679,"finishTime":150.559},{"text":"She's in stage 3,","startTime":150.919,"finishTime":152.44},{"text":"the preparation or determination stage,","startTime":152.639,"finishTime":155.309},{"text":"which will empower her to make a change.","startTime":155.509,"finishTime":157.86},{"text":"Now that Isabella is prepared and determined to make a change,","startTime":159.289,"finishTime":162.919},{"text":"she takes action by joining her friend's walking group.","startTime":163.289,"finishTime":166.729},{"text":"After a month,","startTime":167.05,"finishTime":167.99},{"text":"Isabella is doing very well and starts to see","startTime":168.13,"finishTime":171.33},{"text":"her results in her energy and daily life.","startTime":171.33,"finishTime":174.309},{"text":"Isabella is in stage 4,","startTime":174.77,"finishTime":176.99},{"text":"the action stage.","startTime":177.289,"finishTime":178.61},{"text":"But when things get a bit hectic at work,","startTime":179.589,"finishTime":181.86},{"text":"she stops walking for a week.","startTime":182,"finishTime":183.74},{"text":"Fortunately,","startTime":184.08,"finishTime":184.83},{"text":"her group leader understands the challenges people face in the action stage","startTime":184.839,"finishTime":189.179},{"text":"and shares some motivational material to help Isabella get back on track.","startTime":189.52,"finishTime":194.22},{"text":"Over time,","startTime":194.57,"finishTime":195.529},{"text":"Isabella becomes more consistent and confident with her walking activity","startTime":195.679,"finishTime":200.059},{"text":"and starts feeling better than ever.","startTime":200.279,"finishTime":202.779},{"text":"Fast forward 6 months,","startTime":204.61,"finishTime":206.38},{"text":"we find that Isabella is consistently maintaining her new lifestyle.","startTime":206.529,"finishTime":211.139},{"text":"She feels great physically,","startTime":211.57,"finishTime":213.589},{"text":"handles daily stress with more ease,","startTime":213.77,"finishTime":216.169},{"text":"and has more energy than ever,","startTime":216.47,"finishTime":218.71},{"text":"Isabel.","startTime":219.119,"finishTime":219.41},{"text":"Vela is in the 5th stage,","startTime":219.565,"finishTime":221.425},{"text":"the maintenance stage.","startTime":221.725,"finishTime":223.264},{"text":"She has built a supportive network by getting","startTime":223.604,"finishTime":226.404},{"text":"friends and family to join her walking group,","startTime":226.404,"finishTime":229.074},{"text":"and that helps her focus on preventing a","startTime":229.285,"finishTime":231.645},{"text":"relapse back to her previous behavior patterns.","startTime":231.645,"finishTime":234.845},{"text":"Each stage of the behavioral change process presented new challenges,","startTime":236.16,"finishTime":240.91},{"text":"but when Isabella worked on her internal attitude changes,","startTime":241.199,"finishTime":244.589},{"text":"she was able to make the external behavioral changes that she desired.","startTime":244.839,"finishTime":249.22},{"text":"Now she is thrilled with her healthier lifestyle and","startTime":249.83,"finishTime":253.199},{"text":"all the benefits that come along with it.","startTime":253.199,"finishTime":255.419},{"text":"Congratulations,","startTime":255.8,"finishTime":256.98},{"text":"Isabella.","startTime":257.04,"finishTime":257.88},{"text":"We all have behaviors that we want or need to change.","startTime":259.819,"finishTime":264.079},{"text":"Using behavioral science to understand the change process","startTime":264.398,"finishTime":268.218},{"text":"will help you be more successful with changing those behaviors.","startTime":268.459,"finishTime":272.449},{"text":"That means a better you","startTime":272.739,"finishTime":274.898},{"text":"and a better life.","startTime":275.098,"finishTime":276.378},{"text":"I'm Doctor Wendy Guess.","startTime":277.82,"finishTime":279.38},{"text":"Thanks for joining me.","startTime":279.69,"finishTime":280.94},{"text":"I'd love to hear about your journey to a better you.","startTime":281.179,"finishTime":284.94}]}},"THCTdnb6YdDKghohx":{"_id":"THCTdnb6YdDKghohx","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":681984,"uploadedFileName":"Eric-en-Principles of Interviewing-5/27/2025.mp3","uploadedFileNameExtension":".mp3","duration":28.375},"dates":{"dateCreated":"2025-05-27T14:32:39.654Z","dateModified":"2025-05-27T14:32:41.819Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Motivational interviewing is a guiding style of communication, that sits between following (good listening) and directing (giving information and advice).​​\nMotivational interviewing is designed to empower people to change by drawing out their own meaning, importance and capacity for change.​​\nMotivational interviewing is based on a respectful and curious way of being with people that facilitates the natural process of change and honors client autonomy.​","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"tiQM7xW93wCkvBKmu","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Motivational interviewing is a guiding style of communication, that sits between following (good listening) and directing (giving information and advice).​​\u003cbreak time=\"0.5s\"/>Motivational interviewing is designed to empower people to change by drawing out their own meaning, importance and capacity for change.​​\u003cbreak time=\"0.5s\"/>Motivational interviewing is based on a respectful and curious way of being with people that facilitates the natural process of change and honors client autonomy.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Motivational interviewing is a guiding style of communication","startTime":0.129,"finishTime":3.43},{"text":"that sits between following,","startTime":3.68,"finishTime":5.079},{"text":"good listening,","startTime":5.36,"finishTime":6.179},{"text":"and directing,","startTime":6.28,"finishTime":7.07},{"text":"giving information and advice.","startTime":7.199,"finishTime":8.909},{"text":"Motivational interviewing is designed to empower people to","startTime":10.359,"finishTime":13.479},{"text":"change by drawing out their own meaning,","startTime":13.479,"finishTime":15.409},{"text":"importance,","startTime":15.479,"finishTime":16.158},{"text":"and capacity for change.","startTime":16.219,"finishTime":17.75},{"text":"Motivational interviewing is based on a respectful and curious way of being with","startTime":19.18,"finishTime":23.25},{"text":"people that facilitates the natural process of change and honors client autonomy.","startTime":23.25,"finishTime":27.53}]}},"Tc7Ln4j36jNHyKtFb":{"_id":"Tc7Ln4j36jNHyKtFb","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2372544,"uploadedFileName":"Eric-en-Advance Directive Documents-6/18/2025.mp3","uploadedFileNameExtension":".mp3","duration":98.825},"dates":{"dateCreated":"2025-06-18T13:38:25.974Z","dateModified":"2025-06-18T13:38:28.640Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"There are four common types of advance directive documents we should be familiar with:\nFirst, the Healthcare Power of Attorney. This document allows a person to appoint someone they trust to make healthcare decisions on their behalf if they become incapacitated. In Ohio, this is governed by Ohio Revised Code 13 37 12.\nSecond, the Living Will. This is a notarized or witnessed document that outlines a person’s wishes regarding life-sustaining treatment. It becomes effective when the individual is terminally ill or permanently unconscious, and is regulated under Ohio Administrative Code 37 01 62.\nThird, Organ Donor Registration. This can be completed at the BMV or through national databases and indicates a person’s decision to donate organs, tissues, or eyes after death. This is covered under Ohio Administrative Code 45 01 1 1 36.\nAnd finally, Do Not Resuscitate Orders, or DNRs. These are medical orders signed by a physician or advanced practice provider that instruct healthcare professionals not to perform CPR or other life-sustaining measures. These are also governed by Ohio Administrative Code 37 01 62.\nAs care coordinators, it’s important to not only understand these documents but also help members explore and document their preferences in a timely and respectful manner. These conversations should happen at a time and place that is convenient and comfortable for the member.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"xAdDsLKdQuqknLWmM","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">There are four common types of advance directive documents we should be familiar with:\u003cbreak time=\"0.5s\"/>First, the Healthcare Power of Attorney. This document allows a person to appoint someone they trust to make healthcare decisions on their behalf if they become incapacitated. In Ohio, this is governed by Ohio Revised Code 13 37 12.\u003cbreak time=\"0.5s\"/>Second, the Living Will. This is a notarized or witnessed document that outlines a person’s wishes regarding life-sustaining treatment. It becomes effective when the individual is terminally ill or permanently unconscious, and is regulated under Ohio Administrative Code 37 01 62.\u003cbreak time=\"0.5s\"/>Third, Organ Donor Registration. This can be completed at the BMV or through national databases and indicates a person’s decision to donate organs, tissues, or eyes after death. This is covered under Ohio Administrative Code 45 01 1 1 36.\u003cbreak time=\"0.5s\"/>And finally, Do Not Resuscitate Orders, or DNRs. These are medical orders signed by a physician or advanced practice provider that instruct healthcare professionals not to perform CPR or other life-sustaining measures. These are also governed by Ohio Administrative Code 37 01 62.\u003cbreak time=\"0.5s\"/>As care coordinators, it’s important to not only understand these documents but also help members explore and document their preferences in a timely and respectful manner. These conversations should happen at a time and place that is convenient and comfortable for the member.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"There are 4 common types of advanced","startTime":0.119,"finishTime":2.19},{"text":"directive documents we should be familiar with.","startTime":2.19,"finishTime":4.599},{"text":"First,","startTime":5.039,"finishTime":5.369},{"text":"the health care power of attorney.","startTime":5.599,"finishTime":7.36},{"text":"This document allows a person to appoint someone they trust to","startTime":8.26,"finishTime":11.26},{"text":"make healthcare decisions on their behalf if they become incapacitated.","startTime":11.26,"finishTime":14.818999999999999},{"text":"In Ohio,","startTime":15.649000000000001,"finishTime":16.549},{"text":"this is governed by Ohio revised code 133712.","startTime":16.76,"finishTime":20.79},{"text":"Second,","startTime":22.29,"finishTime":22.819},{"text":"the living will.","startTime":23.01,"finishTime":23.889},{"text":"This is a notarized or witnessed document that","startTime":24.69,"finishTime":27.149},{"text":"outlines a person's wishes regarding life sustaining treatment.","startTime":27.149,"finishTime":30.35},{"text":"It becomes effective when the individual is terminally ill or","startTime":31.2,"finishTime":34.479},{"text":"permanently unconscious and is regulated under Ohio Administrative code 370162.","startTime":34.479,"finishTime":41.06},{"text":"Third organ donor registration.","startTime":42.529,"finishTime":44.619},{"text":"This can be completed at the BMV or through national","startTime":45.599,"finishTime":48.479},{"text":"databases and indicates a person's decision to donate organs,","startTime":48.479,"finishTime":51.959},{"text":"tissues,","startTime":52,"finishTime":52.72},{"text":"or eyes after death.","startTime":52.84,"finishTime":54.15},{"text":"This","startTime":54.919,"finishTime":54.93},{"text":"is covered under Ohio administrative code 45011136.","startTime":55.15,"finishTime":60.59},{"text":"And finally,","startTime":61.919,"finishTime":62.779},{"text":"do not resuscitate orders or DNRs.","startTime":62.93,"finishTime":65.79},{"text":"These are medical orders signed by a physician or advanced practice provider that","startTime":66.68,"finishTime":70.72},{"text":"instruct healthcare professionals not to perform","startTime":70.72,"finishTime":73.12},{"text":"CPR or other life sustaining measures.","startTime":73.12,"finishTime":75.559},{"text":"These are also governed by Ohio Administrative Code 370162.","startTime":76.519,"finishTime":81.83},{"text":"As care coordinators,","startTime":83.23,"finishTime":84.58},{"text":"it's important to not only understand these documents but also help members","startTime":84.75,"finishTime":88.669},{"text":"explore and document their preferences in a timely and respectful manner.","startTime":88.669,"finishTime":92.339},{"text":"These conversations should happen at a time and place","startTime":93.26,"finishTime":95.9},{"text":"that is convenient and comfortable for the member.","startTime":95.9,"finishTime":98.05}]}},"TpCAJ5Z9PrwXNTZQR":{"_id":"TpCAJ5Z9PrwXNTZQR","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"xcYzNJQTCcspNNAZy","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":45,"height":56},"dates":{"dateCreated":"2025-05-20T16:37:03.205Z","dateModified":"2025-05-20T16:37:03.205Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"Tya2J4LqtmsBPENAL":{"_id":"Tya2J4LqtmsBPENAL","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"m9TCvkveMRvzj2o4c","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":1680,"height":358},"dates":{"dateCreated":"2025-05-20T16:37:03.507Z","dateModified":"2025-05-20T16:37:03.507Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"WSBYRALBMTGwJEEoN":{"_id":"WSBYRALBMTGwJEEoN","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"BHxAsobgX4ybweFEX","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":428,"height":119},"dates":{"dateCreated":"2025-05-20T16:37:04.134Z","dateModified":"2025-05-20T16:37:04.134Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"WdijiJwt3JFaF8EG4":{"_id":"WdijiJwt3JFaF8EG4","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"3uC6WNxa9MicpPg2f","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":428,"height":119},"dates":{"dateCreated":"2025-05-20T16:37:04.053Z","dateModified":"2025-05-20T16:37:04.053Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"WoJ8ki8RevQzdzE7h":{"_id":"WoJ8ki8RevQzdzE7h","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1601856,"uploadedFileName":"Eric-en-OARS: Core Skills-6/18/2025.mp3","uploadedFileNameExtension":".mp3","duration":66.7},"dates":{"dateCreated":"2025-06-18T14:01:10.427Z","dateModified":"2025-06-18T14:01:12.933Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"The O A R S framework​​ also known as oars, is comprised of Open questions, Affirmation of strengths, Reflections, and Summarizing.\nOpen questions draw out and explore the person’s experiences, perspectives, and ideas. Evocative questions guide the client to reflect on how change may be meaningful or possible. Information is often offered within a structure of open questions (Elicit-Provide-Elicit) that first explores what the person already knows, then seeks permission to offer what the practitioner knows and then explores the person’s response.​​\nAffirmation of strengths, efforts, and past successes help to build the person’s hope and confidence in their ability to change.​​\nReflections are based on careful listening and trying to understand what the person is saying, by repeating, rephrasing or offering a deeper guess about what the person is trying to communicate. This is a foundational skill of MI and how we express empathy. ​​\nSummarizing ensures shared understanding and reinforces key points made by the client.​​","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"qmQPnHQEYQtJjD6E3","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">The O A R S framework​​ also known as oars, is comprised of Open questions, Affirmation of strengths, ve process where the member leads the way—choosing who they want to be involved, whether that’s family, friends, or professionals.\nThe plan builds on the member’s strengths and identifies areas of opportunity to help them move toward what matters most to them. Both formal services and informal supports are considered to create a well-rounded support system.\nThe Care Coordinator works with the member to monitor progress and make adjustments as needed, ensuring the plan remains relevant and effective until the member’s goal is achieved.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"Tg9Wu5PW5WWArQtCf","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">Care planning takes a whole-person, person-centered approach to supporting members. It’s a collaborative process where the member leads the way—choosing who they want to be involved, whether that’s family, friends, or professionals.\u003cbreak time=\"0.5s\"/>The plan builds on the member’s strengths and identifies areas of opportunity to help them move toward what matters most to them. Both formal services and informal supports are considered to create a well-rounded support system.\u003cbreak time=\"0.5s\"/>The Care Coordinator works with the member to monitor progress and make adjustments as needed, ensuring the plan remains relevant and effective until the member’s goal is achieved.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Care planning takes a whole person,","startTime":0.119,"finishTime":1.83},{"text":"person centered approach to supporting members.","startTime":2.069,"finishTime":4.44},{"text":"It's a collaborative process where the member leads the way,","startTime":5.21,"finishTime":8.148},{"text":"choosing who they want to be involved,","startTime":8.359,"finishTime":10.109},{"text":"whether that's family,","startTime":10.239,"finishTime":11.199},{"text":"friends,","startTime":11.5,"finishTime":11.989},{"text":"or professionals.","startTime":12.119,"finishTime":13.159},{"text":"The plan builds on the members' strengths and identifies areas of","startTime":14.46,"finishTime":18.129},{"text":"opportunity to help them move toward what matters most to them.","startTime":18.129,"finishTime":20.879},{"text":"Both formal services and informal supports are considered","startTime":21.78,"finishTime":24.819},{"text":"to create a well rounded support system.","startTime":24.819,"finishTime":26.889},{"text":"The care coordinator works with the member to","startTime":28.209,"finishTime":30.28},{"text":"monitor progress and make adjustments as needed,","startTime":30.28,"finishTime":32.909},{"text":"ensuring the plan remains relevant and effective","startTime":33.119,"finishTime":35.88},{"text":"until the member's goal is achieved.","startTime":35.88,"finishTime":37.61}]}},"XztZqrzALDkccRhTc":{"_id":"XztZqrzALDkccRhTc","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1418688,"uploadedFileName":"Eric-en-PCSPBestPractices-4152026.mp3","uploadedFileNameExtension":".mp3","duration":59.075},"dates":{"dateCreated":"2026-04-15T16:32:34.437Z","dateModified":"2026-04-15T16:32:37.532Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"To conclude Person Centered Service Planning with some best practices, Person‑Centered Service Planning starts with what matters most to the individual their goals, preferences, strengths, and needs. But it doesn’t end there. The Care Plan explains the ‘why’. Why services are needed and how they support the individual. The Service Plan explains the ‘what’. What services are authorized, by whom, and how often. Required signatures confirm agreement and understanding, and accurate documentation ties it all together into one clear, consistent story. When these elements align, the Person Centered Service Plan reflects person‑centered decision‑making and meets compliance expectations. As we move into SMART goals and care plan examples, keep this checklist in mind. If every service, goal, and authorization fits within this framework, the plan is both meaningful and defensible.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"ZdDn49ZimtWwiLM9o","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">To conclude Person Centered Service Planning with some best practices, Person‑Centered Service Planning starts with what matters most to the individual their goals, preferences, strengths, and needs. But it doesn’t end there. The Care Plan explains the ‘why’. Why services are needed and how they support the individual. The Service Plan explains the ‘what’. What services are authorized, by whom, and how often. Required signatures confirm agreement and understanding, and accurate documentation ties it all together into one clear, consistent story. When these elements align, the Person Centered Service Plan reflects person‑centered decision‑making and meets compliance expectations. As we move into SMART goals and care plan examples, keep this checklist in mind. If every service, goal, and authorization fits within this framework, the plan is both meaningful and defensible.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"To conclude person-centered service planning with some best practices,","startTime":0.05,"finishTime":3.799},{"text":"person-centered service planning starts with what","startTime":4.09,"finishTime":6.329},{"text":"matters most to the individual,","startTime":6.329,"finishTime":7.789},{"text":"their goals,","startTime":7.809,"finishTime":8.479},{"text":"preferences,","startTime":8.729,"finishTime":9.399000000000001},{"text":"strengths,","startTime":9.77,"finishTime":10.159},{"text":"and needs.","startTime":10.289,"finishTime":11.05},{"text":"But it doesn't end there.","startTime":11.88,"finishTime":13.17},{"text":"The care plan explains the why.","startTime":13.939,"finishTime":16.1},{"text":"Why services are needed and how they support the individual.","startTime":16.969,"finishTime":20.069},{"text":"The service plan explains the what?","startTime":20.899,"finishTime":23.079},{"text":"What services are authorized,","startTime":23.92,"finishTime":25.78},{"text":"by whom and how often?","startTime":25.899,"finishTime":27.639},{"text":"Required signatures confirm agreement and understanding,","startTime":28.469,"finishTime":31.549},{"text":"and accurate documentation ties it all together into one clear,","startTime":31.709,"finishTime":35.169},{"text":"consistent story.","startTime":35.47,"finishTime":36.549},{"text":"When these elements align,","startTime":37.4,"finishTime":38.79},{"text":"the person-centered service plan reflects person-centered","startTime":39,"finishTime":42.159},{"text":"decision making and meets compliance expectations.","startTime":42.159,"finishTime":44.74},{"text":"As we move into smart goals and care plan examples,","startTime":45.639,"finishTime":48.709},{"text":"keep this checklist in mind.","startTime":48.959,"finishTime":50.52},{"text":"If every service,","startTime":51.38,"finishTime":52.459},{"text":"goal,","startTime":52.709,"finishTime":53.18},{"text":"and authorization fits within this framework,","startTime":53.189,"finishTime":55.75},{"text":"the plan is both meaningful and defensible.","startTime":55.93,"finishTime":58.33}]}},"YnTcwTbgGhfoPbCQd":{"_id":"YnTcwTbgGhfoPbCQd","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":4010112,"uploadedFileName":"Eric-en-Additional Ideas for SMART Goals-6/18/2025.mp3","uploadedFileNameExtension":".mp3","duration":167.0625},"dates":{"dateCreated":"2025-06-18T15:22:48.845Z","dateModified":"2025-06-18T15:22:52.453Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes. Members may have goals that reflect their desire for connection, independence, learning, or contributing to their community.\nFor example, a member might want to volunteer at a local food pantry, apply for part-time work, or learn to use technology to stay in touch with family. These goals are just as meaningful and should be supported with the same care and structure.\nAs always, ensure each goal is Specific, Measurable, Attainable, Relevant, and Time-Based. and most importantly, that it reflects what the member wants to achieve.\n\nThis is an example of a SMART goal focused on employment. The member has expressed a desire to return to work in a part-time role that fits their skills and is close to home.\nThe goal is clearly defined, measurable, and realistic based on the member’s current situation. It also includes a specific timeframe, which helps both the member and care team track progress.\nThe action steps break the goal into manageable tasks, such as updating a resume and submitting applications weekly. This structure supports the member’s autonomy while ensuring the goal remains achievable and meaningful.\n\nAnother SMART goal example shown here focuses on a meaningful personal goal. Sally wants to attend her granddaughter’s wedding, and this desire motivates her to improve her mobility and strength. The goal is specific, measurable, and time-bound, and it reflects what truly matters to her. The Attainable section breaks down actionable steps Sally can take to achieve this goal and the Time Bound section specifically includes the statement Progression and self management toward above goal will be monitored. This statement is required by some health plans\n\nA final SMART goal example focuses on building independence in daily living. The member wants to prepare their own breakfast three times a week, which supports their broader goal of living more independently at home.\nThe goal is realistic and clearly defined, with a specific timeframe and measurable outcome. It also reflects the member’s personal values and desire for self-sufficiency.\nAction steps like identifying meals, shopping with support, and using reminders help break the goal into manageable parts, making it easier for the member to succeed and feel empowered.\n\nThese example demonstrate how SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes so consider smart goals for members that foster connection, independence, learning, and or contributing to their community.","voiceCode":"en-US-EricNeural","language":"en","originalResourceId":"XissxiDCn5s6u3cuK","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-EricNeural\">SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes. Members may have goals that reflect their desire for connection, independence, learning, or contributing to their community.\u003cbreak time=\"0.5s\"/>For example, a member might want to volunteer at a local food pantry, apply for part-time work, or learn to use technology to stay in touch with family. These goals are just as meaningful and should be supported with the same care and structure.\u003cbreak time=\"0.5s\"/>As always, ensure each goal is Specific, Measurable, Attainable, Relevant, and Time-Based. and most importantly, that it reflects what the member wants to achieve.\u003cbreak time=\"0.5s\"/>This is an example of a SMART goal focused on employment. The member has expressed a desire to return to work in a part-time role that fits their skills and is close to home.\u003cbreak time=\"0.5s\"/>The goal is clearly defined, measurable, and realistic based on the member’s current situation. It also includes a specific timeframe, which helps both the member and care team track progress.\u003cbreak time=\"0.5s\"/>The action steps break the goal into manageable tasks, such as updating a resume and submitting applications weekly. This structure supports the member’s autonomy while ensuring the goal remains achievable and meaningful.\u003cbreak time=\"0.5s\"/>Another SMART goal example shown here focuses on a meaningful personal goal. Sally wants to attend her granddaughter’s wedding, and this desire motivates her to improve her mobility and strength. The goal is specific, measurable, and time-bound, and it reflects what truly matters to her. The Attainable section breaks down actionable steps Sally can take to achieve this goal and the Time Bound section specifically includes the statement Progression and self management toward above goal will be monitored. This statement is required by some health plans\u003cbreak time=\"0.5s\"/>A final SMART goal example focuses on building independence in daily living. The member wants to prepare their own breakfast three times a week, which supports their broader goal of living more independently at home.\u003cbreak time=\"0.5s\"/>The goal is realistic and clearly defined, with a specific timeframe and measurable outcome. It also reflects the member’s personal values and desire for self-sufficiency.\u003cbreak time=\"0.5s\"/>Action steps like identifying meals, shopping with support, and using reminders help break the goal into manageable parts, making it easier for the member to succeed and feel empowered.\u003cbreak time=\"0.5s\"/>These example demonstrate how SMART goals in a person-centered care plan don’t have to be limited to health or diagnosis-related outcomes so consider smart goals for members that foster connection, independence, learning, and or contributing to their community.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Smart goals in a person centered care plan don't","startTime":0.159,"finishTime":2.68},{"text":"have to be limited to health or diagnosis-related outcomes.","startTime":2.68,"finishTime":5.88},{"text":"Members may have goals that reflect their desire for connection,","startTime":6.829,"finishTime":9.979},{"text":"independence,","startTime":10.189,"finishTime":11.02},{"text":"learning,","startTime":11.229,"finishTime":11.63},{"text":"or contributing to their community.","startTime":11.789,"finishTime":13.43},{"text":"For example,","startTime":14.84,"finishTime":15.64},{"text":"a member might want to volunteer at a local food pantry,","startTime":15.8,"finishTime":18.829},{"text":"apply for part-time work,","startTime":19.079,"finishTime":20.51},{"text":"or learn to use technology to stay in touch with family.","startTime":20.68,"finishTime":23.76},{"text":"These goals are just as meaningful and should","startTime":24.68,"finishTime":26.799},{"text":"be supported with the same care and structure.","startTime":26.799,"finishTime":29.11},{"text":"As always,","startTime":30.5,"finishTime":31.409},{"text":"ensure each goal is specific,","startTime":31.78,"finishTime":33.49},{"text":"measurable,","st  to health or diagnosis related outcomes,","startTime":156.479,"finishTime":159.559},{"text":"so consider smart goals for members that foster connection,","startTime":159.639,"finishTime":162.71},{"text":"independence,","startTime":162.88,"finishTime":163.639},{"text":"learning,","startTime":163.88,"finishTime":164.309},{"text":"and or contributing to their community.","startTime":164.389,"finishTime":166.279}]}},"Z3jPsZyqvt9CAGtsv":{"_id":"Z3jPsZyqvt9CAGtsv","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"ywjwGksZpzEn7HYXx","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":792,"height":1080},"dates":{"dateCreated":"2025-05-20T16:37:03.781Z","dateModified":"2025-05-20T16:37:03.781Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}}},"Zgguv45TbLmaXH8K3":{"_id":"Zgguv45TbLmaXH8K3","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":70540,"uploadedFileName":"image.png","height":384,"uploadedFileNameExtension":".png","width":1035},"dates":{"dateCreated":"2025-06-06T15:46:09.199Z","dateModified":"2025-06-06T15:46:09.199Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"Z4HkeisoQjWWW9Bo7","thumbnail":"CFygXckKyCdJNzdSc"},"ZqfiTi5QZbcLwnHQp":{"_id":"ZqfiTi5QZbcLwnHQp","_siteID":"ZoiyEJNGnnXpx9Jbx","isArchived":true,"isVisible":true,"isBuiltin":false,"isSampleData":false,"workspaceId":"oPYJFRcZXq3TGjd6g","thumbnail":"Znt6iPTvC44mK3JtN","data":{"attributes":{"mimetype":"image/png","status":"online","type":"image","uploadedFileName":"Image","uploadedFileNameExtension":".png","width":89,"height":89},"dates":{"dateCreated":"2025-05-20T1
