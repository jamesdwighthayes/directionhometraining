ed communication channels. Additional safeguards involve recognizing manipulation tactics, avoiding unverified links or attachments, and maintaining awareness of attempts to bypass standard processes. These measures reduce opportunities for social engineering to succeed. \u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Preventive measures against social engineering include","startTime":0.009,"finishTime":2.9699999999999998},{"text":"strict adherence to verification procedures,","startTime":2.9699999999999998,"finishTime":5.599},{"text":"careful evaluation of unexpected requests,","startTime":5.92,"finishTime":8.789},{"text":"and use of approved communication channels.","startTime":8.97,"finishTime":11.52},{"text":"Additional safeguards involve recognizing manipulation tactics,","startTime":11.77,"finishTime":15.409},{"text":"avoiding unverified links or attachments,","startTime":15.689,"finishTime":18.12},{"text":"and maintaining awareness of attempts to bypass standard processes.","startTime":18.399,"finishTime":22.389},{"text":"These measures reduce opportunities for social engineering to succeed.","startTime":22.69,"finishTime":26.53}]}},"J6CYdxKPrDWhChyfg":{"_id":"J6CYdxKPrDWhChyfg","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":1141187,"uploadedFileName":"14_Reporting-and-Prevention.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-03-17T18:14:25.948Z","dateModified":"2026-03-17T18:14:25.948Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"iA28i9GjkRpRCXm9R","thumbnail":"7jPgoEcm2jrjswpy6"},"JF9zsAQDBjaQDskWP":{"_id":"JF9zsAQDBjaQDskWP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1668096,"uploadedFileName":"Ava-en-RecognizingFradulentPages-5262026.mp3","uploadedFileNameExtension":".mp3","duration":69.475},"dates":{"dateCreated":"2026-05-26T18:41:28.605Z","dateModified":"2026-05-26T18:41:30.883Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Fraudulent login pages are intentionally designed to appear legitimate, which makes careful evaluation essential before entering any authentication information. One of the most reliable ways to identify deceptive pages is to examine the web address. Attackers often use addresses that closely resemble legitimate domains but include small alterations, such as additional characters, misspellings, or unfamiliar extensions. Other indicators may include missing security features, such as the absence of a secure connection indicator, or visual inconsistencies in the layout of the page. Even small differences in formatting or branding may signal that the page is not authentic. Another important warning sign is the appearance of unexpected login prompts. For example, a request to re-enter credentials shortly after a successful login, or prompts that appear without a clear action taken by the user, may indicate an attempt to capture authentication information. Remaining attentive to these indicators reduces the likelihood of interacting with fraudulent systems and helps protect organizational credentials from unauthorized access.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"XeYp9Ye8TMAp4CNRE","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AvaNeural\">Fraudulent login pages are intentionally designed to appear legitimate, which makes careful evaluation essential before entering any authentication information. One of the most reliable ways to identify deceptive pages is to examine the web address. Attackers often use addresses that closely resemble legitimate domains but include small alterations, such as additional characters, misspellings, or unfamiliar extensions. Other indicators may include missing security features, such as the absence of a secure connection indicator, or visual inconsistencies in the layout of the page. Even small differences in formatting or branding may signal that the page is not authentic. Another important warning sign is the appearance of unexpected login prompts. For example, a request to re-enter credentials shortly after a successful login, or prompts that appear without a clear action taken by the user, may indicate an attempt to capture authentication information. Remaining attentive to these indicators reduces the likelihood of interacting with fraudulent systems and helps protect organizational credentials from unauthorized access.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Fraudulent login pages are intentionally designed to appear legitimate,","startTime":0.119,"finishTime":4.239},{"text":"which makes careful evaluation essential","startTime":4.53,"finishTime":6.969},{"text":"before entering any authentication information.","startTime":6.969,"finishTime":9.51},{"text":"One of the most reliable ways to identify","startTime":9.93,"finishTime":12.09},{"text":"deceptive pages is to examine the web address.","startTime":12.09,"finishTime":15.069},{"text":"Attackers often use addresses that closely resemble legitimate domains,","startTime":15.369,"finishTime":19.52},{"text":"but includes small alterations such as additional characters,","startTime":19.53,"finishTime":23.19},{"text":"misspellings,","startTime":23.29,"finishT  devices,","startTime":9.449,"finishTime":11.689},{"text":"and login attempts occurring at irregular times.","startTime":11.85,"finishTime":14.789},{"text":"Abnormal account behavior,","startTime":15.09,"finishTime":16.79},{"text":"unexpected system modifications,","startTime":16.93,"finishTime":19.069},{"text":"or unexplained access patterns may also signal","startTime":19.309,"finishTime":22.53},{"text":"insider threat activity requiring further evaluation.","startTime":22.53,"finishTime":25.77}]}},"su27NL7vWXaw5RwJc":{"_id":"su27NL7vWXaw5RwJc","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"video","mimetype":"video/mp4","status":"online","fileSizeInBytes":68836315,"uploadedFileName":"Credential Theft Attacks.mp4","duration":182,"uploadedFileNameExtension":".mp4"},"dates":{"dateCreated":"2026-05-26T18:36:08.730Z","dateModified":"2026-05-26T18:36:08.730Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"eHSKzMwtgX4PMDekm","thumbnail":"cDKjqq6KBaQ8bosvJ","videoSD":"sBzLKPLS2CBt5QTEu","captionData":{"status":"success","captions":[{"text":"Hi everyone.","startTime":0.66,"finishTime":1.44},{"text":"With the rise of phishing attacks going around,","startTime":1.8199999999999998,"finishTime":4.019},{"text":"I thought it would be helpful to raise some awareness around phishing attacks","startTime":4.219,"finishTime":7.86},{"text":"by demonstrating how simple it is to create a fake or phishing website.","startTime":7.86,"finishTime":12.199},{"text":"And in this demonstration,","startTime":12.979,"finishTime":14.279},{"text":"we will be creating an Amazon phishing site,","startTime":14.5,"finishTime":16.809},{"text":"which is index number 34.","startTime":16.819,"finishTime":18.78},{"text":"So we type in number 34","startTime":19.139,"finishTime":20.76},{"text":"and within seconds,","startTime":20.899,"finishTime":22.129},{"text":"the website should be created.","startTime":22.379,"finishTime":24.04},{"text":"Now,","startTime":24.639,"finishTime":24.829},{"text":"once the URL has been generated,","startTime":24.92,"finishTime":27},{"text":"it means that the website is ready.","startTime":27.12,"finishTime":29.12},{"text":"So let's check out the phishing website to see how it looks like.","startTime":29.559,"finishTime":33.18},{"text":"We pull out our favorite browser,","startTime":33.799,"finishTime":35.819},{"text":"we paste the generated link in","startTime":36.59,"finishTime":39.02},{"text":"and enter.","startTime":39.24,"finishTime":40.04},{"text":"So what","startTime":41.08,"finishTime":41.7},{"text":"you see on the screen now is the Amazon phishing site we have just created together.","startTime":41.88,"finishTime":46.319},{"text":"Now,","startTime":47.22,"finishTime":47.38},{"text":"I'm going to visit the real Amazon login page on the right hand","startTime":47.459,"finishTime":50.799},{"text":"side of the screen to see how our phishing site measure up.","startTime":50.799,"finishTime":53.68},{"text":"OK,","startTime":56.479,"finishTime":56.729},{"text":"so here we are.","startTime":56.849,"finishTime":57.909},{"text":"I think we can all agree that","startTime":58.369,"finishTime":59.99},{"text":"the fake one is definitely good enough to catch","startTime":60.13,"finishTime":62.45},{"text":"someone off guard if they are not careful enough.","startTime":62.45,"finishTime":64.79},{"text":"Now that our website is ready,","startTime":65.41,"finishTime":66.97},{"text":"let's move on to the next step to deliver the website to the target.","startTime":67.129,"finishTime":70.29},{"text":"There are many ways to do this,","startTime":70.809,"finishTime":71.959},{"text":"and in this video,","startTime":71.97,"finishTime":72.97},{"text":"we will be demonstrating one of the popular ways which is sending it via an email.","startTime":73.05,"finishTime":77.37},{"text":"OK,","startTime":78.449,"finishTime":78.75},{"text":"here we have drafted an email ready to send to our target,","startTime":78.9,"finishTime":81.86},{"text":"but before that,","startTime":82.019,"finishTime":82.819},{"text":"let's insert the fake website URL","startTime":83.019,"finishTime":85.379},{"text":"and cover it up with an attractive tag line so","startTime":85.54,"finishTime":87.86},{"text":"that the target is more likely to click on it.","startTime":87.86,"finishTime":89.959},{"text":"Let's go with","startTime":90.339,"finishTime":91.279},{"text":"check here to validate your email address.","startTime":91.54,"finishTime":94.08},{"text":"And now that we have a perfect email,","startTime":94.5,"finishTime":96.339},{"text":"let's send it out to the target.","startTime":96.419,"finishTime":97.959},{"text":"OK,","startTime":99.66,"finishTime":100.099},{"text":"and here we are in our final mile where we wait for our target to bite the bait.","startTime":100.22,"finishTime":103.779},{"text":"For demonstration purposes,","startTime":104.22,"finishTime":105.58},{"text":"let's assume that the target takes the bait.","startTime":105.699,"finishTime":107.879},{"text":"On the left-hand side of the screen,","startTime":108.129,"finishTime":109.809},{"text":"we have the target's view where he would","startTime":109.959,"finishTime":111.699},{"text":"read through the email thinking that he got lucky","startTime":111.699,"finishTime":113.93},{"text":"and go ahead validating his email.","startTime":114.139,"finishTime":116.36},{"text":"He clicks on the link,","startTime":116.779,"finishTime":117.94},{"text":"get redirected to our phishing site where we'll","startTime":118.3,"finishTime":120.86},{"text":"be notified as shown in the screen here.","startTime":120.86,"finishTime":123.18},{"text":"Looking at this login page with all the familiar Amazon logo and layout,","startTime":128.149,"finishTime":132.029},{"text":"the convinced and careless target punched in his email address","startTime":132.19,"finishTime":135.929},{"text":"and password","startTime":136.07,"finishTime":137.05},{"text":"and logs in.","startTime":137.389,"finishTime":138.309},{"text":"And that's it.","startTime":140.309,"finishTime":140.949},{"text":"We have his credentials.","startTime":141.07,"finishTime":142.27},{"text":"The target will be brought to the real Amazon page,","startTime":142.429,"finishTime":145.05},{"text":"and by this time,","startTime":145.07,"finishTime":146.02},{"text":"I hope he realized that he has been tricked.","startTime":146.229,"finishTime":148.429},{"text":"Now,","startTime":152.479,"finishTime":152.639},{"text":"what we have just went through is only a simple example.","startTime":152.679,"finishTime":155.699},{"text":"With a little more effort,","startTime":156,"finishTime":157.32},{"text":"one could also customize and create other","startTime":157.479,"finishTime":159.44},{"text":"popular fishing sites that are lucrative,","startTime":159.44,"finishTime":161.63},{"text":"like banking sites.","startTime":161.919,"finishTime":163.259},{"text":"It is also crazy to know how simple it is for","startTime":163.929,"finishTime":167.21},{"text":"anyone to create a phishing site to start preying on people.","startTime":167.21,"finishTime":170.05},{"text":"So I hope you can all be more vigilant and careful.","startTime":170.41,"finishTime":173.63},{"text":"Pay attention and verify when in doubt.","startTime":174.449,"finishTime":177.149},{"text":"The weakest link in cybersecurity is often","startTime":177.61,"finishTime":180.27},{"text":"human.","startTime":180.729,"finishTime":181.289}]}},"t7E5dNW7GDvsZponD":{"_id":"t7E5dNW7GDvsZponD","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1288512,"uploadedFileName":"Ava-en-CredentialTheft-5262026.mp3","uploadedFileNameExtension":".mp3","duration":53.65},"dates":{"dateCreated":"2026-05-26T18:29:07.837Z","dateModified":"2026-05-26T18:29:10.056Z"},"use rs frequently rely on deception to","startTime":7.639,"finishTime":10.17},{"text":"collect authentication information from authorized users.","startTime":10.17,"finishTime":13.529},{"text":"One of the most common methods involves the use of fraudulent login pages.","startTime":13.85,"finishTime":17.889},{"text":"These pages are designed to closely resemble legitimate systems,","startTime":18.25,"finishTime":21.77},{"text":"including Microsoft 365,","startTime":22.129,"finishTime":24.209},{"text":"to create a sense of familiarity and trust.","startTime":24.45,"finishTime":26.649},{"text":"Individuals may be directed to these pages through email messages,","startTime":27.27,"finishTime":30.819},{"text":"links,","startTime":30.989,"finishTime":31.299},{"text":"or pop-up prompts that appear urgent or time sensitive.","startTime":31.389,"finishTime":34.819},{"text":"Once credentials are entered,","startTime":35.15,"finishTime":36.729},{"text":"attackers can immediately use that information to access accounts,","startTime":37.15,"finishTime":40.619},{"text":"bypass security controls,","startTime":40.909,"finishTime":42.709},{"text":"and potentially compromise sensitive organizational data.","startTime":42.869,"finishTime":46.29},{"text":"Understanding how these attacks operate supports early recognition","startTime":46.59,"finishTime":50.27},{"text":"and reduces the likelihood of credential exposure.","startTime":50.43,"finishTime":53.349}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["t7E5dNW7GDvsZponD","esF3QxXsuYh6q6uD5"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Credential theft is a common outcome of social engineering activity. Rather than attempting to break into systems directly, attackers frequently rely on deception to collect authentication information from authorized users. One of the most common methods involves the use of fraudulent login pages. These pages are designed to closely resemble legitimate systems, including Microsoft 365, to create a sense of familiarity and trust. Individuals may be directed to these pages through email messages, links, or pop-up prompts that appear urgent or time-sensitive. Once credentials are entered, attackers can immediately use that information to access accounts, bypass security controls, and potentially compromise sensitive organizational data. Understanding how these attacks operate supports early recognition and reduces the likelihood of credential exposure.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Credential theft is a common outcome of social engineering activity. Rather than attempting to break into systems directly, attackers frequently rely on deception to collect authentication information from authorized users. One of the most common methods involves the use of fraudulent login pages. These pages are designed to closely resemble legitimate systems, including Microsoft 365, to create a sense of familiarity and trust. Individuals may be directed to these pages through email messages, links, or pop-up prompts that appear urgent or time-sensitive. Once credentials are entered, attackers can immediately use that information to access accounts, bypass security controls, and potentially compromise sensitive organizational data. Understanding how these attacks operate supports early recognition and reduces the likelihood of credential exposure.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"LF25dsdvq6DCCFcbS"}},"Nvr7h7PTXqtZ9gwJz":{"_id":"Nvr7h7PTXqtZ9gwJz","_siteID":"ZoiyEJNGnnX ime":13.77},{"text":"or other trusted personnel whose access rights provide","startTime":13.89,"finishTime":17.11},{"text":"opportunities to misuse information or disrupt organizational operations.","startTime":17.11,"finishTime":22.129},{"text":"Because insider threats originate from authorized access,","startTime":22.53,"finishTime":25.69},{"text":"they may be more difficult to detect than external attacks.","startTime":25.969,"finishTime":29.09}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["DTtbj75qA6H5XYbHn","zqdsryJYMnekpyDP9"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Insider threats arise when individuals with legitimate access to systems, facilities, or information engage in unauthorized, negligent, or harmful actions. These individuals may be employees, contractors, or other trusted personnel whose access rights provide opportunities to misuse information or disrupt organizational operations. Because insider threats originate from authorized access, they may be more difficult to detect than external attacks. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Insider threats arise when individuals with legitimate access to systems, facilities, or information engage in unauthorized, negligent, or harmful actions. These individuals may be employees, contractors, or other trusted personnel whose access rights provide opportunities to misuse information or disrupt organizational operations. Because insider threats originate from authorized access, they may be more difficult to detect than external attacks. ","jobId":"RQzMiEgyG2caPauFh"}},"XeYp9Ye8TMAp4CNRE":{"_id":"XeYp9Ye8TMAp4CNRE","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Recognizing Fradulent Pages","upload":"JF9zsAQDBjaQDskWP"},"dates":{"dateCreated":"2026-05-26T18:39:12.363Z","dateModified":"2026-05-26T18:41:48.388Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"dEbvfdaQrFAY4ZB7H","kind":"overlay","type":"rectangle","width":1280,"height":754.2857142857142,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"qgEDmfuZq3DD8ABbm","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":69.475,"captions":[{"text":"Fraudulent login pages are intentionally designed to appear legitimate,","startTime":0.119,"finishTime":4.239},{"text":"which makes careful evaluation essential","startTime":4.53,"finishTime":6.969},{"text":"before entering any authentication information.","startTime":6.969,"finishTime":9.51},{"text":"One of the most reliable ways to identify","startTime":9.93,"finishTime":12.09},{"text":"deceptive pages is to examine the web address.","startTime":12.09,"finishTime":15.069},{"text":"Attackers often use addresses that closely resemble legitimate domains,","startTime":15.369,"finishTime":19.52},{"text":"but includes small alterations such as additional characters,","startTime":19.53,"finishTime":23.19},{"text":"misspellings,","startTime":23.29,"finishTime":24.049},{"text":"or unfamiliar extensions.","startTime":24.129,"finishTime":26},{"text":"Other indicators may include missing security features such","startTime":26.29,"finishTime":29.61},{"text":"as the absence of a secure connection indicator","startTime":29.61,"finishTime":32.348},{"text":"or visual inconsistencies in the layout of the page.","startTime":32.61,"finishTime":35.669},{"text":"Even small differences in formatting or branding may signal that.","startTime":35.919,"finishTime":39.45},{"text":"The page is not authentic.","startTime":39.549,"finishTime":41.27},{"text":"Another important warning sign is the appearance of unexpected login prompts.","startTime":41.59,"finishTime":46.369},{"text":"For example,","startTime":46.669,"finishTime":47.409},{"text":"a request to re-enter credentials shortly after a successful login","startTime":47.58,"finishTime":51.549},{"text":"or prompts that appear without a clear action taken by the user","startTime":51.83,"finishTime":55.27},{"text":"may indicate an attempt to capture authentication information.","startTime":55.549,"finishTime":59.11},{"text":"Remaining attentive to these indicators reduces","startTime":59.43,"finishTime":61.869},{"text":"the likelihood of interacting with fraudulent systems","startTime":61.869,"finishTime":64.79},{"text":"and helps protect organizational credentials from unauthorized access.","startTime":64.989,"finishTime":69.19}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["JF9zsAQDBjaQDskWP","qgEDmfuZq3DD8ABbm"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Fraudulent login pages are intentionally designed to appear legitimate, which makes careful evaluation essential before entering any authentication information. One of the most reliable ways to identify deceptive pages is to examine the web address. Attackers often use addresses that closely resemble legitimate domains but include small alterations, such as additional characters, misspellings, or unfamiliar extensions. Other indicators may include missing security features, such as the absence of a secure connection indicator, or visual inconsistencies in the layout of the page. Even small differences in formatting or branding may signal that the page is not authentic. Another important warning sign is the appearance of unexpected login prompts. For example, a request to re-enter credentials shortly after a successful login, or prompts that appear without a clear action taken by the user, may indicate an attempt to capture authentication information. Remaining attentive to these indicators reduces the likelihood of interacting with fraudulent systems and helps protect organizational credentials from unauthorized access.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AvaNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Fraudulent login pages are intentionally designed to appear legitimate, which makes careful evaluation essential before entering any authentication information. One of the most reliable ways to identify deceptive pages is to examine the web address. Attackers often use addresses that closely resemble legitimate domains but include small alterations, such as additional characters, misspellings, or unfamiliar extensions. Other indicators may include missing security features, such as the absence of a secure connection indicator, or visual inconsistencies in the layout of the page. Even small differences in formatting or branding may signal that the page is not authentic. Another important warning sign is the appearance of unexpected login prompts. For example, a request to re-enter credentials shortly after a successful login, or prompts that appear without a clear action taken by the user, may indicate an attempt to capture authentication information. Remaining attentive to these indicators reduces the likelihood of interacting with fraudulent systems and helps protect organizational credentials from unauthorized access.","voiceCodeUsed":"en-US-AvaNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"dF3LgPHxp8YzPpg7C"}},"dFScYqsgtf7nL6cMg":{"_id":"dFScYqsgtf7nL6cMg","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"74S9iFGfDEBzTakqY"},"dates":{"dateCreated":"2026-03-17T18:19:18.994Z","dateModified":"2026-05-26T15:58:22.007Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"3ovjQeF6T5oDfojcs","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"AvqApCpkWtGZ4JgRP","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"dur
