ification process for a self-directed Caregiver. Self-directed caregivers are certified directly by the FMS. Once a member identifies a self-directed caregiver, the referral is made directly to the FMS who will work to enroll the member and provider. The referral is made to the FMS with the member and self-directed caregiver information. The FMS runs a simple background check and provides enrollment at attestations for signatures. The FMS works with the member and provider to set up the accounts, set up taxes, and assist with initial timesheets. self-directed caregivers can only be associated with one member at a time.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"This slide shows the certification process for a self-directed Caregiver. Self-directed caregivers are certified directly by the FMS. Once a member identifies a self-directed caregiver, the referral is made directly to the FMS who will work to enroll the member and provider. The referral is made to the FMS with the member and self-directed caregiver information. The FMS runs a simple background check and provides enrollment at attestations for signatures. The FMS works with the member and provider to set up the accounts, set up taxes, and assist with initial timesheets. self-directed caregivers can only be associated with one member at a time.​","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"uQFuC7vQK9S2my8Aa":{"_id":"uQFuC7vQK9S2my8Aa","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"Nnyyg5bwCwdEPxQt2"},"dates":{"dateCreated":"2026-06-03T16:23:31.242Z","dateModified":"2026-06-03T16:54:41.682Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Q4yTXTRxAcGcQmuTS","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"rC3tLGom5GNyiovs3","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":151.5625,"captions":[{"text":"Next,","startTime":0.129,"finishTime":0.55},{"text":"we will jump into a snapshot of the application","startTime":0.73,"finishTime":3.45},{"text":"process for prospective Choices home care attendant providers.","startTime":3.45,"finishTime":6.61},{"text":"The application process for this provider","startTime":7.449,"finishTime":9.539},{"text":"type is a three-phased application process,","startTime":9.539,"finishTime":11.89},{"text":"and it must be completed in order and in its entirety before any services can be paid.","startTime":11.979,"finishTime":16.399},{"text":"Typically this process takes anywhere from 3 weeks to 8 to 10 weeks.","startTime":17.209,"finishTime":21.1},{"text":"It isn't an electronically based application process,","startTime":21.879,"finishTime":24.75},{"text":"so if the provider and the member are more electronically savvy,","startTime":25,"finishTime":28.04},{"text":"it may go a little bit quicker.","startTime":28.2,"finishTime":29.819},{"text":"So in phase one,","startTime":30.76,"finishTime":31.829},{"text":"the application starts with an online application","startTime":31.959,"finishTime":34.43},{"text":"at the Ohio Department of Aging website.","startTime":34.43,"finishTime":36.58},{"text":"A national provider identifier or NPI is required.","startTime":37.549,"finishTime":41.59},{"text":"There's also a background check that is required.","startTime":42.43,"finishTime":44.81},{"text":"Again,","startTime":45.009,"finishTime":45.29},{"text":"that is at the provider's expense.","startTime":45.59,"finishTime":47.169},{"text":"Those are anywhere from 65 to $100.","startTime":48.229,"finishTime":51.409},{"text":"If there is training required by the member,","startTime":52.24,"finishTime":54.25},{"text":"the evidence of that training will be required during the application phase.","startTime":54.419,"finishTime":58.169},{"text":"Once the application is completed,","startTime":59.09,"finishTime":60.84},{"text":"ODA will pre-approve that application and send it along through to phase 2.","startTime":61.009,"finishTime":65.19},{"text":"During phase two,","startTime":66.019,"finishTime":67.059},{"text":"the provider relations department at Direction Home becomes involved.","startTime":67.209,"finishTime":70.79},{"text":"The pre-approval is received by the provider relations department.","startTime":71.54,"finishTime":74.8},{"text":"Contracting is then completed.","startTime":75.769,"finishTime":77.43},{"text":"The direction home Provider relations department receives the application,","startTime":78.19,"finishTime":81.83},{"text":"the pre-approved application from ODA and","startTime":81.87,"finishTime":84.589},{"text":"schedules a pre-certification review meeting.","startTime":84.589,"finishTime":86.93},{"text":"Direction Home completes the pre-certification review meeting and then","startTime":87.739,"finishTime":91.58},{"text":"recommends certification back to the Ohio Department of Aging.","startTime":91.58,"finishTime":94.739},{"text":"Ohio Department of Aging gives a final","startTime":95.589,"finishTime":97.86},{"text":"approval and issues a Medicaid provider number.","startTime":97.86,"finishTime":100.37},{"text":"Direction Home then sends a contract to the provider","startTime":101.199,"finishTime":103.919},{"text":"and the provider must sign and return that contract.","startTime":103.919,"finishTime":106.54},{"text":"Once the contract is signed and returned,","startTime":107.629,"finishTime":109.79},{"text":"provider relations will notify the self-directed hub","startTime":110.16,"finishTime":112.72},{"text":"at our agency that the contract was returned","startTime":112.72,"finishTime":115.029},{"text":"and the member and provider can now","startTime":115.029,"finishTime":116.699},{"text":"be enrolled with the Financial Management Service.","startTime":116.699,"finishTime":119.099},{"text":"The self-directed hub will contact the member and the","startTime":120.01,"finishTime":122.769},{"text":"provider to discuss the employer and employee tasks,","startTime":122.769,"finishTime":125.72},{"text":"the roles and responsibilities,","startTime":125.769,"finishTime":127.639},{"text":"and will negotiate the initial rate of pay.","startTime":127.809,"finishTime":129.99},{"text":"We will request the signatures on all","startTime":130.86,"finishTime":132.669},{"text":"the financial management service authorization forms.","startTime":132.669,"finishTime":135.589},{"text":"Once those are received,","startTime":136.5,"finishTime":137.729},{"text":"we make a referral to the Financial Management Service to complete the enrollment.","startTime":137.94,"finishTime":141.779},{"text":"The Financial management service works with the","startTime":142.58,"finishTime":144.889},{"text":"member provider to set up accounts,","startTime":144.889,"finishTime":146.779},{"text":"set up the taxes that should be removed,","startTime":147.02,"finishTime":148.97},{"text":"and enter the initial time sheets.","startTime":149.139,"finishTime":150.74}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["Nnyyg5bwCwdEPxQt2","rC3tLGom5GNyiovs3"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Next, we will jump into a snapshot of the application process for Perspective Choices Home care attendant providers. The application process for this provider type is a three phased application process and it must be completed in order and in its entirety before any services can be paid. Typically this process takes anywhere from 3 weeks to 8 to 10 weeks. It is an an electronically based application process, so if the provider and the member are more electronically savvy, it may go a little bit quicker. So in phase one, the application starts with an online application at the Ohio Department of Aging website. A national provider identifier, or NPI, is required. There's also a background check that is required, again, that is at the provider's expense. Those are anywhere from 65 to 100 dollars. If there is training required by the member, the evidence of that training will be required during the application phase. Once the application is completed, ODA will pre approve that application and send it along through to Phase 2. During Phase 2, the Provider Relations department at Direction Home becomes involved. The pre approval is received by the Provider Relations Department. Contracting is then completed. The Direction Home Provider Relations Department receives the application the pre approved application from ODA and schedules a pre certification review meeting. Direction Home completes the pre certification review meeting and then recommends certification back to the Ohio Department of Aging. Ohio Department of Aging gives a final approval and issues a Medicaid provider number. Direction Home then sends a contract to the provider and the provider must sign and return that contract. Once the contract is signed and returned, Provider Relations will notify the self-directed Hub at our agency that the contract was returned and the member and provider can now be enrolled with the Financial Management Service. The self-directed Hub will contact the member and the provider to discuss the employer and employee tasks, the roles and responsibilities, and will negotiate the initial rate of pay. We will request the signatures on all the Financial Management Service authorization forms. Once those are received, we make a referral to the Financial Management Service to complete the enrollment. The Financial Management Service works with the member provider to set up accounts, set up the taxes that should be removed, and enter the initial timesheets.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Next, we will jump into a snapshot of the application process for Perspective Choices Home care attendant providers. The application process for this provider type is a three phased application process and it must be completed in order and in its entirety before any services can be paid. Typically this process takes anywhere from 3 weeks to 8 to 10 weeks. It is an an electronically based application process, so if the provider and the member are more electronically savvy, it may go a little bit quicker. So in phase one, the application starts with an online application at the Ohio Department of Aging website. A national provider identifier, or NPI, is required. There's also a background check that is required, again, that is at the provider's expense. Those are anywhere from 65 to 100 dollars. If there is training required by the member, the evidence of that training will be required during the application phase. Once the application is completed, ODA will pre approve that application and send it along through to Phase 2. During Phase 2, the Provider Relations department at Direction Home becomes involved. The pre approval is received by the Provider Relations Department. Contracting is then completed. The Direction Home Provider Relations Department receives the application the pre approved application from ODA and schedules a pre certification review meeting. Direction Home completes the pre certification review meeting and then recommends certification back to the Ohio Department of Aging. Ohio Department of Aging gives a final approval and issues a Medicaid provider number. Direction Home then sends a contract to the provider and the provider must sign and return that contract. Once the contract is signed and returned, Provider Relations will notify the self-directed Hub at our agency that the contract was returned and the member and provider can now be enrolled with the Financial Management Service. The self-directed Hub will contact the member and the provider to discuss the employer and employee tasks, the roles and responsibilities, and will negotiate the initial rate of pay. We will request the signatures on all the Financial Management Service authorization forms. Once those are received, we make a referral to the Financial Management Service to complete the enrollment. The Financial Management Service works with the member provider to set up accounts, set up the taxes that should be removed, and enter the initial timesheets.​","jobId":"GY6hdZWdXXMh5vbKk","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"v3zSnp57wX9dnotHP":{"_id":"v3zSnp57wX9dnotHP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"pKAKWgB3HNqnjQtTp"},"dates":{"dateCreated":"2026-06-03T16:16:29.495Z","dateModified":"2026-06-03T16:53:57.325Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"x9dhuxmJ9PAqoS9jn","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"NBZDSamdFxdqrTMNa","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":72.45,"captions":[{"text":"So who is eligible to receive this service?","startTime":0.17,"finishTime":2.4699999999999998},{"text":"Well,","startTime":3.38,"finishTime":3.6189999999999998},{"text":"all waiver members are eligible.","startTime":3.769,"finishTime":5.599},{"text":"However,","startTime":6.489,"finishTime":6.989},{"text":"not all waiver members are appropriate.","startTime":7.21,"finishTime":9.09},{"text":"To be appropriate for self-direction.","startTime":9.92,"finishTime":11.829},{"text":"They should have a desire to have control","startTime":12.68,"finishTime":14.439},{"text":"over the decisions regarding supports and services.","startTime":14.439,"finishTime":17.12},{"text":"They need to have an understanding of what is allowable for each service and role.","startTime":18.02,"finishTime":21.729},{"text":"They should have the ability to verbalize their decisions and manage outcomes.","startTime":22.59,"finishTime":26.25},{"text":"The ability to be the employer.","startTime":27.1,"finishTime":28.86},{"text":"Once they decide to self-direct,","startTime":29.79,"finishTime":31.37},{"text":"they do become an employer and the person","startTime":31.569,"finishTime":33.509},{"text":"that is providing their services becomes their employee.","startTime":33.509,"finishTime":36.33},{"text":"They should have strong problem solving skills,","startTime":37.18,"finishTime":39.419},{"text":"including an ability to interview,","startTime":39.659,"finishTime":41.22},{"text":"hire,","startTime":41.34,"finishTime":41.81},{"text":"train,","startTime":42.139,"finishTime":42.5},{"text":"supervise and terminate prospective employees.","startTime":42.779,"finishTime":45.459},{"text":"They should have a safe and stable living environment and a strong backup plan.","startTime":46.34,"finishTime":50.099},{"text":"They have to agree to work with a fiscal management service.","startTime":50.93,"finishTime":53.729},{"text":"They may hire a parent,","startTime":54.59,"finishTime":55.79},{"text":"step-parent,","startTime":56.029,"finishTime":56.709},{"text":"spouse,","startTime":56.83,"finishTime":57.47},{"text":"guardian,","startTime":57.63,"finishTime":58.27},{"text":"power of attorney,","startTime":58.47,"finishTime":59.349},{"text":"durable power of attorney,","startTime":59.5,"finishTime":60.909},{"text":"but there are exceptions to this,","startTime":61.11,"finishTime":62.43},{"text":"and those should be reviewed with your supervisor,","startTime":62.47,"finishTime":64.589},{"text":"and they must comply with the application process in its entirety","startTime":64.669,"finishTime":67.83},{"text":"based on the service provider certification before services can begin.","startTime":67.83,"finishTime":71.68}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["pKAKWgB3HNqnjQtTp","NBZDSamdFxdqrTMNa"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"So who is eligible to receive this service? Well, all waiver members are eligible. However, not all waiver members are appropriate. To be appropriate for self direction. They should have a desire to have control over the decisions regarding supports and services. They need to have an understanding of what is allowable for each service and role. They should have the ability to verbalize their decisions and manage outcomes. The ability to be the employer. Once they decide to self direct, they do become an employer and the person that is providing their services becomes their employee. They should have strong problem solving skills including an ability to interview, hire, train, supervise and terminate prospective employees. They should have a safe and stable living environment and a strong backup plan. They have to agree to work with a fiscal management service. They may hire a parent, step parent, spouse, guardian, power of attorney, durable power of attorney, but there are exceptions to this and those should be reviewed with your supervisor and they must comply with the application process in its entirety based on the service provider certification before services can begin.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"So who is eligible to receive this service? Well, all waiver members are eligible. However, not all waiver members are appropriate. To be appropriate for self direction. They should have a desire to have control over the decisions regarding supports and services. They need to have an understanding of what is allowable for each service and role. They should have the ability to verbalize their decisions and manage outcomes. The ability to be the employer. Once they decide to self direct, they do become an employer and the person that is providing their services becomes their employee. They should have strong problem solving skills including an ability to interview, hire, train, supervise and terminate prospective employees. They should have a safe and stable living environment and a strong backup plan. They have to agree to work with a fiscal management service. They may hire a parent, step parent, spouse, guardian, power of attorney, durable power of attorney, but there are exceptions to this and those should be reviewed with your supervisor and they must comply with the application process in its entirety based on the service provider certification before services can begin.​","jobId":"Dg6PN5yrioEHaxFgs"}},"v7F2Lm6PBsqRmYwEK":{"_id":"v7F2Lm6PBsqRmYwEK","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"7a6hDB5wrmhHEARbh"},"dates":{"dateCreated":"2026-06-03T16:15:59.277Z","dateModified":"2026-06-03T16:53:50.809Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Ri7K45KNvR9LcSeYW","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"MBvsBorMPmXCYNgkK","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":45.6125,"captions":[{"text":"So what is self-direction?","startTime":0.17,"finishTime":1.509},{"text":"Self-direction helps people of all ages with","startTime":2.41,"finishTime":4.73},{"text":"all types of disabilities maintain their independence at","startTime":4.73,"finishTime":7.57},{"text":"home by choosing the mix of services and supports that work best for them.","startTime":7.57,"finishTime":11.39},{"text":"It's built on the belief that individuals","startTime":12.189,"finishTime":14.189},{"text":"receiving services and supports know their needs the","startTime":14.189,"finishTime":16.829},{"text":"best and are in the best position to plan and manage their own services.","startTime":16.829,"finishTime":20.629},{"text":"It's also referred to as participant direction or consumer direction,","startTime":21.45,"finishTime":25.01},{"text":"and it shouldn't be confused with an independent provider.","startTime":25.12,"finishTime":27.93},{"text":"Independent providers are certified directly through","startTime":28.79,"finishTime":31.44},{"text":"the Ohio Department of Medicaid,","startTime":31.44,"finishTime":33.189},{"text":"and they are considered their own business entity.","startTime":33.2,"finishTime":35.38},{"text":"We do have a document that delineates the differences","startTime":36.27,"finishTime":38.959},{"text":"between all of the non-agency personal care provider options,","startTime":38.959,"finishTime":42.029},{"text":"and you can find that document and hand out on the portal.","startTime":42.119,"finishTime":44.86}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["7a6hDB5wrmhHEARbh","MBvsBorMPmXCYNgkK"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"So what is self direction? Self direction helps people of all ages with all types of disabilities maintain their independence at home by choosing the mix of services and supports that work best for them. It's built on the belief that individuals receiving services and supports know their needs the best and are in the best position to plan and manage their own services. It's also referred to as participant direction or consumer direction and it shouldn't be confused with an independent provider. Independent providers are certified directly through the Ohio Department of Medicaid and they are considered their own business entity. We do have a document that delineates the differences between all of the non agency personal care provider options and you can find that document and hand out on the portal.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"So what is self direction? Self direction helps people of all ages with all types of disabilities maintain their independence at home by choosing the mix of services and supports that work best for them. It's built on the belief that individuals receiving services and supports know their needs the best and are in the best position to plan and manage their own services. It's also referred to as participant direction or consumer direction and it shouldn't be confused with an independent provider. Independent providers are certified directly through the Ohio Department of Medicaid and they are considered their own business entity. We do have a document that delineates the differences between all of the non agency personal care provider options and you can find that document and hand out on the portal.​","jobId":"biZZi8KHenDf9Wgqs"}},"z7dnufZCt5rwfiMRQ":{"_id":"z7dnufZCt5rwfiMRQ","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"aiAPCa6xveChQ6Nxj"},"dates":{"dateCreated":"2026-06-03T16:16:43.973Z","dateModified":"2026-06-03T16:54:00.784Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"CmaTamjHLj2Lzp2gf","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"6vEDkCMS5Cb6p2vCs","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":45.5625,"captions":[{"text":"There is an option for individuals who may not","startTime":0.119,"finishTime":2.329},{"text":"feel that they could manage self-direction fully themselves,","startTime":2.329,"finishTime":5.03},{"text":"and that is called an authorized representative for self-direction.","startTime":5.25,"finishTime":8.489},{"text":"So if an individual cannot maintain control over their supports and services,","startTime":9.439,"finishTime":13.47},{"text":"they may assign what's called an authorized representative to act on their behalf.","startTime":13.64,"finishTime":17.569},{"text":"This is an individual's either legal guardian,","startTime":18.43,"finishTime":20.67},{"text":"family member,","startTime":20.909,"finishTime":21.709},{"text":"or any other person that is identified by the","startTime":21.87,"finishTime":24.11},{"text":"member to help manage services as defined in the","startTime":24.11,"finishTime":26.59},{"text":"care plan and to help them supervise their employees","startTime":26.59,"finishTime":29.229},{"text":"if the individual is unable to do so.","startTime":29.229,"finishTime":31.389},{"text":"A self-directed authorized representative is totally separate from a","startTime":32.269,"finishTime":35.758},{"text":"Medicaid authorized representative or a healthcare authorized representative,","startTime":35.758,"finishTime":39.679},{"text":"and the authorized representative cannot be the same","startTime":39.758,"finishTime":42.388},{"text":"person as the paid provider or the employee.","startTime":42.388,"finishTime":44.798}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["aiAPCa6xveChQ6Nxj","6vEDkCMS5Cb6p2vCs"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"There is an option for individuals who may not feel that they could manage self direction fully themselves and that is called an authorized representative for self direction. So if an individual cannot maintain control over their supports and services, they may assign what's called an authorized representative to act on their behalf. This is an individual's either legal guardian, family member, or any other person that is identified by the member to help manage services as defined in the care plan and to help them supervise their employees if the individual is unable to do so. A self-directed authorized representative is totally separate from a Medicaid authorized representative or a healthcare authorized representative and the authorized representative cannot be the same person as the paid provider or the employee.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"There is an option for individuals who may not feel that they could manage self direction fully themselves and that is called an authorized representative for self direction. So if an individual cannot maintain control over their supports and services, they may assign what's called an authorized representative to act on their behalf. This is an individual's either legal guardian, family member, or any other person that is identified by the member to help manage services as defined in the care plan and to help them supervise their employees if the individual is unable to do so. A self-directed authorized representative is totally separate from a Medicaid authorized representative or a healthcare authorized representative and the authorized representative cannot be the same person as the paid provider or the employee.​","jobId":"qpScRMPN3vwbDGHNn"}},"z8vDni36Xn6rDvAvR":{"_id":"z8vDni36Xn6rDvAvR","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"SLczjvAhryYPDJ4wa"},"dates":{"dateCreated":"2026-06-03T16:21:40.734Z","dateModified":"2026-06-03T16:54:21.189Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"grad
