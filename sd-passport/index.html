ding structure for the care planning process, participating in conversations regarding annual raises for their care providers. Providers, once they are self-directed, are eligible for annual raises. They can also have intermittent raises if the tasks that they are completing become larger than they were before. These are all raises are up to the member, so if the members requesting a raise for their provider, they are permitted to do that. Care Manners can facilitate self direction by empowering the individual to make decisions and take action, helping individuals identify goals, working with the individual to guide the selection of supports and services, and assisting with the application process.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"fEwEFBMqbfqJST47G","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">Care managers can also facilitate self direction by providing structure for the care planning process, participating in conversations regarding annual raises for their care providers. Providers, once they are self-directed, are eligible for annual raises. They can also have intermittent raises if the tasks that they are completing become larger than they were before. These are all raises are up to the member, so if the members requesting a raise for their provider, they are permitted to do that. Care Manners can facilitate self direction by empowering the individual to make decisions and take action, helping individuals identify goals, working with the individual to guide the selection of supports and services, and assisting with the application process.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Care managers can also facilitate self-direction by","startTime":0.09,"finishTime":3.009},{"text":"providing structure for the care planning process,","startTime":3.009,"finishTime":5.44},{"text":"participating in conversations regarding annual","startTime":5.6899999999999995,"finishTime":8.25},{"text":"raises for their care providers.","startTime":8.25,"finishTime":9.89},{"text":"Providers,","startTime":10.729,"finishTime":11.489},{"text":"once they are self-directed,","startTime":11.729,"finishTime":13.01},{"text":"are eligible for annual raises.","startTime":13.21,"finishTime":15.09},{"text":"They can also have intermittent raises if the tasks that","startTime":15.979,"finishTime":18.489},{"text":"they are completing become larger than they were before.","startTime":18.489,"finishTime":21.079},{"text":"These are all raises are up to the member,","startTime":21.95,"finishTime":23.79},{"text":"so if the member's requesting a raise for their provider,","startTime":23.989,"finishTime":26.489},{"text":"they are permitted to do that.","startTime":26.629,"finishTime":27.909},{"text":"Care Manners can facilitate self-direction by empowering the","startTime":28.77,"finishTime":32.189},{"text":"individual to make decisions and take action,","startTime":32.189,"finishTime":34.389},{"text":"helping individuals identify goals,","startTime":34.61,"finishTime":36.77},{"text":"working with the individual to guide the selection of supports and services,","startTime":36.959,"finishTime":40.639},{"text":"and assisting with the application process.","startTime":40.849,"finishTime":43.009}]}},"5zxoAGumX85NGsXx6":{"_id":"5zxoAGumX85NGsXx6","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1112256,"uploadedFileName":"Tony-en-CHCASandCaregiverDifferences-632026.mp3","uploadedFileNameExtension":".mp3","duration":46.3125},"dates":{"dateCreated":"2026-06-03T16:43:38.637Z","dateModified":"2026-06-03T16:43:41.353Z"},"users":{"_user nd before services can begin, the application process must be completed, which includes 3 phases.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"The Choice's home care attendance service provider's rate","startTime":0.009,"finishTime":2.769},{"text":"of pay is negotiated based on tasks,","startTime":2.769,"finishTime":5.199},{"text":"skills,","startTime":5.489,"finishTime":5.84},{"text":"and experience.","startTime":5.92,"finishTime":6.849},{"text":"Overtime is not allowable,","startTime":7.699,"finishTime":9.22},{"text":"so they are only allowed to work up to 40 hours per week for one person.","startTime":9.38,"finishTime":13.1},{"text":"However,","startTime":13.979,"finishTime":14.449},{"text":"they can work work with up to 5 individuals,","startTime":14.619,"finishTime":16.819},{"text":"but cannot exceed 56 hours per week if they're working for more than 1.","startTime":16.899,"finishTime":20.94},{"text":"Direction Home does provide assistance with the","startTime":21.75,"finishTime":24.62},{"text":"application process through our provider engagement coach.","startTime":24.62,"finishTime":27.129},{"text":"Choice's home care attendant is recognized as a provider type","startTime":27.94,"finishTime":31.229},{"text":"within the MyCare Ohio program and the passport waiver.","startTime":31.229,"finishTime":34.09},{"text":"Certification is transferable between passport and MyCare,","startTime":34.99,"finishTime":38.069},{"text":"Ohio.","startTime":38.11,"finishTime":38.669},{"text":"And before services can begin,","startTime":39.43,"finishTime":41.13},{"text":"the application process must be completed,","startTime":41.43,"finishTime":43.74},{"text":"which includes 3 phases.","startTime":43.909,"finishTime":45.509}]}},"6CgxAdZftYnJv6T5c":{"_id":"6CgxAdZftYnJv6T5c","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":166851,"uploadedFileName":"Slide1 s also referred to as participant direction or consumer direction and it shouldn't be confused with an independent provider. Independent providers are certified directly through the Ohio Department of Medicaid and they are considered their own business entity. We do have a document that delineates the differences between all of the non agency personal care provider options and you can find that document and hand out on the portal.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"v7F2Lm6PBsqRmYwEK","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">So what is self direction? Self direction helps people of all ages with all types of disabilities maintain their independence at home by choosing the mix of services and supports that work best for them. It's built on the belief that individuals receiving services and supports know their needs the best and are in the best position to plan and manage their own services. It's also referred to as participant direction or consumer direction and it shouldn't be confused with an independent provider. Independent providers are certified directly through the Ohio Department of Medicaid and they are considered their own business entity. We do have a document that delineates the differences between all of the non agency personal care provider options and you can find that document and hand out on the portal.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"So what is self-direction?","startTime":0.17,"finishTime":1.509},{"text":"Self-direction helps people of all ages with","startTime":2.41,"finishTime":4.73},{"text":"all types of disabilities maintain their independence at","startTime":4.73,"finishTime":7.57},{"text":"home by choosing the mix of services and supports that work best for them.","startTime":7.57,"finishTime":11.39},{"text":"It's built on the belief that individuals","startTime":12.189,"finishTime":14.189},{"text":"receiving services and supports know their needs the","startTime":14.189,"finishTime":16.829},{"text":"best and are in the best position to plan and manage their own services.","startTime":16.829,"finishTime":20.629},{"text":"It's also referred to as participant direction or consumer direction,","startTime":21.45,"finishTime":25.01},{"text":"and it shouldn't be confused with an independent provider.","startTime":25.12,"finishTime":27.93},{"text":"Independent providers are certified directly through","startTime":28.79,"finishTime":31.44},{"text":"the Ohio Department of Medicaid,","startTime":31.44,"finishTime":33.189},{"text":"and they are considered their own business entity.","startTime":33.2,"finishTime":35.38},{"text":"We do have a document that delineates the differences","startTime":36.27,"finishTime":38.959},{"text":"between all of the non-agency personal care provider options,","startTime":38.959,"finishTime":42.029},{"text":"and you can find that document and hand out on the portal.","startTime":42.119,"finishTime":44.86}]}},"87NdBayxe58CcQ8EK":{"_id":"87NdBayxe58CcQ8EK","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":198709,"uploadedFileName":"Slide9.jpg","height":720,"uploadedFileNameExtension":".jpg","width":1280},"dates":{"dateCreated":"2026-06-03T16:15:44.576Z","dateModified":"2026-06-03T16:15:44.576Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"Xyo3cKbt45mz9KqvL","thumbnail":"LDyAE6Bso7YedCSWd"},"9uLp7mWZ7KqAwPR2P":{"_id":"9uLp7mWZ7KqAwPR2P","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"i rences between all of the service options and what is appropriate for your member.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"gpxxH3ff4ntuBWn28","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">This final slide shows each waiver and how each self-directed services is offered through the waiver. So underneath the passport waiver, you can see that choices home care attendant and the home care attendant service are the only two services that are offered. Only two non agency services that are offered. Choice's Home Care Attendant is the only self-directed service that is offered. Home care attendant is not considered self-directed. Through Ohio Home Care Waiver The self-directed caregiver, home care attendant waiver, nursing goods and services, and home modification can all be self-directed services. Underneath My Care, My Care recognizes all service options as self-directed services including Choices home care attendant, self-directed caregiver, home care attendant waiver, nursing goods and services, and home modification. This is why it's important to know the differences between all of the service options and what is appropriate for your member.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"This final slide shows each waiver and how","startTime":0.09,"finishTime":2.329},{"text":"each self-directed services is offered through the waiver.","startTime":2.329,"finishTime":5.23},{"text":"So underneath the passport waiver,","startTime":6.19,"finishTime":7.949},{"text":"you can see that Choice's homecare attendant and the homecare","startTime":8.069,"finishTime":11.069},{"text":"attendant service are the only two services that are offered.","startTime":11.069,"finishTime":14.17},{"text":"Only 2 non-agency services that are offered.","startTime":15.02,"finishTime":17.639},{"text":"Choice's home care attendant is the only self-directed service that is offered.","startTime":18.469,"finishTime":22.5},{"text":"Home care attendant is not considered self-directed.","startTime":23.389,"finishTime":26.17},{"text":"Through Ohio homecare waiver,","startTime":27,"finishTime":28.68},{"text":"the self-directed caregiver,","startTime":28.69,"finishTime":30.129},{"text":"home care attendant waiver,","startTime":30.319,"finishTime":31.659},{"text":"nursing goods and services,","startTime":31.809,"finishTime":33.599},{"text":"and home modification can all be self-directed services.","startTime":33.81,"finishTime":37.09},{"text":"Underneath MyCare,","startTime":37.939,"finishTime":39.04},{"text":"MyCare recognizes all service options as self-directed services,","startTime":39.22,"finishTime":42.889},{"text":"including Choice's home care attendant,","startTime":43.06,"finishTime":44.93},{"text":"self-directed caregiver,","startTime":45.18,"finishTime":46.5},{"text":"home care attendant waiver,","startTime":46.659,"finishTime":48.02},{"text":"nursing goods and services,","startTime":48.18,"finishTime":49.97},{"text":"and home modification.","startTime":50.18,"finishTime":51.5},{"text":"This is why it's important to know the differences between all","startTime":52.38,"finishTime":55.049},{"text":"of the service options and what is appropriate for your member.","startTime":55.049,"finishTime":58.02}]}},"BCsh7kW6ckAACKBSP":{"_id":"BCsh7kW6ckAACKBSP","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":213381,"uploadedFileName":"Slide8.jpg","height":720,"uploadedFileNameExtension":".jpg","width":1280},"dates":{"dateCreated":"2026-06-03T16:15:44.453Z","dateModified":"2026-06-03T16:15:44.453Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F"," a self-directed caregiver. Numbers 1 and 2 are typically the same tasks that a personal care agency can provide. With the exception of the seasonal yard care and snow removal. Choices home care attendants and self-directed caregivers are permitted to do heavier household chores. They are permitted to do assistance with money management as directed by the member. They are are also permitted to provide transportation. Any other requests are typically at the members discretion. However, they are not permitted to provide skilled tasks or tasks that are typically provided by an RN.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"This slide shows the service specifications for a Choices","startTime":0.129,"finishTime":3.23},{"text":"home care attendant provider and a self-directed caregiver.","startTime":3.23,"finishTime":6.329},{"text":"Numbers 1 and 2 are typically the same tasks that a personal care agency can provide.","startTime":7.309,"finishTime":11.97},{"text":"With the exception of the seasonal yard care and snow removal.","startTime":13.039,"finishTime":16.068},{"text":"Choice's home care attendants and self-directed caregivers","startTime":17.04,"finishTime":20.069},{"text":"are permitted to do heavier household chores.","startTime":20.069,"finishTime":22.36},{"text":"They are permitted to do assistance with","startTime":23.219,"finishTime":25.02},{"text":"money management as directed by the member.","startTime":25.02,"finishTime":27.159},{"text":"They are also permitted to provide transportation.","startTime":28.049,"finishTime":30.579},{"text":"Any other requests are typically at the member's discretion.","startTime":31.44,"finishTime":34.36},{"text":"However,","startTime":35.25,"finishTime":35.669},{"text":"they are not permitted to provide skilled tasks or","startTime":35.889,"finishTime":38.169},{"text":"tasks that are typically provided by an RN.","startTime":38.169,"finishTime":40.729}]}},"JbrpaCGSxAxn7eNno":{"_id":"JbrpaCGSxAxn7eNno","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":166672,"uploadedFileName":"Slide12.jpg","height":720,"uploadedFileNameExtension":".jpg","width":1280},"dates":{"dateCreated":"2026-06-03T16:15:44.980Z","dateModified":"2026-06-03T16:15:44.980Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"tkx6jtjnNk8WtEGav","thumbnail":"A8NE2jbxDeuz99mHo"},"JcZyCSxMdyZnNSr7X":{"_id":"JcZyCSxMdyZnNSr7X","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":2778048,"uploadedFileName":"Tony-en-RoleandResponsibilities-632026.mp3","uploadedFileNameExtension":".mp3","duration":115.725},"dates":{"dateCreated":"2026-06-03T16:48:37.118Z","dateModified":"2026-06-03T16:48:55.833Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"This slide shows the Care Manager and Waiver Service Coordinator roles and responsibilities for making a referral when you have a member who is choosing to self direct. So the first step, the care manager and waiver service coordinator should discuss self direction as a service option at least annually and or when the need arises. Care manager and Waiver Service coordinator may utilize internal documents including the four listed below and all of those are found on the portal. The last one, the available CHCAS providers list, provider list. This is a list that we keep of available already contracted choices, home care attendant providers who are willing and able to work but don't have a member. So if you are discussing self direction with one of your members and they want to self direct, however they don't have anybody in mind, you can provide them with this list so that they can conduct interviews. Once a member has identified a provider, the case manager or waiver service coordinator should make a referral using the electronic self-directed referral link. Care Manager and waiver service coordinator should gather member demographic information and provider demographic information. And please know that the member and provider must have an active e-mail address in order to enroll with the Financial Management System they must have an active e-mail address. During the referral The Care Manager and Waiver Service Court Coordinator must also describe in detail the amount of service that is authorized and what tasks are to be completed. Once the referral is submitted, We will use this information to help negotiate the initial rate of pay. Once the referral is completed and received by the self-directed Hub, we will process it accordingly and provide status updates along the way. After the referral is in the good to go status, the self-directed hub will inform the case manager or waiver service coordinator so that the start date can be discussed with the member and the provider and the Service plan can be updated.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"SENjy23KFH8iuLcCw","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">This slide shows the Care Manager and Waiver Service Coordinator roles and responsibilities for making a referral when you have a member who is choosing to self direct. So the first step, the care manager and waiver service coordinator should discuss self direction as a service option at least annually and or when the need arises. Care manager and Waiver Service coordinator may utilize internal documents including the four listed below and all of those are found on the portal. The last one, the available CHCAS providers list, provider list. This is a list that we keep of available already contracted choices, home care attendant providers who are willing and able to work but don't have a member. So if you are discussing self direction with one of your members and they want to self direct, however they don't have anybody in mind, you can provide them with this list so that they can conduct interviews. Once a member has identified a provider, the case manager or waiver service coordinator should make a referral using the electronic self-directed referral link. Care Manager and waiver service coordinator should gather member demographic information and provider demographic information. And please know that the member and provider must have an active e-mail address in order to enroll with the Financial Management System they must have an active e-mail address. During the referral The Care Manager and Waiver Service Court Coordinator must also describe in detail the amount of service that is authorized and what tasks are to be completed. Once the referral is submitted, We will use this information to help negotiate the initial rate of pay. Once the referral is completed and received by the self-directed Hub, we will process it accordingly and provide status updates along the way. After the referral is in the good to go status, the self-directed hub will inform the case manager or waiver service coordinator so that the start date can be discussed with the member and the provider and the Service plan can be updated.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"This slide shows the care manager and","startTime":0.129,"finishTime":1.889},{"text":"waiver service coordinator roles and responsibilities for","startTime":1.889,"finishTime":5.01},{"text" rovider Relations department at Direction Home becomes involved. The pre approval is received by the Provider Relations Department. Contracting is then completed. The Direction Home Provider Relations Department receives the application the pre approved application from ODA and schedules a pre certification review meeting. Direction Home completes the pre certification review meeting and then recommends certification back to the Ohio Department of Aging. Ohio Department of Aging gives a final approval and issues a Medicaid provider number. Direction Home then sends a contract to the provider and the provider must sign and return that contract. Once the contract is signed and returned, Provider Relations will notify the self-directed Hub at our agency that the contract was returned and the member and provider can now be enrolled with the Financial Management Service. The self-directed Hub will contact the member and the provider to discuss the employer and employee tasks, the roles and responsibilities, and will negotiate the initial rate of pay. We will request the signatures on all the Financial Management Service authorization forms. Once those are received, we make a referral to the Financial Management Service to complete the enrollment. The Financial Management Service works with the member provider to set up accounts, set up the taxes that should be removed, and enter the initial timesheets.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"uQFuC7vQK9S2my8Aa","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">Next, we will jump into a snapshot of the application process for Perspective Choices Home care attendant providers. The application process for this provider type ally responsible family member or POA but those extra rules do apply. A self-directed caregiver is considered an employee of the member, so payment of federal, state and local taxes are taken out of their paycheck by way of the Fiscal Management Service or PPL.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"To return to this slide to discuss self-directed caregiver.","startTime":0.059,"finishTime":3.18},{"text":"A self-directed caregiver is certified directly","startTime":4.01,"finishTime":6.75},{"text":"through the Financial Management Service.","startTime":6.75,"finishTime":8.56},{"text":"In Ohio,","startTime":9.35,"finishTime":10.01},{"text":"the financial management service that we use is called public partnerships.","startTime":10.229,"finishTime":14.029},{"text":"We call it PPL.","startTime":14.899000000000001,"finishTime":16.239},{"text":"A self-directed caregiver may or may not have to get training.","startTime":17.049,"finishTime":20.139},{"text":"This is at the discretion of the member.","startTime":20.18,"finishTime":21.979},{"text":"A background check is required,","startTime":22.84,"finishTime":24.479},{"text":"but is completed by the Financial Management Service.","startTime":24.489,"finishTime":27.09},{"text":"A self-directed caregiver caregiver can be a spouse,","startTime":27.94,"finishTime":30.76},{"text":"parent,","startTime":31.059,"finishTime":31.579},{"text":"step-parent,","startTime":31.819,"finishTime":32.49},{"text":"authorized rep,","startTime":32.659,"finishTime":33.58},{"text":"legally responsible family member or POA,","startTime":33.779,"finishTime":36.419},{"text":"but those extra rules do apply.","startTime":36.54,"finishTime":38.459},{"text":"A self-directed caregiver is considered an employee of the member,","startTime":39.279,"finishTime":42.529},{"text":"so payment of federal,","startTime":42.729,"finishTime":43.849},{"text":"state,","startTime":44.09,"finishTime":44.369},{"text":"and local taxes are taken out of their paycheck","startTime":44.409,"finishTime":46.79},{"text":"by way of the fiscal Management Service or PPL.","startTime":46.79,"finishTime":49.709}]}},"Z4isB4JSaJeGS4pHv":{"_id":"Z4isB4JSaJeGS4pHv","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/jpeg","status":"online","fileSizeInBytes":112817,"uploadedFileName":"Slide22.jpg","height":720,"uploadedFileNameExtension":".jpg","width":1280},"dates":{"dateCreated":"2026-06-03T16:15:45.600Z","dateModified":"2026-06-03T16:15:45.600Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"rArnvR5YHJvM4ado8","thumbnail":"cLMRuvKx8b9qSZuZr"},"ZXjYi3QmvprLWR3Cs":{"_id":"ZXjYi3QmvprLWR3Cs","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1695744,"uploadedFileName":"Tony-en-Employer-EmployeeRelationship-632026.mp3","uploadedFileNameExtension":".mp3","duration":70.625},"dates":{"dateCreated":"2026-06-03T16:42:31.145Z","dateModified":"2026-06-03T16:42:34.281Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"So self direction can be a mixed bag of employer authority and budget authority. Employer authority allows individuals to have decision making authority to recruit, hire, train and supervise the individuals who furnish their services. Care managers must have assessed the individual and determined a need for personal care services that are provided by a self-directed provider and the ability for the member to direct their own care. The individual assumes responsibility for being the personal care providers employer, including hiring, training, setting a pay rate, directing care, and terminating providers under budget authority. This gives people the power to manage their own waiver budget and decisions about how to spend their funds on services and supports. Self directing individuals with budget authority are responsible for managing their budget, including updating it at least once per year. They also decide which services to cover, who to pay for those services, and how much to pay them. Budget authority gives people more control over how their funds are spent and allocated. They can prioritize services and supports and let them choose which are most beneficial to them.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"HJG9xuAQtHznTZwzD","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">So self direction can be a mixed bag of employer authority and budget authority. Employer authority allows individuals to have decision making authority to recruit, hire, train and supervise the individuals who furnish their services. Care managers must have assessed the individual and determined a need for personal care services that are provided by a self-directed provider and the ability for the member to direct their own care. The individual assumes responsibility for being the personal care providers employer, including hiring, training, setting a pay rate, directing care, and terminating providers under budget authority. This gives people the power to manage their own waiver budget and decisions about how to spend their funds on services and supports. Self directing individuals with budget authority are responsible for managing their budget, including updating it at least once per year. They also decide which services to cover, who to pay for those services, and how much to pay them. Budget authority gives people more control over how their funds are spent and allocated. They can prioritize services and supports and let them choose which are most beneficial to them.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"So self-direction can be a mixed bag of employer authority and budget authority.","startTime":0.17,"finishTime":4.67},{"text":"Employer authority allows individuals to have","startTime":5.44,"finishTime":8.199},{"text":"decision making authority to recruit,","startTime":8.199,"finishTime":9.84},{"text":"hire,","startTime":10,"finishTime":10.439},{"text":"train,","startTime":10.76,"finishTime":10.949},{"text":"and supervise the individuals who furnish their services.","startTime":10.96,"finishTime":13.96},{"text":"Care managers must have assessed the individual and","startTime":14.84,"finishTime":17.319},{"text":"determined the need for personal care services that are","startTime":17.319,"finishTime":20.12},{"text":"provided by a self-directed provider and the ability","startTime":20.12,"finishTime":22.84},{"text":"for the member to direct their own care.","startTime":22.84,"finishTime":24.739},{"text":"The individual assumes responsibility for being","startTime":25.62,"finishTime":28.19},{"text":"the personal care provider's employer,","startTime":28.19,"finishTime":30.27},{"text":"including hiring,","startTime":30.59,"finishTime":31.459},{"text":"training,","startTime":31.79,"finishTime":32.259},{"text":"setting a pay rate,","startTime":32.509,"finishTime":33.45},{"text":"directing care,","startTime":33.849,"finishTime":34.63},{"text":"and terminating providers under budget authority.","startTime":34.779,"finishTime":37.31},{"text":"This gives people the power to manage their own waiver budget and","startTime":38.2,"finishTime":41.549},{"text":"decisions about how to spend their funds on services and supports.","startTime":41.549,"finishTime":44.639},{"text":"Self-directing individuals with budget authority are","startTime":45.56,"finishTime":48.22},{"text":"responsible for managing their budget,","startTime":48.22,"finishTime":50.319},{"text":"including updating it at least once per year.","startTime":50.639,"finishTime":52.9},{"text":"They also decide which services to cover,","startTime":53.779,"finishTime":55.86},{"text":"who to pay for those services,","startTime":56.02,"finishTime":57.529},{"text":"and how much to pay them.","startTime":57.7,"finishTime":58.939},{"text":"Budget Authority gives people more control over","startTime":59.75,"finishTime":62.22},{"text":"how their funds are spent and allocated.","startTime":62.22,"finishTime":64.209},{"text":"They can prioritize services and supports and let","startTime":65.039,"finishTime":67.679},{"text":"them choose which are most beneficial to them.","startTime":67.679,"finishTime":69.859}]}},"aiAPCa6xveChQ6Nxj":{"_id":"aiAPCa6xveChQ6Nxj","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1094400,"uploadedFileName":"Tony-en-AuthorizedRepresentative-632026.mp3","uploadedFileNameExtension":".mp3","duration":45.5625},"dates":{"dateCreated":"2026-06-03T16:41:53.789Z","dateModified":"2026-06-03T16:41:56.347Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"There is an option for individuals who may not feel that they could manage self direction fully themselves and that is called an authorized representative for self direction. So if an individual cannot maintain control over their supports and services, they may assign what's called an authorized representative to act on their behalf. This is an individual's either legal guardian, family member, or any other person that is identified by the member to help manage services as defined in the care plan and to help them supervise their employees if the individual is unable to do so. A self-directed authorized representative is totally separate from a Medicaid authorized representative or a healthcare authorized representative and the authorized representative cannot be the same person as the paid provider or the employee.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"z7dnufZCt5rwfiMRQ","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">There is an option for individuals who may not feel that they could manage self direction fully themselves and that is called an authorized representative for self direction. So if an individual cannot maintain control over their supports and services, they may assign what's called an authorized representative to act on their behalf. This is an individual's either legal guardian, family member, or any other person that is identified by the member to help manage services as defined in the care plan and to help them supervise their employees if the individual is unable to do so. A self-directed authorized representative is totally separate from a Medicaid authorized representative or a healthcare authorized representative and the authorized representative cannot be the same person as the paid provider or the employee.​\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"There is an option for individuals who may not","startTime":0.119,"finishTime":2.329},{"text":"feel that they could manage self-direction fully themselves,","startTime":2.329,"finishTime":5.03},{"text":"and that is called an authorized representative for self-direction.","startTime":5.25,"finishTim  know because there is a separate process to be done. Case managers should gather the member demographic info, the provider info including NPI and tax ID, and describe in detail the service approved. Referral is received and the self-directed Hub will process it and provide updates along the way. Once the good to go is received, self-directed Hub will inform the case manager and Waiver Service Coordinator so that the start date can be discussed and Service plan updated.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"ZH7TFJSXX53dq8qqk","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-TonyNeural\">This slide shows the service, the roles and responsibilities for every referral for goods and services or home modification. Care Manager and Waiver Service Coordinator should discuss self-directed goods and services or home modification as a service option when the need arises. You must explore all other streams of funding prior to approving goods and services or home modification. Once a member has identified an approved need and an A prospective provider, Care Manager and Waiver Service Coordinator should make a referral using the Electronic self-directed Referral Form. Goods and Services or Home Modification Provider must be an ODM certified provider and agree to work with the FMS. There is an option for the member to prepay for the goods and services or prepay for the home modification and then be reimbursed by the FMS and if the member is choosing this option, please let your supervisor know because there is a separate process to be done. Case managers should gather the member demographic info, the provider info including NPI and tax ID, and describe in detail the service approved. Refer ":35.709,"finishTime":38.009}]}},"pKAKWgB3HNqnjQtTp":{"_id":"pKAKWgB3HNqnjQtTp","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1739520,"uploadedFileName":"Tony-en-WhoisEligible-632026.mp3","uploadedFileNameExtension":".mp3","duration":72.45},"dates":{"dateCreated":"2026-06-03T16:41:12.096Z","dateModified":"2026-06-03T16:41:17.877Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"So who is eligible to receive this service? Well, all waiver members are eligible. However, not all waiver members are appropriate. To be appropriate for self direction. They should have a desire to have control over the decisions regarding supports and services. They need to have an understanding of what is allowable for each service and role. They should have the ability to verbalize their decisions and manage outcomes. The ability to be the employer. Once they decide to self direct, they do become an employer and the person that is providing their services becomes their employee. They should have strong problem solving skills including an ability to interview, hire, train, supervise and terminate prospective employees. They should have a safe and stable living environment and a strong backup plan. They have to agree to work with a fiscal management service. They may hire a parent, step parent, spouse, guardian, power of attorney, durable power of attorney, but there are exceptions to this and those should be reviewed with your supervisor and they must comply with the application process in its entirety based on the service provider certification before services can begin.​","voiceCode":"en-US-TonyNeural","language":"en","originalResourceId":"v3zSnp57wX9dnotHP","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/syn "duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"oTZoj2QbvhwByLYqP","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":70.625,"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["ZXjYi3QmvprLWR3Cs","oTZoj2QbvhwByLYqP"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"So self direction can be a mixed bag of employer authority and budget authority. Employer authority allows individuals to have decision making authority to recruit, hire, train and supervise the individuals who furnish their services. Care managers must have assessed the individual and determined a need for personal care services that are provided by a self-directed provider and the ability for the member to direct their own care. The individual assumes responsibility for being the personal care providers employer, including hiring, training, setting a pay rate, directing care, and terminating providers under budget authority. This gives people the power to manage their own waiver budget and decisions about how to spend their funds on services and supports. Self directing individuals with budget authority are responsible for managing their budget, including updating it at least once per year. They also decide which services to cover, who to pay for those services, and how much to pay them. Budget authority gives people more control over how their funds are spent and allocated. They can prioritize services and supports and let them choose which are most beneficial to them.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"So self direction can be a mixed bag of employer authority and budget authority. Employer authority allows individuals to have decision making authority to recruit, hire, train and supervise the individuals who furnish their services. Care managers must have assessed the individual and determined a need for personal care services that are provided by a self-directed provider and the ability for the member to direct their own care. The individual assumes responsibility for being the personal care providers employer, including hiring, training, setting a pay rate, directing care, and terminating providers under budget authority. This gives people the power to manage their own waiver budget and decisions about how to spend their funds on services and supports. Self directing individuals with budget authority are responsible for managing their budget, including updating it at least once per year. They also decide which services to cover, who to pay for those services, and how much to pay them. Budget authority gives people more control over how their funds are spent and allocated. They can prioritize services and supports and let them choose which are most beneficial to them.​","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"xdtfEmcWE3pmH798R"}},"LmL3cw8ax69paCtpG":{"_id":"LmL3cw8ax69paCtpG","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlid 409,"finishTime":41.45},{"text":"Under self-directed care management,","startTime":42.319,"finishTime":44.31},{"text":"member and care manager decide which services","startTime":44.569,"finishTime":47.13},{"text":"are needed based on the needs assessment,","startTime":47.13,"finishTime":49.169},{"text":"so it all starts the same.","startTime":49.33,"finishTime":50.72},{"text":"However,","startTime":51.569,"finishTime":52.08},{"text":"the member will locate the providers with the assistance of the care manager.","startTime":52.209,"finishTime":55.83},{"text":"The member determines their own schedule based on their assessed need.","startTime":56.639,"finishTime":59.959},{"text":"So if they are assessed for 15 hours per week,","startTime":60.959,"finishTime":63.549},{"text":"the member can determine when those hours will be delivered.","startTime":63.689,"finishTime":66.459},{"text":"The member will choose their provider,","startTime":67.25,"finishTime":69.04},{"text":"train their provider,","startTime":69.29,"finishTime":70.25},{"text":"and manage their provider.","startTime":70.37,"finishTime":71.769},{"text":"The member addresses all those service issues directly","startTime":72.569,"finishTime":75.41},{"text":"with the support of the case manager,","startTime":75.41,"finishTime":77.08},{"text":"and the case manager monitors quality of service","startTime":77.209,"finishTime":79.69},{"text":"and satisfaction and provides support along the way.","startTime":79.69,"finishTime":82.55}],"playbackCompletionAction":{"type":"nextPage"}}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["PEoTEKZLTyQAuuiXo","gEWanyzYgrwY2wHk3"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Here you will see a comparison of traditional care management versus self-directed care management. By traditional care management, what we mean is when an individual chooses services to be delivered through an agency, the member and care manager decide which services are needed based on a needs assessment. The care manager then will locate the providers by sending out referrals to all the different agencies. The agency will then accept the referral and decide what worker to send and when to provide the care and the service. The agency hires, trains and manages their own employees. The care manager is responsible for the management of provider issues and contacts contacts the agency with any service related issues. Under self-directed care management, member and care manager decide which services are needed based on the needs assessment, so it all starts the same. However, the member will locate the providers with the assistance of the care manager. The member determines their own schedule based on their assessed need. So if they are assessed for 15 hours per week, the member can determine when those hours will be delivered. The member will choose their provider, train their provider, and manage their provider. The member addresses all those service issues directly with the support of the case manager, and the case manager monitors quality of service and satisfaction and provides support along the way.​\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-TonyNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-TonyNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"Here you will see a comparison of traditional care management versus self-directed care management. By traditional care management, what we mean is when an individual chooses services to be delivered through an agency, the member and care manager decide which services are needed based on a needs assessment. The care manager then will locate the providers by sending out referrals to all the different agencies. The agency will then accept the referral and decide what worker to send and when to provide the care and the service. The agency hires, trains and manages their own employees. The care manager is responsible for the management of provider issues and contacts contacts the agency with any service related issues. Under self-directed care management, member and care manager decide which services are needed based on the needs assessment, so it all starts the same. However, the member will locate the providers with the assistance of the care manager. The member determines their own schedule based on their assessed need. So if they are assessed for 15 hours per week, the member can determine when those hours will be delivered. The member will choose their provider, train their provider, and manage their provider. The member addresses all those service issues directly with the support of the case manager, and the case manager monitors quality of service and satisfaction and provides support along the way.​","jobId":"mK2XQRFGhAtE9e9kc"}},"SENjy23KFH8iuLcCw":{"_id":"SENjy23KFH8iuLcCw","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"JcZyCSxMdyZnNSr7X"},"dates":{"dateCreated":"2026-06-03T16:24:33.172Z","dateModified":"2026-06-03T16:54:55.476Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"Hvs7f7nxv4MgXuEyk","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"
