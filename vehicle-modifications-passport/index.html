 vehicle modifications include","startTime":0.209,"finishTime":3.349},{"text":"Vehicle modifications are adaptations or alterations made to an automobile","startTime":4.179,"finishTime":8.26},{"text":"that serves as an individual's primary means of transportation.","startTime":8.26,"finishTime":11.34},{"text":"These adaptations can range from external handling devices and carriers","startTime":12.27,"finishTime":15.96},{"text":"to operating aids such as assistive equipment and technologies.","startTime":15.96,"finishTime":19.26},{"text":"Vehicle modifications are necessary to accommodate the individual's needs,","startTime":20.049,"finishTime":24.04},{"text":"allowing them to function with greater independence","startTime":24.239,"finishTime":26.239},{"text":"and integrate more fully into the community.","startTime":26.239,"finishTime":28.299},{"text":"To the community","startTime":29.159,"finishTime":30.12},{"text":"Vehicle modification services are subject to specific exclusions","startTime":30.93,"finishTime":34.529},{"text":"and limitations to ensure proper use of resources.","startTime":34.529,"finishTime":37.45},{"text":"These limitations include an annual financial cap","startTime":38.279,"finishTime":41},{"text":"and eligibility restrictions for vehicle owners.","startTime":41,"finishTime":43.419},{"text":"Before authorizing vehicle modifications,","startTime":44.419,"finishTime":46.659},{"text":"specific documentation must be provided,","startTime":46.93,"finishTime":49.08},{"text":"including a valid driver's license,","startTime":49.389,"finishTime":51.139},{"text":"proof of ownership and registration,","startTime":51.459,"finishTime":53.099},{"text":"written consent from the vehicle owner,","startTime":53.34,"finishTime":54.979},{"text":"attestation of primary vehicle use,","startTime":55.13,"finishTime":57.08},{"text":"and proof of active insurance.","startTime":57.34,"finishTime":59.06},{"text":"After installation,","startTime":59.909,"finishTime":60.95},{"text":"providers must inspect the vehicle modification,","startTime":61.279,"finishTime":63.56},{"text":"instruct the individual and the vehicle operator on how to use it,","startTime":63.759,"finishTime":66.76},{"text":"and submit all necessary documentation before","startTime":66.919,"finishTime":69.36},{"text":"they submit a claim for reimbursement.","startTime":69.36,"finishTime":71.199}]}},"assets":["Qhf7tLeZ9SaMNNX5t","pwtWaNnezYKkxbFE8"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"To review each step of the AUTHORIZATION PROCESS FOR VEHICLE MODIFICATIONS. step 1 Conduct an evaluation to determine the appropriate vehicle modification. Step 2 Develop a vehicle modification referral to address the individual's needs. Step 3 Obtain a fixed cost proposal. Step 4 Obtain required documentation. Step 5 Review the submitted proposals and award the service. Step 6 The provider performs all necessary final inspections\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-MichelleNeural\",\"rate\":1}},{\" uss what to look for when completing the structural compliance review, also known as SCR. We will not do a full review of the SCR process and requirements, but rather discuss the unique requirements related to vehicle modification service specifically.","voiceCodeUsed":"en-US-MichelleNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"ykXk7bXsMMQ9QdpDm":{"_id":"ykXk7bXsMMQ9QdpDm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"locale":"en","template":"resourceSlide","title":"Untitled","upload":"39kPxf99STbbyox5R"},"dates":{"dateCreated":"2026-04-21T21:49:22.284Z","dateModified":"2026-04-22T13:30:59.364Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"video":{"autoPlay":true,"overlays":[{"identifier":"docvazb4un6qgwWeq","kind":"overlay","height":720,"width":1280,"y":0,"x":0,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"type":"rectangle","lineHeight":1.2,"textAlignment":"center","verticalAlignment":"middle","font":{"size":17.142858505249023,"bold":false,"italic":false,"underline":false},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"transparent"},"padding":{"bottom":3.428571428571429,"top":3.428571428571429,"left":6.857142857142858,"right":6.857142857142858},"fontColor":"rgba(255, 255, 255, 1)"}},{"identifier":"Z879qcFq3hoYTddFB","kind":"overlay","height":720,"width":1280,"y":0,"x":0,"flipHorizontal":false,"flipVertical":false,"type":"svgShape","svgShape":"rect","start":0,"behaviorType":"continue","rotationAngle":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","dur ,"finishTime":41},{"text":"and eligibility restrictions for vehicle owners.","startTime":41,"finishTime":43.419},{"text":"Before authorizing vehicle modifications,","startTime":44.419,"finishTime":46.659},{"text":"specific documentation must be provided,","startTime":46.93,"finishTime":49.08},{"text":"including a valid driver's license,","startTime":49.389,"finishTime":51.139},{"text":"proof of ownership and registration,","startTime":51.459,"finishTime":53.099},{"text":"written consent from the vehicle owner,","startTime":53.34,"finishTime":54.979},{"text":"attestation of primary vehicle use,","startTime":55.13,"finishTime":57.08},{"text":"and proof of active insurance.","startTime":57.34,"finishTime":59.06},{"text":"After installation,","startTime":59.909,"finishTime":60.95},{"text":"providers must inspect the vehicle modification,","startTime":61.279,"finishTime":63.56},{"text":"instruct the individual and the vehicle operator on how to use it,","startTime":63.759,"finishTime":66.76},{"text":"and submit all necessary documentation before","startTime":66.919,"finishTime":69.36},{"text":"they submit a claim for reimbursement.","startTime":69.36,"finishTime":71.199}]}},"assets":["39kPxf99STbbyox5R","aP37TKYu9gyAHr3QT"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Some key takeaways for vehicle modifications include. Vehicle modifications are adaptations or alterations made to an automobile that serves as an individual's primary means of transportation. These adaptations can range from external handling devices and carriers to operating aids such as assistive equipment and technologies. Vehicle modifications are necessary to accommodate the individual's needs, allowing them to function with greater independence and integrate more fully into the community. to the community. Vehicle modification services ar ent from the vehicle owner, attestation of primary vehicle use, and proof of active insurance. After installation, providers must inspect the vehicle modification, instruct the individual in the vehicle operator on how to use it, and submit all necessary documentation before they submit a claim for reimbursement.  ","jobId":"Ggsd5TuNuFwJYg2BL"}}},"fontFamiliesById":{"fidDDeTM9CK4AgjsEHMz":{"_id":"fidDDeTM9CK4AgjsEHMz","_siteID":"ZoiyEJNGnnXpx9Jbx","title":"Mulish","regular":{"woff":"Jfk7edEmSaJQ4b88K","woff2":"L7EqJg9MPr2SvaBdj"},"bold":{"woff":"o2Hk3jWDgiqsLPbEM","woff2":"BoFQAHQiHbpeLCdfN"},"italic":{"woff":"Cj2ZexGF6ja7rbhgh","woff2":"ak4Xp8vtXwNMaTK4f"},"boldItalic":{"woff":"6vxeNmjzXFcn6EJgz","woff2":"kxtukxbiKSB3M4o4g"},"isSampleData":false,"isBuiltin":false},"fidwQgqwPsyLenCcXsNb":{"_id":"fidwQgqwPsyLenCcXsNb","isBuiltin":true,"title":"Montserrat","regular":{"woff":"YywjccToDXBfQrck4","woff2":"9e6ZLRhpvQgr5g5Jg"},"italic":{"woff":"cSnBRqoisHZiR98d7","woff2":"LTQMHn2Tk6ukjWWhZ"},"bold":{"woff":"cAjgCrPw6NQy8jjk2","woff2":"XR5xgw4GWfELqYdKm"},"boldItalic":{"woff":"rYYu3WT5ivHoovrMG","woff2":"pSxF7eJteKRcWpp5N"},"isSampleData":false}},"overlayTemplatesById":{},"pagesById":{"3auzj9EuHpf6RHRBg":{"_id":"3auzj9EuHpf6RHRBg","_siteID":"ZoiyEJNGnnXpx9Jbx","title":"OAC Rules","pageType":"slidePage","icon":"fa-object-ungroup","resources":["N53wTqSjLJzXjfxGi"],"data":{"dates":{"dateCreated":"2026-04-21T21:49:21.282Z","dateModified":"2026-04-21T21:50:06.112Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"assets":[]},"4h5ehSADhSJ4zrpad":{"_id":"4h5ehSADhSJ4zrpad","_siteID":"ZoiyEJNGnnXpx9Jbx","title":"Conclusion","pageType":"slidePage","icon":"fa-object-ungroup","resources":["JhiQmGyXPgnWHq6mg"],"data":{"dates":{"dateCreated":"2026-04-21T21:49:22.688Z","dateModified":"2026-04-21T21:56:12.905Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"assets":[]},"5cG4ZDRLwhtMWYRB5":{"_id":"5cG4ZDRLwhtMW
