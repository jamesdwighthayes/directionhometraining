nter any Request Received Date or RRD information about those pending lines for any requested waiver services.\nFollowing this you will send an activity to the waiver service coordinator notifying them of assessment completion and then any outstanding needs. This is a care coordination activity that you would send to them. Be sure that when you perform the visit with the member you make sure to update the tracker. The waiver service coordinator's duties include adding new members to their trackers.","voiceCode":"en-US-CoraNeural","language":"en","originalResourceId":"QkSKyAXGg58S9zwFQ","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-CoraNeural\">For initial services with the care coordinator, they will perform the significant changes assessment. Visit the member and complete the Aids Norms Tool as appropriate if the member is requesting any personal care services. Then you will enter any Request Received Date or RRD information about those pending lines for any requested waiver services.<break time=\"0.5s\"/>Following this you will send an activity to the waiver service coordinator notifying them of assessment completion and then any outstanding needs. This is a care coordination activity that you would send to them. Be sure that when you perform the visit with the member you make sure to update the tracker. The waiver service coordinator's duties include adding new members to their trackers.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"For initial services with the care coordinator,","startTime":0.129,"finishTime":2.599},{"text":"they will perform the significant changes assessment.","startTime":2.809,"finishTime":5.369},{"text":"Visit the member and complete the AIDS norms tool as","startTime":6.26,"finishTime":8.97},{"text":"appropriate if the member is requesting any personal care services.","startTime":8.97,"finishTime":12.439},{"text":"Then you will enter any request,","startTime":13.329,"finishTime":15.01},{"text":"received date or RRD information about those","startTime":15.02,"finishTime":17.42},{"text":"pending lines for any requested waiver services.","startTime":17.42,"finishTime":20.159},{"text":"Following this,","startTime":21.549,"finishTime":22.19},{"text":"you will send an activity to the waiver","startTime":22.229,"finishTime":24.03},{"text":"service coordinator notifying them of assessment completion,","startTime":24.03,"finishTime":26.94},{"text":"and then any outstanding needs.","startTime":26.95,"finishTime":28.69},{"text":"This is a care coordination activity that you would send to them.","startTime":29.569,"finishTime":32.668},{"text":"Be sure that when you perform the visit with the member,","startTime":33.569,"finishTime":35.9},{"text":"you make sure to update the tracker.","startTime":35.97,"finishTime":37.79},{"text":"The waiver service coordinator's duties include","startTime":38.56,"finishTime":41.08},{"text":"adding new members to their trackers.","startTime":41.08,"finishTime":42.979}]}},"7ET9HfMWFG5W6auKm":{"_id":"7ET9HfMWFG5W6auKm","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":59579,"uploadedFileName":"How-to-put-in-a-note-into-Guiding-Care-that-you-invited-the-PCP-to-the-TDCT-meeting.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-01-27T20:55:31.719Z","dateModified":"2026-01-27T20:55:31.719Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"mWFkRY5pnFK3t7bnb","thumbnail":"kKjTcErwLRCDaCLDM"},"7HJj7Zpgsti3aevGi":{"_id":"7HJj7Zpgsti3aevGi","_site ager's team","startTime":34.438,"finishTime":37.238},{"text":"in the CM folder revamped file section,","startTime":37.578,"finishTime":40.449},{"text":"initial assessments.","startTime":40.659,"finishTime":41.938},{"text":"This form can be faxed to primary care physicians.","startTime":42.83,"finishTime":45.79}]}},"BfnJ3pCRqk2wRFZ34":{"_id":"BfnJ3pCRqk2wRFZ34","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":936000,"uploadedFileName":"Cora-en-ConditionsTemplate-1272026.mp3","uploadedFileNameExtension":".mp3","duration":38.975},"dates":{"dateCreated":"2026-01-27T21:04:36.458Z","dateModified":"2026-01-27T21:04:38.785Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Another step in the initial assessment that requires a template is the Conditions Template. It can be found inside of the CareSource Care Managers team in the CM Folder Revamped channel in the files section in the Initial Assessments Folder. During the initial assessment the member will relay their conditions and these should be documented in this template. In guiding Care the conditions listed in this template for the member should be documented in the managed conditions section and on the deferred goals list. In addition to listing these as managed conditions and deferred goals, this conditions template should be copy and pasted into Guiding Care as a general note under the activities section.","voiceCode":"en-US-CoraNeural","language":"en","originalResourceId":"kSzr5PwnTS9rL4s59","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n es.\nThis holds for the annual plan as well. Care Coordinators will complete the Aids Norms Tool or ANT and route it to the CDT.\nIf a member already has established services, the waiver service coordinator is facilitating the flip from passport. The waiver service coordinator will enter in the service plan lines for these pre-existing services. Any new services that are a result of a Care Coordinator's visit should see the Care Coordinator complete the RRD and the pending line. The waiver service coordinator once they are notified of the start date, will update the service plan.\nA change with next gen is that the RRD window is slightly smaller than 10 days which is its previous length before. As a result it is important for Care Coordinators to notify Waiver Service Coordinator's promptly so these can be added to the service plan. The RRD pending line acts as a placeholder in the record until the service starts and the waiver service coordinator records it in the service plan. If an RRD is placed but a service does not start in that ten day turnaround time and it is not writted by a waiver service coordinator in the service plan then a new RRD will have to be obtained and started for that service.\n\n  ","voiceCode":"en-US-CoraNeural","language":"en","originalResourceId":"MWuhJZjhc8boPteG7","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-CoraNeural\">Regarding Service updates, when performing visits, Care Coordinators will add the Request Received Date or RRD information. Another example is when a care coordinator is renewing a service plan they will do the RRD, but then send an activity to the waiver service coordinator where they will update the Service plan.<break time=\"0.5s\"/>In essence, Care Coordinators sho  show you an example.","startTime":11.859,"finishTime":14.689},{"text":"Why didn't it go away?","startTime":40.04,"finishTime":40.9},{"text":"Discarded it,","startTime":41.479,"finishTime":42.189},{"text":"discarded your changes.","startTime":42.619,"finishTime":43.319},{"text":"I discarded my changes,","startTime":43.36,"finishTime":44.709},{"text":"of course I did.","startTime":44.81,"finishTime":45.68},{"text":"OK,","startTime":50.349,"finishTime":50.63},{"text":"let me make this inactive.","startTime":50.75,"finishTime":52.81},{"text":"OK,","startTime":53.189,"finishTime":53.61},{"text":"so typically when you have a new member for the first time come from passport,","startTime":53.99,"finishTime":57.83},{"text":"come from Ohio home care waiver,","startTime":57.95,"finishTime":59.11},{"text":"they're gonna have a blank slate.","startTime":59.18,"finishTime":60.189},{"text":"It's gonna be a blank chart.","startTime":60.27,"finishTime":61.209},{"text":"There's not gonna be anything in here.","startTime":61.27,"finishTime":62.669},{"text":"So what you need to do is add a program.","startTime":63.069,"finishTime":65.9},{"text":"So you just go to add new program.","startTime":65.989,"finishTime":67.569},{"text":"And then it's the MyCare","startTime":69.389,"finishTime":71.089},{"text":"case management program.","startTime":71.269,"finishTime":72.629},{"text":"The start date,","startTime":72.75,"finishTime":73.43},{"text":"to my knowledge,","startTime":73.51,"finishTime":74.069},{"text":"is the day that they flipped,","startTime":74.11,"finishTime":75.43},{"text":"so the first of the month or whatever day they came from long-term care,","startTime":75.79,"finishTime":79.129},{"text":"community well.","startTime":79.949,"finishTime":80.699},{"text":"So if they flipped the first of December,","startTime":81.19,"finishTime":83.069},{"text":"we're gonna put that here,","startTime":83.15,"finishTime":84.489},{"text":"um.","startTime":84.91,"finishTime":85.389},{"text":"I do rs. Direction Home staff do not have access to any of these notes in CliniSync. Care Coordinators should be aware of this so they know this information will not be available to them in the Clinisync system.","voiceCode":"en-US-CoraNeural","language":"en","originalResourceId":"c8mX3y5JGkyokCgwF","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            <voice name=\"en-US-CoraNeural\">Additional privacy rules surround more restricted health information like psych admissions, the health information of minors, or information from drug and alcohol treatment centers. Direction Home staff do not have access to any of these notes in CliniSync. Care Coordinators should be aware of this so they know this information will not be available to them in the Clinisync system.</voice>\n          </speak>"},"captionData":{"status":"success","captions":[{"text":"Additional privacy rules surround more restricted","startTime":0.009,"finishTime":2.769},{"text":"health information like psych admissions,","startTime":2.769,"finishTime":4.96},{"text":"the health information of minors,","startTime":5.05,"finishTime":6.679},{"text":"or information from drug and alcohol treatment centers.","startTime":6.96,"finishTime":9.93},{"text":"Direction home staff do not have access to any of these notes in clinny sync.","startTime":10.76,"finishTime":15},{"text":"Care coordinators should be aware of this so they know this","startTime":15.89,"finishTime":19.01},{"text":"information will not be available to them in the clinicin system.","startTime":19.01,"finishTime":21.709}]}},"vsc84wEAR9tfvmQj6":{"_id":"vsc84wEAR9tfvmQj6","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1955520,"uploadedFileName":"Cora-en-UponAssignment-1282026.mp3","uploadedFileNameExtension":".mp3","duration":81.4375},"dates":{"dateCreated":"2026-01-28T14:17:33.286Z","dateModified":"2026-01-28T14:17:36.468Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","source":"textToSpeech","textToSpeechData":{"prompt":"Your role is as the Care Coordinator and you will have two waiver service coordinators assigned to your team. Part of your responsibilities include completing the initial assessment. These should come to you as emails that indicate new case assignments. When a member comes to us from passport or assisted living traditionally you have to get their assessment done within 30 days of enrollment. If they come from community well or long-term care, it's a significant change event and then you have three days to get the assessment scheduled. At the start of 2026 with fully integrated dually eligible individuals and the onset of the Next Gen program we are going to have a lot of members getting assigned. There may be flexibilities with this anticipated initial high-volume period. A change from previous operations is that the Care Coordinator will make the initial contact for significant change events like community well. Because Care Coordinators are now required to make the initial call and will be calling members anyways, the Care Coordinator will do the discovery and the intro call portion. That scheduling call will count as your discovery. So the Care Coordinator will make initial contact when they schedule the initial visit with a member. The same is true with community well or long term care flips where the Care Coordinator will contact the member within 24 hours to complete that discovery.","voiceCode":"en-US-CoraNeural","language":"en","originalResourceId":"LP3wJWZJ8EGE3izez","ssml":"<speak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmln ":69.68,"finishTime":71.819},{"text":"The same is true with community well or long-term care flips where the","startTime":72.639,"finishTime":76.269},{"text":"care coordinator will contact the member within","startTime":76.269,"finishTime":78.349},{"text":"24 hours to complete the discovery.","startTime":78.349,"finishTime":80.69}]}},"vwssptHEp8TXgo4ra":{"_id":"vwssptHEp8TXgo4ra","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":38508,"uploadedFileName":"Check-the-Case-Aid-Type-for-HCBS.png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"2026-01-27T20:59:54.133Z","dateModified":"2026-01-27T20:59:54.133Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"ERsdzhmGoZMohdD6f","thumbnail":"PoNr5GL5oWiSFXyh6"},"wMHGwxMrmr2gpXf79":{"_id":"wMHGwxMrmr2gpXf79","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"video","mimetype":"video/mp4","status":"online","fileSizeInBytes":3999667,"uploadedFileName":"How to add people to the Care Team in Guiding Care.mp4","duration":14.9,"uploadedFileNameExtension":".mp4"},"dates":{"dateCreated":"2026-01-27T23:12:59.685Z","dateModified":"2026-01-27T23:12:59.685Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"oPYJFRcZXq3TGjd6g","jobId":"5P7gyEBvcZz7SK35j","thumbnail":"ZtPJ6aEm4hxTbFnjE","videoSD":"9oS9z5RK7L3u3F6iS","captionData":{"status":"success","captions":[]}},"wZymgfcM4wfaxWSLN":{"_id":"wZymgfcM4wfaxWSLN","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"type":"image","mimetype":"image/png","status":"online","fileSizeInBytes":29418,"uploadedFileName":"Section-3-ClinicSync (1).png","height":945,"uploadedFileNameExtension":".png","width":1680},"dates":{"dateCreated":"20 yle\":\"\",\"text\":\"If a gap in services is consecutive, for example a missed week of services, that would merit a single incident report. However, if there were three days missed over a period of two months that would require three separate Incident reports. \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"The waiver service coordinator will be notified of missed visits, so they will be documenting these in real time by adding them to the member's chart.\nCare Coordinators when completing their claims reviews for their annuals may need to complete incident reports if they can't find any documentation of the gaps. A Care Coordinators in this instance would go in and complete an incident report for claims review they completed that was missing documentation.\nIf the Care Coordinator is in the home when an incident report is needed or warranted, then the Care Coordinator will complete this report identifying any health and safety issues they see in the home and later notify the waiver service coordinator of these issues.\nIf a gap in services is consecutive, for example a missed week of services, that would merit a single incident report. However, if there were three days missed over a period of two months that would require three separate Incident reports. ","voiceCodeUsed":"en-US-CoraNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"jobId":"xZh9Ef4w4xTaHqAJB"}},"DQvKMmjRHE8BCpCwf":{"_id":"DQvKMmjRHE8BCpCwf","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Contact Information","upload":"4NsTgGpNyQ9LTTzTH"},"dates":{"dateCreated":"2026-01-27T22:59:17.237Z","dateModified":"2026-01-27T23:00:32.106Z"},"users":{"_userCreatorI ottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"k5ABuFScnSmGCaw7h","isRatioFixed":true,"start":30,"behaviorType":"continue","rotationAngle":0,"duration":14.399999999999999},{"identifier":"T9sYS7gJ7o8bMjkWN","kind":"overlay","type":"rectangle","width":276,"height":275.99999999999994,"x":155,"y":413,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"TrMrTFnQ8RwWKbuNc","isRatioFixed":true,"start":52.3,"behaviorType":"continue","rotationAngle":0,"imageCropping":{"positionX":11.280487804878046,"positionY":21.646341463414632,"width":78.35365853658537,"height":78.35365853658536}}],"duration":81.4375}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["vsc84wEAR9tfvmQj6","4NKgCpqspuiGWM3bP","k5ABuFScnSmGCaw7h","TrMrTFnQ8RwWKbuNc"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"jobId":"Kz5sSjXjzjYJWpwuZ","voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Your role is as the Care Coordinator and you will have two waiver service coordinators assigned to your team. Part of your responsibilities include completing the initial assessment. These should come to you as emails that indicate new case assignments. When a member comes to us from passport or assisted living traditionally you have to get their assessment done within 30 days of enrollment. If they come from community well or long-term care, it's a significant change event and then you have three days to get the assessment scheduled. At the start of 2026 with fully integrated dually eligible individuals and the onset of the Next Gen program we are going to have a lot of members getting assigned. There may be flexibilities with this anticipated initial high-volume period. A change from previous operations is that the Care Coordinator will make the initial contact for significant change events like community well. Because Care Coordinators are now required to make the initial call and will be calling members anyways, the Care Coordinator will do the discovery and the intro call portion. That scheduling call will count as your discovery. So the Care Coordinator will make initial contact when they schedule the initial visit with a member. The same is true with community well or long term care flips where the Care Coordinator will contact the member within 24 hours to complete that discovery.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Your role is as the Care Coordinator and you will have two waiver service coordinators assigned to your team. Part of your responsibilities include completing the initial assessment. These should come to you as emails that indicate new case assignments. When a member comes to us from passport or assisted living traditionally you have to get their assessment done within 30 days of enrollment. If they come from community well or long-term care, it's a significant change event and then you have three days to get the assessment scheduled. At the start of 2026 with fully integrated dually eligible individuals and the onset of the Next Gen program we are going to have a lot of members getting assigned. There may be flexibilities with this anticipated initial high-volume period. A change from previous operations is that the Care Coordinator will make the initial contact for significant change events like community well. Because Care Coordinators are now required to make the initial call and will be calling members anyways, the Care Coordinator will do the discovery and the intro call portion. That scheduling call will count as your discovery. So the Care Coordinator will make initial contact when they schedule the initial visit with a member. The same is true with community well or long term care flips where the Care Coordinator will contact the member within 24 hours to complete that discovery.","voiceCodeUsed":"en-US-CoraNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"MNAt5YNhzw98NKxuq":{"_id":"MNAt5YNhzw98NKxuq","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Steps in Guiding Care","upload":"GujLpxWy6MA8L2fad"},"dates":{"dateCreated":"2026-01-27T19:55:31.535Z","dateModified":"2026-01-27T23:11:35.892Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ugNJdk7H4DsAMuZR8","kind":"overlay","type":"rectangle","width":1280,"height":802.2857142857142,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"gtmRZGhrMKzp8XioR","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":11.9125,"captions":[{"text":"This training will not cover each step you need to take to complete an assessment,","startTime":0.119,"finishTime":3.73},{"text":"but there are a few steps that nurse transition specialists or NTS","startTime":3.849,"finishTime":7.409},{"text":"performed in guiding care that is now the responsibility of care coordinators.","startTime":7.409,"finishTime":11.13}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["GujLpxWy6MA8L2fad","gtmRZGhrMKzp8XioR"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This training will not cover each step you need to take to complete an assessment but there are a few steps that Nurse Transitions Specialists or NTS performed in guiding care that is now the responsibility of Care Coordinators.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","voiceCodeUsed":"en-US-CoraNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false},"promptText":"This training will not cover each step you need to take to complete an assessment but there are a few steps that Nurse Transitions Specialists or NTS performed in guiding care that is now the responsibility of Care Coordinators.","jobId":"hW6C5hYq3Erx7YAR6"}},"MWuhJZjhc8boPteG7":{"_id":"MWuhJZjhc8boPteG7","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Service Updates","upload":"S5LHFsWYA8JJhuWmY"},"dates":{"dateCreated":"2026-01-20T13:22:13.720Z","dateModified":"2026-01-28T14:34:50.014Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"duration":99.6625,"captions":[{"text":"Regarding service updates,","startTime":0.09,"finishTime":1.6},{"text":"when performing visits,","startTime":1.8090000000000002,"finishTime":3.039},{"text":"care coordinators will add the request received date or RRD information.","startTime":3.289,"finishTime":7},{"text":"Another example is when a care coordinator is renewing a service plan,","startTime":8.109,"finishTime":11.869},{"text":"they will do the RRD","startTime":11.949,"finishTime":13.189},{"text":"but then send an activity to the waiver service","startTime":13.39,"finishTime":15.63},{"text":"coordinator where they will update the service plan.","startTime":15.63,"finishTime":17.95},{"text":"In essence,","startTime":19.25,"finishTime":20.04},{"text":"care coordinators should not be modifying service","startTime":20.29,"finishTime":22.809},{"text":"plans at all besides pending lines.","startTime":22.809,"finishTime":24.969},{"text":"This holds for the annual plan as well.","startTime":26.319,"finishTime":28.5},{"text":"Care coordinators will complete the AIDS norms tool or ANT and route it to the CDT.","startTime":29.35,"finishTime":34.18},{"text":"If a member already has established services,","startTime":35.599,"finishTime":38.229},{"text":"the waiver service coordinator is facilitating the flip from passport.","startTime":38.439,"finishTime":42.119},{"text":"The waiver service coordinator will enter in the","startTime":42.88,"finishTime":45.2},{"text":"service plan lines for these pre-existing services.","startTime":45.2,"finishTime":48.099},{"text":"Any new services that are a result of a care coordinator's visit","startTime":48.959,"finishTime":52.45},{"text":"should see the care coordinator complete the RRD in the pending line.","startTime":52.45,"finishTime":55.909},{"text":"The waiver service coordinator,","startTime":56.7,"finishTime":58.22},{"text":"once they are notified of the start date,","startTime":58.299,"finishTime":60.22},{"text":"will update the service plan.","startTime":60.459,"finishTime":61.88},{"text":"A change with NextGen is that the RRD window is slightly smaller than 10 days,","startTime":63.299,"finishTime":67.919},{"text":"which is its previous length before.","startTime":67.98,"finishTime":69.879},{"text":"As a result,","startTime":70.73,"finishTime":71.339},{"text":"it is important for care coordinators to notify waiver service coordinators","startTime":71.379,"finishTime":75.339},{"text":"promptly so these can be added to the service plan.","startTime":75.339,"finishTime":77.9},{"text":"The RRD pending line acts as a placeholder in the record until the","startTime":78.769,"finishTime":82.239},{"text":"service starts and the waiver service coordinator records it in the service plan.","startTime":82.239,"finishTime":86.139},{"text":"If an RRD is placed,","startTime":86.94,"finishTime":88.449},{"text":"but a service does not start in that 10 day turnaround time and","startTime":88.459,"finishTime":91.66},{"text":"it is not written by a waiver service coordinator in the service plan,","startTime":91.66,"finishTime":94.819},{"text":"then a new RRD will have to be obtained and started for that service.","startTime":94.94,"finishTime":98.44}],"overlays":[{"identifier":"HeHvjoeSnNjwcE7kZ","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border" e service plan. The RRD pending line acts as a placeholder in the record until the service starts and the waiver service coordinator records it in the service plan. If an RRD is placed but a service does not start in that ten day turnaround time and it is not writted by a waiver service coordinator in the service plan then a new RRD will have to be obtained and started for that service.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"  \",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Regarding Service updates, when performing visits, Care Coordinators will add the Request Received Date or RRD information. Another example is when a care coordinator is renewing a service plan they will do the RRD, but then send an activity to the waiver service coordinator where they will update the Service plan.\nIn essence, Care Coordinators should not be modifying service plans at all besides pending lines.\nThis holds for the annual plan as well. Care Coordinators will complete the Aids Norms Tool or ANT and route it to the CDT.\nIf a member already has established services, the waiver service coordinator is facilitating the flip from passport. The waiver service coordinator will enter in the service plan lines for these pre-existing services. Any new services that are a result of a Care Coordinator's visit should see the Care Coordinator complete t {\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Today’s lesson is designed to prepare you for your role as a Care Coordinator under NextGen and FIDE processes. By the end of this training, you’ll understand your responsibilities, learn key workflows, and practice using tools and templates that support compliance and member care.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"This training is divided into four sections. Roles and Responsibilities, which compare the responsibilities of Care Coordinators and Waiver Service Coordinators. The Initial Assessment Workflow, which lists the steps Care Coordinators take in performing this assessment. CliniSync training, which reviews privacy rules for the system and then demonstrates its use. And Medication Reconciliation which shows how to perform a medication reconciliation in CareSource's Guiding Care System.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Today’s lesson is designed to prepare you for your role as a Care Coordinator under NextGen and FIDE processes. By the end of this training, you’ll understand your responsibilities, learn key workflows, and practice using tools and templates that support compliance and member care.\nThis training is divided into four sections. Roles and Responsibilities, which compare the responsibilities of Care Coordinators and Waiver Service Coordinators. The Initial Assessment Workflow, which lists the steps Care Coordinators take in performing this assessment. CliniSync training, which reviews privacy rules for the system and then demonstrates its use. And Medication Reconciliation which shows how to perform a medication reconciliation in CareSource's Guiding Care System.","jobId":"HHb6qbfnpEJdFQQfQ","voiceCodeUsed":"en-US-CoraNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"iXwuManRxZZ8m42R9":{"_id":"iXwuManRxZZ8m42R9","_siteID":"ZoiyEJNGnnXpx9Jbx","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Health and Safety Action Plans","upload":"2McmK8wKL7wniTqZQ"},"dates":{"dateCreated":"2026-01-27T19:38:21.284Z","dateModified":"2026-01-27T19:39:50.349Z"},"users":{"_userCreatorID":"fMCCj2F5RvKPEqE8F","_userModifierID":"fMCCj2F5RvKPEqE8F"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"YN5x4nawatPoSeDGX","kind":"overlay","type":"rectangle","width":1280,"height":720,"x":0,"y":0,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20}},"isImage":true,"imageAsset":"c7ZKYk429QnnamtcZ","isRatioFixed":true,"start":0,"behaviorType":"continue","rotationAngle":0}],"duration":44,"captions":[{"text":"A health and safety plan,","startTime":0.009,"finishTime":1.6},{"text":"HSAP","startTime":1.7690000000000001,"finishTime":2.839},{"text":"can be initiated when warranted by either the","startTime":3.099,"finishTime":5.409},{"text":"care coordinator or the waiver service coordinator.","startTime":5.409,"finishTime":8.09},{"text":"When either representative is in the home and an HSAP needs to be initiated,","startTime":8.92,"finishTime":13.119},{"text":"you would initiate it with the member while they","startTime":13.359,"finishTime":15.039},{"text":"are present and have the member sign the HSAP.","startTime":15.039,"finishTime":17.739},{"text":"Next,","startTime":19.09,"finishTime":19.37},{"text":"the individual who initiated the HSAP continues","startTime":19.409,"finishTime":22.53},{"text":"it by completing the HSAP initiation checklist,","startTime":22.53,"finishTime":25.61},{"text":"which consists of uploading it,","startTime":25.659,"finishTime":27.2},{"text":"completing a corresponding incident report,","startTime":27.409,"finishTime":29.59},{"text":"and then completing the MyCare member risk script.","startTime":29.77,"finishTime":32.11},{"text":"The care coordinator then reviews the HSAP at annual reviews with the member.","startTime":33.56,"finishTime":38.22},{"text":"The HSAP does not need to be reviewed at significant change events.","startTime":39.08,"finishTime":43.24}]}},"workspaceId":"oPYJFRcZXq3TGjd6g","assets":["2McmK8wKL7wniTqZQ","c7ZKYk429QnnamtcZ"],"childResources":[],"overlayTemplateIds":[],"fontFamilies":[],"voiceOver":{"voiceEditorContent":"{\"root\":{\"children\":[{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"A health and safety plan (H SAP) can be initiated when warranted by either the Care Coordinator or the Waiver Service Coordinator. When either representative is in the home and an H SAP needs to be initiated, you would initiate it with the member while they are present and have the member sign the H SAP.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Next the individual who initiated the H SAP continues it by completing the H SAP initiation checklist which consists of uploading it, completing a corresponding incident report, and then completing the MyCare member risk script.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"The Care Coordinator then reviews the H SAP at annual reviews with the member. The H SAP does not need to be reviewed at Significant change events.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-CoraNeural\",\"rate\":1}}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"A health and safety plan (H SAP) can be initiated when warranted by either the Care Coordinator or the Waiver Service Coordinator. When either representative is in the home and an H SAP needs to be initiated, you would initiate it with the member while they are present and have the member sign the H SAP.\nNext the individual who initiated the H SAP continues it by completing the H SAP initiation checklist which consists of uploading it, completing a corresponding incident report, and then completing the MyCare member risk script.\nThe Care Coordinator then reviews the H SAP at annual reviews with the member. The H SAP does not need to be reviewed at Significant change events.\n\n","voiceCodeUsed
